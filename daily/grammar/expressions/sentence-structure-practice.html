<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="通过文章、公版文学与新闻报道中的真实长句，练习判断最终谓语、分句边界和修饰关系。">
    <title>长句理解练习 | 文法理解</title>
    <link rel="icon" href="../../../assets/home-redesign/kiji-logo-brush-sharp-v2.webp">
    <link rel="stylesheet" href="../../../shared/fonts/noto-serif-jp/noto-serif-jp-variable.css">
    <link rel="stylesheet" href="../../../shared/site-fonts.css">
    <link rel="stylesheet" href="sentence-structure.css?v=20260723o">
</head>
<body class="sentence-structure-page sentence-structure-practice-page">
    <header class="ss-topbar">
        <a class="ss-back" href="../index.html"><span aria-hidden="true">←</span><span>返回语法目录</span></a>
        <span class="ss-topbar-title">文法理解</span>
        <span class="ss-topbar-spacer" aria-hidden="true"></span>
    </header>

    <main class="ss-practice-page-main">
        <section class="ss-practice-page-heading" aria-labelledby="practice-page-title">
            <div>
                <p class="ss-eyebrow">LONG SENTENCE PRACTICE</p>
                <h1 id="practice-page-title">长句理解练习</h1>
            </div>
            <p>先独立阅读，再展开结构解析</p>
        </section>

        <p class="ss-practice-page-lead">题目选自文章、公版文学与新闻报道。阅读原句后，先自行确认<strong>最终谓语、分句边界和中心名词</strong>，再查看解析。</p>

        <section class="ss-practice" id="long-sentence-practice" aria-label="长句理解练习">
            <div class="ss-practice-levels" role="tablist" aria-label="选择练习难度">
                <button class="ss-practice-level is-active" type="button" role="tab" aria-selected="true" data-practice-level="basic">
                    <span>基础</span><small>5题</small>
                </button>
                <button class="ss-practice-level" type="button" role="tab" aria-selected="false" data-practice-level="intermediate">
                    <span>进阶</span><small>5题</small>
                </button>
                <button class="ss-practice-level" type="button" role="tab" aria-selected="false" data-practice-level="advanced">
                    <span>综合</span><small>5题</small>
                </button>
            </div>

            <article class="ss-practice-stage" aria-live="polite">
                <header class="ss-practice-stage-header">
                    <div class="ss-practice-meta">
                        <span id="ss-practice-level-label">基础</span>
                        <span id="ss-practice-source-type">文章</span>
                    </div>
                    <strong id="ss-practice-progress">01 / 05</strong>
                </header>

                <div class="ss-practice-source-row">
                    <span>出处</span>
                    <a id="ss-practice-source" href="#" target="_blank" rel="noopener noreferrer">—</a>
                    <small id="ss-practice-source-note" hidden></small>
                </div>

                <div class="ss-practice-question">
                    <small>请先独立理解原句</small>
                    <p class="ss-jp" id="ss-practice-sentence" lang="ja"></p>
                </div>

                <div class="ss-practice-thinking" aria-label="阅读时的自我确认">
                    <span>最终谓语在哪里？</span>
                    <span>哪些内容组成分句？</span>
                    <span>修饰语指向哪个词？</span>
                </div>

                <button class="ss-practice-reveal" id="ss-practice-reveal" type="button" aria-expanded="false" aria-controls="ss-practice-analysis">
                    <span>查看解析</span><i aria-hidden="true">＋</i>
                </button>

                <div class="ss-practice-analysis" id="ss-practice-analysis" hidden></div>

                <footer class="ss-practice-navigation">
                    <button id="ss-practice-prev" type="button"><span aria-hidden="true">←</span> 上一题</button>
                    <div class="ss-practice-dots" id="ss-practice-dots" aria-label="本组练习进度"></div>
                    <button id="ss-practice-next" type="button">下一题 <span aria-hidden="true">→</span></button>
                </footer>
            </article>
        </section>
    </main>

    <script src="sentence-structure-practice-data.js?v=20260723b"></script>
    <script src="sentence-structure.js?v=20260723d"></script>
    <script src="../../../shared/unified-header.js?v=20260723a" data-kiki-unified-header-loader></script>
</body>
</html>
