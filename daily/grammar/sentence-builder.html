<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>造句训练 - kiki的日语小窝</title>
    <link rel="stylesheet" href="../../shared/site-fonts.css">
    <style>
        :root {
            --bg-color: #fdfaf5;
            --paper-color: #ffffff;
            --paper-soft: rgba(255, 255, 255, 0.88);
            --text-color: #2c2c2c;
            --accent-color: #b33e3e;
            --accent-soft: rgba(179, 62, 62, 0.08);
            --sub-color: #787878;
            --line-color: rgba(126, 103, 92, 0.14);
            --shadow: 0 10px 24px rgba(63, 43, 36, 0.06);
            --radius: 18px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(179, 62, 62, 0.04), transparent 24%),
                linear-gradient(180deg, #fbf8f2 0%, #f4ede3 100%);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
        }

        header {
            width: 100%;
            padding: 18px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            background-color: rgba(253, 250, 245, 0.95);
            backdrop-filter: blur(8px);
            z-index: 100;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .back-btn {
            position: absolute;
            left: 20px;
            text-decoration: none;
            color: var(--text-color);
            font-size: 15px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            opacity: 0.72;
            transition: opacity 0.25s, transform 0.25s;
        }

        .back-btn:hover {
            opacity: 1;
            transform: translateX(-2px);
        }

        h1 {
            margin: 0;
            font-size: 19px;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .page-shell {
            width: min(92%, 980px);
            margin: 0 auto;
            padding: 32px 0 56px;
        }

        /* ビュー切り替えアニメーション */
        .view-section {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        .view-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel {
            background: var(--paper-soft);
            border: 1px solid var(--line-color);
            border-radius: calc(var(--radius) + 4px);
            box-shadow: var(--shadow);
            padding: 26px 28px;
        }

        .intro-card {
            margin-bottom: 20px;
        }

        .eyebrow {
            margin: 0 0 10px;
            font-size: 12px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--sub-color);
        }

        .intro-card h2 {
            margin: 0;
            font-size: 30px;
            font-weight: 600;
            letter-spacing: 0.06em;
        }

        .intro-card p {
            margin: 12px 0 0;
            color: var(--sub-color);
            line-height: 1.8;
            font-size: 14px;
        }

        /* ホームビュー：トピックグリッド */
        .topic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 24px;
        }

        .topic-card {
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            overflow: hidden;
            padding: 24px;
        }

        .topic-card:hover {
            transform: translateY(-4px);
            border-color: rgba(179, 62, 62, 0.3);
            box-shadow: 0 16px 32px rgba(179, 62, 62, 0.08);
        }

        .topic-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .topic-card-title {
            margin: 0;
            font-size: 19px;
            font-weight: 600;
            color: var(--text-color);
        }

        .mistake-badge {
            background: var(--accent-soft);
            color: var(--accent-color);
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: 700;
            white-space: nowrap;
        }

        .topic-card-note {
            margin: 0;
            font-size: 13px;
            color: var(--sub-color);
            line-height: 1.6;
            flex: 1;
        }

        .topic-card-arrow {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-color);
            margin-top: 8px;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.25s ease;
        }

        .topic-card:hover .topic-card-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        /* セットアップビュー：詳細パネル */
        .setup-detail-panel {
            max-width: 680px;
            margin: 0 auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .setup-header h2 {
            margin: 0 0 12px;
            font-size: 32px;
            font-weight: 600;
        }

        .setup-header p {
            margin: 0;
            color: var(--sub-color);
            line-height: 1.6;
            font-size: 15px;
        }

        .setup-stats {
            display: flex;
            gap: 48px;
            padding: 24px 0;
            border-top: 1px dashed var(--line-color);
            border-bottom: 1px dashed var(--line-color);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--sub-color);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .stat-val {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-color);
        }

        .stat-val.has-mistake {
            color: var(--accent-color);
        }

        .control-group {
            display: grid;
            gap: 12px;
        }

        .control-label {
            margin: 0;
            font-size: 12px;
            color: var(--sub-color);
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .pill-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pill-btn {
            border: 1px solid rgba(126, 103, 92, 0.16);
            border-radius: 999px;
            background: #fff;
            color: var(--text-color);
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .pill-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            border-color: rgba(179, 62, 62, 0.28);
        }

        .pill-btn.active {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
            box-shadow: 0 10px 22px rgba(179, 62, 62, 0.16);
        }

        .pill-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: #f5f5f5;
        }

        .start-btn {
            width: 100%;
            border-radius: 14px;
            border: none;
            background: var(--accent-color);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
            box-shadow: 0 8px 16px rgba(179, 62, 62, 0.15);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(179, 62, 62, 0.2);
        }

        .large-start-btn {
            padding: 18px;
            font-size: 16px;
            margin-top: 10px;
        }

        /* 練習ページ上部ステータスバー */
        .practice-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            margin-bottom: 20px;
            gap: 20px;
        }

        .back-text-btn {
            background: none;
            border: none;
            color: var(--sub-color);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 12px;
            margin-left: -12px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .back-text-btn:hover {
            background: rgba(0,0,0,0.04);
            color: var(--text-color);
        }

        .progress-info {
            flex: 1;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .progress-text {
            font-size: 13px;
            color: var(--sub-color);
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .progress-bar-wrap {
            width: 100%;
            height: 6px;
            background: rgba(126, 103, 92, 0.1);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent-color);
            border-radius: 999px;
            transition: width 0.3s ease;
        }

        .mode-badge {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-color);
            background: var(--accent-soft);
            padding: 6px 12px;
            border-radius: 999px;
        }

        .exercise-card {
            display: grid;
            gap: 20px;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .meta-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 999px;
            background: #f5f2ed;
            color: #8b8078;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.06em;
        }

        .badge.level-advanced {
            background: rgba(179, 62, 62, 0.1);
            color: var(--accent-color);
        }

        .instruction-box {
            padding: 16px 18px;
            border-radius: 16px;
            background: rgba(179, 62, 62, 0.05);
            color: #5c4d49;
            line-height: 1.8;
            font-size: 15px;
        }

        .slots-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .slot-btn {
            min-height: 52px;
            min-width: 112px;
            border-radius: 16px;
            border: 1px dashed rgba(179, 62, 62, 0.26);
            background: #fff;
            padding: 12px 16px;
            font-size: 15px;
            color: var(--accent-color);
            font-weight: 600;
            cursor: pointer;
            transition: 0.18s ease;
        }

        .slot-btn:hover {
            border-color: rgba(179, 62, 62, 0.5);
            transform: translateY(-1px);
        }

        .slot-btn.empty {
            color: #c8bdb8;
            font-weight: 500;
        }

        .choice-bank {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            min-height: 56px;
        }

        .choice-btn {
            min-height: 48px;
            border-radius: 999px;
            border: 1px solid rgba(126, 103, 92, 0.16);
            background: #fff;
            padding: 10px 16px;
            font-size: 15px;
            color: var(--text-color);
            cursor: pointer;
            transition: 0.18s ease;
            box-shadow: 0 4px 10px rgba(63, 43, 36, 0.03);
        }

        .choice-btn:hover {
            transform: translateY(-1px);
            border-color: rgba(179, 62, 62, 0.32);
        }

        .action-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .action-btn {
            min-height: 44px;
            border: 1px solid rgba(126, 103, 92, 0.16);
            border-radius: 14px;
            background: #fff;
            color: var(--text-color);
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.18s ease;
        }

        .action-btn:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .action-btn.primary {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        .action-btn:disabled {
            opacity: 0.46;
            cursor: not-allowed;
            transform: none;
        }

        .hint-box,
        .feedback-box,
        .empty-box,
        .complete-box {
            border-radius: 18px;
            border: 1px solid var(--line-color);
            background: rgba(255, 255, 255, 0.96);
            padding: 18px 20px;
        }

        .hint-box {
            background: rgba(245, 242, 237, 0.88);
        }

        .feedback-box.correct {
            border-color: rgba(82, 134, 94, 0.2);
            background: rgba(240, 250, 242, 0.94);
        }

        .feedback-box.wrong {
            border-color: rgba(179, 62, 62, 0.18);
            background: rgba(255, 247, 246, 0.96);
        }

        .feedback-title,
        .complete-title,
        .empty-title {
            margin: 0 0 10px;
            font-size: 22px;
            font-weight: 700;
        }

        .feedback-box p,
        .hint-box p,
        .empty-box p,
        .complete-box p {
            margin: 8px 0 0;
            color: var(--sub-color);
            line-height: 1.8;
            font-size: 14px;
        }

        .answer-line {
            margin-top: 12px;
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.85);
            color: var(--text-color);
            line-height: 1.8;
        }

        .answer-line strong {
            color: var(--accent-color);
        }

        .empty-box,
        .complete-box {
            text-align: center;
            padding: 40px 20px;
        }

        .empty-box .action-row,
        .complete-box .action-row {
            justify-content: center;
            margin-top: 24px;
        }

        @media (max-width: 760px) {
            .page-shell {
                width: min(94%, 980px);
                padding-top: 24px;
            }

            .panel {
                padding: 20px 18px;
            }

            .intro-card h2 {
                font-size: 24px;
            }

            .topic-grid {
                grid-template-columns: 1fr;
            }

            .setup-detail-panel {
                padding: 24px 20px;
                gap: 24px;
            }

            .setup-stats {
                gap: 20px;
                flex-direction: column;
                border-top: none;
                padding: 12px 0;
            }

            .stat-item {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                border-bottom: 1px dashed var(--line-color);
                padding-bottom: 12px;
            }

            .practice-header {
                flex-wrap: wrap;
                padding: 14px 18px;
            }

            .progress-info {
                order: 3;
                max-width: 100%;
                margin-top: 8px;
            }

            .slot-btn {
                min-width: 96px;
                font-size: 14px;
            }

            .choice-btn {
                width: 100%;
                border-radius: 16px;
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="back-btn">← 戻る</a>
        <h1>造句训练</h1>
    </header>

    <main class="page-shell" id="app-container">
        <!-- ホームビュー (テーマライブラリ) -->
        <div id="view-home" class="view-section active"></div>

        <!-- セットアップビュー (テーマ設定) -->
        <div id="view-setup" class="view-section"></div>
        
        <!-- プラクティスビュー (練習領域) -->
        <div id="view-practice" class="view-section"></div>
    </main>

    <script src="sentence-builder-data.js"></script>
    <script>
        (function () {
            const storageKey = "kikiSentenceBuilderMistakes";
            const data = window.sentenceBuilderData;
            const appContainer = document.getElementById("app-container");

            if (!data || !Array.isArray(data.topics) || data.topics.length === 0) {
                appContainer.innerHTML = '<div class="panel"><div class="empty-box"><h3 class="empty-title">题库加载失败</h3><p>未读取到造句训练数据，请检查 sentence-builder-data.js 是否正常加载。</p></div></div>';
                return;
            }

            const topics = data.topics;
            const topicMap = new Map(topics.map((topic) => [topic.id, topic]));

            // グローバル状態管理
            const state = {
                currentView: "home", // ビュー状態: "home", "setup" または "practice"
                currentTopic: topics[0].id,
                currentMode: "practice",
                sessionQuestions: [],
                currentIndex: 0,
                selectedBlocks: [],
                availableBlocks: [],
                currentQuestion: null,
                judged: false,
                lastCorrect: false,
                hintVisible: false,
                sessionCorrect: 0,
                sessionWrong: 0,
                completed: false
            };

            function loadMistakes() {
                try {
                    const raw = JSON.parse(localStorage.getItem(storageKey) || "[]");
                    return new Set(Array.isArray(raw) ? raw : []);
                } catch (error) {
                    return new Set();
                }
            }

            let mistakes = loadMistakes();

            function saveMistakes() {
                localStorage.setItem(storageKey, JSON.stringify(Array.from(mistakes)));
            }

            function escapeHtml(value) {
                return String(value)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            function getCurrentTopic() {
                return topicMap.get(state.currentTopic);
            }

            function getQuestionPool() {
                const topic = getCurrentTopic();
                const questions = topic ? topic.questions.slice() : [];
                const ordered = questions.sort((a, b) => {
                    if (a.level === b.level) {
                        return a.id.localeCompare(b.id);
                    }
                    return a.level === "basic" ? -1 : 1;
                });

                if (state.currentMode === "mistake") {
                    return ordered.filter((question) => mistakes.has(question.id));
                }

                return ordered;
            }

            function getChoiceOrderMap(question) {
                return new Map(question.choiceBlocks.map((text, index) => [text, index]));
            }

            // コアビュールーティングとレンダラー
            function render() {
                const viewHome = document.getElementById("view-home");
                const viewSetup = document.getElementById("view-setup");
                const viewPractice = document.getElementById("view-practice");

                // クラス切り替え
                viewHome.classList.toggle("active", state.currentView === "home");
                viewSetup.classList.toggle("active", state.currentView === "setup");
                viewPractice.classList.toggle("active", state.currentView === "practice");

                // アクティブなビューのレンダリング
                if (state.currentView === "home") {
                    renderHomeView(viewHome);
                } else if (state.currentView === "setup") {
                    renderSetupView(viewSetup);
                } else if (state.currentView === "practice") {
                    renderPracticeView(viewPractice);
                }
            }

            // レンダリング：ホームビュー
            function renderHomeView(container) {
                container.innerHTML = `
                    <section class="panel intro-card">
                        <p class="eyebrow">Sentence Builder</p>
                        <h2>基础句子还原练习</h2>
                        <p>把拆开的词块重新拼回完整句子。先从基础短语块开始，再慢慢进入更细的拆分，练到不仅看得懂，还能真正自己把句子搭起来。</p>
                    </section>

                    <div class="topic-grid">
                        ${topics.map(t => {
                            const mistakesCount = t.questions.filter((q) => mistakes.has(q.id)).length;
                            return `
                                <div class="panel topic-card" data-action="select-topic" data-topic-id="${t.id}">
                                    <div class="topic-card-header">
                                        <h3 class="topic-card-title">${escapeHtml(t.label)}</h3>
                                        ${mistakesCount > 0 ? `<span class="mistake-badge">${mistakesCount} 错题</span>` : ''}
                                    </div>
                                    <p class="topic-card-note">${escapeHtml(t.note || '点击进入配置')}</p>
                                    <div class="topic-card-arrow">进入配置 →</div>
                                </div>
                            `;
                        }).join("")}
                    </div>
                `;
            }

            // レンダリング：設定ビュー
            function renderSetupView(container) {
                const topic = getCurrentTopic();
                const topicMistakes = topic.questions.filter((q) => mistakes.has(q.id)).length;
                
                container.innerHTML = `
                    <div class="practice-header panel">
                        <button type="button" class="back-text-btn" data-action="go-home">← 返回主题列表</button>
                        <div class="mode-badge">主题配置</div>
                    </div>

                    <section class="setup-detail-panel panel">
                        <div class="setup-header">
                            <h2>${escapeHtml(topic.label)}</h2>
                            <p>${escapeHtml(topic.note || "先选一个主题开始练习。错题回顾只会读取这个页面自己的错题记录。")}</p>
                        </div>

                        <div class="setup-stats">
                            <div class="stat-item">
                                <span class="stat-label">总题数</span>
                                <span class="stat-val">${topic.questions.length}</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">待复习错题</span>
                                <span class="stat-val ${topicMistakes > 0 ? 'has-mistake' : ''}">${topicMistakes}</span>
                            </div>
                        </div>

                        <div class="control-group">
                            <p class="control-label">选择练习模式</p>
                            <div class="pill-group">
                                <button type="button" class="pill-btn${state.currentMode === "practice" ? " active" : ""}" data-mode="practice">普通练习</button>
                                <button type="button" class="pill-btn${state.currentMode === "mistake" ? " active" : ""}" data-mode="mistake" ${topicMistakes === 0 ? "disabled" : ""}>错题回顾</button>
                            </div>
                        </div>

                        <button type="button" class="start-btn large-start-btn" data-action="start-session">开始练习 →</button>
                    </section>
                `;
            }

            // レンダリング：プラクティスビュー
            function renderPracticeView(container) {
                if (state.sessionQuestions.length === 0) {
                    renderEmptyState(container);
                    return;
                }

                if (state.completed) {
                    renderCompleteState(container);
                    return;
                }

                renderQuestionState(container);
            }

            // レンダリング：空のステータス
            function renderEmptyState(container) {
                const isMistakeMode = state.currentMode === "mistake";
                container.innerHTML = `
                    <div class="practice-header panel">
                        <button type="button" class="back-text-btn" data-action="quit-session">← 返回配置</button>
                        <div class="mode-badge">${isMistakeMode ? '错题回顾' : '普通练习'}</div>
                    </div>
                    <section class="panel exercise-card">
                        <div class="empty-box">
                            <h3 class="empty-title">${isMistakeMode ? "这组暂时没有错题" : "还没有题目"}</h3>
                            <p>${isMistakeMode ? "当前主题下还没有需要回看的题目。你可以先去普通练习做一轮，再回来集中复盘。" : "这个主题的题目还没准备好。稍后补充后再来练。"}</p>
                            <div class="action-row">
                                <button type="button" class="action-btn primary" data-action="quit-session">返回配置</button>
                            </div>
                        </div>
                    </section>
                `;
            }

            // レンダリング：完了ステータス
            function renderCompleteState(container) {
                container.innerHTML = `
                    <div class="practice-header panel">
                        <button type="button" class="back-text-btn" data-action="quit-session">← 返回配置</button>
                    </div>
                    <section class="panel exercise-card">
                        <div class="complete-box">
                            <h3 class="complete-title">这一组练完了</h3>
                            <p>当前主题：${escapeHtml(getCurrentTopic().label)}。你已经完成本轮练习，可以重新来一遍，或者返回配置页切换模式。</p>
                            <div class="answer-line">
                                <strong>本轮结果：</strong>
                                共 ${state.sessionQuestions.length} 题，答对 ${state.sessionCorrect} 题，答错 ${state.sessionWrong} 题。
                            </div>
                            <div class="action-row">
                                <button type="button" class="action-btn primary" data-action="restart-session">重新开始本组</button>
                                <button type="button" class="action-btn" data-action="quit-session">返回配置</button>
                            </div>
                        </div>
                    </section>
                `;
            }

            // レンダリング：質問のステータス
            function renderQuestionState(container) {
                const question = state.currentQuestion;
                const difficultyLabel = question.level === "advanced" ? "进阶" : "基础";
                const currentAnswer = question.answerBlocks.join("");
                const userAnswer = state.selectedBlocks.join("");
                
                // 進行状況バーの計算
                const progressPercent = (state.currentIndex / state.sessionQuestions.length) * 100;

                container.innerHTML = `
                    <div class="practice-header panel">
                        <button type="button" class="back-text-btn" data-action="quit-session">← 返回配置</button>
                        <div class="progress-info">
                            <div class="progress-text">第 ${state.currentIndex + 1} / ${state.sessionQuestions.length} 题</div>
                            <div class="progress-bar-wrap">
                                <div class="progress-bar-fill" style="width: ${progressPercent}%"></div>
                            </div>
                        </div>
                        <div class="mode-badge">${state.currentMode === 'practice' ? '普通练习' : '错题回顾'}</div>
                    </div>

                    <section class="panel exercise-card">
                        <div class="question-meta">
                            <div class="meta-left">
                                <span class="badge">${escapeHtml(getCurrentTopic().label)}</span>
                                <span class="badge level-${escapeHtml(question.level)}">${difficultyLabel}</span>
                            </div>
                        </div>

                        <div class="instruction-box">
                            <strong>任务：</strong>${escapeHtml(question.instruction)}
                        </div>

                        <div class="slots-wrap">
                            ${state.selectedBlocks.map((block, index) => `
                                <button type="button" class="slot-btn${block ? "" : " empty"}" data-slot-index="${index}">
                                    ${block ? escapeHtml(block) : `第 ${index + 1} 格`}
                                </button>
                            `).join("")}
                        </div>

                        <div class="choice-bank">
                            ${state.availableBlocks.map((block) => `
                                <button type="button" class="choice-btn" data-choice-text="${escapeHtml(block)}">${escapeHtml(block)}</button>
                            `).join("")}
                        </div>

                        <div class="action-row">
                            <button type="button" class="action-btn" data-action="hint">${state.hintVisible ? "收起提示" : "提示"}</button>
                            <button type="button" class="action-btn" data-action="reset">重置</button>
                            <button type="button" class="action-btn primary" data-action="judge" ${state.selectedBlocks.some((block) => !block) || state.judged ? "disabled" : ""}>判定</button>
                            <button type="button" class="action-btn" data-action="next" ${state.judged ? "" : "disabled"}>下一题</button>
                        </div>

                        ${state.hintVisible && !state.judged ? `
                            <div class="hint-box">
                                <strong>提示：</strong>
                                <p>${escapeHtml(question.hint)}</p>
                            </div>
                        ` : ""}

                        ${state.judged ? `
                            <div class="feedback-box ${state.lastCorrect ? "correct" : "wrong"}">
                                <h3 class="feedback-title">${state.lastCorrect ? "答对了" : "这题还差一点"}</h3>
                                <p>${state.lastCorrect ? "这句已经拼回自然顺序，可以直接进入下一题。" : "看看标准句和讲解，重点不是死记答案，而是把句子骨架看清楚。"}</p>
                                <div class="answer-line"><strong>标准句：</strong>${escapeHtml(currentAnswer)}</div>
                                ${state.lastCorrect ? "" : `<div class="answer-line"><strong>你的答案：</strong>${escapeHtml(userAnswer)}</div>`}
                                <div class="answer-line"><strong>句意：</strong>${escapeHtml(question.translation)}</div>
                                <div class="answer-line"><strong>语法焦点：</strong>${escapeHtml(question.grammarFocus)}</div>
                                <div class="answer-line"><strong>讲解：</strong>${escapeHtml(question.explanation)}</div>
                            </div>
                        ` : ""}
                    </section>
                `;
            }

            // セッション制御ロジック
            function buildSession() {
                state.sessionQuestions = getQuestionPool();
                state.currentIndex = 0;
                state.currentQuestion = null;
                state.selectedBlocks = [];
                state.availableBlocks = [];
                state.judged = false;
                state.hintVisible = false;
                state.completed = false;
                state.sessionCorrect = 0;
                state.sessionWrong = 0;

                if (state.sessionQuestions.length > 0) {
                    prepareQuestion();
                }
            }

            function prepareQuestion() {
                state.currentQuestion = state.sessionQuestions[state.currentIndex] || null;
                state.judged = false;
                state.lastCorrect = false;
                state.hintVisible = false;

                if (!state.currentQuestion) {
                    state.completed = true;
                    return;
                }

                state.selectedBlocks = new Array(state.currentQuestion.answerBlocks.length).fill("");
                state.availableBlocks = state.currentQuestion.choiceBlocks.slice();
            }

            function sortAvailableBlocks() {
                const orderMap = getChoiceOrderMap(state.currentQuestion);
                state.availableBlocks.sort((a, b) => orderMap.get(a) - orderMap.get(b));
            }

            function placeBlock(text) {
                if (state.judged || !state.currentQuestion) return;

                const slotIndex = state.selectedBlocks.findIndex((block) => !block);
                if (slotIndex === -1) return;

                state.selectedBlocks[slotIndex] = text;
                state.availableBlocks = state.availableBlocks.filter((block) => block !== text);
                render();
            }

            function removeBlock(slotIndex) {
                if (state.judged || !state.currentQuestion) return;

                const current = state.selectedBlocks[slotIndex];
                if (!current) return;

                state.selectedBlocks[slotIndex] = "";
                state.availableBlocks.push(current);
                sortAvailableBlocks();
                render();
            }

            function resetCurrentQuestion() {
                if (!state.currentQuestion) return;
                state.judged = false;
                state.hintVisible = false;
                state.lastCorrect = false;
                state.selectedBlocks = new Array(state.currentQuestion.answerBlocks.length).fill("");
                state.availableBlocks = state.currentQuestion.choiceBlocks.slice();
                render();
            }

            function toggleHint() {
                if (!state.currentQuestion || state.judged) return;
                state.hintVisible = !state.hintVisible;
                render();
            }

            function judgeCurrentQuestion() {
                if (!state.currentQuestion || state.judged) return;
                if (state.selectedBlocks.some((block) => !block)) return;

                const correct = state.selectedBlocks.every((block, index) => block === state.currentQuestion.answerBlocks[index]);
                state.judged = true;
                state.lastCorrect = correct;

                if (correct) {
                    state.sessionCorrect += 1;
                    mistakes.delete(state.currentQuestion.id);
                } else {
                    state.sessionWrong += 1;
                    mistakes.add(state.currentQuestion.id);
                }

                saveMistakes();
                render();
            }

            function goNext() {
                if (!state.judged) return;

                if (state.currentIndex >= state.sessionQuestions.length - 1) {
                    state.completed = true;
                    render();
                    return;
                }

                state.currentIndex += 1;
                prepareQuestion();
                render();
            }

            // グローバルイベントリスナー
            appContainer.addEventListener("click", (event) => {
                const target = event.target;

                // 1. モード選択処理
                const modeBtn = target.closest("[data-mode]");
                if (modeBtn && !modeBtn.disabled) {
                    state.currentMode = modeBtn.dataset.mode;
                    render();
                    return;
                }

                // 2. グローバルアクションボタン処理
                const actionBtn = target.closest("[data-action]");
                if (actionBtn) {
                    const action = actionBtn.dataset.action;
                    switch(action) {
                        case "select-topic":
                            state.currentTopic = actionBtn.dataset.topicId;
                            const topic = getCurrentTopic();
                            const topicMistakes = topic.questions.filter((q) => mistakes.has(q.id)).length;
                            // 錯語が0の場合、デフォルトで練習モードにフォールバック
                            if (state.currentMode === "mistake" && topicMistakes === 0) {
                                state.currentMode = "practice";
                            }
                            state.currentView = "setup";
                            render();
                            break;
                        case "go-home":
                            state.currentView = "home";
                            render();
                            break;
                        case "start-session":
                            buildSession();
                            state.currentView = "practice";
                            render();
                            break;
                        case "quit-session":
                            state.currentView = "setup";
                            render();
                            break;
                        case "restart-session":
                            buildSession();
                            render();
                            break;
                        case "hint":
                            toggleHint();
                            break;
                        case "reset":
                            resetCurrentQuestion();
                            break;
                        case "judge":
                            judgeCurrentQuestion();
                            break;
                        case "next":
                            goNext();
                            break;
                    }
                    return;
                }

                // 3. 穴埋めロジック処理
                const slot = target.closest("[data-slot-index]");
                if (slot) {
                    removeBlock(Number(slot.dataset.slotIndex));
                    return;
                }

                const choice = target.closest("[data-choice-text]");
                if (choice) {
                    placeBlock(choice.dataset.choiceText);
                    return;
                }
            });

            // 初期レンダリング
            render();
        })();
    </script>
</body>
</html>
