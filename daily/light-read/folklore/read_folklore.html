<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本の昔話 - 読解鑑賞</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../shared/site-fonts.css">
    <style>
        :root {
            --bg-color: #fdfaf5;
            --paper-color: #ffffff;
            --text-color: #2c2c2c;
            --accent-color: #6f8578;
            --sub-color: #787878;
            --line-color: rgba(111, 133, 120, 0.14);
            --shadow: 0 10px 24px rgba(52, 62, 55, 0.06);
            --radius: 18px;
            --font-display: "Noto Serif JP", "Noto Serif SC", serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(111, 133, 120, 0.05), transparent 24%),
                linear-gradient(180deg, #fbf8f2 0%, #f3ece3 100%);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
        }

        header {
            width: 100%;
            padding: 18px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            background-color: rgba(253, 250, 245, 0.95);
            backdrop-filter: blur(8px);
            z-index: 100;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .back-btn {
            position: absolute;
            left: 20px;
            text-decoration: none;
            color: var(--text-color);
            font-size: 15px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            opacity: 0.72;
            transition: opacity 0.25s, transform 0.25s;
        }

        .back-btn:hover {
            opacity: 1;
            transform: translateX(-2px);
        }

        .home-btn {
            position: absolute;
            right: 20px;
            text-decoration: none;
            color: var(--text-color);
            font-size: 15px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            opacity: 0.72;
            transition: opacity 0.25s, transform 0.25s;
        }

        .home-btn:hover {
            opacity: 1;
            transform: translateX(2px);
        }

        h1 {
            margin: 0;
            font-size: 19px;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .page-shell {
            width: min(92%, 860px);
            margin: 0 auto;
            padding: 32px 0 48px;
        }

        .intro-card {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--line-color);
            border-radius: calc(var(--radius) + 4px);
            box-shadow: var(--shadow);
            padding: 24px 28px;
            margin-bottom: 18px;
        }

        .eyebrow {
            margin: 0 0 10px;
            font-size: 12px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--sub-color);
        }

        .intro-card h2 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 0.06em;
            font-family: var(--font-display);
        }

        .intro-card p {
            margin: 10px 0 0;
            color: var(--sub-color);
            line-height: 1.8;
            font-size: 14px;
        }

        .story-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr)); /* PC端一行三个 */
            gap: 16px;
        }

        .story-card {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid var(--line-color);
            border-radius: 12px; /* 减小圆角 */
            overflow: hidden;
            text-decoration: none;
            color: var(--text-color);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.04);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .story-card:hover {
            transform: translateY(-3px);
            border-color: rgba(111, 133, 120, 0.24);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.06);
        }

        .story-cover {
            aspect-ratio: 4 / 3;
            overflow: hidden;
            background: #f3efe8;
        }

        .story-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .story-info {
            padding: 12px 14px; /* 减小内边距 */
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .story-title {
            margin: 0;
            font-size: 15px; /* 缩小标题 */
            line-height: 1.4;
            font-weight: 600;
            font-family: var(--font-display);
            letter-spacing: 0.03em;
        }

        .story-desc {
            margin: 0;
            font-size: 11px; /* 缩小描述文字 */
            line-height: 1.6;
            color: var(--sub-color);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        footer {
            margin-top: auto;
            padding: 28px;
            font-size: 12px;
            color: var(--sub-color);
            text-align: center;
        }

        @media (max-width: 680px) {
            .page-shell {
                width: min(94%, 860px);
                padding-top: 24px;
            }

            .intro-card {
                padding: 18px;
            }

            .intro-card h2 {
                font-size: 23px;
            }

            .story-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr)); /* 手机端一行两个 */
                gap: 12px;
            }
            
            .story-info {
                padding: 10px 12px;
            }
            
            .story-title {
                font-size: 14px;
            }
            
            .story-desc {
                font-size: 10px;
                line-height: 1.5;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="back-btn">← 戻る</a>
        <h1>日本の昔話</h1>
        <a href="../../../index.html" class="home-btn">ホーム</a>
    </header>

    <main class="page-shell">
        <section class="story-grid">
            <a href="kaguyahime.html" class="story-card">
                <div class="story-cover">
                    <img src="image/kaguya1.png" alt="竹取物語 封面">
                </div>
                <div class="story-info">
                    <h3 class="story-title">竹取物語</h3>
                    <p class="story-desc">竹林で光る竹から生まれた小さな女の子、かぐや姫。美しく成長した彼女は、多くの貴公子の求婚を退け、やがて月に帰っていく物語...</p>
                </div>
            </a>

            <a href="tsuru.html" class="story-card">
                <div class="story-cover">
                    <img src="image/qianhe2.png" alt="鶴の恩返し 封面">
                </div>
                <div class="story-info">
                    <h3 class="story-title">鶴の恩返し</h3>
                    <p class="story-desc">助けた鶴が美しい娘となって現れ、恩返しに織物を織り続ける。覗いてはいけない約束の向こうに、静かな別れが待つ昔話。</p>
                </div>
            </a>

            <a href="yao.html" class="story-card">
                <div class="story-cover">
                    <img src="image/biqiuni1.png" alt="八百比丘尼 封面">
                </div>
                <div class="story-info">
                    <h3 class="story-title">八百比丘尼</h3>
                    <p class="story-desc">不思議な人魚の肉を口にした娘が、永い時を生きることになる。静けさの中に余韻が残る、少しもの悲しい伝承。</p>
                </div>
            </a>
        </section>
    </main>

    <footer>静かな物语，也适合慢慢读。</footer>
</body>
</html>
