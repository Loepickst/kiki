                        const childrenWrapper = document.createElement('div');
                        const macroChildClass = microEntries.length === 1 ? ' single-child' : '';
                        childrenWrapper.className = `mindmap-children mindmap-children--category${macroChildClass} transition-all duration-300 origin-left ${isExpanded ? 'opacity-100 scale-x-100' : 'hidden opacity-0 scale-x-0'}`;
                        microEntries.forEach(({ microKey, items }) => {
                            const branchWrapper = document.createElement('div');
                            const leafClass = items.length === 1 ? ' single-child' : '';
                            branchWrapper.className = `mindmap-branch-wrapper group/micro${leafClass}`;
                            const branchAnchor = document.createElement('div');
                            branchAnchor.className = 'mindmap-branch-anchor';
                            const microRootWrapper = document.createElement('div');
                            microRootWrapper.className = 'mindmap-root-wrapper mindmap-branch-anchor-target';
                            const microNode = document.createElement('div');
                            microNode.className = MINDMAP_MICRO_NODE_CLASS;
                            microNode.innerHTML = `<i class="fa-solid fa-tag mr-1.5 opacity-60"></i><span>${microKey}</span>`;
                            const microConnector = document.createElement('div');
                            microConnector.className = 'mindmap-connector-main transition-all duration-300 group-hover/micro:bg-[#8a3324]';
                            microRootWrapper.appendChild(microNode); microRootWrapper.appendChild(microConnector); branchAnchor.appendChild(microRootWrapper);
                            const microChildrenWrapper = document.createElement('div');
                            microChildrenWrapper.className = `mindmap-children mindmap-children--category-leaves${leafClass}`;
                            items.forEach(item => microChildrenWrapper.appendChild(createLeafNode(item, `${item.book} · ${item.lesson}`, { displayMacro: macroKey, displayCategory: microKey })));
                            branchWrapper.appendChild(branchAnchor); branchWrapper.appendChild(microChildrenWrapper); childrenWrapper.appendChild(branchWrapper);
                        });
                        rowDiv.appendChild(rootWrapper); rowDiv.appendChild(childrenWrapper); blockContent.appendChild(rowDiv);
                    });
                    blockWrapper.appendChild(blockContent);
                    container.appendChild(blockWrapper);
                });
            } else {
                specialFamilies.forEach(({ familyKey, groups }) => {
                    const isExpanded = !!expandedSpecialGroups[familyKey];
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'mindmap-row group/macro mb-3 sm:mb-5 last:mb-0';
                    const rootWrapper = document.createElement('div');
                    rootWrapper.className = `mindmap-root-wrapper${isExpanded ? '' : ' mindmap-root-wrapper--flush'}`;
                    const rootNode = document.createElement('div');
                    rootNode.className = MINDMAP_ROOT_NODE_CLASS;
                    rootNode.innerHTML = `<div class="flex items-center gap-1.5 min-w-0"><i class="fa-solid fa-puzzle-piece opacity-80 shrink-0"></i><span class="truncate">${familyKey}</span></div><i class="fa-solid fa-chevron-down text-[10px] sm:text-xs opacity-80 transition-transform duration-300 ml-2 ${isExpanded ? '' : '-rotate-90'}"></i>`;
                    const connector = document.createElement('div');
                    connector.className = `mindmap-connector-main transition-all duration-300 group-hover/macro:bg-[#8a3324] ${isExpanded ? '' : 'opacity-0 w-0 sm:w-0'}`;
                    rootNode.onclick = () => {
                        if (expandedSpecialGroups[familyKey]) delete expandedSpecialGroups[familyKey];
                        else expandedSpecialGroups[familyKey] = true;
                        renderDirectory();
                    };
                    rootWrapper.appendChild(rootNode);
                    rootWrapper.appendChild(connector);

                    const childrenWrapper = document.createElement('div');
                    const familyChildClass = groups.length === 1 ? ' single-child' : '';
                    childrenWrapper.className = `mindmap-children mindmap-children--category${familyChildClass} transition-all duration-300 origin-left ${isExpanded ? 'opacity-100 scale-x-100' : 'hidden opacity-0 scale-x-0'}`;

                    groups.forEach(({ groupKey, items }) => {
                        const branchWrapper = document.createElement('div');
                        const leafClass = items.length === 1 ? ' single-child' : '';
                        branchWrapper.className = `mindmap-branch-wrapper group/micro${leafClass}`;

                        const branchAnchor = document.createElement('div');
                        branchAnchor.className = 'mindmap-branch-anchor';
                        const microRootWrapper = document.createElement('div');
                        microRootWrapper.className = 'mindmap-root-wrapper mindmap-branch-anchor-target';
                        const microNode = document.createElement('div');
                        microNode.className = MINDMAP_MICRO_NODE_CLASS;
                        microNode.innerHTML = `<i class="fa-solid fa-tag mr-1.5 opacity-60"></i><span>${groupKey}</span>`;
                        const microConnector = document.createElement('div');
                        microConnector.className = 'mindmap-connector-main transition-all duration-300 group-hover/micro:bg-[#8a3324]';
                        microRootWrapper.appendChild(microNode);
                        microRootWrapper.appendChild(microConnector);
                        branchAnchor.appendChild(microRootWrapper);

                        const microChildrenWrapper = document.createElement('div');
                        microChildrenWrapper.className = `mindmap-children mindmap-children--category-leaves${leafClass}`;
                        items.forEach(item => microChildrenWrapper.appendChild(createLeafNode(item, `${item.book} · ${item.lesson}`, { specialFamily: familyKey, specialCategory: groupKey })));

                        branchWrapper.appendChild(branchAnchor);
                        branchWrapper.appendChild(microChildrenWrapper);
                        childrenWrapper.appendChild(branchWrapper);
                    });

                    rowDiv.appendChild(rootWrapper);
                    rowDiv.appendChild(childrenWrapper);
                    container.appendChild(rowDiv);
                });
            }
            queueMindmapSync();
        }


        // ==================== 弹窗(Modal)逻辑 ====================
        const modal = document.getElementById('grammar-modal');
        const modalInner = modal.querySelector('div');
        const MODAL_TAG_BUTTON_CLASS = "text-[10px] sm:text-xs bg-white hover:bg-[#e5e5e0] text-[#555552] hover:text-[#2c2c2a] font-bold px-2 py-1 sm:px-3 sm:py-1.5 rounded-md sm:rounded-lg border border-[#d4d4d0] shadow-sm transition-all hover:-translate-y-0.5";
        const MODAL_TAG_BUTTON_DISABLED_CLASS = "text-[10px] sm:text-xs bg-[#f3f3ef] text-[#b1b1ab] font-bold px-2 py-1 sm:px-3 sm:py-1.5 rounded-md sm:rounded-lg border border-[#e5e5e0] shadow-sm cursor-not-allowed";

        function transitionModalTo(targetId, displayContext = null) {
            openModal(targetId, displayContext ?? currentModalDisplayContext);
        }

        function renderLessonPager(grammar, hostContainer) {
            if (!hostContainer) return;

            const pagerContainer = document.createElement('div');
            pagerContainer.className = "flex flex-wrap gap-1.5 sm:gap-2 ml-auto";
            const navigationItems = currentModalNavigationItems.length
                ? currentModalNavigationItems
                : resolveModalNavigationItems(grammar, currentModalDisplayContext);
            const currentIndex = navigationItems.findIndex(item => item.id === grammar.id);
            const prevItem = currentIndex > 0 ? navigationItems[currentIndex - 1] : null;
            const nextItem = currentIndex >= 0 && currentIndex < navigationItems.length - 1 ? navigationItems[currentIndex + 1] : null;

            [
                { label: '上一条', icon: 'fa-chevron-left', target: prevItem },
                { label: '下一条', icon: 'fa-chevron-right', target: nextItem }
            ].forEach(({ label, icon, target }) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = target ? MODAL_TAG_BUTTON_CLASS : MODAL_TAG_BUTTON_DISABLED_CLASS;
                button.innerHTML = `<i class="fa-solid ${icon} mr-1 opacity-70"></i> ${label}`;
                button.disabled = !target;

                if (target) {
                    button.onclick = (e) => {
                        e.stopPropagation();
                        transitionModalTo(target.id, currentModalDisplayContext);
                    };
                }

                pagerContainer.appendChild(button);
            });

            hostContainer.appendChild(pagerContainer);
        }

        function openModal(id, displayContext = null) {
            const grammar = grammarData.find(g => g.id === id);
            if (!grammar) return;

            const resolvedDisplayContext = resolveDisplayContextForGrammar(grammar, displayContext);
            currentModalDisplayContext = resolvedDisplayContext;
            currentModalNavigationItems = resolveModalNavigationItems(grammar, resolvedDisplayContext);

            document.getElementById('modal-meta').innerText = formatModalMeta(grammar, resolvedDisplayContext);
            document.getElementById('modal-title').innerText = grammar.point;
            document.getElementById('modal-connection').innerHTML = grammar.connection;
            document.getElementById('modal-meaning').innerText = grammar.meaning;
            document.getElementById('modal-explanation').innerHTML = grammar.explanation;

            const exContainer = document.getElementById('modal-example');
            exContainer.innerHTML = `
                <div>
                    <p class="text-[#2c2c2a] font-serif-jp font-bold text-[15px] sm:text-base mb-1.5 leading-relaxed tracking-wide">${grammar.example.jp}</p>
                    <p class="text-[#8a8a85] text-xs sm:text-sm leading-relaxed">${grammar.example.cn}</p>
                </div>
            `;

            const similarContainer = document.getElementById('modal-similar');
            similarContainer.innerHTML = '';
            
            if (grammar.similarGrammar && grammar.similarGrammar.length > 0) {
                grammar.similarGrammar.forEach(simId => {
                    const simGrammar = grammarData.find(g => g.id === simId);
                    if (simGrammar) {
                        const btn = document.createElement('button');
                        btn.className = MODAL_TAG_BUTTON_CLASS;
                        btn.innerHTML = `<i class="fa-solid fa-link mr-1 opacity-70"></i> ${simGrammar.point}`;
                        btn.onclick = (e) => {
                            e.stopPropagation();
                            transitionModalTo(simId, resolveDisplayContextForGrammar(simGrammar, resolvedDisplayContext));
                        };
                        similarContainer.appendChild(btn);
                    }
                });
            } else {
                similarContainer.innerHTML = '<span class="text-[10px] sm:text-xs text-[#8a8a85] mt-1 sm:mt-1.5 italic">暂无相关近似语法</span>';
            }

            renderLessonPager(grammar, similarContainer);

            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modalInner.classList.remove('scale-95');
                }, 10);
            }
        }

        function closeModal(e) {
            if (!e || e.target === modal || e.currentTarget.tagName === 'BUTTON') {
                modal.classList.add('opacity-0');
                modalInner.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            }
        }

        function openModalFromCard() {
            if(flashcards[currentCardIndex]) {
                openModal(flashcards[currentCardIndex].id);
            }
        }

        // ==================== 自检卡片模式与逻辑 ====================
        
        function startFlashcard(mode) {
            const filteredCards = getFilteredFlashcards();
            if (!filteredCards.length) return;
            flashcards = [...filteredCards];
            flashcardMode = mode;
            document.getElementById('flashcard-intro').classList.add('hidden');
            document.getElementById('flashcard-main').classList.remove('hidden');
            document.getElementById('flashcard-main').classList.add('flex');
            enableFlashcardSwipe();
            shuffleCards();
        }

        function resetFlashcardMode() {
            clearFlashcardAutoAdvanceTimer();
            disableFlashcardSwipe();
            flashcardMode = null;
            currentCardIndex = 0;
            document.getElementById('flashcard-main').classList.add('hidden');
            document.getElementById('flashcard-main').classList.remove('flex');
            document.getElementById('flashcard-intro').classList.remove('hidden');
            isCardFlipped = false;
            document.getElementById('flashcard-inner').classList.remove('rotate-y-180');
            updateCurrentFlashcardTagActions(null);
            renderFlashcardTagFilters();
            updateFlashcardModeButtons();
        }


        function flipCard() {
            if (suppressNextFlipClick) {
                suppressNextFlipClick = false;
                return;
            }
            const cardInner = document.getElementById('flashcard-inner');
            isCardFlipped = !isCardFlipped;
            if (isCardFlipped) {
                cardInner.classList.add('rotate-y-180');
            } else {
                cardInner.classList.remove('rotate-y-180');
            }
        }

        function updateCardUI() {
            clearFlashcardAutoAdvanceTimer();
            const currentData = flashcards[currentCardIndex];
            if (!currentData) {
                document.getElementById('card-counter').innerText = '0 / 0';
                updateCurrentFlashcardTagActions(null);
                return;
            }
            
            const frontHeaderText = document.getElementById('card-front-header-text');
            const frontText = document.getElementById('card-front-text');
            const frontKanaContainer = document.getElementById('card-front-kana-container');
            const frontKana = document.getElementById('card-front-kana');
            const frontKeyword = document.getElementById('card-front-keyword');
            
            const backHeaderText = document.getElementById('card-back-header-text');
            const backTitle = document.getElementById('card-back-title');
            
            const backContentArea = document.getElementById('card-back-content-area');
            backContentArea.innerHTML = '';

            if (flashcardMode === 'meaning-to-grammar') {
                frontHeaderText.innerHTML = `<i class="fa-solid fa-lightbulb mr-1"></i>提示：首假名`;
                frontText.innerText = currentData.meaning;
                frontText.className = "text-lg sm:text-2xl text-[#2c2c2a] leading-relaxed px-2 sm:px-4 mt-3 sm:mt-4";
                
                frontKanaContainer.classList.remove('hidden');
                frontKana.innerText = currentData.firstKana;
                
                frontKeyword.classList.remove('hidden');
                frontKeyword.innerText = currentData.keyword;
                
                backHeaderText.innerText = "Target Grammar";
                backTitle.innerText = currentData.point;
                backTitle.className = "text-2xl sm:text-3xl font-extrabold text-[#2c2c2a] font-serif-jp px-2";

                backContentArea.innerHTML = `
                    <div class="mb-4">
                        <span class="inline-block bg-[#2c2c2a] text-white px-2 py-0.5 rounded-sm text-[10px] sm:text-xs font-bold tracking-widest mb-1.5">接续</span>
                        <p class="text-xs sm:text-sm text-[#2c2c2a] leading-relaxed">${currentData.connection}</p>
                    </div>
                    <div class="mb-1 border-t border-[#e5e5e0] pt-4">
                        <span class="inline-block bg-[#2c2c2a] text-white px-2 py-0.5 rounded-sm text-[10px] sm:text-xs font-bold tracking-widest mb-1.5">解说</span>
                        <p class="text-xs sm:text-sm text-[#555552] leading-relaxed">${currentData.explanation}</p>
                    </div>
                    <div class="mb-1 border-t border-[#e5e5e0] pt-4">
                        <span class="inline-block bg-[#2c2c2a] text-white px-2 py-0.5 rounded-sm text-[10px] sm:text-xs font-bold tracking-widest mb-1.5">例句</span>
                        <p class="text-[#2c2c2a] font-serif-jp font-bold text-[13px] sm:text-sm leading-relaxed">${currentData.example.jp}</p>
                        <p class="text-[#8a8a85] text-[11px] sm:text-xs leading-relaxed mt-1.5">${currentData.example.cn}</p>
                    </div>
                `;

            } else { // 'grammar-to-meaning'
                frontHeaderText.innerHTML = `<i class="fa-solid fa-mouse-pointer mr-1"></i>请回忆这个语法的含义与接续`;
                frontText.innerText = currentData.point;
                frontText.className = "text-2xl sm:text-3xl font-extrabold text-[#2c2c2a] font-serif-jp px-2 sm:px-4 mt-6 mb-2";
                
                frontKanaContainer.classList.add('hidden');
                frontKeyword.classList.add('hidden');
                
                backHeaderText.innerText = "含义与接续";
                backTitle.innerText = currentData.meaning;
                backTitle.className = "text-xl sm:text-2xl text-[#2c2c2a] px-2";

                backContentArea.innerHTML = `
                    <div class="mb-4 pt-2">
                        <span class="inline-block bg-[#2c2c2a] text-white px-2 py-0.5 rounded-sm text-[10px] sm:text-xs font-bold tracking-widest mb-1.5">接续</span>
                        <p class="text-xs sm:text-sm text-[#2c2c2a] leading-relaxed">${currentData.connection}</p>
                    </div>
                    <div class="mb-1 border-t border-[#e5e5e0] pt-4">
                        <span class="inline-block bg-[#2c2c2a] text-white px-2 py-0.5 rounded-sm text-[10px] sm:text-xs font-bold tracking-widest mb-1.5">解说</span>
                        <p class="text-xs sm:text-sm text-[#555552] leading-relaxed">${currentData.explanation}</p>
                    </div>
                    <div class="mb-1 border-t border-[#e5e5e0] pt-4">
                        <span class="inline-block bg-[#2c2c2a] text-white px-2 py-0.5 rounded-sm text-[10px] sm:text-xs font-bold tracking-widest mb-1.5">例句</span>
                        <p class="text-[#2c2c2a] font-serif-jp font-bold text-[13px] sm:text-sm leading-relaxed">${currentData.example.jp}</p>
                        <p class="text-[#8a8a85] text-[11px] sm:text-xs leading-relaxed mt-1.5">${currentData.example.cn}</p>
                    </div>
                `;
            }

            document.getElementById('card-counter').innerText = `${currentCardIndex + 1} / ${flashcards.length}`;
            updateCurrentFlashcardTagActions(currentData.id);
            
            const cardInner = document.getElementById('flashcard-inner');
            isCardFlipped = false;
            cardInner.classList.remove('rotate-y-180');
        }

        function nextCard() {
            if (currentCardIndex < flashcards.length - 1) {
                currentCardIndex++;
            } else {
                currentCardIndex = 0;
            }
            updateCardUI();
        }

        function prevCard() {
            if (currentCardIndex > 0) {
                currentCardIndex--;
            } else {
                currentCardIndex = flashcards.length - 1;
            }
            updateCardUI();
        }

        function shuffleCards() {
            if (!flashcards.length) {
                currentCardIndex = 0;
                updateCardUI();
                return;
            }

            for (let i = flashcards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [flashcards[i], flashcards[j]] = [flashcards[j], flashcards[i]];
            }
            currentCardIndex = 0;
            updateCardUI();
            
            const icon = document.querySelector('.fa-shuffle');
            icon.classList.add('animate-spin');
            setTimeout(() => icon.classList.remove('animate-spin'), 500);
        }

        window.bindHierarchicalBack({
            selector: "[data-back-nav]",
            fallback: "index.html"
        });
    </script>
</body>
</html>
