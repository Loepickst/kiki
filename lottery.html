<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日运势抽奖 & 图鉴</title>
    <style>
        :root {
            --bg-color: #fdfaf5;
            --text-color: #2c2c2c;
            --accent-color: #b33e3e;
            --card-bg: #ffffff;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        body {
            font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 15px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(253, 250, 245, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .back-btn {
            position: absolute;
            left: 20px;
            text-decoration: none;
            color: var(--text-color);
            font-size: 16px;
            font-weight: bold;
            opacity: 0.7;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        .back-btn:hover { opacity: 1; }

        .collection-btn {
            position: absolute;
            right: 20px;
            background: none;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .collection-btn:hover {
            background: var(--accent-color);
            color: white;
        }

        h1 { margin: 0; font-size: 18px; font-weight: 700; }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        .omikuji-box {
            width: 200px;
            height: 300px;
            background-color: #d32f2f;
            border-radius: 10px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(211, 47, 47, 0.3);
            transition: transform 0.2s;
            margin-bottom: 30px;
        }
        .omikuji-box:active { transform: scale(0.98); }
        .omikuji-box::before {
            content: "おみくじ";
            font-size: 32px;
            font-weight: bold;
            color: white;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 10px;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 20px 10px;
        }
        .omikuji-box.shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .result-card {
            display: none;
            width: 300px;
            /* Height auto to fit content */
            background: white;
            border-radius: 16px;
            border: 8px solid #333; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 0;
            margin-bottom: 30px;
        }

        .rarity-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #e6b422;
            color: #fff;
            padding: 4px 10px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .new-badge {
            position: absolute;
            top: 50px;
            left: 5px;
            background: #ff1744;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 12px;
            box-shadow: 0 4px 10px rgba(255, 23, 68, 0.5);
            animation: popBounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
            animation-delay: 0.3s;
            display: none;
            z-index: 12;
            transform: rotate(-15deg);
        }

        @keyframes popBounce {
            0% { transform: scale(0); }
            100% { transform: scale(1) rotate(15deg); }
        }

        .result-inner {
            width: 100%;
            position: relative;
        }

        .result-header { display: none; }

        .result-title {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 10;
            font-family: "Yu Mincho", serif;
            border: 2px solid currentColor;
        }

        .result-icon {
            width: 100%;
            height: 320px;
            background-color: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .icon-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .result-desc-container { 
            padding: 15px 20px; 
            background: white; 
            border-top: 1px solid #eee;
            display: block; 
        }
        .result-desc { font-size: 15px; color: #555; line-height: 1.6; margin: 0; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .count-info { margin-top: 40px; font-size: 14px; color: #888; background: rgba(0,0,0,0.03); padding: 8px 16px; border-radius: 20px; }
        
        button.action-btn { background-color: var(--accent-color); color: white; border: none; padding: 12px 30px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(179, 62, 62, 0.3); }
        button.action-btn:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-content {
            background: var(--bg-color);
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow-y: auto;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(0,0,0,0.05);
            padding-bottom: 10px;
        }
        .modal-header h2 { margin: 0; font-size: 18px; color: var(--text-color); }
        .close-btn { font-size: 24px; cursor: pointer; color: #888; }
        .close-btn:hover { color: var(--accent-color); }

        .collection-stats {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            text-align: right;
        }

        /* 修改后的容器样式，不再直接作为 grid */
        .collection-grid {
            display: block;
        }

        /* 新增的分组样式 */
        .rarity-section {
            margin-bottom: 25px;
        }

        .rarity-title {
            font-size: 16px;
            font-weight: bold;
            color: #555;
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        
        .rarity-badge-small {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            color: white;
            font-size: 12px;
            margin-right: 8px;
            min-width: 30px;
            text-align: center;
        }

        .rarity-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .collection-item {
            background: white;
            border-radius: 10px;
            padding: 15px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: var(--shadow);
            border: 2px solid transparent;
            position: relative;
            transition: transform 0.2s;
        }
        .collection-item:hover { transform: translateY(-3px); }

        /* ---------------------------------------------------
           修改后的图鉴图片样式
        --------------------------------------------------- */
        .collection-item .item-icon { 
            width: 40px; 
            height: 40px; 
            margin-bottom: 5px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .collection-icon-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: filter 0.3s, opacity 0.3s;
        }
        /* --------------------------------------------------- */

        .collection-item .item-title { font-weight: bold; font-size: 16px; font-family: "Yu Mincho", serif;}
        .collection-item .item-rarity { font-size: 12px; font-weight: bold; margin-top: 5px; padding: 2px 6px; border-radius: 4px;}

        .collection-item.locked {
            background: #f0f0f0;
            border-color: #ddd !important;
        }
        
        /* ---------------------------------------------------
           未解锁状态下的图片变灰
        --------------------------------------------------- */
        .collection-item.locked .collection-icon-img { 
            filter: grayscale(100%); 
            opacity: 0.3; 
        }
        /* --------------------------------------------------- */
        
        .collection-item.locked .item-title { color: #aaa; }
        .collection-item.locked .item-rarity { background: #ccc !important; color: #666 !important; }

    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">← Home</a>
        <h1>每日运势</h1>
        <button class="collection-btn" id="openCollectionBtn">📖 图鉴</button>
    </header>

    <div class="container">
        <div class="omikuji-box" id="omikujiBox"></div>

        <div class="result-card" id="resultCard">
            <div class="rarity-badge" id="rarityBadge">SSR</div>
            <div class="new-badge" id="newBadge">NEW!</div>
            <div class="result-inner" id="resultInner">
                <div class="result-icon" id="resultIcon"></div>
                <div class="result-title" id="resultTitle">大吉</div>
            </div>
            <div class="result-desc-container" id="resultDescBox">
                <div class="result-desc" id="resultDesc">今天的学习效率会非常高！</div>
            </div>
        </div>

        <div class="count-info">
            今日剩余次数：<span id="remainCount">3</span> / 3
        </div>
        
        <button class="action-btn" id="drawBtn">抽签 (Start)</button>
    </div>

    <div class="modal-overlay" id="collectionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>御神签图鉴 (コレクション)</h2>
                <span class="close-btn" id="closeCollectionBtn">&times;</span>
            </div>
            <div class="collection-stats" id="collectionStats">收集进度：0 / 11</div>
            <div class="collection-grid" id="collectionGrid">
                </div>
        </div>
    </div>

    <script>
        const MAX_DAILY_COUNT = 3;
        
        // ---------------------------------------------------
        //  修改后的数据：保留 weight 用于同级内的权重分配
        //  同时修正了部分图片路径以匹配现有文件
        // ---------------------------------------------------
        const fortunes = [
            // KR 级别 (最高级)
            { id: "f1", rarity: "KR", title: "旺吉", desc: "🎉你就是最帅（美）的气运之子🎉！kiki祝福你，旺！", weight: 2, color: "#000000", icon: "takarakuji/wangji.png" },
            { id: "f19", rarity: "KR", title: "乐吉", desc: "喝上一口肥宅水，快乐一整天！", weight: 8, color: "#000000", icon: "takarakuji/keleji.png" },

            // UR 级别 (极稀有)
            { id: "f8", rarity: "UR", title: "神吉", desc: "⛩️考神附体！今天直觉准得可怕，做阅读题一抓一个准，就算蒙的也全对！", weight: 1, color: "#d4af37", icon: "takarakuji/shenji.png" },
            { id: "f7", rarity: "UR", title: "玉吉", desc: "一尾便是一重境界。熬过漫长的沉淀与枯燥的练习，终能修得灵动的语感。", weight: 3, color: "#F44336", icon: "takarakuji/huji.png" },
            { id: "f16", rarity: "UR", title: "鹿吉", desc: "步履从容，一步一印，语感自然如影随形。", weight: 1, color: "#e6b422", icon: "takarakuji/luji2.png" },
            
            // SSR 级别 (稀有)
            { id: "f2", rarity: "SSR", title: "虎吉", desc: "运气爆棚！干什么都是如虎添翼，チョロいもんだぜ！", weight: 5, color: "#d32f2f", icon: "takarakuji/huyan.png" },
            { id: "f9", rarity: "SSR", title: "猫吉", desc: "明确内心，不被外界所迷惑，直取自己的“目标”，走最优雅的“猫步”。", weight: 5, color: "#ec407a", icon: "takarakuji/maoji2.png" },
            { id: "f12", rarity: "SSR", title: "鸽吉", desc: "咕咕咕，咕咕咕咕咕咕咕，咕咕？咕！", weight: 3, color: "#d32f2f", icon: "takarakuji/geji.png" }, // 鸽子比较稀有，权重设低点
            { id: "f13", rarity: "SSR", title: "蛇吉", desc: "褪下“舒适”的旧壳，灵动的语感方能重获新生。", weight: 5, color: "#ec407a", icon: "takarakuji/sheji.png" },
            { id: "f20", rarity: "SSR", title: "憨吉", desc: "狗狗我啊，今天，是指定不行了。（不行！）", weight: 4, color: "#1976d2", icon: "takarakuji/cheemsji.png" },
            
            // SR 级别 (中等)
            { id: "f10", rarity: "SR", title: "蝴吉", desc: "飞舞的思绪！如蝶一般，“漂亮”的拿下今天的知识吧。", weight: 10, color: "#00897b", icon: "takarakuji/chongji.png" },
            { id: "f3", rarity: "SR", title: "猴吉", desc: "做不了真“大圣”，也能拥有“大圣”心，先得敢想，才能真成！", weight: 10, color: "#388e3c", icon: "takarakuji/houji.png" },
            { id: "f6", rarity: "SR", title: "熊吉", desc: "学饿了就吃点，吃饱了就休息，那学习呢？学习就明天再说吧。", weight: 10, color: "#7b1fa2", icon: "takarakuji/xiongji.png" },
            { id: "f14", rarity: "SR", title: "燕吉", desc: "每天只衔一个词，日积月累，也能筑起坚不可摧的语言之巢。", weight: 10, color: "#7b1fa2", icon: "takarakuji/yanji.png" },
            { id: "f17", rarity: "SR", title: "牛吉", desc: "纵使当下如对牛弹琴般不得要领，耐下性子温故知新，笨功夫自有回响。", weight: 10, color: "#546e7a", icon: "takarakuji/niuji.png" },
            
            // R 级别 (普通)
            { id: "f5", rarity: "R", title: "犬吉", desc: "温故而知新。比起新内容，今天更适合把之前的错题翻出来‘叙叙旧’哦！", weight: 30, color: "#f57c00", icon: "takarakuji/quanji.png" },
            { id: "f4", rarity: "R", title: "鼠吉", desc: "一点一滴地搬运，终能囤满语言的粮仓。", weight: 30, color: "#1976d2", icon: "takarakuji/shuji.png" },
            { id: "f11", rarity: "R", title: "狐吉", desc: "🍵普普通通、平平淡淡的一天。按部就班地背单词吧，没有波澜也是一种幸福。", weight: 30, color: "#8d6e63", icon: "takarakuji/pingji.png" },
            { id: "f15", rarity: "R", title: "龟吉", desc: "要想“快”，先得“慢”，只有学会了放平心态去细细打磨，“快”便会自然出现。", weight: 30, color: "#8d6e63", icon: "takarakuji/guiji.png" },
            { id: "f18", rarity: "R", title: "鼬吉", desc: "思维若如鼬般柔软，再凶狠的学习障碍，也能轻盈越过。", weight: 30, color: "#8d6e63", icon: "takarakuji/youji.png" }
        ];

        const omikujiBox = document.getElementById('omikujiBox');
        const resultCard = document.getElementById('resultCard');
        const resultInner = document.getElementById('resultInner');
        const resultTitle = document.getElementById('resultTitle');
        const resultIcon = document.getElementById('resultIcon');
        const rarityBadge = document.getElementById('rarityBadge');
        const newBadge = document.getElementById('newBadge');
        const resultDescBox = document.getElementById('resultDescBox');
        const resultDesc = document.getElementById('resultDesc');
        const drawBtn = document.getElementById('drawBtn');
        const remainCountSpan = document.getElementById('remainCount');
        
        const collectionModal = document.getElementById('collectionModal');
        const openCollectionBtn = document.getElementById('openCollectionBtn');
        const closeCollectionBtn = document.getElementById('closeCollectionBtn');
        const collectionGrid = document.getElementById('collectionGrid');
        const collectionStats = document.getElementById('collectionStats');

        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function getDailyState() {
            const today = getTodayString();
            const stored = localStorage.getItem('lotteryState_v2');
            if (stored) {
                const state = JSON.parse(stored);
                if (state.date === today) return state;
            }
            return { date: today, count: 0 };
        }

        function saveDailyState(count) {
            localStorage.setItem('lotteryState_v2', JSON.stringify({ date: getTodayString(), count: count }));
        }

        function getCollection() {
            return JSON.parse(localStorage.getItem('omikujiCollection')) || [];
        }

        function saveToCollection(id) {
            let col = getCollection();
            if (!col.includes(id)) {
                col.push(id);
                localStorage.setItem('omikujiCollection', JSON.stringify(col));
                return true; 
            }
            return false; 
        }

        function renderCollection() {
            const col = getCollection();
            collectionGrid.innerHTML = '';
            
            // 定义稀有度顺序和颜色映射
            const rarityOrder = ['KR', 'UR', 'SSR', 'SR', 'R'];
            const rarityColors = {
                'KR': '#000000',
                'UR': '#d4af37',
                'SSR': '#d32f2f',
                'SR': '#00897b',
                'R': '#f57c00'
            };

            rarityOrder.forEach(rarity => {
                const items = fortunes.filter(f => f.rarity === rarity);
                if (items.length === 0) return;

                // 创建分组容器
                const section = document.createElement('div');
                section.className = 'rarity-section';

                // 创建标题
                const title = document.createElement('div');
                title.className = 'rarity-title';
                const unlockedInRarity = items.filter(i => col.includes(i.id)).length;
                title.innerHTML = `<span class="rarity-badge-small" style="background:${rarityColors[rarity] || '#ccc'}">${rarity}</span> 收集进度: ${unlockedInRarity}/${items.length}`;
                section.appendChild(title);

                // 创建网格
                const grid = document.createElement('div');
                grid.className = 'rarity-grid';

                items.forEach(f => {
                    const isUnlocked = col.includes(f.id);
                    const div = document.createElement('div');
                    div.className = `collection-item ${isUnlocked ? '' : 'locked'}`;
                    if(isUnlocked) div.style.borderColor = f.color;
                    
                    div.innerHTML = `
                        <div class="item-icon">
                            <img src="${f.icon}" alt="${f.title}" class="collection-icon-img">
                        </div>
                        <div class="item-title">${isUnlocked ? f.title : '???'}</div>
                        <div class="item-rarity" style="background: ${f.color}; color: white;">${f.rarity}</div>
                    `;
                    grid.appendChild(div);
                });

                section.appendChild(grid);
                collectionGrid.appendChild(section);
            });

            collectionStats.textContent = `总收集进度：${col.length} / ${fortunes.length}`;
        }

        openCollectionBtn.addEventListener('click', () => {
            renderCollection();
            collectionModal.classList.add('active');
        });
        closeCollectionBtn.addEventListener('click', () => collectionModal.classList.remove('active'));
        collectionModal.addEventListener('click', (e) => {
            if(e.target === collectionModal) collectionModal.classList.remove('active');
        });

        function drawFortune() {
            // 定义各稀有度的概率 (总和必须为 100)
            const rarityRates = {
                "KR": 2,   // 2%
                "UR": 4,   // 4%
                "SSR": 15, // 15%
                "SR": 35,  // 35%
                "R": 44    // 45%
            };

            // 1. 按照概率决定稀有度
            const rand = Math.random() * 100;
            let cumulative = 0;
            let selectedRarity = "N"; // 默认兜底
            
            for (const rarity in rarityRates) {
                cumulative += rarityRates[rarity];
                if (rand < cumulative) {
                    selectedRarity = rarity;
                    break;
                }
            }

            // 2. 从选中的稀有度中，根据 weight 再次进行加权抽取
            const pool = fortunes.filter(f => f.rarity === selectedRarity);
            
            // 安全检查
            if (pool.length === 0) {
                console.warn(`No items found for rarity: ${selectedRarity}`);
                // 如果该稀有度下没有奖品，则全局随机兜底
                return fortunes[Math.floor(Math.random() * fortunes.length)];
            }

            // 计算该稀有度池子内的总权重
            const totalWeight = pool.reduce((sum, item) => sum + (item.weight || 1), 0);
            let randomWeight = Math.random() * totalWeight;

            for (const fortune of pool) {
                const w = fortune.weight || 1;
                if (randomWeight < w) {
                    return fortune;
                }
                randomWeight -= w;
            }

            // 理论上不会走到这里，除非 totalWeight 为 0
            return pool[0];
        }

        let currentState = getDailyState();
        let remain = MAX_DAILY_COUNT - currentState.count;
        remainCountSpan.textContent = remain;
        if (remain <= 0) {
            drawBtn.disabled = true;
            drawBtn.textContent = "明日再来";
            drawBtn.style.backgroundColor = "#ccc";
        }

        drawBtn.addEventListener('click', () => {
            if (remain <= 0) return;

            resultCard.style.display = 'none';
            if (resultDescBox) resultDescBox.style.display = 'none';
            newBadge.style.display = 'none'; 
            omikujiBox.style.display = 'flex'; 

            omikujiBox.classList.add('shake');
            drawBtn.disabled = true;

            setTimeout(() => {
                omikujiBox.classList.remove('shake');
                omikujiBox.style.display = 'none'; 
                
                const randomFortune = drawFortune();
                const isNew = saveToCollection(randomFortune.id);

                resultCard.style.borderColor = randomFortune.color;
                
                // Title styling (badge style)
                resultTitle.style.color = randomFortune.color;
                resultTitle.style.borderColor = randomFortune.color;
                
                rarityBadge.textContent = randomFortune.rarity;
                rarityBadge.style.background = randomFortune.color;

                resultTitle.textContent = randomFortune.title;

                // ---------------------------------------------------
                // 修改后的抽签结果显示逻辑：动态插入图片
                // ---------------------------------------------------
                if (resultIcon) {
                    resultIcon.innerHTML = `<img src="${randomFortune.icon}" alt="${randomFortune.title}" class="icon-img">`;
                }

                resultDesc.textContent = randomFortune.desc;
                
                currentState.count++;
                saveDailyState(currentState.count);
                remain = MAX_DAILY_COUNT - currentState.count;
                remainCountSpan.textContent = remain;

                resultCard.style.display = 'block';
                if (resultDescBox) resultDescBox.style.display = 'block';
                
                if(isNew) {
                    newBadge.style.display = 'flex';
                }

                if (remain > 0) {
                    drawBtn.disabled = false;
                } else {
                    drawBtn.textContent = "明日再来";
                    drawBtn.style.backgroundColor = "#ccc";
                }

            }, 1000); 
        });

        omikujiBox.addEventListener('click', () => {
            if (!drawBtn.disabled) drawBtn.click();
        });

    </script>
</body>
</html>
