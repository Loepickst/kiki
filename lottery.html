            const existing = meta[fortune.id];
            const variant = options.variant === 'foil' ? 'foil' : 'normal';
            const stage2 = fortune && fortune.hiddenStage2;
            const stage2UnlockCount = stage2 && stage2.icon
                ? Math.max(1, Number(stage2.unlockCount) || 10)
                : 0;
            const nextEntry = existing
                ? { ...existing }
                : {
                    count: 0,
                    variants: { normalCount: 0, foilCount: 0 },
                    preferredVariant: variant,
                    firstObtainedAt: now,
                    lastObtainedAt: now,
                    isNew: options.markNew !== false,
                    rarity: fortune.rarity,
                    title: fortune.title,
                    source: 'lottery'
                };

            const previousCount = Number(nextEntry.count || 0);
            const previousVariants = getCollectionVariantCounts(nextEntry, previousCount);
            const previousFoilCount = previousVariants.foilCount;
            nextEntry.count = previousCount + 1;
            nextEntry.variants = {
                normalCount: previousVariants.normalCount + (variant === 'normal' ? 1 : 0),
                foilCount: previousVariants.foilCount + (variant === 'foil' ? 1 : 0)
            };
            nextEntry.preferredVariant = variant === 'foil'
                ? 'foil'
                : (nextEntry.preferredVariant === 'foil' ? 'foil' : 'normal');
            nextEntry.lastObtainedAt = now;
            if (!existing) {
                nextEntry.firstObtainedAt = now;

            if (stage2 && stage2.icon) {
                if (nextEntry.count >= stage2UnlockCount && !Number(nextEntry.hiddenStage2UnlockedAt)) {
                    nextEntry.hiddenStage2UnlockedAt = now;

            }
            nextEntry.isNew = existing ? Boolean(existing.isNew) : options.markNew !== false;
            nextEntry.rarity = fortune.rarity;
            nextEntry.title = fortune.title;
            nextEntry.source = nextEntry.source || 'lottery';

            meta[fortune.id] = nextEntry;
            saveCollectionMeta(meta);
            saveCollection(getUnlockedIdsFromMeta(meta));
            if (options.updateLastObtained !== false) {
                saveLastObtained(fortune.id, now, variant);

            return {
                isNew: !existing,
                isDuplicate: Boolean(existing),
                isFoil: variant === 'foil',
                isNewFoil: variant === 'foil' && previousFoilCount === 0,
                variant,
                variantCount: variant === 'foil' ? nextEntry.variants.foilCount : nextEntry.variants.normalCount,

        function syncThemeRewardUnlocks(options = {}) {
            const meta = migrateLegacyCollectionIfNeeded();
            const rewards = [];
            themeSets.forEach((themeSet, index) => {
                if (themeSet.isPlaceholder) {
                    return;
                }
                const progress = omikujiCatalogApi && typeof omikujiCatalogApi.getThemeSetProgress === 'function'
                    ? omikujiCatalogApi.getThemeSetProgress(meta, themeSet.id)
                    : null;
                if (!progress || !progress.allCollected || progress.rewardUnlocked) {
                    return;
                }

                const rewardCard = omikujiCatalogApi && typeof omikujiCatalogApi.getFortuneById === 'function'
                    ? omikujiCatalogApi.getFortuneById(themeSet.rewardCardId)
                    : null;
                if (!rewardCard) {
                    return;
                }

                const rewardResult = grantFortune(rewardCard, {
                    markNew: options.markNew !== false,
                    updateLastObtained: options.updateLastObtained !== false,
                    obtainedAt: (Number(options.triggerAt) || Date.now()) + index + 1
                });
                rewards.push({
                    set: themeSet,
                    fortune: rewardCard,
                    result: rewardResult
                });
            });

            return rewards;
        }

        function getSpecialPoolState() {
            const parsed = safeParseJSON(localStorage.getItem(SPECIAL_POOL_KEY), null);
            if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) {
                return { totalDraws: 0, specialHit: false, followupDraws: 0, foodJourneyDraws: 0 };
            }
            const followupDraws = Math.max(
                0,
                Number.isFinite(Number(parsed.followupDraws))
                    ? Number(parsed.followupDraws)
                    : Number(parsed.foodJourneyDraws) || 0
            );
            return {
                totalDraws: Math.max(0, Number(parsed.totalDraws) || 0),
                specialHit: Boolean(parsed.specialHit),
                followupDraws,
                foodJourneyDraws: followupDraws
            };
        }

        function saveSpecialPoolState(state) {
            const followupDraws = Math.max(
                0,
                Number.isFinite(Number(state && state.followupDraws))
                    ? Number(state.followupDraws)
                    : Number(state && state.foodJourneyDraws) || 0
            );
            localStorage.setItem(SPECIAL_POOL_KEY, JSON.stringify({
                totalDraws: Math.max(0, Number(state && state.totalDraws) || 0),
                specialHit: Boolean(state && state.specialHit),
                followupDraws,
                foodJourneyDraws: followupDraws
            }));
        }

        function getBackupFileName(timestamp = Date.now()) {
            const d = new Date(timestamp);
            return `lottery-backup-${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}-${String(d.getHours()).padStart(2, '0')}${String(d.getMinutes()).padStart(2, '0')}${String(d.getSeconds()).padStart(2, '0')}.json`;
        }

        function buildLotteryBackupPayload() {
            const normalizedMeta = migrateLegacyCollectionIfNeeded();
            const exportedAt = Date.now();

            return {
                version: 3,
                exportedAt,
                source: 'lottery',
                data: {
                    omikujiCollection: getUnlockedIdsFromMeta(normalizedMeta),
                    omikujiCollectionMeta_v1: normalizedMeta,
                    omikujiLastObtained_v1: getLastObtained(),
                    lotteryState_v2: getDailyState(),
                    specialPoolState_v1: getSpecialPoolState(),
                    omikujiFoilState_v1: getFoilState(),
                    omikujiLimitedEventState_v1: getLimitedEventState()
                }
            };
        }

        function createLotteryBackupFile(payload) {
            const content = JSON.stringify(payload, null, 2);
            const fileName = getBackupFileName(payload.exportedAt);
            const blob = new Blob([content], { type: 'application/json' });
            const file = typeof File === 'function'
                ? new File([blob], fileName, { type: 'application/json' })
                : null;

            return { content, fileName, blob, file };
        }

        async function shareLotteryBackup(file) {
            if (!file || typeof navigator.share !== 'function') {
                return 'unsupported';
            }

            const shareData = { files: [file] };
            if (typeof navigator.canShare === 'function' && !navigator.canShare(shareData)) {
                return 'unsupported';
            }

            try {
                await navigator.share(shareData);
                return 'shared';
            } catch (error) {
                if (error && error.name === 'AbortError') {
                    return 'cancelled';
                }
                return 'failed';
            }
        }

        function downloadLotteryBackup(payload) {
            const { blob, fileName } = createLotteryBackupFile(payload);
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.download = fileName;
            document.body.appendChild(anchor);
            anchor.click();
            anchor.remove();
            window.setTimeout(() => URL.revokeObjectURL(url), 1200);
        }

        function promptImportLotteryBackup() {
            backupImportInput.value = '';
            backupImportInput.click();
        }

        function parseLotteryBackup(text) {
            try {
                return JSON.parse(text);
            } catch (error) {
                throw new Error('存档文件无法解析');
            }
        }

        function validateLotteryBackup(payload) {
            if (!payload || typeof payload !== 'object' || Array.isArray(payload)) {
                throw new Error('存档格式不正确');
            }

            if (![1, 2, 3].includes(Number(payload.version)) || payload.source !== 'lottery') {
                throw new Error('这不是可用的数据存档');
            }

            const data = payload.data;
            if (!data || typeof data !== 'object' || Array.isArray(data)) {
                throw new Error('存档内容缺失');
            }

            const requiredKeys = [
                COLLECTION_KEY,
                COLLECTION_META_KEY,
                LAST_OBTAINED_KEY,
                'lotteryState_v2',
                'specialPoolState_v1'
            ];

            for (const key of requiredKeys) {
                if (!(key in data)) {
                    throw new Error('存档内容不完整');
                }
            }

            if (!Array.isArray(data[COLLECTION_KEY])) {
                throw new Error('图鉴列表数据无效');
            }

            if (!data[COLLECTION_META_KEY] || typeof data[COLLECTION_META_KEY] !== 'object' || Array.isArray(data[COLLECTION_META_KEY])) {
                throw new Error('图鉴元数据无效');
            }

            if (data[LAST_OBTAINED_KEY] !== null && (typeof data[LAST_OBTAINED_KEY] !== 'object' || Array.isArray(data[LAST_OBTAINED_KEY]))) {
                throw new Error('最新获得数据无效');
            }

            if (!data.lotteryState_v2 || typeof data.lotteryState_v2 !== 'object' || Array.isArray(data.lotteryState_v2)) {
                throw new Error('每日开启记录无效');
            }

            if (!data.specialPoolState_v1 || typeof data.specialPoolState_v1 !== 'object' || Array.isArray(data.specialPoolState_v1)) {
                throw new Error('特殊奖励记录无效');
            }

            return {
                version: Number(payload.version) || 1,
                exportedAt: Number.isFinite(Number(payload.exportedAt)) ? Number(payload.exportedAt) : Date.now(),
                source: 'lottery',
                data: {
                    omikujiCollection: data[COLLECTION_KEY],
                    omikujiCollectionMeta_v1: data[COLLECTION_META_KEY],
                    omikujiLastObtained_v1: data[LAST_OBTAINED_KEY],
                    lotteryState_v2: data.lotteryState_v2,
                    specialPoolState_v1: data.specialPoolState_v1,
                    omikujiFoilState_v1: data[FOIL_STATE_KEY] && typeof data[FOIL_STATE_KEY] === 'object' && !Array.isArray(data[FOIL_STATE_KEY])
                        ? data[FOIL_STATE_KEY]
                        : { eligibleMisses: 0, lifetimeFoils: 0, lastFoilAt: null },
                    omikujiLimitedEventState_v1: data[LIMITED_EVENT_STATE_KEY] && typeof data[LIMITED_EVENT_STATE_KEY] === 'object' && !Array.isArray(data[LIMITED_EVENT_STATE_KEY])
                        ? data[LIMITED_EVENT_STATE_KEY]
                        : {}
                }
            };
        }

        function writeBackupStorageValue(key, value) {
            if (value === undefined) {
                return;
            }
            if (value === null) {
                localStorage.setItem(key, 'null');
                return;
            }
            localStorage.setItem(key, JSON.stringify(value));
        }

        function applyLotteryBackup(payload) {
            const mergedLimitedEventState = mergeLimitedEventStates(
                getLimitedEventState(),
                payload.data.omikujiLimitedEventState_v1
            );
            const mergedDailyState = mergeDailyStates(
                getDailyState(),
                payload.data.lotteryState_v2
            );
            writeBackupStorageValue(COLLECTION_KEY, payload.data.omikujiCollection);
            writeBackupStorageValue(COLLECTION_META_KEY, payload.data.omikujiCollectionMeta_v1);
            writeBackupStorageValue(LAST_OBTAINED_KEY, payload.data.omikujiLastObtained_v1);
            writeBackupStorageValue('lotteryState_v2', mergedDailyState);
            writeBackupStorageValue(SPECIAL_POOL_KEY, payload.data.specialPoolState_v1);
            writeBackupStorageValue(FOIL_STATE_KEY, payload.data.omikujiFoilState_v1);
            writeBackupStorageValue(LIMITED_EVENT_STATE_KEY, mergedLimitedEventState);
            migrateLegacyCollectionIfNeeded();
        }

        function setActionButtonLabel(desktopLabel, mobileLabel = desktopLabel) {
            drawBtn.innerHTML = `
                <span class="draw-label-desktop">${escapeHtml(desktopLabel)}</span>
                <span class="draw-label-mobile">${escapeHtml(mobileLabel)}</span>
            `;
        }

        function syncActionButtonState() {
            remain = Math.max(0, MAX_DAILY_COUNT - currentState.count);
            remainCountSpan.textContent = remain;

            if (isFoilRevealLocked) {
                drawBtn.disabled = true;
                return;
            }

            if (remain > 0) {
                drawBtn.disabled = false;
                setActionButtonLabel('抽签 Start', '抽签');
            } else {
                drawBtn.disabled = true;
                setActionButtonLabel('明日再来');
            }
        }

        function hideResultCard() {
            resultRenderToken += 1;
            window.clearTimeout(foilEvolutionTimer);
            window.clearTimeout(foilRevealTimer);
            foilEvolutionTimer = 0;
            foilRevealTimer = 0;
            isFoilRevealLocked = false;
            resultCard.style.display = 'none';
            resultCard.classList.remove('is-foil', 'is-foil-awakening');
            resultIcon.classList.remove('foil-awakening');
            resultCard.style.borderColor = '';
            resultDescBox.style.display = 'none';
            resultMeta.style.display = 'none';
            resultMeta.textContent = '';
            newBadge.classList.remove('is-foil-badge');
            newBadge.textContent = 'NEW!';
            newBadge.style.display = 'none';
        }

        function refreshLotteryUIAfterImport() {
            syncThemeRewardUnlocks({ markNew: false, updateLastObtained: false, triggerAt: Date.now() });
            currentState = getDailyState();
            syncActionButtonState();
            syncFoilEventDisplay();
            hideResultCard();
            omikujiContainer.style.display = 'flex';
            renderActiveModalPanel({ autoFocusLatest: currentModalTab === 'collection' });
        }

        function isUnlockedByFilter(filterMode, isUnlocked) {
            if (filterMode === 'unlocked') {
                return isUnlocked;
            }
            if (filterMode === 'locked') {
                return !isUnlocked;
            }
            return true;
        }

        function updateFilterButtons() {
            collectionFilterButtons.forEach((button) => {
                button.classList.toggle('active', button.dataset.collectionFilter === currentCollectionFilter);
            });
        }

        function updateModalTabs() {
            modalTabButtons.forEach((button) => {
                button.classList.toggle('active', button.dataset.modalTab === currentModalTab);
            });
            modalPanels.forEach((panel) => {
                panel.classList.toggle('active', panel.dataset.modalPanel === currentModalTab);
            });
        }

        function setModalTab(tabKey) {
            currentModalTab = tabKey;
            updateModalTabs();
            renderActiveModalPanel();
        }

        function renderPreview(fortune, requestedVariant = '') {
            const meta = migrateLegacyCollectionIfNeeded();
            const entry = meta[fortune.id] || null;
            const variants = getCollectionVariantCounts(entry, entry && entry.count);
            const hasFoil = variants.foilCount > 0;
            let activeVariant = requestedVariant === 'foil' || requestedVariant === 'normal'
                ? requestedVariant
                : getPreferredDisplayVariant(entry);
            if (activeVariant === 'foil' && !hasFoil) {
                activeVariant = 'normal';
            }
            if (activeVariant === 'normal' && variants.normalCount <= 0 && hasFoil) {
                activeVariant = 'foil';
            }
            const themeSet = fortune.themeSetId && omikujiCatalogApi && typeof omikujiCatalogApi.getThemeSetById === 'function'
                ? omikujiCatalogApi.getThemeSetById(fortune.themeSetId)
                : null;
            const displayFortune = getVariantDisplayFortune(fortune, entry, activeVariant);
            const isFoilDisplay = activeVariant === 'foil' && hasFoil;

            currentPreviewFortuneId = fortune.id;

            previewImage.src = displayFortune.icon;
            previewImage.alt = displayFortune.title;
            previewImage.onerror = () => {
                previewImage.onerror = null;
                previewImage.src = FALLBACK_IMAGE_URL;
            };
            const obtainedCount = entry ? entry.count : 0;
            previewTitle.innerHTML = `
                <span class="preview-title-main">${escapeHtml(displayFortune.title)}</span>
                <span class="preview-title-count">×${escapeHtml(obtainedCount)}</span>
            `;
            previewTitle.style.color = displayFortune.color;
            previewCard.classList.toggle('is-foil', isFoilDisplay);
            previewCard.style.borderColor = isFoilDisplay ? '' : displayFortune.color;
            previewRarityBadge.textContent = displayFortune.rarity;
            previewRarityBadge.style.background = rarityColors[displayFortune.rarity] || displayFortune.color;
            previewDesc.textContent = displayFortune.desc;

            previewVariantSwitch.hidden = !hasFoil;
            previewVariantButtons.forEach((button) => {
                const variant = button.dataset.previewVariant;
                button.classList.toggle('is-active', variant === activeVariant);
                button.disabled = variant === 'foil'
                    ? !hasFoil
                    : variants.normalCount <= 0;
            });

            const metaRows = [
                { label: '获得次数', value: `×${obtainedCount}` }
            ];

            if (hasFoil) {
                metaRows.push(
                    { label: '普通版本', value: `×${variants.normalCount}` },
                    { label: '闪卡版本', value: `×${variants.foilCount}` }
                );
            }

            if (themeSet) {
                metaRows.push({ label: '所属套组', value: themeSet.title });
            }
            const availabilityLabel = getAvailabilityLabel(fortune);
            if (availabilityLabel) {
                metaRows.push({ label: '限定规则', value: availabilityLabel });
            }

            previewMeta.innerHTML = metaRows.map((row) => `
                <div class="preview-meta-row">
                    <span>${escapeHtml(row.label)}</span>
                    <strong>${escapeHtml(row.value)}</strong>
                </div>
            `).join('');
        }

        function openPreview(fortune) {
            const normalizedFortune = omikujiCatalogApi && typeof omikujiCatalogApi.getFortuneById === 'function'
                ? omikujiCatalogApi.getFortuneById(fortune.id)
                : fortune;
            if (!normalizedFortune) {
                return;
            }
            const meta = migrateLegacyCollectionIfNeeded();
            const entry = meta[normalizedFortune.id] || null;
            if (!entry) {
                return;
            }

            const previewedNow = entry ? markFortunePreviewed(normalizedFortune.id) : false;
            renderPreview(normalizedFortune);

            if (previewedNow && collectionModal.classList.contains('active')) {
                renderActiveModalPanel({ preserveScroll: true });
            }

            previewOverlay.classList.add('active');
        }

        function renderCollection(options = {}) {
            const { preserveScroll = false, autoFocusLatest = false } = options;
            const previousScrollTop = preserveScroll ? collectionModalContent.scrollTop : 0;
            const meta = migrateLegacyCollectionIfNeeded();
            const unlockedIds = getUnlockedIdsFromMeta(meta);
            const lastObtained = getLastObtained();
            collectionGrid.innerHTML = '';
            updateFilterButtons();

            let hasVisibleItem = false;

            rarityOrder.forEach((rarity) => {
                const items = collectionCatalog.filter((fortune) => fortune.rarity === rarity);
                if (!items.length) {
                    return;
                }

                const filteredItems = items.filter((fortune) => {
                    const entry = meta[fortune.id];
                    const isUnlocked = Boolean(entry && entry.count > 0);
                    return isUnlockedByFilter(currentCollectionFilter, isUnlocked);
                });

                if (!filteredItems.length) {
                    return;
                }

                hasVisibleItem = true;
                const section = document.createElement('div');
                section.className = 'rarity-section';

                const title = document.createElement('div');
                title.className = 'rarity-title';
                const unlockedInRarity = items.filter((fortune) => {
                    const entry = meta[fortune.id];
                    return Boolean(entry && entry.count > 0);
                }).length;
                title.innerHTML = `<span class="rarity-badge-small" style="background:${rarityColors[rarity] || 'var(--accent)'}">${escapeHtml(getRarityLabel(rarity))}</span> 收集进度：${unlockedInRarity}/${items.length}`;
                section.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'rarity-grid';

                filteredItems.forEach((fortune) => {
                    const entry = meta[fortune.id];
                    const isUnlocked = Boolean(entry && entry.count > 0);
                    const variants = getCollectionVariantCounts(entry, entry && entry.count);
                    const hasFoil = isUnlocked && variants.foilCount > 0;
                    const displayVariant = getPreferredDisplayVariant(entry);
                    const isFoilDisplay = hasFoil && displayVariant === 'foil';
                    const displayFortune = getVariantDisplayFortune(fortune, entry, displayVariant);
                    const isLockedMr = fortune.rarity === 'MR' && !isUnlocked;
                    const availabilityLabel = getAvailabilityLabel(fortune);
                    const sourceLabel = availabilityLabel
                        ? `${getSourceLabel(fortune)} · ${availabilityLabel}`
                        : getSourceLabel(fortune);
                    const div = document.createElement('div');
                    div.className = `collection-item ${isUnlocked ? 'unlocked' : 'locked'}${isFoilDisplay ? ' is-foil' : ''}`;
                    div.dataset.fortuneId = fortune.id;
                    if (lastObtained && lastObtained.id === fortune.id) {
                        div.classList.add('latest-target');
                    }
                    if (isUnlocked && !isFoilDisplay) {
                        div.style.borderColor = fortune.color || 'var(--accent)';
                    }

                    div.innerHTML = `
                        <div class="item-source">${escapeHtml(sourceLabel)}</div>
                        ${isUnlocked && entry && entry.isNew ? '<div class="item-new-badge">新获得</div>' : ''}
                        ${isLockedMr
                            ? `<div class="item-icon mystery-icon">
                                <span class="collection-mystery-mark">謎</span>
                            </div>`
                            : `<div class="item-icon">
                                <img src="${escapeHtml(displayFortune.icon)}" alt="${escapeHtml(displayFortune.title)}" class="collection-icon-img">
                            </div>`}
                        <div class="item-title">${isUnlocked ? escapeHtml(displayFortune.title) : '???'}</div>
                        ${isUnlocked && entry ? `<div class="item-count">×${entry.count}</div>` : ''}
                        <div class="item-rarity" style="background:${escapeHtml(rarityColors[fortune.rarity] || fortune.color || 'var(--accent)')}">${escapeHtml(fortune.rarity)}</div>
                    `;

                    const itemImage = div.querySelector('.collection-icon-img');
                    if (itemImage) {
                        itemImage.addEventListener('error', () => {
                            itemImage.src = 'https://via.placeholder.com/40';
                        }, { once: true });
                    }

                    if (isUnlocked) {
                        div.addEventListener('click', () => openPreview(fortune));
                    }
                    grid.appendChild(div);
                });

                section.appendChild(grid);
                collectionGrid.appendChild(section);
            });

            if (!hasVisibleItem) {
                collectionGrid.innerHTML = '<div class="collection-empty">当前筛选下还没有对应卡片。</div>';
            }

            collectionStats.textContent = `总收集进度：${unlockedIds.length} / ${collectionCatalog.length}`;

            if (preserveScroll) {
                requestAnimationFrame(() => {
                    collectionModalContent.scrollTop = previousScrollTop;
                });
            } else if (autoFocusLatest) {
                requestAnimationFrame(() => {
                    const latestId = lastObtained && lastObtained.id;
                    if (!latestId) {
                        collectionModalContent.scrollTop = 0;
                        return;
                    }

                    const target = collectionGrid.querySelector(`[data-fortune-id="${latestId}"]`);
                    if (!target && currentCollectionFilter !== 'all') {
                        currentCollectionFilter = 'all';
                        renderCollection({ autoFocusLatest: true });
                        return;
                    }

                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else {
                        collectionModalContent.scrollTop = 0;
                    }
                });
            }
        }

            const playableThemeSets = themeSets.filter((themeSet) => !themeSet.excludeFromCompletionTotals);
            const placeholderThemeSets = themeSets.filter((themeSet) => themeSet.isPlaceholder);

                        <div class="theme-reward-block">
                            <div class="theme-reward-header">
                                <span class="theme-reward-label">终章奖励</span>
                                <span class="theme-reward-state${rewardUnlocked ? '' : ' locked'}">${escapeHtml(rewardStateLabel)}</span>
                            </div>
                            <button type="button" class="theme-reward-card ${rewardUnlocked ? 'unlocked' : 'locked'}" ${rewardUnlocked ? `data-theme-card-id="${escapeHtml(themeSet.rewardCardId)}"` : 'disabled'}>
                                ${rewardUnlocked
                                    ? `<img class="theme-reward-thumb" src="${escapeHtml(rewardCard.icon)}" alt="${escapeHtml(rewardCard.title)}">`
                                    : '<span class="theme-placeholder-thumb theme-locked-thumb">謎</span>'}
                                <span class="theme-reward-name">${rewardUnlocked ? escapeHtml(rewardCard.title) : '终章剪影'}</span>
                            </button>
                        </div>
                    </article>
                `;
            }).join('');

            themeSetGrid.querySelectorAll('.theme-member-thumb, .theme-reward-thumb').forEach((image) => {
                image.addEventListener('error', () => {
                    const placeholder = document.createElement('span');
                    placeholder.className = 'theme-placeholder-thumb theme-locked-thumb';
                    placeholder.textContent = image.classList.contains('theme-reward-thumb') ? '终' : '?';
                    image.replaceWith(placeholder);
                }, { once: true });
            });
        }

        function renderActiveModalPanel(options = {}) {
            updateModalTabs();
            if (!collectionModal.classList.contains('active')) {
                return;
            }

            if (currentModalTab === 'collection') {
                renderCollection(options);
                return;
            }
            renderThemeSets();
        }

        function getResultMetaText(drawRecord, extras) {
            const parts = [];
            if (drawRecord.isNew) {
                parts.push('首次入藏');
            } else if (drawRecord.isDuplicate) {
                parts.push(`已获得 ${drawRecord.meta.count} 次`);
            }
            if (extras.unlockedThemeRewards.length > 0) {
                parts.push('套组终章卡已入藏');
            }
            if (Array.isArray(extras.startedUnlockPools) && extras.startedUnlockPools.length > 0) {
                extras.startedUnlockPools.forEach((pool) => {
                    if (pool && pool.title) {
                        parts.push(`${pool.title}已启动`);
                    }
                });
            }
            if (extras.didUnlockColaTreat) {
                parts.push('已解锁柴犬互动：喂可乐');
            }
            if (extras.didUnlockRoninSkin) {
                parts.push('已解锁柴犬皮肤：浪客');
            }
            return parts.join(' · ');
        }

        function renderResultCard(fortune, drawRecord, extras) {
            const renderToken = ++resultRenderToken;
            window.clearTimeout(foilEvolutionTimer);
            window.clearTimeout(foilRevealTimer);
            foilEvolutionTimer = 0;
            foilRevealTimer = 0;
            isFoilRevealLocked = false;
            resultCard.classList.remove('is-foil-awakening');
            resultIcon.classList.remove('foil-awakening');
            const normalDisplayFortune = getNormalDisplayFortune(fortune, drawRecord && drawRecord.meta);
            const foilDisplayFortune = getVariantDisplayFortune(fortune, drawRecord && drawRecord.meta, 'foil');
            const shouldAnimateFoil = Boolean(
                drawRecord
                && drawRecord.isFoil
                && fortune.foilVariant
                && fortune.foilVariant.icon
            );
            if (shouldAnimateFoil) {
                isFoilRevealLocked = true;
                syncActionButtonState();
            }
            const displayFortune = drawRecord.isFoil ? foilDisplayFortune : normalDisplayFortune;
            const showFoilImmediately = Boolean(drawRecord.isFoil && !shouldAnimateFoil);
            resultCard.classList.toggle('is-foil', showFoilImmediately);
            resultCard.style.borderColor = showFoilImmediately ? '' : (normalDisplayFortune.color || 'var(--accent-gold)');
            resultTitle.style.color = displayFortune.color || 'var(--ink-main)';
            resultTitle.style.borderColor = displayFortune.color || 'var(--line)';
            rarityBadge.textContent = displayFortune.rarity;
            rarityBadge.style.background = rarityColors[displayFortune.rarity] || displayFortune.color || 'var(--accent)';
            resultTitle.innerHTML = `<span class="${showFoilImmediately ? 'foil-title-text' : ''}">${escapeHtml(displayFortune.title)}</span>`;
            resultIcon.innerHTML = shouldAnimateFoil
                ? `
                    <img src="${escapeHtml(normalDisplayFortune.icon)}" alt="${escapeHtml(displayFortune.title)}" class="icon-img foil-awakening-image foil-awakening-image-before">
                    <img src="${escapeHtml(foilDisplayFortune.icon)}" alt="${escapeHtml(displayFortune.title)}" class="icon-img foil-awakening-image foil-awakening-image-final">
                    <span class="foil-awakening-light-column" aria-hidden="true"></span>
                    <span class="foil-awakening-light-bloom" aria-hidden="true"></span>
                    <span class="foil-awakening-light-ring" aria-hidden="true"></span>
                    <span class="foil-awakening-white-flash" aria-hidden="true"></span>
                    <i class="foil-awakening-spark" style="--spark-x:26%; --spark-y:68%; --spark-delay:0s" aria-hidden="true"></i>
                    <i class="foil-awakening-spark" style="--spark-x:42%; --spark-y:35%; --spark-delay:.12s" aria-hidden="true"></i>
                    <i class="foil-awakening-spark" style="--spark-x:58%; --spark-y:62%; --spark-delay:.2s" aria-hidden="true"></i>
                    <i class="foil-awakening-spark" style="--spark-x:73%; --spark-y:42%; --spark-delay:.08s" aria-hidden="true"></i>
                    <i class="foil-awakening-spark" style="--spark-x:79%; --spark-y:74%; --spark-delay:.25s" aria-hidden="true"></i>
                    <i class="foil-awakening-spark" style="--spark-x:19%; --spark-y:45%; --spark-delay:.3s" aria-hidden="true"></i>
                `
                : `<img src="${escapeHtml(displayFortune.icon)}" alt="${escapeHtml(displayFortune.title)}" class="icon-img">`;
            resultIcon.classList.toggle('foil-awakening', shouldAnimateFoil);

            const resultImages = Array.from(resultIcon.querySelectorAll('img'));
            resultImages.forEach((resultImage) => {
                resultImage.addEventListener('error', () => {
                    resultImage.src = FALLBACK_IMAGE_URL;
                }, { once: true });
            });

            resultDesc.textContent = displayFortune.desc;
            const metaText = getResultMetaText(drawRecord, extras);
            if (metaText) {
                resultMeta.textContent = metaText;
                resultMeta.style.display = 'block';
            } else {
                resultMeta.textContent = '';
                resultMeta.style.display = 'none';
            }

            resultCard.style.display = 'block';
            resultDescBox.style.display = 'block';
            newBadge.classList.remove('is-foil-badge');
            newBadge.textContent = 'NEW!';
            newBadge.style.display = !drawRecord.isFoil && drawRecord.isNew ? 'flex' : 'none';

            if (shouldAnimateFoil) {
                const finalImage = resultIcon.querySelector('.foil-awakening-image-final');
                let didStartAwakening = false;
                const startAwakening = () => {
                    if (didStartAwakening || renderToken !== resultRenderToken) {
                        return;
                    }
                    didStartAwakening = true;
                    window.requestAnimationFrame(() => {
                        if (renderToken !== resultRenderToken) {
                            return;
                        }
                        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                        const revealDelay = reduceMotion ? 650 : 1950;
                        const finishDelay = reduceMotion ? 1250 : 3200;
                        resultCard.classList.add('is-foil-awakening');
                        foilRevealTimer = window.setTimeout(() => {
                            if (renderToken !== resultRenderToken) {
                                return;
                            }
                            resultCard.classList.add('is-foil');
                            resultCard.style.borderColor = '';
                            resultTitle.innerHTML = `<span class="foil-title-text">${escapeHtml(displayFortune.title)}</span>`;
                        }, revealDelay);
                        foilEvolutionTimer = window.setTimeout(() => {
                            if (renderToken !== resultRenderToken) {
                                return;
                            }
                            resultCard.classList.remove('is-foil-awakening');
                            resultIcon.classList.remove('foil-awakening');
                            resultIcon.innerHTML = `<img src="${escapeHtml(foilDisplayFortune.icon)}" alt="${escapeHtml(displayFortune.title)}" class="icon-img">`;
                            isFoilRevealLocked = false;
                            syncActionButtonState();
                        }, finishDelay);
                    });
                };

                if (finalImage && finalImage.complete) {
                    startAwakening();
                } else if (finalImage) {
                    finalImage.addEventListener('load', startAwakening, { once: true });
                    finalImage.addEventListener('error', startAwakening, { once: true });
                }
            }
        }

        function drawFortune() {
            const rarityRates = {
                KR: 2,
                UR: 4,
                SSR: 15,
                SR: 35,
                R: 44
            };

            const rand = Math.random() * 100;
            let cumulative = 0;
            let selectedRarity = 'R';
            const collectionMeta = getCollectionMeta();
            const drawDate = new Date();

            for (const rarity in rarityRates) {
                cumulative += rarityRates[rarity];
                if (rand < cumulative) {
                    selectedRarity = rarity;
                    break;
                }
            }

            const pool = getDrawableFortunes(
                fortunes.filter((fortune) => fortune.rarity === selectedRarity && !fortune.isSpecial),
                drawDate,
                collectionMeta
            );

            if (!pool.length) {
                const normalPool = getDrawableFortunes(
                    fortunes.filter((fortune) => !fortune.isSpecial),
                    drawDate,
                    collectionMeta
                );
                return normalPool[Math.floor(Math.random() * normalPool.length)];
            }

            const totalWeight = pool.reduce((sum, item) => sum + (item.weight || 1), 0);
            let randomWeight = Math.random() * totalWeight;

            for (const fortune of pool) {
                const weight = fortune.weight || 1;
                if (randomWeight < weight) {
                    return fortune;
                }
                randomWeight -= weight;
            }

            return pool[0];
        }

        function shouldTriggerSpecialDraw(drawIndex) {
            const normalizedIndex = Math.max(1, Number(drawIndex) || 1);
            if (normalizedIndex >= SPECIAL_DRAW_PITY_THRESHOLD) {
                return true;
            }
            return Math.random() < (SPECIAL_DRAW_EARLY_RATES[normalizedIndex] || 0);
        }

        function pickWeightedFortune(pool) {
            if (!Array.isArray(pool) || pool.length === 0) {
                return null;
            }
            const totalWeight = pool.reduce((sum, item) => sum + (item.weight || 1), 0);
            let randomWeight = Math.random() * totalWeight;

            for (const fortune of pool) {
                const weight = fortune.weight || 1;
                if (randomWeight < weight) {
                    return fortune;
                }
                randomWeight -= weight;
            }

            return pool[0];
        }

        function getUnownedFollowupFortunes(meta = getCollectionMeta()) {
            const seenCardIds = new Set();
            const followupCards = unlockPools.flatMap((unlockPool) => {
                if (
                    !unlockPool
                    || unlockPool.status !== 'active'
                    || !hasCollectedFortune(unlockPool.starterCardId, meta)
                ) {
                    return [];
                }

                return (Array.isArray(unlockPool.followupCardIds) ? unlockPool.followupCardIds : [])
                    .map((cardId) => (
                        omikujiCatalogApi && typeof omikujiCatalogApi.getFortuneById === 'function'
                            ? omikujiCatalogApi.getFortuneById(cardId)
                            : fortunes.find((fortune) => fortune.id === cardId)
                    ))
                    .filter((fortune) => {
                        if (!fortune || seenCardIds.has(fortune.id) || hasCollectedFortune(fortune.id, meta)) {
                            return false;
                        }
                        seenCardIds.add(fortune.id);
                        return true;
                    });
            });

            return getDrawableFortunes(followupCards, new Date(), meta);
        }

        function drawSpecialFortune() {
            const collectionMeta = getCollectionMeta();
            const specialPool = getDrawableFortunes(
                fortunes.filter((fortune) => fortune.isSpecial && fortune.poolRole !== 'followup'),
                new Date(),
                collectionMeta
            );
            return pickWeightedFortune(specialPool) || drawFortune();
        }

        function drawFortuneWithSpecialPool() {
            const specialState = getSpecialPoolState();
            const collectionMeta = getCollectionMeta();
            const followupFortunes = getUnownedFollowupFortunes(collectionMeta);

            if (followupFortunes.length > 0) {
                const nextFollowupDraw = specialState.followupDraws + 1;
                specialState.followupDraws = nextFollowupDraw;

                if (shouldTriggerSpecialDraw(nextFollowupDraw)) {
                    const followupFortune = pickWeightedFortune(followupFortunes);
                    specialState.followupDraws = 0;
                    saveSpecialPoolState(specialState);
                    return followupFortune || drawFortune();
                }

                saveSpecialPoolState(specialState);
                return drawFortune();
            }

            specialState.followupDraws = 0;

            if (specialState.specialHit) {
                specialState.totalDraws += 1;
                saveSpecialPoolState(specialState);
                return drawFortune();
            }

            const nextDrawIndex = specialState.totalDraws + 1;
            const shouldHitSpecial = shouldTriggerSpecialDraw(nextDrawIndex);

            specialState.totalDraws += 1;

            if (shouldHitSpecial) {
                specialState.specialHit = true;
                saveSpecialPoolState(specialState);
                return drawSpecialFortune();
            }

            saveSpecialPoolState(specialState);
            return drawFortune();
        }

        function handleDrawResult() {
            if (remain <= 0 || isFoilRevealLocked) {
                return;
            }

            hideResultCard();
            omikujiContainer.style.display = 'flex';
            
            // 阶段 1: 摇晃签筒
            omikujiContainer.classList.add('shaking');
            drawBtn.disabled = true;
            foilEventUseBtn.disabled = true;
            setActionButtonLabel('祈愿中...');

            window.setTimeout(() => {
                const randomFortune = drawFortuneWithSpecialPool();
                // 设置弹出竹签上的文字显示
                document.getElementById('stickText').textContent = randomFortune.rarity || '吉';

                // 阶段 2: 弹出竹签
                omikujiContainer.classList.remove('shaking');
                omikujiContainer.classList.add('drawing');
                setActionButtonLabel('神签显现...');

                window.setTimeout(() => {
                    // 阶段 3: 揭晓结果 (移除竹签并展开卡片)
                    omikujiContainer.classList.remove('drawing');
                    omikujiContainer.style.display = 'none';

                    const collectionMetaBeforeDraw = getCollectionMeta();
                    const foilResult = resolveFoilDraw(
                        randomFortune,
                        collectionMetaBeforeDraw[randomFortune.id] || null
                    );
                    const drawRecord = grantFortune(randomFortune, {
                        variant: foilResult.isFoil ? 'foil' : 'normal'
                    });
                    drawRecord.guaranteedByFoilPity = foilResult.guaranteedByPity;
                    drawRecord.guaranteedByFoilEvent = foilResult.guaranteedByEvent;
                    const unlockedThemeRewards = syncThemeRewardUnlocks({
                        markNew: true,
                        updateLastObtained: true,
                        triggerAt: Date.now()
                    });
                    const didUnlockColaTreat = randomFortune.id === COLA_FORTUNE_ID
                        ? unlockPetInteraction(COLA_TREAT_UNLOCK_ID)
                        : false;
                    const didUnlockRoninSkin = randomFortune.id === RONIN_SKIN_FORTUNE_ID
                        && drawRecord.isNewFoil;
                    const startedUnlockPools = getStartedUnlockPoolsForDraw(randomFortune, drawRecord);

                    renderResultCard(randomFortune, drawRecord, {
                        didUnlockColaTreat,
                        didUnlockRoninSkin,
                        unlockedThemeRewards,
                        startedUnlockPools
                    });
                    syncFoilEventDisplay();

                    currentState.count += 1;
                    saveDailyState(currentState.count);
                    syncActionButtonState();

                    if (homePetController && typeof homePetController.reactToLotteryResult === 'function') {
                        homePetController.reactToLotteryResult({
                            title: randomFortune.title,
                            rarity: randomFortune.rarity,
                            isNew: drawRecord.isNew,
                            isDuplicate: drawRecord.isDuplicate,
                            isFoil: drawRecord.isFoil,
                            didUnlockColaTreat,
                            didUnlockRoninSkin,
                            isRare: /SSR|SP|EX|限定|隐藏|隱藏|稀有|超吉|大吉|レア|rare/i.test(`${randomFortune.title} ${randomFortune.rarity}`)
                        });
                    }

                    if (collectionModal.classList.contains('active')) {
                        renderActiveModalPanel({ autoFocusLatest: currentModalTab === 'collection' });
                    }
                }, 800); // 等待竹签弹出的动画结束
            }, 1200); // 摇晃动作持续 1.2 秒
        }

        openCollectionBtn.addEventListener('click', () => {
            collectionModal.classList.add('active');
            renderActiveModalPanel({ autoFocusLatest: currentModalTab === 'collection' });
        });

        exportCollectionBtn.addEventListener('click', async () => {
            const payload = buildLotteryBackupPayload();
            const { file } = createLotteryBackupFile(payload);
            const shareResult = await shareLotteryBackup(file);

            if (shareResult === 'shared') {
                showBackupToast('存档已准备好，可保存到“文件”');
                return;
            }

            if (shareResult === 'cancelled') {
                return;
            }

            downloadLotteryBackup(payload);
            showBackupToast('存档文件已导出');
        });

        importCollectionBtn.addEventListener('click', () => {
            promptImportLotteryBackup();
        });

        closeCollectionBtn.addEventListener('click', () => {
            collectionModal.classList.remove('active');
        });

        collectionModal.addEventListener('click', (event) => {
            if (event.target === collectionModal) {
                collectionModal.classList.remove('active');
            }
        });

        modalTabButtons.forEach((button) => {
            button.addEventListener('click', () => {
                setModalTab(button.dataset.modalTab || 'collection');
            });
        });

        collectionFilterButtons.forEach((button) => {
            button.addEventListener('click', () => {
                currentCollectionFilter = button.dataset.collectionFilter || 'all';
                renderCollection();
            });
        });

        themeSetGrid.addEventListener('click', (event) => {
            const cardButton = event.target.closest('[data-theme-card-id]');
            if (!cardButton) {
                return;
            }
            const fortune = omikujiCatalogApi.getFortuneById(cardButton.dataset.themeCardId);
            if (fortune) {
                openPreview(fortune);
            }
        });

        previewClose.addEventListener('click', () => {
            previewOverlay.classList.remove('active');
        });

        previewVariantButtons.forEach((button) => {
            button.addEventListener('click', () => {
                const variant = button.dataset.previewVariant === 'foil' ? 'foil' : 'normal';
                const fortune = currentPreviewFortuneId && omikujiCatalogApi
                    ? omikujiCatalogApi.getFortuneById(currentPreviewFortuneId)
                    : null;
                if (!fortune) {
                    return;
                }

                const meta = migrateLegacyCollectionIfNeeded();
                const entry = meta[fortune.id];
                const variants = getCollectionVariantCounts(entry, entry && entry.count);
                const canSelect = variant === 'foil'
                    ? variants.foilCount > 0
                    : variants.normalCount > 0;
                if (!entry || !canSelect) {
                    return;
                }

                entry.preferredVariant = variant;
                saveCollectionMeta(meta);
                renderPreview(fortune, variant);
                if (collectionModal.classList.contains('active')) {
                    renderActiveModalPanel({ preserveScroll: true });
                }
            });
        });

        previewOverlay.addEventListener('click', (event) => {
            if (event.target === previewOverlay) {
                previewOverlay.classList.remove('active');
            }
        });

        backupImportInput.addEventListener('change', async (event) => {
            const [file] = Array.from(event.target.files || []);
            if (!file) {
                return;
            }

            try {
                const text = await file.text();
                const parsed = parseLotteryBackup(text);
                const payload = validateLotteryBackup(parsed);
                const shouldImport = window.confirm('导入后会覆盖当前本地数据记录，确定继续吗？');
                if (!shouldImport) {
                    return;
                }

                applyLotteryBackup(payload);
                refreshLotteryUIAfterImport();
                showBackupToast('数据记录已恢复');
            } catch (error) {
                showBackupToast(error && error.message ? error.message : '导入失败', 'error');
            } finally {
                event.target.value = '';
            }
        });

        drawBtn.addEventListener('click', handleDrawResult);
        foilEventUseBtn.addEventListener('click', () => {
            const shouldUseFoilCard = window.confirm('使用后，下一次抽奖必出闪卡，确认使用咩？');
            if (!shouldUseFoilCard) {
                return;
            }
            if (activateFoilEventCard()) {
                showBackupToast('必闪卡已使用，下一张可闪卡必闪');
            }
        });
        currentState = getDailyState();
        migrateLegacyCollectionIfNeeded();
        syncThemeRewardUnlocks({ markNew: false, updateLastObtained: false, triggerAt: Date.now() });
        syncActionButtonState();
        syncFoilEventDisplay();
        renderCollection();
        renderThemeSets();
    </script>
    <script src="shared/unified-header.js" data-kiki-unified-header-loader></script>
