        const previewRarityBadge = document.getElementById('previewRarityBadge');

        let homePetController = null;
        if (window.HomePetSystem) {
            const petRoot = window.HomePetSystem.ensureMountRoot('#home-pet-root');
            if (petRoot) {
                homePetController = window.HomePetSystem.initNonHomeSurface({
                    mountSelector: '#home-pet-root',
                    pageShellSelector: '.container, body',
                    surfaceType: 'lottery',
                    activeSection: 'favorites'
                });
            }
        }

        let currentCollectionFilter = 'all';
        let currentModalTab = 'collection';
        let currentState = null;
        let remain = 0;
        let backupToastTimer = 0;

        function showBackupToast(message, tone = 'info') {
            if (!backupToast) {
                return;
            }

            window.clearTimeout(backupToastTimer);
            backupToast.textContent = message;
            backupToast.classList.toggle('error', tone === 'error');
            backupToast.classList.add('active');
            backupToastTimer = window.setTimeout(() => {
                backupToast.classList.remove('active');
            }, 2400);
        }

        function safeParseJSON(rawValue, fallback) {
            try {
                const parsed = JSON.parse(rawValue);
                return parsed === null || parsed === undefined ? fallback : parsed;
            } catch (error) {
                return fallback;
            }
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeFortuneId(id) {
            if (omikujiCatalogApi && typeof omikujiCatalogApi.normalizeFortuneId === 'function') {
                return omikujiCatalogApi.normalizeFortuneId(id);
            }
            const normalizedId = String(id || '').trim();
            if (!normalizedId) {
                return '';
            }
            const legacyPracticeRewardIdMap = {
                growth_vocabulary_max: 'practice_yaji_max',
                growth_grammar_max: 'practice_gaoji_max',
                growth_reading_max: 'practice_geji_max',
                growth_listening_max: 'practice_anji_max',
                practice_tingji_max: 'practice_anji_max'
            };
            return legacyPracticeRewardIdMap[normalizedId] || normalizedId;
        }

        function mergeCollectionMetaEntry(baseEntry, incomingEntry) {
            const count = Number.parseInt(incomingEntry && incomingEntry.count, 10);
            if (!Number.isInteger(count) || count <= 0) {
                return baseEntry || null;
            }

            const nextEntry = baseEntry
                ? { ...baseEntry }
                : {
                    count: 0,
                    firstObtainedAt: null,
                    lastObtainedAt: null,
                    isNew: false
                };

            const firstObtainedAt = Number(incomingEntry.firstObtainedAt);
            const lastObtainedAt = Number(incomingEntry.lastObtainedAt);
            nextEntry.count += count;
            if (Number.isFinite(firstObtainedAt) && firstObtainedAt > 0) {
                nextEntry.firstObtainedAt = nextEntry.firstObtainedAt
                    ? Math.min(nextEntry.firstObtainedAt, firstObtainedAt)
                    : firstObtainedAt;
            }
            if (Number.isFinite(lastObtainedAt) && lastObtainedAt > 0) {
                nextEntry.lastObtainedAt = nextEntry.lastObtainedAt
                    ? Math.max(nextEntry.lastObtainedAt, lastObtainedAt)
                    : lastObtainedAt;
            }
            nextEntry.isNew = Boolean(nextEntry.isNew || incomingEntry.isNew);
            return nextEntry;
        }

        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function getDailyState() {
            const today = getTodayString();
            const stored = safeParseJSON(localStorage.getItem('lotteryState_v2'), null);
            if (stored && stored.date === today) {
                return stored;
            }
            return { date: today, count: 0 };
        }

        function saveDailyState(count) {
            localStorage.setItem('lotteryState_v2', JSON.stringify({ date: getTodayString(), count }));
        }

        function getCollection() {
            const parsed = safeParseJSON(localStorage.getItem(COLLECTION_KEY), []);
            if (!Array.isArray(parsed)) {
                return [];
            }
            return Array.from(new Set(
                parsed
                    .filter((id) => typeof id === 'string' && id.trim())
                    .map((id) => normalizeFortuneId(id))
                    .filter((id) => Boolean(omikujiCatalogApi && typeof omikujiCatalogApi.getFortuneById === 'function' && omikujiCatalogApi.getFortuneById(id)))
                    .filter(Boolean)
            ));
        }

        function saveCollection(ids) {
            localStorage.setItem(COLLECTION_KEY, JSON.stringify(Array.from(new Set(ids))));
        }

        function getCollectionMeta() {
            const raw = safeParseJSON(localStorage.getItem(COLLECTION_META_KEY), {});
            if (!raw || typeof raw !== 'object' || Array.isArray(raw)) {
                return {};
            }

            return Object.keys(raw).reduce((acc, id) => {
                const normalizedId = normalizeFortuneId(id);
                const entry = raw[id];
                const knownFortune = omikujiCatalogApi && typeof omikujiCatalogApi.getFortuneById === 'function'
                    ? omikujiCatalogApi.getFortuneById(normalizedId)
                    : null;
                if (!entry || typeof entry !== 'object' || Array.isArray(entry) || !knownFortune) {
                    return acc;
                }

                const mergedEntry = mergeCollectionMetaEntry(acc[normalizedId], entry);
                if (mergedEntry) {
                    acc[normalizedId] = mergedEntry;
                }
                return acc;
            }, {});
        }

        function saveCollectionMeta(meta) {
            localStorage.setItem(COLLECTION_META_KEY, JSON.stringify(meta));
        }

        function getLastObtained() {
            const parsed = safeParseJSON(localStorage.getItem(LAST_OBTAINED_KEY), null);
            if (!parsed || typeof parsed !== 'object' || !parsed.id) {
                return null;
            }

            return {
                id: normalizeFortuneId(parsed.id),
                obtainedAt: Number.isFinite(Number(parsed.obtainedAt)) ? Number(parsed.obtainedAt) : null
            };
        }

        function saveLastObtained(id, obtainedAt) {
            localStorage.setItem(LAST_OBTAINED_KEY, JSON.stringify({
                id: normalizeFortuneId(id),
                obtainedAt
            }));
        }

        function getNormalizedPetRewardState() {
            const parsed = safeParseJSON(localStorage.getItem(PET_STATE_KEY), {});
            const source = parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
            const hasWrappedPetStates = source.petStates && typeof source.petStates === 'object' && !Array.isArray(source.petStates);
            const hasWrappedCollection = source.petCollection && typeof source.petCollection === 'object' && !Array.isArray(source.petCollection);
            const wrapper = (hasWrappedPetStates || hasWrappedCollection)
                ? { ...source }
                : { petStates: { shiba: source }, petCollection: {} };

            if (!wrapper.petStates || typeof wrapper.petStates !== 'object' || Array.isArray(wrapper.petStates)) {
                wrapper.petStates = {};
            }
            if (!wrapper.petCollection || typeof wrapper.petCollection !== 'object' || Array.isArray(wrapper.petCollection)) {
                wrapper.petCollection = {};
            }

            const unlockedPetIds = Array.isArray(wrapper.petCollection.unlockedPetIds)
                ? wrapper.petCollection.unlockedPetIds.filter((petId) => typeof petId === 'string' && petId.trim())
                : [];
            const unlockedInteractionIds = Array.isArray(wrapper.petCollection.unlockedInteractionIds)
                ? wrapper.petCollection.unlockedInteractionIds.filter((interactionId) => typeof interactionId === 'string' && interactionId.trim())
                : [];

            wrapper.petCollection.unlockedPetIds = Array.from(new Set([...DEFAULT_UNLOCKED_PET_IDS, ...unlockedPetIds]));
            wrapper.petCollection.unlockedInteractionIds = Array.from(new Set(unlockedInteractionIds));
            return wrapper;
        }

        function unlockPetInteraction(interactionId) {
            const normalizedId = String(interactionId || '').trim();
            if (!normalizedId) {
                return false;
            }

            const petState = getNormalizedPetRewardState();
            if (petState.petCollection.unlockedInteractionIds.includes(normalizedId)) {
                return false;
            }

            petState.petCollection.unlockedInteractionIds.push(normalizedId);
            localStorage.setItem(PET_STATE_KEY, JSON.stringify(petState));
            return true;
        }

        function getUnlockedIdsFromMeta(meta) {
            return Object.keys(meta).filter((id) => {
                const entry = meta[id];
                return entry && Number(entry.count) > 0;
            });
        }

        function migrateLegacyCollectionIfNeeded() {
            const rawMeta = safeParseJSON(localStorage.getItem(COLLECTION_META_KEY), {});
            const legacyIds = getCollection();
            const meta = getCollectionMeta();
            let didChange = JSON.stringify(rawMeta && typeof rawMeta === 'object' && !Array.isArray(rawMeta) ? rawMeta : {}) !== JSON.stringify(meta);

            legacyIds.forEach((id) => {
                if (!meta[id]) {
                    meta[id] = {
                        count: 1,
                        firstObtainedAt: null,
                        lastObtainedAt: null,
                        isNew: false
                    };
                    didChange = true;
                }
            });

            const normalizedLegacy = getUnlockedIdsFromMeta(meta);
            if (normalizedLegacy.length !== legacyIds.length || normalizedLegacy.some((id, index) => id !== legacyIds[index])) {
                saveCollection(normalizedLegacy);
            }

            if (didChange) {
                saveCollectionMeta(meta);
            }

            return meta;
        }

        function formatDateTime(timestamp) {
            const value = Number(timestamp);
            if (!Number.isFinite(value) || value <= 0) {
                return '历史解锁';
            }

            const d = new Date(value);
            return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        }

        function getSourceLabel(fortune) {
            if (!fortune) {
                return '未知';
            }
            if (fortune.acquireMode === 'set_reward') {
                return '套组';
            }
            if (fortune.acquireMode === 'growth') {
                return '成长';
            }
            return '抽卡';
        }

        function isMysteryFortune(fortune) {
            return Boolean(fortune && fortune.rarity === 'MR');
        }

        function shouldShowMysteryRarity(filterMode, unlockedCount, totalCount) {
            if (filterMode === 'unlocked') {
                return unlockedCount > 0;
            }
            if (filterMode === 'locked') {
                return unlockedCount < totalCount;
            }
            return true;
        }

        function getRarityLabel(rarity) {
            return rarity;
        }

        function grantFortune(fortune, options = {}) {
            const meta = migrateLegacyCollectionIfNeeded();
            const now = Number.isFinite(Number(options.obtainedAt)) ? Number(options.obtainedAt) : Date.now();
            const existing = meta[fortune.id];
            const nextEntry = existing
                ? { ...existing }
                : {
                    count: 0,
                    firstObtainedAt: now,
                    lastObtainedAt: now,
                    isNew: options.markNew !== false
                };

            const previousCount = Number(nextEntry.count || 0);
            nextEntry.count = previousCount + 1;
            nextEntry.lastObtainedAt = now;
            if (!existing) {
                nextEntry.firstObtainedAt = now;
            }
            nextEntry.isNew = existing ? Boolean(existing.isNew) : options.markNew !== false;

            meta[fortune.id] = nextEntry;
            saveCollectionMeta(meta);
            saveCollection(getUnlockedIdsFromMeta(meta));
            if (options.updateLastObtained !== false) {
                saveLastObtained(fortune.id, now);
            }

            return {
                isNew: !existing,
                isDuplicate: Boolean(existing),
                meta: nextEntry
            };
        }

        function markFortunePreviewed(id) {
            const meta = migrateLegacyCollectionIfNeeded();
            if (!meta[id] || !meta[id].isNew) {
                return false;
            }

            meta[id].isNew = false;
            saveCollectionMeta(meta);
            return true;
        }

        function syncThemeRewardUnlocks(options = {}) {
            const meta = migrateLegacyCollectionIfNeeded();
            const rewards = [];
            themeSets.forEach((themeSet, index) => {
                if (themeSet.isPlaceholder) {
                    return;
                }
                const progress = omikujiCatalogApi && typeof omikujiCatalogApi.getThemeSetProgress === 'function'
                    ? omikujiCatalogApi.getThemeSetProgress(meta, themeSet.id)
                    : null;
                if (!progress || !progress.allCollected || progress.rewardUnlocked) {
                    return;
                }

                const rewardCard = omikujiCatalogApi && typeof omikujiCatalogApi.getFortuneById === 'function'
                    ? omikujiCatalogApi.getFortuneById(themeSet.rewardCardId)
                    : null;
                if (!rewardCard) {
                    return;
                }

                const rewardResult = grantFortune(rewardCard, {
                    markNew: options.markNew !== false,
                    updateLastObtained: options.updateLastObtained !== false,
                    obtainedAt: (Number(options.triggerAt) || Date.now()) + index + 1
                });
                rewards.push({
                    set: themeSet,
                    fortune: rewardCard,
                    result: rewardResult
                });
            });

            return rewards;
        }

        function getSpecialPoolState() {
            const parsed = safeParseJSON(localStorage.getItem(SPECIAL_POOL_KEY), null);
            if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) {
                return { totalDraws: 0, specialHit: false };
            }
            return {
                totalDraws: Math.max(0, Number(parsed.totalDraws) || 0),
                specialHit: Boolean(parsed.specialHit)
            };
        }

        function saveSpecialPoolState(state) {
            localStorage.setItem(SPECIAL_POOL_KEY, JSON.stringify(state));
        }

        function getBackupFileName(timestamp = Date.now()) {
            const d = new Date(timestamp);
            return `lottery-backup-${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}-${String(d.getHours()).padStart(2, '0')}${String(d.getMinutes()).padStart(2, '0')}${String(d.getSeconds()).padStart(2, '0')}.json`;
        }

        function buildLotteryBackupPayload() {
            const normalizedMeta = migrateLegacyCollectionIfNeeded();
            const exportedAt = Date.now();

            return {
                version: 2,
                exportedAt,
                source: 'lottery',
                data: {
                    omikujiCollection: getUnlockedIdsFromMeta(normalizedMeta),
                    omikujiCollectionMeta_v1: normalizedMeta,
                    omikujiLastObtained_v1: getLastObtained(),
                    lotteryState_v2: getDailyState(),
                    specialPoolState_v1: getSpecialPoolState()
                }
            };
        }

        function createLotteryBackupFile(payload) {
            const content = JSON.stringify(payload, null, 2);
            const fileName = getBackupFileName(payload.exportedAt);
            const blob = new Blob([content], { type: 'application/json' });
            const file = typeof File === 'function'
                ? new File([blob], fileName, { type: 'application/json' })
                : null;

            return { content, fileName, blob, file };
        }

        async function shareLotteryBackup(file) {
            if (!file || typeof navigator.share !== 'function') {
                return 'unsupported';
            }

            const shareData = { files: [file] };
            if (typeof navigator.canShare === 'function' && !navigator.canShare(shareData)) {
                return 'unsupported';
            }

            try {
                await navigator.share(shareData);
                return 'shared';
            } catch (error) {
                if (error && error.name === 'AbortError') {
                    return 'cancelled';
                }
                return 'failed';
            }
        }

        function downloadLotteryBackup(payload) {
            const { blob, fileName } = createLotteryBackupFile(payload);
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.download = fileName;
            document.body.appendChild(anchor);
            anchor.click();
            anchor.remove();
            window.setTimeout(() => URL.revokeObjectURL(url), 1200);
        }

        function promptImportLotteryBackup() {
            backupImportInput.value = '';
            backupImportInput.click();
        }

        function parseLotteryBackup(text) {
            try {
                return JSON.parse(text);
            } catch (error) {
                throw new Error('存档文件无法解析');
            }
        }

        function validateLotteryBackup(payload) {
            if (!payload || typeof payload !== 'object' || Array.isArray(payload)) {
                throw new Error('存档格式不正确');
            }

            if ((Number(payload.version) !== 1 && Number(payload.version) !== 2) || payload.source !== 'lottery') {
                throw new Error('这不是可用的数据存档');
            }

            const data = payload.data;
            if (!data || typeof data !== 'object' || Array.isArray(data)) {
                throw new Error('存档内容缺失');
            }

            const requiredKeys = [
                COLLECTION_KEY,
                COLLECTION_META_KEY,
                LAST_OBTAINED_KEY,
                'lotteryState_v2',
                'specialPoolState_v1'
            ];

            for (const key of requiredKeys) {
                if (!(key in data)) {
                    throw new Error('存档内容不完整');
                }
            }

            if (!Array.isArray(data[COLLECTION_KEY])) {
                throw new Error('图鉴列表数据无效');
            }

            if (!data[COLLECTION_META_KEY] || typeof data[COLLECTION_META_KEY] !== 'object' || Array.isArray(data[COLLECTION_META_KEY])) {
                throw new Error('图鉴元数据无效');
            }

            if (data[LAST_OBTAINED_KEY] !== null && (typeof data[LAST_OBTAINED_KEY] !== 'object' || Array.isArray(data[LAST_OBTAINED_KEY]))) {
                throw new Error('最新获得数据无效');
            }

            if (!data.lotteryState_v2 || typeof data.lotteryState_v2 !== 'object' || Array.isArray(data.lotteryState_v2)) {
                throw new Error('每日开启记录无效');
            }

            if (!data.specialPoolState_v1 || typeof data.specialPoolState_v1 !== 'object' || Array.isArray(data.specialPoolState_v1)) {
                throw new Error('特殊奖励记录无效');
            }

            return {
                version: Number(payload.version) || 1,
                exportedAt: Number.isFinite(Number(payload.exportedAt)) ? Number(payload.exportedAt) : Date.now(),
                source: 'lottery',
                data: {
                    omikujiCollection: data[COLLECTION_KEY],
                    omikujiCollectionMeta_v1: data[COLLECTION_META_KEY],
                    omikujiLastObtained_v1: data[LAST_OBTAINED_KEY],
                    lotteryState_v2: data.lotteryState_v2,
                    specialPoolState_v1: data.specialPoolState_v1
                }
            };
        }

        function writeBackupStorageValue(key, value) {
            if (value === undefined) {
                return;
            }
            if (value === null) {
                localStorage.setItem(key, 'null');
                return;
            }
            localStorage.setItem(key, JSON.stringify(value));
        }

        function applyLotteryBackup(payload) {
            writeBackupStorageValue(COLLECTION_KEY, payload.data.omikujiCollection);
            writeBackupStorageValue(COLLECTION_META_KEY, payload.data.omikujiCollectionMeta_v1);
            writeBackupStorageValue(LAST_OBTAINED_KEY, payload.data.omikujiLastObtained_v1);
            writeBackupStorageValue('lotteryState_v2', payload.data.lotteryState_v2);
            writeBackupStorageValue(SPECIAL_POOL_KEY, payload.data.specialPoolState_v1);
            migrateLegacyCollectionIfNeeded();
        }

        function syncActionButtonState() {
            remain = Math.max(0, MAX_DAILY_COUNT - currentState.count);
            remainCountSpan.textContent = remain;

            if (remain > 0) {
                drawBtn.disabled = false;
                drawBtn.textContent = '开启 (Open)';
            } else {
                drawBtn.disabled = true;
                drawBtn.textContent = '明日再来';
            }
        }

        function hideResultCard() {
            resultCard.style.display = 'none';
            resultDescBox.style.display = 'none';
            resultMeta.style.display = 'none';
            resultMeta.textContent = '';
            newBadge.style.display = 'none';
        }

        function refreshLotteryUIAfterImport() {
            syncThemeRewardUnlocks({ markNew: false, updateLastObtained: false, triggerAt: Date.now() });
            currentState = getDailyState();
            syncActionButtonState();
            hideResultCard();
            omikujiContainer.style.display = 'flex';
            renderActiveModalPanel({ autoFocusLatest: currentModalTab === 'collection' });
        }

        function isUnlockedByFilter(filterMode, isUnlocked) {
            if (filterMode === 'unlocked') {
                return isUnlocked;
            }
            if (filterMode === 'locked') {
                return !isUnlocked;
            }
            return true;
        }

        function updateFilterButtons() {
            collectionFilterButtons.forEach((button) => {
                button.classList.toggle('active', button.dataset.collectionFilter === currentCollectionFilter);
            });
        }

        function updateModalTabs() {
            modalTabButtons.forEach((button) => {
                button.classList.toggle('active', button.dataset.modalTab === currentModalTab);
            });
            modalPanels.forEach((panel) => {
                panel.classList.toggle('active', panel.dataset.modalPanel === currentModalTab);
            });
        }

        function setModalTab(tabKey) {
            currentModalTab = tabKey;
            updateModalTabs();
            renderActiveModalPanel();
        }

        function renderPreview(fortune) {
            const meta = migrateLegacyCollectionIfNeeded();
            const entry = meta[fortune.id] || null;
            const themeSet = fortune.themeSetId && omikujiCatalogApi && typeof omikujiCatalogApi.getThemeSetById === 'function'
                ? omikujiCatalogApi.getThemeSetById(fortune.themeSetId)
                : null;

            previewImage.src = fortune.icon;
            previewImage.alt = fortune.title;
            previewImage.onerror = () => {
                previewImage.onerror = null;
                previewImage.src = FALLBACK_IMAGE_URL;
            };
            const obtainedCount = entry ? entry.count : 0;
            previewTitle.innerHTML = `
                <span class="preview-title-main">${escapeHtml(fortune.title)}</span>
                <span class="preview-title-count">×${escapeHtml(obtainedCount)}</span>
            `;
            previewTitle.style.color = fortune.color;
            previewCard.style.borderColor = fortune.color;
            previewRarityBadge.textContent = fortune.rarity;
            previewRarityBadge.style.background = rarityColors[fortune.rarity] || fortune.color;
            previewDesc.textContent = fortune.desc;

            const metaRows = [
                { label: '获得次数', value: `×${obtainedCount}` }
            ];

            if (themeSet) {
                metaRows.push({ label: '所属套组', value: themeSet.title });
            }

            previewMeta.innerHTML = metaRows.map((row) => `
                <div class="preview-meta-row">
                    <span>${escapeHtml(row.label)}</span>
                    <strong>${escapeHtml(row.value)}</strong>
                </div>
            `).join('');
        }

        function openPreview(fortune) {
            const normalizedFortune = omikujiCatalogApi && typeof omikujiCatalogApi.getFortuneById === 'function'
                ? omikujiCatalogApi.getFortuneById(fortune.id)
                : fortune;
            if (!normalizedFortune) {
                return;
            }
            const meta = migrateLegacyCollectionIfNeeded();
            const entry = meta[normalizedFortune.id] || null;
            if (!entry) {
                return;
            }

            const previewedNow = entry ? markFortunePreviewed(normalizedFortune.id) : false;
            renderPreview(normalizedFortune);

            if (previewedNow && collectionModal.classList.contains('active')) {
                renderActiveModalPanel({ preserveScroll: true });
            }

            previewOverlay.classList.add('active');
        }

        function renderCollection(options = {}) {
            const { preserveScroll = false, autoFocusLatest = false } = options;
            const previousScrollTop = preserveScroll ? collectionModalContent.scrollTop : 0;
            const meta = migrateLegacyCollectionIfNeeded();
            const unlockedIds = getUnlockedIdsFromMeta(meta);
            const lastObtained = getLastObtained();
            collectionGrid.innerHTML = '';
            updateFilterButtons();

            let hasVisibleItem = false;

            rarityOrder.forEach((rarity) => {
                const items = collectionCatalog.filter((fortune) => fortune.rarity === rarity);
                if (!items.length) {
                    return;
                }

                const filteredItems = items.filter((fortune) => {
                    const entry = meta[fortune.id];
                    const isUnlocked = Boolean(entry && entry.count > 0);
                    return isUnlockedByFilter(currentCollectionFilter, isUnlocked);
                });

                if (!filteredItems.length) {
                    return;
                }

                hasVisibleItem = true;
                const section = document.createElement('div');
                section.className = 'rarity-section';

                const title = document.createElement('div');
                title.className = 'rarity-title';
                const unlockedInRarity = items.filter((fortune) => {
                    const entry = meta[fortune.id];
                    return Boolean(entry && entry.count > 0);
                }).length;
                title.innerHTML = `<span class="rarity-badge-small" style="background:${rarityColors[rarity] || 'var(--accent)'}">${escapeHtml(getRarityLabel(rarity))}</span> 收集进度：${unlockedInRarity}/${items.length}`;
                section.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'rarity-grid';

                filteredItems.forEach((fortune) => {
                    const entry = meta[fortune.id];
                    const isUnlocked = Boolean(entry && entry.count > 0);
                    const isLockedMr = fortune.rarity === 'MR' && !isUnlocked;
                    const div = document.createElement('div');
                    div.className = `collection-item ${isUnlocked ? 'unlocked' : 'locked'}`;
                    div.dataset.fortuneId = fortune.id;
                    if (lastObtained && lastObtained.id === fortune.id) {
                        div.classList.add('latest-target');
                    }
                    if (isUnlocked) {
                        div.style.borderColor = fortune.color || 'var(--accent)';
                    }

                    div.innerHTML = `
                        <div class="item-source">${escapeHtml(getSourceLabel(fortune))}</div>
                        ${isUnlocked && entry && entry.isNew ? '<div class="item-new-badge">新获得</div>' : ''}
                        ${isLockedMr
                            ? `<div class="item-icon mystery-icon">
                                <span class="collection-mystery-mark">謎</span>
                            </div>`
                            : `<div class="item-icon">
                                <img src="${escapeHtml(fortune.icon)}" alt="${escapeHtml(fortune.title)}" class="collection-icon-img">
                            </div>`}
                        <div class="item-title">${isUnlocked ? escapeHtml(fortune.title) : '???'}</div>
                        ${isUnlocked && entry ? `<div class="item-count">×${entry.count}</div>` : ''}
                        <div class="item-rarity" style="background:${escapeHtml(rarityColors[fortune.rarity] || fortune.color || 'var(--accent)')}">${escapeHtml(fortune.rarity)}</div>
                    `;

                    const itemImage = div.querySelector('.collection-icon-img');
                    if (itemImage) {
                        itemImage.addEventListener('error', () => {
                            itemImage.src = 'https://via.placeholder.com/40';
                        }, { once: true });
                    }

                    if (isUnlocked) {
                        div.addEventListener('click', () => openPreview(fortune));
                    }
                    grid.appendChild(div);
                });

                section.appendChild(grid);
                collectionGrid.appendChild(section);
            });

            if (!hasVisibleItem) {
                collectionGrid.innerHTML = '<div class="collection-empty">当前筛选下还没有对应卡片。</div>';
            }

            collectionStats.textContent = `总收集进度：${unlockedIds.length} / ${collectionCatalog.length}`;

            if (preserveScroll) {
                requestAnimationFrame(() => {
                    collectionModalContent.scrollTop = previousScrollTop;
                });
            } else if (autoFocusLatest) {
                requestAnimationFrame(() => {
                    const latestId = lastObtained && lastObtained.id;
                    if (!latestId) {
                        collectionModalContent.scrollTop = 0;
                        return;
                    }

                    const target = collectionGrid.querySelector(`[data-fortune-id="${latestId}"]`);
                    if (!target && currentCollectionFilter !== 'all') {
                        currentCollectionFilter = 'all';
                        renderCollection({ autoFocusLatest: true });
                        return;
                    }

                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else {
                        collectionModalContent.scrollTop = 0;
                    }
                });
            }
        }

        function renderThemeSets() {
            const meta = migrateLegacyCollectionIfNeeded();
            const playableThemeSets = themeSets.filter((themeSet) => !themeSet.excludeFromCompletionTotals);
            const placeholderThemeSets = themeSets.filter((themeSet) => themeSet.isPlaceholder);
            const completedSets = playableThemeSets.filter((themeSet) => {
                const progress = omikujiCatalogApi.getThemeSetProgress(meta, themeSet.id);
                return progress && progress.allCollected;
            }).length;

            const placeholderHint = placeholderThemeSets.length
                ? ` · ${placeholderThemeSets.map((themeSet) => `${themeSet.title}待开放`).join('，')}`
                : '';
            themeSetSummary.textContent = `已集齐 ${completedSets} / ${playableThemeSets.length} 套${placeholderHint}`;
            themeSetGrid.innerHTML = themeSets.map((themeSet) => {
                const progress = omikujiCatalogApi.getThemeSetProgress(meta, themeSet.id);
                if (!progress) {
                    return '';
                }

                if (progress.isPlaceholder) {
                    const memberMarkup = (progress.placeholderMembers || []).map((item, index) => `
                        <button type="button" class="theme-member locked" disabled>
                            <span class="theme-placeholder-thumb">${index + 1}</span>
                            <span class="theme-member-name">${escapeHtml(item && item.label ? item.label : '待开放成员')}</span>
                            <span class="theme-member-hint">${escapeHtml(item && item.hint ? item.hint : '待开放')}</span>
                        </button>
                    `).join('');
                    const placeholderReward = progress.placeholderReward || {};

                    return `
                        <article class="theme-set-card">
                            <div class="theme-card-header">
                                <h3 class="theme-card-title">${escapeHtml(themeSet.title)}</h3>
                                <div class="theme-status-tag">待开放</div>
                            </div>
                            <p class="theme-card-intro">${escapeHtml(themeSet.intro)}</p>
                            <div class="theme-member-grid">${memberMarkup}</div>
                            <div class="theme-reward-block">
                                <div class="theme-reward-header">
                                    <span class="theme-reward-label">终章奖励</span>
                                    <span class="theme-reward-state locked">${escapeHtml(placeholderReward.hint || '待开放')}</span>
                                </div>
                                <button type="button" class="theme-reward-card locked" disabled>
                                    <span class="theme-placeholder-thumb">终</span>
                                    <span class="theme-reward-name">${escapeHtml(placeholderReward.label || '终章占位')}</span>
                                    <span class="theme-reward-hint">${escapeHtml(placeholderReward.hint || '待开放')}</span>
                                </button>
                            </div>
                        </article>
                    `;
                }

                const rewardCard = omikujiCatalogApi.getFortuneById(themeSet.rewardCardId);
                const setCompleted = Boolean(progress.allCollected);
                const rewardUnlocked = Boolean(setCompleted && progress.rewardUnlocked);
                const rewardStateLabel = rewardUnlocked ? '终章已入藏' : '终章待解锁';

                const memberMarkup = themeSet.cardIds.map((cardId) => {
                    const card = omikujiCatalogApi.getFortuneById(cardId);
                    if (isMysteryFortune(card)) {
                        return `
                            <button type="button" class="theme-member mystery-card" disabled>
                                <span class="theme-placeholder-thumb theme-locked-thumb">謎</span>
                                <span class="theme-member-name">謎</span>
                            </button>
                        `;
                    }

                    const entry = meta[cardId];
                    const unlocked = Boolean(entry && entry.count > 0);
                    return `
                        <button type="button" class="theme-member ${unlocked ? 'unlocked' : 'locked'}" ${unlocked ? `data-theme-card-id="${escapeHtml(cardId)}"` : 'disabled'}>
                            ${unlocked
                                ? `<img class="theme-member-thumb" src="${escapeHtml(card.icon)}" alt="${escapeHtml(card.title)}">`
                                : '<span class="theme-placeholder-thumb theme-locked-thumb">?</span>'}
                            <span class="theme-member-name">${unlocked ? escapeHtml(card.title) : '???'}</span>
                        </button>
                    `;
                }).join('');

                return `
                    <article class="theme-set-card">
                        <div class="theme-card-header">
                            <h3 class="theme-card-title">${escapeHtml(themeSet.title)}</h3>
                            <div class="theme-progress-pill${themeSet.excludeFromCompletionTotals ? ' is-placeholder' : ''}">${progress.unlockedCount}/${progress.totalCount}</div>
                        </div>
                        <p class="theme-card-intro">${escapeHtml(themeSet.intro)}</p>
                        <div class="theme-member-grid">${memberMarkup}</div>
                        <div class="theme-reward-block">
                            <div class="theme-reward-header">
                                <span class="theme-reward-label">终章奖励</span>
                                <span class="theme-reward-state${rewardUnlocked ? '' : ' locked'}">${escapeHtml(rewardStateLabel)}</span>
                            </div>
                            <button type="button" class="theme-reward-card ${rewardUnlocked ? 'unlocked' : 'locked'}" ${rewardUnlocked ? `data-theme-card-id="${escapeHtml(themeSet.rewardCardId)}"` : 'disabled'}>
                                ${rewardUnlocked
                                    ? `<img class="theme-reward-thumb" src="${escapeHtml(rewardCard.icon)}" alt="${escapeHtml(rewardCard.title)}">`
                                    : '<span class="theme-placeholder-thumb theme-locked-thumb">謎</span>'}
                                <span class="theme-reward-name">${rewardUnlocked ? escapeHtml(rewardCard.title) : '终章剪影'}</span>
                            </button>
                        </div>
                    </article>
                `;
            }).join('');

            themeSetGrid.querySelectorAll('.theme-member-thumb, .theme-reward-thumb').forEach((image) => {
                image.addEventListener('error', () => {
                    const placeholder = document.createElement('span');
                    placeholder.className = 'theme-placeholder-thumb theme-locked-thumb';
                    placeholder.textContent = image.classList.contains('theme-reward-thumb') ? '终' : '?';
                    image.replaceWith(placeholder);
                }, { once: true });
            });
        }

        function renderActiveModalPanel(options = {}) {
            updateModalTabs();
            if (!collectionModal.classList.contains('active')) {
                return;
            }

            if (currentModalTab === 'collection') {
                renderCollection(options);
                return;
            }
            renderThemeSets();
        }

        function getResultMetaText(drawRecord, extras) {
            const parts = [];
            if (drawRecord.isDuplicate) {
                parts.push(`已获得 ${drawRecord.meta.count} 次`);
            }
            if (extras.unlockedThemeRewards.length > 0) {
                parts.push('套组终章卡已入藏');
            }
            if (extras.didUnlockColaTreat) {
                parts.push('已解锁柴犬互动：喂可乐');
            }
            return parts.join(' · ');
        }

        function renderResultCard(fortune, drawRecord, extras) {
            resultCard.style.borderColor = fortune.color || 'var(--accent-gold)';
            resultTitle.style.color = fortune.color || 'var(--ink-main)';
            resultTitle.style.borderColor = fortune.color || 'var(--line)';
            rarityBadge.textContent = fortune.rarity;
            rarityBadge.style.background = rarityColors[fortune.rarity] || fortune.color || 'var(--accent)';
            resultTitle.textContent = fortune.title;
            resultIcon.innerHTML = `<img src="${escapeHtml(fortune.icon)}" alt="${escapeHtml(fortune.title)}" class="icon-img">`;

            const resultImage = resultIcon.querySelector('img');
            if (resultImage) {
                resultImage.addEventListener('error', () => {
                    resultImage.src = FALLBACK_IMAGE_URL;
                }, { once: true });
            }

            resultDesc.textContent = fortune.desc;
            const metaText = getResultMetaText(drawRecord, extras);
            if (metaText) {
                resultMeta.textContent = metaText;
                resultMeta.style.display = 'block';
            } else {
                resultMeta.textContent = '';
                resultMeta.style.display = 'none';
            }

            resultCard.style.display = 'block';
            resultDescBox.style.display = 'block';
            newBadge.style.display = drawRecord.isNew ? 'flex' : 'none';
        }

        function drawFortune() {
            const rarityRates = {
                KR: 2,
                UR: 4,
                SSR: 15,
                SR: 35,
                R: 44
            };

            const rand = Math.random() * 100;
            let cumulative = 0;
            let selectedRarity = 'R';

            for (const rarity in rarityRates) {
                cumulative += rarityRates[rarity];
                if (rand < cumulative) {
                    selectedRarity = rarity;
                    break;
                }
            }

            const pool = fortunes.filter((fortune) => fortune.rarity === selectedRarity && !fortune.isSpecial);

            if (!pool.length) {
                const normalPool = fortunes.filter((fortune) => !fortune.isSpecial);
                return normalPool[Math.floor(Math.random() * normalPool.length)];
            }

            const totalWeight = pool.reduce((sum, item) => sum + (item.weight || 1), 0);
            let randomWeight = Math.random() * totalWeight;

            for (const fortune of pool) {
                const weight = fortune.weight || 1;
                if (randomWeight < weight) {
                    return fortune;
                }
                randomWeight -= weight;
            }

            return pool[0];
        }

        function drawSpecialFortune() {
            const specialPool = fortunes.filter((fortune) => fortune.isSpecial);
            if (!specialPool.length) {
                return drawFortune();
            }

            const totalWeight = specialPool.reduce((sum, item) => sum + (item.weight || 1), 0);
            let randomWeight = Math.random() * totalWeight;

            for (const fortune of specialPool) {
                const weight = fortune.weight || 1;
                if (randomWeight < weight) {
                    return fortune;
                }
                randomWeight -= weight;
            }

            return specialPool[0];
        }

        function drawFortuneWithSpecialPool() {
            const specialState = getSpecialPoolState();

            if (specialState.specialHit) {
                specialState.totalDraws += 1;
                saveSpecialPoolState(specialState);
                return drawFortune();
            }

            const nextDrawIndex = specialState.totalDraws + 1;
            let shouldHitSpecial = false;

            if (nextDrawIndex === 10) {
                shouldHitSpecial = true;
            } else if (nextDrawIndex < 10) {
                const earlyRates = {
                    1: 0.03,
                    2: 0.04,
                    3: 0.05,
                    4: 0.06,
                    5: 0.08,
                    6: 0.10,
                    7: 0.12,
                    8: 0.15,
                    9: 0.20
                };
                shouldHitSpecial = Math.random() < (earlyRates[nextDrawIndex] || 0);
            }

            specialState.totalDraws += 1;

            if (shouldHitSpecial) {
                specialState.specialHit = true;
                saveSpecialPoolState(specialState);
                return drawSpecialFortune();
            }

            saveSpecialPoolState(specialState);
            return drawFortune();
        }

        function handleDrawResult() {
            if (remain <= 0) {
                return;
            }

            hideResultCard();
            omikujiContainer.style.display = 'flex';
            
            // 阶段 1: 摇晃签筒
            omikujiContainer.classList.add('shaking');
            drawBtn.disabled = true;
            drawBtn.textContent = '摇晃中...';

            window.setTimeout(() => {
                const randomFortune = drawFortuneWithSpecialPool();
                // 设置弹出竹签上的文字显示
                document.getElementById('stickText').textContent = randomFortune.rarity || '吉';

                // 阶段 2: 弹出竹签
                omikujiContainer.classList.remove('shaking');
                omikujiContainer.classList.add('drawing');
                drawBtn.textContent = '神笺显现...';

                window.setTimeout(() => {
                    // 阶段 3: 揭晓结果 (移除竹签并展开卡片)
                    omikujiContainer.classList.remove('drawing');
                    omikujiContainer.style.display = 'none';

                    const drawRecord = grantFortune(randomFortune);
                    const unlockedThemeRewards = syncThemeRewardUnlocks({
                        markNew: true,
                        updateLastObtained: true,
                        triggerAt: Date.now()
                    });
                    const didUnlockColaTreat = randomFortune.id === COLA_FORTUNE_ID
                        ? unlockPetInteraction(COLA_TREAT_UNLOCK_ID)
                        : false;

                    renderResultCard(randomFortune, drawRecord, {
                        didUnlockColaTreat,
                        unlockedThemeRewards
                    });

                    currentState.count += 1;
                    saveDailyState(currentState.count);
                    syncActionButtonState();

                    if (homePetController && typeof homePetController.reactToLotteryResult === 'function') {
                        homePetController.reactToLotteryResult({
                            title: randomFortune.title,
                            rarity: randomFortune.rarity,
                            isNew: drawRecord.isNew,
                            isDuplicate: drawRecord.isDuplicate,
                            didUnlockColaTreat,
                            isRare: /SSR|SP|EX|限定|隐藏|隱藏|稀有|超吉|大吉|レア|rare/i.test(`${randomFortune.title} ${randomFortune.rarity}`)
                        });
                    }

                    if (collectionModal.classList.contains('active')) {
                        renderActiveModalPanel({ autoFocusLatest: currentModalTab === 'collection' });
                    }
                }, 800); // 等待竹签弹出的动画结束
            }, 1200); // 摇晃动作持续 1.2 秒
        }

        openCollectionBtn.addEventListener('click', () => {
            collectionModal.classList.add('active');
            renderActiveModalPanel({ autoFocusLatest: currentModalTab === 'collection' });
        });

        exportCollectionBtn.addEventListener('click', async () => {
            const payload = buildLotteryBackupPayload();
            const { file } = createLotteryBackupFile(payload);
            const shareResult = await shareLotteryBackup(file);

            if (shareResult === 'shared') {
                showBackupToast('存档已准备好，可保存到“文件”');
                return;
            }

            if (shareResult === 'cancelled') {
                return;
            }

            downloadLotteryBackup(payload);
            showBackupToast('存档文件已导出');
        });

        importCollectionBtn.addEventListener('click', () => {
            promptImportLotteryBackup();
        });

        closeCollectionBtn.addEventListener('click', () => {
            collectionModal.classList.remove('active');
        });

        collectionModal.addEventListener('click', (event) => {
            if (event.target === collectionModal) {
                collectionModal.classList.remove('active');
            }
        });

        modalTabButtons.forEach((button) => {
            button.addEventListener('click', () => {
                setModalTab(button.dataset.modalTab || 'collection');
            });
        });

        collectionFilterButtons.forEach((button) => {
            button.addEventListener('click', () => {
                currentCollectionFilter = button.dataset.collectionFilter || 'all';
                renderCollection();
            });
        });

        themeSetGrid.addEventListener('click', (event) => {
            const cardButton = event.target.closest('[data-theme-card-id]');
            if (!cardButton) {
                return;
            }
            const fortune = omikujiCatalogApi.getFortuneById(cardButton.dataset.themeCardId);
            if (fortune) {
                openPreview(fortune);
            }
        });

        previewClose.addEventListener('click', () => {
            previewOverlay.classList.remove('active');
        });

        previewOverlay.addEventListener('click', (event) => {
            if (event.target === previewOverlay) {
                previewOverlay.classList.remove('active');
            }
        });

        backupImportInput.addEventListener('change', async (event) => {
            const [file] = Array.from(event.target.files || []);
            if (!file) {
                return;
            }

            try {
                const text = await file.text();
                const parsed = parseLotteryBackup(text);
                const payload = validateLotteryBackup(parsed);
                const shouldImport = window.confirm('导入后会覆盖当前本地数据记录，确定继续吗？');
                if (!shouldImport) {
                    return;
                }

                applyLotteryBackup(payload);
                refreshLotteryUIAfterImport();
                showBackupToast('数据记录已恢复');
            } catch (error) {
                showBackupToast(error && error.message ? error.message : '导入失败', 'error');
            } finally {
                event.target.value = '';
            }
        });

        drawBtn.addEventListener('click', handleDrawResult);
        omikujiContainer.addEventListener('click', () => {
            if (!drawBtn.disabled) {
                drawBtn.click();
            }
        });

        currentState = getDailyState();
        migrateLegacyCollectionIfNeeded();
        syncThemeRewardUnlocks({ markNew: false, updateLastObtained: false, triggerAt: Date.now() });
        syncActionButtonState();
        renderCollection();
        renderThemeSets();
    </script>
</body>
</html>
