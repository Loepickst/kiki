<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文法練習 - kiki的日语小窝</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500&display=swap');

        :root {
            /* --- 统一使用阅读模版的配色 --- */
            --bg-color: #fdfaf5;       /* 米色背景 */
            --paper-color: #ffffff;    /* 卡片/纸张背景 */
            --text-color: #2c2c2c;     /* 深灰文字 */
            --accent-color: #b33e3e;   /* 茜色点缀 */
            --sub-color: #787878;      /* 辅助文字颜色 */
            --shadow: rgba(0,0,0,0.05); /* 柔和阴影 */
            
            /* 为不同类型的练习设定代表色 - 保留原有但稍微调整以适配新风格 */
            --particle-color: #4fc3f7; /* 助词 - 清新蓝 */
            --verb-color: #81c784;     /* 动词 - 生机绿 */
            --keigo-color: #ffb74d;    /* 敬语 - 温暖橙 */
        }

        body {
            font-family: "Hiragino Sans", "Meiryo", "Microsoft YaHei", -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 顶部导航栏 - 统一风格 */
        header {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            background-color: rgba(253, 250, 245, 0.95); /* 模版同款背景 */
            backdrop-filter: blur(8px);
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.05); /* 增加底部分割线 */
        }

        .back-btn {
            position: absolute;
            left: 20px;
            text-decoration: none;
            color: var(--text-color);
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        .back-btn:hover { opacity: 1; }

        h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
        }

        /* 练习列表容器 */
        .practice-container {
            width: 88%;
            max-width: 460px;
            padding: 30px 0 50px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 练习卡片样式 */
        .practice-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px 22px; 
            text-decoration: none;
            color: var(--text-color);
            box-shadow: 0 2px 8px var(--shadow), 0 8px 16px -4px var(--shadow);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            border: 1px solid transparent;
        }

        .practice-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px -6px var(--shadow);
        }

        /* 悬停边框颜色 */
        .card-particle:hover { border-color: rgba(79, 195, 247, 0.4); }
        .card-verb:hover { border-color: rgba(129, 199, 132, 0.4); }
        .card-keigo:hover { border-color: rgba(255, 183, 77, 0.4); }

        /* 禁用状态 */
        .disabled {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(80%);
            box-shadow: none;
        }

        /* 左侧内容区 */
        .practice-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 85%;
        }

        /* 类型标签 */
        .type-tag {
            font-size: 11px;
            font-weight: 700;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
            width: fit-content;
            letter-spacing: 0.5px;
        }
        .tag-particle { background: linear-gradient(135deg, var(--particle-color), #81d4fa); }
        .tag-verb { background: linear-gradient(135deg, var(--verb-color), #a5d6a7); }
        .tag-keigo { background: linear-gradient(135deg, var(--keigo-color), #ffcc80); }

        .practice-title {
            font-size: 17px;
            font-weight: 700;
            margin: 0;
            line-height: 1.4;
        }

        /* 练习详情描述 */
        .practice-desc {
            font-size: 12px;
            color: #777;
            margin: 0;
            line-height: 1.5;
        }

        /* 右侧图标 */
        .enter-icon {
            font-size: 22px;
            opacity: 0.8;
            transition: transform 0.2s;
        }

        .practice-card:hover .enter-icon {
            transform: scale(1.15) rotate(5deg);
        }

        /* 背景光晕 */
        .practice-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
        }
        .card-particle:hover::before { opacity: 0.05; background: linear-gradient(to right, var(--particle-color), transparent); }
        .card-verb:hover::before { opacity: 0.05; background: linear-gradient(to right, var(--verb-color), transparent); }
        .card-keigo:hover::before { opacity: 0.05; background: linear-gradient(to right, var(--keigo-color), transparent); }

        footer {
            margin-top: auto;
            padding: 30px;
            font-size: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">← Home</a>
        <h1>文法練習</h1>
    </header>

    <div class="practice-container">

        <!-- 暂时不可用 -->
        <a href="javascript:void(0)" class="practice-card card-particle disabled">
            <div class="practice-info">
                <span class="type-tag tag-particle">助詞</span>
                <h2 class="practice-title">格助詞の特訓 (準備中)</h2>
                <p class="practice-desc">针对格助词本身的用法进行针对性练习，排除固定语法搭配的干扰。</p>
            </div>
            <div class="enter-icon">🚧</div>
        </a>

        <a href="/grammer/动词变形.html" class="practice-card card-verb">
            <div class="practice-info">
                <span class="type-tag tag-verb">活用</span>
                <h2 class="practice-title">動詞の活用練習</h2>
                <p class="practice-desc">动词第一连用形、意志形、能动态、被动态、使役态、ない形、た形、ている形专项巩固。</p>
            </div>
            <div class="enter-icon">🔄</div>
        </a>

        <a href="/grammer/敬语.html" class="practice-card card-keigo">
            <div class="practice-info">
                <span class="type-tag tag-keigo">敬語</span>
                <h2 class="practice-title">敬語の特訓</h2>
                <p class="practice-desc">尊敬語、謙譲語、丁寧語の使い分けをマスターする。</p>
            </div>
            <div class="enter-icon">🙇</div>
        </a>

    </div>

    <footer>
        © 2026 kiki's Japanese Corner
    </footer>

</body>
</html>
