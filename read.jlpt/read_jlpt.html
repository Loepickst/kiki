<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能力考阅读鉴赏</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500&display=swap');

        :root {
            --bg-color: #fdfaf5;
            --paper-color: #ffffff;
            --text-color: #2c2c2c;
            --accent-color: #b33e3e;
            --shadow: rgba(0,0,0,0.05);
            --n1-color: #e57373; 
            --n2-color: #ff8a65; 
            --n3-color: #81c784;
            --sub-color: #787878;
        }

        body {
            font-family: "Hiragino Sans", "Meiryo", "Microsoft YaHei", -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(253, 250, 245, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .back-btn {
            position: absolute;
            left: 20px;
            text-decoration: none;
            color: var(--text-color);
            font-size: 16px;
            font-weight: bold;
            opacity: 0.7;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        .back-btn:hover { opacity: 1; }

        h1 { margin: 0; font-size: 20px; font-weight: 700; }

        .container {
            width: 90%;
            max-width: 600px;
            padding: 20px 0 50px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Level Selection Cards (Based on read.html) */
        .level-card {
            background: var(--paper-color); 
            padding: 25px; 
            border-radius: 12px;
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 4px 15px var(--shadow); 
            transition: 0.3s; 
            border-left: 6px solid transparent;
            text-decoration: none;
            color: var(--text-color);
        }
        .level-card:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        
        .level-content { display: flex; align-items: center; gap: 20px; }
        .level-icon {
            font-size: 28px; width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            font-weight: bold; color: white;
        }
        .level-text h3 { margin: 0 0 6px; font-size: 18px; font-weight: bold; }
        .level-text p { margin: 0; font-size: 13px; color: var(--sub-color); }
        .level-arrow { font-size: 20px; color: #ddd; font-weight: bold; }

        /* Article List Styles */
        .article-card {
            background-color: var(--paper-color);
            border-radius: 4px;
            padding: 25px;
            text-decoration: none;
            color: var(--text-color);
            box-shadow: 0 4px 20px var(--shadow);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column; 
            gap: 10px;
            border-left: 4px solid var(--accent-color); 
        }

        .article-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #999;
            font-family: sans-serif;
        }

        .level-tag {
            padding: 2px 8px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            font-size: 11px;
        }
        .n1 { background-color: var(--n1-color); }
        .n2 { background-color: var(--n2-color); }
        .n3 { background-color: var(--n3-color); }

        .article-title {
            font-size: 18px;
            font-weight: bold;
            margin: 0;
            line-height: 1.4;
        }

        .article-desc {
            font-size: 13px;
            opacity: 0.8;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        footer {
            margin-top: auto;
            padding: 30px;
            font-size: 12px;
            opacity: 0.6;
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="back-btn" onclick="handleBack()">← <span id="backText">Menu</span></div>
        <h1 id="pageTitle">能力考阅读鉴赏</h1>
    </header>

    <!-- View 1: Level Selection -->
    <div id="levelSelectView" class="container">
        <div style="text-align:center; margin-bottom:10px; color:#999; font-size:0.9rem;">请选择考试级别</div>
        
        <div class="level-card" onclick="selectLevel('N1')" style="border-left-color: var(--n1-color);">
            <div class="level-content">
                <div class="level-icon" style="background: var(--n1-color);">N1</div>
                <div class="level-text">
                    <h3>N1 読解真題</h3>
                    <p>高级逻辑文章、抽象评论、长篇论说</p>
                </div>
            </div>
            <div class="level-arrow">➜</div>
        </div>

        <div class="level-card" onclick="selectLevel('N2')" style="border-left-color: var(--n2-color);">
            <div class="level-content">
                <div class="level-icon" style="background: var(--n2-color);">N2</div>
                <div class="level-text">
                    <h3>N2 読解真題</h3>
                    <p>中长篇文章、统合理解、主张理解</p>
                </div>
            </div>
            <div class="level-arrow">➜</div>
        </div>

        <!-- N3 Placeholder -->
        <div class="level-card" onclick="selectLevel('N3')" style="border-left-color: var(--n3-color); opacity: 0.6;">
            <div class="level-content">
                <div class="level-icon" style="background: var(--n3-color);">N3</div>
                <div class="level-text">
                    <h3>N3 読解真題</h3>
                    <p>日常话题、基础长文 (建设中...)</p>
                </div>
            </div>
            <div class="level-arrow">➜</div>
        </div>
    </div>

    <!-- View 2: Article List -->
    <div id="articleListView" class="container hidden">
        <div id="articleContainer"></div>
        <div style="text-align:center; color:#999; padding:20px;">
            🚧 更多真题正在整理中...
        </div>
    </div>

    <footer>
        © kiki's Japanese Corner
    </footer>

    <script>
        // --- Mock Data ---
        const articles = [
            {
                id: 1,
                level: 'N2',
                title: '【読解】中長文練習 - A',
                desc: '（此处将显示N2能力考真题的阅读练习内容...）',
                tag: 'N2 读解',
                link: '#'
            },
            {
                id: 3,
                level: 'N1',
                title: '教育と社会を哲学する',
                desc: 'まず、教育とは何か、ということから考えてみよう。さしあたってぼくは、教育とは、子どもを「社会の成員(大人)としてふさわしい存在」へと育て上げていくこと、と定義してみたい。',
                tag: 'N1 2012.12',
                link: '2012.12-1.html'
            }
        ];

        // --- View Logic ---
        const levelView = document.getElementById('levelSelectView');
        const listView = document.getElementById('articleListView');
        const pageTitle = document.getElementById('pageTitle');
        const backText = document.getElementById('backText');
        
        let currentLevel = null;

        function selectLevel(level) {
            currentLevel = level;
            
            // Filter Data
            const filtered = articles.filter(a => a.level === level);
            
            // Render
            const container = document.getElementById('articleContainer');
            if (filtered.length > 0) {
                container.innerHTML = filtered.map(item => `
                    <a href="${item.link}" class="article-card" style="border-left-color: var(--${item.level.toLowerCase()}-color);">
                        <div class="card-header">
                            <span>${item.level} 真题</span>
                            <span class="level-tag ${item.level.toLowerCase()}">${item.tag}</span>
                        </div>
                        <h2 class="article-title">${item.title}</h2>
                        <p class="article-desc">${item.desc}</p>
                    </a>
                `).join('');
            } else {
                container.innerHTML = `<div style="text-align:center; padding:40px; color:#aaa;">暂无 ${level} 相关文章</div>`;
            }

            // Switch View
            levelView.classList.add('hidden');
            listView.classList.remove('hidden');
            
            // Update Header
            pageTitle.innerText = `${level} 読解リスト`;
            backText.innerText = 'Levels';
            window.scrollTo(0, 0);
        }

        function handleBack() {
            if (!listView.classList.contains('hidden')) {
                // Back to Level Select
                listView.classList.add('hidden');
                levelView.classList.remove('hidden');
                pageTitle.innerText = '能力考阅读鉴赏';
                backText.innerText = 'Menu';
                currentLevel = null;
            } else {
                // Back to Main Menu
                window.location.href = '../read.html';
            }
        }
    </script>

</body>
</html>
