<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f4f7f1">
    <title>2026年7月运势 | kiji</title>
    <style>
        :root {
            --page: #ffffff;
            --soft: #f4f7f1;
            --card: #fffefa;
            --text: #30322d;
            --secondary: #666a62;
            --muted: #92968d;
            --green: #6f8a55;
            --green-dark: #465d39;
            --green-soft: #eaf0e4;
            --orange: #c97848;
            --orange-soft: #fbefe5;
            --border: #e2e5dc;
            --shadow: 0 8px 24px rgba(49, 57, 46, 0.06);
            --ui-font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "PingFang SC", "Yu Gothic UI", sans-serif;
            --display-font: "Hiragino Mincho ProN", "Yu Mincho", "Songti SC", serif;
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: var(--soft);
        }

        body {
            min-width: 320px;
            min-height: 100vh;
            margin: 0;
            background: var(--page);
            color: var(--text);
            font-family: var(--ui-font);
            -webkit-font-smoothing: antialiased;
        }

        button,
        a {
            -webkit-tap-highlight-color: transparent;
        }

        button {
            font: inherit;
        }

        .fortune-app {
            min-height: 100vh;
            background: var(--page);
        }

        .fortune-header {
            position: sticky;
            z-index: 20;
            top: 0;
            display: grid;
            grid-template-columns: 44px minmax(0, 1fr) 44px;
            align-items: center;
            min-height: 62px;
            padding: max(7px, env(safe-area-inset-top)) 12px 7px;
            border-bottom: 1px solid rgba(70, 93, 57, 0.1);
            background: rgba(248, 250, 247, 0.96);
            backdrop-filter: blur(12px);
        }

        .fortune-back {
            display: grid;
            place-items: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: var(--green-dark);
            font-size: 23px;
            line-height: 1;
            text-decoration: none;
        }

        .fortune-back:active {
            background: var(--green-soft);
        }

        .fortune-header-title {
            display: grid;
            gap: 1px;
            text-align: center;
        }

        .fortune-header-title strong {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.35;
        }

        .fortune-header-title small {
            color: var(--muted);
            font-size: 9px;
            font-weight: 500;
        }

        .fortune-header-mark {
            display: grid;
            place-items: center;
            color: var(--orange);
            font-family: var(--display-font);
            font-size: 22px;
        }

        .fortune-main {
            display: grid;
            gap: 22px;
            padding: 22px 16px calc(34px + env(safe-area-inset-bottom));
        }

        .fortune-intro {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: end;
            gap: 16px;
            padding: 2px 2px 0;
        }

        .fortune-intro-copy {
            display: grid;
            gap: 6px;
        }

        .fortune-eyebrow {
            margin: 0;
            color: var(--green);
            font-size: 10px;
            font-weight: 700;
        }

        .fortune-intro h1 {
            margin: 0;
            font-family: var(--display-font);
            font-size: 27px;
            font-weight: 600;
            line-height: 1.35;
        }

        .fortune-intro p {
            margin: 0;
            color: var(--secondary);
            font-size: 11px;
            line-height: 1.65;
        }

        .fortune-month-seal {
            display: grid;
            place-items: center;
            width: 62px;
            height: 62px;
            border: 1px solid rgba(111, 138, 85, 0.22);
            border-radius: 14px;
            background: var(--soft);
            color: var(--green-dark);
            font-family: var(--display-font);
        }

        .fortune-month-seal strong {
            font-size: 24px;
            font-weight: 500;
        }

        .fortune-month-seal small {
            margin-left: 2px;
            font-size: 10px;
        }

        .sign-section {
            display: grid;
            gap: 10px;
        }

        .section-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0 2px;
        }

        .section-label strong {
            font-size: 13px;
            font-weight: 700;
        }

        .section-label small {
            color: var(--muted);
            font-size: 9.5px;
        }

        .sign-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 7px;
        }

        .sign-button {
            display: grid;
            place-items: center;
            gap: 2px;
            min-width: 0;
            min-height: 57px;
            padding: 6px 3px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #ffffff;
            color: var(--secondary);
            cursor: pointer;
        }

        .sign-button .symbol {
            color: var(--green);
            font-family: "Times New Roman", serif;
            font-size: 17px;
            font-variant-emoji: text;
            line-height: 1;
        }

        .sign-button .name {
            overflow: hidden;
            max-width: 100%;
            font-size: 9px;
            font-weight: 600;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .sign-button[aria-current="true"] {
            border-color: rgba(111, 138, 85, 0.52);
            background: var(--green-soft);
            color: var(--green-dark);
            box-shadow: 0 3px 10px rgba(70, 93, 57, 0.08);
        }

        .reading-card {
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 13px;
            background: var(--card);
            box-shadow: var(--shadow);
        }

        .reading-head {
            display: grid;
            grid-template-columns: 50px minmax(0, 1fr);
            align-items: center;
            gap: 12px;
            padding: 18px 18px 15px;
        }

        .reading-symbol {
            display: grid;
            place-items: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--green-soft);
            color: var(--green-dark);
            font-family: "Times New Roman", serif;
            font-size: 24px;
            font-variant-emoji: text;
        }

        .reading-heading {
            display: grid;
            gap: 3px;
            min-width: 0;
        }

        .reading-heading h2 {
            margin: 0;
            font-family: var(--display-font);
            font-size: 22px;
            font-weight: 600;
            line-height: 1.35;
        }

        .reading-heading p {
            margin: 0;
            color: var(--muted);
            font-size: 10px;
        }

        .category-tabs {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            margin: 0 14px;
            padding: 3px;
            border-radius: 9px;
            background: #f2f3ef;
        }

        .category-tabs button {
            position: relative;
            min-height: 39px;
            border: 0;
            border-radius: 7px;
            background: transparent;
            color: var(--secondary);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }

        .category-tabs button[aria-selected="true"] {
            background: #ffffff;
            color: var(--green-dark);
            box-shadow: 0 2px 7px rgba(49, 57, 46, 0.08);
        }

        .fortune-copy {
            display: grid;
            gap: 13px;
            min-height: 215px;
            padding: 20px 19px 22px;
        }

        .fortune-copy-label {
            display: flex;
            align-items: center;
            gap: 7px;
            color: var(--green-dark);
            font-size: 10px;
            font-weight: 700;
        }

        .fortune-copy-label::before {
            content: "";
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--orange);
        }

        .fortune-copy .fortune-original {
            margin: 0;
            color: #343730;
            font-family: var(--display-font);
            font-size: 15.5px;
            font-weight: 500;
            line-height: 1.95;
        }

        .fortune-translation {
            margin-top: 2px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        .fortune-translation p {
            margin: 0;
            color: #73786f;
            font-family: var(--ui-font);
            font-size: 12.5px;
            font-weight: 400;
            line-height: 1.82;
        }

        .fortune-copy.is-changing {
            opacity: 0.45;
            transform: translateY(2px);
        }

        .fortune-note {
            margin: -7px 4px 0;
            color: var(--muted);
            font-size: 9px;
            line-height: 1.6;
            text-align: center;
        }

        :focus-visible {
            outline: 2px solid rgba(111, 138, 85, 0.7);
            outline-offset: 2px;
        }

        @media (min-width: 700px) {
            body {
                padding: 24px 0;
                background: var(--soft);
            }

            .fortune-app {
                width: min(100%, 480px);
                min-height: calc(100vh - 48px);
                margin: 0 auto;
                overflow: hidden;
                border: 1px solid var(--border);
                border-radius: 18px;
                box-shadow: 0 18px 55px rgba(49, 57, 46, 0.12);
            }
        }

        @media (prefers-reduced-motion: no-preference) {
            .fortune-copy {
                transition: opacity 120ms ease, transform 120ms ease;
            }

            .sign-button,
            .category-tabs button {
                transition: background-color 140ms ease, border-color 140ms ease, color 140ms ease, box-shadow 140ms ease;
            }
        }
    </style>
</head>

            const signGrid = document.querySelector("[data-sign-grid]");
            const symbol = document.querySelector("[data-reading-symbol]");
            const signName = document.querySelector("[data-reading-name]");
            const signDates = document.querySelector("[data-reading-dates]");
            const copy = document.querySelector("[data-fortune-copy]");
            const copyLabel = document.querySelector("[data-copy-label]");
            const copyText = document.querySelector("[data-copy-text]");
            const copyTranslation = document.querySelector("[data-copy-translation]");
            const categoryButtons = Array.from(document.querySelectorAll("[data-category]"));
            let activeSignId = "aries";
            let activeCategory = "work";

            try {
                const stored = JSON.parse(localStorage.getItem(preferenceKey) || "null");
                if (stored && fortunes.some((item) => item.id === stored.signId)) {
                    activeSignId = stored.signId;
                }
                if (stored && Object.hasOwn(categoryLabels, stored.category)) {
                    activeCategory = stored.category;
                }
            } catch (error) {
                // Defaults remain available when storage is blocked.
            }

            function savePreference() {
                try {
                    localStorage.setItem(preferenceKey, JSON.stringify({ signId: activeSignId, category: activeCategory }));
                } catch (error) {
                    // The page remains fully usable without persistence.
                }
            }

            function render(animate = true) {
                const active = fortunes.find((item) => item.id === activeSignId) || fortunes[0];
                if (animate) copy.classList.add("is-changing");
                window.setTimeout(() => {
                    symbol.textContent = `${active.symbol}\uFE0E`;
                    signName.textContent = active.name;
                    signDates.textContent = active.dates;
                    copyLabel.textContent = categoryLabels[activeCategory];
                    copyText.textContent = active[activeCategory];
                    copyTranslation.textContent = translations[active.id][activeCategory];
                    signGrid.querySelectorAll("button").forEach((button) => {
                        button.setAttribute("aria-current", String(button.dataset.signId === activeSignId));
                    });
                    categoryButtons.forEach((button) => {
                        button.setAttribute("aria-selected", String(button.dataset.category === activeCategory));
                    });
                    copy.classList.remove("is-changing");
                    savePreference();
                }, animate ? 90 : 0);
            }

            fortunes.forEach((item) => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "sign-button";
                button.dataset.signId = item.id;
                button.setAttribute("aria-label", `${item.name} ${item.dates}`);
                button.innerHTML = `<span class="symbol" aria-hidden="true">${item.symbol}\uFE0E</span><span class="name">${item.name.replace("座", "")}</span>`;
                button.addEventListener("click", () => {
                    activeSignId = item.id;
                    render();
                });
                signGrid.append(button);
            });

            categoryButtons.forEach((button) => {
                button.addEventListener("click", () => {
                    activeCategory = button.dataset.category;
                    render();
                });
            });

            render(false);
        })();
