<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本の昔話 - kiki的日语小窝</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500&display=swap');

        :root {
            --bg-color: #fdfaf5;
            --paper-color: #ffffff;
            --text-color: #2c2c2c;
            /* 使用紫色作为民间故事的主题色 */
            --accent-color: #ab47bc;
            --sub-color: #787878;
            --shadow: rgba(0,0,0,0.05);
            --n5-color: #81c784; 
            --n4-color: #aed581;
            --n3-color: #ffb74d; 
            --n2-color: #ff8a65;
            --n1-color: #e57373; 
        }

        body {
            font-family: "Hiragino Sans", "Meiryo", "Microsoft YaHei", -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(253, 250, 245, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .back-btn {
            position: absolute;
            left: 20px;
            text-decoration: none;
            color: var(--text-color);
            font-size: 16px;
            font-weight: bold;
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        .back-btn:hover { opacity: 1; }

        h1 { margin: 0; font-size: 20px; font-weight: 700; }

        .article-list {
            width: 90%;
            max-width: 600px;
            padding: 20px 0 50px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .article-card {
            background-color: var(--paper-color);
            border-radius: 4px;
            padding: 25px;
            text-decoration: none;
            color: var(--text-color);
            box-shadow: 0 4px 20px var(--shadow);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column; 
            gap: 10px;
            border-left: 4px solid var(--accent-color); 
        }

        .article-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #999;
            font-family: sans-serif;
        }

        .level-tag {
            padding: 2px 8px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            font-size: 11px;
        }
        .n5 { background-color: var(--n5-color); }
        .n4 { background-color: var(--n4-color); }
        .n3 { background-color: var(--n3-color); }
        .n2 { background-color: var(--n2-color); }
        .n1 { background-color: var(--n1-color); }

        .article-title {
            font-size: 18px;
            font-weight: bold;
            margin: 0;
            line-height: 1.4;
        }

        .article-desc {
            font-size: 13px;
            opacity: 0.8;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        footer {
            margin-top: auto;
            padding: 30px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <header>
        <a href="../read.html" class="back-btn">← Menu</a>
        <h1>日本の昔話</h1>
    </header>

    <div class="article-list">
        <a href="yao.html" class="article-card">
            <div class="card-header">
                <span>伝説の物語</span>
                <span class="level-tag n2">N2 中級</span>
            </div>
            <h2 class="article-title">八百比丘尼 (やおびくに)</h2>
            <p class="article-desc">若狭の国の古いほら穴には、人魚の肉を食べた女が八百才まで生きて身を隠したとの言い伝えがあります...</p>
        </a>

        <!-- 示例文章卡片 -->
        <div style="text-align: center; color: #999; font-size: 12px; margin-top: 20px;">
            もっと物語を追加予定...
        </div>
    </div>

    <footer>
        © kiki's Japanese Corner
    </footer>

</body>
</html>
