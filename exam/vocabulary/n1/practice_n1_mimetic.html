<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>擬音語・擬態語 - 練習</title>
    <!-- 引入优雅的衬线与无衬线字体，契合文字游戏与沉浸阅读风格 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+JP:wght@400;600&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    <style>
        html {
            -webkit-text-size-adjust: 100%;
        }

        :root {
            /* === 暖光理性辅导 ADV / 护眼原木色调色板 === */
            --bg-grad-start: #FDFBF7;      /* 暖白书页色 */
            --bg-grad-end: #F6EFE9;        /* 晨光浅杏色 */
            
            --panel-bg: rgba(255, 255, 255, 0.9); /* 明亮半透明文本框 */
            --panel-border: rgba(210, 195, 180, 0.6); /* 柔和纸质边框 */
            
            --text-strong: #3F3732;        /* 强调标题/关键正文 */
            --text-main: #4A423E;          /* 主文本（深咖啡/墨褐，比纯黑更护眼） */
            --text-secondary: #625851;     /* 次正文（稳定可读） */
            --text-tertiary: #7E736B;      /* 弱提示（不再用 opacity 偷淡） */
            --text-ruby: #726861;          /* 注音/小标注 */
            --text-dim: var(--text-tertiary);
            --text-accent: #C27A62;        /* 剧情高亮色（赤陶橘，温暖理性中带着热情） */
            
            --accent-green: #5C946E;       /* 沉稳森绿（正确/成功） */
            --accent-red: #D16B6B;         /* 柔和朱红（错误/警示） */
            --accent-gold: #D9A05B;        /* 柔和雅金（特殊焦点） */
            --accent-hover: rgba(194, 122, 98, 0.08); /* 暖橘悬浮背景 */

            --glass-blur: blur(12px);      /* 毛玻璃滤镜 */
            --shadow-soft: 0 8px 24px rgba(180, 160, 145, 0.15); /* 浅色暖光阴影 */
            --shadow-glow: 0 0 12px rgba(194, 122, 98, 0.2); /* 橘色微光晕 */

            --font-ui: "Noto Sans SC", "Noto Sans JP", -apple-system, sans-serif;
            --font-serif: "Noto Serif SC", "Noto Serif JP", serif; /* 剧情主体使用衬线体 */
            
            --transition: 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-ui);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            background: var(--bg-grad-end);
        }

        /* 纯 CSS 绘制的温馨氛围背景 */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, var(--bg-grad-start) 0%, var(--bg-grad-end) 80%);
            z-index: -2;
        }
        
        /* 隐约的网格背景，增加秩序感和纸张感 */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }

        button, input {
            font: inherit;
        }

        /* 左上角返回按钮 */
        .page-back-btn {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 120;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--panel-border);
            backdrop-filter: var(--glass-blur);
            color: var(--text-secondary);
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all var(--transition);
        }

        .page-back-btn:hover {
            color: var(--text-accent);
            background: #fff;
            border-color: var(--text-accent);
            box-shadow: var(--shadow-glow);
        }

        .practice-shell {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 88px 20px 40px;
            position: relative;
            z-index: 1;
        }

        .screen {
            width: 100%;
            max-width: 760px;
            margin: 0 auto;
        }

        .challenge-screen {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .hidden {
            display: none !important;
        }

        body.is-review-mode .player-hud {
            display: none !important;
        }

        /* 面板通用设定（介绍/结算） */
        .intro-card,
        .summary-card {
            width: 100%;
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            padding: 50px 40px;
            box-shadow: var(--shadow-soft);
            position: relative;
            text-align: center;
        }

        /* 介绍界面 */
        .intro-dialogue-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
        }

        /* 头像通用样式，支持图片完美裁剪 */
        .intro-avatar, .enemy-avatar {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border-radius: 50%;
            border: 2px solid var(--panel-border);
            box-shadow: 0 4px 16px rgba(180, 160, 145, 0.2);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .intro-avatar img, .enemy-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .intro-avatar {
            width: 100px;
            height: 100px;
        }

        .intro-dialogue-main {
            width: 100%;
            text-align: left;
        }

        .story-panel {
            min-height: 100px;
            cursor: pointer;
            background: rgba(245, 240, 235, 0.6);
            padding: 24px 30px;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
        }

        .story-text, .typewriter-text {
            font-size: 18px;
            line-height: 1.8;
            color: var(--text-main);
            font-family: var(--font-serif);
            font-weight: 600;
            white-space: pre-wrap;
            letter-spacing: 0.04em;
        }

        .story-hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 12px;
            text-align: right;
            letter-spacing: 0.1em;
            font-weight: 500;
        }

        /* 游戏风打字游标 - 经典倒三角 */
        .typing-cursor::after {
            content: '▼';
            display: inline-block;
            font-size: 14px;
            color: var(--text-accent);
            margin-left: 6px;
            animation: cursorPulse 1s infinite alternate;
        }

        @keyframes cursorPulse {
            0% { opacity: 0.2; }
            100% { opacity: 1; text-shadow: 0 0 8px rgba(194, 122, 98, 0.4); }
        }

        /* 通用按钮 */
        .intro-actions, .summary-actions {
            display: grid;
            gap: 16px;
            margin-top: 32px;
            border-top: 1px dashed rgba(0,0,0,0.1);
            padding-top: 32px;
        }

        .intro-primary-btn,
        .summary-primary-btn,
        .summary-secondary-btn {
            width: 100%;
            padding: 14px;
            border-radius: 6px;
            border: 1px solid var(--text-accent);
            background: rgba(194, 122, 98, 0.05);
            color: var(--text-accent);
            font-size: 16px;
            font-family: var(--font-ui);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            letter-spacing: 0.1em;
            text-align: center;
        }

        .intro-primary-btn:hover,
        .summary-primary-btn:hover {
            background: var(--text-accent);
            color: #fff;
            box-shadow: var(--shadow-glow);
        }

        .summary-secondary-btn {
            background: transparent;
            color: var(--text-secondary);
            border-color: rgba(0,0,0,0.15);
        }

        .summary-secondary-btn:hover {
            background: rgba(0,0,0,0.03);
            color: var(--text-main);
            border-color: var(--text-secondary);
        }

        .intro-primary-btn:active,
        .summary-primary-btn:active,
        .summary-secondary-btn:active,
        .action-option:active:not(:disabled) {
            transform: scale(0.99);
        }

        .difficulty-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .difficulty-btn {
            padding: 24px 16px;
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: all var(--transition);
        }

        .difficulty-btn:hover {
            background: #fff;
            border-color: var(--text-accent);
            box-shadow: 0 4px 12px rgba(194, 122, 98, 0.15);
        }

        .difficulty-title {
            font-size: 16px;
            font-family: var(--font-ui);
            color: var(--text-main);
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .difficulty-copy {
            color: var(--text-secondary);
            font-size: 12px;
            line-height: 1.65;
            text-align: center;
            white-space: pre-wrap;
            font-weight: 500;
        }

        /* === 核心战斗/剧情界面排布 === */
        .arena-shell {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 16px;
        }

        /* 角色头部区 */
        .enemy-stage {
            position: relative;
            display: flex;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 16px;
            padding: 0 4px;
            min-height: 104px;
        }

        .enemy-side-stack {
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }

        .enemy-avatar {
            width: 100px;
            height: 100px;
        }

        .enemy-avatar.hit {
            animation: damageShake 0.4s ease;
        }

        @keyframes damageShake {
            0%, 100% { transform: scale(1) translateX(0); filter: brightness(1); }
            25% { transform: scale(1.05) translateX(-4px); filter: brightness(1.05); }
            75% { transform: scale(1.05) translateX(4px); }
        }

        /* 热情青梅竹马轻快的呼吸感 */
        .friend-breathe {
            animation: friendBreathe 4s ease-in-out infinite;
        }

        @keyframes friendBreathe {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .enemy-status-box {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--panel-border);
            backdrop-filter: var(--glass-blur);
            padding: 10px 14px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            width: auto;
            min-width: 120px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .enemy-name {
            color: var(--text-main);
            font-size: 13px;
            font-family: var(--font-ui);
            font-weight: 600;
            letter-spacing: 0.1em;
        }

        .enemy-hp-bar-shell {
            width: 100%;
            height: 4px;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 2px;
            overflow: hidden;
        }

        .enemy-hp-bar {
            height: 100%;
            background: var(--text-accent);
            transition: width 0.3s ease;
        }

        .enemy-aside-bubble {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            backdrop-filter: var(--glass-blur);
            color: var(--text-main);
            padding: 12px 18px;
            border-radius: 8px 8px 8px 0;
            font-family: var(--font-serif);
            font-size: 14px;
            box-shadow: var(--shadow-soft);
            max-width: 220px;
            display: none;
        }

        /* 游戏文本框 - 理性笔记本风格 */
        .dialogue-box {
            background: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            padding: 36px 40px 30px;
            box-shadow: var(--shadow-soft);
            backdrop-filter: var(--glass-blur);
            position: relative;
            min-height: 0;
        }

        .dialogue-type-label {
            color: var(--text-accent);
            padding: 0;
            border-radius: 4px;
            font-size: 13px;
            font-family: var(--font-ui);
            font-weight: 600;
            letter-spacing: 0.1em;
        }

        .dialogue-topline {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .dialogue-counter {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .question-focus-card {
            padding: 0;
        }

        .typewriter-text ruby {
            ruby-align: center;
        }

        .typewriter-text rt {
            font-size: 0.52em;
            color: var(--text-ruby);
            font-family: var(--font-ui);
            font-weight: 500;
        }

        .question-main-text {
            font-size: 20px;
            line-height: 1.68;
            font-weight: 600;
            color: var(--text-strong);
        }

        .question-support {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 10px;
        }

        .question-sub-text {
            color: var(--text-secondary);
            font-size: 14px;
            font-family: var(--font-ui);
            line-height: 1.68;
            background: rgba(0, 0, 0, 0.03);
            padding: 6px 10px;
            border-radius: 4px;
            display: inline-flex;
            border-left: 3px solid var(--text-secondary);
            max-width: 100%;
            font-weight: 500;
        }

        .blank-space {
            display: inline-block;
            min-width: 4em;
            height: 0.95em;
            margin: 0 0.2em;
            vertical-align: baseline;
            border-bottom: 1px solid var(--text-main);
            transform: translateY(0.02em);
        }

        .challenge-answer-area {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px dashed rgba(0,0,0,0.1);
        }

        .challenge-feedback {
            min-height: 24px;
            margin-top: 24px;
            font-size: 15px;
            font-family: var(--font-serif);
            font-weight: 700;
            text-align: center;
            letter-spacing: 0.05em;
            color: var(--text-strong);
        }

        .challenge-feedback.good { color: var(--accent-green); }
        .challenge-feedback.bad { color: var(--accent-red); }

        .challenge-analysis {
            margin-top: 14px;
            padding: 14px 16px;
            border-radius: 8px;
            border: 1px solid rgba(194, 122, 98, 0.16);
            background: rgba(194, 122, 98, 0.08);
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.8;
            text-align: left;
        }

        .challenge-analysis.hidden {
            display: none;
        }

        .challenge-analysis-title {
            display: block;
            margin-bottom: 6px;
            color: var(--text-accent);
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .challenge-analysis-block + .challenge-analysis-block {
            margin-top: 12px;
        }

        .challenge-analysis-label {
            display: block;
            margin-bottom: 4px;
            color: var(--text-strong);
            font-weight: 700;
        }

        .challenge-analysis-copy {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .challenge-analysis-line + .challenge-analysis-line {
            margin-top: 3px;
        }

        .challenge-analysis-term {
            color: var(--text-strong);
            font-weight: 700;
        }

        .challenge-analysis-option-list {
            display: grid;
            gap: 10px;
            margin-top: 8px;
        }

        .challenge-analysis-option {
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid rgba(194, 122, 98, 0.14);
            background: rgba(255, 255, 255, 0.55);
        }

        .challenge-analysis-option.is-correct {
            border-color: rgba(92, 148, 110, 0.32);
            background: rgba(92, 148, 110, 0.08);
        }

        .challenge-analysis-option-head {
            color: var(--text-strong);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .challenge-analysis-option-copy {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.72;
        }

        .review-next-action {
            margin-top: 16px;
            display: flex;
            justify-content: center;
        }

        .review-next-action.hidden {
            display: none;
        }

        .review-next-btn {
            min-width: 150px;
            border: 1px solid var(--text-accent, #C27A62);
            border-radius: 8px;
            background: var(--text-accent, #C27A62);
            color: #fff;
            padding: 12px 26px;
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.08em;
            cursor: pointer;
            box-shadow: 0 10px 22px rgba(166, 78, 54, 0.16);
            transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
        }

        .review-next-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(166, 78, 54, 0.2);
        }

        .review-next-btn:disabled {
            cursor: not-allowed;
            opacity: 0.55;
            transform: none;
            box-shadow: none;
        }

        /* 单列选项面板，规整感 */
        .choice-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .action-option {
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0,0,0,0.1);
            color: var(--text-main);
            text-align: left;
            padding: 14px 20px;
            font-size: 16px;
            font-family: var(--font-ui);
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all var(--transition);
            letter-spacing: 0.05em;
        }

        .action-option:hover:not(:disabled) {
            background: #fff;
            border-color: var(--text-accent);
            box-shadow: 0 4px 12px rgba(194, 122, 98, 0.1);
            color: var(--text-accent);
        }

        .action-option:disabled {
            cursor: default;
        }

        .action-option.correct-ans {
            background: rgba(92, 148, 110, 0.1);
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .action-option.wrong-ans {
            background: rgba(209, 107, 107, 0.1);
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        .action-option:focus,
        .action-option:focus-visible {
            outline: none;
        }

        @media (hover: none), (pointer: coarse) {
            .action-option:hover:not(:disabled) {
                background: rgba(255, 255, 255, 0.8);
                border-color: rgba(0,0,0,0.1);
                box-shadow: none;
                color: var(--text-main);
            }

            .action-option:active:not(:disabled) {
                transform: none;
            }
        }

        /* 拼写输入模式 */
        .reading-answer-wrap {
            display: grid;
            gap: 24px;
        }

        .reading-input-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            align-items: flex-end;
        }

        .reading-char-input {
            width: calc(var(--reading-segment-length, 1) * 1.2em + 22px);
            min-width: 50px;
            height: 60px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid transparent;
            border-bottom: 2px solid rgba(0,0,0,0.15);
            border-radius: 4px 4px 0 0;
            padding: 0 8px;
            text-align: center;
            color: var(--text-main);
            font-size: 26px;
            font-family: var(--font-serif);
            outline: none;
            transition: all 0.2s;
        }

        .reading-fixed-segment {
            display: inline-flex;
            align-items: flex-end;
            min-height: 60px;
            padding: 0 2px 10px;
            color: var(--text-main);
            font-size: 26px;
            line-height: 1;
            font-family: var(--font-serif);
            white-space: nowrap;
        }

        .reading-char-input:focus {
            background: #fff;
            border-bottom-color: var(--text-accent);
            box-shadow: 0 4px 8px rgba(194, 122, 98, 0.1);
        }

        .reading-char-input.locked {
            background: rgba(0, 0, 0, 0.03);
            color: var(--text-secondary);
            border-bottom-style: dashed;
        }

        .reading-input-grid.correct .reading-char-input {
            border-bottom-color: var(--accent-green);
            color: var(--accent-green);
        }

        .reading-input-grid.correct .reading-fixed-segment {
            color: var(--accent-green);
        }

        .reading-input-grid.wrong .reading-char-input {
            border-bottom-color: var(--accent-red);
            color: var(--accent-red);
        }

        .reading-input-grid.wrong .reading-fixed-segment {
            color: var(--accent-red);
        }

        .reading-action-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .reading-action-btn {
            padding: 10px 24px;
            border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.15);
            background: transparent;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
        }

        .reading-action-btn:hover:not(:disabled) {
            color: var(--text-accent);
            background: rgba(255, 255, 255, 0.8);
            border-color: var(--text-accent);
        }

        #reading-submit-btn {
            color: var(--text-accent);
            border-color: var(--text-accent);
            background: rgba(194, 122, 98, 0.05);
        }

        .reading-feedback {
            font-size: 14px;
            font-family: var(--font-serif);
            font-weight: 600;
            min-height: 24px;
            text-align: center;
        }

        .reading-feedback.correct { color: var(--accent-green); }
        .reading-feedback.wrong { color: var(--accent-red); }

        /* 玩家状态条 */
        .player-hud {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px 16px;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            box-shadow: var(--shadow-soft);
        }

        .hud-left {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .hud-name {
            font-size: 11px;
            font-family: var(--font-ui);
            font-weight: 600;
            color: var(--text-accent);
            letter-spacing: 0.1em;
            background: rgba(255, 255, 255, 0.8);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid var(--panel-border);
        }

        .hud-hp-wrap {
            display: flex;
            align-items: center;
            flex-direction: row-reverse; 
            flex: 1 1 220px;
            gap: 10px;
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--panel-border);
            padding: 6px 12px;
            border-radius: 6px;
            box-shadow: 0 4px 12px rgba(180, 160, 145, 0.15);
        }

        .hud-hp-label { 
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: bold;
        }

        .hud-hp-bar-bg {
            width: 80px;
            height: 4px;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 2px;
            overflow: hidden;
        }

        .hud-hp-bar-fill {
            height: 100%;
            background: var(--accent-green);
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .hud-hp-text {
            font-size: 12px;
            font-family: var(--font-ui);
            font-weight: bold;
            color: var(--text-main);
        }

        /* 顶部压迫感倒计时 */
        .hud-timer-shell {
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.04);
            border-radius: 999px;
            overflow: hidden;
        }

        .hud-timer-bar {
            height: 100%;
            background: var(--text-accent);
            transition: width 0.1s linear;
        }

        .hud-timer-bar.warning {
            background: var(--accent-red);
        }

        /* 攻击特效 - 暖色闪亮之星 */
        .slash-container {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 20;
        }

        .slash-line {
            width: 60px;
            height: 60px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23C27A62"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>');
            background-size: cover;
            opacity: 0;
            transform: scale(0.5);
            filter: drop-shadow(0 0 6px rgba(194, 122, 98, 0.6));
        }

        .slash-container.active .slash-line {
            animation: starStrike 0.4s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }

        @keyframes starStrike {
            0% { opacity: 0; transform: scale(0.5) rotate(-20deg); }
            50% { opacity: 1; transform: scale(1.5) rotate(15deg); }
            100% { opacity: 0; transform: scale(2) rotate(30deg); }
        }

        .damage-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            font-family: var(--font-ui);
            font-weight: 700;
            letter-spacing: 0.1em;
            opacity: 0;
            pointer-events: none;
            z-index: 24;
            text-shadow: 0 2px 4px #fff, 0 0 8px rgba(255,255,255,0.8);
        }

        .damage-text.normal-hit { color: var(--text-accent); }
        .damage-text.player-hit { color: var(--accent-red); }

        .damage-text.float {
            animation: etherealFloat 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes etherealFloat {
            0% { opacity: 0; transform: translate(-50%, 0) scale(0.9); }
            20% { opacity: 1; transform: translate(-50%, -15px) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -30px) scale(1); }
        }

        .hp-pill { position: relative; }
        .hp-pill.hit { animation: hpShake 0.4s ease; }

        @keyframes hpShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .hp-damage-float {
            position: absolute;
            top: -24px;
            right: 10px;
            font-size: 14px;
            font-family: var(--font-ui);
            font-weight: bold;
            color: var(--accent-red);
            pointer-events: none;
            animation: hpDamageFloat 0.8s ease-out forwards;
        }

        @keyframes hpDamageFloat {
            0% { opacity: 0; transform: translateY(0); }
            20% { opacity: 1; transform: translateY(-10px); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        .shake { animation: shake 0.4s ease both; }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            20%, 60% { transform: translate(-4px, 0); }
            40%, 80% { transform: translate(4px, 0); }
        }

        /* 结算界面数据 */
        .summary-badge {
            display: inline-block;
            padding: 4px 12px;
            border: 1px solid var(--panel-border);
            background: #fff;
            border-radius: 4px;
            color: var(--text-tertiary);
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
        }

        .summary-overline {
            color: var(--text-accent);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.1em;
        }

        .summary-title {
            margin: 10px 0 10px;
            font-size: 28px;
            font-family: var(--font-serif);
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 0.05em;
        }

        .summary-rank {
            font-size: 64px;
            font-family: var(--font-ui);
            font-weight: 800;
            color: var(--text-accent);
            text-shadow: 0 4px 16px rgba(194, 122, 98, 0.2);
            margin: 10px 0 20px;
            line-height: 1;
        }

        .summary-eval {
            color: var(--text-secondary);
            font-size: 16px;
            font-family: var(--font-serif);
            font-weight: 600;
        }

        .summary-msg {
            margin-top: 16px;
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.65;
        }

        .summary-stat-grid {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1px;
            background: rgba(0,0,0,0.05); /* 仅用作细线分隔 */
            border: 1px solid rgba(0,0,0,0.05);
        }

        .summary-stat {
            background: var(--panel-bg);
            padding: 20px;
        }

        .summary-stat-label {
            display: block;
            color: var(--text-secondary);
            font-size: 12px;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        .summary-stat-value {
            display: block;
            margin-top: 8px;
            color: var(--text-accent);
            font-size: 24px;
            font-family: var(--font-ui);
            font-weight: 700;
        }

        .review-summary-list {
            margin-top: 26px;
            display: grid;
            gap: 14px;
            text-align: left;
        }

        .review-summary-item {
            border: 1px solid rgba(184, 125, 98, 0.22);
            background: rgba(255, 252, 248, 0.82);
            border-radius: 16px;
            padding: 16px 18px;
            box-shadow: 0 10px 24px rgba(88, 70, 55, 0.06);
        }

        .review-summary-term {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px 10px;
            color: var(--text-main);
            font-family: var(--font-serif);
            font-size: 21px;
            font-weight: 700;
            line-height: 1.25;
        }

        .review-summary-meta {
            color: var(--text-secondary);
            font-family: var(--font-ui);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .review-summary-line {
            margin-top: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            line-height: 1.7;
        }

        .review-summary-line strong {
            color: var(--text-main);
            font-weight: 800;
            margin-right: 0.45em;
        }

        .review-summary-empty {
            margin-top: 24px;
            padding: 18px;
            border: 1px dashed rgba(184, 125, 98, 0.28);
            border-radius: 16px;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 700;
            text-align: center;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            left: 50%;
            bottom: 40px;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 6px;
            border: 1px solid var(--panel-border);
            backdrop-filter: var(--glass-blur);
            box-shadow: 0 10px 30px rgba(180, 160, 145, 0.3);
            z-index: 180;
            font-size: 13px;
            font-weight: 600;
            font-family: var(--font-ui);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .toast.show { opacity: 1; }

        @media (max-width: 680px) {
            .page-back-btn { top: 16px; left: 16px; padding: 6px 12px; font-size: 12px; }
            .practice-shell { padding: 72px 12px 24px; align-items: flex-start; }
            .dialogue-box {
                padding: 24px 20px;
                border-radius: 12px;
                min-height: auto;
            }
            .dialogue-topline { align-items: flex-start; }
            .dialogue-type-label { font-size: 11px; }
            .enemy-stage { flex-direction: column; align-items: flex-start; padding: 0; min-height: 0; }
            .enemy-side-stack { width: 100%; }
            .enemy-avatar { width: 80px; height: 80px; font-size: 60px; }
            .enemy-aside-bubble { display: none; } 
            .choice-grid { grid-template-columns: 1fr; }
            .action-option { font-size: 14px; padding: 12px 14px; }
            .reading-char-input {
                width: calc(var(--reading-segment-length, 1) * 1.12em + 18px);
                min-width: 42px;
                height: 52px;
                font-size: 22px;
            }
            .reading-fixed-segment {
                min-height: 52px;
                padding-bottom: 8px;
                font-size: 23px;
            }
            .question-main-text { font-size: 16px; }
            .intro-card, .summary-card { padding: 30px 20px; border-radius: 12px; }
            .difficulty-grid { grid-template-columns: 1fr; gap: 12px; }
            .player-hud { align-items: stretch; }
            .hud-left { flex-direction: column; align-items: flex-start; }
            .hud-hp-wrap { padding: 4px 10px; max-width: none; width: 100%; }
            .hud-hp-bar-bg { width: 60px; }
            .summary-stat-grid { margin-top: 24px; gap: 1px; }
            .summary-stat { padding: 12px; border-radius: 0; }
            .summary-stat-value { font-size: 20px; }
        }
    </style>
</head>
<body>
    <a href="mimetic_n1.html" class="page-back-btn" id="page-back-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>

    <script>
        if (typeof window.bindStatefulBack === 'function') {
            window.bindStatefulBack({
                selector: '#page-back-btn',
                fallback: 'mimetic_n1.html'
            });
        }

        const urlParams = new URLSearchParams(window.location.search);
        const stageParam = urlParams.get('stage');
        const modeParam = urlParams.get('mode');
        const typeParam = String(urlParams.get('type') || '').trim().toLowerCase();
        const isStageMode = !!stageParam;
        const isChallengeMode = isStageMode || modeParam === 'final';
        const PRACTICE_TYPE_STORAGE_KEY = 'study_quest_test_v1_n1_mimetic_practice_type';
        const DAILY_PRACTICE_TYPE_MAP = Object.freeze({
            sentence: '语境填空',
            meaning: '假名选义'
        });
        const dailyPracticeType = Object.prototype.hasOwnProperty.call(DAILY_PRACTICE_TYPE_MAP, typeParam)
            ? typeParam
            : 'sentence';
        localStorage.setItem(PRACTICE_TYPE_STORAGE_KEY, dailyPracticeType);

        let targetWords = [];
        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let clearedCount = 0;
        let answerStreak = 0;
        let bestStreak = 0;
        let selectedDifficulty = null;
        let hp = 20;
        let remainingHints = 3;
        let isHintUsed = false;
        let isAnswering = false;
        let rewardRunMeta = null;
        let rewardResult = null;
        let timerId = null;
        let timeLeft = 0;
        let totalTime = 0;
        let introTypingController = null;
        let questionTypingController = null;
        let pendingQuestionReveal = null;

        const testServer = window.StudyQuestTestServer;
        const VOCAB_STAR_KEY_PREFIX = 'study_quest_test_v1_vocab_star::';
        
        const CURRICULUM_DAYS = Array.isArray(window.LAB_ONOMATOPOEIA_DAYS) ? window.LAB_ONOMATOPOEIA_DAYS : [];
        const CURRICULUM_STAGES = Array.isArray(window.LAB_ONOMATOPOEIA_STAGES) ? window.LAB_ONOMATOPOEIA_STAGES : [];
        const CURRICULUM_GROUPS = Array.isArray(window.LAB_ONOMATOPOEIA_GROUPS) ? window.LAB_ONOMATOPOEIA_GROUPS : [];

        const difficultyMap = {
            easy: { label: '轻松热身', damage: 2, timed: false, copy: '20题 · 集中力20 · 错1题扣2点集中力\n当作热身吧，慢慢来就好！' },
            hard: { label: '全力冲刺', damage: 4, timed: false, copy: '20题 · 集中力20 · 错1题扣4点集中力\n稍微有点难度哦，跟紧我的步调！' },
            hell: { label: '极限挑战', damage: 5, timed: true, copy: '20题 · 集中力20 · 错1题扣5点集中力 · 10秒\n心跳加速的限时挑战！冲鸭！' }
        };
        const DAY_QUESTION_LIMIT = 10;
        const STAGE_QUESTION_LIMIT = 20;
        const FINAL_QUESTION_LIMIT = 20;
        const challengeAnalysis = document.getElementById('challenge-analysis');
        const reviewNextAction = document.getElementById('review-next-action');
        const reviewNextBtn = document.getElementById('review-next-btn');
        const SENTENCE_REVIEW_MODULE_KEY = 'n1_mimetic';
        const sentenceReviewStore = window.VocabularySentenceReviewStore || null;
        const reviewStore = window.VocabularyReviewStore || null;
        let practiceCore = null;


        function getVocabStarKey(wordId) {
            return `${VOCAB_STAR_KEY_PREFIX}${String(wordId || '').trim()}`;
        }

        function getWordStorageId(word) {
            return String(word && (word.id || word.word) ? (word.id || word.word) : '').trim();
        }

        function restoreReviewKeyword(word) {
            if (!reviewStore || !word || typeof reviewStore.restoreKeyword !== 'function') return;
            const storageId = getWordStorageId(word);
            const surface = String(word && word.word ? word.word : '').trim();
            if (storageId) reviewStore.restoreKeyword(SENTENCE_REVIEW_MODULE_KEY, storageId);
            if (surface && surface !== storageId) reviewStore.restoreKeyword(SENTENCE_REVIEW_MODULE_KEY, surface);
        }

        function cloneLiteWord(word) {
            if (!word) return null;
            return {
                id: word.id || '',
                word: word.word || '',
                word_html: word.word_html || word.word || '',
                tone: word.tone || '',

                const key = String(word.word || index);

        function shuffleArray(array) {

        function findNextEditableReadingIndex(inputs, startIndex) {
            for (let index = Math.max(0, Number(startIndex) || 0); index < inputs.length; index += 1) {
                if (!inputs[index].readOnly) {
                    return index;
                }
            }
            return -1;
        }

        function findPreviousEditableReadingIndex(inputs, startIndex) {
            for (let index = Math.min(inputs.length - 1, Number(startIndex) || 0); index >= 0; index -= 1) {
                if (!inputs[index].readOnly) {
                    return index;
                }
            }
            return -1;
        }

        function commitReadingChars(startIndex, rawValue) {
            const inputs = getReadingInputs();
            const start = findNextEditableReadingIndex(inputs, startIndex);
            const chars = splitKanaChars(rawValue);
            if (start === -1) {
                return { nextIndex: inputs.length, insertedCount: 0, shouldAdvance: false };
            }
            if (chars.length === 0) {
                inputs[start].value = '';
                return { nextIndex: start, insertedCount: 0, shouldAdvance: false };
            }

            let cursor = start;
            let insertedCount = 0;
            while (cursor !== -1 && insertedCount < chars.length) {
                const input = inputs[cursor];
                const segmentLength = Math.max(1, Number(input.dataset.segmentLength || 1));
                const chunkChars = chars.slice(insertedCount, insertedCount + segmentLength);
                input.value = chunkChars.join('');
                insertedCount += chunkChars.length;

                if (chunkChars.length < segmentLength && insertedCount >= chars.length) {
                    return {
                        nextIndex: cursor,
                        insertedCount,
                        shouldAdvance: false
                    };
                }

                cursor = findNextEditableReadingIndex(inputs, cursor + 1);
            }
            return {
                nextIndex: cursor === -1 ? inputs.length : cursor,
                insertedCount,
                shouldAdvance: true
            };
        }

        function getReadingPromptForWord(word) {

            }

            const fallbackSurface = normalizeTextValue(word && word.word);
            const fallbackKana = /[\u3040-\u30ffー]/.test(fallbackSurface)
                ? normalizeKanaAnswer(fallbackSurface)
                : '';

            return {
                surfaceText: fallbackSurface,

        function extractSurfaceTextFromWordHtml(wordHtml, fallbackText = '') {

            return normalizeTextValue(fallbackText);
        }

        function extractKanjiReadingTextFromWordHtml(wordHtml, fallbackText = '') {
            const helper = getReadingHelper();
            if (helper && typeof helper.buildPrompt === 'function') {
                const prompt = helper.buildPrompt(wordHtml, fallbackText);
                return prompt && prompt.editableCount > 0 ? prompt.fullKana : '';

        function extractKanaDisplayTextFromWordHtml(wordHtml, fallbackText = '') {

        function normalizeSentenceForTranslationMatch(value) {

        function findCurrentPracticeSourceForSnapshot(snapshot, baseWord) {
            const practiceItems = getSentencePracticeItems(baseWord);
            if (!practiceItems.length) return null;
            const sourceKind = String(snapshot && snapshot.sourceKind || 'practice');
            const parsedIndex = parseInt(snapshot && snapshot.sourceIndex, 10);

            const bySource = practiceItems.find((item) => {
                return String(item && item.sourceKind || 'practice') === sourceKind

            if (bySource) return bySource;

            const byQuestionId = practiceItems.find((item) => {
                const marker = '::' + String(item && item.sourceKind || 'practice') + '::' + Number(item && item.sourceIndex || 0);
                return questionId.endsWith(marker);

            if (byQuestionId) return byQuestionId;

            const snapshotQuestion = normalizeSentenceForTranslationMatch(
                (snapshot && (snapshot.questionHtml || snapshot.sentence || snapshot.question || snapshot.typingText)) || ''
            );
            if (snapshotQuestion) {
                const bySentence = practiceItems.find((item) => {

        function normalizeSentencePresetOptions(rawOptions, correctAnswer) {

        function buildSentenceFallbackOptions(correctWord, correctAnswer) {
            const options = [];

            const normalizedCorrect = normalizeSentenceOptionValue(correctAnswer);

            if (normalizedCorrect) {

                options.push(normalizedCorrect);

            const answerPool = shuffleArray(

                    .map((candidate) => normalizeSentenceOptionValue(candidate && candidate.practice && candidate.practice.answer))
                    .filter((value) => value && !seen.has(value))
            );

            answerPool.forEach((value) => {
                if (options.length >= 4 || seen.has(value)) return;

                options.push(value);

            if (options.length < 4) {

                if (fallbackSelf && !seen.has(fallbackSelf)) {
