        }

        function getWordDisplayText(word) {
            return htmlToPlainText(word && word.word_html ? word.word_html : '', { stripRuby: true }) || String(word && word.word || '').trim();
        }

        function getSentenceLookupValuesForWord(word) {
            const values = [
                getWordStorageId(word),
                word && word.word,
                getWordDisplayText(word),
                extractKanaDisplayTextFromWordHtml(word && word.word_html, word && word.word)
            ];
            getSentencePracticeItems(word).forEach((item) => {
                values.push(item && item.answer);
            });
            const analysisHelper = window.VocabularySentenceAnalysis;
            if (analysisHelper && typeof analysisHelper.getLookupValuesForWord === 'function') {
                values.push(...analysisHelper.getLookupValuesForWord(word, {
                    getKanaDisplayText: (candidate) => extractKanaDisplayTextFromWordHtml(candidate && candidate.word_html, candidate && candidate.word),
                    getPracticeItems: getSentencePracticeItems
                }));
            }
            return values.map((value) => normalizeSentenceOptionValue(value)).filter(Boolean);
        }

        function addSentenceLookupCandidate(lookup, rawValue, candidate) {
            const key = normalizeSentenceLookupValue(rawValue);
            if (!key) return;
            if (!lookup.has(key)) lookup.set(key, []);
            const list = lookup.get(key);
            const candidateId = getWordStorageId(candidate);
            if (!list.some((item) => getWordStorageId(item) === candidateId)) {
                list.push(candidate);
            }
        }

        function buildSentenceAnswerLookup() {
            if (sentenceAnswerLookupCache) return sentenceAnswerLookupCache;
            const pool = Array.isArray(ALL_DEFINED_WORDS) ? ALL_DEFINED_WORDS : [];
            const lookup = new Map();
            pool.forEach((candidate) => {
                getSentenceLookupValuesForWord(candidate).forEach((value) => {
                    addSentenceLookupCandidate(lookup, value, candidate);
                });
            });
            sentenceAnswerLookupCache = lookup;
            return lookup;
        }

        function findWordByStorageId(wordId) {
            const normalizedWordId = String(wordId || '').trim();
            if (!normalizedWordId) return null;
            const pool = Array.isArray(ALL_DEFINED_WORDS) ? ALL_DEFINED_WORDS : [];
            return pool.find((candidate) => getWordStorageId(candidate) === normalizedWordId || String(candidate && candidate.word || '').trim() === normalizedWordId) || null;
        }

        function extractWordIdFromSentenceQuestionId(questionId) {
            const parts = String(questionId || '').trim().split('::');
            if (parts.length < 4) return '';
            const sourceKind = parts[parts.length - 2];
            if (!['practice', 'practiceItem', 'example'].includes(sourceKind)) return '';
            return parts.slice(1, -2).join('::').trim();
        }

        function findWordBySentenceSnapshot(snapshot) {
            const directIds = [
                snapshot && snapshot.wordId,
                snapshot && snapshot.wordLabel,
                snapshot && snapshot.word && snapshot.word.wordId,
                snapshot && snapshot.word && snapshot.word.id,
                snapshot && snapshot.word && snapshot.word.word,
                extractWordIdFromSentenceQuestionId(snapshot && snapshot.questionId)
            ];
            for (const id of directIds) {
                const word = findWordByStorageId(id);
                if (word) return word;
            }

            const pool = Array.isArray(ALL_DEFINED_WORDS) ? ALL_DEFINED_WORDS : [];
            const snapshotQuestion = normalizeSentenceForTranslationMatch(
                (snapshot && (snapshot.questionHtml || snapshot.sentence || snapshot.question || snapshot.typingText)) || ''
            );
            if (snapshotQuestion) {
                const byQuestion = pool.find((candidate) => {
                    return getSentencePracticeItems(candidate).some((item) => {
                        const currentSentence = normalizeSentenceForTranslationMatch(item && item.sentence);
                        return currentSentence === snapshotQuestion
                            || (currentSentence && snapshotQuestion.includes(currentSentence))
                            || (snapshotQuestion && currentSentence.includes(snapshotQuestion));
                    });
                });
                if (byQuestion) return byQuestion;
            }

            const correctAnswer = normalizeSentenceLookupValue(snapshot && (snapshot.correctAnswer || snapshot.answer));
            if (correctAnswer) {
                const matches = pool.filter((candidate) => {
                    return getSentencePracticeItems(candidate).some((item) => {
                        return normalizeSentenceLookupValue(item && item.answer) === correctAnswer;
                    });
                });
                if (matches.length === 1) return matches[0];
            }

            return snapshot && snapshot.word ? snapshot.word : { word: snapshot && snapshot.wordLabel || '' };
        }

        function pickUniqueSentenceCandidate(candidates, optionValue) {
            const unique = [];
            (Array.isArray(candidates) ? candidates : []).forEach((candidate) => {
                const candidateId = getWordStorageId(candidate);
                if (!candidateId || unique.some((item) => getWordStorageId(item) === candidateId)) return;
                unique.push(candidate);
            });
            if (unique.length <= 1) return unique[0] || null;

            const optionKey = normalizeSentenceLookupValue(optionValue);
            const exactMatches = unique.filter((candidate) => {
                return getSentenceLookupValuesForWord(candidate).some((value) => normalizeSentenceLookupValue(value) === optionKey);
            });
            return exactMatches.length === 1 ? exactMatches[0] : null;
        }

        const SENTENCE_COLLOCATION_OVERRIDES = Object.freeze({
            '香ばしい': { phrase: '香ばしい匂い', cn: '烤制食物散发出的焦香' },
            '芳しい': { phrase: '芳しい香り', cn: '芬芳的香气' },
            '目ぼしい': { phrase: '目ぼしい人', cn: '值得注意的人、有希望的人选' },
            '手厚い': { phrase: '手厚いもてなし', cn: '周到的招待' }
        });

        function formatCollocationText(phrase, cn) {
            const phraseText = String(phrase || '').replace(/\s+/g, ' ').trim();
            const cnText = String(cn || '').replace(/\s+/g, ' ').trim();
            if (!phraseText) return '';
            return cnText ? phraseText + '（' + cnText + '）' : phraseText;
        }

        function trimJapanesePhraseTail(text) {
            return String(text || '')
                .replace(/^(は|が|を|に|へ|で|と|も|から|まで|より|の|、|。|！|？)+/, '')
                .replace(/(は|が|を|に|へ|で|と|も|から|まで|より|、|。|！|？).*$/, '')
                .trim();
        }

        function buildCollocationFromExample(example) {
            if (!(example && example.jp)) return '';
            const wrapper = document.createElement('div');
            wrapper.innerHTML = example.jp;
            const plainText = htmlNodeToPlainText(wrapper, { stripRuby: true });
            const highlight = wrapper.querySelector('.ex-highlight');
            const highlightedText = highlight ? htmlNodeToPlainText(highlight, { stripRuby: true }) : '';

            if (highlightedText) {
                const index = plainText.indexOf(highlightedText);
                if (index >= 0) {
                    const afterText = plainText.slice(index + highlightedText.length);
                    const nextChunk = trimJapanesePhraseTail(afterText).match(/^[ぁ-んァ-ヶー一-龯々〆ヵヶ]{1,8}/)?.[0] || '';
                    if (nextChunk) {
                        return formatCollocationText(highlightedText + nextChunk, example.cn);
                    }
                }
                const beforeText = plainText.slice(0, index).split(/[。！？、]/).pop().trim();
                const compactBefore = beforeText.length > 12 ? beforeText.slice(-12) : beforeText;
                if (compactBefore && /[ぁ-んァ-ヶー一-龯々〆ヵヶ]$/.test(compactBefore)) {
                    return formatCollocationText(compactBefore + highlightedText, example.cn);
                }
                return formatCollocationText(highlightedText, example.cn);
            }

            const firstClause = plainText.split(/[。！？]/).map((part) => part.trim()).find(Boolean) || '';
            if (!firstClause) return '';
            const clipped = firstClause.length > 24 ? firstClause.slice(0, 24) + '…' : firstClause;
            return formatCollocationText(clipped, example.cn);
        }

        function extractCommonCollocation(word) {
            const analysisHelper = window.VocabularySentenceAnalysis;
            if (analysisHelper && typeof analysisHelper.getCollocation === 'function') {
                return analysisHelper.getCollocation(word);
            }
            const displayText = getWordDisplayText(word);
            const override = SENTENCE_COLLOCATION_OVERRIDES[displayText] || SENTENCE_COLLOCATION_OVERRIDES[String(word && word.word || '').trim()];
            if (override) return formatCollocationText(override.phrase, override.cn);

            const examples = Array.isArray(word && word.examples) ? word.examples : [];
            const highlightedExample = examples.find((item) => item && item.jp && String(item.jp).includes('ex-highlight'));
            const fallbackExample = examples.find((item) => item && item.jp);
            return buildCollocationFromExample(highlightedExample || fallbackExample);
        }

        function extractPrimaryUsage(word) {
            const analysisHelper = window.VocabularySentenceAnalysis;
            if (analysisHelper && typeof analysisHelper.getPrimaryUsage === 'function') {
                return analysisHelper.getPrimaryUsage(word);
            }
            const rawText = String(word && word.nuance ? word.nuance : '')
                .split('\n')
                .map((line) => line.trim().replace(/^\d+\.\s*/, ''))
                .find(Boolean);
            return rawText || extractPrimaryMeaning(word);
        }

        function resolveSentenceOptionWord(word, optionValue, correctAnswer, optionWordIds, optionIndex) {
            const explicitWordId = Array.isArray(optionWordIds) ? optionWordIds[optionIndex] : null;
            if (explicitWordId) {
                const explicitWord = findWordByStorageId(explicitWordId);
                if (explicitWord) return explicitWord;
            }
            if (normalizeSentenceLookupValue(optionValue) === normalizeSentenceLookupValue(correctAnswer)) {
                return word;
            }
            const candidates = buildSentenceAnswerLookup().get(normalizeSentenceLookupValue(optionValue)) || [];
            return pickUniqueSentenceCandidate(candidates, optionValue);
        }

        function buildSentenceOptionDetails(word, options, correctAnswer, optionWordIds) {
            return (Array.isArray(options) ? options : []).map((optionValue, optionIndex) => {
                const resolvedWord = resolveSentenceOptionWord(word, optionValue, correctAnswer, optionWordIds, optionIndex);
                const analysisHelper = window.VocabularySentenceAnalysis;
                if (analysisHelper && typeof analysisHelper.buildOptionDetail === 'function') {
                    return analysisHelper.buildOptionDetail({
                        optionValue,
                        resolvedWord,
                        isCorrect: normalizeSentenceLookupValue(optionValue) === normalizeSentenceLookupValue(correctAnswer),
                        getWordId: getWordStorageId
                    });
                }
                const meaning = resolvedWord ? extractPrimaryMeaning(resolvedWord) : '';
                const usage = resolvedWord ? extractPrimaryUsage(resolvedWord) : meaning;
                const collocation = resolvedWord ? extractCommonCollocation(resolvedWord) : '';
                return {
                    value: optionValue,
                    wordId: getWordStorageId(resolvedWord),
                    wordLabel: resolvedWord && resolvedWord.word ? resolvedWord.word : optionValue,
                    meaning,
                    usage,
                    collocation,
                    isResolved: Boolean(resolvedWord),
                    isCorrect: normalizeSentenceLookupValue(optionValue) === normalizeSentenceLookupValue(correctAnswer)
                };
            });
        }

        function buildSentenceCorrectAnalysis(word, explicitAnalysis, optionDetails) {
            if (explicitAnalysis) return explicitAnalysis;
            const correctOption = Array.isArray(optionDetails) ? optionDetails.find((item) => item && item.isCorrect) : null;
            const parts = [];
            const meaning = correctOption && correctOption.meaning ? correctOption.meaning : extractPrimaryMeaning(word);
            const usage = correctOption && correctOption.usage ? correctOption.usage : extractPrimaryUsage(word);
            const collocation = correctOption && correctOption.collocation ? correctOption.collocation : extractCommonCollocation(word);
            if (meaning) parts.push('释义：' + meaning);
            if (usage && usage !== meaning) parts.push('用法：' + usage);
            if (collocation) parts.push('常见搭配：' + collocation);
            return parts.join('\n');
        }

        function createSentenceQuestionId(word, sourceKind, sourceIndex) {
            return SENTENCE_REVIEW_MODULE_KEY + '::' + getWordStorageId(word) + '::' + sourceKind + '::' + sourceIndex;
        }

        function buildSentenceReviewAnalysis(word, sentenceTranslation, explicitAnalysis, optionDetails) {
            const analysisHelper = window.VocabularySentenceAnalysis;
            if (analysisHelper && typeof analysisHelper.buildReviewAnalysis === 'function') {
                return analysisHelper.buildReviewAnalysis({
                    word,
                    sentenceTranslation,
                    optionDetails,
                    getWordId: getWordStorageId
                });
            }
            return {
                sentenceTranslation: sentenceTranslation || '',
                correctAnalysis: buildSentenceCorrectAnalysis(word, explicitAnalysis, optionDetails),
                options: Array.isArray(optionDetails) ? optionDetails : []
            };
        }

        function createSentenceQuestionSnapshot(question) {
            if (!question || question.kind !== 'sentence') return null;
            return {
                questionId: question.questionId,
                moduleKey: SENTENCE_REVIEW_MODULE_KEY,
                wordId: getWordStorageId(question.word),
                wordLabel: question.word && question.word.word ? question.word.word : '',
                sourceKind: question.sourceKind || 'practice',
                sourceIndex: Number.isFinite(question.sourceIndex) ? question.sourceIndex : 0,
                kind: 'sentence',
                answerMode: 'choice',
                questionHtml: question.questionHtml,
                sentenceCn: question.sentenceCn || '',
                cn: question.cn || '',
                correctAnswer: question.correctAnswer,
                options: Array.isArray(question.options) ? question.options.slice() : [],
                optionWordIds: Array.isArray(question.optionWordIds) ? question.optionWordIds.slice() : [],
                optionDetails: Array.isArray(question.optionDetails) ? question.optionDetails.map((item) => ({ ...item })) : [],
                reviewAnalysis: question.reviewAnalysis ? {
                    sentenceTranslation: question.reviewAnalysis.sentenceTranslation || '',
                    correct: question.reviewAnalysis.correct ? { ...question.reviewAnalysis.correct } : null,
                    distractors: Array.isArray(question.reviewAnalysis.distractors)
                        ? question.reviewAnalysis.distractors.map((item) => ({ ...item }))
                        : [],
                    correctAnalysis: question.reviewAnalysis.correctAnalysis || '',
                    options: Array.isArray(question.reviewAnalysis.options)
                        ? question.reviewAnalysis.options.map((item) => ({ ...item }))
                        : []
                } : null,
                typingText: question.typingText || '',
                hintText: question.hintText || '',
                word: cloneLiteWord(question.word)
            };
        }

        function isSentenceReviewMode(question = questions[currentQuestionIndex]) {
            const context = getPracticeContext();
            return Boolean(
                context &&
                context.mode === 'review' &&
                dailyPracticeType === 'sentence' &&
                question &&
                question.kind === 'sentence'
            );
        }

        function clearSentenceReviewAnalysis() {
            if (!challengeAnalysis) return;
            challengeAnalysis.innerHTML = '';
            challengeAnalysis.classList.add('hidden');
        }

        function renderSentenceReviewAnalysis(question) {
            if (!challengeAnalysis) return;
            const reviewAnalysis = question && question.reviewAnalysis;
            if (!reviewAnalysis) {
                clearSentenceReviewAnalysis();
                return;
            }
            const analysisHelper = window.VocabularySentenceAnalysis;
            if (analysisHelper && typeof analysisHelper.renderReviewAnalysis === 'function') {
                const analysisHtml = analysisHelper.renderReviewAnalysis(reviewAnalysis, { escapeHtml });
                if (analysisHtml) {
                    challengeAnalysis.innerHTML = analysisHtml;
                    challengeAnalysis.classList.remove('hidden');
                    return;
                }
            }

            const blocks = [];
            if (reviewAnalysis.sentenceTranslation) {
                blocks.push('<div class="challenge-analysis-block"><span class="challenge-analysis-label">句子翻译</span><div class="challenge-analysis-copy">' + escapeHtml(reviewAnalysis.sentenceTranslation) + '</div></div>');
            }
            if (reviewAnalysis.correctAnalysis) {
                blocks.push('<div class="challenge-analysis-block"><span class="challenge-analysis-label">正确项说明</span><div class="challenge-analysis-copy">' + escapeHtml(reviewAnalysis.correctAnalysis).replace(/\n/g, '<br>') + '</div></div>');
            }

            const distractorOptions = Array.isArray(reviewAnalysis.options)
                ? reviewAnalysis.options.filter((option) => option && !option.isCorrect)
                : [];
            if (distractorOptions.length > 0) {
                const optionsHtml = distractorOptions.map((option) => {
                    const detailLines = [];
                    if (option.meaning) detailLines.push('释义：' + escapeHtml(option.meaning));
                    if (option.usage) detailLines.push('用法：' + escapeHtml(option.usage));
                    if (option.collocation) detailLines.push('常见搭配：' + escapeHtml(option.collocation));
                    if (detailLines.length === 0) {
                        detailLines.push('形式：' + escapeHtml(option.value || ''));
                        detailLines.push('解析：请结合题干语境与其他选项排除。');
                    }
                    return '<div class="challenge-analysis-option"><div class="challenge-analysis-option-head">' + escapeHtml(option.wordLabel || option.value || '') + '</div><div class="challenge-analysis-option-copy">' + detailLines.join('<br>') + '</div></div>';
                }).join('');
                blocks.push('<div class="challenge-analysis-block"><span class="challenge-analysis-label">选项辨析</span><div class="challenge-analysis-option-list">' + optionsHtml + '</div></div>');
            }

            challengeAnalysis.innerHTML = '<span class="challenge-analysis-title">解析</span>' + blocks.join('');
            challengeAnalysis.classList.remove('hidden');
        }

        function recordSentenceQuestionWrong(question) {
            if (!sentenceReviewStore || !question || question.kind !== 'sentence') return;
            const snapshot = createSentenceQuestionSnapshot(question);
            if (!snapshot || !snapshot.questionId || !snapshot.wordId) return;
            sentenceReviewStore.saveQuestion(SENTENCE_REVIEW_MODULE_KEY, snapshot);
            sentenceReviewStore.incrementWordMistakeCount(SENTENCE_REVIEW_MODULE_KEY, snapshot.wordId, 1);
        }

        function removeSentenceReviewQuestion(question) {
            if (!sentenceReviewStore || !question || !question.questionId) return;
            sentenceReviewStore.removeQuestion(SENTENCE_REVIEW_MODULE_KEY, question.questionId);
        }

        function shouldRebuildSentenceReviewQuestion(snapshot, baseWord, practiceItem) {
            if (!practiceItem) return false;
            const snapshotKind = String(snapshot && snapshot.sourceKind || 'practice');
            const snapshotIndex = Number.isFinite(parseInt(snapshot && snapshot.sourceIndex, 10))
                ? parseInt(snapshot && snapshot.sourceIndex, 10)
                : 0;
            const currentKind = String(practiceItem && practiceItem.sourceKind || 'practice');
            const currentIndex = Number(practiceItem && practiceItem.sourceIndex || 0);
            if (snapshotKind !== currentKind || snapshotIndex !== currentIndex) return true;

            const snapshotQuestion = normalizeSentenceForTranslationMatch(
                (snapshot && (snapshot.questionHtml || snapshot.sentence || snapshot.question || snapshot.typingText)) || ''
            );
            const currentSentence = normalizeSentenceForTranslationMatch(practiceItem && practiceItem.sentence);
            if (currentSentence && snapshotQuestion && !snapshotQuestion.includes(currentSentence) && !currentSentence.includes(snapshotQuestion)) {
                return true;
            }

            const sourceTranslation = String(practiceItem && practiceItem.cn || '').trim();
            return Boolean(sourceTranslation && String(snapshot && snapshot.questionHtml || '').includes(sourceTranslation));
        }

        function getSentenceReviewQuestions() {
            if (!sentenceReviewStore) return [];
            return sentenceReviewStore.listQuestions(SENTENCE_REVIEW_MODULE_KEY)
                .map((snapshot) => {
                    if (!snapshot || snapshot.kind !== 'sentence' || !snapshot.questionId) return null;
                    const baseWord = findWordBySentenceSnapshot(snapshot);
                    const practiceItem = findCurrentPracticeSourceForSnapshot(snapshot, baseWord);
                    const rebuiltQuestion = shouldRebuildSentenceReviewQuestion(snapshot, baseWord, practiceItem)
                        ? buildSentenceQuestionSpec(baseWord, practiceItem)
                        : null;
                    const correctAnswer = rebuiltQuestion ? rebuiltQuestion.correctAnswer : snapshot.correctAnswer;
                    const options = rebuiltQuestion && Array.isArray(rebuiltQuestion.options)
                        ? rebuiltQuestion.options.slice()
                        : (Array.isArray(snapshot.options) ? snapshot.options.slice() : []);
                    const optionWordIds = rebuiltQuestion && Array.isArray(rebuiltQuestion.optionWordIds)
                        ? rebuiltQuestion.optionWordIds.slice()
                        : (Array.isArray(snapshot.optionWordIds) ? snapshot.optionWordIds : []);
                    const optionDetails = buildSentenceOptionDetails(baseWord, options, correctAnswer, optionWordIds);
                    const savedAnalysis = snapshot.reviewAnalysis || {};
                    const savedCorrectAnalysis = String(savedAnalysis.correctAnalysis || '').trim();
                    const explicitAnalysis = savedCorrectAnalysis && !/^释义：/m.test(savedCorrectAnalysis) ? savedCorrectAnalysis : '';
                    const currentSentenceTranslation = getCurrentSentenceTranslationForSnapshot(snapshot, baseWord);
                    const reviewAnalysis = buildSentenceReviewAnalysis(
                        baseWord,
                        currentSentenceTranslation,
                        explicitAnalysis,
                        optionDetails
                    );
                    return {
                        ...snapshot,
                        ...(rebuiltQuestion ? {
                            sourceKind: rebuiltQuestion.sourceKind,
                            sourceIndex: rebuiltQuestion.sourceIndex,
                            questionHtml: rebuiltQuestion.questionHtml,
                            cn: rebuiltQuestion.cn || '',
                            sentenceCn: rebuiltQuestion.sentenceCn || '',
                            correctAnswer,
                            typingText: rebuiltQuestion.typingText || ''
                        } : {}),
                        questionId: snapshot.questionId,
                        kind: 'sentence',
                        answerMode: 'choice',
                        word: baseWord,
                        options,
                        optionWordIds,
                        optionDetails,
                        reviewAnalysis
                    };
                })
                .filter(Boolean);
        }

        function normalizeDialogueBodyText(text) {
            return String(text || '')
                .replace(/\r\n?/g, '\n')
                .replace(/[ \t]+\n/g, '\n')
                .replace(/\n{2,}/g, '\n')
                .trim();
        }

        function buildDialogueTypingText(speaker, bodyText) {
            return `${speaker}：\n「${normalizeDialogueBodyText(bodyText)}」`;
        }

        function buildQuestionTypingText(bodyText) {
            return `「${normalizeDialogueBodyText(bodyText)}」`;
        }

        function buildDialogueQuestionHtml(bodyHtml) {
            const normalizedHtml = String(bodyHtml || '').replace(/(?:<br>\s*)+$/g, '').trim();
            return `「${normalizedHtml}」`;
        }

        function buildSentenceQuestionSpec(word, practiceItem = null) {
            const sourceMeta = getSentenceSourceMeta(word, practiceItem);
            let questionHtml = sourceMeta.sentence;
            let questionCn = sourceMeta.cn || '';

            let richSentence = questionHtml;

            const highlightRegex = /<span class=['"]ex-highlight['"]>(.*?)<\/span>/g;
            const renderedBlankRegex = /<span class=['"][^'"]*\bblank-space\b[^'"]*['"]>\s*<\/span>/g;
            const existingBlankRegex = /(_{2,}|＿{2,}|\(\s*\)|（\s*）)/g;

            if (richSentence.match(renderedBlankRegex)) {
                richSentence = richSentence.replace(renderedBlankRegex, '[[BLANK]]');
            } else if (richSentence.match(highlightRegex)) {
                richSentence = richSentence.replace(highlightRegex, '[[BLANK]]');
            } else if (richSentence.match(existingBlankRegex)) {
                richSentence = richSentence.replace(existingBlankRegex, '[[BLANK]]');
            } else {
                const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const exactWordRegex = new RegExp(escapeRegExp(word.word), 'g');
                if (exactWordRegex.test(richSentence)) {
                    richSentence = richSentence.replace(exactWordRegex, '[[BLANK]]');
                } else {
                    const stem = word.word.length > 1 ? word.word.slice(0, -1) : word.word;
                    const stemRegex = new RegExp(`${escapeRegExp(stem)}[ぁ-ん]*`);
                    if (stemRegex.test(richSentence)) {
                        richSentence = richSentence.replace(stemRegex, '[[BLANK]]');
                    } else {
                        richSentence += ' [[BLANK]]';
                    }
                }
            }

            let plainSentence = richSentence.replace(/<[^>]+>/g, '').replace(/\[\[BLANK\]\]/g, '________');
            richSentence = richSentence.replace(/\[\[BLANK\]\]/g, '<span class="blank-space"></span>');

            const correctAnswer = getSentenceCorrectAnswer(word);
            const presetOptions = normalizeSentencePresetOptions(
                practiceItem && Array.isArray(practiceItem.options)
                    ? practiceItem.options
                    : word && word.practice && word.practice.options,
                correctAnswer
            );
            const optionPool = presetOptions || buildSentenceFallbackOptions(word, correctAnswer);
            if (!correctAnswer || optionPool.length < 2) return null;
            const options = shuffle(optionPool.slice());
            const optionDetails = buildSentenceOptionDetails(word, options, correctAnswer, sourceMeta.optionWordIds);
            const reviewAnalysis = buildSentenceReviewAnalysis(word, questionCn, sourceMeta.analysis, optionDetails);

            return {
                kind: 'sentence',
                answerMode: 'choice',
                questionId: createSentenceQuestionId(word, sourceMeta.sourceKind, sourceMeta.sourceIndex),
                sourceKind: sourceMeta.sourceKind,
                sourceIndex: sourceMeta.sourceIndex,
                word,
                questionHtml: `${buildDialogueQuestionHtml(richSentence)}<br><br><span class="question-sub-text">结合语境，选择最合适的词汇。</span>`,
                cn: questionCn,
                sentenceCn: questionCn,
                correctAnswer,
                options,
                optionDetails,
                optionWordIds: Array.isArray(sourceMeta.optionWordIds) ? sourceMeta.optionWordIds.slice() : [],
                reviewAnalysis,
                hintText: '',
                typingText: buildQuestionTypingText(plainSentence)
            };
        }

        function buildReadingQuestionSpec(word) {
            const prompt = getReadingPromptForWord(word);
            if (!prompt || !prompt.surfaceText || !prompt.fullKana || prompt.editableCount <= 0) return null;

            return {
                kind: 'reading',
                answerMode: 'input',
                word,
                questionHtml: `${buildDialogueQuestionHtml(escapeHtml(prompt.surfaceText))}<br><br><span class="question-sub-text">别怕，大胆拼出来！写错了我也不笑你！</span>`,
                cn: '',
                correctAnswer: prompt.fullKana,
                options: [],
                readingSegments: prompt.segments,
                editableCount: prompt.editableCount,
                inputLength: prompt.editableCount,
                hintText: prompt.firstHint,
                firstHint: prompt.firstHint,
                typingText: buildQuestionTypingText(prompt.surfaceText)
            };
        }

        function buildMeaningDistractors(correctWord, sourcePool) {
            const correctMeaning = extractPrimaryMeaning(correctWord);
            const pool = [];
            const seen = new Set([correctMeaning]);
            const globalWords = typeof ALL_DEFINED_WORDS !== 'undefined' && Array.isArray(ALL_DEFINED_WORDS)
                ? ALL_DEFINED_WORDS
                : [];
            const candidates = shuffleArray([...(Array.isArray(sourcePool) ? sourcePool : []), ...globalWords]);
            candidates.forEach((word) => {
                if (!word || word.word === correctWord.word) return;
                const meaning = extractPrimaryMeaning(word);
                if (!meaning || seen.has(meaning)) return;
                seen.add(meaning);
                pool.push(meaning);
            });
            return pool.slice(0, 3);
        }

        function buildMeaningQuestionSpec(word, sourcePool) {
            const kanaText = extractKanaDisplayTextFromWordHtml(word && word.word_html, word && word.word);
            const primaryMeaning = extractPrimaryMeaning(word);
            if (!kanaText || !primaryMeaning) return null;
            const distractors = buildMeaningDistractors(word, sourcePool);
            if (distractors.length < 3) return null;

            return {
                kind: 'meaning',
                answerMode: 'choice',
                word,
                questionHtml: `${buildDialogueQuestionHtml(escapeHtml(kanaText))}<br><br><span class="question-sub-text">仔细回想一下我们一起背过的，这个词是什么意思呢？</span>`,
                cn: '',
                correctAnswer: primaryMeaning,
                options: shuffle([primaryMeaning, ...distractors]),
                hintText: '',
                typingText: buildQuestionTypingText(kanaText)
            };
        }

        function generateDistractors(correctWord) {
            const others = ALL_DEFINED_WORDS.filter((w) => w.word !== correctWord.word);
            const shuffled = shuffle(others);
            return shuffled.slice(0, 3).map((w) => w.word);
        }

        function clearTimer() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
        }

        function startTimer() {
            clearTimer();
            const timerShell = document.getElementById('timer-shell');
            const timerBar = document.getElementById('timer-bar');
            if (!(isChallengeMode && selectedDifficulty === 'hell')) {
                timerShell.classList.add('hidden');
                timerBar.classList.remove('warning');
                timerBar.style.width = '100%';
                return;
            }

            timerShell.classList.remove('hidden');
            timeLeft = 10;
            totalTime = 10000;
            timerBar.classList.remove('warning');
            timerBar.style.width = '100%';

            timerId = setInterval(() => {
                timeLeft -= 0.05;
                const percentage = Math.max(0, (timeLeft * 1000) / totalTime * 100);
                timerBar.style.width = `${percentage}%`;
                if (percentage <= 30) {
                    timerBar.classList.add('warning');
                }
                if (timeLeft <= 0) {
                    clearTimer();
                    handleTimeout();
                }
            }, 50);
        }

        function handleTimeout() {
            if (!isAnswering) return;
            checkAnswer(null, null, true);
        }

        function clearTypewriter(controllerName) {
            const controller = controllerName === 'intro' ? introTypingController : questionTypingController;
            if (controller && controller.timeoutId) {
                clearTimeout(controller.timeoutId);
            }
            if (controllerName === 'intro') {
                introTypingController = null;
            } else {
                questionTypingController = null;
            }
        }

        function runTypewriter({ controllerName, target, cursor, text, speed, onComplete }) {
            clearTypewriter(controllerName);
            target.innerText = '';
            cursor.className = 'typing-cursor';
            const controller = {
                index: 0,
                text,
                timeoutId: null,
                finished: false,
                finish() {
                    if (this.finished) return;
                    this.finished = true;
                    target.innerText = text;
                    cursor.className = '';
                    if (this.timeoutId) {
                        clearTimeout(this.timeoutId);
                    }
                    if (typeof onComplete === 'function') {
                        onComplete();
                    }
                }
            };

            function typeNext() {
                if (controller.finished) return;
                if (controller.index < text.length) {
                    target.innerText += text.charAt(controller.index);
                    controller.index += 1;
                    controller.timeoutId = setTimeout(typeNext, speed);
                } else {
                    controller.finished = true;
                    cursor.className = '';
                    if (typeof onComplete === 'function') {
                        onComplete();
                    }
                }
            }

            if (controllerName === 'intro') {
                introTypingController = controller;
            } else {
                questionTypingController = controller;
            }
            typeNext();
        }

        function finishCurrentTypewriter(controllerName) {
            const controller = controllerName === 'intro' ? introTypingController : questionTypingController;
            if (controller && typeof controller.finish === 'function') {
                controller.finish();
            }
        }
