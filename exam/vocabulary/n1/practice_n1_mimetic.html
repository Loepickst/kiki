<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>擬音語・擬態語 - 練習</title>
    <!-- 引入优雅的衬线与无衬线字体，契合文字游戏与沉浸阅读风格 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+JP:wght@400;600&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    <style>
        html {
            -webkit-text-size-adjust: 100%;
        }

        :root {
            /* === 暖光理性辅导 ADV / 护眼原木色调色板 === */
            --bg-grad-start: #FDFBF7;      /* 暖白书页色 */
            --bg-grad-end: #F6EFE9;        /* 晨光浅杏色 */
            
            --panel-bg: rgba(255, 255, 255, 0.9); /* 明亮半透明文本框 */
            --panel-border: rgba(210, 195, 180, 0.6); /* 柔和纸质边框 */
            
            --text-main: #4A423E;          /* 主文本（深咖啡/墨褐，比纯黑更护眼） */
            --text-dim: #8C807A;           /* 次要文本（浅褐灰） */
            --text-accent: #C27A62;        /* 剧情高亮色（赤陶橘，温暖理性中带着热情） */
            
            --accent-green: #5C946E;       /* 沉稳森绿（正确/成功） */
            --accent-red: #D16B6B;         /* 柔和朱红（错误/警示） */
            --accent-gold: #D9A05B;        /* 柔和雅金（特殊焦点） */
            --accent-hover: rgba(194, 122, 98, 0.08); /* 暖橘悬浮背景 */

            --glass-blur: blur(12px);      /* 毛玻璃滤镜 */
            --shadow-soft: 0 8px 24px rgba(180, 160, 145, 0.15); /* 浅色暖光阴影 */
            --shadow-glow: 0 0 12px rgba(194, 122, 98, 0.2); /* 橘色微光晕 */

            --font-ui: "Noto Sans SC", "Noto Sans JP", -apple-system, sans-serif;
            --font-serif: "Noto Serif SC", "Noto Serif JP", serif; /* 剧情主体使用衬线体 */
            
            --transition: 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-ui);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            background: var(--bg-grad-end);
        }

        /* 纯 CSS 绘制的温馨氛围背景 */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, var(--bg-grad-start) 0%, var(--bg-grad-end) 80%);
            z-index: -2;
        }
        
        /* 隐约的网格背景，增加秩序感和纸张感 */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }

        button, input {
            font: inherit;
        }

        /* 左上角返回按钮 */
        .page-back-btn {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 120;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--panel-border);
            backdrop-filter: var(--glass-blur);
            color: var(--text-dim);
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: all var(--transition);
        }

        .page-back-btn:hover {
            color: var(--text-accent);
            background: #fff;
            border-color: var(--text-accent);
            box-shadow: var(--shadow-glow);
        }

        .practice-shell {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 88px 20px 40px;
            position: relative;
            z-index: 1;
        }

        .screen {
            width: 100%;
            max-width: 760px;
            margin: 0 auto;
        }

        .challenge-screen {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .hidden {
            display: none !important;
        }

        /* 面板通用设定（介绍/结算） */
        .intro-card,
        .summary-card {
            width: 100%;
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            padding: 50px 40px;
            box-shadow: var(--shadow-soft);
            position: relative;
            text-align: center;
        }

        /* 介绍界面 */
        .intro-dialogue-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
        }

        /* 头像通用样式，支持图片完美裁剪 */
        .intro-avatar, .enemy-avatar {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border-radius: 50%;
            border: 2px solid var(--panel-border);
            box-shadow: 0 4px 16px rgba(180, 160, 145, 0.2);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .intro-avatar img, .enemy-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .intro-avatar {
            width: 100px;
            height: 100px;
        }

        .intro-dialogue-main {
            width: 100%;
            text-align: left;
        }

        .story-panel {
            min-height: 100px;
            cursor: pointer;
            background: rgba(245, 240, 235, 0.6);
            padding: 24px 30px;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
        }

        .story-text, .typewriter-text {
            font-size: 18px;
            line-height: 1.8;
            color: var(--text-main);
            font-family: var(--font-serif);
            font-weight: 500;
            white-space: pre-wrap;
            letter-spacing: 0.06em;
        }

        .story-hint {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 12px;
            text-align: right;
            letter-spacing: 0.1em;
        }

        /* 游戏风打字游标 - 经典倒三角 */
        .typing-cursor::after {
            content: '▼';
            display: inline-block;
            font-size: 14px;
            color: var(--text-accent);
            margin-left: 6px;
            animation: cursorPulse 1s infinite alternate;
        }

        @keyframes cursorPulse {
            0% { opacity: 0.2; }
            100% { opacity: 1; text-shadow: 0 0 8px rgba(194, 122, 98, 0.4); }
        }

        /* 通用按钮 */
        .intro-actions, .summary-actions {
            display: grid;
            gap: 16px;
            margin-top: 32px;
            border-top: 1px dashed rgba(0,0,0,0.1);
            padding-top: 32px;
        }

        .intro-primary-btn,
        .summary-primary-btn,
        .summary-secondary-btn {
            width: 100%;
            padding: 14px;
            border-radius: 6px;
            border: 1px solid var(--text-accent);
            background: rgba(194, 122, 98, 0.05);
            color: var(--text-accent);
            font-size: 16px;
            font-family: var(--font-ui);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            letter-spacing: 0.1em;
            text-align: center;
        }

        .intro-primary-btn:hover,
        .summary-primary-btn:hover {
            background: var(--text-accent);
            color: #fff;
            box-shadow: var(--shadow-glow);
        }

        .summary-secondary-btn {
            background: transparent;
            color: var(--text-dim);
            border-color: rgba(0,0,0,0.15);
        }

        .summary-secondary-btn:hover {
            background: rgba(0,0,0,0.03);
            color: var(--text-main);
            border-color: var(--text-dim);
        }

        .intro-primary-btn:active,
        .summary-primary-btn:active,
        .summary-secondary-btn:active,
        .action-option:active:not(:disabled) {
            transform: scale(0.99);
        }

        .difficulty-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .difficulty-btn {
            padding: 24px 16px;
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: all var(--transition);
        }

        .difficulty-btn:hover {
            background: #fff;
            border-color: var(--text-accent);
            box-shadow: 0 4px 12px rgba(194, 122, 98, 0.15);
        }

        .difficulty-title {
            font-size: 16px;
            font-family: var(--font-ui);
            color: var(--text-main);
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .difficulty-copy {
            color: var(--text-dim);
            font-size: 12px;
            line-height: 1.6;
            text-align: center;
            white-space: pre-wrap;
        }

        /* === 核心战斗/剧情界面排布 === */
        .arena-shell {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 16px;
        }

        /* 角色头部区 */
        .enemy-stage {
            position: relative;
            display: flex;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 16px;
            padding: 0 4px;
            min-height: 104px;
        }

        .enemy-side-stack {
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }

        .enemy-avatar {
            width: 100px;
            height: 100px;
        }

        .enemy-avatar.hit {
            animation: damageShake 0.4s ease;
        }

        @keyframes damageShake {
            0%, 100% { transform: scale(1) translateX(0); filter: brightness(1); }
            25% { transform: scale(1.05) translateX(-4px); filter: brightness(1.05); }
            75% { transform: scale(1.05) translateX(4px); }
        }

        /* 热情青梅竹马轻快的呼吸感 */
        .friend-breathe {
            animation: friendBreathe 4s ease-in-out infinite;
        }

        @keyframes friendBreathe {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .enemy-status-box {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--panel-border);
            backdrop-filter: var(--glass-blur);
            padding: 10px 14px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            width: auto;
            min-width: 120px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .enemy-name {
            color: var(--text-main);
            font-size: 13px;
            font-family: var(--font-ui);
            font-weight: 600;
            letter-spacing: 0.1em;
        }

        .enemy-hp-bar-shell {
            width: 100%;
            height: 4px;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 2px;
            overflow: hidden;
        }

        .enemy-hp-bar {
            height: 100%;
            background: var(--text-accent);
            transition: width 0.3s ease;
        }

        .enemy-aside-bubble {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            backdrop-filter: var(--glass-blur);
            color: var(--text-main);
            padding: 12px 18px;
            border-radius: 8px 8px 8px 0;
            font-family: var(--font-serif);
            font-size: 14px;
            box-shadow: var(--shadow-soft);
            max-width: 220px;
            display: none;
        }

        /* 游戏文本框 - 理性笔记本风格 */
        .dialogue-box {
            background: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            padding: 36px 40px 30px;
            box-shadow: var(--shadow-soft);
            backdrop-filter: var(--glass-blur);
            position: relative;
            min-height: 0;
        }

        .dialogue-type-label {
            color: var(--text-accent);
            padding: 0;
            border-radius: 4px;
            font-size: 13px;
            font-family: var(--font-ui);
            font-weight: 600;
            letter-spacing: 0.1em;
        }

        .dialogue-topline {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .dialogue-counter {
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .question-focus-card {
            padding: 0;
        }

        .typewriter-text ruby {
            ruby-align: center;
        }

        .typewriter-text rt {
            font-size: 0.52em;
            color: var(--text-dim);
            font-family: var(--font-ui);
            font-weight: normal;
        }

        .question-main-text {
            font-size: 20px;
            line-height: 1.6;
        }

        .question-support {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 10px;
        }

        .question-sub-text {
            color: var(--text-dim);
            font-size: 14px;
            font-family: var(--font-ui);
            line-height: 1.6;
            background: rgba(0, 0, 0, 0.03);
            padding: 6px 10px;
            border-radius: 4px;
            display: inline-flex;
            border-left: 3px solid var(--text-dim);
            max-width: 100%;
        }

        .blank-space {
            display: inline-block;
            min-width: 4em;
            height: 0.95em;
            margin: 0 0.2em;
            vertical-align: baseline;
            border-bottom: 1px solid var(--text-main);
            transform: translateY(0.02em);
        }

        .challenge-answer-area {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px dashed rgba(0,0,0,0.1);
        }

        .challenge-feedback {
            min-height: 24px;
            margin-top: 24px;
            font-size: 15px;
            font-family: var(--font-serif);
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.05em;
        }

        .challenge-feedback.good { color: var(--accent-green); }
        .challenge-feedback.bad { color: var(--accent-red); }

        /* 单列选项面板，规整感 */
        .choice-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .action-option {
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0,0,0,0.1);
            color: var(--text-main);
            text-align: left;
            padding: 14px 20px;
            font-size: 16px;
            font-family: var(--font-ui);
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all var(--transition);
            letter-spacing: 0.05em;
        }

        .action-option:hover:not(:disabled) {
            background: #fff;
            border-color: var(--text-accent);
            box-shadow: 0 4px 12px rgba(194, 122, 98, 0.1);
            color: var(--text-accent);
        }

        .action-option:disabled {
            cursor: default;
        }

        .action-option.correct-ans {
            background: rgba(92, 148, 110, 0.1);
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .action-option.wrong-ans {
            background: rgba(209, 107, 107, 0.1);
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        /* 拼写输入模式 */
        .reading-answer-wrap {
            display: grid;
            gap: 24px;
        }

        .reading-input-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            align-items: flex-end;
        }

        .reading-char-input {
            width: calc(var(--reading-segment-length, 1) * 1.2em + 22px);
            min-width: 50px;
            height: 60px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid transparent;
            border-bottom: 2px solid rgba(0,0,0,0.15);
            border-radius: 4px 4px 0 0;
            padding: 0 8px;
            text-align: center;
            color: var(--text-main);
            font-size: 26px;
            font-family: var(--font-serif);
            outline: none;
            transition: all 0.2s;
        }

        .reading-fixed-segment {
            display: inline-flex;
            align-items: flex-end;
            min-height: 60px;
            padding: 0 2px 10px;
            color: var(--text-main);
            font-size: 26px;
            line-height: 1;
            font-family: var(--font-serif);
            white-space: nowrap;
        }

        .reading-char-input:focus {
            background: #fff;
            border-bottom-color: var(--text-accent);
            box-shadow: 0 4px 8px rgba(194, 122, 98, 0.1);
        }

        .reading-char-input.locked {
            background: rgba(0, 0, 0, 0.03);
            color: var(--text-dim);
            border-bottom-style: dashed;
        }

        .reading-input-grid.correct .reading-char-input {
            border-bottom-color: var(--accent-green);
            color: var(--accent-green);
        }

        .reading-input-grid.correct .reading-fixed-segment {
            color: var(--accent-green);
        }

        .reading-input-grid.wrong .reading-char-input {
            border-bottom-color: var(--accent-red);
            color: var(--accent-red);
        }

        .reading-input-grid.wrong .reading-fixed-segment {
            color: var(--accent-red);
        }

        .reading-action-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .reading-action-btn {
            padding: 10px 24px;
            border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.15);
            background: transparent;
            color: var(--text-dim);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
        }

        .reading-action-btn:hover:not(:disabled) {
            color: var(--text-accent);
            background: rgba(255, 255, 255, 0.8);
            border-color: var(--text-accent);
        }

        #reading-submit-btn {
            color: var(--text-accent);
            border-color: var(--text-accent);
            background: rgba(194, 122, 98, 0.05);
        }

        .reading-feedback {
            font-size: 14px;
            font-family: var(--font-serif);
            font-weight: 600;
            min-height: 24px;
            text-align: center;
        }

        .reading-feedback.correct { color: var(--accent-green); }
        .reading-feedback.wrong { color: var(--accent-red); }

        /* 玩家状态条 */
        .player-hud {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px 16px;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            box-shadow: var(--shadow-soft);
        }

        .hud-left {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .hud-name {
            font-size: 11px;
            font-family: var(--font-ui);
            font-weight: 600;
            color: var(--text-accent);
            letter-spacing: 0.1em;
            background: rgba(255, 255, 255, 0.8);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid var(--panel-border);
        }

        .hud-lv {
            font-size: 12px;
            color: var(--text-main);
            margin-top: 4px;
            font-weight: bold;
        }

        .hud-hp-wrap {
            display: flex;
            align-items: center;
            flex-direction: row-reverse; 
            flex: 1 1 220px;
            gap: 10px;
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--panel-border);
            padding: 6px 12px;
            border-radius: 6px;
            box-shadow: 0 4px 12px rgba(180, 160, 145, 0.15);
        }

        .hud-hp-label { 
            color: var(--text-dim);
            font-size: 12px;
            font-weight: bold;
        }

        .hud-hp-bar-bg {
            width: 80px;
            height: 4px;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 2px;
            overflow: hidden;
        }

        .hud-hp-bar-fill {
            height: 100%;
            background: var(--accent-green);
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .hud-hp-text {
            font-size: 12px;
            font-family: var(--font-ui);
            font-weight: bold;
            color: var(--text-main);
        }

        /* 顶部压迫感倒计时 */
        .hud-timer-shell {
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.04);
            border-radius: 999px;
            overflow: hidden;
        }

        .hud-timer-bar {
            height: 100%;
            background: var(--text-accent);
            transition: width 0.1s linear;
        }

        .hud-timer-bar.warning {
            background: var(--accent-red);
        }

        /* 攻击特效 - 暖色闪亮之星 */
        .slash-container {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 20;
        }

        .slash-line {
            width: 60px;
            height: 60px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23C27A62"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>');
            background-size: cover;
            opacity: 0;
            transform: scale(0.5);
            filter: drop-shadow(0 0 6px rgba(194, 122, 98, 0.6));
        }

        .slash-container.active .slash-line {
            animation: starStrike 0.4s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }

        @keyframes starStrike {
            0% { opacity: 0; transform: scale(0.5) rotate(-20deg); }
            50% { opacity: 1; transform: scale(1.5) rotate(15deg); }
            100% { opacity: 0; transform: scale(2) rotate(30deg); }
        }

        .damage-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            font-family: var(--font-ui);
            font-weight: 700;
            letter-spacing: 0.1em;
            opacity: 0;
            pointer-events: none;
            z-index: 24;
            text-shadow: 0 2px 4px #fff, 0 0 8px rgba(255,255,255,0.8);
        }

        .damage-text.normal-hit { color: var(--text-accent); }
        .damage-text.player-hit { color: var(--accent-red); }

        .damage-text.float {
            animation: etherealFloat 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes etherealFloat {
            0% { opacity: 0; transform: translate(-50%, 0) scale(0.9); }
            20% { opacity: 1; transform: translate(-50%, -15px) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -30px) scale(1); }
        }

        .hp-pill { position: relative; }
        .hp-pill.hit { animation: hpShake 0.4s ease; }

        @keyframes hpShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .hp-damage-float {
            position: absolute;
            top: -24px;
            right: 10px;
            font-size: 14px;
            font-family: var(--font-ui);
            font-weight: bold;
            color: var(--accent-red);
            pointer-events: none;
            animation: hpDamageFloat 0.8s ease-out forwards;
        }

        @keyframes hpDamageFloat {
            0% { opacity: 0; transform: translateY(0); }
            20% { opacity: 1; transform: translateY(-10px); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        .shake { animation: shake 0.4s ease both; }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            20%, 60% { transform: translate(-4px, 0); }
            40%, 80% { transform: translate(4px, 0); }
        }

        /* 结算界面数据 */
        .summary-badge {
            display: inline-block;
            padding: 4px 12px;
            border: 1px solid var(--panel-border);
            background: #fff;
            border-radius: 4px;
            color: var(--text-dim);
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
        }

        .summary-overline {
            color: var(--text-accent);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.1em;
        }

        .summary-title {
            margin: 10px 0 10px;
            font-size: 28px;
            font-family: var(--font-serif);
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 0.05em;
        }

        .summary-rank {
            font-size: 64px;
            font-family: var(--font-ui);
            font-weight: 800;
            color: var(--text-accent);
            text-shadow: 0 4px 16px rgba(194, 122, 98, 0.2);
            margin: 10px 0 20px;
            line-height: 1;
        }

        .summary-eval {
            color: var(--text-dim);
            font-size: 16px;
            font-family: var(--font-serif);
        }

        .summary-msg {
            margin-top: 16px;
            color: var(--text-dim);
            font-size: 13px;
        }

        .summary-stat-grid {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1px;
            background: rgba(0,0,0,0.05); /* 仅用作细线分隔 */
            border: 1px solid rgba(0,0,0,0.05);
        }

        .summary-stat {
            background: var(--panel-bg);
            padding: 20px;
        }

        .summary-stat-label {
            display: block;
            color: var(--text-dim);
            font-size: 12px;
            letter-spacing: 0.1em;
        }

        .summary-stat-value {
            display: block;
            margin-top: 8px;
            color: var(--text-accent);
            font-size: 24px;
            font-family: var(--font-ui);
            font-weight: 700;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            left: 50%;
            bottom: 40px;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 6px;
            border: 1px solid var(--panel-border);
            backdrop-filter: var(--glass-blur);
            box-shadow: 0 10px 30px rgba(180, 160, 145, 0.3);
            z-index: 180;
            font-size: 13px;
            font-weight: 600;
            font-family: var(--font-ui);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .toast.show { opacity: 1; }

        @media (max-width: 680px) {
            .page-back-btn { top: 16px; left: 16px; padding: 6px 12px; font-size: 12px; }
            .practice-shell { padding: 72px 12px 24px; align-items: flex-start; }
            .dialogue-box {
                padding: 24px 20px;
                border-radius: 12px;
                min-height: auto;
            }
            .dialogue-topline { align-items: flex-start; }
            .dialogue-type-label { font-size: 11px; }
            .enemy-stage { flex-direction: column; align-items: flex-start; padding: 0; min-height: 0; }
            .enemy-side-stack { width: 100%; }
            .enemy-avatar { width: 80px; height: 80px; font-size: 60px; }
            .enemy-aside-bubble { display: none; } 
            .choice-grid { grid-template-columns: 1fr; }
            .action-option { font-size: 14px; padding: 12px 14px; }
            .reading-char-input {
                width: calc(var(--reading-segment-length, 1) * 1.12em + 18px);
                min-width: 42px;
                height: 52px;
                font-size: 22px;
            }
            .reading-fixed-segment {
                min-height: 52px;
                padding-bottom: 8px;
                font-size: 23px;
            }
            .question-main-text { font-size: 16px; }
            .intro-card, .summary-card { padding: 30px 20px; border-radius: 12px; }
            .difficulty-grid { grid-template-columns: 1fr; gap: 12px; }
            .player-hud { align-items: stretch; }
            .hud-left { flex-direction: column; align-items: flex-start; }
            .hud-hp-wrap { padding: 4px 10px; max-width: none; width: 100%; }
            .hud-hp-bar-bg { width: 60px; }
            .summary-stat-grid { margin-top: 24px; gap: 1px; }
            .summary-stat { padding: 12px; border-radius: 0; }
            .summary-stat-value { font-size: 20px; }
        }
    </style>
</head>
<body>
    <a href="mimetic_n1.html" class="page-back-btn" id="page-back-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        返回练习列表
    </a>

    <div class="practice-shell">
        <div class="screen intro-screen" id="view-intro">
            <div class="intro-card">
                <div class="intro-dialogue-row">
                    <div class="intro-avatar-wrap">
                        <div class="intro-avatar friend-breathe">
                            <!-- 替换为你自己的青梅竹马图片链接 -->
                            <img src="https://cdn.jsdelivr.net/gh/Loepickst/kiki@main/exam/vocabulary/n1/icon/qingmei.png" onerror="this.onerror=null;this.src='icon/qingmei.png';" alt="阳葵（ひまり）">
                        </div>
                    </div>
                    <div class="intro-dialogue-main">
                        <div class="story-panel" id="intro-story-panel">
                            <div class="story-text" id="intro-story"></div><span id="intro-cursor" class="typing-cursor"></span>
                        </div>
                        <div class="story-hint">点击面板可快速跳过对话</div>
                    </div>
                </div>
                <div class="intro-actions hidden" id="intro-actions"></div>
            </div>
        </div>

        <div class="screen challenge-screen hidden" id="view-main">
            <div class="arena-shell">
                
                <!-- 导师状态区 -->
                <div class="enemy-stage">
                    <div class="slash-container" id="slash-effect"><div class="slash-line"></div></div>
                    <div class="damage-text" id="damage-text"></div>
                    <div class="enemy-side-stack">
                        <div class="enemy-avatar friend-breathe" id="enemy-avatar">
                            <!-- 替换为你自己的青梅竹马图片链接 -->
                            <img src="https://cdn.jsdelivr.net/gh/Loepickst/kiki@main/exam/vocabulary/n1/icon/qingmei.png" onerror="this.onerror=null;this.src='icon/qingmei.png';" alt="阳葵（ひまり）">
                        </div>
                        <div class="enemy-status-box">
                            <div class="enemy-name" id="enemy-name">阳葵（ひまり）</div>
                            <div class="enemy-hp-bar-shell">
                                <div class="enemy-hp-bar" id="enemy-hp-bar"></div>
                            </div>
                        </div>
                    </div>
                    <div class="enemy-aside-bubble hidden" id="question-aside"></div>
                </div>

                <!-- 学习对话框区域 -->
                <div class="dialogue-box" id="dialogue-box">
                    <div class="dialogue-topline">
                        <span class="dialogue-type-label" id="dialogue-label">阳葵的特别补习</span>
                        <span class="dialogue-counter" id="dialogue-counter">1 / 20</span>
                    </div>

                    <div class="challenge-question-shell" id="challenge-question-shell">
                        <div class="question-focus-card">
                            <div class="typewriter-text question-main-text" id="challenge-question"></div><span id="typing-cursor"></span>
                            <div class="question-support hidden" id="question-support"></div>
                        </div>
                    </div>
                    
                    <!-- 选项操作区 -->
                    <div class="challenge-answer-area hidden" id="challenge-answer-area"></div>
                    
                    <div class="challenge-feedback" id="challenge-feedback"></div>
                </div>

            </div>

            <!-- 玩家学习状态栏 -->
            <div class="player-hud">
                <div class="hud-left">
                    <div class="hud-name" id="hud-route">ROUTE: 青梅竹马</div>
                    <div class="hud-lv">进度 <span id="player-lv-text">1</span></div>
                </div>
                <div class="hud-hp-wrap hp-pill" id="hp-pill">
                    <div class="hud-hp-label">HP</div>
                    <div class="hud-hp-bar-bg">
                        <div class="hud-hp-bar-fill" id="player-hp-fill"></div>
                    </div>
                    <div class="hud-hp-text" id="player-hp-text">20 / 20</div>
                </div>
            </div>
            <!-- 倒计时指示器 -->
            <div class="hud-timer-shell hidden" id="timer-shell">
                <div class="hud-timer-bar" id="timer-bar"></div>
            </div>
        </div>

        <div class="screen summary-screen hidden" id="view-summary">
            <div class="summary-card result-enter">
                <div class="summary-badge">LESSON COMPLETE</div>
                <div class="summary-overline" id="summary-overline"></div>
                <h2 class="summary-title" id="summary-title">复习结束啦</h2>
                <div class="summary-rank" id="summary-rank">S</div>
                <p class="summary-eval" id="summary-eval"></p>
                <div class="summary-msg" id="summary-msg"></div>
                <div class="summary-stat-grid">
                    <div class="summary-stat">
                        <span class="summary-stat-label">准确率</span>
                        <span class="summary-stat-value" id="summary-accuracy">0%</span>
                    </div>
                    <div class="summary-stat">
                        <span class="summary-stat-label">最高连对</span>
                        <span class="summary-stat-value" id="summary-streak">0</span>
                    </div>
                    <div class="summary-stat">
                        <span class="summary-stat-label">求助阳葵</span>
                        <span class="summary-stat-value" id="summary-hints">0</span>
                    </div>
                    <div class="summary-stat">
                        <span class="summary-stat-label">剩余体力</span>
                        <span class="summary-stat-value" id="summary-hp">-</span>
                    </div>
                </div>
                <div class="summary-actions">
                    <button class="summary-primary-btn" type="button" onclick="location.reload()">再陪我练习一次！</button>
                    <button class="summary-secondary-btn" type="button" onclick="location.href='mimetic_n1.html'">今天先到这里 (返回)</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Import shared data -->
    <script src="../../../shared/back-navigation.js"></script>
    <script src="../../../shared/study-quest-test-runtime.js"></script>
    <script src="../../../shared/study-quest-test-boot.js"></script>
    <script src="n1_mimetic_data.js"></script>
    <script src="n1-mimetic-curriculum.js"></script>
    <script src="vocabulary-reading-helper.js"></script>
    <script src="vocabulary-role-config.js"></script>
    <script>
        if (typeof window.bindStatefulBack === 'function') {
            window.bindStatefulBack({
                selector: '#page-back-btn',
                fallback: 'mimetic_n1.html'
            });
        }

        const urlParams = new URLSearchParams(window.location.search);
        const stageParam = urlParams.get('stage');
        const modeParam = urlParams.get('mode');
        const typeParam = String(urlParams.get('type') || '').trim().toLowerCase();
        const isStageMode = !!stageParam;
        const isChallengeMode = isStageMode || modeParam === 'final';
        const PRACTICE_TYPE_STORAGE_KEY = 'study_quest_test_v1_n1_mimetic_practice_type';
        const DAILY_PRACTICE_TYPE_MAP = Object.freeze({
            sentence: '语境填空',
            meaning: '假名选义'
        });
        const dailyPracticeType = Object.prototype.hasOwnProperty.call(DAILY_PRACTICE_TYPE_MAP, typeParam)
            ? typeParam
            : 'sentence';
        localStorage.setItem(PRACTICE_TYPE_STORAGE_KEY, dailyPracticeType);

        let targetWords = [];
        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let clearedCount = 0;
        let answerStreak = 0;
        let bestStreak = 0;
        let selectedDifficulty = null;
        let hp = 20;
        let remainingHints = 3;
        let isHintUsed = false;
        let isAnswering = false;
        let rewardRunMeta = null;
        let rewardResult = null;
        let timerId = null;
        let timeLeft = 0;
        let totalTime = 0;
        let introTypingController = null;
        let questionTypingController = null;
        let pendingQuestionReveal = null;

        const testServer = window.StudyQuestTestServer;
        const VOCAB_STAR_KEY_PREFIX = 'study_quest_test_v1_vocab_star::';
        
        const CURRICULUM_DAYS = Array.isArray(window.LAB_ONOMATOPOEIA_DAYS) ? window.LAB_ONOMATOPOEIA_DAYS : [];
        const CURRICULUM_STAGES = Array.isArray(window.LAB_ONOMATOPOEIA_STAGES) ? window.LAB_ONOMATOPOEIA_STAGES : [];
        const CURRICULUM_GROUPS = Array.isArray(window.LAB_ONOMATOPOEIA_GROUPS) ? window.LAB_ONOMATOPOEIA_GROUPS : [];

        const difficultyMap = {
            easy: { label: '轻松热身', damage: 2, timed: false, copy: '20题 · HP20 · 错1题扣2血\n当作热身吧，慢慢来就好！' },
            hard: { label: '全力冲刺', damage: 4, timed: false, copy: '20题 · HP20 · 错1题扣4血\n稍微有点难度哦，跟紧我的步调！' },
            hell: { label: '极限挑战', damage: 5, timed: true, copy: '20题 · HP20 · 错1题扣5血 · 10秒\n心跳加速的限时挑战！冲鸭！' }
        };
        const DAY_QUESTION_LIMIT = 10;
        const STAGE_QUESTION_LIMIT = 20;
        const FINAL_QUESTION_LIMIT = 20;

        function getVocabStarKey(wordId) {
            return `${VOCAB_STAR_KEY_PREFIX}${String(wordId || '').trim()}`;
        }

        function getCurriculumDay(dayId) {
            return CURRICULUM_DAYS.find((day) => Number(day.id) === Number(dayId)) || null;
        }

        function getCurriculumStage(stageId) {
            return CURRICULUM_STAGES.find((stage) => Number(stage.id) === Number(stageId)) || null;
        }

        function getCurriculumGroup(groupId) {
            return CURRICULUM_GROUPS.find((group) => Number(group.id) === Number(groupId)) || null;
        }

        function getDayGroup(dayId) {
            const day = getCurriculumDay(dayId);
            return day ? getCurriculumGroup(day.groupId) : null;
        }

        function getStageGroup(stageId) {
            const stage = getCurriculumStage(stageId);
            return stage ? getCurriculumGroup(stage.groupId) : null;
        }

        function getPracticeTypeLabel() {
            return DAILY_PRACTICE_TYPE_MAP[dailyPracticeType] || '语境填空';
        }

        function appendPracticeTypeToScope(scopeKey) {
            return `${scopeKey}-${dailyPracticeType}`;
        }

        function collectWordsByIndexes(indexes) {
            if (!Array.isArray(indexes) || typeof FULL_WORD_LIST === 'undefined') {
                return [];
            }
            const collected = [];
            const seen = new Set();
            indexes.forEach((index) => {
                const word = FULL_WORD_LIST[index];
                if (!word || word.word === '（準備中）') return;
                const key = String(word.word || index);
                if (seen.has(key)) return;
                seen.add(key);
                collected.push(word);
            });
            return collected;
        }

        function getDayWords(dayId) {
            const day = getCurriculumDay(dayId);
            if (day) {
                return collectWordsByIndexes(day.wordIds);
            }
            if (typeof FULL_WORD_LIST === 'undefined') return [];
            const WORDS_PER_DAY = 20;
            const start = (dayId - 1) * WORDS_PER_DAY;
            const end = start + WORDS_PER_DAY;
            return FULL_WORD_LIST.slice(start, end).filter((word) => word.word !== '（準備中）');
        }

        function getStageWords(stageId) {
            const stage = getCurriculumStage(stageId);
            if (!stage) return [];
            const indexes = stage.dayIds.flatMap((dayId) => {
                const day = getCurriculumDay(dayId);
                return day ? day.wordIds : [];
            });
            return collectWordsByIndexes(indexes);
        }

        function getFinalWords() {
            const indexes = CURRICULUM_DAYS.flatMap((day) => Array.isArray(day.wordIds) ? day.wordIds : []);
            return collectWordsByIndexes(indexes);
        }

        function getStarredWords() {
            if (typeof FULL_WORD_LIST === 'undefined') return [];
            return FULL_WORD_LIST.filter((word) => word.word !== '（準備中）' && localStorage.getItem(getVocabStarKey(word.word)) === 'true');
        }

        function getCurrentDayParam() {
            const parsed = parseInt(urlParams.get('day'), 10);
            return Number.isFinite(parsed) ? parsed : 1;
        }

        function getCurrentStageParam() {
            const parsed = parseInt(stageParam, 10);
            return Number.isFinite(parsed) ? parsed : null;
        }

        function getPracticeContext() {
            const currentDayValue = getCurrentDayParam();
            const currentStageValue = getCurrentStageParam();
            if (modeParam === 'final') {
                return {
                    mode: 'final',
                    scopeKey: appendPracticeTypeToScope('final-all'),
                    title: '拟声拟态大测验',
                    overline: '大复习来啦',
                    subtitle: `全课程 · ${getPracticeTypeLabel()} · ${FINAL_QUESTION_LIMIT} 問随机`,
                    challengeTitle: '总复习大测验',
                    routeLabel: 'FINAL TEST',
                    typeLabel: getPracticeTypeLabel(),
                    pool: getFinalWords()
                };
            }
            if (currentStageValue != null) {
                const stage = getCurriculumStage(currentStageValue);
                const group = getStageGroup(currentStageValue);
                return {
                    mode: selectedDifficulty ? 'challenge' : 'stage',
                    scopeKey: selectedDifficulty
                        ? appendPracticeTypeToScope(`stage-${currentStageValue}-${selectedDifficulty}`)
                        : appendPracticeTypeToScope(`stage-${currentStageValue}`),
                    title: stage ? stage.title : `阶段复习 ${currentStageValue}`,
                    overline: stage ? `${group ? `${group.title} · ` : ''}${stage.title}` : `阶段 ${currentStageValue}`,
                    subtitle: stage
                        ? `第 ${stage.dayIds[0]} - ${stage.dayIds[stage.dayIds.length - 1]} 关 · ${getPracticeTypeLabel()} · ${STAGE_QUESTION_LIMIT} 問随机`
                        : `${getPracticeTypeLabel()} · ${STAGE_QUESTION_LIMIT} 問随机`,
                    challengeTitle: stage ? stage.title : `阶段小测 ${currentStageValue}`,
                    routeLabel: `STAGE ${currentStageValue}`,
                    typeLabel: getPracticeTypeLabel(),
                    pool: getStageWords(currentStageValue)
                };
            }
            if (currentDayValue < 0) {
                return {
                    mode: 'review',
                    scopeKey: appendPracticeTypeToScope('review-starred'),
                    title: '错题扫除大作战',
                    overline: '错题大扫除',
                    subtitle: `按错题库数量生成本轮题目 · ${getPracticeTypeLabel()}`,
                    challengeTitle: '错题复习',
                    routeLabel: 'REVIEW',
                    typeLabel: getPracticeTypeLabel(),
                    pool: getStarredWords()
                };
            }
            const day = getCurriculumDay(currentDayValue);
            const group = getDayGroup(currentDayValue);
            return {
                mode: 'day',
                scopeKey: appendPracticeTypeToScope(`day-${currentDayValue}`),
                title: day ? `第${day.id}个书签 · ${day.title}` : `DAY ${currentDayValue}`,
                overline: day ? `${group ? `${group.title} · ` : ''}${day.title}` : `第${currentDayValue}个书签`,
                subtitle: `${getPracticeTypeLabel()} · ${DAY_QUESTION_LIMIT} 問随机`,
                challengeTitle: day ? `${group ? `${group.title} · ` : ''}${day.title}` : `DAY ${currentDayValue}`,
                routeLabel: `DAY ${currentDayValue}`,
                typeLabel: getPracticeTypeLabel(),
                pool: getDayWords(currentDayValue)
            };
        }

        function getQuestionLimitForContext(context, eligiblePool) {
            if (!context) return 0;
            if (context.mode === 'review') {
                return Array.isArray(eligiblePool) ? eligiblePool.length : 0;
            }
            if (context.mode === 'final') {
                return FINAL_QUESTION_LIMIT;
            }
            if (context.mode === 'stage' || context.mode === 'challenge') {
                return STAGE_QUESTION_LIMIT;
            }
            return DAY_QUESTION_LIMIT;
        }

        function getPracticeModeKey() {
            const currentDayValue = getCurrentDayParam();
            if (modeParam === 'final') return 'final';
            if (stageParam && selectedDifficulty) return 'challenge';
            if (stageParam) return 'stage';
            if (currentDayValue < 0) return 'review';
            return 'day';
        }

        function getPracticeScopeKey() {
            return getPracticeContext().scopeKey;
        }

        function dispatchPracticeState(phase, overrides = {}) {
            if (!window.StudyQuestTestUi || typeof window.StudyQuestTestUi.dispatchPracticeState !== 'function') {
                return;

            const accuracy = answeredCount > 0 ? score / answeredCount : 0;
            window.StudyQuestTestUi.dispatchPracticeState({
                module: 'vocabulary',
                subType: 'n1_mimetic',
                mode: getPracticeModeKey(),
                phase,
                isCorrect: overrides.isCorrect === undefined ? null : Boolean(overrides.isCorrect),
                streak: Number.isFinite(overrides.streak) ? overrides.streak : answerStreak,
                accuracy: Number.isFinite(overrides.accuracy) ? overrides.accuracy : accuracy,
                questionIndex: Number.isFinite(overrides.questionIndex) ? overrides.questionIndex : currentQuestionIndex + 1,
                questionCount: totalQuestions,
                meta: overrides.meta || {}
            });
        }

        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function shuffle(array) {
            return shuffleArray(array);
        }

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeTextValue(value) {
            return String(value == null ? '' : value).trim();
        }

        function toHiragana(text) {
            return String(text == null ? '' : text).replace(/[\u30a1-\u30f6]/g, (char) => String.fromCharCode(char.charCodeAt(0) - 0x60));
        }

        function normalizeKanaAnswer(value) {
            return toHiragana(String(value == null ? '' : value).replace(/\s+/g, ''));
        }

        function splitKanaChars(value) {
            return Array.from(normalizeKanaAnswer(value));
        }

        function isReadingInputComposing(input) {
            return Boolean(input && input.dataset && input.dataset.composing === 'true');
        }

        function findNextEditableReadingIndex(inputs, startIndex) {
            for (let index = Math.max(0, Number(startIndex) || 0); index < inputs.length; index += 1) {
                if (!inputs[index].readOnly) {
                    return index;
                }
            }
            return -1;
        }

        function findPreviousEditableReadingIndex(inputs, startIndex) {
            for (let index = Math.min(inputs.length - 1, Number(startIndex) || 0); index >= 0; index -= 1) {
                if (!inputs[index].readOnly) {
                    return index;
                }
            }
            return -1;
        }

        function commitReadingChars(startIndex, rawValue) {
            const inputs = getReadingInputs();
            const start = findNextEditableReadingIndex(inputs, startIndex);
            const chars = splitKanaChars(rawValue);
            if (start === -1) {
                return { nextIndex: inputs.length, insertedCount: 0, shouldAdvance: false };
            }
            if (chars.length === 0) {
                inputs[start].value = '';
                return { nextIndex: start, insertedCount: 0, shouldAdvance: false };
            }

            let cursor = start;
            let insertedCount = 0;
            while (cursor !== -1 && insertedCount < chars.length) {
                const input = inputs[cursor];
                const segmentLength = Math.max(1, Number(input.dataset.segmentLength || 1));
                const chunkChars = chars.slice(insertedCount, insertedCount + segmentLength);
                input.value = chunkChars.join('');
                insertedCount += chunkChars.length;

                if (chunkChars.length < segmentLength && insertedCount >= chars.length) {
                    return {
                        nextIndex: cursor,
                        insertedCount,
                        shouldAdvance: false
                    };
                }

                cursor = findNextEditableReadingIndex(inputs, cursor + 1);
            }
            return {
                nextIndex: cursor === -1 ? inputs.length : cursor,
                insertedCount,
                shouldAdvance: true
            };
        }

        function getReadingHelper() {
            return window.VocabularyReadingHelper || null;
        }

        function getReadingPromptForWord(word) {
            const helper = getReadingHelper();
            if (helper && typeof helper.buildPrompt === 'function') {
                return helper.buildPrompt(word && word.word_html, word && word.word);
            }

            const fallbackSurface = normalizeTextValue(word && word.word);
            const fallbackKana = /[\u3040-\u30ffー]/.test(fallbackSurface)
                ? normalizeKanaAnswer(fallbackSurface)
                : '';

            return {
                surfaceText: fallbackSurface,
                fullKana: fallbackKana,
                segments: fallbackSurface ? [{ type: 'fixed', text: fallbackSurface }] : [],
                editableCount: 0,
                firstHint: ''
            };
        }

        function extractSurfaceTextFromWordHtml(wordHtml, fallbackText = '') {
            const helper = getReadingHelper();
            if (helper && typeof helper.getSurfaceText === 'function') {
                return helper.getSurfaceText(wordHtml, fallbackText);
            }
            return normalizeTextValue(fallbackText);
        }

        function extractKanjiReadingTextFromWordHtml(wordHtml, fallbackText = '') {
            const helper = getReadingHelper();
            if (helper && typeof helper.buildPrompt === 'function') {
                const prompt = helper.buildPrompt(wordHtml, fallbackText);
                return prompt && prompt.editableCount > 0 ? prompt.fullKana : '';
            }
            return '';
        }

        function extractKanaDisplayTextFromWordHtml(wordHtml, fallbackText = '') {
            const helper = getReadingHelper();
            if (helper && typeof helper.getKanaDisplayText === 'function') {
                return helper.getKanaDisplayText(wordHtml, fallbackText);
            }
            const fallback = normalizeTextValue(fallbackText);
            return /[\u3040-\u30ffー]/.test(fallback) ? toHiragana(fallback) : '';
        }

        function extractPrimaryMeaning(word) {
            return String(word && word.mean ? word.mean : '')
                .split(/[；;]/)
                .map((part) => part.trim())
                .find(Boolean) || '';
        }

        function getEligibleWordsForPracticeType(words, type) {
            const pool = Array.isArray(words) ? words : [];
            if (type === 'reading') {
                return pool.filter((word) => {
                    const prompt = getReadingPromptForWord(word);
                    return Boolean(prompt && prompt.surfaceText && prompt.fullKana && prompt.editableCount > 0);
                });
            }
            if (type === 'meaning') {
                return pool.filter((word) => {
                    const kanaText = extractKanaDisplayTextFromWordHtml(word && word.word_html, word && word.word);
                    const primaryMeaning = extractPrimaryMeaning(word);
                    return Boolean(kanaText && primaryMeaning);
                });
            }
            return pool.filter(Boolean);
        }

        function normalizeSentenceOptionValue(value) {
            return typeof value === 'string' ? value.trim() : '';
        }

        function getSentenceCorrectAnswer(word) {
            const practiceAnswer = normalizeSentenceOptionValue(word && word.practice && word.practice.answer);
            if (practiceAnswer) return practiceAnswer;

            const kanaDisplay = normalizeSentenceOptionValue(
                extractKanaDisplayTextFromWordHtml(word && word.word_html, word && word.word)
            );
            return kanaDisplay || normalizeSentenceOptionValue(word && word.word);
        }

        function normalizeSentencePresetOptions(rawOptions, correctAnswer) {
            const normalized = [];
            const seen = new Set();

            (Array.isArray(rawOptions) ? rawOptions : []).forEach((option) => {
                const value = normalizeSentenceOptionValue(option);
                if (!value || seen.has(value)) return;
                seen.add(value);
                normalized.push(value);
            });

            if (!correctAnswer || !seen.has(correctAnswer) || normalized.length < 4) {
                return null;
            }

            return normalized.slice(0, 4);
        }

        function buildSentenceFallbackOptions(correctWord, correctAnswer) {
            const options = [];
            const seen = new Set();
            const normalizedCorrect = normalizeSentenceOptionValue(correctAnswer);

            if (normalizedCorrect) {
                seen.add(normalizedCorrect);
                options.push(normalizedCorrect);
            }

            const answerPool = shuffleArray(
                (Array.isArray(ALL_DEFINED_WORDS) ? ALL_DEFINED_WORDS : [])
                    .filter((candidate) => candidate && candidate.word !== (correctWord && correctWord.word))
                    .map((candidate) => normalizeSentenceOptionValue(candidate && candidate.practice && candidate.practice.answer))
                    .filter((value) => value && !seen.has(value))
            );

            answerPool.forEach((value) => {
                if (options.length >= 4 || seen.has(value)) return;
                seen.add(value);
                options.push(value);
            });

            if (options.length < 4) {
                const fallbackSelf = normalizeSentenceOptionValue(
                    extractKanaDisplayTextFromWordHtml(correctWord && correctWord.word_html, correctWord && correctWord.word)
                );
                if (fallbackSelf && !seen.has(fallbackSelf)) {
                    seen.add(fallbackSelf);
                    options.push(fallbackSelf);
                }
            }

            if (options.length < 4) {
                const surfaceSelf = normalizeSentenceOptionValue(correctWord && correctWord.word);
                if (surfaceSelf && !seen.has(surfaceSelf)) {
                    seen.add(surfaceSelf);
                    options.push(surfaceSelf);
                }
            }

            return options.slice(0, 4);
        }

        function normalizeDialogueBodyText(text) {
            return String(text || '')
                .replace(/\r\n?/g, '\n')
                .replace(/[ \t]+\n/g, '\n')
                .replace(/\n{2,}/g, '\n')
                .trim();
        }

        function buildDialogueTypingText(speaker, bodyText) {
            return `${speaker}：\n「${normalizeDialogueBodyText(bodyText)}」`;
        }

        function buildQuestionTypingText(bodyText) {
            return `「${normalizeDialogueBodyText(bodyText)}」`;
        }

        function buildDialogueQuestionHtml(bodyHtml) {
            const normalizedHtml = String(bodyHtml || '').replace(/(?:<br>\s*)+$/g, '').trim();
            return `「${normalizedHtml}」`;
        }

        function buildSentenceQuestionSpec(word) {
            let questionHtml = '';
            let questionCn = '';
            if (word.practice) {
                questionHtml = word.practice.sentence || word.practice.question || '';
            } else {
                let example = { jp: '例文がありません。', cn: '' };
                if (word.examples && word.examples.length > 0) {
                    example = word.examples[Math.floor(Math.random() * word.examples.length)];
                }
                questionCn = example.cn;
                questionHtml = example.jp;
            }

            let richSentence = questionHtml;
            
            const highlightRegex = /<span class=['"]ex-highlight['"]>(.*?)<\/span>/g;
            const renderedBlankRegex = /<span class=['"][^'"]*\bblank-space\b[^'"]*['"]>\s*<\/span>/g;
            const existingBlankRegex = /(_{2,}|＿{2,}|\(\s*\)|（\s*）)/g;
            
            if (richSentence.match(renderedBlankRegex)) {
                richSentence = richSentence.replace(renderedBlankRegex, '[[BLANK]]');
            } else if (richSentence.match(highlightRegex)) {
                richSentence = richSentence.replace(highlightRegex, '[[BLANK]]');
            } else if (richSentence.match(existingBlankRegex)) {
                richSentence = richSentence.replace(existingBlankRegex, '[[BLANK]]');
            } else {
                const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                if (richSentence.includes(word.word)) {
                    richSentence = richSentence.replace(new RegExp(escapeRegExp(word.word), 'g'), '[[BLANK]]');
                } else {
                    richSentence += ' [[BLANK]]';
                }
            }

            let plainSentence = richSentence.replace(/<[^>]+>/g, '').replace(/\[\[BLANK\]\]/g, '________');
            richSentence = richSentence.replace(/\[\[BLANK\]\]/g, '<span class="blank-space"></span>');

            const correctAnswer = getSentenceCorrectAnswer(word);
            const presetOptions = normalizeSentencePresetOptions(word && word.practice && word.practice.options, correctAnswer);
            const optionPool = presetOptions || buildSentenceFallbackOptions(word, correctAnswer);
            if (!correctAnswer || optionPool.length < 2) return null;
            const options = shuffle(optionPool.slice());
            
            const cnHtml = questionCn ? `<br><span class="question-sub-text">（${questionCn}）</span>` : '';

            return {
                kind: 'sentence',
                answerMode: 'choice',
                word,
                questionHtml: `${buildDialogueQuestionHtml(richSentence)}<br><br><span class="question-sub-text">带入语境感受一下，哪个词最合适呢？</span>${cnHtml}`,
                cn: questionCn,
                correctAnswer,
                options,
                hintText: '',
                typingText: buildQuestionTypingText(plainSentence)
            };
        }

        function buildReadingQuestionSpec(word) {
            const prompt = getReadingPromptForWord(word);
            if (!prompt || !prompt.surfaceText || !prompt.fullKana || prompt.editableCount <= 0) return null;

            return {
                kind: 'reading',
                answerMode: 'input',
                word,
                questionHtml: `${buildDialogueQuestionHtml(escapeHtml(prompt.surfaceText))}<br><br><span class="question-sub-text">别怕，大胆拼出来！写错了我也不笑你！</span>`,
                cn: '',
                correctAnswer: prompt.fullKana,
                options: [],
                readingSegments: prompt.segments,
                editableCount: prompt.editableCount,
                inputLength: prompt.editableCount,
                hintText: prompt.firstHint,
                firstHint: prompt.firstHint,
                typingText: buildQuestionTypingText(prompt.surfaceText)
            };
        }

        function buildMeaningDistractors(correctWord, sourcePool) {
            const correctMeaning = extractPrimaryMeaning(correctWord);
            const pool = [];
            const seen = new Set([correctMeaning]);
            const globalWords = typeof ALL_DEFINED_WORDS !== 'undefined' && Array.isArray(ALL_DEFINED_WORDS)
                ? ALL_DEFINED_WORDS
                : [];
            const candidates = shuffleArray([...(Array.isArray(sourcePool) ? sourcePool : []), ...globalWords]);
            candidates.forEach((word) => {
                if (!word || word.word === correctWord.word) return;
                const meaning = extractPrimaryMeaning(word);
                if (!meaning || seen.has(meaning)) return;
                seen.add(meaning);
                pool.push(meaning);
            });
            return pool.slice(0, 3);
        }

        function buildMeaningQuestionSpec(word, sourcePool) {
            const kanaText = extractKanaDisplayTextFromWordHtml(word && word.word_html, word && word.word);
            const primaryMeaning = extractPrimaryMeaning(word);
            if (!kanaText || !primaryMeaning) return null;
            const distractors = buildMeaningDistractors(word, sourcePool);
            if (distractors.length < 3) return null;

            return {
                kind: 'meaning',
                answerMode: 'choice',
                word,
                questionHtml: `${buildDialogueQuestionHtml(escapeHtml(kanaText))}<br><br><span class="question-sub-text">仔细回想一下我们一起背过的，这个词是什么意思呢？</span>`,
                cn: '',
                correctAnswer: primaryMeaning,
                options: shuffle([primaryMeaning, ...distractors]),
                hintText: '',
                typingText: buildQuestionTypingText(kanaText)
            };
        }

        function generateDistractors(correctWord) {
            const others = ALL_DEFINED_WORDS.filter((w) => w.word !== correctWord.word);
            const shuffled = shuffle(others);
            return shuffled.slice(0, 3).map((w) => w.word);
        }

        function clearTimer() {

                clearInterval(timerId);
                timerId = null;

        function startTimer() {
            clearTimer();
            const timerShell = document.getElementById('timer-shell');

            if (!(isChallengeMode && selectedDifficulty === 'hell')) {

                timerBar.style.width = `${percentage}%`;

                if (timeLeft <= 0) {

        function clearTypewriter(controllerName) {
            const controller = controllerName === 'intro' ? introTypingController : questionTypingController;
            if (controller && controller.timeoutId) {
                clearTimeout(controller.timeoutId);
            }
            if (controllerName === 'intro') {
                introTypingController = null;
            } else {
                questionTypingController = null;
            }
        }

        function runTypewriter({ controllerName, target, cursor, text, speed, onComplete }) {
            clearTypewriter(controllerName);
            target.innerText = '';
            cursor.className = 'typing-cursor';
            const controller = {
                index: 0,
                text,
                timeoutId: null,
                finished: false,
                finish() {
                    if (this.finished) return;
                    this.finished = true;
                    target.innerText = text;
                    cursor.className = '';
                    if (this.timeoutId) {
                        clearTimeout(this.timeoutId);
                    }
                    if (typeof onComplete === 'function') {
                        onComplete();
                    }
                }
            };

            function typeNext() {
                if (controller.finished) return;
                if (controller.index < text.length) {
                    target.innerText += text.charAt(controller.index);
                    controller.index += 1;
                    controller.timeoutId = setTimeout(typeNext, speed);
                } else {
                    controller.finished = true;
                    cursor.className = '';
                    if (typeof onComplete === 'function') {
                        onComplete();
                    }
                }
            }

            if (controllerName === 'intro') {
                introTypingController = controller;
            } else {
                questionTypingController = controller;
            }
            typeNext();
        }

        function finishCurrentTypewriter(controllerName) {
            const controller = controllerName === 'intro' ? introTypingController : questionTypingController;
            if (controller && typeof controller.finish === 'function') {
                controller.finish();
            }
        }
