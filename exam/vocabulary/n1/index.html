<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単語カフェ - N1メニュー</title>
    <!-- 引入圆润可爱的字体，契合动物咖啡厅的氛围 -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* --- 动物咖啡厅 (Animal Cafe) 暖色调色板 --- */
            --bg-color: #FDF6E3;       /* 奶茶背景 */
            --paper-color: #FFFFFF;    /* 纯白菜单纸 */
            
            --text-color: #4A332A;     /* 巧克力深灰 - 核心文字 */
            --sub-color: #8B6B5D;      /* 拿铁浅咖 - 辅助文字 */
            
            --border-color: #4A332A;   /* 巧克力粗边框 */
            
            /* 各词性店长专属主题色 */
            --verb-color: #A1887F;     /* 马 - 拿铁褐 */
            --adj-color: #E29578;      /* 猫 - 肉球粉 */
            --adv-color: #F4A261;      /* 狗 - 柴犬橘 */
            --ono-color: #83C5BE;      /* 鹦鹉 - 薄荷青 */
            
            --tag-bg: #FFD166;         /* 芝士黄标签 */
            
            /* 立体感阴影 */
            --shadow-sm: 0 4px 0px rgba(74, 51, 42, 0.15);
            --shadow-md: 0 6px 0px var(--border-color);
        }

        body {
            font-family: 'Nunito', 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* 可爱的拿铁波点背景 */
            background-image: radial-gradient(rgba(139, 107, 93, 0.15) 2px, transparent 2px);
            background-size: 24px 24px;
        }

        /* 顶部导航栏 (像咖啡厅的招牌横幅) */
        header {
            width: 100%;
            padding: 16px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #FFFFFF;
            position: sticky; 
            top: 0;
            z-index: 100;
            border-bottom: 4px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        /* 返回按钮 (小木牌风格) */
        .back-btn {
            position: absolute;
            left: 20px;
            text-decoration: none;
            color: var(--text-color);
            font-size: 14px;
            font-weight: 800;
            display: flex;
            align-items: center;
            padding: 6px 14px;
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 99px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 0 var(--border-color);
            letter-spacing: 0.05em;
        }
        .back-btn:hover {
            background: #FFE4CC;
            transform: translateY(-2px);
            box-shadow: 0 4px 0 var(--border-color);
        }
        .back-btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 var(--border-color);
        }

        h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 内容容器 */
        .vocab-container {
            width: 95%;
            max-width: 600px;
            padding: 40px 0;
            display: flex;
            flex-direction: column;
        }

        .view-section {
            width: 100%; 
        }

        /* 菜单标题 */
        .section-title {
            font-size: 1.2rem;
            margin-bottom: 24px;
            color: var(--text-color);
            font-weight: 900;
            text-align: center;
            letter-spacing: 0.1em;
            background: #FFF;
            border: 3px solid var(--border-color);
            padding: 8px 24px;
            border-radius: 99px;
            display: inline-block;
            box-shadow: 4px 4px 0 rgba(74, 51, 42, 0.1);
        }
        
        .title-wrapper {
            text-align: center;
            margin-bottom: 10px;
        }

        /* [目录] 分类列表 (Cafe Menu) */
        .lesson-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            margin: 0 auto;
        }

        /* 菜单卡片 */
        .lesson-item {
            background: var(--paper-color); 
            padding: 24px; 
            border-radius: 20px;
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: var(--shadow-md); 
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); 
            border: 3px solid var(--border-color);
            text-decoration: none;
            color: var(--text-color);
            position: relative;
        }

        .lesson-item:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 10px 0 var(--border-color);
            background: #FFFAFA;
        }
        
        .lesson-item:active {
            transform: translateY(2px);
            box-shadow: 0 4px 0 var(--border-color);
        }

        /* 内容布局 */
        .lesson-content {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        /* 动物图标容器 */
        .lesson-icon {
            font-size: 26px;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 3px solid var(--border-color);
            background-color: #FFF;
            box-shadow: inset -2px -2px 0 rgba(0,0,0,0.1);
            font-weight: 900;
            position: relative;
        }
        
        /* 图标的小装饰 */
        .lesson-icon::after {
            content: '';
            position: absolute;
            top: -6px;
            right: -6px;
            width: 16px;
            height: 16px;
            background-color: #FFF;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            background-image: radial-gradient(var(--border-color) 40%, transparent 40%);
        }

        /* 各词性动物配色 */
        .icon-verb { color: #FFF; background-color: var(--verb-color); }
        .icon-adj { color: #FFF; background-color: var(--adj-color); }
        .icon-adv { color: #FFF; background-color: var(--adv-color); }
        .icon-ono { color: #FFF; background-color: var(--ono-color); }

        .lesson-text {
            display: flex;
            flex-direction: column;
        }

        .lesson-text h3 { 
            margin: 0 0 6px; 
            font-size: 18px; 
            font-weight: 900; 
            letter-spacing: 0.05em;
        }
        
        .lesson-text p { 
            margin: 0; 
            font-size: 13px; 
            color: var(--sub-color); 
            font-weight: 700;
            line-height: 1.5;
        }

        /* 营业挂牌 (Tag) */
        .lesson-tag {
            background: var(--tag-bg); 
            color: var(--text-color); 
            padding: 6px 14px; 
            border-radius: 12px; 
            font-size: 12px; 
            font-weight: 900;
            border: 2px solid var(--border-color);
            box-shadow: 2px 2px 0 var(--border-color);
            letter-spacing: 0.05em;
            white-space: nowrap;
            transform: rotate(3deg);
            transition: transform 0.2s ease;
        }
        
        .lesson-item:hover .lesson-tag {
            transform: rotate(-3deg) scale(1.05);
        }
        
        .tag-prep {
            background: #E0E0E0;
            color: var(--sub-color);
        }

        /* 准备中样式 */
        .lesson-item.prep {
            background: #F5F5F5;
            border-style: dashed;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.8;
        }
        .lesson-item.prep:hover {
            transform: none;
            box-shadow: none;
            background: #F5F5F5;
        }
        .lesson-item.prep .lesson-icon {
            background-color: #E0E0E0;
            color: var(--sub-color);
            border-color: var(--sub-color);
            box-shadow: none;
        }

        .hidden { display: none; }
        
        /* 动画 */
        .fade-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        footer {
            margin-top: auto;
            padding: 30px;
            font-size: 13px;
            font-weight: 800;
            color: var(--sub-color);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        @media (max-width: 480px) {
            .vocab-container { padding: 24px 0; }
            .lesson-item { padding: 16px; border-radius: 12px; }
            .lesson-icon { width: 48px; height: 48px; font-size: 22px; }
            .lesson-text h3 { font-size: 16px; }
            .lesson-text p { font-size: 12px; }
            .lesson-tag { padding: 4px 10px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="back-btn" data-back-nav>← 戻る</a>
        <h1>☕ N1 メニュー </h1>
    </header>

    <div class="vocab-container">
        <div class="view-section fade-in">
            <div class="title-wrapper">
                <div class="section-title">🐾 N1 単語セット</div>
            </div>

            <div class="lesson-list">
                <!-- 動詞 (马) -->
                <a class="lesson-item" href="verbs_n1.html">
                    <div class="lesson-content">
                        <div class="lesson-icon icon-verb">🐴</div>
                        <div class="lesson-text">
                            <h3>動詞</h3>
                            <p>ウマ店長のおすすめ：N1 动词</p>
                        </div>
                    </div>
                    <span class="lesson-tag">営業中</span>
                </a>

                <!-- 形容詞 (猫) -->
                <a class="lesson-item" href="adjectives_n1.html">
                    <div class="lesson-content">
                        <div class="lesson-icon icon-adj">🐱</div>
                        <div class="lesson-text">
                            <h3>形容詞</h3>
                            <p>ネコ店長のおすすめ：N1 形容词</p>
                        </div>
                    </div>
                    <span class="lesson-tag">営業中</span>
                </a>

                <!-- 副詞 (狗 - 准备中) -->
                <div class="lesson-item prep">
                    <div class="lesson-content">
                        <div class="lesson-icon icon-adv">🐶</div>
                        <div class="lesson-text">
                            <h3>副詞 (準備中)</h3>
                            <p>イヌ店長のおすすめ：程度・状态・呼应</p>
                        </div>
                    </div>
                    <span class="lesson-tag tag-prep">準備中</span>
                </div>

                <!-- 擬音・擬態語 (鹦鹉) -->
                <a class="lesson-item" href="mimetic_n1.html">
                    <div class="lesson-content">
                        <div class="lesson-icon icon-ono">🦜</div>
                        <div class="lesson-text">
                            <h3>擬音・擬態語</h3>
                            <p>オウム店長のおすすめ：N1 拟声拟态词</p>
                        </div>
                    </div>
                    <span class="lesson-tag">営業中</span>
                </a>
            </div>
        </div>
    </div>

    <!-- 包含 Fallback 机制的返回逻辑 -->
    <script src="../../../shared/back-navigation.js"></script>
    <script>
        if (typeof window.bindHierarchicalBack === 'function') {
            window.bindHierarchicalBack({
                selector: "[data-back-nav]",
                fallback: "../index.html"
            });
        } else if (typeof window.bindStatefulBack === 'function') {
            window.bindStatefulBack({
                selector: "[data-back-nav]",
                fallback: "../index.html"
            });
        } else {
            document.querySelectorAll('[data-back-nav]').forEach(function(el) {
                el.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.location.href = "../index.html";
                });
            });
        }
    </script>

    <footer>
        🐾 キキの日本語コーナー
    </footer>

</body>
</html>
