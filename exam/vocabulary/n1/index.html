<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N1 語彙特訓センター</title>
    <!-- 引入优雅的衬线与无衬线字体，契合文字游戏与沉浸阅读风格 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+JP:wght@400;600&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    <style>
        html {
            -webkit-text-size-adjust: 100%;
        }

        :root {
            /* === 暖光理性辅导 ADV / 护眼原木色调色板 === */
            --bg-grad-start: #FDFBF7;      /* 暖白书页色 */
            --bg-grad-end: #F6EFE9;        /* 晨光浅杏色 */
            
            --panel-bg: rgba(255, 255, 255, 0.9); /* 明亮半透明文本框 */
            --panel-border: rgba(210, 195, 180, 0.6); /* 柔和纸质边框 */
            
            --text-main: #4A423E;          /* 主文本（深咖啡/墨褐，比纯黑更护眼） */
            --text-dim: #8C807A;           /* 次要文本（浅褐灰） */
            --text-accent: #C27A62;        /* 剧情高亮色（赤陶橘，温暖理性中带着热情） */
            
            --accent-green: #5C946E;       /* 沉稳森绿（正确/成功） */
            --accent-red: #D16B6B;         /* 柔和朱红（错误/警示） */
            --accent-gold: #D9A05B;        /* 柔和雅金（特殊焦点） */
            --accent-hover: rgba(194, 122, 98, 0.08); /* 暖橘悬浮背景 */

            --glass-blur: blur(12px);      /* 毛玻璃滤镜 */
            --shadow-soft: 0 8px 24px rgba(180, 160, 145, 0.15); /* 浅色暖光阴影 */
            --shadow-glow: 0 0 12px rgba(194, 122, 98, 0.2); /* 橘色微光晕 */

            --font-ui: "Noto Sans SC", "Noto Sans JP", -apple-system, sans-serif;
            --font-serif: "Noto Serif SC", "Noto Serif JP", serif; /* 剧情主体使用衬线体 */
            
            --transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-ui);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            background: var(--bg-grad-end);
        }

        /* 纯 CSS 绘制的静谧氛围背景 */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, var(--bg-grad-start) 0%, var(--bg-grad-end) 80%);
            z-index: -2;
        }
        
        /* 隐约的网格背景，增加秩序感和纸张感 */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }

        header {
            width: 100%;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(253, 251, 247, 0.85);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--panel-border);
            box-shadow: 0 4px 20px rgba(180, 160, 145, 0.08);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--panel-border);
            color: var(--text-dim);
            font-weight: 500;
            font-size: 14px;
            text-decoration: none;
            transition: all var(--transition);
            cursor: pointer;
        }

        .back-btn:hover {
            color: var(--text-accent);
            background: #fff;
            border-color: var(--text-accent);
            box-shadow: var(--shadow-glow);
            transform: translateY(-2px);
        }

        .hero-section {
            width: 100%;
            max-width: 680px;
            text-align: center;
            margin: 60px 0 40px;
            padding: 0 20px;
            z-index: 1;
            position: relative;
        }

        .hero-kicker {
            font-family: var(--font-serif);
            font-size: 14px;
            color: var(--text-accent);
            letter-spacing: 0.2em;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .hero-title {
            font-family: var(--font-serif);
            font-size: 32px;
            color: var(--text-main);
            margin-bottom: 16px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .hero-subtitle {
            font-size: 15px;
            color: var(--text-dim);
            line-height: 1.6;
        }

        .content-wrapper {
            width: 100%;
            max-width: 680px;
            padding: 0 20px 60px;
            flex: 1;
            z-index: 1;
            position: relative;
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .lesson-item {
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: var(--text-main);
            box-shadow: var(--shadow-soft);
            transition: all var(--transition);
        }

        .lesson-item:hover {
            transform: translateY(-4px);
            border-color: var(--text-accent);
            box-shadow: 0 16px 32px rgba(180, 160, 145, 0.25);
            background: #fff;
        }

        .lesson-item:active {
            transform: scale(0.99);
        }

        .lesson-item.disabled {
            pointer-events: none;
            background: rgba(255, 255, 255, 0.4);
            border-color: rgba(210, 195, 180, 0.3);
            box-shadow: none;
        }

        .lesson-content {
            display: flex;
            align-items: center;
            gap: 20px;
            min-width: 0;
        }

        .lesson-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--panel-border);
            background: #fff;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(180, 160, 145, 0.2);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .lesson-item:hover .lesson-icon {
            transform: scale(1.05) rotate(-5deg);
            border-color: var(--text-accent);
        }

        .lesson-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .lesson-icon.grayscale {
            filter: grayscale(100%) opacity(0.5);
        }

        .lesson-text {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }

        .lesson-text h3 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
            font-family: var(--font-serif);
            letter-spacing: 0.05em;
        }

        .lesson-text p {
            margin: 0;
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .lesson-tag {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            white-space: nowrap;
            letter-spacing: 0.1em;
        }

        .tag-active {
            background: rgba(194, 122, 98, 0.1);
            color: var(--text-accent);
            border: 1px solid var(--text-accent);
        }

        .tag-prep {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-dim);
            border: 1px dashed var(--text-dim);
        }

        footer {
            margin-top: auto;
            padding: 24px;
            text-align: center;
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            z-index: 1;
            position: relative;
        }

        @media (max-width: 768px) {
            header {
                padding: calc(14px + env(safe-area-inset-top)) 16px 12px;
            }

            .hero-section {
                margin: 42px 0 28px;
                padding: 0 16px;
            }

            .hero-title {
                font-size: 28px;
            }

            .hero-subtitle {
                font-size: 14px;
            }

            .content-wrapper {
                padding: 0 16px 40px;
            }

            .lesson-item {
                position: relative;
                padding: 18px 90px 16px 18px;
                flex-direction: column;
                align-items: flex-start;
                gap: 14px;
            }

            .lesson-content {
                width: 100%;
                gap: 14px;
            }

            .lesson-tag {
                position: absolute;
                top: 18px;
                right: 18px;
                align-self: auto;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: calc(12px + env(safe-area-inset-top)) 12px 12px;
            }

            .back-btn {
                padding: 7px 12px;
                font-size: 13px;
            }

            .hero-section {
                margin: 32px 0 24px;
                padding: 0 12px;
            }

            .hero-kicker {
                font-size: 12px;
                margin-bottom: 10px;
            }

            .hero-title {
                font-size: 24px;
                margin-bottom: 12px;
            }

            .content-wrapper {
                padding: 0 12px 28px;
            }

            .lesson-item {
                padding: 16px 78px 14px 14px;
                gap: 12px;
            }

            .lesson-content {
                gap: 12px;
            }

            .lesson-icon {
                width: 52px;
                height: 52px;
            }

            .lesson-text h3 {
                font-size: 16px;
            }

            .lesson-text p {
                font-size: 12px;
                line-height: 1.6;
            }

            .lesson-tag {
                top: 14px;
                right: 14px;
                padding: 4px 8px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

    <header>
        <a data-back-nav class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            退出特训中心
        </a>
    </header>

    <div class="hero-section">
        <div class="hero-kicker">VOCABULARY TRAINING</div>
        <h1 class="hero-title">N1 語彙特訓センター</h1>
        <p class="hero-subtitle">请选择你想研习的科目吧。</p>
    </div>

    <div class="content-wrapper">
        <div class="menu-grid">
            
            <!-- 動詞 (雨宮前辈) -->
            <a class="lesson-item" href="verbs_n1.html">
                <div class="lesson-content">
                    <div class="lesson-icon">
                        <!-- 雨宮前辈 -->
                        <img src="https://cdn.jsdelivr.net/gh/Loepickst/kiki@main/exam/vocabulary/n1/icon/xuejie.png" onerror="this.onerror=null;this.src='icon/xuejie.png';" alt="雨宮前辈" style="filter: contrast(95%);">
                    </div>
                    <div class="lesson-text">
                        <h3>動詞 (どうし)</h3>
                        <p>担当：雨宮先輩<br>理性、严谨的全面剖析与高压特训。</p>
                    </div>
                </div>
                <span class="lesson-tag tag-active">辅导中</span>
            </a>

            <!-- 形容詞 (凛) -->
            <a class="lesson-item" href="adjectives_n1.html">
                <div class="lesson-content">
                    <div class="lesson-icon">
                        <!-- 凛（りん） -->
                        <img src="https://cdn.jsdelivr.net/gh/Loepickst/kiki@main/exam/vocabulary/n1/icon/xuemei.png" onerror="this.onerror=null;this.src='icon/xuemei.png';" alt="凛（りん）">
                    </div>
                    <div class="lesson-text">
                        <h3>形容詞 (けいようし)</h3>
                        <p>担当：凛（りん）<br>傲娇学妹的斯巴达式抽查。</p>
                    </div>
                </div>
                <span class="lesson-tag tag-active">辅导中</span>
            </a>

            <!-- 擬音・擬態語 (阳葵) -->
            <a class="lesson-item" href="mimetic_n1.html">
                <div class="lesson-content">
                    <div class="lesson-icon">
                        <!-- 阳葵（ひまり） -->
                        <img src="https://cdn.jsdelivr.net/gh/Loepickst/kiki@main/exam/vocabulary/n1/icon/qingmei.png" onerror="this.onerror=null;this.src='icon/qingmei.png';" alt="阳葵（ひまり）">
                    </div>
                    <div class="lesson-text">
                        <h3>擬音・擬態語</h3>
                        <p>担当：阳葵（ひまり）<br>热情青梅竹马的元气陪伴。</p>
                    </div>
                </div>
                <span class="lesson-tag tag-active">辅导中</span>
            </a>

            <!-- 副詞 (待定导师) -->
            <a class="lesson-item disabled" href="#">
                <div class="lesson-content">
                    <div class="lesson-icon grayscale">
                        <img src="icon/zhuanxiao.png" alt="神秘转校生">
                    </div>
                    <div class="lesson-text">
                        <h3>副詞 (ふくし)</h3>
                        <p>担当：？？？<br>神秘的转校生，会是谁呢？</p>
                    </div>
                </div>
                <span class="lesson-tag tag-prep">準備中</span>
            </a>

        </div>
    </div>

    <!-- 包含 Fallback 机制的返回逻辑 -->
    <script src="../../../shared/back-navigation.js"></script>
    <script>
        if (typeof window.bindHierarchicalBack === 'function') {
            window.bindHierarchicalBack({
                selector: "[data-back-nav]",
                fallback: "../index.html"
            });
        } else if (typeof window.bindStatefulBack === 'function') {
            window.bindStatefulBack({
                selector: "[data-back-nav]",
                fallback: "../index.html"
            });
        } else {
            document.querySelectorAll('[data-back-nav]').forEach(function(el) {
                el.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.location.href = "../index.html";
                });
            });
        }
    </script>

    <footer>
        ✦ 学园词汇特训中心 ✦
    </footer>

</body>
</html>
