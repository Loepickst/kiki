<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N1 副詞 - 単語暗記</title>
    <!-- 引入温馨圆润的字体，契合柴犬的可爱感 -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;900&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        html {
            -webkit-text-size-adjust: 100%;
        }

        :root {
            /* === 温馨调皮柴犬 (Cozy Shiba) 调色板 === */
            --bg: #FFF8EA;             /* 奶油吐司黄 - 温暖的底色 */
            --card-bg: #FFFFFF;        /* 纯白卡片 */
            --surface-hover: #FFF1E6;  /* 浅暖橘悬浮 */
            
            --text: #4A3B32;           /* 浓缩咖啡棕 - 核心文字，温和但清晰 */
            --text-dim: #8A6E59;       /* 浅奶咖 - 辅助文字 */
            
            --border: #FDE2C3;         /* 浅橙分割线 */
            --border-strong: #4A3B32;  /* 深棕色粗边框，提供坚实温馨感 */
            
            /* 强调色 */
            --accent-red: #FF6B6B;     /* 活力红 */
            --accent-green: #4ADE80;   /* 草地绿 */
            --accent-gold: #FFB703;    /* 柴柴金 - 焦点/提示 */
            --accent-main: #F97316;    /* 柴犬橙 - 主题色 */
            --accent-teal: #2DD4BF;    /* 玩具水绿 - 阶段特训 */
            --accent-rose: #FB7185;    /* 肉球粉 - 总复习 */

            /* 漫画风硬阴影（深棕色投影） */
            --shadow-sm: 4px 4px 0px var(--border-strong);
            --shadow-md: 8px 8px 0px var(--border-strong);
            --shadow-hard: 3px 3px 0px var(--border-strong);

            /* 圆润倒角 */
            --radius-xl: 20px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 6px;

            --font-ui: "M PLUS Rounded 1c", "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
            --font-serif: "M PLUS Rounded 1c", "Noto Sans SC", sans-serif;
            
            --transition: 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); /* Q弹动画曲线 */
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-ui);
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            /* 狗爪印的波点背景感 */
            background-image: radial-gradient(var(--border) 2px, transparent 2px);
            background-size: 28px 28px;
        }

        button, input {
            font: inherit;
        }

        /* Header */
        header {
            width: 100%;
            padding: 15px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(255, 248, 234, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 3px solid var(--border-strong);
        }

        .back-btn, .home-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            border-radius: 99px;
            background: var(--card-bg);
            border: 2px solid var(--border-strong);
            color: var(--text);
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            transition: all var(--transition);
            box-shadow: 2px 2px 0px var(--border-strong);
            cursor: pointer;
            white-space: nowrap;
        }

        .back-btn:hover, .home-btn:hover {
            color: #FFF;
            background: var(--accent-main);
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px var(--border-strong);
        }

        h1 { 
            margin: 0; 
            font-size: 18px; 
            font-weight: 900; 
            color: var(--border-strong);
            position: absolute; 
            left: 50%; 
            transform: translateX(-50%); 
            letter-spacing: 0.05em;
        }

        .header-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 14px;
            z-index: 2;
        }

        /* Container */
        .container {
            width: 95%;
            max-width: 640px;
            padding: 32px 0 48px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* --- Day Selection View --- */
        .days-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Active Day Card */
        .day-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            border: 3px solid var(--border-strong);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all var(--transition);
        }

        .day-card:hover {
            transform: translate(-2px, -4px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent-main);
            background: var(--surface-hover);
        }

        .day-card:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px rgba(0,0,0,0); }

        .day-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .day-icon {
            width: 54px; height: 54px;
            background: var(--bg);
            border: 3px solid var(--border-strong);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 2px 2px 0px var(--border-strong);
        }

        .day-text-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .day-title {
            font-size: 18px;
            font-weight: 900;
            color: var(--text);
            margin: 0;
            letter-spacing: 0.05em;
        }

        .day-title-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .last-studied-badge {
            font-size: 11px;
            color: #fff;
            background-color: var(--accent-main);
            border: 2px solid var(--border-strong);
            padding: 2px 8px;
            border-radius: 99px;
            font-weight: 900;
            display: inline-block;
            box-shadow: 1px 1px 0px var(--border-strong);
        }

        .day-subtitle {
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 700;
        }

        .go-badge {
            background: var(--accent-green);
            color: var(--border-strong);
            border: 2px solid var(--border-strong);
            font-size: 14px;
            font-weight: 900;
            padding: 8px 18px;
            border-radius: 99px;
            box-shadow: 2px 2px 0px var(--border-strong);
            transition: all var(--transition);
        }
        
        .day-card:hover .go-badge {
            background: var(--accent-gold);
            transform: scale(1.05) rotate(5deg);
        }

        /* Preparation/Empty Card */
        .day-card.prep {
            background: #F5EBE1;
            border: 3px dashed #D1BFAe;
            box-shadow: none;
            cursor: default;
        }
        .day-card.prep:hover { transform: none; border-color: #D1BFAe; background: #F5EBE1; }

        .day-card.prep .day-icon {
            background: #EAE0D5;
            border-color: #C0A995;
            color: #8A6E59;
            box-shadow: none;
        }
        
        .day-card.prep .day-title { color: #8A6E59; }
        .day-card.prep .day-subtitle { color: #A48B77; }
        
        .construction-icon {
            font-size: 28px;
            opacity: 0.7;
        }

        /* --- Word List View --- */
        .word-list-item {
            background: var(--card-bg);
            padding: 18px 24px;
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 3px solid var(--border-strong);
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
            gap: 12px;
        }
        
        .word-list-item:hover { 
            transform: translate(-2px, -2px); 
            box-shadow: var(--shadow-md); 
            border-color: var(--accent-main);
            background: var(--surface-hover);
        }

        .list-word-text { font-size: 20px; font-weight: 900; color: var(--text); font-family: var(--font-serif); }
        .list-arrow { color: var(--text-dim); font-size: 24px; font-weight: bold; }
        .word-list-item:hover .list-arrow { color: var(--accent-main); transform: translateX(4px); }

        ruby { ruby-position: over; }
        rt { font-size: 0.5em; color: var(--accent-main); font-weight: 900; transform: translateY(-2px); font-family: var(--font-ui); }

        .tone-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 26px;
            line-height: 1;
            font-size: 14px;
            color: #fff;
            background: var(--accent-main);
            border: 2px solid var(--border-strong);
            border-radius: 8px;
            padding: 2px 8px;
            font-weight: 900;
            margin-left: 0;
            box-shadow: 1px 1px 0px var(--border-strong);
        }

        .pos-tag {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 26px;
            line-height: 1;
            font-size: 12px;
            background: var(--bg);
            color: var(--text-dim);
            border: 2px solid var(--text-dim);
            padding: 2px 8px;
            border-radius: 8px;
            margin-left: 0;
            font-weight: 900;
        }

        /* Shiba Button */
        .shiba-btn {
            font-size: 32px;
            cursor: pointer;
            opacity: 0.4;
            filter: grayscale(100%);
            transition: all var(--transition);
            background: transparent;
            border: none;
            padding: 0;
            line-height: 1;
            user-select: none;
        }
        .shiba-btn.active {
            opacity: 1;
            filter: none;
            transform: scale(1.1);
        }
        .shiba-btn:hover {
            transform: scale(1.2) rotate(15deg);
            opacity: 0.9;
        }
        .shiba-btn.active:hover {
            transform: scale(1.25) rotate(-15deg);
            opacity: 1;
        }

        .list-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        /* Full Screen Flashcard Style */
        .flashcard-main {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            border: 4px solid var(--border-strong);
            padding: 32px;
            box-shadow: var(--shadow-md);
            min-height: 420px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: relative;
        }

        .fc-header { 
            border-bottom: 3px dashed var(--border-strong); 
            padding-bottom: 20px; 
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: flex-start;
            gap: 18px;
        }

        .fc-word-group {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .fc-title-row {
            display: flex;
            align-items: flex-end;
            gap: 10px 12px;
            flex-wrap: wrap;
            min-width: 0;
        }

        .fc-meta-group {
            display: flex;
            align-items: center;
            align-self: flex-end;
            gap: 8px;
            flex-wrap: wrap;
            padding-bottom: 3px;
            transform: translateY(2px);
            min-width: 0;
        }
        
        .fc-word { 
            font-size: 38px; 
            font-weight: 900; 
            color: var(--text); 
            margin: 0; 
            line-height: 1.2; 
            font-family: var(--font-serif);
            /* 温暖的标记线 */
            background: linear-gradient(transparent 60%, rgba(249, 115, 22, 0.25) 60%);
            display: inline-block;
            padding: 0 4px;
            min-width: 0;
        }

        .fc-action {
            flex-shrink: 0;
            align-self: flex-start;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            min-width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid var(--border-strong);
            box-shadow: 3px 3px 0px var(--border-strong);
        }

        .fc-section-title { 
            font-size: 15px; 
            color: var(--accent-main); 
            font-weight: 900; 
            margin: 16px 0 8px; 
            letter-spacing: 0.05em; 
        }

        .def-group { margin-bottom: 20px; }
        .def-group + .def-group { border-top: 2px dashed var(--border); padding-top: 20px; }

        .def-number {
            color: #fff;
            background: var(--accent-main);
            border: 2px solid var(--border-strong);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px; height: 24px;
            font-weight: 900;
            font-size: 13px;
            margin-right: 10px;
            box-shadow: 1px 1px 0px var(--border-strong);
        }
        
        .def-meaning {
            font-weight: 900;
            color: var(--text);
            font-size: 18px;
            letter-spacing: 0.05em;
        }
        
        .def-nuance {
            color: var(--text-dim);
            margin-left: 8px;
            font-weight: 700;
            font-size: 14px;
        }

        .def-ex {
            margin-top: 16px;
            background: #FFFaf0;
            padding: 18px 20px;
            border-radius: var(--radius-md);
            border: 2px dashed var(--accent-gold);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
        }

        .def-example-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 10px;
            border-radius: 999px;
            background: var(--accent-gold);
            color: var(--border-strong);
            border: 2px solid var(--border-strong);
            box-shadow: 1px 1px 0px var(--border-strong);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.06em;
            user-select: none;
        }

        .def-example-body {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ex-jp { 
            font-size: 17px; 
            color: var(--text); 
            font-weight: 800; 
            margin: 0; 
            line-height: 1.9;
            letter-spacing: 0.02em;
            font-family: var(--font-serif);
        }
        .ex-cn {
            font-size: 14px;
            color: var(--text);
            opacity: 0.8;
            font-weight: 600;
            line-height: 1.75;
            margin: 0;
            font-family: var(--font-ui);
        }

        .nav-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; }
        .nav-progress { font-size: 14px; font-weight: 700; color: var(--text-dim); }
        
        .nav-btn { 
            background: var(--card-bg); 
            border: 3px solid var(--border-strong); 
            padding: 12px 24px; 
            border-radius: 99px; 
            cursor: pointer; 
            font-weight: 900; 
            color: var(--text); 
            transition: all var(--transition); 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            box-shadow: var(--shadow-hard);
            font-size: 15px;
        }
        .nav-btn:hover:not(.disabled) { transform: translate(-2px, -2px); box-shadow: 5px 5px 0px var(--border-strong); background: var(--surface-hover); color: var(--accent-main); }
        .nav-btn:active:not(.disabled) { transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--border-strong); }
        
        .nav-btn.primary { background: var(--accent-main); color: #fff; }
        .nav-btn.primary:hover:not(.disabled) { background: var(--accent-gold); color: var(--border-strong); border-color: var(--border-strong); }
        .nav-btn.disabled { opacity: 0.4; pointer-events: none; box-shadow: none; }

        /* Practice Picker Overlay */
        .practice-picker-overlay {
            position: fixed;
            inset: 0;
            background: rgba(74, 59, 50, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 240;
            backdrop-filter: blur(4px);
        }

        .practice-picker-overlay.is-open {
            display: flex;
        }

        .practice-picker-panel {
            width: min(92vw, 460px);
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            border: 4px solid var(--border-strong);
            padding: 32px;
            box-shadow: var(--shadow-md);
        }

        .practice-picker-topline {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 16px;
        }

        .practice-picker-kicker {
            font-size: 13px;
            font-weight: 900;
            color: var(--accent-main);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .practice-picker-title {
            font-size: 24px;
            font-weight: 900;
            color: var(--text);
            margin-top: 8px;
        }

        .practice-picker-context {
            color: var(--text-dim);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 24px;
            font-weight: 700;
        }

        .practice-picker-close {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-strong);
            border-radius: 50%;
            background: var(--card-bg);
            color: var(--text);
            font-size: 24px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            box-shadow: 2px 2px 0px var(--border-strong);
        }

        .practice-picker-close:hover {
            background: var(--accent-red);
            color: #fff;
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px var(--border-strong);
        }

        .practice-picker-options {
            display: grid;
            gap: 14px;
        }

        .practice-picker-option {
            width: 100%;
            border: 3px solid var(--border-strong);
            border-radius: var(--radius-lg);
            background: var(--card-bg);
            padding: 18px 20px;
            text-align: left;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--shadow-hard);
        }

        .practice-picker-option:hover {
            transform: translate(-2px, -2px);
            border-color: var(--accent-main);
            background: var(--surface-hover);
            box-shadow: 5px 5px 0px var(--border-strong);
        }

        .practice-picker-option.is-last-used {
            border-color: var(--accent-main);
            background: var(--surface-hover);
        }
        
        .practice-picker-option.is-last-used::before {
            content: '🐕 汪推荐';
            display: inline-block;
            background: var(--accent-main);
            color: #fff;
            font-size: 11px;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 99px;
            margin-bottom: 8px;
            border: 2px solid var(--border-strong);
        }

        .practice-picker-option-title {
            display: block;
            font-size: 18px;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 6px;
        }

        .practice-picker-option-sub {
            display: block;
            color: var(--text-dim);
            font-size: 13px;
            line-height: 1.5;
            font-weight: 500;
        }

        body.practice-picker-open {
            overflow: hidden;
        }

        /* Mobile Responsive Adjustments */
        @media (max-width: 768px) {
            header {
                padding: calc(12px + env(safe-area-inset-top)) 12px 12px;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            h1 {
                position: static;
                left: auto;
                transform: none;
                flex: 1 1 auto;
                min-width: 0;
                text-align: center;
                font-size: 16px;
                line-height: 1.1;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .header-actions {
                flex: 0 0 auto;
                min-width: 84px;
                margin-left: 0;
                gap: 8px;
            }

            .back-btn,
            .home-btn {
                flex: 0 0 auto;
                min-height: 36px;
                padding: 6px 10px;
                font-size: 12px;
                line-height: 1;
                gap: 6px;
            }

            .container {
                width: min(100%, calc(100vw - 24px));
                padding: 18px 0 36px;
                gap: 16px;
            }

            .day-card,
            .word-list-item {
                padding: 16px;
                align-items: flex-start;
            }

            .day-card {
                position: relative;
                gap: 14px;
                padding-right: 88px;
            }

            .day-info {
                flex: 1 1 auto;
                width: 100%;
                min-width: 0;
                align-items: flex-start;
            }

            .day-title-row {
                flex-wrap: wrap;
            }

            .go-badge {
                position: absolute;
                top: 16px;
                right: 16px;
                align-self: auto;
                flex-shrink: 0;
            }

            .list-word-text {
                flex: 1 1 auto;
                min-width: 0;
                font-size: 18px;
                line-height: 1.5;
            }

            .flashcard-main {
                min-height: 0;
                padding: 24px 20px;
                gap: 18px;
            }

            .fc-header {
                gap: 12px;
                padding-bottom: 14px;
            }

            .fc-word-group {
                gap: 8px;
            }

            .fc-title-row {
                gap: 8px 10px;
            }

            .fc-meta-group {
                gap: 6px;
                padding-bottom: 2px;
                transform: translateY(2px);
            }

            .fc-word {
                font-size: 30px;
            }

            .fc-action {
                width: 44px;
                min-width: 44px;
                height: 44px;
            }

            .def-ex {
                padding: 16px 16px;
                gap: 8px;
            }

            .nav-controls {
                display: grid;
                grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
                align-items: center;
                gap: 8px;
                width: 100%;
            }

            .nav-progress {
                flex: 0 0 auto;
                min-width: 40px;
                font-size: 12px;
                text-align: center;
                justify-self: center;
            }

            .nav-btn {
                flex: 0 0 auto;
                min-width: 0;
                min-height: 38px;
                padding: 8px 10px;
                gap: 4px;

    </style>
    <link rel="stylesheet" href="../../../shared/site-fonts.css">
</head>
<body>
    <header>
        <a id="back-btn" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            返回
        </a>
        <h1 id="page-title">N1 副詞</h1>
        <div class="header-actions">
            <a id="header-home-btn" href="../../../index.html#exam" class="home-btn">返回狗窝</a>
        </div>
    </header>

    <div class="container">
        <!-- View 1: Day Selection List -->
        <div id="days-view" class="days-grid">
            <!-- Injected by JS -->
        </div>

        <!-- View 2: Word List (Directory) -->
        <div id="word-list-view" class="hidden">
            <div id="word-list-container" style="display: flex; flex-direction: column; gap: 16px;">
                <!-- Injected by JS -->
            </div>
        </div>

        <!-- View 3: Word Detail (Flashcard) -->
        <div id="word-detail-view" class="hidden">
            <!-- Injected by JS -->
        </div>
    </div>

    <div id="practice-picker-overlay" class="practice-picker-overlay" aria-hidden="true">
        <div class="practice-picker-panel" role="dialog" aria-modal="true" aria-labelledby="practice-picker-title">
            <div class="practice-picker-topline">
                <div>
                    <div class="practice-picker-kicker">柴太郎的训练场</div>
                    <div id="practice-picker-title" class="practice-picker-title">选择汪练方式</div>
                </div>
                <button type="button" id="practice-picker-close" class="practice-picker-close" aria-label="关闭">×</button>
            </div>
            <div id="practice-picker-context" class="practice-picker-context"></div>
            <div id="practice-picker-options" class="practice-picker-options"></div>
        </div>
    </div>

    <script src="n1_adverbs_data.js"></script>
    <script src="n1-adverbs-curriculum.js"></script>
    <script>
        const CURRICULUM_DAYS = Array.isArray(window.LAB_N1_ADVERB_DAYS) ? window.LAB_N1_ADVERB_DAYS : [];
        const CURRICULUM_STAGES = Array.isArray(window.LAB_N1_ADVERB_STAGES) ? window.LAB_N1_ADVERB_STAGES : [];
        const CURRICULUM_GROUPS = Array.isArray(window.LAB_N1_ADVERB_GROUPS) ? window.LAB_N1_ADVERB_GROUPS : [];
        
        const STAR_KEY_PREFIX = 'study_quest_test_v1_vocab_star::';
        const LAST_DAY_STORAGE_KEY = 'study_quest_test_v1_n1_adverbs_last_day';
        const PRACTICE_TYPE_STORAGE_KEY = 'study_quest_test_v1_n1_adverbs_practice_type';
        
        const PRACTICE_TYPE_OPTIONS = Object.freeze([
            Object.freeze({
                id: 'reading',
                label: '读音填空 (嗷呜)',
                hint: '别光看汉字发呆，快把假名拼出来！'
            }),
            Object.freeze({
                id: 'meaning',
                label: '假名选义 (哼唧)',
                hint: '看假名选中文意思，猜错小心我咬你哦！'
            }),
            Object.freeze({
                id: 'sentence',
                label: '句子填空 (汪？)',
                hint: '闻一闻语境，选出最合适的那根骨头。'
            })
        ]);

        let currentView = 'days';
        let currentDay = 1;
        let currentDailyWords = [];
        let currentWordIndex = 0;
        let currentPracticeType = getStoredPracticeType();
        let practicePickerContext = null;

        const backBtn = document.getElementById('back-btn');
        const pageTitle = document.getElementById('page-title');
        const homeBtn = document.getElementById('header-home-btn');
        const headerActions = document.querySelector('.header-actions');
        const headerPracticeBtn = document.getElementById('header-practice-btn');
        const daysView = document.getElementById('days-view');
        const wordListView = document.getElementById('word-list-view');
        const wordDetailView = document.getElementById('word-detail-view');
        const practicePickerOverlay = document.getElementById('practice-picker-overlay');
        const practicePickerCloseBtn = document.getElementById('practice-picker-close');
        const practicePickerContextNode = document.getElementById('practice-picker-context');
        const practicePickerOptionsNode = document.getElementById('practice-picker-options');

        function safeGetItem(key) {
            try {
                return localStorage.getItem(key);
            } catch (error) {
                console.warn('LocalStorage access denied', error);
                return null;
            }
        }

        function safeSetItem(key, value) {
            try {
                localStorage.setItem(key, value);
            } catch (error) {
                console.warn('LocalStorage write denied', error);
            }
        }

        function safeRemoveItem(key) {
            try {
                localStorage.removeItem(key);
            } catch (error) {
                console.warn('LocalStorage remove denied', error);
            }
        }

        function syncHeaderActions() {
            if (!headerActions) {
                return;
            }
            const shouldShowHome = !!homeBtn && homeBtn.style.display !== 'none';
            const shouldShowPractice = !!headerPracticeBtn && headerPracticeBtn.style.display !== 'none';
            headerActions.style.visibility = shouldShowHome || shouldShowPractice ? 'visible' : 'hidden';
            headerActions.style.pointerEvents = shouldShowHome || shouldShowPractice ? 'auto' : 'none';
        }

        function escapeHtml(value) {
            return String(value == null ? '' : value).replace(/[&<>"']/g, (char) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function isPlaceholderWord(word) {
            const surface = String(word && word.word ? word.word : '').trim();
            return !surface || surface === '（準備中）' || surface === '---';
        }

        function getVocabStarKey(wordId) {
            return `${STAR_KEY_PREFIX}${String(wordId || '').trim()}`;
        }

        function getLastStudiedDay() {
            return parseInt(safeGetItem(LAST_DAY_STORAGE_KEY) || '', 10) || 0;
        }

        function setLastStudiedDay(dayId) {
            safeSetItem(LAST_DAY_STORAGE_KEY, String(dayId));
        }

        function normalizePracticeType(value) {
            const normalized = String(value || '').trim().toLowerCase();
            return PRACTICE_TYPE_OPTIONS.some((option) => option.id === normalized) ? normalized : 'sentence';
        }

        function getStoredPracticeType() {
            return normalizePracticeType(safeGetItem(PRACTICE_TYPE_STORAGE_KEY));
        }

        function setStoredPracticeType(type) {
            currentPracticeType = normalizePracticeType(type);
            safeSetItem(PRACTICE_TYPE_STORAGE_KEY, currentPracticeType);
        }

        function getCurrentPracticeTypeMeta() {
            return PRACTICE_TYPE_OPTIONS.find((option) => option.id === currentPracticeType) || PRACTICE_TYPE_OPTIONS[0];
        }

        function buildPracticeUrl(params, explicitType) {
            const searchParams = new URLSearchParams();
            Object.entries(params || {}).forEach(([key, value]) => {
                if (value === undefined || value === null || value === '') return;
                searchParams.set(key, String(value));
            });
            searchParams.set('type', normalizePracticeType(explicitType || currentPracticeType));
            return `practice_n1_adverbs.html?${searchParams.toString()}`;
        }

        function getCurriculumDay(dayId) {
            return CURRICULUM_DAYS.find((day) => Number(day.id) === Number(dayId)) || null;
        }

        function getCurriculumStage(stageId) {
            return CURRICULUM_STAGES.find((stage) => Number(stage.id) === Number(stageId)) || null;
        }

        function getCurriculumGroup(groupId) {
            return CURRICULUM_GROUPS.find((group) => Number(group.id) === Number(groupId)) || null;
        }

        function collectWordsByIndexes(indexes) {
            if (!Array.isArray(indexes) || typeof FULL_WORD_LIST === 'undefined' || !Array.isArray(FULL_WORD_LIST)) return [];
            const seen = new Set();
            return indexes.map((index) => FULL_WORD_LIST[index]).filter((word) => {
                if (!word || isPlaceholderWord(word)) return false;
                if (seen.has(word.word)) return false;
                seen.add(word.word);
                return true;
            });
        }

        function getDayWords(dayId) {
            const day = getCurriculumDay(dayId);
            if (day && Array.isArray(day.wordIds)) {
                return collectWordsByIndexes(day.wordIds);
            }
            if (typeof FULL_WORD_LIST === 'undefined' || !Array.isArray(FULL_WORD_LIST)) return [];
            const wordsPerDay = typeof WORDS_PER_DAY !== 'undefined' ? WORDS_PER_DAY : 20;
            const start = (dayId - 1) * wordsPerDay;
            const size = dayId === 13 ? 25 : wordsPerDay;
            return FULL_WORD_LIST.slice(start, start + size).filter((word) => !isPlaceholderWord(word));
        }

        function getAllCurriculumWords() {
            if (CURRICULUM_DAYS.length > 0) {
                return collectWordsByIndexes(CURRICULUM_DAYS.flatMap((day) => Array.isArray(day.wordIds) ? day.wordIds : []));
            }
            return (typeof FULL_WORD_LIST !== 'undefined' && Array.isArray(FULL_WORD_LIST)) ? FULL_WORD_LIST.filter((word) => !isPlaceholderWord(word)) : [];
        }

        function getStarredWords() {
            return (typeof FULL_WORD_LIST !== 'undefined' && Array.isArray(FULL_WORD_LIST))
                ? FULL_WORD_LIST.filter((word) => !isPlaceholderWord(word) && safeGetItem(getVocabStarKey(word.word)) === 'true')
                : [];
        }

        function getStarredCount() {
            return getStarredWords().length;
        }

        function buildPracticePickerMeta(params) {
            if (params && params.mode === 'final') {
                return {
                    title: '柴犬之王终极跑酷',
                    context: '带上你所有的骨头，迎接本汪的终极跑酷考核吧！'
                };
            }
            if (params && Number(params.day) === -1) {
                return {
                    title: '疑难骨头收集',
                    context: '之前咬不碎的骨头，这次一定要把它刨出来嚼个精光！'
                };
            }
            if (params && params.stage != null) {
                const stage = getCurriculumStage(Number(params.stage));
                const group = stage ? getCurriculumGroup(stage.groupId) : null;
                return {
                    title: '选择汪练方式',
                    context: stage
                        ? `${group ? `${group.title} · ` : ''}${stage.title}`
                        : `阶段特训 ${params.stage}`
                };
            }
            if (params && params.day != null) {
                const day = getCurriculumDay(Number(params.day));
                const group = day ? getCurriculumGroup(day.groupId) : null;
                return {
                    title: '选择汪练方式',
                    context: day
                        ? `${group ? `${group.title} · ` : ''}${day.title}`
                        : `第 ${params.day} 块领地`
                };
            }
            return {
                title: '选择汪练方式',
                context: '你想怎么刨这块土？选一个吧！'
            };
        }

        function closePracticePicker() {
            practicePickerContext = null;
            practicePickerOverlay.classList.remove('is-open');
            practicePickerOverlay.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('practice-picker-open');
        }

        function launchPracticeFromPicker(type) {
            if (!practicePickerContext) {
                closePracticePicker();
                return;
            }
            setStoredPracticeType(type);
            window.location.href = buildPracticeUrl(practicePickerContext.params, type);
        }

        function openPracticePicker(params) {
            const pickerMeta = buildPracticePickerMeta(params);
            practicePickerContext = {
                params: { ...(params || {}) },
                meta: pickerMeta
            };
            practicePickerContextNode.textContent = pickerMeta.context;
            document.getElementById('practice-picker-title').textContent = pickerMeta.title;
            practicePickerOptionsNode.innerHTML = PRACTICE_TYPE_OPTIONS.map((option) => `
                <button
                    type="button"
                    class="practice-picker-option ${option.id === currentPracticeType ? 'is-last-used' : ''}"
                    data-picker-type="${option.id}"
                >
                    <span class="practice-picker-option-title">${escapeHtml(option.label)}</span>
                    <span class="practice-picker-option-sub">${escapeHtml(option.hint)}</span>
                </button>
            `).join('');
            practicePickerOptionsNode.querySelectorAll('[data-picker-type]').forEach((node) => {
                node.addEventListener('click', () => launchPracticeFromPicker(node.dataset.pickerType));
            });
            practicePickerOverlay.classList.add('is-open');
            practicePickerOverlay.setAttribute('aria-hidden', 'false');
            document.body.classList.add('practice-picker-open');
        }

        function startPractice(dayId) {
            if (Number(dayId) === -1) {
                startReviewPractice();
                return;
            }
            openPracticePicker({ day: dayId });
        }

        function startStagePractice(stageId) {
            openPracticePicker({ stage: stageId });
        }

        function startFinalPractice() {
            openPracticePicker({ mode: 'final' });
        }

        function startReviewPractice() {
            if (getStarredCount() === 0) {
                alert('汪呜！还没有咬不碎的骨头哦。');
                return;
            }
            openPracticePicker({ day: -1 });
        }

        function selectStarredWords() {
            const starredWords = getStarredWords();
            if (starredWords.length === 0) {
                alert('汪呜！还没有咬不碎的骨头哦。');
                return;
            }
            currentDay = -1;
            currentDailyWords = starredWords;
            currentView = 'list';
            renderWordList(currentDailyWords);
            updateUI();
        }

        function renderDays() {
            daysView.innerHTML = '';

            // Review Card
            const reviewCard = document.createElement('div');
            reviewCard.className = 'day-card';
            reviewCard.style.borderColor = 'var(--accent-main)';
            reviewCard.innerHTML = `
                <div class="day-info">
                    <div class="day-icon" style="color: var(--accent-main); font-size: 32px;">🐕</div>
                    <div class="day-text-group">
                        <div class="day-title" style="color: var(--accent-main);">疑难骨头收集</div>
                        <div class="day-subtitle">${getStarredCount()} 根难啃的骨头 • 等你来刨</div>
                    </div>
                </div>
                <div class="go-badge" style="background: var(--accent-main);">刨土</div>
            `;
            reviewCard.addEventListener('click', startReviewPractice);
            daysView.appendChild(reviewCard);

            const lastDay = getLastStudiedDay();
            const stageByEndDay = new Map();
            CURRICULUM_STAGES.forEach((stage) => {
                if (Array.isArray(stage.dayIds) && stage.dayIds.length > 0) {
                    stageByEndDay.set(stage.dayIds[stage.dayIds.length - 1], stage);
                }
            });

            const totalDaysCount = CURRICULUM_DAYS.length || 18;
            
            for (let dayId = 1; dayId <= totalDaysCount; dayId += 1) {
                const day = getCurriculumDay(dayId);
                const wordsPerDay = typeof WORDS_PER_DAY !== 'undefined' ? WORDS_PER_DAY : 20;
                const wordCount = day && Array.isArray(day.wordIds)
                    ? day.wordIds.length
                    : (dayId === 13 ? 25 : wordsPerDay);
                const badgeHtml = dayId === lastDay ? `<span class="last-studied-badge">上次巡视</span>` : '';

                const dayCard = document.createElement('div');
                dayCard.className = 'day-card';
                dayCard.innerHTML = `
                    <div class="day-info">
                        <div class="day-icon">🦴</div>
                        <div class="day-text-group">
                            <div class="day-title-row">
                                <div class="day-title">第 ${dayId} 块领地</div>
                                ${badgeHtml}
                            </div>
                            <div class="day-subtitle">${wordCount} 步 • 已标记</div>
                        </div>
                    </div>
                    <div class="go-badge" style="background: var(--text);">巡视</div>
                `;
                dayCard.addEventListener('click', () => selectDay(dayId));
                daysView.appendChild(dayCard);

                const stage = stageByEndDay.get(dayId);
                if (stage) {
                    const startDay = stage.dayIds[0];
                    const endDay = stage.dayIds[stage.dayIds.length - 1];
                    const stageCard = document.createElement('div');
                    stageCard.className = 'day-card';
                    stageCard.style.borderColor = 'var(--accent-teal)';
                    stageCard.style.background = '#F0FDFA';
                    stageCard.innerHTML = `
                        <div class="day-info">
                            <div class="day-icon" style="border-color: var(--accent-teal);">🎾</div>
                            <div class="day-text-group">
                                <div class="day-title" style="color: var(--accent-teal);">${escapeHtml(stage.title || `阶段汪练 ${stage.id}`)}</div>
                                <div class="day-subtitle">领地 ${startDay} - ${endDay} • 20 题考核</div>
                            </div>
                        </div>
                        <div class="go-badge" style="background: var(--accent-teal); color: var(--border-strong);">汪练</div>
                    `;
                    stageCard.addEventListener('click', () => startStagePractice(stage.id));
                    daysView.appendChild(stageCard);
                }
            }

            // Final Card
            const finalCard = document.createElement('div');
            finalCard.className = 'day-card';
            finalCard.style.borderColor = 'var(--accent-rose)';
            finalCard.style.background = '#FFF1F2';
            finalCard.innerHTML = `
                <div class="day-info">
                    <div class="day-icon" style="border-color: var(--accent-rose); font-size: 28px;">🍖</div>
                    <div class="day-text-group">
                        <div class="day-title" style="color: var(--accent-rose);">柴犬之王跑酷</div>
                        <div class="day-subtitle">全 ${getAllCurriculumWords().length} 词 • 20 题综合狂飙</div>
                    </div>
                </div>
                <div class="go-badge" style="background: var(--accent-rose);">狂奔</div>
            `;
            finalCard.addEventListener('click', startFinalPractice);
            daysView.appendChild(finalCard);

            // Prep Card
            const prepCard = document.createElement('div');
            prepCard.className = 'day-card prep';
            prepCard.innerHTML = `
                <div class="day-info">
                    <div class="day-text-group">
                        <div style="margin-bottom:6px;">
                            <span style="background:var(--border-strong); color:#fff; font-size:11px; padding:4px 8px; border-radius:99px; font-weight:900;">呼噜噜...</span>
                        </div>
                        <div class="day-title">新领地 (未解锁)</div>
                        <div class="day-subtitle" style="margin-top:4px;">柴柴还在睡觉，等它醒了再来吧！</div>
                    </div>
                </div>
                <div class="construction-icon">💤</div>
            `;
            daysView.appendChild(prepCard);
        }

        function selectDay(dayId) {
            setLastStudiedDay(dayId);
            currentDay = dayId;
            currentView = 'list';
            currentDailyWords = getDayWords(dayId);
            renderWordList(currentDailyWords);
            updateUI();
        }

        function renderWordList(words) {
            const container = document.getElementById('word-list-container');
            container.innerHTML = '';

            words.forEach((wordData, index) => {
                const item = document.createElement('div');
                item.className = 'word-list-item';
                const wordId = wordData.word;
                const isStarred = safeGetItem(getVocabStarKey(wordId)) === 'true';
                item.innerHTML = `
                    <div class="list-word-text">${wordData.word_html || wordData.word}</div>
                    <div class="list-actions">
                        <div class="shiba-btn ${isStarred ? 'active' : ''}" data-word="${escapeHtml(wordId)}">🐕</div>
                        <div class="list-arrow">🐾</div>
                    </div>
                `;
                item.addEventListener('click', (event) => {
                    const btn = event.target.closest('.shiba-btn');
                    if (btn) {
                        event.stopPropagation();
                        toggleShiba(btn, wordId);
                        return;
                    }
                    openWordDetail(index);
                });
                container.appendChild(item);
            });

            window.scrollTo(0, 0);
        }

        function toggleShiba(button, wordId) {
            const storageKey = getVocabStarKey(wordId);
            const nextActive = safeGetItem(storageKey) !== 'true';
            if (nextActive) {
                safeSetItem(storageKey, 'true');
            } else {
                safeRemoveItem(storageKey);
            }
            button.classList.toggle('active', nextActive);
        }

        function openWordDetail(index) {
            currentWordIndex = index;
            currentView = 'detail';
            renderDetailCard();
            updateUI();
        }

        function renderDetailCard() {
            const container = document.getElementById('word-detail-view');
            const wordData = currentDailyWords[currentWordIndex];
            if (!wordData) return;

            const toneHtml = wordData.tone ? `<span class="tone-number">${wordData.tone}</span>` : '';
            const posHtml = wordData.pos ? `<span class="pos-tag">${wordData.pos}</span>` : '';
            const meanings = wordData.mean ? wordData.mean.split(/[；;]/).map((item) => item.trim()).filter(Boolean) : [];
            const nuances = wordData.nuance
                ? wordData.nuance.split('\n').map((line) => line.trim().replace(/^\d+\.\s*/, '')).filter(Boolean)
                : [];
            const examples = Array.isArray(wordData.examples) ? wordData.examples : [];
            const count = Math.max(meanings.length, nuances.length, examples.length);
            const numbers = ['❶', '❷', '❸', '❹', '❺', '❻', '❼', '❽', '❾', '❿'];

            let definitionsHtml = '';
            for (let index = 0; index < count; index += 1) {
                const meanText = meanings[index] || (meanings.length === 1 && index === 0 ? meanings[0] : '');
                const nuanceText = nuances[index] || '';
                const example = examples[index];
                
                definitionsHtml += `<div class="def-group">`;
                if (meanText || nuanceText) {
                    definitionsHtml += `
                        <div style="display: flex; align-items: baseline; margin-bottom: 8px; line-height: 1.6;">
                            <span class="def-number">${numbers[index] || `${index + 1}.`}</span>
                            ${meanText ? `<span class="def-meaning">${meanText}</span>` : ''}
                            ${nuanceText ? `<span class="def-nuance">（${nuanceText}）</span>` : ''}
                        </div>
                    `;
                }
                if (example) {
                    definitionsHtml += `
                        <div class="def-ex">
                            <div class="def-example-label">例句</div>
                            <div class="def-example-body">
                                <div class="ex-jp" lang="ja">${example.jp}</div>
                                <div class="ex-cn">（${example.cn}）</div>
                            </div>
                        </div>
                    `;
                }
                definitionsHtml += `</div>`;
            }

            const isFirst = currentWordIndex === 0;
            const isLast = currentWordIndex === currentDailyWords.length - 1;
            const wordId = wordData.word;
            const isStarred = safeGetItem(getVocabStarKey(wordId)) === 'true';
            const metaHtml = toneHtml || posHtml
                ? `<div class="fc-meta-group">${toneHtml}${posHtml}</div>`
                : '';

            container.innerHTML = `
                <div class="flashcard-main">
                    <div class="fc-header">
                        <div class="fc-word-group">
                            <div class="fc-title-row">
                                <div class="fc-word">${wordData.word_html || wordData.word}</div>
                                ${metaHtml}
                            </div>
                        </div>
                        <div class="shiba-btn fc-action ${isStarred ? 'active' : ''}" onclick="toggleShiba(this, '${wordId}')">🐕</div>
                    </div>
                    
                    <div style="flex: 1;">
                        <div class="fc-section-title">🦴 细细嗅探</div>
                        <div>
                            ${definitionsHtml}
                        </div>
                    </div>

                    <div class="nav-controls">
                        <button class="nav-btn ${isFirst ? 'disabled' : ''}" onclick="navigateWord(-1)">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                            上一词
                        </button>
                        <div class="nav-progress">${currentWordIndex + 1} / ${currentDailyWords.length}</div>
                        <button class="nav-btn primary ${isLast ? 'practice-btn' : ''}" onclick="${isLast ? `startPractice(${currentDay})` : 'navigateWord(1)'}">
                            ${isLast ? '去汪练 (考核)' : '下一词'}
                            ${isLast ? '' : '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>'}
                        </button>
                    </div>
                </div>
            `;

            window.scrollTo(0, 0);
        }

        function navigateWord(direction) {
            const nextIndex = currentWordIndex + direction;
            if (nextIndex >= 0 && nextIndex < currentDailyWords.length) {
                currentWordIndex = nextIndex;
                renderDetailCard();
            }
        }

        function updateUI() {
            daysView.classList.add('hidden');
            wordListView.classList.add('hidden');
            wordDetailView.classList.add('hidden');

            if (homeBtn) {
                homeBtn.style.display = 'none';
            }
            if (headerPracticeBtn) {
                headerPracticeBtn.style.display = 'none';
                headerPracticeBtn.onclick = null;
            }

            if (currentView === 'days') {
                daysView.classList.remove('hidden');
                const totalDaysCount = CURRICULUM_DAYS.length || 18;
                pageTitle.textContent = `N1 副詞 (全 ${totalDaysCount} 块领地)`;
                backBtn.onclick = () => window.location.href = 'index.html';
                backBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg> 返回大厅';
                syncHeaderActions();
                return;
            }

            if (currentView === 'list') {
                wordListView.classList.remove('hidden');
                pageTitle.textContent = currentDay === -1 ? '疑难骨头' : `第 ${currentDay} 块领地`;
                if (currentDailyWords.length > 0) {
                    renderWordList(currentDailyWords);
                }
                syncHeaderActions();
                backBtn.onclick = () => {
                    currentView = 'days';
                    renderDays();
                    updateUI();
                };
                backBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg> 领地全貌';
                return;
            }

            wordDetailView.classList.remove('hidden');
            pageTitle.textContent = '好好啃啃';
            syncHeaderActions();
            backBtn.onclick = () => {
                currentView = 'list';
                updateUI();
            };
            backBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg> 返回巡视';
        }

        renderDays();
        updateUI();

        if (practicePickerCloseBtn) {
            practicePickerCloseBtn.addEventListener('click', closePracticePicker);
        }
        if (practicePickerOverlay) {
            practicePickerOverlay.addEventListener('click', (event) => {
                if (event.target === practicePickerOverlay) {
                    closePracticePicker();
                }
            });
        }
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && practicePickerOverlay.classList.contains('is-open')) {
                closePracticePicker();
            }
        });

        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;
        const minSwipeDistance = 50;

        document.addEventListener('touchstart', (event) => {
            touchStartX = event.changedTouches[0].screenX;
            touchStartY = event.changedTouches[0].screenY;
        }, false);

        document.addEventListener('touchend', (event) => {
            touchEndX = event.changedTouches[0].screenX;
            touchEndY = event.changedTouches[0].screenY;
            if (currentView !== 'detail') return;
            const distanceX = touchEndX - touchStartX;
            const distanceY = touchEndY - touchStartY;
            if (Math.abs(distanceX) > Math.abs(distanceY) && Math.abs(distanceX) > minSwipeDistance) {
                navigateWord(distanceX < 0 ? 1 : -1);
            }
        }, false);
    </script>
</body>
</html>
