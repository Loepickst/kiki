<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N1 副詞 - 練習</title>
    <!-- 引入温馨圆润的字体，契合柴犬的可爱感 -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;900&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        html {
            -webkit-text-size-adjust: 100%;
        }

        :root {
            /* === 温馨调皮柴犬 (Cozy Shiba) 调色板 === */
            --bg: #FFF8EA;             /* 奶油吐司黄 - 温暖的底色 */
            --card-bg: #FFFFFF;        /* 纯白卡片 */
            --surface-hover: #FFF1E6;  /* 浅暖橘悬浮 */
            
            --text-strong: #3E3129;    /* 强调标题/关键正文 */
            --text: #4A3B32;           /* 浓缩咖啡棕 - 核心文字，温和但清晰 */
            --text-secondary: #654F40; /* 次正文（稳定可读） */
            --text-tertiary: #7B6658;  /* 弱提示（不再发灰发虚） */
            --text-ruby: #D76B16;      /* 注音与小提示 */
            --text-dim: var(--text-tertiary);
            
            --border: #FDE2C3;         /* 浅橙分割线 */
            --border-strong: #4A3B32;  /* 深棕色粗边框，提供坚实温馨感 */
            
            /* 强调色 */
            --accent-red: #FF6B6B;     /* 活力红 */
            --accent-green: #4ADE80;   /* 草地绿 */
            --accent-gold: #FFB703;    /* 柴柴金 - 焦点/提示 */
            --accent-main: #F97316;    /* 柴犬橙 - 主题色 */
            --accent-teal: #2DD4BF;    /* 玩具水绿 - 阶段特训 */
            --accent-rose: #FB7185;    /* 肉球粉 - 总复习 */

            /* 漫画风硬阴影（深棕色投影） */
            --shadow-sm: 4px 4px 0px var(--border-strong);
            --shadow-md: 8px 8px 0px var(--border-strong);
            --shadow-hard: 3px 3px 0px var(--border-strong);

            /* 圆润倒角 */
            --radius-xl: 20px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;

            --font-ui: "M PLUS Rounded 1c", "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
            --font-serif: "M PLUS Rounded 1c", "Noto Sans SC", sans-serif;
            
            --transition: 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            background: var(--bg);
            font-family: var(--font-ui);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            /* 狗爪印的波点背景感 */
            background-image: radial-gradient(var(--border) 2px, transparent 2px);
            background-size: 28px 28px;
        }

        button, input {
            font: inherit;
        }

        /* 左上角返回按钮 */
        .page-back-btn {
            position: fixed;
            top: 20px;
            left: 24px;
            z-index: 120;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 99px;
            background: var(--card-bg);
            border: 2px solid var(--border-strong);
            color: var(--text);
            font-weight: 900;
            font-size: 14px;
            text-decoration: none;
            transition: all var(--transition);
            box-shadow: 3px 3px 0px var(--border-strong);
        }

        .page-back-btn:hover {
            background: var(--accent-main);
            color: #FFF;
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px var(--border-strong);
        }

        .page-back-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--border-strong);
        }

        .practice-shell {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 80px 20px 40px;
            position: relative;
            z-index: 1;
        }

        .screen {
            width: 100%;
            max-width: 680px;
            margin: 0 auto;
        }

        .challenge-screen {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .hidden {
            display: none !important;
        }

        /* 引导与结算界面：可爱漫画卡片 */
        .intro-card,
        .summary-card {
            width: 100%;
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            border: 4px solid var(--border-strong);
            padding: 40px;
            box-shadow: var(--shadow-md);
            position: relative;
        }

        .summary-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 16px;
            border-radius: 99px;
            background: var(--surface-hover);
            color: var(--accent-main);
            border: 2px solid var(--accent-main);
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            box-shadow: 2px 2px 0px var(--accent-main);
        }

        .summary-overline {
            margin-top: 24px;
            color: var(--accent-main);
            font-size: 16px;
            font-weight: 900;
        }

        .summary-title {
            margin: 8px 0 16px;
            font-size: 38px;
            font-weight: 900;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .summary-subtitle {
            margin: 0;
            color: var(--text-secondary);
            font-size: 16px;
            line-height: 1.68;
            font-weight: 800;
        }

        .intro-dialogue-row {
            display: flex;
            align-items: flex-start;
            gap: 24px;
            margin-bottom: 32px;
        }

        .intro-avatar-wrap {
            flex-shrink: 0;
        }

        /* 柴犬头像 */
        .intro-avatar, .enemy-avatar {
            width: 88px;
            height: 88px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-gold);
            border-radius: 20px;
            border: 4px solid var(--border-strong);
            font-size: 48px;
            box-shadow: 4px 4px 0px var(--border-strong);
        }

        .enemy-avatar {
            width: 80px;
            height: 80px;
            font-size: 44px;
        }

        .shiba-sway {
            animation: shibaSway 3s ease-in-out infinite;
        }

        @keyframes shibaSway {
            0%, 100% { transform: rotate(-5deg) translateY(0); }
            50% { transform: rotate(5deg) translateY(-4px); }
        }

        .intro-dialogue-main {
            flex: 1;
        }

        .story-panel {
            min-height: 80px;
            cursor: pointer;
            background: var(--surface-hover);
            padding: 18px 24px;
            border-radius: var(--radius-md);
            border: 3px solid var(--border-strong);
            box-shadow: 4px 4px 0px rgba(74, 59, 50, 0.1);
        }

        .story-text, .typewriter-text {
            font-size: 18px;
            line-height: 1.8;
            color: var(--text);
            font-family: var(--font-serif);
            font-weight: 700;
            white-space: pre-wrap;
            letter-spacing: 0.02em;
        }

        .story-hint {
            font-size: 13px;
            color: var(--accent-main);
            margin-top: 12px;
            font-weight: 900;
            text-align: right;
        }

        .typing-cursor::after {
            content: '🐾';
            display: inline-block;
            font-size: 16px;
            color: var(--accent-main);
            margin-left: 6px;
            vertical-align: baseline;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* 按钮：温和果冻感 */
        .intro-actions, .summary-actions {
            display: grid;
            gap: 16px;
            margin-top: 32px;
            border-top: 3px solid var(--border-strong);
            padding-top: 32px;
        }

        .intro-primary-btn,
        .summary-primary-btn,
        .summary-secondary-btn {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius-lg);
            border: 3px solid var(--border-strong);
            background: var(--accent-main);
            color: #ffffff;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.15s ease;
            letter-spacing: 0.05em;
            box-shadow: var(--shadow-sm);
        }

        .intro-primary-btn:hover,
        .summary-primary-btn:hover {
            background: #F97316;
            filter: brightness(1.1);
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
        }

        .intro-primary-btn:active,
        .summary-primary-btn:active,
        .summary-secondary-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--border-strong);
        }

        .summary-secondary-btn {
            background: var(--card-bg);
            color: var(--text);
        }

        .summary-secondary-btn:hover {
            background: var(--surface-hover);
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
        }

        .difficulty-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .difficulty-btn {
            padding: 20px 12px;
            border: 3px solid var(--border-strong);
            border-radius: var(--radius-lg);
            background: var(--card-bg);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.15s ease;
            box-shadow: var(--shadow-sm);
        }

        .difficulty-btn:hover {
            background: var(--surface-hover);
            border-color: var(--accent-main);
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
        }

        .difficulty-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--border-strong);
        }

        .difficulty-title {
            font-size: 18px;
            font-weight: 900;
            color: var(--text);
        }

        .difficulty-copy {
            color: var(--text-secondary);
            font-size: 12px;
            line-height: 1.65;
            font-weight: 700;
            text-align: center;
            white-space: pre-wrap;
        }
        
        .difficulty-btn:hover .difficulty-copy {
            color: var(--border-strong);
        }

        /* 战斗主界面排列 */
        .arena-shell {
            display: flex;
            flex-direction: column;
            gap: 24px;
            width: 100%;
        }

        /* 讲师区域 */
        .enemy-stage {
            display: flex;
            align-items: flex-end;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 16px;
            padding: 0 4px;
            position: relative;
        }

        .enemy-avatar.hit {
            animation: shibaAngry 0.4s ease;
        }

        @keyframes shibaAngry {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.1) rotate(-15deg); }
            75% { transform: scale(1.1) rotate(15deg); }
        }

        .enemy-status-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--card-bg);
            padding: 8px 16px;
            border-radius: var(--radius-lg);
            border: 3px solid var(--border-strong);
            box-shadow: 3px 3px 0px var(--border-strong);
        }

        .enemy-name {
            color: var(--accent-main);
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 0.05em;
        }

        .enemy-hp-bar-shell {
            width: 120px;
            height: 10px;
            background: #FDE2C3;
            border-radius: 99px;
            border: 2px solid var(--border-strong);
            overflow: hidden;
        }

        .enemy-hp-bar {
            height: 100%;
            background: var(--accent-red);
            transition: width 0.3s ease;
        }

        /* 对话框/答题卡区 */
        .dialogue-box {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            border: 4px solid var(--border-strong);
            padding: 32px;
            box-shadow: var(--shadow-md);
            position: relative;
            min-height: 0;
        }

        .dialogue-topline {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 3px solid var(--border-strong);
        }

        .dialogue-type-label {
            color: var(--accent-main);
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 0.1em;
        }

        .dialogue-counter {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 900;
        }

        .challenge-question-shell {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 124px;
        }

        .typewriter-text ruby {
            ruby-align: center;
        }

        .typewriter-text rt {
            font-size: 0.52em;
            color: var(--text-ruby);
            font-family: var(--font-ui);
            font-weight: 900;
        }

        .question-sub-text {
            color: var(--accent-main);
            font-size: 15px;
            font-weight: 900;
            font-family: var(--font-ui);
            line-height: 1.6;
            display: inline-flex;
            padding: 6px 10px;
            border-radius: var(--radius-md);
            background: rgba(249, 115, 22, 0.1);
            max-width: 100%;
        }

        .question-support {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 10px;
        }

        .blank-space {
            display: inline-block;
            min-width: 4.4em;
            border-bottom: 3px dashed var(--accent-main);
            transform: translateY(-2px);
        }

        .challenge-feedback {
            min-height: 24px;
            margin-top: 20px;
            font-size: 16px;
            font-weight: 900;
            color: var(--text);
            text-align: center;
        }

        .challenge-feedback.good { color: var(--accent-green); }
        .challenge-feedback.bad { color: var(--accent-red); }

        .challenge-answer-area {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 2px dashed rgba(74, 59, 50, 0.16);
        }

        /* 选项面板 */
        .choice-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .action-option {
            width: 100%;
            border: 3px solid var(--border-strong);
            background: var(--card-bg);
            color: var(--text);
            text-align: left;
            padding: 16px 20px 16px 44px;
            font-size: 18px;
            font-weight: 900;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            box-shadow: var(--shadow-sm);
        }

        /* 悬浮时的骨头 */
        .action-option::before {
            content: '🦴';
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .action-option:hover:not(:disabled) {
            background: var(--surface-hover);
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
            color: var(--accent-main);
        }

        .action-option:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--border-strong);
        }

        .action-option:hover:not(:disabled)::before {
            opacity: 1;
        }

        .action-option:disabled {
            cursor: default;
        }

        .action-option.correct-ans {
            background: var(--accent-green);
            border-color: var(--border-strong);
            color: var(--card-bg);
        }
        
        .action-option.correct-ans::before {
            content: '🐾';
            opacity: 1;
        }

        .action-option.wrong-ans {
            background: var(--accent-red);
            border-color: var(--border-strong);
            color: #FFF;
        }

        .action-option.wrong-ans::before {
            content: '💢';
            opacity: 1;
        }

        /* 拼写输入模式 */
        .reading-answer-wrap {
            display: grid;
            gap: 20px;
        }

        .reading-input-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            align-items: flex-end;
        }

        .reading-char-input {
            width: calc(var(--reading-segment-length, 1) * 1.3em + 20px);
            min-width: 54px;
            height: 64px;
            border: 3px solid var(--border-strong);
            border-radius: var(--radius-md);
            background: var(--card-bg);
            padding: 0 8px;
            text-align: center;
            color: var(--text);
            font-size: 28px;
            font-family: var(--font-serif);
            font-weight: 900;
            outline: none;
            transition: all 0.15s ease;
            box-shadow: 3px 3px 0px rgba(74, 59, 50, 0.1);
        }

        .reading-fixed-segment {
            display: inline-flex;
            align-items: flex-end;
            min-height: 64px;
            padding: 0 2px 12px;
            color: var(--text);
            font-size: 28px;
            line-height: 1;
            font-family: var(--font-serif);
            font-weight: 900;
            white-space: nowrap;
        }

        .reading-char-input:focus {
            background: var(--accent-gold);
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px var(--border-strong);
        }

        .reading-char-input.locked {
            background: #EFEBE9;
            color: var(--text-secondary);
            border-style: dashed;
        }

        .reading-input-grid.correct .reading-char-input {
            background: var(--accent-green);
            color: #FFF;
        }

        .reading-input-grid.correct .reading-fixed-segment {
            color: var(--accent-green);
        }

        .reading-input-grid.wrong .reading-char-input {
            background: var(--accent-red);
            color: #FFF;
        }

        .reading-input-grid.wrong .reading-fixed-segment {
            color: var(--accent-red);
        }

        .reading-action-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .reading-action-btn {
            padding: 12px 28px;
            border-radius: var(--radius-lg);
            border: 3px solid var(--border-strong);
            background: var(--card-bg);
            color: var(--text);
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: var(--shadow-sm);
        }

        .reading-action-btn:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
            background: var(--accent-gold);
        }
        
        .reading-action-btn:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--border-strong);
        }

        .reading-action-btn.disabled,
        .reading-action-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        #reading-submit-btn {
            background: var(--accent-main);
            color: #fff;
        }
        
        #reading-submit-btn:hover:not(:disabled) {
            background: var(--accent-red);
            color: #fff;
        }

        .reading-feedback {
            font-size: 16px;
            font-weight: 900;
            min-height: 24px;
            text-align: center;
        }

        .reading-feedback.correct { color: var(--accent-green); }
        .reading-feedback.wrong { color: var(--accent-red); }

        /* 玩家状态条 */
        .player-hud {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            background: var(--card-bg);
            border: 4px solid var(--border-strong);
            border-radius: var(--radius-xl);
            padding: 16px 24px;
            margin-top: 8px;
            box-shadow: var(--shadow-sm);
        }

        .hud-left {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .hud-name {
            font-size: 16px;
            font-weight: 900;
            color: var(--border-strong);
            background: var(--accent-gold);
            padding: 4px 12px;
            border-radius: 99px;
            border: 2px solid var(--border-strong);
            box-shadow: 2px 2px 0px var(--border-strong);
        }

        .hud-lv {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .hud-hp-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1 1 220px;
            max-width: 220px;
        }

        .hud-hp-label {
            font-size: 16px;
            font-weight: 900;
            color: var(--accent-red);
        }

        .hud-hp-bar-bg {
            flex: 1;
            height: 14px;
            background: var(--border);
            border-radius: 99px;
            border: 2px solid var(--border-strong);
            overflow: hidden;
        }

        .hud-hp-bar-fill {
            height: 100%;
            background: var(--accent-green);
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .hud-hp-text {
            font-size: 15px;
            font-weight: 900;
            color: var(--text);
            min-width: 54px;
            text-align: right;
        }

        /* 倒计时条 */
        .hud-timer-shell {
            width: 100%;
            height: 12px;
            background: var(--border);
            margin-top: 16px;
            border-radius: 99px;
            border: 2px solid var(--border-strong);
            overflow: hidden;
        }

        .hud-timer-bar {
            height: 100%;
            background: var(--accent-gold);
            transition: width 0.1s linear;
        }

        .hud-timer-bar.warning {
            background: var(--accent-red);
        }

        /* 攻击特效与伤害数字 - 柴犬扑击 */
        .slash-container {
            position: absolute;
            inset: 50% 0 auto 0;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 20;
        }

        .slash-line {
            width: 60px;
            height: 60px;
            /* 简易柴犬爪印 SVG */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23F97316"><path d="M12 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-4.5 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm9 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM12 10c-3.3 0-6 2.7-6 6v4c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2v-4c0-3.3-2.7-6-6-6z"/></svg>');
            background-size: cover;
            opacity: 0;
            transform: scale(0.5) rotate(-20deg);
        }

        .slash-container.active .slash-line {
            animation: shibaStrike 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes shibaStrike {
            0% { opacity: 0; transform: scale(0.5) rotate(-20deg); }
            50% { opacity: 1; transform: scale(1.5) rotate(10deg); }
            100% { opacity: 0; transform: scale(2) rotate(20deg); }
        }

        .damage-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: 900;
            opacity: 0;
            pointer-events: none;
            z-index: 24;
            text-shadow: 3px 3px 0px var(--border-strong);
            text-transform: uppercase;
        }

        .damage-text.normal-hit { color: var(--accent-gold); }
        .damage-text.player-hit { color: var(--accent-red); }

        .damage-text.float {
            animation: bouncyFloatUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes bouncyFloatUp {
            0% { opacity: 0; transform: translate(-50%, 10px) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -10px) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -40px) scale(1); }
        }

        .hp-pill { position: relative; }
        .hp-pill.hit { animation: hpShake 0.4s ease; }

        @keyframes hpShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px) rotate(-2deg); }
            75% { transform: translateX(6px) rotate(2deg); }
        }

        .hp-damage-float {
            position: absolute;
            top: -24px;
            right: 0;
            font-size: 18px;
            font-weight: 900;
            color: var(--accent-red);
            pointer-events: none;
            animation: hpDamageFloat 0.8s ease-out forwards;
            text-shadow: 2px 2px 0px var(--border-strong);
        }

        @keyframes hpDamageFloat {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            20% { opacity: 1; transform: translateY(-10px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-30px) scale(1); }
        }

        .shake { animation: shake 0.4s ease both; }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            20%, 60% { transform: translate(-8px, 0); }
            40%, 80% { transform: translate(8px, 0); }
        }

        /* 结算界面数据 */
        .summary-rank {
            margin-top: 20px;
            font-size: 90px;
            font-weight: 900;
            color: var(--accent-main);
            text-align: center;
            text-shadow: 6px 6px 0px var(--border-strong);
            font-family: 'Arial Black', sans-serif;
            font-style: italic;
        }

        .summary-eval {
            margin-top: 8px;
            color: var(--text);
            font-size: 18px;
            font-weight: 900;
            text-align: center;
        }

        .summary-msg {
            margin-top: 16px;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 700;
            text-align: center;
            line-height: 1.65;
        }

        .summary-stat-grid {
            margin-top: 32px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .summary-stat {
            background: #FAFAFA;
            border-radius: var(--radius-lg);
            border: 3px solid var(--border-strong);
            padding: 16px;
            text-align: center;
            box-shadow: 4px 4px 0px rgba(74, 59, 50, 0.1);
        }

        .summary-stat-label {
            display: block;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 900;
        }

        .summary-stat-value {
            display: block;
            margin-top: 8px;
            color: var(--accent-main);
            font-size: 28px;
            font-weight: 900;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            left: 50%;
            bottom: 40px;
            transform: translateX(-50%);
            background: var(--border-strong);
            color: #fff;
            padding: 14px 28px;
            border-radius: 99px;
            border: 2px solid var(--accent-gold);
            z-index: 180;
            font-size: 15px;
            font-weight: 900;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            box-shadow: 6px 6px 0px var(--accent-main);
        }

        .toast.show { opacity: 1; }

        @media (max-width: 768px) {
            .page-back-btn {
                position: static;
                margin: calc(12px + env(safe-area-inset-top)) 12px 0;
                padding: 7px 12px;
                font-size: 12px;
            }

            .practice-shell {
                padding: 12px 12px 28px;
                align-items: flex-start;
            }

            .screen {
                max-width: none;
            }

            .intro-card,
            .summary-card,
            .dialogue-box {
                padding: 22px 18px;
                border-width: 3px;
            }

            .summary-title {
                font-size: 28px;
            }

            .story-text,
            .typewriter-text {
                font-size: 16px;
                line-height: 1.7;
            }

            .dialogue-topline {
                align-items: flex-start;
                flex-wrap: wrap;
                gap: 8px;
            }

            .enemy-stage {
                align-items: stretch;
                flex-direction: column;
                gap: 12px;
                padding: 0;
            }

            .enemy-avatar {
                width: 72px;
                height: 72px;
                font-size: 40px;
            }

            .enemy-status-box {
                width: 100%;
                min-width: 0;
            }

            .choice-grid {
                grid-template-columns: 1fr;
            }

            .action-option {
                font-size: 15px;
                padding: 13px 14px 13px 34px;
                border-width: 2px;
            }

            .reading-input-grid {
                gap: 8px;
                justify-content: flex-start;
            }

            .reading-char-input {
                width: calc(var(--reading-segment-length, 1) * 1.15em + 16px);
                min-width: 42px;
                height: 52px;
                font-size: 22px;
            }

            .reading-fixed-segment {
                min-height: 52px;
                padding-bottom: 10px;
                font-size: 22px;
            }

            .reading-action-row {
                gap: 10px;
            }

            .reading-action-btn {
                flex: 1 1 calc(50% - 5px);
            }

            .player-hud {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
                padding: 16px;
                border-width: 3px;
            }

            .hud-left {
                width: 100%;
                justify-content: space-between;
                align-items: center;
                gap: 12px;
            }

            .hud-hp-wrap {
                max-width: none;
                width: 100%;
            }

            .difficulty-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .page-back-btn {
                margin: calc(10px + env(safe-area-inset-top)) 10px 0;
            }

            .practice-shell {
                padding: 10px 10px 24px;
            }

            .intro-card,
            .summary-card,
            .dialogue-box,
            .player-hud {
                padding-left: 14px;
                padding-right: 14px;
            }

            .reading-char-input {
                width: calc(var(--reading-segment-length, 1) * 1.05em + 14px);
                min-width: 38px;
                height: 48px;
                font-size: 20px;
            }

            .reading-fixed-segment {
                min-height: 48px;
                padding-bottom: 8px;
                font-size: 20px;
            }
        }
    </style>
</head>

    <!-- Import shared data -->
    <script src="../../../shared/back-navigation.js"></script>
    <script src="../../../shared/study-quest-test-runtime.js"></script>
    <script src="n1_adverbs_data.js"></script>
    <script src="n1-adverbs-curriculum.js"></script>
    <script src="vocabulary-reading-helper.js"></script>
    <script>
        if (typeof window.bindStatefulBack === 'function') {
            window.bindStatefulBack({
                selector: '#page-back-btn',
                fallback: 'adverbs_n1.html'
            });
        }

        const urlParams = new URLSearchParams(window.location.search);
        const stageParam = urlParams.get('stage');
        const modeParam = urlParams.get('mode');
        const typeParam = String(urlParams.get('type') || '').trim().toLowerCase();
        const isStageMode = !!stageParam;
        const isChallengeMode = isStageMode || modeParam === 'final';
        
        const PRACTICE_TYPE_STORAGE_KEY = 'study_quest_test_v1_n1_adverbs_practice_type';
        const DAILY_PRACTICE_TYPE_MAP = Object.freeze({
            sentence: '句子填空',
            reading: '读音填空',
            meaning: '假名选义'
        });
        const dailyPracticeType = Object.prototype.hasOwnProperty.call(DAILY_PRACTICE_TYPE_MAP, typeParam)
            ? typeParam
            : 'sentence';
        localStorage.setItem(PRACTICE_TYPE_STORAGE_KEY, dailyPracticeType);

        let targetWords = [];
        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let clearedCount = 0;
        let answerStreak = 0;
        let bestStreak = 0;
        let selectedDifficulty = null;
        let hp = 20;
        let remainingHints = 3;
        let isHintUsed = false;
        let isAnswering = false;
        let rewardRunMeta = null;
        let rewardResult = null;
        let timerId = null;
        let timeLeft = 0;
        let totalTime = 0;
        let introTypingController = null;
        let questionTypingController = null;
        let pendingQuestionReveal = null;

        const testServer = window.StudyQuestTestServer;
        const VOCAB_STAR_KEY_PREFIX = 'study_quest_test_v1_vocab_star::';
        
        // 适配副词的数据源
        const CURRICULUM_DAYS = Array.isArray(window.LAB_N1_ADVERB_DAYS) ? window.LAB_N1_ADVERB_DAYS : [];
        const CURRICULUM_STAGES = Array.isArray(window.LAB_N1_ADVERB_STAGES) ? window.LAB_N1_ADVERB_STAGES : [];
        const CURRICULUM_GROUPS = Array.isArray(window.LAB_N1_ADVERB_GROUPS) ? window.LAB_N1_ADVERB_GROUPS : [];

        const difficultyMap = {
            easy: { label: '幼犬散步', damage: 2, timed: false, copy: '20题 · 集中力20 · 错1题扣2点集中力\n轻松遛狗，不急不躁。' },
            hard: { label: '柴犬跑酷', damage: 4, timed: false, copy: '20题 · 集中力20 · 错1题扣4点集中力\n跟上我的步伐！' },
            hell: { label: '狂暴拆家', damage: 5, timed: true, copy: '20题 · 集中力20 · 错1题扣5点集中力 · 限时10秒\n看我把家拆了！还不快答题！' }
        };

        function getVocabStarKey(wordId) {
            return `${VOCAB_STAR_KEY_PREFIX}${String(wordId || '').trim()}`;
        }

        function getCurriculumDay(dayId) {
            return CURRICULUM_DAYS.find((day) => Number(day.id) === Number(dayId)) || null;
        }

        function getCurriculumStage(stageId) {
            return CURRICULUM_STAGES.find((stage) => Number(stage.id) === Number(stageId)) || null;
        }

        function getCurriculumGroup(groupId) {
            return CURRICULUM_GROUPS.find((group) => Number(group.id) === Number(groupId)) || null;
        }

        function getDayGroup(dayId) {
            const day = getCurriculumDay(dayId);
            return day ? getCurriculumGroup(day.groupId) : null;
        }

        function getStageGroup(stageId) {
            const stage = getCurriculumStage(stageId);
            return stage ? getCurriculumGroup(stage.groupId) : null;
        }

        function getPracticeTypeLabel() {
            return DAILY_PRACTICE_TYPE_MAP[dailyPracticeType] || '句子填空';
        }

        function appendPracticeTypeToScope(scopeKey) {
            return `${scopeKey}-${dailyPracticeType}`;
        }

        function collectWordsByIndexes(indexes) {
            if (!Array.isArray(indexes) || typeof FULL_WORD_LIST === 'undefined' || !Array.isArray(FULL_WORD_LIST)) {
                return [];
            }
            const collected = [];
            const seen = new Set();
            indexes.forEach((index) => {
                const word = FULL_WORD_LIST[index];
                if (!word || word.word === '（準備中）') return;
                const key = String(word.word || index);
                if (seen.has(key)) return;
                seen.add(key);
                collected.push(word);
            });
            return collected;
        }

        function getDayWords(dayId) {
            const day = getCurriculumDay(dayId);
            if (day && Array.isArray(day.wordIds)) {
                return collectWordsByIndexes(day.wordIds);
            }
            if (typeof FULL_WORD_LIST === 'undefined' || !Array.isArray(FULL_WORD_LIST)) return [];
            const wordsPerDay = typeof WORDS_PER_DAY !== 'undefined' ? WORDS_PER_DAY : 20;
            const start = (dayId - 1) * wordsPerDay;
            const size = dayId === 13 ? 25 : wordsPerDay;
            return FULL_WORD_LIST.slice(start, start + size).filter((word) => word.word !== '（準備中）');
        }

        function getStageWords(stageId) {
            const stage = getCurriculumStage(stageId);
            if (!stage) return [];
            const indexes = stage.dayIds.flatMap((dayId) => {
                const day = getCurriculumDay(dayId);
                return day ? day.wordIds : [];
            });
            return collectWordsByIndexes(indexes);
        }

        function getFinalWords() {
            const indexes = CURRICULUM_DAYS.flatMap((day) => Array.isArray(day.wordIds) ? day.wordIds : []);
            return collectWordsByIndexes(indexes);
        }

        function getStarredWords() {
            if (typeof FULL_WORD_LIST === 'undefined' || !Array.isArray(FULL_WORD_LIST)) return [];
            return FULL_WORD_LIST.filter((word) => word.word !== '（準備中）' && localStorage.getItem(getVocabStarKey(word.word)) === 'true');
        }

        function getCurrentDayParam() {
            const parsed = parseInt(urlParams.get('day'), 10);
            return Number.isFinite(parsed) ? parsed : 1;
        }

        function getCurrentStageParam() {
            const parsed = parseInt(stageParam, 10);
            return Number.isFinite(parsed) ? parsed : null;
        }

        function getPracticeContext() {
            const currentDayValue = getCurrentDayParam();
            const currentStageValue = getCurrentStageParam();
            if (modeParam === 'final') {
                return {
                    mode: 'final',
                    scopeKey: appendPracticeTypeToScope('final-all'),
                    title: '柴犬之王跑酷 (总复习)',
                    overline: '终极拆家大考',
                    subtitle: `全课程 · ${getPracticeTypeLabel()} · 20 問随机`,
                    challengeTitle: '总复习考核',
                    routeLabel: 'FINAL BATTLE',
                    typeLabel: getPracticeTypeLabel(),
                    pool: getFinalWords()
                };
            }
            if (currentStageValue != null) {
                const stage = getCurriculumStage(currentStageValue);
                const group = getStageGroup(currentStageValue);
                return {
                    mode: selectedDifficulty ? 'challenge' : 'stage',
                    scopeKey: selectedDifficulty
                        ? appendPracticeTypeToScope(`stage-${currentStageValue}-${selectedDifficulty}`)
                        : appendPracticeTypeToScope(`stage-${currentStageValue}`),
                    title: stage ? stage.title : `阶段汪练 ${currentStageValue}`,
                    overline: stage ? `${group ? `${group.title} · ` : ''}${stage.title}` : `阶段 ${currentStageValue}`,
                    subtitle: stage
                        ? `领地 ${stage.dayIds[0]} - ${stage.dayIds[stage.dayIds.length - 1]} 关 · ${getPracticeTypeLabel()} · 20 問随机`
                        : `${getPracticeTypeLabel()} · 20 問随机`,
                    challengeTitle: stage ? stage.title : `阶段汪练 ${currentStageValue}`,
                    routeLabel: `STAGE ${currentStageValue}`,
                    typeLabel: getPracticeTypeLabel(),
                    pool: getStageWords(currentStageValue)
                };
            }
            if (currentDayValue < 0) {
                return {
                    mode: 'review',
                    scopeKey: appendPracticeTypeToScope('review-starred'),
                    title: '疑难骨头收集 (难词特训)',
                    overline: '疑难骨头收集',
                    subtitle: `按已标记难词生成本轮题目 · ${getPracticeTypeLabel()}`,
                    challengeTitle: '错题特训',
                    routeLabel: 'REVIEW',
                    typeLabel: getPracticeTypeLabel(),
                    pool: getStarredWords()
                };
            }
            const day = getCurriculumDay(currentDayValue);
            const group = getDayGroup(currentDayValue);
            return {
                mode: 'day',
                scopeKey: appendPracticeTypeToScope(`day-${currentDayValue}`),
                title: day ? `第${day.id}块领地 · ${day.title}` : `DAY ${currentDayValue}`,
                overline: day ? `${group ? `${group.title} · ` : ''}${day.title}` : `第${currentDayValue}块领地`,
                subtitle: day ? `${day.wordIds.length}語 · ${getPracticeTypeLabel()}` : getPracticeTypeLabel(),
                challengeTitle: day ? `${group ? `${group.title} · ` : ''}${day.title}` : `DAY ${currentDayValue}`,
                routeLabel: `DAY ${currentDayValue}`,
                typeLabel: getPracticeTypeLabel(),
                pool: getDayWords(currentDayValue)
            };
        }

        function getPracticeModeKey() {
            const currentDayValue = getCurrentDayParam();
            if (modeParam === 'final') return 'final';
            if (stageParam && selectedDifficulty) return 'challenge';
            if (stageParam) return 'stage';
            if (currentDayValue < 0) return 'review';
            return 'day';
        }

        function getPracticeScopeKey() {
            return getPracticeContext().scopeKey;
        }

        function dispatchPracticeState(phase, overrides = {}) {
            if (!window.StudyQuestTestUi || typeof window.StudyQuestTestUi.dispatchPracticeState !== 'function') {
                return;
            }
            const totalQuestions = questions.length || targetWords.length || 0;
            const answeredCount = Math.max(0, Math.min(totalQuestions, currentQuestionIndex + (phase === 'enter' ? 0 : 1)));
            const accuracy = answeredCount > 0 ? score / answeredCount : 0;
            window.StudyQuestTestUi.dispatchPracticeState({
                module: 'vocabulary',
                subType: 'adverbs', 
                mode: getPracticeModeKey(),
                phase,
                isCorrect: overrides.isCorrect === undefined ? null : Boolean(overrides.isCorrect),
                streak: Number.isFinite(overrides.streak) ? overrides.streak : answerStreak,
                accuracy: Number.isFinite(overrides.accuracy) ? overrides.accuracy : accuracy,
                questionIndex: Number.isFinite(overrides.questionIndex) ? overrides.questionIndex : currentQuestionIndex + 1,
                questionCount: totalQuestions,
                meta: overrides.meta || {}
            });
        }

        function startRewardRun() {
            if (!testServer || typeof testServer.startRun !== 'function') {
                rewardRunMeta = null;

        function ensureRewardResult() {

        function getDrawAffordanceMarkup(reward) {
            if (!reward || !reward.accepted || !reward.drawOffer || !reward.drawOffer.available) return '';
            if (!window.StudyQuestTestUi || typeof window.StudyQuestTestUi.getDrawAffordanceMarkup !== 'function') return '';
            return window.StudyQuestTestUi.getDrawAffordanceMarkup(reward.drawOffer.runKey || (rewardRunMeta && rewardRunMeta.runKey));
        }

        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function shuffle(array) {
            return shuffleArray(array);
        }

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeTextValue(value) {
            return String(value == null ? '' : value).trim();
        }

        function toHiragana(text) {
            return String(text == null ? '' : text).replace(/[\u30a1-\u30f6]/g, (char) => String.fromCharCode(char.charCodeAt(0) - 0x60));
        }

        function normalizeKanaAnswer(value) {
            return toHiragana(String(value == null ? '' : value).replace(/\s+/g, ''));
        }

        function splitKanaChars(value) {
            return Array.from(normalizeKanaAnswer(value));
        }

        function isReadingInputComposing(input) {
            return Boolean(input && input.dataset && input.dataset.composing === 'true');
        }

        function findNextEditableReadingIndex(inputs, startIndex) {
            for (let index = Math.max(0, Number(startIndex) || 0); index < inputs.length; index += 1) {
                if (!inputs[index].readOnly) {
                    return index;
                }
            }
            return -1;
        }

        function findPreviousEditableReadingIndex(inputs, startIndex) {
            for (let index = Math.min(inputs.length - 1, Number(startIndex) || 0); index >= 0; index -= 1) {
                if (!inputs[index].readOnly) {
                    return index;
                }
            }
            return -1;
        }

        function commitReadingChars(startIndex, rawValue) {
            const inputs = getReadingInputs();
            const start = findNextEditableReadingIndex(inputs, startIndex);
            const chars = splitKanaChars(rawValue);
            if (start === -1) {
                return { nextIndex: inputs.length, insertedCount: 0, shouldAdvance: false };
            }
            if (chars.length === 0) {
                inputs[start].value = '';
                return { nextIndex: start, insertedCount: 0, shouldAdvance: false };
            }

            let cursor = start;
            let insertedCount = 0;
            while (cursor !== -1 && insertedCount < chars.length) {
                const input = inputs[cursor];
                const segmentLength = Math.max(1, Number(input.dataset.segmentLength || 1));
                const chunkChars = chars.slice(insertedCount, insertedCount + segmentLength);
                input.value = chunkChars.join('');
                insertedCount += chunkChars.length;

                if (chunkChars.length < segmentLength && insertedCount >= chars.length) {
                    return {
                        nextIndex: cursor,
                        insertedCount,
                        shouldAdvance: false
                    };
                }

                cursor = findNextEditableReadingIndex(inputs, cursor + 1);
            }
            return {
                nextIndex: cursor === -1 ? inputs.length : cursor,
                insertedCount,
                shouldAdvance: true
            };
        }

        function getReadingHelper() {
            return window.VocabularyReadingHelper || null;
        }

        function getReadingPromptForWord(word) {
            const helper = getReadingHelper();
            if (helper && typeof helper.buildPrompt === 'function') {
                return helper.buildPrompt(word && word.word_html, word && word.word);
            }

            const fallbackSurface = normalizeTextValue(word && word.word);
            const fallbackKana = /[\u3040-\u30ffー]/.test(fallbackSurface)
                ? normalizeKanaAnswer(fallbackSurface)
                : '';

            return {
                surfaceText: fallbackSurface,
                fullKana: fallbackKana,
                segments: fallbackSurface ? [{ type: 'fixed', text: fallbackSurface }] : [],
                editableCount: 0,
                firstHint: ''
            };
        }

        function extractSurfaceTextFromWordHtml(wordHtml, fallbackText = '') {
            const helper = getReadingHelper();
            if (helper && typeof helper.getSurfaceText === 'function') {
                return helper.getSurfaceText(wordHtml, fallbackText);
            }
            return normalizeTextValue(fallbackText);
        }

        function extractKanjiReadingTextFromWordHtml(wordHtml, fallbackText = '') {
            const helper = getReadingHelper();
            if (helper && typeof helper.buildPrompt === 'function') {
                const prompt = helper.buildPrompt(wordHtml, fallbackText);
                return prompt && prompt.editableCount > 0 ? prompt.fullKana : '';
            }
            return '';
        }

        function extractKanaDisplayTextFromWordHtml(wordHtml, fallbackText = '') {
            const helper = getReadingHelper();
            if (helper && typeof helper.getKanaDisplayText === 'function') {
                return helper.getKanaDisplayText(wordHtml, fallbackText);
            }
            const fallback = normalizeTextValue(fallbackText);
            return /[\u3040-\u30ffー]/.test(fallback) ? toHiragana(fallback) : '';
        }

        function extractPrimaryMeaning(word) {
            return String(word && word.mean ? word.mean : '')
                .split(/[；;]/)
                .map((part) => part.trim())
                .find(Boolean) || '';
        }

        function getEligibleWordsForPracticeType(words, type) {
            const pool = Array.isArray(words) ? words : [];
            if (type === 'reading') {
                return pool.filter((word) => {
                    const prompt = getReadingPromptForWord(word);
                    return Boolean(prompt && prompt.surfaceText && prompt.fullKana && prompt.editableCount > 0);
                });
            }
            if (type === 'meaning') {
                return pool.filter((word) => {
                    const kanaText = extractKanaDisplayTextFromWordHtml(word && word.word_html, word && word.word);
                    const primaryMeaning = extractPrimaryMeaning(word);
                    return Boolean(kanaText && primaryMeaning);
                });
            }
            return pool.filter(Boolean);
        }

        function buildSentenceQuestionSpec(word) {
            let questionHtml = '';
            let questionCn = '';
            if (word.practice) {
                questionHtml = word.practice.sentence;
            } else {
                let example = { jp: '例文がありません。', cn: '' };
                if (word.examples && word.examples.length > 0) {
                    example = word.examples[Math.floor(Math.random() * word.examples.length)];
                }
                questionCn = example.cn;
                questionHtml = example.jp;
            }

            let richSentence = questionHtml;
            
            const highlightRegex = /<span class=['"]ex-highlight['"]>(.*?)<\/span>/g;
            const existingBlankRegex = /(_{2,}|＿{2,}|\(\s*\)|（\s*）)/g;
            
            if (richSentence.match(highlightRegex)) {
                richSentence = richSentence.replace(highlightRegex, '[[BLANK]]');
            } else if (richSentence.match(existingBlankRegex)) {
                richSentence = richSentence.replace(existingBlankRegex, '[[BLANK]]');
            } else {
                const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                // 副词：通常可以直接全词匹配替换，或者有些带有 'に' 或 'と' 的尾巴
                if (richSentence.includes(word.word)) {
                    richSentence = richSentence.replace(new RegExp(escapeRegExp(word.word), 'g'), '[[BLANK]]');
                } else {
                    richSentence += ' [[BLANK]]';
                }
            }

            let plainSentence = richSentence.replace(/<[^>]+>/g, '').replace(/\[\[BLANK\]\]/g, '________');
            richSentence = richSentence.replace(/\[\[BLANK\]\]/g, '<span class="blank-space"></span>');

            const distractors = generateDistractors(word);
            const options = shuffle([word.practice ? word.practice.answer : word.word, ...distractors]);
            
            const cnHtml = questionCn ? `<br><span class="question-sub-text">（${questionCn}）</span>` : '';

            return {
                kind: 'sentence',
                answerMode: 'choice',
                word,
                questionHtml: `シバ先生：「${richSentence}」<br><br><span class="question-sub-text">闻一闻语境，选出最合适的那根副词骨头！🐾</span>${cnHtml}`,
                cn: questionCn,
                correctAnswer: word.practice ? word.practice.answer : word.word,
                options,
                hintText: '',
                typingText: `シバ先生：「${plainSentence}」\n\n闻一闻语境，选出最合适的那根副词骨头！🐾`
            };
        }

        function buildReadingQuestionSpec(word) {
            const prompt = getReadingPromptForWord(word);
            if (!prompt || !prompt.surfaceText || !prompt.fullKana || prompt.editableCount <= 0) return null;

            return {
                kind: 'reading',
                answerMode: 'input',
                word,
                questionHtml: `シバ先生：「${escapeHtml(prompt.surfaceText)}」<br><br><span class="question-sub-text">别光看汉字发呆，快把假名拼出来！写错了我可是会生气的！🐾</span>`,
                cn: '',
                correctAnswer: prompt.fullKana,
                options: [],
                readingSegments: prompt.segments,
                editableCount: prompt.editableCount,
                inputLength: prompt.editableCount,
                hintText: prompt.firstHint,
                firstHint: prompt.firstHint,
                typingText: `シバ先生：「${prompt.surfaceText}」\n\n别光看汉字发呆，快把假名拼出来！写错了我可是会生气的！🐾`
            };
        }

        function buildMeaningDistractors(correctWord, sourcePool) {
            const correctMeaning = extractPrimaryMeaning(correctWord);
            const pool = [];
            const seen = new Set([correctMeaning]);
            const globalWords = typeof ALL_DEFINED_WORDS !== 'undefined' && Array.isArray(ALL_DEFINED_WORDS)
                ? ALL_DEFINED_WORDS
                : [];
            const candidates = shuffleArray([...(Array.isArray(sourcePool) ? sourcePool : []), ...globalWords]);
            candidates.forEach((word) => {
                if (!word || word.word === correctWord.word) return;
                const meaning = extractPrimaryMeaning(word);
                if (!meaning || seen.has(meaning)) return;
                seen.add(meaning);
                pool.push(meaning);
            });
            return pool.slice(0, 3);
        }

        function buildMeaningQuestionSpec(word, sourcePool) {
            const kanaText = extractKanaDisplayTextFromWordHtml(word && word.word_html, word && word.word);
            const primaryMeaning = extractPrimaryMeaning(word);
            if (!kanaText || !primaryMeaning) return null;
            const distractors = buildMeaningDistractors(word, sourcePool);
            if (distractors.length < 3) return null;

            return {
                kind: 'meaning',
                answerMode: 'choice',
                word,
                questionHtml: `シバ先生：「${escapeHtml(kanaText)}」<br><br><span class="question-sub-text">这到底是什么意思？选错了你就只能去外面睡狗窝了！🐾</span>`,
                cn: '',
                correctAnswer: primaryMeaning,
                options: shuffle([primaryMeaning, ...distractors]),
                hintText: '',
                typingText: `シバ先生：「${kanaText}」\n\n这到底是什么意思？选错了你就只能去外面睡狗窝了！🐾`
            };
        }

        function generateDistractors(correctWord) {
            const others = ALL_DEFINED_WORDS.filter((w) => w.word !== correctWord.word);
            const shuffled = shuffle(others);
            return shuffled.slice(0, 3).map((w) => w.word);
        }

        function clearTimer() {

        function startTimer() {
            clearTimer();

                timerShell.classList.add('hidden');

        function clearTypewriter(controllerName) {
            const controller = controllerName === 'intro' ? introTypingController : questionTypingController;
            if (controller && controller.timeoutId) {
                clearTimeout(controller.timeoutId);
            }
            if (controllerName === 'intro') {
                introTypingController = null;
            } else {
                questionTypingController = null;
            }
        }

        function runTypewriter({ controllerName, target, cursor, text, speed, onComplete }) {
            clearTypewriter(controllerName);
            target.innerText = '';
            cursor.className = 'typing-cursor';
            const controller = {
                index: 0,
                text,
                timeoutId: null,
                finished: false,
                finish() {
                    if (this.finished) return;
                    this.finished = true;
                    target.innerText = text;
                    cursor.className = '';
                    if (this.timeoutId) {
                        clearTimeout(this.timeoutId);
                    }
                    if (typeof onComplete === 'function') {
                        onComplete();
                    }
                }
            };

            function typeNext() {
                if (controller.finished) return;
                if (controller.index < text.length) {
                    target.innerText += text.charAt(controller.index);
                    controller.index += 1;
                    controller.timeoutId = setTimeout(typeNext, speed);
                } else {
                    controller.finished = true;
                    cursor.className = '';
                    if (typeof onComplete === 'function') {
                        onComplete();
                    }
                }
            }

            if (controllerName === 'intro') {
                introTypingController = controller;
            } else {
                questionTypingController = controller;
            }
            typeNext();
        }

        function finishCurrentTypewriter(controllerName) {
            const controller = controllerName === 'intro' ? introTypingController : questionTypingController;
            if (controller && typeof controller.finish === 'function') {
                controller.finish();
            }
        }
