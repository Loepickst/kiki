        function buildReadingAnswerMarkup(question) {
            let inputIndex = 0;
            const inputsHtml = (Array.isArray(question.readingSegments) ? question.readingSegments : []).map((segment) => {
                if (!segment || segment.type !== 'input') {
                    return `<span class="reading-fixed-segment">${escapeHtml(segment && segment.text ? segment.text : '')}</span>`;
                }

                const segmentLength = Math.max(1, getReadingSegmentExpectedLength(segment));
                const currentIndex = inputIndex;
                inputIndex += 1;

                return `
                    <input
                        type="text"
                        inputmode="kana"
                        autocomplete="off"
                        autocapitalize="off"
                        spellcheck="false"
                        class="reading-char-input"
                        data-reading-index="${currentIndex}"
                        data-segment-length="${segmentLength}"
                        style="--reading-segment-length: ${segmentLength};"
                        oncompositionstart="handleReadingCompositionStart(event)"
                        oncompositionend="handleReadingCompositionEnd(event, ${currentIndex})"
                        oninput="handleReadingInput(event, ${currentIndex})"
                        onkeydown="handleReadingKeyDown(event, ${currentIndex})"
                        onpaste="handleReadingPaste(event, ${currentIndex})"
                    >
                `;
            }).join('');

            return `
                <div class="reading-answer-wrap">
                    <div class="reading-input-grid" id="reading-input-grid">${inputsHtml}</div>
                    <div class="reading-action-row">
                        <button type="button" class="reading-action-btn ${remainingHints <= 0 ? 'disabled' : ''}" id="hint-btn" onclick="useHint()">赏个提示 (${remainingHints})</button>
                        <button type="button" class="reading-action-btn" id="reading-submit-btn" onclick="submitReadingAnswer()">确认上交</button>
                    </div>
                </div>
            `;
        }

        function buildChoiceAnswerMarkup(question) {
            const buttons = question.options.map((opt, optionIndex) => (
                `<button type="button" class="action-option" data-option-index="${optionIndex}">${escapeHtml(opt)}</button>`
            )).join('');
            return `<div class="choice-grid">${buttons}</div>`;
        }

        function trimQuestionHtml(html) {
            return String(html || '').replace(/(?:<br>\s*)+$/g, '').trim();
        }

        function getQuestionDisplayModel(question) {
            if (!question) {
                return { questionHtml: '', supportHtml: '', typingText: '' };
            }
            if (question._displayModel) return question._displayModel;

            const wrapper = document.createElement('div');
            wrapper.innerHTML = question.questionHtml || '';

            const supportNodes = Array.from(wrapper.querySelectorAll('.question-sub-text'));
            const supportHtml = supportNodes.map((node) => node.outerHTML).join('');
            supportNodes.forEach((node) => node.remove());

            const typingText = String(question.typingText || '')
                .replace(/\r\n?/g, '\n')
                .split(/\n\s*\n/)[0]
                .trim();

            question._displayModel = {
                questionHtml: trimQuestionHtml(wrapper.innerHTML),
                supportHtml,
                typingText
            };
            return question._displayModel;
        }

        function getReadingInputs() {
            return Array.from(document.querySelectorAll('.reading-char-input'));
        }

        function focusReadingInput(startIndex = 0) {
            const inputs = getReadingInputs();
            const resolvedStartIndex = Math.max(0, Number(startIndex) || 0);
            const focusTask = () => {
                for (let index = resolvedStartIndex; index < inputs.length; index += 1) {
                    const input = inputs[index];
                    if (!input.readOnly) {
                        input.focus();
                        input.select();
                        return;
                    }
                }
            };
            if (typeof window !== 'undefined' && typeof window.requestAnimationFrame === 'function') {
                window.requestAnimationFrame(focusTask);
                return;
            }
            window.setTimeout(focusTask, 0);
        }

        function handleReadingCompositionStart(event) {
            if (!event.target) return;
            event.target.dataset.composing = 'true';
            event.target.dataset.skipNextInput = 'false';
        }

        function handleReadingCompositionEnd(event, index) {
            const input = event.target;
            if (!input) return;
            input.dataset.composing = 'false';
            const result = commitReadingChars(index, input.value || event.data || '');
            input.dataset.skipNextInput = 'true';
            window.requestAnimationFrame(() => {
                if (input.dataset.skipNextInput === 'true') {
                    input.dataset.skipNextInput = 'false';
                }
            });
            if (result.insertedCount > 0 && result.shouldAdvance) {
                focusReadingInput(result.nextIndex);
            }
        }

        function handleReadingInput(event, index) {
            const input = event.target;
            if (!input) return;
            if (event.isComposing || isReadingInputComposing(input)) return;
            if (input.dataset.skipNextInput === 'true') {
                input.dataset.skipNextInput = 'false';
                return;
            }
            const result = commitReadingChars(index, input.value);
            if (result.insertedCount > 0 && result.shouldAdvance) {
                focusReadingInput(result.nextIndex);
            }
        }

        function handleReadingKeyDown(event, index) {
            if (event.isComposing || isReadingInputComposing(event.target)) {
                return;
            }
            if (event.key === 'Enter') {
                event.preventDefault();
                submitReadingAnswer();
                return;
            }
            if (event.key === 'Backspace' && !event.target.value) {
                const inputs = getReadingInputs();
                const prevIndex = findPreviousEditableReadingIndex(inputs, index - 1);
                if (prevIndex !== -1) {
                    inputs[prevIndex].value = '';
                    inputs[prevIndex].focus();
                }
            }
        }

        function handleReadingPaste(event, index) {
            event.preventDefault();
            const pastedText = (event.clipboardData || window.clipboardData).getData('text');
            const result = commitReadingChars(index, pastedText);
            if (result.insertedCount > 0 && result.shouldAdvance) {
                focusReadingInput(result.nextIndex);
            }
        }

        function getReadingInputSegments(question = questions[currentQuestionIndex]) {
            return Array.isArray(question && question.readingSegments)
                ? question.readingSegments.filter((segment) => segment && segment.type === 'input')
                : [];
        }

        function getReadingSegmentExpectedLength(segment) {
            return splitKanaChars(segment && segment.answer).length || 0;
        }

        function findFirstIncompleteReadingIndex(question) {
            const inputs = getReadingInputs();
            const inputSegments = getReadingInputSegments(question);
            for (let index = 0; index < inputSegments.length; index += 1) {
                const currentLength = splitKanaChars(inputs[index] && inputs[index].value).length;
                if (currentLength < getReadingSegmentExpectedLength(inputSegments[index])) {
                    return index;
                }
            }
            return -1;
        }

        function collectReadingAnswer(question = questions[currentQuestionIndex]) {
            if (!question || !Array.isArray(question.readingSegments)) {
                return normalizeKanaAnswer(getReadingInputs().map((input) => input.value || '').join(''));
            }

            const inputs = getReadingInputs();
            let inputIndex = 0;
            const pieces = question.readingSegments.map((segment) => {
                if (!segment || segment.type !== 'input') {
                    return normalizeKanaAnswer(segment && segment.text);
                }
                const value = normalizeKanaAnswer(inputs[inputIndex] && inputs[inputIndex].value);
                inputIndex += 1;
                return value;
            });

            return normalizeKanaAnswer(pieces.join(''));
        }

        function submitReadingAnswer() {
            if (!isAnswering) return;
            const question = questions[currentQuestionIndex];
            if (!question || question.answerMode !== 'input') return;
            if (getReadingInputs().some((input) => isReadingInputComposing(input))) return;
            const firstIncompleteIndex = findFirstIncompleteReadingIndex(question);
            if (firstIncompleteIndex !== -1) {
                focusReadingInput(firstIncompleteIndex);
                return;
            }
            checkAnswer(null, collectReadingAnswer(question), false);
        }

        function useHint() {
            const question = questions[currentQuestionIndex];
            if (remainingHints <= 0 || !isAnswering || isHintUsed || !question || question.answerMode !== 'input') return;
            remainingHints -= 1;
            isHintUsed = true;
            const btn = document.getElementById('hint-btn');
            if (btn) {
                btn.textContent = `提示 (${remainingHints})`;
                if (remainingHints <= 0) btn.classList.add('disabled');
            }
            const inputs = getReadingInputs();
            const inputSegments = getReadingInputSegments(question);
            if (inputs.length === 0 || inputSegments.length === 0) return;
            inputs[0].value = question.firstHint || inputSegments[0].answer || '';
            inputs[0].readOnly = true;
            inputs[0].classList.add('locked');
            focusReadingInput(1);
        }

        function renderAnswerArea(question) {
            const answerArea = document.getElementById('challenge-answer-area');
            const feedback = document.getElementById('challenge-feedback');
            answerArea.classList.add('hidden');
            feedback.textContent = '';
            feedback.className = 'challenge-feedback';
            if (question.answerMode === 'input') {
                answerArea.innerHTML = buildReadingAnswerMarkup(question);
            } else {
                answerArea.innerHTML = buildChoiceAnswerMarkup(question);
                answerArea.querySelectorAll('.action-option[data-option-index]').forEach((buttonNode) => {
                    buttonNode.addEventListener('click', () => {
                        const selectedIndex = Number(buttonNode.dataset.optionIndex);
                        checkAnswer(buttonNode, question.options[selectedIndex]);
                    });
                });
            }
        }

        function revealCurrentQuestion() {
            const question = questions[currentQuestionIndex];
            const challengeQuestion = document.getElementById('challenge-question');
            const questionSupport = document.getElementById('question-support');
            const displayModel = getQuestionDisplayModel(question);

            challengeQuestion.innerHTML = displayModel.questionHtml;
            if (questionSupport) {
                questionSupport.innerHTML = displayModel.supportHtml || '';
                questionSupport.classList.toggle('hidden', !displayModel.supportHtml);
            }
            
            renderAnswerArea(question);
            document.getElementById('challenge-answer-area').classList.remove('hidden');
            isAnswering = true;
            startTimer();
            if (question.answerMode === 'input') {
                focusReadingInput(0);
            }

            if (currentQuestionIndex === 0) {
                dispatchPracticeState('enter', { questionIndex: 1, questionCount: questions.length });
            } else if (currentQuestionIndex === questions.length - 1) {
                dispatchPracticeState('near_clear', { questionIndex: questions.length, questionCount: questions.length });
            }
        }

        function renderQuestion() {
            clearTimer();
            clearTypewriter('question');
            if (pendingQuestionReveal) {
                clearTimeout(pendingQuestionReveal);
                pendingQuestionReveal = null;
            }

            const question = questions[currentQuestionIndex];
            if (!question) {
                renderSummary();
                return;
            }

            updateHud();
            isAnswering = false;
            isHintUsed = false;

            const answerArea = document.getElementById('challenge-answer-area');
            const feedback = document.getElementById('challenge-feedback');
            const challengeQuestion = document.getElementById('challenge-question');
            const typingCursor = document.getElementById('typing-cursor');
            const dialogueCounter = document.getElementById('dialogue-counter');
            const questionSupport = document.getElementById('question-support');
            const displayModel = getQuestionDisplayModel(question);

            dialogueCounter.textContent = `进行度 ${currentQuestionIndex + 1} / ${questions.length}`;
            challengeQuestion.innerText = '';
            typingCursor.className = 'typing-cursor';
            if (questionSupport) {
                questionSupport.innerHTML = '';
                questionSupport.classList.add('hidden');
            }
            answerArea.classList.add('hidden');
            answerArea.innerHTML = '';
            feedback.textContent = '';
            feedback.className = 'challenge-feedback';

            runTypewriter({
                controllerName: 'question',
                target: challengeQuestion,
                cursor: typingCursor,
                text: displayModel.typingText,
                speed: 34,
                onComplete: () => {
                    pendingQuestionReveal = setTimeout(() => {
                        revealCurrentQuestion();
                    }, 180);
                }
            });
        }

        function markChoiceButtons(question, selected, isCorrect, isTimeout) {
            const buttons = document.querySelectorAll('.action-option');
            buttons.forEach((buttonNode) => {
                buttonNode.disabled = true;
                if (buttonNode.innerText === question.correctAnswer) {
                    buttonNode.classList.add('correct-ans');
                }
                if (!isTimeout && buttonNode.innerText === selected && !isCorrect) {
                    buttonNode.classList.add('wrong-ans');
                }
            });
        }

        function markReadingInputs(question, isCorrect) {
            const grid = document.getElementById('reading-input-grid');
            const inputs = getReadingInputs();
            const inputSegments = getReadingInputSegments(question);
            const hintBtn = document.getElementById('hint-btn');
            const submitBtn = document.getElementById('reading-submit-btn');

            inputs.forEach((input, index) => {
                input.readOnly = true;
                if (!isCorrect) {
                    input.value = inputSegments[index] ? inputSegments[index].answer || '' : '';
                }
            });
            if (grid) {
                grid.classList.remove('correct', 'wrong');
                grid.classList.add(isCorrect ? 'correct' : 'wrong');
            }
            if (hintBtn) hintBtn.classList.add('disabled');
            if (submitBtn) submitBtn.classList.add('disabled');
        }

        function checkAnswer(btn, selected, isTimeout = false) {
            if (!isAnswering) return;
            isAnswering = false;
            clearTimer();

            const question = questions[currentQuestionIndex];
            const expectedAnswer = question.answerMode === 'input'
                ? normalizeKanaAnswer(question.correctAnswer)
                : question.correctAnswer;
            const submittedAnswer = question.answerMode === 'input'
                ? normalizeKanaAnswer(selected)
                : selected;
            const isCorrect = !isTimeout && submittedAnswer === expectedAnswer;

            if (question.answerMode === 'input') {
                markReadingInputs(question, isCorrect);
            } else {
                markChoiceButtons(question, selected, isCorrect, isTimeout);
            }

            const feedback = document.getElementById('challenge-feedback');
            feedback.classList.remove('good', 'bad');

            if (isCorrect) {
                score += 1;
                answerStreak += 1;
                bestStreak = Math.max(bestStreak, answerStreak);
                feedback.textContent = answerStreak > 3 ? '哼，算你有点本事。赏你摸一下狗头。' : '勉强算你对了吧，汪。';
                feedback.classList.add('good');
                playSlashEffect();
                playDamageText(1, bestStreak >= 5 ? 'critical' : 'normal');
                const avatar = document.getElementById('enemy-avatar');
                avatar.classList.remove('hit');
                void avatar.offsetWidth;
                avatar.classList.add('hit');
                setTimeout(() => avatar.classList.remove('hit'), 500);
            } else {
                answerStreak = 0;
                feedback.textContent = isTimeout ? '呼噜噜...啊？你居然发呆超时了？！' : `气死本汪了！正确答案明明是「${question.correctAnswer}」！`;
                feedback.classList.add('bad');
                const dialogueBox = document.getElementById('dialogue-box');
                dialogueBox.classList.remove('shake');
                void dialogueBox.offsetWidth;
                dialogueBox.classList.add('shake');
                setTimeout(() => dialogueBox.classList.remove('shake'), 520);

                if (!(isChallengeMode && selectedDifficulty)) {
                    const wordId = question.word.word;
                    const key = getVocabStarKey(wordId);
                    if (localStorage.getItem(key) !== 'true') {
                        localStorage.setItem(key, 'true');
                        showToast(`「${wordId}」已被本汪记在小本本上了！`);
                    }
                }

                if (isChallengeMode && selectedDifficulty) {
                    const damage = difficultyMap[selectedDifficulty].damage;
                    hp = Math.max(0, hp - damage);
                    showHpDamage(damage);
                    playDamageText(damage, 'player');
                }
            }

            clearedCount += 1;

            dispatchPracticeState(isCorrect ? 'answer_correct' : 'answer_wrong', {
                isCorrect,
                streak: answerStreak,
                questionIndex: currentQuestionIndex + 1,
                questionCount: questions.length,
                accuracy: clearedCount > 0 ? score / clearedCount : 0
            });

            if (isCorrect && answerStreak >= 3) {
                dispatchPracticeState('streak', {
                    isCorrect: true,
                    streak: answerStreak,
                    questionIndex: currentQuestionIndex + 1,
                    questionCount: questions.length,
                    accuracy: clearedCount > 0 ? score / clearedCount : 0
                });
            }

            updateHud();

            if (isChallengeMode && selectedDifficulty && hp <= 0) {
                setTimeout(renderSummary, 1300);
                return;
            }

            setTimeout(nextQuestion, isCorrect ? 900 : 1800);
        }

        function nextQuestion() {
            currentQuestionIndex += 1;
            if (currentQuestionIndex < questions.length) {
                renderQuestion();
            } else {
                renderSummary();
            }
        }

        function calculateSummaryRank(percentage) {
            if (percentage === 100) {
                return { rank: 'SS', eval: '完美！你可以当本汪的御用饲养员了！汪~' };
            }
            if (percentage >= 90) {
                return { rank: 'S', eval: '干得不错嘛，赏你摸一下我的头。' };
            }
            if (percentage >= 80) {
                return { rank: 'A', eval: '马马虎虎，作为人类算勉强及格了。' };
            }
            if (percentage >= 65) {
                return { rank: 'B', eval: '错成这样，本汪的骨头都看不下去了。' };
            }
            if (percentage >= 50) {
                return { rank: 'C', eval: '太差劲了！赶紧去给本汪买狗罐头补补脑子！' };
            }
            return { rank: 'F', eval: '无可救药！看本汪把你家给拆了！' };
        }

        function renderSummary() {
            clearTimer();
            clearTypewriter('question');
            if (pendingQuestionReveal) {
                clearTimeout(pendingQuestionReveal);
                pendingQuestionReveal = null;
            }

            switchView('view-summary');

            const percentage = questions.length > 0 ? Math.round((score / questions.length) * 100) : 0;
            const reward = ensureRewardResult();
            const context = getPracticeContext();
            const rankData = calculateSummaryRank(percentage);

            let title = '跑酷完了汪！';
            let message = '还不快去复习错题，别偷懒！';
            
            if (isChallengeMode && selectedDifficulty && hp <= 0) {
                title = '被柴柴咬败了';
                message = `哼，太弱了！（只跑到了第 ${Math.min(clearedCount, questions.length)} 题）`;
            }

            const drawAffordance = getDrawAffordanceMarkup(reward);
            const summaryMsg = drawAffordance
                ? `<div class="lab-result-copy-row"><span>${message}</span>${drawAffordance}</div>`
                : message;

            dispatchPracticeState(percentage === 100 ? 'perfect_clear' : 'clear', {
                isCorrect: true,
                streak: bestStreak,
                questionIndex: questions.length,
                questionCount: questions.length,
                accuracy: questions.length > 0 ? score / questions.length : 0
            });

            document.getElementById('summary-overline').textContent = isChallengeMode && selectedDifficulty
                ? `[${difficultyMap[selectedDifficulty].label}] ${context.challengeTitle}`
                : context.challengeTitle;
            document.getElementById('summary-rank').textContent = rankData.rank;
            document.getElementById('summary-title').textContent = title;
            document.getElementById('summary-eval').textContent = rankData.eval;
            document.getElementById('summary-msg').innerHTML = summaryMsg;
            document.getElementById('summary-accuracy').textContent = `${percentage}%`;
            document.getElementById('summary-streak').textContent = String(bestStreak);
            document.getElementById('summary-hints').textContent = String(Math.max(0, 3 - remainingHints));
            document.getElementById('summary-hp').textContent = isChallengeMode && selectedDifficulty ? String(hp) : '—';
        }

        function prepareQuestionSet() {
            const context = getPracticeContext();
            const eligiblePool = getEligibleWordsForPracticeType(context.pool, dailyPracticeType);
            targetWords = shuffleArray(eligiblePool).slice(0, Math.min(20, eligiblePool.length));
            if (targetWords.length === 0) {
                questions = [];
                return;
            }

            questions = targetWords.map((word) => {
                if (dailyPracticeType === 'reading') {
                    return buildReadingQuestionSpec(word);
                }
                if (dailyPracticeType === 'meaning') {
                    return buildMeaningQuestionSpec(word, eligiblePool);
                }
                return buildSentenceQuestionSpec(word);
            }).filter(Boolean);

            if (questions.length > 0) {
                questions = shuffle(questions);
            }
        }

        function buildIntroStory(context) {
            if (context.mode === 'final') {
                return `シバ先生：「你就是那个连副词都搞不明白的铲屎官吗？汪。\n\n居然敢挑战跑酷大考，胆子不小嘛。选个难度，让本汪看看你的实力。」`;
            }
            if (context.mode === 'stage' || context.mode === 'challenge') {
                return `シバ先生：「你就是那个连副词都搞不明白的铲屎官吗？汪。\n\n到了阶段特训了，别想着能轻易蒙混过关！选个难度吧。」`;
            }
            if (context.mode === 'review') {
                return `シバ先生：「错题都不复习，你是想饿死本汪吗？汪。\n\n快点把这些错的都改过来！」`;
            }
            return `シバ先生：「你就是那个连副词都搞不明白的铲屎官吗？汪。\n\n算了，本汪大发慈悲陪你练练。答错可是有惩罚的哦！」`;
        }

        function renderIntroActions() {
            const context = getPracticeContext();
            const actions = document.getElementById('intro-actions');
            if (isChallengeMode) {
                actions.innerHTML = `
                    <div class="difficulty-grid">
                        <button class="difficulty-btn" type="button" onclick="beginPracticeSession('easy')">
                            <div class="difficulty-title">幼犬散步</div>
                            <div class="difficulty-copy">${difficultyMap.easy.copy}</div>
                        </button>
                        <button class="difficulty-btn" type="button" onclick="beginPracticeSession('hard')">
                            <div class="difficulty-title">柴犬跑酷</div>
                            <div class="difficulty-copy">${difficultyMap.hard.copy}</div>
                        </button>
                        <button class="difficulty-btn" type="button" onclick="beginPracticeSession('hell')">
                            <div class="difficulty-title" style="color:var(--accent-red)">狂暴拆家</div>
                            <div class="difficulty-copy">${difficultyMap.hell.copy}</div>
                        </button>
                    </div>
                `;
            } else {
                actions.innerHTML = `
                    <button class="intro-primary-btn" type="button" onclick="beginPracticeSession()">开始挨揍 (Start)</button>
                `;
            }
            actions.classList.remove('hidden');
        }

        function renderIntro() {
            if (!questions.length) {
                renderEmptyState(`汪？当前路线连一点「${getPracticeTypeLabel()}」的骨头（题目）都没有。`);
                return;
            }

            const context = getPracticeContext();
            switchView('view-intro');

            document.getElementById('intro-actions').classList.add('hidden');
            document.getElementById('intro-actions').innerHTML = '';

            const introStory = document.getElementById('intro-story');
            const introCursor = document.getElementById('intro-cursor');
            runTypewriter({
                controllerName: 'intro',
                target: introStory,
                cursor: introCursor,
                text: buildIntroStory(context),
                speed: 42,
                onComplete: renderIntroActions
            });
        }

        function renderEmptyState(message) {
            switchView('view-intro');
            const introView = document.getElementById('view-intro');
            introView.innerHTML = `
                <div class="intro-card" style="text-align: center; padding: 60px;">
                    <div style="font-size: 64px; margin-bottom: 20px;">🐕</div>
                    <h2 style="font-size: 24px; margin-bottom: 16px;">骨头被隔壁老王捡走了</h2>
                    <p style="color: var(--text-secondary); font-weight:600; line-height: 1.65;">${escapeHtml(message)}</p>
                </div>
            `;
        }

        function beginPracticeSession(level) {
            if (isChallengeMode) {
                selectedDifficulty = level || 'easy';
                hp = 20;
            } else {
                selectedDifficulty = null;
            }

            currentQuestionIndex = 0;
            score = 0;
            clearedCount = 0;
            answerStreak = 0;
            bestStreak = 0;
            remainingHints = 3;
            rewardResult = null;

            startRewardRun();
            switchView('view-main');
            renderQuestion();
        }

        document.getElementById('intro-story-panel').addEventListener('click', () => {
            finishCurrentTypewriter('intro');
        });

        document.getElementById('challenge-question-shell').addEventListener('click', () => {
            if (questionTypingController) {
                finishCurrentTypewriter('question');
            }
        });

        function startApp() {
            prepareQuestionSet();
            renderIntro();
        }

        startApp();
    </script>
</body>
