<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N1 形容詞 - 単語暗記</title>
    <!-- 引入优雅的衬线与无衬线字体，契合文字游戏与沉浸阅读风格 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+JP:wght@400;600&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    <style>
        html {
            -webkit-text-size-adjust: 100%;
        }

        :root {
            /* === 暖光理性辅导 ADV / 护眼原木色调色板 === */
            --bg-grad-start: #FDFBF7;      /* 暖白书页色 */
            --bg-grad-end: #F6EFE9;        /* 晨光浅杏色 */
            
            --panel-bg: rgba(255, 255, 255, 0.9); /* 明亮半透明文本框 */
            --panel-border: rgba(210, 195, 180, 0.6); /* 柔和纸质边框 */
            
            --text-main: #4A423E;          /* 主文本（深咖啡/墨褐，比纯黑更护眼） */
            --text-dim: #8C807A;           /* 次要文本（浅褐灰） */
            --text-accent: #C27A62;        /* 剧情高亮色（赤陶橘，温暖理性中带着傲娇感） */
            
            --accent-green: #5C946E;       /* 沉稳森绿（正确/成功） */
            --accent-red: #D16B6B;         /* 柔和朱红（错误/警示） */
            --accent-gold: #D9A05B;        /* 柔和雅金（特殊焦点） */
            --accent-hover: rgba(194, 122, 98, 0.08); /* 暖橘悬浮背景 */

            --glass-blur: blur(12px);      /* 毛玻璃滤镜 */
            --shadow-soft: 0 8px 24px rgba(180, 160, 145, 0.15); /* 浅色暖光阴影 */
            --shadow-glow: 0 0 12px rgba(194, 122, 98, 0.2); /* 橘色微光晕 */

            --font-ui: "Noto Sans SC", "Noto Sans JP", -apple-system, sans-serif;
            --font-serif: "Noto Serif SC", "Noto Serif JP", serif; /* 剧情主体使用衬线体 */
            
            --transition: 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-ui);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            background: var(--bg-grad-end);
        }

        /* 纯 CSS 绘制的静谧氛围背景 */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, var(--bg-grad-start) 0%, var(--bg-grad-end) 80%);
            z-index: -2;
        }
        
        /* 隐约的网格背景，增加秩序感和纸张感 */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }

        button, input {
            font: inherit;
        }

        .hidden {
            display: none !important;
        }

        /* Header */
        header {
            width: 100%;
            padding: 16px 24px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(253, 251, 247, 0.85);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--panel-border);
            box-shadow: 0 4px 20px rgba(180, 160, 145, 0.08);
        }

        .back-btn, .home-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--panel-border);
            color: var(--text-dim);
            font-weight: 500;
            font-size: 14px;
            text-decoration: none;
            transition: all var(--transition);
            cursor: pointer;
            white-space: nowrap;
        }

        .back-btn:hover, .home-btn:hover {
            color: var(--text-accent);
            background: #fff;
            border-color: var(--text-accent);
            box-shadow: var(--shadow-glow);
            transform: translateY(-2px);
        }

        h1 { 
            margin: 0; 
            font-size: 16px; 
            font-weight: 600; 
            color: var(--text-main);
            position: absolute; 
            left: 50%; 
            transform: translateX(-50%); 
            letter-spacing: 0.05em;
        }

        .header-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 14px;
            z-index: 2;
        }

        /* Container */
        .container {
            width: 95%;
            max-width: 680px;
            padding: 32px 0 48px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: relative;
            z-index: 1;
        }

        /* --- Day Selection View --- */
        .days-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Active Day Card */
        .day-card {
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-soft);
            cursor: pointer;
            transition: all var(--transition);
        }

        .day-card:hover {
            transform: translateY(-3px);
            border-color: var(--text-accent);
            box-shadow: 0 12px 30px rgba(180, 160, 145, 0.25);
        }

        .day-card:active { transform: scale(0.99); }

        .day-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .day-icon {
            width: 48px; height: 48px;
            background: rgba(255,255,255,0.6);
            border: 1px solid var(--panel-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--text-dim);
        }

        .day-text-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .day-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            margin: 0;
            letter-spacing: 0.05em;
        }

        .day-title-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .last-studied-badge {
            font-size: 11px;
            color: var(--text-accent);
            background-color: transparent;
            border: 1px solid var(--text-accent);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
            display: inline-block;
        }

        .day-subtitle {
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 500;
        }

        .go-badge {
            background: rgba(194, 122, 98, 0.05);
            color: var(--text-accent);
            border: 1px solid var(--text-accent);
            font-size: 13px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 6px;
            transition: all var(--transition);
        }
        
        .day-card:hover .go-badge {
            background: var(--text-accent);
            color: #fff;
            box-shadow: var(--shadow-glow);
        }

        /* Preparation/Empty Card */
        .day-card.prep {
            background: rgba(0, 0, 0, 0.02);
            border: 1px dashed rgba(0,0,0,0.1);
            box-shadow: none;
            cursor: default;
        }
        .day-card.prep:hover { transform: none; border-color: rgba(0,0,0,0.15); box-shadow: none; }

        .day-card.prep .day-icon {
            background: transparent;
            border-color: transparent;
            opacity: 0.5;
        }
        
        .day-card.prep .day-title { color: var(--text-dim); }
        
        .construction-icon {
            font-size: 24px;
            opacity: 0.4;
        }

        /* --- Word List View --- */
        .word-list-item {
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            padding: 18px 24px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid var(--panel-border);
            box-shadow: var(--shadow-soft);
            transition: all var(--transition);
            gap: 12px;
        }
        
        .word-list-item:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(180, 160, 145, 0.2); 
            border-color: var(--text-accent);
        }

        .list-word-text { font-size: 20px; font-weight: 500; color: var(--text-main); font-family: var(--font-serif); }
        .list-arrow { color: var(--panel-border); font-size: 20px; font-weight: normal; transition: all var(--transition); }
        .word-list-item:hover .list-arrow { color: var(--text-accent); transform: translateX(4px); }

        ruby { ruby-position: over; }
        rt { font-size: 0.52em; color: var(--text-dim); font-weight: normal; font-family: var(--font-ui); }

        .tone-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 24px;
            line-height: 1;
            font-size: 12px;
            color: #fff;
            background: var(--text-accent);
            border-radius: 4px;
            padding: 2px 6px;
            font-weight: 600;
            margin-left: 0;
        }

        .pos-tag {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 24px;
            line-height: 1;
            font-size: 11px;
            background: rgba(92, 148, 110, 0.05);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 0;
            font-weight: 500;
        }

        /* Mark Button (Replaced Horse) */
        .mark-btn {
            font-size: 22px;
            cursor: pointer;
            opacity: 0.3;
            filter: grayscale(100%);
            transition: all var(--transition);
            background: transparent;
            border: none;
            padding: 4px;
            line-height: 1;
            user-select: none;
        }
        .mark-btn.active {
            opacity: 1;
            filter: none;
            transform: scale(1.1);
        }
        .mark-btn:hover {
            transform: scale(1.2);
            opacity: 0.8;
        }
        .mark-btn.active:hover {
            transform: scale(1.25);
            opacity: 1;
        }

        .list-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        /* Full Screen Flashcard Style */
        .flashcard-main {
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            padding: 40px;
            box-shadow: var(--shadow-soft);
            min-height: 420px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: relative;
        }

        .fc-header { 
            border-bottom: 1px solid rgba(0,0,0,0.06); 
            padding-bottom: 20px; 
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: flex-start;
            gap: 18px;
        }

        .fc-word-group {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .fc-title-row {
            display: flex;
            align-items: flex-end;
            gap: 10px 12px;
            flex-wrap: wrap;
            min-width: 0;
        }

        .fc-meta-group {
            display: flex;
            align-items: center;
            align-self: flex-end;
            gap: 8px;
            flex-wrap: wrap;
            padding-bottom: 3px;
            transform: translateY(2px);
            min-width: 0;
        }
        
        .fc-word { 
            font-size: 36px; 
            font-weight: 500; 
            color: var(--text-main); 
            margin: 0; 
            line-height: 1.2; 
            font-family: var(--font-serif);
            min-width: 0;
        }

        .fc-action {
            flex-shrink: 0;
            align-self: flex-start;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            min-width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.68);
            border: 1px solid var(--panel-border);
            box-shadow: 0 8px 16px rgba(180, 160, 145, 0.14);
        }

        .fc-section-title { 
            font-size: 13px; 
            color: var(--text-dim); 
            font-weight: 600; 
            margin: 16px 0 12px; 
            letter-spacing: 0.05em; 
        }

        .def-group { margin-bottom: 24px; }
        .def-group + .def-group { border-top: 1px dashed rgba(0,0,0,0.08); padding-top: 20px; }

        .def-number {
            color: var(--text-accent);
            background: rgba(194, 122, 98, 0.1);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px; height: 22px;
            font-weight: 600;
            font-size: 12px;
            margin-right: 10px;
        }
        
        .def-meaning {
            font-weight: 500;
            color: var(--text-main);
            font-size: 18px;
            letter-spacing: 0.05em;
        }
        
        .def-nuance {
            color: var(--text-dim);
            margin-left: 8px;
            font-weight: normal;
            font-size: 14px;
        }

        .def-ex {
            margin-top: 16px;
            background: rgba(0,0,0,0.02);
            padding: 18px 20px;
            border-radius: 10px;
            border-left: 3px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
        }

        .def-example-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(194, 122, 98, 0.12);
            color: var(--text-accent);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.06em;
            user-select: none;
        }

        .def-example-body {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ex-jp { 
            font-size: 17px; 
            color: var(--text-main); 
            font-weight: 600; 
            margin: 0; 
            line-height: 1.92;
            letter-spacing: 0.02em;
            font-family: var(--font-serif);
        }
        .ex-jp .ex-highlight {
            color: var(--text-accent);
            font-weight: 600;
            border-bottom: 1px solid var(--text-accent);
            padding: 0 2px;
        }
        .ex-jp .ex-highlight ruby,
        .ex-jp .ex-highlight strong {
            color: inherit;
            font-weight: inherit;
        }
        .ex-jp .ex-highlight rt {
            color: var(--text-dim);
            font-weight: normal;
        }
        .ex-cn {
            font-size: 14px;
            color: var(--text-main);
            opacity: 0.78;
            font-weight: 500;
            line-height: 1.75;
            margin: 0;
            font-family: var(--font-ui);
        }

        .nav-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; border-top: 1px solid rgba(0,0,0,0.06); padding-top: 24px; }
        .nav-progress { font-size: 13px; font-weight: 600; color: var(--text-dim); }
        
        .nav-btn { 
            background: transparent; 
            border: 1px solid var(--panel-border); 
            padding: 10px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 500; 
            color: var(--text-dim); 
            transition: all var(--transition); 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 14px;
        }
        .nav-btn:hover:not(.disabled) { border-color: var(--text-main); color: var(--text-main); background: rgba(0,0,0,0.02); }
        .nav-btn:active:not(.disabled) { transform: scale(0.98); }
        
        .nav-btn.primary { background: rgba(194, 122, 98, 0.05); color: var(--text-accent); border-color: var(--text-accent); }
        .nav-btn.primary:hover:not(.disabled) { background: var(--text-accent); color: #fff; box-shadow: var(--shadow-glow); }
        .nav-btn.disabled { opacity: 0.4; pointer-events: none; }

        /* Practice Picker Overlay */
        .practice-picker-overlay {
            position: fixed;
            inset: 0;
            background: rgba(253, 251, 247, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 240;
            backdrop-filter: var(--glass-blur);
        }

        .practice-picker-overlay.is-open {
            display: flex;
        }

        .practice-picker-panel {
            width: min(92vw, 420px);
            background: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            padding: 32px;
            box-shadow: var(--shadow-soft);
        }

        .practice-picker-topline {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 16px;
        }

        .practice-picker-kicker {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-accent);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .practice-picker-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-main);
            margin-top: 8px;
        }

        .practice-picker-context {
            color: var(--text-dim);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
            font-weight: 500;
        }

        .practice-picker-close {
            width: 32px;
            height: 32px;
            border: 1px solid var(--panel-border);
            border-radius: 50%;
            background: transparent;
            color: var(--text-dim);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }

        .practice-picker-close:hover {
            background: rgba(0,0,0,0.05);
            color: var(--text-main);
            transform: rotate(90deg);
        }

        .practice-picker-options {
            display: grid;
            gap: 12px;
        }

        .practice-picker-option {
            width: 100%;
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            background: rgba(255,255,255,0.6);
            padding: 16px 20px;
            text-align: left;
            cursor: pointer;
            transition: all var(--transition);
        }

        .practice-picker-option:hover {
            border-color: var(--text-accent);
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(194, 122, 98, 0.1);
        }

        .practice-picker-option.is-last-used {
            border-color: var(--text-accent);
            background: #fff;
        }
        
        .practice-picker-option.is-last-used::before {
            content: '📌 推荐特训';
            display: inline-block;
            background: rgba(194, 122, 98, 0.1);
            color: var(--text-accent);
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .practice-picker-option-title {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .practice-picker-option-sub {
            display: block;
            color: var(--text-dim);
            font-size: 12px;
            line-height: 1.5;
        }

        body.practice-picker-open {
            overflow: hidden;
        }

        /* Mobile Responsive Adjustments */
        @media (max-width: 768px) {
            header {
                padding: calc(12px + env(safe-area-inset-top)) 12px 12px;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            h1 {
                position: static;
                left: auto;
                transform: none;
                flex: 1 1 auto;
                min-width: 0;
                text-align: center;
                font-size: 16px;
                line-height: 1.1;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .header-actions {
                flex: 0 0 auto;
                min-width: 84px;
                margin-left: 0;
                gap: 8px;
            }

            .back-btn,
            .home-btn {
                flex: 0 0 auto;
                min-height: 36px;
                padding: 6px 10px;
                font-size: 12px;
                line-height: 1;
                gap: 6px;
            }

            .container {
                width: min(100%, calc(100vw - 24px));
                padding: 18px 0 36px;
                gap: 16px;
            }

            .day-card,
            .word-list-item {
                padding: 16px;
                align-items: flex-start;
            }

            .day-card {
                position: relative;
                gap: 14px;
                padding-right: 88px;
            }

            .day-info {
                flex: 1 1 auto;
                width: 100%;
                min-width: 0;
                align-items: flex-start;
            }

            .day-title-row {
                flex-wrap: wrap;
            }

            .go-badge {
                position: absolute;
                top: 16px;
                right: 16px;
                align-self: auto;
                flex-shrink: 0;
            }

            .list-word-text {
                flex: 1 1 auto;
                min-width: 0;
                font-size: 18px;
                line-height: 1.5;
            }

            .flashcard-main {
                min-height: 0;
                padding: 24px 20px;
                gap: 18px;
            }

            .fc-header {
                gap: 12px;
                padding-bottom: 14px;
            }

            .fc-word-group {
                gap: 8px;
            }

            .fc-title-row {
                gap: 8px 10px;
            }

            .fc-meta-group {
                gap: 6px;
                padding-bottom: 2px;
                transform: translateY(2px);
            }

            .fc-word {
                font-size: 30px;
            }

            .fc-action {
                width: 40px;
                min-width: 40px;
                height: 40px;
            }

            .def-ex {
                padding: 16px 16px;
                gap: 8px;
            }

            .nav-controls {
                display: grid;
                grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
                align-items: center;
                gap: 8px;

</head>
<body>
    <header>
        <a id="back-btn" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            返回
        </a>
        <h1 id="page-title">N1 形容詞</h1>
        <div class="header-actions">
            <a id="header-home-btn" href="../../../index.html#exam" class="home-btn">逃离辅导室</a>
            <button type="button" id="header-practice-btn" class="home-btn" style="display: none;">今日练习</button>
        </div>
    </header>

    <div class="container">
        <!-- View 1: Day Selection List -->
        <div id="days-view" class="days-grid">
            <!-- Injected by JS -->
        </div>

        <!-- View 2: Word List (Directory) -->
        <div id="word-list-view" class="hidden">
            <div id="word-list-container" style="display: flex; flex-direction: column; gap: 12px;">
                <!-- Injected by JS -->
            </div>
        </div>

        <!-- View 3: Word Detail (Flashcard) -->
        <div id="word-detail-view" class="hidden">
            <!-- Injected by JS -->
        </div>
    </div>

    <div id="practice-picker-overlay" class="practice-picker-overlay" aria-hidden="true">
        <div class="practice-picker-panel" role="dialog" aria-modal="true" aria-labelledby="practice-picker-title">
            <div class="practice-picker-topline">
                <div>
                    <div class="practice-picker-kicker">凛的辅导室</div>
                    <div id="practice-picker-title" class="practice-picker-title">选择特训方式</div>
                </div>
                <button type="button" id="practice-picker-close" class="practice-picker-close" aria-label="关闭">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div id="practice-picker-context" class="practice-picker-context"></div>
            <div id="practice-picker-options" class="practice-picker-options"></div>
        </div>
    </div>

    <script src="n1_adjectives_data.js"></script>
    <script src="n1-adjectives-curriculum.js"></script>
    <script>
        const CURRICULUM_DAYS = Array.isArray(window.LAB_N1_ADJECTIVE_DAYS)
            ? window.LAB_N1_ADJECTIVE_DAYS
            : (Array.isArray(window.LAB_ADJECTIVE_DAYS) ? window.LAB_ADJECTIVE_DAYS : []);
        const CURRICULUM_STAGES = Array.isArray(window.LAB_N1_ADJECTIVE_STAGES)
            ? window.LAB_N1_ADJECTIVE_STAGES
            : (Array.isArray(window.LAB_ADJECTIVE_STAGES) ? window.LAB_ADJECTIVE_STAGES : []);
        const CURRICULUM_GROUPS = Array.isArray(window.LAB_N1_ADJECTIVE_GROUPS)
            ? window.LAB_N1_ADJECTIVE_GROUPS
            : (Array.isArray(window.LAB_ADJECTIVE_GROUPS) ? window.LAB_ADJECTIVE_GROUPS : []);
        const STAR_KEY_PREFIX = 'study_quest_test_v1_vocab_star::';
        const LEGACY_STAR_PREFIX = 'n1_adjs_star_';
        const LAST_DAY_STORAGE_KEY = 'study_quest_test_v1_n1_adjectives_last_day';
        const LEGACY_LAST_DAY_STORAGE_KEY = 'n1_adjs_last_day';
        const PRACTICE_TYPE_STORAGE_KEY = 'study_quest_test_v1_n1_adjectives_practice_type';
        const PRACTICE_TYPE_OPTIONS = Object.freeze([
            Object.freeze({
                id: 'reading',
                label: '读音填空',
                hint: '看汉字写假名，连这也拼错的话绝对会让人笑话的！'
            }),
            Object.freeze({
                id: 'meaning',
                label: '假名选义',
                hint: '看假名选中文意思，敢乱猜你就死定了！'
            }),
            Object.freeze({
                id: 'sentence',
                label: '句子填空',
                hint: '根据语境选形容词，这么简单的题别告诉我你不会？'
            })
        ]);

        let currentView = 'days';
        let currentDay = 1;
        let currentDailyWords = [];
        let currentWordIndex = 0;
        let currentPracticeType = getStoredPracticeType();
        let practicePickerContext = null;

        const backBtn = document.getElementById('back-btn');
        const pageTitle = document.getElementById('page-title');
        const homeBtn = document.getElementById('header-home-btn');
        const headerActions = document.querySelector('.header-actions');
        const headerPracticeBtn = document.getElementById('header-practice-btn');
        const daysView = document.getElementById('days-view');
        const wordListView = document.getElementById('word-list-view');
        const wordDetailView = document.getElementById('word-detail-view');
        const practicePickerOverlay = document.getElementById('practice-picker-overlay');
        const practicePickerCloseBtn = document.getElementById('practice-picker-close');
        const practicePickerContextNode = document.getElementById('practice-picker-context');
        const practicePickerOptionsNode = document.getElementById('practice-picker-options');

        function safeGetItem(key) {
            try {
                return localStorage.getItem(key);
            } catch (error) {
                console.warn('LocalStorage access denied', error);
                return null;
            }
        }

        function safeSetItem(key, value) {
            try {
                localStorage.setItem(key, value);
            } catch (error) {
                console.warn('LocalStorage write denied', error);
            }
        }

        function safeRemoveItem(key) {
            try {
                localStorage.removeItem(key);
            } catch (error) {
                console.warn('LocalStorage remove denied', error);
            }
        }

        function syncHeaderActions() {
            if (!headerActions) {
                return;
            }
            const shouldShowHome = !!homeBtn && homeBtn.style.display !== 'none';
            const shouldShowPractice = !!headerPracticeBtn && headerPracticeBtn.style.display !== 'none';
            headerActions.style.visibility = shouldShowHome || shouldShowPractice ? 'visible' : 'hidden';
            headerActions.style.pointerEvents = shouldShowHome || shouldShowPractice ? 'auto' : 'none';
        }

        function escapeHtml(value) {
            return String(value == null ? '' : value).replace(/[&<>"']/g, (char) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function isPlaceholderWord(word) {
            const surface = String(word && word.word ? word.word : '').trim();
            return !surface || surface === '（準備中）' || surface === '---';
        }

        function getVocabStarKey(wordId) {
            return `${STAR_KEY_PREFIX}${String(wordId || '').trim()}`;
        }

        function migrateLegacyProgress() {
            if (typeof FULL_WORD_LIST === 'undefined' || !Array.isArray(FULL_WORD_LIST)) return;
            FULL_WORD_LIST.forEach((word) => {
                if (!word || isPlaceholderWord(word)) return;
                const legacyKey = `${LEGACY_STAR_PREFIX}${word.word}`;
                if (safeGetItem(legacyKey) === 'true' && safeGetItem(getVocabStarKey(word.word)) !== 'true') {
                    safeSetItem(getVocabStarKey(word.word), 'true');
                }
            });

            const currentLastDay = safeGetItem(LAST_DAY_STORAGE_KEY);
            if (!currentLastDay) {
                const legacyLastDay = parseInt(safeGetItem(LEGACY_LAST_DAY_STORAGE_KEY) || '', 10);
                if (Number.isFinite(legacyLastDay) && legacyLastDay > 0) {
                    safeSetItem(LAST_DAY_STORAGE_KEY, String(legacyLastDay));
                }
            }
        }

        function getLastStudiedDay() {
            return parseInt(safeGetItem(LAST_DAY_STORAGE_KEY) || '', 10) || 0;
        }

        function setLastStudiedDay(dayId) {
            safeSetItem(LAST_DAY_STORAGE_KEY, String(dayId));
        }

        function normalizePracticeType(value) {
            const normalized = String(value || '').trim().toLowerCase();
            return PRACTICE_TYPE_OPTIONS.some((option) => option.id === normalized) ? normalized : 'sentence';
        }

        function getStoredPracticeType() {
            return normalizePracticeType(safeGetItem(PRACTICE_TYPE_STORAGE_KEY));
        }

        function setStoredPracticeType(type) {
            currentPracticeType = normalizePracticeType(type);
            safeSetItem(PRACTICE_TYPE_STORAGE_KEY, currentPracticeType);
        }

        function getCurrentPracticeTypeMeta() {
            return PRACTICE_TYPE_OPTIONS.find((option) => option.id === currentPracticeType) || PRACTICE_TYPE_OPTIONS[0];
        }

        function buildPracticeUrl(params, explicitType) {
            const searchParams = new URLSearchParams();
            Object.entries(params || {}).forEach(([key, value]) => {
                if (value === undefined || value === null || value === '') return;
                searchParams.set(key, String(value));
            });
            searchParams.set('type', normalizePracticeType(explicitType || currentPracticeType));
            return `practice_n1_adjectives.html?${searchParams.toString()}`;
        }

        function getCurriculumDay(dayId) {
            return CURRICULUM_DAYS.find((day) => Number(day.id) === Number(dayId)) || null;
        }

        function getCurriculumStage(stageId) {
            return CURRICULUM_STAGES.find((stage) => Number(stage.id) === Number(stageId)) || null;
        }

        function getCurriculumGroup(groupId) {
            return CURRICULUM_GROUPS.find((group) => Number(group.id) === Number(groupId)) || null;
        }

        function collectWordsByIndexes(indexes) {
            if (!Array.isArray(indexes) || typeof FULL_WORD_LIST === 'undefined' || !Array.isArray(FULL_WORD_LIST)) return [];
            const seen = new Set();
            return indexes.map((index) => FULL_WORD_LIST[index]).filter((word) => {
                if (!word || isPlaceholderWord(word)) return false;
                if (seen.has(word.word)) return false;
                seen.add(word.word);
                return true;
            });
        }

        function getDayWords(dayId) {
            const day = getCurriculumDay(dayId);
            if (day && Array.isArray(day.wordIds)) {
                return collectWordsByIndexes(day.wordIds);
            }
            if (typeof FULL_WORD_LIST === 'undefined' || !Array.isArray(FULL_WORD_LIST)) return [];
            const wordsPerDay = typeof WORDS_PER_DAY !== 'undefined' ? WORDS_PER_DAY : 20;
            const start = (dayId - 1) * wordsPerDay;
            const size = dayId === 13 ? 25 : wordsPerDay;
            return FULL_WORD_LIST.slice(start, start + size).filter((word) => !isPlaceholderWord(word));
        }

        function getAllCurriculumWords() {
            if (CURRICULUM_DAYS.length > 0) {
                return collectWordsByIndexes(CURRICULUM_DAYS.flatMap((day) => Array.isArray(day.wordIds) ? day.wordIds : []));
            }
            return (typeof FULL_WORD_LIST !== 'undefined' && Array.isArray(FULL_WORD_LIST)) ? FULL_WORD_LIST.filter((word) => !isPlaceholderWord(word)) : [];
        }

        function getStarredWords() {
            return (typeof FULL_WORD_LIST !== 'undefined' && Array.isArray(FULL_WORD_LIST))
                ? FULL_WORD_LIST.filter((word) => !isPlaceholderWord(word) && safeGetItem(getVocabStarKey(word.word)) === 'true')
                : [];
        }

        function getStarredCount() {
            return getStarredWords().length;
        }

        function buildPracticePickerMeta(params) {
            if (params && params.mode === 'final') {
                return {
                    title: '终极摸底测验',
                    context: '别磨磨蹭蹭的！先把题型选好，马上就开始大考了！'
                };
            }
            if (params && Number(params.day) === -1) {
                return {
                    title: '笨蛋错题特训',
                    context: '我就知道你会选错题本。把题型选好，这次再错可别怪我不客气！'
                };
            }
            if (params && params.stage != null) {
                const stage = getCurriculumStage(Number(params.stage));
                const group = stage ? getCurriculumGroup(stage.groupId) : null;
                return {
                    title: '选择特训方式',
                    context: stage
                        ? `${group ? `${group.title} · ` : ''}${stage.title}`
                        : `阶段考核 ${params.stage}`
                };
            }
            if (params && params.day != null) {
                const day = getCurriculumDay(Number(params.day));
                const group = day ? getCurriculumGroup(day.groupId) : null;
                return {
                    title: '选择特训方式',
                    context: day
                        ? `${group ? `${group.title} · ` : ''}${day.title}`
                        : `第 ${params.day} 页笔记`
                };
            }
            return {
                title: '选择特训方式',
                context: '快点选一个题型啦，别耽误我时间！'
            };
        }

        function closePracticePicker() {
            practicePickerContext = null;
            practicePickerOverlay.classList.remove('is-open');
            practicePickerOverlay.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('practice-picker-open');
        }

        function launchPracticeFromPicker(type) {
            if (!practicePickerContext) {
                closePracticePicker();
                return;
            }
            setStoredPracticeType(type);
            window.location.href = buildPracticeUrl(practicePickerContext.params, type);
        }

        function openPracticePicker(params) {
            const pickerMeta = buildPracticePickerMeta(params);
            practicePickerContext = {
                params: { ...(params || {}) },
                meta: pickerMeta
            };
            practicePickerContextNode.textContent = pickerMeta.context;
            document.getElementById('practice-picker-title').textContent = pickerMeta.title;
            practicePickerOptionsNode.innerHTML = PRACTICE_TYPE_OPTIONS.map((option) => `
                <button
                    type="button"
                    class="practice-picker-option ${option.id === currentPracticeType ? 'is-last-used' : ''}"
                    data-picker-type="${option.id}"
                >
                    <span class="practice-picker-option-title">${escapeHtml(option.label)}</span>
                    <span class="practice-picker-option-sub">${escapeHtml(option.hint)}</span>
                </button>
            `).join('');
            practicePickerOptionsNode.querySelectorAll('[data-picker-type]').forEach((node) => {
                node.addEventListener('click', () => launchPracticeFromPicker(node.dataset.pickerType));
            });
            practicePickerOverlay.classList.add('is-open');
            practicePickerOverlay.setAttribute('aria-hidden', 'false');
            document.body.classList.add('practice-picker-open');
        }

        function startPractice(dayId) {
            if (Number(dayId) === -1) {
                startReviewPractice();
                return;
            }
            openPracticePicker({ day: dayId });
        }

        function startStagePractice(stageId) {
            openPracticePicker({ stage: stageId });
        }

        function startFinalPractice() {
            openPracticePicker({ mode: 'final' });
        }

        function startReviewPractice() {
            if (getStarredCount() === 0) {
                alert('哼，算你厉害，错题本还是空的。继续保持！');
                return;
            }
            openPracticePicker({ day: -1 });
        }

        function selectStarredWords() {
            const starredWords = getStarredWords();
            if (starredWords.length === 0) {
                alert('哼，算你厉害，错题本还是空的。继续保持！');
                return;
            }
            currentDay = -1;
            currentDailyWords = starredWords;
            currentView = 'list';
            renderWordList(currentDailyWords);
            updateUI();
        }

        function renderDays() {
            daysView.innerHTML = '';

            // Review Card
            const reviewCard = document.createElement('div');
            reviewCard.className = 'day-card';
            reviewCard.style.borderColor = 'var(--text-accent)';
            reviewCard.style.background = 'rgba(194, 122, 98, 0.03)';
            reviewCard.innerHTML = `
                <div class="day-info">
                    <div class="day-icon" style="color: var(--text-accent); border-color: var(--text-accent); background: #fff;">🔖</div>
                    <div class="day-text-group">
                        <div class="day-title" style="color: var(--text-accent);">笨蛋错题本</div>
                        <div class="day-subtitle">${getStarredCount()} 个易错词 • 等你克服</div>
                    </div>
                </div>
                <div class="go-badge" style="background: var(--text-accent); color: #fff;">复习</div>
            `;
            reviewCard.addEventListener('click', startReviewPractice);
            daysView.appendChild(reviewCard);

            const lastDay = getLastStudiedDay();
            const stageByEndDay = new Map();
            CURRICULUM_STAGES.forEach((stage) => {
                if (Array.isArray(stage.dayIds) && stage.dayIds.length > 0) {
                    stageByEndDay.set(stage.dayIds[stage.dayIds.length - 1], stage);
                }
            });

            const safeTotalDays = typeof TOTAL_DAYS !== 'undefined' ? TOTAL_DAYS : 18;
            const totalDaysCount = CURRICULUM_DAYS.length || safeTotalDays;
            
            for (let dayId = 1; dayId <= totalDaysCount; dayId += 1) {
                const day = getCurriculumDay(dayId);
                const wordsPerDay = typeof WORDS_PER_DAY !== 'undefined' ? WORDS_PER_DAY : 20;
                const wordCount = day && Array.isArray(day.wordIds)
                    ? day.wordIds.length
                    : (dayId === 13 ? 25 : wordsPerDay);
                const badgeHtml = dayId === lastDay ? `<span class="last-studied-badge">当前驻扎</span>` : '';

                const dayCard = document.createElement('div');
                dayCard.className = 'day-card';
                dayCard.innerHTML = `
                    <div class="day-info">
                        <div class="day-icon">📝</div>
                        <div class="day-text-group">
                            <div class="day-title-row">
                                <div class="day-title">第 ${dayId} 页笔记</div>
                                ${badgeHtml}
                            </div>
                            <div class="day-subtitle">${wordCount} 词汇 • 待背诵</div>
                        </div>
                    </div>
                    <div class="go-badge">背诵</div>
                `;
                dayCard.addEventListener('click', () => selectDay(dayId));
                daysView.appendChild(dayCard);

                const stage = stageByEndDay.get(dayId);
                if (stage) {
                    const startDay = stage.dayIds[0];
                    const endDay = stage.dayIds[stage.dayIds.length - 1];
                    const stageCard = document.createElement('div');
                    stageCard.className = 'day-card';
                    stageCard.style.borderColor = 'var(--accent-green)';
                    stageCard.style.background = 'rgba(92, 148, 110, 0.03)';
                    stageCard.innerHTML = `
                        <div class="day-info">
                            <div class="day-icon" style="border-color: var(--accent-green); color: var(--accent-green); background: #fff;">📌</div>
                            <div class="day-text-group">
                                <div class="day-title" style="color: var(--accent-green);">${escapeHtml(stage.title || `阶段考核 ${stage.id}`)}</div>
                                <div class="day-subtitle">第 ${startDay} - ${endDay} 页 • 20 题考核</div>
                            </div>
                        </div>
                        <div class="go-badge" style="background: var(--accent-green); color: #fff;">考核</div>
                    `;
                    stageCard.addEventListener('click', () => startStagePractice(stage.id));
                    daysView.appendChild(stageCard);
                }
            }

            // Final Card
            const finalCard = document.createElement('div');
            finalCard.className = 'day-card';
            finalCard.style.borderColor = 'var(--accent-gold)';
            finalCard.style.background = 'rgba(217, 160, 91, 0.05)';
            finalCard.innerHTML = `
                <div class="day-info">
                    <div class="day-icon" style="border-color: var(--accent-gold); color: var(--accent-gold); background: #fff;">🎓</div>
                    <div class="day-text-group">
                        <div class="day-title" style="color: var(--accent-gold);">终极摸底大考</div>
                        <div class="day-subtitle">全 ${getAllCurriculumWords().length} 词 • 20 题综合历练</div>
                    </div>
                </div>
                <div class="go-badge" style="background: var(--accent-gold); color: #fff; border: none;">测验</div>
            `;
            finalCard.addEventListener('click', startFinalPractice);
            daysView.appendChild(finalCard);

            // Prep Card
            const prepCard = document.createElement('div');
            prepCard.className = 'day-card prep';
            prepCard.innerHTML = `
                <div class="day-info">
                    <div class="day-text-group">
                        <div style="margin-bottom:6px;">
                            <span style="background: rgba(0,0,0,0.1); color: var(--text-dim); font-size:11px; padding:2px 8px; border-radius:4px; font-weight:600;">敬请期待</span>
                        </div>
                        <div class="day-title">后续笔记 (整理中)</div>
                        <div class="day-subtitle" style="margin-top:4px;">急什么！我还没整理好笔记呢！</div>
                    </div>
                </div>
                <div class="construction-icon">🚧</div>
            `;
            daysView.appendChild(prepCard);
        }

        function selectDay(dayId) {
            setLastStudiedDay(dayId);
            currentDay = dayId;
            currentView = 'list';
            currentDailyWords = getDayWords(dayId);
            renderWordList(currentDailyWords);
            updateUI();
        }

        function renderWordList(words) {
            const container = document.getElementById('word-list-container');
            container.innerHTML = '';

            words.forEach((wordData, index) => {
                const item = document.createElement('div');
                item.className = 'word-list-item';
                const wordId = wordData.word;
                const isStarred = safeGetItem(getVocabStarKey(wordId)) === 'true';
                item.innerHTML = `
                    <div class="list-word-text">${wordData.word_html || wordData.word}</div>
                    <div class="list-actions">
                        <div class="mark-btn ${isStarred ? 'active' : ''}" data-word="${escapeHtml(wordId)}">🔖</div>
                        <div class="list-arrow">›</div>
                    </div>
                `;
                item.addEventListener('click', (event) => {
                    const btn = event.target.closest('.mark-btn');
                    if (btn) {
                        event.stopPropagation();
                        toggleMark(btn, wordId);
                        return;
                    }
                    openWordDetail(index);
                });
                container.appendChild(item);
            });

            window.scrollTo(0, 0);
        }

        function toggleMark(button, wordId) {
            const storageKey = getVocabStarKey(wordId);
            const nextActive = safeGetItem(storageKey) !== 'true';
            if (nextActive) {
                safeSetItem(storageKey, 'true');
            } else {
                safeRemoveItem(storageKey);
            }
            button.classList.toggle('active', nextActive);
        }

        function openWordDetail(index) {
            currentWordIndex = index;
            currentView = 'detail';
            renderDetailCard();
            updateUI();
        }

        function renderDetailCard() {
            const container = document.getElementById('word-detail-view');
            const wordData = currentDailyWords[currentWordIndex];
            if (!wordData) return;

            const toneHtml = wordData.tone ? `<span class="tone-number">${wordData.tone}</span>` : '';
            const posHtml = wordData.pos ? `<span class="pos-tag">${wordData.pos}</span>` : '';
            const meanings = wordData.mean ? wordData.mean.split(/[；;]/).map((item) => item.trim()).filter(Boolean) : [];
            const nuances = wordData.nuance
                ? wordData.nuance.split('\n').map((line) => line.trim().replace(/^\d+\.\s*/, '')).filter(Boolean)
                : [];
            const examples = Array.isArray(wordData.examples) ? wordData.examples : [];
            const count = Math.max(meanings.length, nuances.length, examples.length);
            const numbers = ['❶', '❷', '❸', '❹', '❺', '❻', '❼', '❽', '❾', '❿'];

            let definitionsHtml = '';
            for (let index = 0; index < count; index += 1) {
                const meanText = meanings[index] || (meanings.length === 1 && index === 0 ? meanings[0] : '');
                const nuanceText = nuances[index] || '';
                const example = examples[index];
                
                definitionsHtml += `<div class="def-group">`;
                if (meanText || nuanceText) {
                    definitionsHtml += `
                        <div style="display: flex; align-items: baseline; margin-bottom: 8px; line-height: 1.6;">
                            <span class="def-number">${numbers[index] || `${index + 1}.`}</span>
                            ${meanText ? `<span class="def-meaning">${meanText}</span>` : ''}
                            ${nuanceText ? `<span class="def-nuance">（${nuanceText}）</span>` : ''}
                        </div>
                    `;
                }
                if (example) {
                    definitionsHtml += `
                        <div class="def-ex">
                            <div class="def-example-label">例句</div>
                            <div class="def-example-body">
                                <div class="ex-jp" lang="ja">${example.jp}</div>
                                <div class="ex-cn">（${example.cn}）</div>
                            </div>
                        </div>
                    `;
                }
                definitionsHtml += `</div>`;
            }

            const isFirst = currentWordIndex === 0;
            const isLast = currentWordIndex === currentDailyWords.length - 1;
            const wordId = wordData.word;
            const isStarred = safeGetItem(getVocabStarKey(wordId)) === 'true';
            const metaHtml = toneHtml || posHtml
                ? `<div class="fc-meta-group">${toneHtml}${posHtml}</div>`
                : '';

            container.innerHTML = `
                <div class="flashcard-main">
                    <div class="fc-header">
                        <div class="fc-word-group">
                            <div class="fc-title-row">
                                <div class="fc-word">${wordData.word_html || wordData.word}</div>
                                ${metaHtml}
                            </div>
                        </div>
                        <div class="mark-btn fc-action ${isStarred ? 'active' : ''}" onclick="toggleMark(this, '${wordId}')">🔖</div>
                    </div>
                    
                    <div style="flex: 1;">
                        <div class="fc-section-title">📝 解析与例句</div>
                        <div>
                            ${definitionsHtml}
                        </div>
                    </div>

                    <div class="nav-controls">
                        <button class="nav-btn ${isFirst ? 'disabled' : ''}" onclick="navigateWord(-1)">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                            上一词
                        </button>
                        <div class="nav-progress">${currentWordIndex + 1} / ${currentDailyWords.length}</div>
                        <button class="nav-btn primary ${isLast ? 'practice-btn' : ''}" onclick="${isLast ? `startPractice(${currentDay})` : 'navigateWord(1)'}">
                            ${isLast ? '去特训 (考核)' : '下一词'}
                            ${isLast ? '' : '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>'}
                        </button>
                    </div>
                </div>
            `;

            window.scrollTo(0, 0);
        }

        function navigateWord(direction) {
            const nextIndex = currentWordIndex + direction;
            if (nextIndex >= 0 && nextIndex < currentDailyWords.length) {
                currentWordIndex = nextIndex;
                renderDetailCard();
            }
        }

        function updateUI() {
            daysView.classList.add('hidden');
            wordListView.classList.add('hidden');
            wordDetailView.classList.add('hidden');

            if (homeBtn) {
                homeBtn.style.display = 'none';
            }
            if (headerPracticeBtn) {
                headerPracticeBtn.style.display = 'none';
                headerPracticeBtn.onclick = null;
            }

            if (currentView === 'days') {
                daysView.classList.remove('hidden');
                const safeTotalDays = typeof TOTAL_DAYS !== 'undefined' ? TOTAL_DAYS : 18;
                pageTitle.textContent = `N1 形容詞 (凛的特训)`;
                backBtn.onclick = () => window.location.href = 'index.html';
                backBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg> 逃离辅导室';
                syncHeaderActions();
                return;
            }

            if (currentView === 'list') {
                wordListView.classList.remove('hidden');
                pageTitle.textContent = currentDay === -1 ? '笨蛋错题本' : `第 ${currentDay} 页笔记`;
                if (currentDailyWords.length > 0) {
                    renderWordList(currentDailyWords);
                }
                if (headerPracticeBtn) {
                    headerPracticeBtn.textContent = currentDay === -1 ? '错题练习' : '今日练习';
                    headerPracticeBtn.onclick = () => {
                        if (currentDay === -1) {
                            startReviewPractice();
                            return;
                        }
                        startPractice(currentDay);
                    };
                    headerPracticeBtn.style.display = 'inline-flex';
                }
                syncHeaderActions();
                backBtn.onclick = () => {
                    currentView = 'days';
                    renderDays();
                    updateUI();
                };
                backBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg> 目录总览';
                return;
            }

            wordDetailView.classList.remove('hidden');
            pageTitle.textContent = '细细打磨';
            syncHeaderActions();
            backBtn.onclick = () => {
                currentView = 'list';
                updateUI();
            };
            backBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg> 返回列表';
        }

        migrateLegacyProgress();
        renderDays();
        updateUI();

        if (practicePickerCloseBtn) {
            practicePickerCloseBtn.addEventListener('click', closePracticePicker);
        }
        if (practicePickerOverlay) {
            practicePickerOverlay.addEventListener('click', (event) => {
                if (event.target === practicePickerOverlay) {
                    closePracticePicker();
                }
            });
        }
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && practicePickerOverlay.classList.contains('is-open')) {
                closePracticePicker();
            }
        });

        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;
        const minSwipeDistance = 50;

        document.addEventListener('touchstart', (event) => {
            touchStartX = event.changedTouches[0].screenX;
            touchStartY = event.changedTouches[0].screenY;
        }, false);

        document.addEventListener('touchend', (event) => {
            touchEndX = event.changedTouches[0].screenX;
            touchEndY = event.changedTouches[0].screenY;
            if (currentView !== 'detail') return;
            const distanceX = touchEndX - touchStartX;
            const distanceY = touchEndY - touchStartY;
            if (Math.abs(distanceX) > Math.abs(distanceY) && Math.abs(distanceX) > minSwipeDistance) {
                navigateWord(distanceX < 0 ? 1 : -1);
            }
        }, false);
    </script>
</body>
</html>
