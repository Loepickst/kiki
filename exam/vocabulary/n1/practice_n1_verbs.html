<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N1 動詞 - 練習</title>
    <!-- 引入具有正式感和现代感的字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=Noto+Sans+SC:wght@500;700;900&family=Noto+Serif+JP:wght@600;900&family=Noto+Serif+SC:wght@500;600;700;900&display=swap" rel="stylesheet">
    <style>
        html {
            -webkit-text-size-adjust: 100%;
        }

        :root {
            /* === 沉稳马老师 (Calm Horse) 调色板 - 蓝天草地风格 === */
            --bg: #E0F2FE;             /* 天空蓝 - 开阔宁静的底色 */
            --card-bg: #FFFFFF;        /* 纯白卡片 */
            --surface-hover: #F0FDF4;  /* 浅草绿悬浮 */
            
            --text: #1E293B;           /* 深灰蓝 - 核心文字，沉稳 */
            --text-dim: #475569;       /* 灰蓝 - 辅助文字 */
            
            --border: #BAE6FD;         /* 浅蓝分割线 */
            --border-strong: #0F172A;  /* 极深的午夜蓝边框，提供稳定感 */
            
            /* 强调色 */
            --accent-red: #EF4444;     /* 警示红 */
            --accent-green: #10B981;   /* 草地绿 - 正确/成功/推荐 */
            --accent-gold: #D97706;    /* 泥土橙 - 焦点/提示 */
            --accent-main: #0284C7;    /* 沉稳蓝 - 主题色 */
            --accent-purple: #6366F1;  /* 修罗紫 */

            /* 硬直阴影（统一Neo-Brutalism规范） */
            --shadow-sm: 4px 4px 0px var(--border-strong);
            --shadow-md: 8px 8px 0px var(--border-strong);
            --shadow-hard: 3px 3px 0px var(--border-strong);

            /* 时髦倒角 */
            --radius-xl: 16px;
            --radius-lg: 12px;
            --radius-md: 8px;
            --radius-sm: 4px;

            --font-ui: "Noto Sans SC", "Noto Sans JP", -apple-system, BlinkMacSystemFont, sans-serif;
            --font-serif: "Noto Serif SC", "Noto Serif JP", "Songti SC", serif; /* 对话使用中日文都统一的衬线字体 */
            
            --transition: 0.25s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-ui);
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            /* 浅色网格背景，宛如草地经纬 */
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        button, input {
            font: inherit;
        }

        /* 左上角返回按钮 */
        .page-back-btn {
            position: fixed;
            top: 20px;
            left: 24px;
            z-index: 120;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 99px;
            background: var(--accent-green);
            border: 2px solid var(--border-strong);
            color: #FFF;
            font-weight: 900;
            font-size: 14px;
            text-decoration: none;
            transition: all var(--transition);
            box-shadow: 3px 3px 0px var(--border-strong);
            text-transform: uppercase;
        }

        .page-back-btn:hover {
            background: var(--accent-main);
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px var(--border-strong);
        }

        .page-back-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--border-strong);
        }

        .practice-shell {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 40px;
            position: relative;
            z-index: 1;
        }

        .screen {
            width: 100%;
            max-width: 680px;
        }

        .hidden {
            display: none !important;
        }

        /* 引导与结算界面：坚固卡片 */
        .intro-card,
        .summary-card {
            width: 100%;
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            border: 4px solid var(--border-strong);
            padding: 40px;
            box-shadow: var(--shadow-md);
            position: relative;
        }

        .summary-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 16px;
            border-radius: 0px;
            background: var(--accent-main);
            color: #FFF;
            border: 2px solid var(--border-strong);
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            box-shadow: 3px 3px 0px var(--border-strong);
        }

        .summary-overline {
            margin-top: 24px;
            color: var(--accent-main);
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .summary-title {
            margin: 8px 0 16px;
            font-size: 38px;
            font-weight: 900;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .summary-subtitle {
            margin: 0;
            color: var(--text-dim);
            font-size: 16px;
            line-height: 1.6;
            font-weight: 700;
        }

        .intro-dialogue-row {
            display: flex;
            align-items: flex-start;
            gap: 24px;
            margin-bottom: 32px;
        }

        .intro-avatar-wrap {
            flex-shrink: 0;
        }

        /* 马老师头像 */
        .intro-avatar, .enemy-avatar {
            width: 88px;
            height: 88px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-green);
            border-radius: 12px;
            border: 4px solid var(--border-strong);
            font-size: 48px;
            box-shadow: 4px 4px 0px var(--border-strong);
        }

        .enemy-avatar {
            width: 80px;
            height: 80px;
            font-size: 44px;
        }

        .horse-breathe {
            animation: horseBreathe 4s ease-in-out infinite;
        }

        @keyframes horseBreathe {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px) scale(1.02); }
        }

        .intro-dialogue-main {
            flex: 1;
        }

        .story-panel {
            min-height: 80px;
            cursor: pointer;
            background: #F8FAFC;
            padding: 18px 24px;
            border-radius: var(--radius-md);
            border: 3px solid var(--border-strong);
            box-shadow: 4px 4px 0px rgba(15, 23, 42, 0.1);
        }

        .story-text, .typewriter-text {
            font-size: 18px;
            line-height: 1.8;
            color: var(--text);
            font-family: var(--font-serif);
            font-weight: 600;
            font-synthesis: none;
            white-space: pre-wrap;
            letter-spacing: 0.05em;
            text-rendering: optimizeLegibility;
        }

        .story-hint {
            font-size: 13px;
            color: var(--accent-main);
            margin-top: 12px;
            font-weight: 900;
            text-align: right;
            text-transform: uppercase;
        }

        .typing-cursor::after {
            content: '🍃';
            display: inline-block;
            font-size: 14px;
            margin-left: 6px;
            vertical-align: baseline;
            animation: blink 1.2s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* 按钮：沉稳有力 */
        .intro-actions, .summary-actions {
            display: grid;
            gap: 16px;
            margin-top: 32px;
            border-top: 3px solid var(--border-strong);
            padding-top: 32px;
        }

        .intro-primary-btn,
        .summary-primary-btn,
        .summary-secondary-btn {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius-lg);
            border: 3px solid var(--border-strong);
            background: var(--accent-main);
            color: #ffffff;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.15s ease;
            letter-spacing: 0.1em;
            box-shadow: var(--shadow-sm);
            text-transform: uppercase;
        }

        .intro-primary-btn:hover,
        .summary-primary-btn:hover {
            background: var(--accent-green);
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
        }

        .intro-primary-btn:active,
        .summary-primary-btn:active,
        .summary-secondary-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--border-strong);
        }

        .summary-secondary-btn {
            background: var(--card-bg);
            color: var(--text);
        }

        .summary-secondary-btn:hover {
            background: var(--surface-hover);
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
        }

        .difficulty-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .difficulty-btn {
            padding: 20px 12px;
            border: 3px solid var(--border-strong);
            border-radius: var(--radius-lg);
            background: var(--card-bg);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.15s ease;
            box-shadow: var(--shadow-sm);
        }

        .difficulty-btn:hover {
            background: var(--surface-hover);
            border-color: var(--accent-green);
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
        }

        .difficulty-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--border-strong);
        }

        .difficulty-title {
            font-size: 18px;
            font-weight: 900;
            color: var(--text);
        }

        .difficulty-copy {
            color: var(--text-dim);
            font-size: 12px;
            line-height: 1.6;
            font-weight: 700;
            text-align: center;
            white-space: pre-wrap;
        }

        /* 战斗主界面排列 */
        .arena-shell {
            display: flex;
            flex-direction: column;
            gap: 24px;
            width: 100%;
        }

        /* 讲师区域 */
        .enemy-stage {
            display: grid;
            grid-template-columns: 104px minmax(0, 1fr);
            align-items: center;
            gap: 16px;
            padding: 0 8px;
            position: relative;
        }

        .enemy-side-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: auto;
            flex: 0 0 auto;
        }

        .enemy-stage .enemy-avatar {
            width: 68px;
            height: 68px;
            font-size: 38px;
            box-shadow: 3px 3px 0px var(--border-strong);
        }

        .enemy-avatar.hit {
            animation: horseAngry 0.4s ease;
        }

        @keyframes horseAngry {
            0%, 100% { transform: scale(1) translateX(0); }
            25% { transform: scale(1.05) translateX(-4px); }
            75% { transform: scale(1.05) translateX(4px); }
        }

        .enemy-status-box {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 6px;
            background: var(--card-bg);
            width: 100%;
            padding: 8px 10px;
            border-radius: var(--radius-lg);
            border: 3px solid var(--border-strong);
            box-shadow: 2px 2px 0px var(--border-strong);
        }

        .enemy-stage .enemy-status-box {
            display: none;
        }

        .enemy-name {
            color: var(--accent-main);
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-align: center;
        }

        .enemy-hp-bar-shell {
            width: 100%;
            height: 8px;
            background: #E2E8F0;
            border-radius: 0px;
            border: 2px solid var(--border-strong);
            overflow: hidden;
        }

        .enemy-hp-bar {
            height: 100%;
            background: var(--accent-gold);
            transition: width 0.3s ease;
        }

        .enemy-aside-bubble {
            min-width: 0;
            min-height: 74px;
            padding: 14px 18px;
            border-radius: var(--radius-lg);
            border: 3px solid var(--border-strong);
            background: #EFF6FF;
            box-shadow: 4px 4px 0px rgba(15, 23, 42, 0.12);
            color: var(--accent-main);
            font-size: 15px;
            font-weight: 900;
            line-height: 1.6;
            display: flex;
            align-items: center;
        }

        /* 对话框/答题卡区 */
        .dialogue-box {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            border: 4px solid var(--border-strong);
            padding: 32px;
            box-shadow: var(--shadow-md);
            position: relative;
            min-height: 280px;
        }

        .challenge-question-shell {
            min-height: auto;
        }

        .question-focus-card {
            padding: 24px 26px;
            border-radius: var(--radius-lg);
            border: 3px solid var(--border-strong);
            background: #EFF6FF;
            box-shadow: 4px 4px 0px rgba(15, 23, 42, 0.1);
        }

        .typewriter-text ruby {
            ruby-align: center;
        }

        .typewriter-text rt {
            font-size: 0.52em;
            color: var(--accent-main);
            font-family: var(--font-ui);
            font-weight: 900;
        }

        .question-main-text {
            font-size: 28px;
            line-height: 1.8;
            font-weight: 900;
            letter-spacing: 0.02em;
            color: var(--text);
        }

        .question-support {
            margin-top: 16px;
        }

        .question-support .question-sub-text {
            display: block;
        }

        .question-sub-text {
            color: var(--text-dim);
            font-size: 14px;
            font-weight: 700;
            font-family: var(--font-ui);
            line-height: 1.6;
        }

        .blank-space {
            display: inline-block;
            min-width: 4.8em;
            height: 0.95em;
            margin: 0 0.08em;
            vertical-align: baseline;
            border-bottom: 4px solid var(--border-strong);
            transform: translateY(0.02em);
        }

        .challenge-feedback {
            min-height: 24px;
            margin-top: 20px;
            font-size: 16px;
            font-weight: 900;
            color: var(--text);
            text-align: center;
        }

        .challenge-feedback.good { color: var(--accent-green); }
        .challenge-feedback.bad { color: var(--accent-red); }

        .challenge-answer-area {
            margin-top: 24px;
        }

        /* 选项面板 */
        .choice-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .action-option {
            width: 100%;
            border: 3px solid var(--border-strong);
            background: var(--card-bg);
            color: var(--text);
            text-align: left;
            padding: 16px 20px 16px 44px;
            font-size: 18px;
            font-weight: 900;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            box-shadow: var(--shadow-sm);
        }

        /* 悬浮时的胡萝卜 */
        .action-option::before {
            content: '🥕';
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .action-option:hover:not(:disabled) {
            background: var(--surface-hover);
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
        }

        .action-option:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--border-strong);
        }

        .action-option:hover:not(:disabled)::before {
            opacity: 1;
        }

        .action-option:disabled {
            cursor: default;
        }

        .action-option.correct-ans {
            background: var(--accent-green);
            border-color: var(--border-strong);
            color: #FFF;
        }
        
        .action-option.correct-ans::before {
            content: '✅';
            opacity: 1;
        }

        .action-option.wrong-ans {
            background: var(--accent-red);
            border-color: var(--border-strong);
            color: #FFF;
        }

        .action-option.wrong-ans::before {
            content: '❌';
            opacity: 1;
        }

        /* 拼写输入模式 */
        .reading-answer-wrap {
            display: grid;
            gap: 20px;
        }

        .reading-input-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .reading-char-input {
            width: 54px;
            height: 64px;
            border: 3px solid var(--border-strong);
            border-radius: var(--radius-md);
            background: var(--card-bg);
            text-align: center;
            color: var(--text);
            font-size: 28px;
            font-family: var(--font-serif);
            font-weight: 900;
            outline: none;
            transition: all 0.15s ease;
            box-shadow: 3px 3px 0px rgba(15, 23, 42, 0.1);
        }

        .reading-char-input:focus {
            background: var(--surface-hover);
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px var(--border-strong);
        }

        .reading-char-input.locked {
            background: #E2E8F0;
            color: var(--text-dim);
            border-style: dashed;
        }

        .reading-input-grid.correct .reading-char-input {
            background: var(--accent-green);
            color: #FFF;
        }

        .reading-input-grid.wrong .reading-char-input {
            background: var(--accent-red);
            color: #FFF;
        }

        .reading-action-row {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .reading-action-btn {
            padding: 12px 28px;
            border-radius: var(--radius-lg);
            border: 3px solid var(--border-strong);
            background: var(--card-bg);
            color: var(--text);
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: var(--shadow-sm);
            text-transform: uppercase;
        }

        .reading-action-btn:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
            background: var(--accent-main);
            color: #FFF;
        }
        
        .reading-action-btn:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--border-strong);
        }

        .reading-action-btn.disabled,
        .reading-action-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        #reading-submit-btn {
            background: var(--accent-green);
            color: #fff;
        }
        
        #reading-submit-btn:hover:not(:disabled) {
            background: var(--accent-main);
        }

        .reading-feedback {
            font-size: 16px;
            font-weight: 900;
            min-height: 24px;
            text-align: center;
        }

        .reading-feedback.correct { color: var(--accent-green); }
        .reading-feedback.wrong { color: var(--accent-red); }

        /* 玩家状态条 */
        .player-hud {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 18px;
            background: var(--card-bg);
            border: 4px solid var(--border-strong);
            border-radius: var(--radius-xl);
            padding: 16px 24px;
            margin-top: 8px;
            box-shadow: var(--shadow-sm);
        }

        .hud-left {
            display: flex;
            align-items: center;
            gap: 0;
            flex: 0 0 auto;
        }

        .hud-name {
            font-size: 16px;
            font-weight: 900;
            color: var(--border-strong);
            background: var(--accent-green);
            padding: 4px 12px;
            border-radius: 0px;
            border: 2px solid var(--border-strong);
            box-shadow: 2px 2px 0px var(--border-strong);
        }

        .hud-lv {
            display: none;
        }

        .hud-hp-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
            max-width: none;
        }

        .hud-hp-label {
            font-size: 16px;
            font-weight: 900;
            color: var(--accent-red);
        }

        .hud-hp-bar-bg {
            flex: 1;
            height: 14px;
            background: var(--border);
            border-radius: 0px;
            border: 2px solid var(--border-strong);
            overflow: hidden;
        }

        .hud-hp-bar-fill {
            height: 100%;
            background: var(--accent-green);
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .hud-hp-text {
            font-size: 15px;
            font-weight: 900;
            color: var(--text);
            min-width: 54px;
            text-align: right;
        }

        /* 倒计时条 */
        .hud-timer-shell {
            width: 100%;
            height: 12px;
            background: var(--border);
            margin-top: 16px;
            border-radius: 0px;
            border: 2px solid var(--border-strong);
            overflow: hidden;
        }

        .hud-timer-bar {
            height: 100%;
            background: var(--accent-gold);
            transition: width 0.1s linear;
        }

        .hud-timer-bar.warning {
            background: var(--accent-red);
        }

        /* 攻击特效与伤害数字 - 风刃劈砍 */
        .slash-container {
            position: absolute;
            inset: 50% 0 auto 0;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 20;
        }

        .slash-line {
            width: 100px;
            height: 60px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%2310B981"><path d="M2.5 19.5L21.5 4.5" stroke="%2310B981" stroke-width="3" stroke-linecap="round"/></svg>');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0;
            transform: scale(0.5) rotate(-10deg);
        }

        .slash-container.active .slash-line {
            animation: windSlash 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes windSlash {
            0% { opacity: 0; transform: scale(0.5) rotate(-10deg) translateX(-20px); }
            50% { opacity: 1; transform: scale(1.5) rotate(10deg) translateX(0); }
            100% { opacity: 0; transform: scale(2) rotate(20deg) translateX(20px); }
        }

        .damage-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: 900;
            opacity: 0;
            pointer-events: none;
            z-index: 24;
            text-shadow: 3px 3px 0px var(--border-strong);
            text-transform: uppercase;
        }

        .damage-text.normal-hit { color: var(--accent-gold); }
        .damage-text.player-hit { color: var(--accent-red); }

        .damage-text.float {
            animation: bouncyFloatUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes bouncyFloatUp {
            0% { opacity: 0; transform: translate(-50%, 10px) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -10px) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -40px) scale(1); }
        }

        .hp-pill { position: relative; }
        .hp-pill.hit { animation: hpShake 0.4s ease; }

        @keyframes hpShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px) rotate(-1deg); }
            75% { transform: translateX(6px) rotate(1deg); }
        }

        .hp-damage-float {
            position: absolute;
            top: -24px;
            right: 0;
            font-size: 18px;
            font-weight: 900;
            color: var(--accent-red);
            pointer-events: none;
            animation: hpDamageFloat 0.8s ease-out forwards;
            text-shadow: 2px 2px 0px var(--border-strong);
        }

        @keyframes hpDamageFloat {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            20% { opacity: 1; transform: translateY(-10px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-30px) scale(1); }
        }

        .shake { animation: shake 0.4s ease both; }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            20%, 60% { transform: translate(-8px, 0); }
            40%, 80% { transform: translate(8px, 0); }
        }

        /* 结算界面数据 */
        .summary-rank {
            margin-top: 20px;
            font-size: 90px;
            font-weight: 900;
            color: var(--accent-main);
            text-align: center;
            text-shadow: 6px 6px 0px var(--border-strong);
            font-family: 'Arial Black', sans-serif;
            font-style: italic;
        }

        .summary-eval {
            margin-top: 8px;
            color: var(--text);
            font-size: 18px;
            font-weight: 900;
            text-align: center;
        }

        .summary-msg {
            margin-top: 16px;
            color: var(--text-dim);
            font-size: 15px;
            font-weight: 700;
            text-align: center;
        }

        .summary-stat-grid {
            margin-top: 32px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .summary-stat {
            background: #F8FAFC;
            border-radius: var(--radius-lg);
            border: 3px solid var(--border-strong);
            padding: 16px;
            text-align: center;
            box-shadow: 4px 4px 0px rgba(15, 23, 42, 0.1);
        }

        .summary-stat-label {
            display: block;
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .summary-stat-value {
            display: block;
            margin-top: 8px;

        /* Toast 提示 */
        .toast {
            position: fixed;
            left: 50%;
            bottom: 40px;
            transform: translateX(-50%);
            background: var(--border-strong);
            color: #fff;

            font-weight: 900;
            opacity: 0;

            transition: opacity 0.3s ease;

        }

        .toast.show { opacity: 1; }

        @media (max-width: 680px) {

    <script src="vocabulary-role-config.js"></script>
    <script>
        if (typeof window.bindStatefulBack === 'function') {
            window.bindStatefulBack({
                selector: '#page-back-btn',
                fallback: 'verbs_n1.html'
            });
        }

        const urlParams = new URLSearchParams(window.location.search);
        const stageParam = urlParams.get('stage');
        const modeParam = urlParams.get('mode');
        const typeParam = String(urlParams.get('type') || '').trim().toLowerCase();
        const isStageMode = !!stageParam;
        const isChallengeMode = isStageMode || modeParam === 'final';
        const PRACTICE_TYPE_STORAGE_KEY = 'study_quest_test_v1_n1_verbs_practice_type';
        const DAILY_PRACTICE_TYPE_MAP = Object.freeze({
            sentence: '句子填空',
            reading: '读音填空',
            meaning: '假名选义'
        });
        const DAILY_PRACTICE_SHORT_MAP = Object.freeze({
            sentence: '句子',
            reading: '读音',
            meaning: '选义'
        });
        const dailyPracticeType = Object.prototype.hasOwnProperty.call(DAILY_PRACTICE_TYPE_MAP, typeParam)
            ? typeParam
            : 'sentence';
        localStorage.setItem(PRACTICE_TYPE_STORAGE_KEY, dailyPracticeType);

        let targetWords = [];
        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let clearedCount = 0;
        let answerStreak = 0;
        let bestStreak = 0;
        let selectedDifficulty = null;
        let hp = 20;
        let remainingHints = 3;
        let isHintUsed = false;
        let isAnswering = false;
        let rewardRunMeta = null;
        let rewardResult = null;
        let timerId = null;
        let timeLeft = 0;
        let totalTime = 0;
        let introTypingController = null;
        let questionTypingController = null;
        let pendingQuestionReveal = null;

        const testServer = window.StudyQuestTestServer;
        const VOCAB_STAR_KEY_PREFIX = 'study_quest_test_v1_vocab_star::';
        const CURRICULUM_DAYS = Array.isArray(window.LAB_N1_VERB_DAYS) ? window.LAB_N1_VERB_DAYS : [];
        const CURRICULUM_STAGES = Array.isArray(window.LAB_N1_VERB_STAGES) ? window.LAB_N1_VERB_STAGES : [];
        const CURRICULUM_GROUPS = Array.isArray(window.LAB_N1_VERB_GROUPS) ? window.LAB_N1_VERB_GROUPS : [];

        const difficultyMap = {
            easy: { label: '漫步 (基础)', damage: 2, timed: false, copy: '20题 · HP20 · 错1题扣2血\n稳扎稳打，慢慢来。' },
            hard: { label: '快跑 (进阶)', damage: 4, timed: false, copy: '20题 · HP20 · 错1题扣4血\n稍微加快点节奏。' },
            hell: { label: '奔腾 (修罗)', damage: 5, timed: true, copy: '20题 · HP20 · 错1题扣5血 · 10秒\n风驰电掣，不容有失！' }
        };
        const DAY_QUESTION_LIMIT = 10;
        const STAGE_QUESTION_LIMIT = 20;
        const FINAL_QUESTION_LIMIT = 20;

        function getVocabStarKey(wordId) {
            return `${VOCAB_STAR_KEY_PREFIX}${String(wordId || '').trim()}`;
        }

        function getCurriculumDay(dayId) {
            return CURRICULUM_DAYS.find((day) => Number(day.id) === Number(dayId)) || null;
        }

        function getCurriculumStage(stageId) {
            return CURRICULUM_STAGES.find((stage) => Number(stage.id) === Number(stageId)) || null;
        }

        function getCurriculumGroup(groupId) {
            return CURRICULUM_GROUPS.find((group) => Number(group.id) === Number(groupId)) || null;
        }

        function getDayGroup(dayId) {
            const day = getCurriculumDay(dayId);
            return day ? getCurriculumGroup(day.groupId) : null;
        }

        function getStageGroup(stageId) {
            const stage = getCurriculumStage(stageId);
            return stage ? getCurriculumGroup(stage.groupId) : null;
        }

        function pickRoleLine(pool, fallback) {
            return Array.isArray(pool) && pool.length > 0
                ? pool[Math.floor(Math.random() * pool.length)]
                : fallback;
        }

        function getPracticeTypeLabel() {
            return DAILY_PRACTICE_TYPE_MAP[dailyPracticeType] || '句子填空';
        }

        function appendPracticeTypeToScope(scopeKey) {
            return `${scopeKey}-${dailyPracticeType}`;
        }

        function collectWordsByIndexes(indexes) {
            if (!Array.isArray(indexes) || typeof FULL_WORD_LIST === 'undefined') {
                return [];
            }
            const collected = [];
            const seen = new Set();
            indexes.forEach((index) => {
                const word = FULL_WORD_LIST[index];
                if (!word || word.word === '（準備中）') return;
                const key = String(word.word || index);
                if (seen.has(key)) return;
                seen.add(key);
                collected.push(word);
            });
            return collected;
        }

        function getDayWords(dayId) {
            const day = getCurriculumDay(dayId);
            if (day) {
                return collectWordsByIndexes(day.wordIds);
            }
            if (typeof FULL_WORD_LIST === 'undefined') return [];
            const start = (dayId - 1) * WORDS_PER_DAY;
            const end = start + WORDS_PER_DAY;
            return FULL_WORD_LIST.slice(start, end).filter((word) => word.word !== '（準備中）');
        }

        function getStageWords(stageId) {
            const stage = getCurriculumStage(stageId);
            if (!stage) return [];
            const indexes = stage.dayIds.flatMap((dayId) => {
                const day = getCurriculumDay(dayId);
                return day ? day.wordIds : [];
            });
            return collectWordsByIndexes(indexes);
        }

        function getFinalWords() {
            const indexes = CURRICULUM_DAYS.flatMap((day) => Array.isArray(day.wordIds) ? day.wordIds : []);
            return collectWordsByIndexes(indexes);
        }

        function getStarredWords() {
            if (typeof FULL_WORD_LIST === 'undefined') return [];
            return FULL_WORD_LIST.filter((word) => word.word !== '（準備中）' && localStorage.getItem(getVocabStarKey(word.word)) === 'true');
        }

        function getCurrentDayParam() {
            const parsed = parseInt(urlParams.get('day'), 10);
            return Number.isFinite(parsed) ? parsed : 1;
        }

        function getCurrentStageParam() {
            const parsed = parseInt(stageParam, 10);
            return Number.isFinite(parsed) ? parsed : null;
        }

        function getPracticeContext() {
            const currentDayValue = getCurrentDayParam();
            const currentStageValue = getCurrentStageParam();
            if (modeParam === 'final') {
                return {
                    mode: 'final',
                    scopeKey: appendPracticeTypeToScope('final-all'),
                    title: '总复习挑战',
                    overline: '终极长途奔袭',
                    subtitle: `全 18 关课程 · ${getPracticeTypeLabel()} · ${FINAL_QUESTION_LIMIT} 問随机`,
                    challengeTitle: '总复习大考',
                    routeLabel: 'FINAL RUN',
                    typeLabel: getPracticeTypeLabel(),
                    pool: getFinalWords()
                };
            }
            if (currentStageValue != null) {
                const stage = getCurriculumStage(currentStageValue);
                const group = getStageGroup(currentStageValue);
                return {
                    mode: selectedDifficulty ? 'challenge' : 'stage',
                    scopeKey: selectedDifficulty
                        ? appendPracticeTypeToScope(`stage-${currentStageValue}-${selectedDifficulty}`)
                        : appendPracticeTypeToScope(`stage-${currentStageValue}`),
                    title: stage ? stage.title : `阶段练习 ${currentStageValue}`,
                    overline: stage ? `${group ? `${group.title} · ` : ''}${stage.title}` : `阶段 ${currentStageValue}`,
                    subtitle: stage
                        ? `第 ${stage.dayIds[0]} - ${stage.dayIds[stage.dayIds.length - 1]} 关 · ${getPracticeTypeLabel()} · ${STAGE_QUESTION_LIMIT} 問随机`
                        : `${getPracticeTypeLabel()} · ${STAGE_QUESTION_LIMIT} 問随机`,
                    challengeTitle: stage ? stage.title : `阶段练习 ${currentStageValue}`,
                    routeLabel: `STAGE ${currentStageValue}`,
                    typeLabel: getPracticeTypeLabel(),
                    pool: getStageWords(currentStageValue)
                };
            }
            if (currentDayValue < 0) {
                return {
                    mode: 'review',
                    scopeKey: appendPracticeTypeToScope('review-starred'),
                    title: '难词特训',
                    overline: '绊脚石清理',
                    subtitle: `按错题库数量生成本轮题目 · ${getPracticeTypeLabel()}`,
                    challengeTitle: '错题特训',

                    typeLabel: getPracticeTypeLabel(),
                    pool: getStarredWords()
                };
            }

            return {
                mode: 'day',
                scopeKey: appendPracticeTypeToScope(`day-${currentDayValue}`),
                title: day ? `第${day.id}关 · ${day.title}` : `${currentDayValue}日目`,
                overline: day ? `${group ? `${group.title} · ` : ''}${day.title}` : `第${currentDayValue}关`,
                subtitle: `${getPracticeTypeLabel()} · ${DAY_QUESTION_LIMIT} 問随机`,
                challengeTitle: day ? `${group ? `${group.title} · ` : ''}${day.title}` : `${currentDayValue}日目`,
                routeLabel: `DAY ${currentDayValue}`,
                typeLabel: getPracticeTypeLabel(),
                pool: getDayWords(currentDayValue)
            };
        }

        function getQuestionLimitForContext(context, eligiblePool) {
            if (!context) return 0;
            if (context.mode === 'review') {
                return Array.isArray(eligiblePool) ? eligiblePool.length : 0;
            }
            if (context.mode === 'final') {
                return FINAL_QUESTION_LIMIT;
            }
            if (context.mode === 'stage' || context.mode === 'challenge') {
                return STAGE_QUESTION_LIMIT;
            }
            return DAY_QUESTION_LIMIT;
        }

        function getPracticeModeKey() {
            const currentDayValue = getCurrentDayParam();
            if (modeParam === 'final') return 'final';
            if (stageParam && selectedDifficulty) return 'challenge';
            if (stageParam) return 'stage';
            if (currentDayValue < 0) return 'review';

        function getPracticeScopeKey() {

        function dispatchPracticeState(phase, overrides = {}) {
            if (!window.StudyQuestTestUi || typeof window.StudyQuestTestUi.dispatchPracticeState !== 'function') {

            const accuracy = answeredCount > 0 ? score / answeredCount : 0;
            window.StudyQuestTestUi.dispatchPracticeState({

        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function shuffle(array) {
            return shuffleArray(array);
        }

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeTextValue(value) {
            return String(value == null ? '' : value).trim();
        }

        function toHiragana(text) {
            return String(text == null ? '' : text).replace(/[\u30a1-\u30f6]/g, (char) => String.fromCharCode(char.charCodeAt(0) - 0x60));
        }

        function normalizeKanaAnswer(value) {
            return toHiragana(String(value == null ? '' : value).replace(/\s+/g, ''));
        }

        function splitKanaChars(value) {
            return Array.from(normalizeKanaAnswer(value));
        }

        function isReadingInputComposing(input) {
            return Boolean(input && input.dataset && input.dataset.composing === 'true');
        }

        function findNextEditableReadingIndex(inputs, startIndex) {
            for (let index = Math.max(0, Number(startIndex) || 0); index < inputs.length; index += 1) {
                if (!inputs[index].readOnly) {
                    return index;
                }
            }
            return -1;
        }

        function findPreviousEditableReadingIndex(inputs, startIndex) {
            for (let index = Math.min(inputs.length - 1, Number(startIndex) || 0); index >= 0; index -= 1) {
                if (!inputs[index].readOnly) {
                    return index;
                }
            }
            return -1;
        }

        function commitReadingChars(startIndex, rawValue) {
            const inputs = getReadingInputs();
            const start = findNextEditableReadingIndex(inputs, startIndex);
            const chars = splitKanaChars(rawValue);
            if (start === -1) {
                return { nextIndex: inputs.length, insertedCount: 0 };
            }
            if (chars.length === 0) {
                inputs[start].value = '';
                return { nextIndex: start, insertedCount: 0 };
            }

            let cursor = start;
            let insertedCount = 0;
            for (const char of chars) {
                const targetIndex = findNextEditableReadingIndex(inputs, cursor);
                if (targetIndex === -1) break;
                inputs[targetIndex].value = char;
                cursor = targetIndex + 1;
                insertedCount += 1;
            }
            return { nextIndex: cursor, insertedCount };
        }

        function extractSurfaceTextFromWordHtml(wordHtml, fallbackText = '') {
            if (!wordHtml || typeof DOMParser === 'undefined') return normalizeTextValue(fallbackText);
            const parser = new DOMParser();
            const doc = parser.parseFromString(`<div>${wordHtml}</div>`, 'text/html');
            const container = doc.body.firstElementChild;
            if (!container) return normalizeTextValue(fallbackText);
            container.querySelectorAll('rt').forEach((rt) => rt.remove());
            return normalizeTextValue(container.textContent || fallbackText);
        }

        function extractKanjiReadingTextFromWordHtml(wordHtml) {
            if (!wordHtml || typeof DOMParser === 'undefined') return '';
            const parser = new DOMParser();
            const doc = parser.parseFromString(`<div>${wordHtml}</div>`, 'text/html');
            const root = doc.body.firstElementChild;
            if (!root) return '';

            const readings = [];
            root.childNodes.forEach((node) => {
                if (!(node instanceof HTMLElement) || node.tagName.toLowerCase() !== 'ruby') return;
                const clone = node.cloneNode(true);
                clone.querySelectorAll('rt').forEach((rt) => rt.remove());
                const baseText = normalizeTextValue(clone.textContent || '');
                if (!baseText || !/[\u3400-\u9fff]/.test(baseText)) return;
                const readingText = Array.from(node.querySelectorAll('rt'))
                    .map((rt) => rt.textContent || '')
                    .join('')
                    .replace(/\s+/g, '')
                    .trim();
                if (readingText) readings.push(readingText);
            });

            return normalizeKanaAnswer(readings.join(''));
        }

        function extractKanaDisplayTextFromWordHtml(wordHtml, fallbackText = '') {
            if (!wordHtml || typeof DOMParser === 'undefined') {
                const fallback = normalizeTextValue(fallbackText);
                return /[\u3040-\u30ffー]/.test(fallback) ? toHiragana(fallback) : '';
            }

            const parser = new DOMParser();
            const doc = parser.parseFromString(`<div>${wordHtml}</div>`, 'text/html');
            const root = doc.body.firstElementChild;
            if (!root) {
                const fallback = normalizeTextValue(fallbackText);
                return /[\u3040-\u30ffー]/.test(fallback) ? toHiragana(fallback) : '';
            }

            const fragments = [];
            root.childNodes.forEach((node) => {
                if (node.nodeType === Node.TEXT_NODE) {
                    const text = normalizeTextValue(node.textContent || '');
                    if (text) fragments.push(text);
                    return;
                }
                if (!(node instanceof HTMLElement)) return;
                if (node.tagName.toLowerCase() === 'ruby') {
                    const readingText = Array.from(node.querySelectorAll('rt'))
                        .map((rt) => rt.textContent || '')
                        .join('')
                        .replace(/\s+/g, '')
                        .trim();
                    if (readingText) {
                        fragments.push(readingText);
                        return;
                    }
                }
                const text = normalizeTextValue(node.textContent || '');
                if (text) fragments.push(text);
            });

            const normalized = toHiragana(fragments.join('')).trim();
            return /[\u3040-\u30ffー]/.test(normalized) ? normalized : '';
        }

        function extractPrimaryMeaning(word) {
            return String(word && word.mean ? word.mean : '')
                .split(/[；;]/)
                .map((part) => part.trim())
                .find(Boolean) || '';
        }

        function getEligibleWordsForPracticeType(words, type) {
            const pool = Array.isArray(words) ? words : [];
            if (type === 'reading') {
                return pool.filter((word) => {
                    const surfaceText = extractSurfaceTextFromWordHtml(word && word.word_html, word && word.word);
                    const readingText = extractKanjiReadingTextFromWordHtml(word && word.word_html);
                    return Boolean(surfaceText && readingText && splitKanaChars(readingText).length > 0);
                });
            }
            if (type === 'meaning') {
                return pool.filter((word) => {
                    const kanaText = extractKanaDisplayTextFromWordHtml(word && word.word_html, word && word.word);
                    const primaryMeaning = extractPrimaryMeaning(word);
                    return Boolean(kanaText && primaryMeaning);
                });
            }
            return pool.filter(Boolean);
        }

        function normalizeSentenceOptionValue(value) {
            return typeof value === 'string' ? value.trim() : '';
        }

        function getSentenceCorrectAnswer(word) {
            const practiceAnswer = normalizeSentenceOptionValue(word && word.practice && word.practice.answer);
            if (practiceAnswer) return practiceAnswer;

            const kanaDisplay = normalizeSentenceOptionValue(
                extractKanaDisplayTextFromWordHtml(word && word.word_html, word && word.word)
            );
            return kanaDisplay || normalizeSentenceOptionValue(word && word.word);
        }

        function normalizeSentencePresetOptions(rawOptions, correctAnswer) {
            const normalized = [];
            const seen = new Set();

            (Array.isArray(rawOptions) ? rawOptions : []).forEach((option) => {
                const value = normalizeSentenceOptionValue(option);
                if (!value || seen.has(value)) return;
                seen.add(value);
                normalized.push(value);
            });

            if (!correctAnswer || !seen.has(correctAnswer) || normalized.length < 4) {
                return null;
            }

            return normalized.slice(0, 4);
        }

        function buildSentenceFallbackOptions(correctWord, correctAnswer) {
            const options = [];
            const seen = new Set();
            const normalizedCorrect = normalizeSentenceOptionValue(correctAnswer);

            if (normalizedCorrect) {
                seen.add(normalizedCorrect);
                options.push(normalizedCorrect);
            }

            const answerPool = shuffleArray(
                (Array.isArray(ALL_DEFINED_WORDS) ? ALL_DEFINED_WORDS : [])
                    .filter((candidate) => candidate && candidate.word !== (correctWord && correctWord.word))
                    .map((candidate) => normalizeSentenceOptionValue(candidate && candidate.practice && candidate.practice.answer))
                    .filter((value) => value && !seen.has(value))
            );

            answerPool.forEach((value) => {
                if (options.length >= 4 || seen.has(value)) return;
                seen.add(value);
                options.push(value);
            });

            if (options.length < 4) {
                const fallbackSelf = normalizeSentenceOptionValue(
                    extractKanaDisplayTextFromWordHtml(correctWord && correctWord.word_html, correctWord && correctWord.word)
                );
                if (fallbackSelf && !seen.has(fallbackSelf)) {
                    seen.add(fallbackSelf);
                    options.push(fallbackSelf);
                }
            }

            if (options.length < 4) {
                const surfaceSelf = normalizeSentenceOptionValue(correctWord && correctWord.word);
                if (surfaceSelf && !seen.has(surfaceSelf)) {
                    seen.add(surfaceSelf);
                    options.push(surfaceSelf);
                }
            }

            return options.slice(0, 4);
        }

        function normalizeDialogueBodyText(text) {
            return String(text || '')
                .replace(/\r\n?/g, '\n')
                .replace(/[ \t]+\n/g, '\n')
                .replace(/\n{2,}/g, '\n')
                .trim();
        }

        function buildDialogueTypingText(speaker, bodyText) {
            return `${speaker}：\n「${normalizeDialogueBodyText(bodyText)}」`;
        }

        function buildQuestionTypingText(bodyText) {
            return `「${normalizeDialogueBodyText(bodyText)}」`;
        }

        function buildDialogueQuestionHtml(bodyHtml) {
            const normalizedHtml = String(bodyHtml || '').replace(/(?:<br>\s*)+$/g, '').trim();
            return `「${normalizedHtml}」`;
        }

        function buildSentenceQuestionSpec(word) {
            let questionHtml = '';
            let questionCn = '';
            if (word.practice) {
                questionHtml = word.practice.sentence;
            } else {
                let example = { jp: '例文がありません。', cn: '' };
                if (word.examples && word.examples.length > 0) {
                    example = word.examples[Math.floor(Math.random() * word.examples.length)];
                }
                questionCn = example.cn;
                questionHtml = example.jp;
            }

            let richSentence = questionHtml;
            
            // 匹配现有的高亮、下划线或括号等空白符
            const highlightRegex = /<span class=['"]ex-highlight['"]>(.*?)<\/span>/g;
            const renderedBlankRegex = /<span class=['"][^'"]*\bblank-space\b[^'"]*['"]>\s*<\/span>/g;
            const existingBlankRegex = /(_{2,}|＿{2,}|\(\s*\)|（\s*）)/g;
            
            if (richSentence.match(renderedBlankRegex)) {
                richSentence = richSentence.replace(renderedBlankRegex, '[[BLANK]]');
            } else if (richSentence.match(highlightRegex)) {
                richSentence = richSentence.replace(highlightRegex, '[[BLANK]]');
            } else if (richSentence.match(existingBlankRegex)) {
                richSentence = richSentence.replace(existingBlankRegex, '[[BLANK]]');
            } else {
                const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const stem = word.word.length > 1 ? word.word.slice(0, -1) : word.word;
                const stemRegex = new RegExp(`${escapeRegExp(stem)}[ぁ-ん]*`);
                if (stemRegex.test(richSentence)) {
                    richSentence = richSentence.replace(stemRegex, '[[BLANK]]');
                } else {
                    richSentence += ' [[BLANK]]';
                }
            }

            let plainSentence = richSentence.replace(/<[^>]+>/g, '').replace(/\[\[BLANK\]\]/g, '________');
            richSentence = richSentence.replace(/\[\[BLANK\]\]/g, '<span class="blank-space"></span>');

            const correctAnswer = getSentenceCorrectAnswer(word);
            const presetOptions = normalizeSentencePresetOptions(word && word.practice && word.practice.options, correctAnswer);
            const optionPool = presetOptions || buildSentenceFallbackOptions(word, correctAnswer);
            if (!correctAnswer || optionPool.length < 2) return null;
            const options = shuffle(optionPool.slice());
            
            const cnHtml = questionCn ? `<br><span class="question-sub-text">（${questionCn}）</span>` : '';

            return {
                kind: 'sentence',
                answerMode: 'choice',
                word,
                questionHtml: `${buildDialogueQuestionHtml(richSentence)}<br><br><span class="question-sub-text">静下心来，看清楚再填。不要弄混了词意。</span>${cnHtml}`,
                cn: questionCn,
                correctAnswer,
                options,
                hintText: '',
                typingText: buildQuestionTypingText(plainSentence)
            };
        }

        function buildReadingQuestionSpec(word) {
            const surfaceText = extractSurfaceTextFromWordHtml(word && word.word_html, word && word.word);
            const readingText = extractKanjiReadingTextFromWordHtml(word && word.word_html);
            const answerChars = splitKanaChars(readingText);
            if (!surfaceText || !readingText || answerChars.length === 0) return null;

            return {
                kind: 'reading',
                answerMode: 'input',
                word,
                questionHtml: `${buildDialogueQuestionHtml(escapeHtml(surfaceText))}<br><br><span class="question-sub-text">这个词的读音，你平时练扎实了吗？写下来。</span>`,
                cn: '',
                correctAnswer: readingText,
                options: [],
                answerChars,
                inputLength: answerChars.length,
                hintText: answerChars[0] || '',
                typingText: buildQuestionTypingText(surfaceText)
            };
        }

        function buildMeaningDistractors(correctWord, sourcePool) {
            const correctMeaning = extractPrimaryMeaning(correctWord);
            const pool = [];
            const seen = new Set([correctMeaning]);
            const globalWords = typeof ALL_DEFINED_WORDS !== 'undefined' && Array.isArray(ALL_DEFINED_WORDS)
                ? ALL_DEFINED_WORDS
                : [];
            const candidates = shuffleArray([...(Array.isArray(sourcePool) ? sourcePool : []), ...globalWords]);
            candidates.forEach((word) => {
                if (!word || word.word === correctWord.word) return;
                const meaning = extractPrimaryMeaning(word);
                if (!meaning || seen.has(meaning)) return;
                seen.add(meaning);
                pool.push(meaning);
            });
            return pool.slice(0, 3);
        }

        function buildMeaningQuestionSpec(word, sourcePool) {
            const kanaText = extractKanaDisplayTextFromWordHtml(word && word.word_html, word && word.word);
            const primaryMeaning = extractPrimaryMeaning(word);
            if (!kanaText || !primaryMeaning) return null;
            const distractors = buildMeaningDistractors(word, sourcePool);
            if (distractors.length < 3) return null;

            return {
                kind: 'meaning',
                answerMode: 'choice',
                word,
                questionHtml: `${buildDialogueQuestionHtml(escapeHtml(kanaText))}<br><br><span class="question-sub-text">这个词的核心含义是什么？仔细分辨。</span>`,
                cn: '',
                correctAnswer: primaryMeaning,
                options: shuffle([primaryMeaning, ...distractors]),
                hintText: '',
                typingText: buildQuestionTypingText(kanaText)
            };
        }

        function generateDistractors(correctWord) {
            const others = ALL_DEFINED_WORDS.filter((w) => w.word !== correctWord.word);
            const shuffled = shuffle(others);
            return shuffled.slice(0, 3).map((w) => w.word);
        }

        function clearTimer() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
        }

        function startTimer() {
            clearTimer();
            const timerShell = document.getElementById('timer-shell');
            const timerBar = document.getElementById('timer-bar');
            if (!(isChallengeMode && selectedDifficulty === 'hell')) {
                timerShell.classList.add('hidden');
                timerBar.classList.remove('warning');
                timerBar.style.width = '100%';
                return;
            }

            timerShell.classList.remove('hidden');
            timeLeft = 10;
            totalTime = 10000;
            timerBar.classList.remove('warning');
            timerBar.style.width = '100%';

            timerId = setInterval(() => {
                timeLeft -= 0.05;
                const percentage = Math.max(0, (timeLeft * 1000) / totalTime * 100);
                timerBar.style.width = `${percentage}%`;
                if (percentage <= 30) {
                    timerBar.classList.add('warning');
                }
                if (timeLeft <= 0) {
                    clearTimer();
                    handleTimeout();
                }
            }, 50);
        }

        function handleTimeout() {
            if (!isAnswering) return;
            checkAnswer(null, null, true);
        }

        function showHpDamage(damage) {
            const hpPill = document.getElementById('hp-pill');
            if (!hpPill) return;
            hpPill.classList.remove('hit');

        function showToast(msg) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.className = 'toast';
                document.body.appendChild(toast);
            }
            toast.textContent = msg;
            toast.classList.add('show');
            if (toast.timeoutId) clearTimeout(toast.timeoutId);
            toast.timeoutId = setTimeout(() => {

            }, 2000);
