<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外来語 - 練習</title>
    <!-- 引入极具现代感的黑体，适合时尚排版 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        html {
            -webkit-text-size-adjust: 100%;
        }

        :root {
            /* === 时髦狐狸 (Chic Fox) 调色板 - Neo Brutalism 风格 === */
            --bg: #F4EEFF;             /* 浅丁香紫 - 高级质感底色 */
            --card-bg: #FFFFFF;        /* 纯白卡片 */
            --surface-hover: #FDFBFF;  
            
            --text: #1A1A1A;           /* 极夜黑 - 核心文字，高对比度 */
            --text-dim: #6B5B7B;       /* 灰紫 - 辅助文字 */
            
            --border: #D8B4E2;         /* 浅紫分割线 */
            --border-strong: #1A1A1A;  /* 强烈的粗黑边框，时尚杂志感 */
            
            /* 强调色 */
            --accent-red: #FF1744;     /* 霓虹玫红 - 错误/警示 */
            --accent-green: #00E676;   /* 荧光绿 - 正确/成功 */
            --accent-gold: #00E5FF;    /* 霓虹青 - 焦点/提示 */
            --accent-main: #AA00FF;    /* 魅惑紫 - 主题色 */
            --accent-pink: #F50057;    /* 时髦粉 */

            /* 杂志风硬阴影 */
            --shadow-sm: 4px 4px 0px var(--border-strong);
            --shadow-md: 8px 8px 0px var(--border-strong);

            /* 利落的时髦倒角 */
            --radius-xl: 16px;
            --radius-lg: 12px;
            --radius-md: 8px;
            --radius-sm: 4px;

            --font-ui: "Noto Sans SC", "Noto Sans JP", -apple-system, BlinkMacSystemFont, sans-serif;
            --font-serif: "Noto Sans SC", "Noto Sans JP", sans-serif; /* 统一使用现代无衬线体 */
            
            --transition: 0.25s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            background: var(--bg);
            font-family: var(--font-ui);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            /* 潮流波点背景 */
            background-image: radial-gradient(var(--border) 2px, transparent 2px);
            background-size: 24px 24px;
        }

        button, input {
            font: inherit;
        }

        /* 左上角返回按钮 */
        .page-back-btn {
            position: fixed;
            top: 20px;
            left: 24px;
            z-index: 120;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 99px;
            background: var(--accent-gold);
            border: 2px solid var(--border-strong);
            color: var(--border-strong);
            font-weight: 900;
            font-size: 14px;
            text-decoration: none;
            transition: all var(--transition);
            box-shadow: 3px 3px 0px var(--border-strong);
            text-transform: uppercase;
        }

        .page-back-btn:hover {
            background: var(--accent-main);
            color: #FFF;
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px var(--border-strong);
        }

        .page-back-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--border-strong);
        }

        .practice-shell {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 40px;
            position: relative;
            z-index: 1;
        }

        .screen {
            width: 100%;
            max-width: 680px;
        }

        .hidden {
            display: none !important;
        }

        /* 引导与结算界面：潮流时尚卡片 */
        .intro-card,
        .summary-card {
            width: 100%;
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            border: 4px solid var(--border-strong);
            padding: 40px;
            box-shadow: var(--shadow-md);
            position: relative;
        }

        .summary-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 16px;
            border-radius: 0px;
            background: var(--accent-main);
            color: #FFF;
            border: 2px solid var(--border-strong);
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            box-shadow: 3px 3px 0px var(--border-strong);
        }

        .summary-overline {
            margin-top: 24px;
            color: var(--accent-main);
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .summary-title {
            margin: 8px 0 16px;
            font-size: 38px;
            font-weight: 900;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .summary-subtitle {
            margin: 0;
            color: var(--text-dim);
            font-size: 16px;
            line-height: 1.6;
            font-weight: 700;
        }

        .intro-dialogue-row {
            display: flex;
            align-items: flex-start;
            gap: 24px;
            margin-bottom: 32px;
        }

        .intro-avatar-wrap {
            flex-shrink: 0;
        }

        /* 狐狸头像 */
        .intro-avatar, .enemy-avatar {
            width: 88px;
            height: 88px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-gold);
            border-radius: 20px;
            border: 4px solid var(--border-strong);
            font-size: 48px;
            box-shadow: 4px 4px 0px var(--border-strong);
        }

        .enemy-avatar {
            width: 80px;
            height: 80px;
            font-size: 44px;
        }

        .fox-sway {
            animation: foxSway 3s ease-in-out infinite;
        }

        @keyframes foxSway {
            0%, 100% { transform: rotate(-5deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.05); }
        }

        .intro-dialogue-main {
            flex: 1;
        }

        .story-panel {
            min-height: 80px;
            cursor: pointer;
            background: #FAFAFA;
            padding: 18px 24px;
            border-radius: var(--radius-md);
            border: 3px solid var(--border-strong);
            box-shadow: 4px 4px 0px rgba(26, 26, 26, 0.1);
        }

        .story-text, .typewriter-text {
            font-size: 18px;
            line-height: 1.8;
            color: var(--text);
            font-family: var(--font-serif);
            font-weight: 700;
            white-space: pre-wrap;
            letter-spacing: 0.02em;
        }

        .story-hint {
            font-size: 13px;
            color: var(--accent-main);
            margin-top: 12px;
            font-weight: 900;
            text-align: right;
            text-transform: uppercase;
        }

        .typing-cursor::after {
            content: '✦';
            display: inline-block;
            font-size: 16px;
            color: var(--accent-main);
            margin-left: 6px;
            vertical-align: baseline;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* 按钮：潮流杂志感 */
        .intro-actions, .summary-actions {
            display: grid;
            gap: 16px;
            margin-top: 32px;
            border-top: 3px solid var(--border-strong);
            padding-top: 32px;
        }

        .intro-primary-btn,
        .summary-primary-btn,
        .summary-secondary-btn {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius-lg);
            border: 3px solid var(--border-strong);
            background: var(--accent-main);
            color: #ffffff;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.15s ease;
            letter-spacing: 0.05em;
            box-shadow: var(--shadow-sm);
            text-transform: uppercase;
        }

        .intro-primary-btn:hover,
        .summary-primary-btn:hover {
            background: var(--accent-pink);
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
        }

        .intro-primary-btn:active,
        .summary-primary-btn:active,
        .summary-secondary-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--border-strong);
        }

        .summary-secondary-btn {
            background: var(--card-bg);
            color: var(--text);
        }

        .summary-secondary-btn:hover {
            background: var(--accent-gold);
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
        }

        .difficulty-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .difficulty-btn {
            padding: 20px 12px;
            border: 3px solid var(--border-strong);
            border-radius: var(--radius-lg);
            background: var(--card-bg);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.15s ease;
            box-shadow: var(--shadow-sm);
        }

        .difficulty-btn:hover {
            background: var(--accent-gold);
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
        }

        .difficulty-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--border-strong);
        }

        .difficulty-title {
            font-size: 18px;
            font-weight: 900;
            color: var(--text);
        }

        .difficulty-copy {
            color: var(--text-dim);
            font-size: 12px;
            line-height: 1.6;
            font-weight: 700;
            text-align: center;
        }
        
        .difficulty-btn:hover .difficulty-copy {
            color: var(--border-strong);
        }

        /* 战斗主界面排列 */
        .arena-shell {
            display: flex;
            flex-direction: column;
            gap: 24px;
            width: 100%;
        }

        /* 讲师区域 */
        .enemy-stage {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 16px;
            padding: 0 12px;
            position: relative;
        }

        .enemy-avatar.hit {
            animation: foxAngry 0.4s ease;
        }

        @keyframes foxAngry {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.1) rotate(-15deg); }
            75% { transform: scale(1.1) rotate(15deg); }
        }

        .enemy-status-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--card-bg);
            padding: 8px 16px;
            border-radius: var(--radius-lg);
            border: 3px solid var(--border-strong);
            box-shadow: 3px 3px 0px var(--border-strong);
        }

        .enemy-name {
            color: var(--accent-main);
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 0.05em;
        }

        .enemy-hp-bar-shell {
            width: 120px;
            height: 10px;
            background: #E8DFF5;
            border-radius: 0px;
            border: 2px solid var(--border-strong);
            overflow: hidden;
        }

        .enemy-hp-bar {
            height: 100%;
            background: var(--accent-pink);
            transition: width 0.3s ease;
        }

        /* 对话框/答题卡区 */
        .dialogue-box {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            border: 4px solid var(--border-strong);
            padding: 32px;
            box-shadow: var(--shadow-md);
            position: relative;
            min-height: 280px;
        }

        .challenge-question-shell {
            min-height: 124px;
        }

        .typewriter-text ruby {
            ruby-align: center;
        }

        .typewriter-text rt {
            font-size: 0.52em;
            color: var(--accent-main);
            font-family: var(--font-ui);
            font-weight: 900;
        }

        .question-sub-text {
            color: var(--accent-main);
            font-size: 15px;
            font-weight: 900;
            font-family: var(--font-ui);
        }

        .blank-space {
            display: inline-block;
            min-width: 4.4em;
            border-bottom: 3px dashed var(--accent-pink);
            transform: translateY(-2px);
        }

        .challenge-feedback {
            min-height: 24px;
            margin-top: 20px;
            font-size: 16px;
            font-weight: 900;
            color: var(--text);
            text-align: center;
        }

        .challenge-feedback.good { color: var(--accent-main); }
        .challenge-feedback.bad { color: var(--accent-red); }

        .challenge-answer-area {
            margin-top: 24px;
        }

        /* 选项面板 */
        .choice-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .action-option {
            width: 100%;
            border: 3px solid var(--border-strong);
            background: var(--card-bg);
            color: var(--text);
            text-align: left;
            padding: 16px 20px 16px 44px;
            font-size: 18px;
            font-weight: 900;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            box-shadow: var(--shadow-sm);
        }

        /* 悬浮时的星光 */
        .action-option::before {
            content: '✦';
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--accent-main);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .action-option:hover:not(:disabled) {
            background: var(--accent-gold);
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
        }

        .action-option:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--border-strong);
        }

        .action-option:hover:not(:disabled)::before {
            opacity: 1;
        }

        .action-option:disabled {
            cursor: default;
        }

        .action-option.correct-ans {
            background: var(--accent-green);
            border-color: var(--border-strong);
            color: var(--border-strong);
        }
        
        .action-option.correct-ans::before {
            content: '✨';
            color: var(--border-strong);
            opacity: 1;
        }

        .action-option.wrong-ans {
            background: var(--accent-red);
            border-color: var(--border-strong);
            color: #FFF;
        }

        .action-option.wrong-ans::before {
            content: '💔';
            opacity: 1;
        }

        /* 拼写输入模式 */
        .reading-answer-wrap {
            display: grid;
            gap: 20px;
        }

        .reading-input-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .reading-char-input {
            width: 54px;
            height: 64px;
            border: 3px solid var(--border-strong);
            border-radius: var(--radius-md);
            background: var(--card-bg);
            text-align: center;
            color: var(--text);
            font-size: 28px;
            font-family: var(--font-serif);
            font-weight: 900;
            outline: none;
            transition: all 0.15s ease;
            box-shadow: 3px 3px 0px rgba(26, 26, 26, 0.1);
        }

        .reading-char-input:focus {
            background: var(--accent-gold);
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px var(--border-strong);
        }

        .reading-char-input.locked {
            background: #E0E0E0;
            color: var(--text-dim);
            border-style: dashed;
        }

        .reading-input-grid.correct .reading-char-input {
            background: var(--accent-green);
            color: var(--border-strong);
        }

        .reading-input-grid.wrong .reading-char-input {
            background: var(--accent-red);
            color: #FFF;
        }

        .reading-action-row {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .reading-action-btn {
            padding: 12px 28px;
            border-radius: var(--radius-lg);
            border: 3px solid var(--border-strong);
            background: var(--card-bg);
            color: var(--text);
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: var(--shadow-sm);
            text-transform: uppercase;
        }

        .reading-action-btn:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
            background: var(--accent-gold);
        }
        
        .reading-action-btn:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--border-strong);
        }

        .reading-action-btn.disabled,
        .reading-action-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        #reading-submit-btn {
            background: var(--accent-main);
            color: #fff;
        }
        
        #reading-submit-btn:hover:not(:disabled) {
            background: var(--accent-pink);
            color: #fff;
        }

        .reading-feedback {
            font-size: 16px;
            font-weight: 900;
            min-height: 24px;
            text-align: center;
        }

        .reading-feedback.correct { color: var(--accent-main); }
        .reading-feedback.wrong { color: var(--accent-red); }

        /* 玩家状态条 (新人状态) */
        .player-hud {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            border: 4px solid var(--border-strong);
            border-radius: var(--radius-xl);
            padding: 16px 24px;
            margin-top: 8px;
            box-shadow: var(--shadow-sm);
        }

        .hud-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .hud-name {
            font-size: 16px;
            font-weight: 900;
            color: var(--border-strong);
            background: var(--accent-gold);
            padding: 4px 12px;
            border-radius: 0px;
            border: 2px solid var(--border-strong);
            box-shadow: 2px 2px 0px var(--border-strong);
        }

        .hud-lv {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dim);
        }

        .hud-hp-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            max-width: 220px;
        }

        .hud-hp-label {
            font-size: 16px;
            font-weight: 900;
            color: var(--accent-red);
        }

        .hud-hp-bar-bg {
            flex: 1;
            height: 14px;
            background: var(--border);
            border-radius: 0px;
            border: 2px solid var(--border-strong);
            overflow: hidden;
        }

        .hud-hp-bar-fill {
            height: 100%;
            background: var(--accent-green);
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .hud-hp-text {
            font-size: 15px;
            font-weight: 900;
            color: var(--text);
            min-width: 54px;
            text-align: right;
        }

        /* 倒计时条 */
        .hud-timer-shell {
            width: 100%;
            height: 12px;
            background: var(--border);
            margin-top: 16px;
            border-radius: 0px;
            border: 2px solid var(--border-strong);
            overflow: hidden;
        }

        .hud-timer-bar {
            height: 100%;
            background: var(--accent-gold);
            transition: width 0.1s linear;
        }

        .hud-timer-bar.warning {
            background: var(--accent-red);
        }

        /* 攻击特效与伤害数字 - 闪耀星光感 */
        .slash-container {
            position: absolute;
            inset: 50% 0 auto 0;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 20;
        }

        .slash-line {
            width: 80px;
            height: 80px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23FF00AA"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>');
            background-size: cover;
            opacity: 0;
            transform: scale(0.5) rotate(-45deg);
        }

        .slash-container.active .slash-line {
            animation: starStrike 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes starStrike {
            0% { opacity: 0; transform: scale(0.5) rotate(-45deg); }
            50% { opacity: 1; transform: scale(1.5) rotate(15deg); }
            100% { opacity: 0; transform: scale(2) rotate(45deg); }
        }

        .damage-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: 900;
            opacity: 0;
            pointer-events: none;
            z-index: 24;
            text-shadow: 3px 3px 0px var(--border-strong);
            text-transform: uppercase;
        }

        .damage-text.normal-hit { color: var(--accent-gold); }
        .damage-text.player-hit { color: var(--accent-red); }

        .damage-text.float {
            animation: bouncyFloatUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes bouncyFloatUp {
            0% { opacity: 0; transform: translate(-50%, 10px) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -10px) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -40px) scale(1); }
        }

        .hp-pill { position: relative; }
        .hp-pill.hit { animation: hpShake 0.4s ease; }

        @keyframes hpShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px) rotate(-2deg); }
            75% { transform: translateX(6px) rotate(2deg); }
        }

        .hp-damage-float {
            position: absolute;
            top: -24px;
            right: 0;
            font-size: 18px;
            font-weight: 900;
            color: var(--accent-red);
            pointer-events: none;
            animation: hpDamageFloat 0.8s ease-out forwards;
            text-shadow: 2px 2px 0px var(--border-strong);
        }

        @keyframes hpDamageFloat {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            20% { opacity: 1; transform: translateY(-10px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-30px) scale(1); }
        }

        .shake { animation: shake 0.4s ease both; }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            20%, 60% { transform: translate(-8px, 0); }
            40%, 80% { transform: translate(8px, 0); }
        }

        /* 结算界面数据 */
        .summary-rank {
            margin-top: 20px;
            font-size: 90px;
            font-weight: 900;
            color: var(--accent-main);
            text-align: center;
            text-shadow: 6px 6px 0px var(--border-strong);
            font-family: 'Arial Black', sans-serif;
            font-style: italic;
        }

        .summary-eval {
            margin-top: 8px;
            color: var(--text);
            font-size: 18px;
            font-weight: 900;
            text-align: center;
        }

        .summary-msg {
            margin-top: 16px;
            color: var(--text-dim);
            font-size: 15px;
            font-weight: 700;
            text-align: center;
        }

        .summary-stat-grid {
            margin-top: 32px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .summary-stat {
            background: #FAFAFA;
            border-radius: var(--radius-lg);
            border: 3px solid var(--border-strong);
            padding: 16px;
            text-align: center;
            box-shadow: 4px 4px 0px rgba(26, 26, 26, 0.1);
        }

        .summary-stat-label {
            display: block;
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .summary-stat-value {
            display: block;
            margin-top: 8px;
            color: var(--accent-main);
            font-size: 28px;
            font-weight: 900;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            left: 50%;
            bottom: 40px;
            transform: translateX(-50%);
            background: var(--border-strong);
            color: #fff;
            padding: 14px 28px;
            border-radius: 0px;
            border: 2px solid var(--accent-gold);
            z-index: 180;
            font-size: 15px;
            font-weight: 900;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            box-shadow: 6px 6px 0px var(--accent-main);
        }

        .toast.show { opacity: 1; }

        @media (max-width: 680px) {
            .practice-shell { padding: 80px 16px 24px; }
            .intro-card, .summary-card, .dialogue-box { padding: 24px; border-width: 3px; }
            .summary-title { font-size: 28px; }
            .story-text, .typewriter-text { font-size: 16px; }
            .action-option { font-size: 16px; padding: 14px 16px 14px 36px; border-width: 2px;}
            .player-hud { flex-direction: column; align-items: stretch; gap: 16px; padding: 20px; border-width: 3px;}
            .hud-hp-wrap { max-width: none; }
            .difficulty-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

        <div class="screen summary-screen hidden" id="view-summary">

                <div class="summary-stat-grid">
                    <div class="summary-stat">
                        <span class="summary-stat-label">时尚准确率</span>
                        <span class="summary-stat-value" id="summary-accuracy">0%</span>
                    </div>

    <!-- Import shared data -->
    <script src="../../shared/back-navigation.js"></script>
    <script src="../../shared/study-quest-test-runtime.js"></script>
    <script src="../../shared/study-quest-test-boot.js"></script>
    <script src="katakana_data.js"></script>
    <script src="katakana-curriculum.js"></script>
    <script src="vocabulary-role-config.js"></script>
    <script>
        if (typeof window.bindStatefulBack === 'function') {
            window.bindStatefulBack({
                selector: '#page-back-btn',
                fallback: 'katakana.html'
            });
        }

        const urlParams = new URLSearchParams(window.location.search);
        const stageParam = urlParams.get('stage');
        const modeParam = urlParams.get('mode');
        const typeParam = String(urlParams.get('type') || '').trim().toLowerCase();
        const isStageMode = !!stageParam;
        const isChallengeMode = isStageMode || modeParam === 'final';
        const PRACTICE_TYPE_STORAGE_KEY = 'study_quest_test_v1_katakana_practice_type';
        const DAILY_PRACTICE_TYPE_MAP = Object.freeze({
            sentence: '语境填空',
            reading: '拼写测试',
            meaning: '假名选义'
        });
        const DAILY_PRACTICE_SHORT_MAP = Object.freeze({
            sentence: '语境',
            reading: '拼写',
            meaning: '选义'
        });
        const dailyPracticeType = Object.prototype.hasOwnProperty.call(DAILY_PRACTICE_TYPE_MAP, typeParam)
            ? typeParam
            : 'sentence';
        localStorage.setItem(PRACTICE_TYPE_STORAGE_KEY, dailyPracticeType);

        let targetWords = [];
        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let clearedCount = 0;
        let answerStreak = 0;
        let bestStreak = 0;
        let selectedDifficulty = null;
        let hp = 20;
        let remainingHints = 3;
        let isHintUsed = false;
        let isAnswering = false;
        let rewardRunMeta = null;
        let rewardResult = null;
        let timerId = null;
        let timeLeft = 0;
        let totalTime = 0;
        let introTypingController = null;
        let questionTypingController = null;
        let pendingQuestionReveal = null;

        const testServer = window.StudyQuestTestServer;
        const VOCAB_STAR_KEY_PREFIX = 'study_quest_test_v1_vocab_star::';
        // 使用外来语的课表数据 (如未定义则回退为空)
        const CURRICULUM_DAYS = Array.isArray(window.LAB_KATAKANA_DAYS) ? window.LAB_KATAKANA_DAYS : [];
        const CURRICULUM_STAGES = Array.isArray(window.LAB_KATAKANA_STAGES) ? window.LAB_KATAKANA_STAGES : [];
        const CURRICULUM_GROUPS = Array.isArray(window.LAB_KATAKANA_GROUPS) ? window.LAB_KATAKANA_GROUPS : [];

        const difficultyMap = {
            easy: { label: '基础穿搭', damage: 2, timed: false, copy: '20题 · HP20 · 错1题扣2血\n刚接触时尚圈的素人水平' },
            hard: { label: '进阶搭配', damage: 4, timed: false, copy: '20题 · HP20 · 错1题扣4血\n有点时尚sense了哦，达人级' },
            hell: { label: '高定秀场', damage: 5, timed: true, copy: '20题 · HP20 · 错1题扣5血 · 限时10秒\n准备好在T台上面对闪光灯了吗！' }
        };

        function getVocabStarKey(wordId) {
            return `${VOCAB_STAR_KEY_PREFIX}${String(wordId || '').trim()}`;
        }

        function getCurriculumDay(dayId) {
            return CURRICULUM_DAYS.find((day) => Number(day.id) === Number(dayId)) || null;
        }

        function getCurriculumStage(stageId) {
            return CURRICULUM_STAGES.find((stage) => Number(stage.id) === Number(stageId)) || null;
        }

        function getCurriculumGroup(groupId) {
            return CURRICULUM_GROUPS.find((group) => Number(group.id) === Number(groupId)) || null;
        }

        function getDayGroup(dayId) {
            const day = getCurriculumDay(dayId);
            return day ? getCurriculumGroup(day.groupId) : null;
        }

        function getStageGroup(stageId) {
            const stage = getCurriculumStage(stageId);
            return stage ? getCurriculumGroup(stage.groupId) : null;
        }

        function getPracticeTypeLabel() {
            return DAILY_PRACTICE_TYPE_MAP[dailyPracticeType] || '语境填空';
        }

        function appendPracticeTypeToScope(scopeKey) {
            return `${scopeKey}-${dailyPracticeType}`;
        }

        function collectWordsByIndexes(indexes) {
            if (!Array.isArray(indexes) || typeof FULL_WORD_LIST === 'undefined') {
                return [];
            }
            const collected = [];
            const seen = new Set();
            indexes.forEach((index) => {
                const word = FULL_WORD_LIST[index];
                if (!word || word.word === '（準備中）') return;
                const key = String(word.word || index);
                if (seen.has(key)) return;
                seen.add(key);
                collected.push(word);
            });
            return collected;
        }

        function getDayWords(dayId) {
            const day = getCurriculumDay(dayId);
            if (day) {
                return collectWordsByIndexes(day.wordIds);
            }
            if (typeof FULL_WORD_LIST === 'undefined') return [];
            // Assuming default words per day logic if curriculum is missing
            const WORDS_PER_DAY = 20;
            const start = (dayId - 1) * WORDS_PER_DAY;
            const end = start + WORDS_PER_DAY;
            return FULL_WORD_LIST.slice(start, end).filter((word) => word.word !== '（準備中）');
        }

        function getStageWords(stageId) {
            const stage = getCurriculumStage(stageId);
            if (!stage) return [];
            const indexes = stage.dayIds.flatMap((dayId) => {
                const day = getCurriculumDay(dayId);
                return day ? day.wordIds : [];
            });
            return collectWordsByIndexes(indexes);
        }

        function getFinalWords() {
            const indexes = CURRICULUM_DAYS.flatMap((day) => Array.isArray(day.wordIds) ? day.wordIds : []);
            return collectWordsByIndexes(indexes);
        }

        function getStarredWords() {
            if (typeof FULL_WORD_LIST === 'undefined') return [];
            return FULL_WORD_LIST.filter((word) => word.word !== '（準備中）' && localStorage.getItem(getVocabStarKey(word.word)) === 'true');
        }

        function getCurrentDayParam() {
            const parsed = parseInt(urlParams.get('day'), 10);
            return Number.isFinite(parsed) ? parsed : 1;
        }

        function getCurrentStageParam() {
            const parsed = parseInt(stageParam, 10);
            return Number.isFinite(parsed) ? parsed : null;
        }

        function getPracticeContext() {
            const currentDayValue = getCurrentDayParam();
            const currentStageValue = getCurrentStageParam();
            if (modeParam === 'final') {
                return {
                    mode: 'final',
                    scopeKey: appendPracticeTypeToScope('final-all'),
                    title: '超模大考 (总复习)',
                    overline: '超模终极试炼',
                    subtitle: `全课程 · ${getPracticeTypeLabel()} · 20 問随机`,
                    challengeTitle: '总复习大考',
                    routeLabel: 'FINAL FASHION WEEK',
                    typeLabel: getPracticeTypeLabel(),
                    pool: getFinalWords()
                };
            }
            if (currentStageValue != null) {
                const stage = getCurriculumStage(currentStageValue);
                const group = getStageGroup(currentStageValue);
                return {
                    mode: selectedDifficulty ? 'challenge' : 'stage',
                    scopeKey: selectedDifficulty
                        ? appendPracticeTypeToScope(`stage-${currentStageValue}-${selectedDifficulty}`)
                        : appendPracticeTypeToScope(`stage-${currentStageValue}`),
                    title: stage ? stage.title : `阶段特训 ${currentStageValue}`,
                    overline: stage ? `${group ? `${group.title} · ` : ''}${stage.title}` : `阶段 ${currentStageValue}`,
                    subtitle: stage
                        ? `第 ${stage.dayIds[0]} - ${stage.dayIds[stage.dayIds.length - 1]} 关 · ${getPracticeTypeLabel()} · 20 問随机`
                        : `${getPracticeTypeLabel()} · 20 問随机`,
                    challengeTitle: stage ? stage.title : `阶段特训 ${currentStageValue}`,
                    routeLabel: `STAGE ${currentStageValue}`,
                    typeLabel: getPracticeTypeLabel(),
                    pool: getStageWords(currentStageValue)
                };
            }
            if (currentDayValue < 0) {
                return {
                    mode: 'review',
                    scopeKey: appendPracticeTypeToScope('review-starred'),
                    title: '过时单品大改造 (难词特训)',
                    overline: '过时单品改造',
                    subtitle: `按已标记难词生成本轮题目 · ${getPracticeTypeLabel()}`,
                    challengeTitle: '错题特训',
                    routeLabel: 'TREND REVIEW',
                    typeLabel: getPracticeTypeLabel(),
                    pool: getStarredWords()
                };
            }
            const day = getCurriculumDay(currentDayValue);
            const group = getDayGroup(currentDayValue);
            return {
                mode: 'day',
                scopeKey: appendPracticeTypeToScope(`day-${currentDayValue}`),
                title: day ? `第${day.id}关 · ${day.title}` : `DAY ${currentDayValue}`,
                overline: day ? `${group ? `${group.title} · ` : ''}${day.title}` : `第${currentDayValue}关`,
                subtitle: day ? `${day.wordIds.length}語 · ${getPracticeTypeLabel()}` : getPracticeTypeLabel(),
                challengeTitle: day ? `${group ? `${group.title} · ` : ''}${day.title}` : `DAY ${currentDayValue}`,
                routeLabel: `DAY ${currentDayValue}`,
                typeLabel: getPracticeTypeLabel(),
                pool: getDayWords(currentDayValue)
            };
        }

        function getPracticeModeKey() {
            const currentDayValue = getCurrentDayParam();
            if (modeParam === 'final') return 'final';
            if (stageParam && selectedDifficulty) return 'challenge';
            if (stageParam) return 'stage';
            if (currentDayValue < 0) return 'review';
            return 'day';
        }

        function getPracticeScopeKey() {
            return getPracticeContext().scopeKey;
        }

        function dispatchPracticeState(phase, overrides = {}) {
            if (!window.StudyQuestTestUi || typeof window.StudyQuestTestUi.dispatchPracticeState !== 'function') {
                return;
            }
            const totalQuestions = questions.length || targetWords.length || 0;
            const answeredCount = Math.max(0, Math.min(totalQuestions, currentQuestionIndex + (phase === 'enter' ? 0 : 1)));
            const accuracy = answeredCount > 0 ? score / answeredCount : 0;
            window.StudyQuestTestUi.dispatchPracticeState({
                module: 'vocabulary',
                subType: 'katakana', // 更新为 katakana
                mode: getPracticeModeKey(),
                phase,
                isCorrect: overrides.isCorrect === undefined ? null : Boolean(overrides.isCorrect),
                streak: Number.isFinite(overrides.streak) ? overrides.streak : answerStreak,
                accuracy: Number.isFinite(overrides.accuracy) ? overrides.accuracy : accuracy,
                questionIndex: Number.isFinite(overrides.questionIndex) ? overrides.questionIndex : currentQuestionIndex + 1,
                questionCount: totalQuestions,
                meta: overrides.meta || {}
            });
        }

        function startRewardRun() {
            if (!testServer || typeof testServer.startRun !== 'function') {
                rewardRunMeta = null;
                return null;
            }
            rewardResult = null;
            rewardRunMeta = testServer.startRun({
                module: 'vocabulary',
                subType: 'katakana',
                mode: getPracticeModeKey(),
                scopeKey: getPracticeScopeKey()
            });
            return rewardRunMeta;
        }

        function ensureRewardResult() {
            if (rewardResult || !rewardRunMeta || !testServer || typeof testServer.completeRun !== 'function') {
                return rewardResult;
            }
            rewardResult = testServer.completeRun({
                runKey: rewardRunMeta.runKey,
                module: 'vocabulary',
                subType: 'katakana',
                mode: getPracticeModeKey(),
                scopeKey: getPracticeScopeKey(),
                questionCount: questions.length,
                answeredCount: clearedCount,
                correctCount: score,
                accuracy: questions.length > 0 ? score / questions.length : 0,
                bestStreak,
                usedHints: Math.max(0, 3 - remainingHints),
                challengeCleared: Boolean(isChallengeMode && selectedDifficulty && hp > 0),
                cleared: true,
                sourcePage: window.location.pathname
            });
            return rewardResult;
        }

        function getDrawAffordanceMarkup(reward) {
            if (!reward || !reward.accepted || !reward.drawOffer || !reward.drawOffer.available) return '';
            if (!window.StudyQuestTestUi || typeof window.StudyQuestTestUi.getDrawAffordanceMarkup !== 'function') return '';
            return window.StudyQuestTestUi.getDrawAffordanceMarkup(reward.drawOffer.runKey || (rewardRunMeta && rewardRunMeta.runKey));
        }

        function mountVocabularyPracticeTestTools(visible) {
            const shouldShow = visible !== false;
            if (!window.StudyQuestTestUi || typeof window.StudyQuestTestUi.mountPracticeTestTools !== 'function') {
                window.setTimeout(() => mountVocabularyPracticeTestTools(shouldShow), 120);
                return;
            }
            window.StudyQuestTestUi.mountPracticeTestTools({
                key: 'vocabulary-perfect-clear',
                visible: shouldShow,
                onPerfectClear: forcePerfectVocabularyClear
            });
        }

        function forcePerfectVocabularyClear() {
            if (!questions.length) return;
            if (isChallengeMode && !selectedDifficulty) {
                selectedDifficulty = 'easy';
                hp = 20;
            }
            clearTimer();
            score = questions.length;
            clearedCount = questions.length;
            answerStreak = questions.length;
            bestStreak = Math.max(bestStreak, questions.length);
            currentQuestionIndex = questions.length;
            if (isChallengeMode && selectedDifficulty) {
                hp = Math.max(hp, 1);
            }
            if (!rewardRunMeta) {
                startRewardRun();
            }
            renderSummary();
        }

        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function shuffle(array) {
            return shuffleArray(array);
        }

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeTextValue(value) {
            return String(value == null ? '' : value).trim();
        }

        function toHiragana(text) {
            return String(text == null ? '' : text).replace(/[\u30a1-\u30f6]/g, (char) => String.fromCharCode(char.charCodeAt(0) - 0x60));
        }

        function normalizeKanaAnswer(value) {
            return toHiragana(String(value == null ? '' : value).replace(/\s+/g, ''));
        }

        function splitKanaChars(value) {
            return Array.from(normalizeKanaAnswer(value));
        }

        function isReadingInputComposing(input) {
            return Boolean(input && input.dataset && input.dataset.composing === 'true');
        }

        function findNextEditableReadingIndex(inputs, startIndex) {
            for (let index = Math.max(0, Number(startIndex) || 0); index < inputs.length; index += 1) {
                if (!inputs[index].readOnly) {
                    return index;
                }
            }
            return -1;
        }

        function findPreviousEditableReadingIndex(inputs, startIndex) {
            for (let index = Math.min(inputs.length - 1, Number(startIndex) || 0); index >= 0; index -= 1) {
                if (!inputs[index].readOnly) {
                    return index;
                }
            }
            return -1;
        }

        function commitReadingChars(startIndex, rawValue) {
            const inputs = getReadingInputs();
            const start = findNextEditableReadingIndex(inputs, startIndex);
            const chars = splitKanaChars(rawValue);
            if (start === -1) {
                return { nextIndex: inputs.length, insertedCount: 0 };
            }
            if (chars.length === 0) {
                inputs[start].value = '';
                return { nextIndex: start, insertedCount: 0 };
            }

            let cursor = start;
            let insertedCount = 0;
            for (const char of chars) {
                const targetIndex = findNextEditableReadingIndex(inputs, cursor);
                if (targetIndex === -1) break;
                inputs[targetIndex].value = char;
                cursor = targetIndex + 1;
                insertedCount += 1;
            }
            return { nextIndex: cursor, insertedCount };
        }

        function extractSurfaceTextFromWordHtml(wordHtml, fallbackText = '') {
            if (!wordHtml || typeof DOMParser === 'undefined') return normalizeTextValue(fallbackText);
            const parser = new DOMParser();
            const doc = parser.parseFromString(`<div>${wordHtml}</div>`, 'text/html');
            const container = doc.body.firstElementChild;
            if (!container) return normalizeTextValue(fallbackText);
            container.querySelectorAll('rt').forEach((rt) => rt.remove());
            return normalizeTextValue(container.textContent || fallbackText);
        }

        function extractKanjiReadingTextFromWordHtml(wordHtml) {
            if (!wordHtml || typeof DOMParser === 'undefined') return '';
            const parser = new DOMParser();
            const doc = parser.parseFromString(`<div>${wordHtml}</div>`, 'text/html');
            const root = doc.body.firstElementChild;
            if (!root) return '';

            const readings = [];
            root.childNodes.forEach((node) => {
                if (!(node instanceof HTMLElement) || node.tagName.toLowerCase() !== 'ruby') return;
                const clone = node.cloneNode(true);
                clone.querySelectorAll('rt').forEach((rt) => rt.remove());
                const baseText = normalizeTextValue(clone.textContent || '');
                if (!baseText || !/[\u3400-\u9fff]/.test(baseText)) return;
                const readingText = Array.from(node.querySelectorAll('rt'))
                    .map((rt) => rt.textContent || '')
                    .join('')
                    .replace(/\s+/g, '')
                    .trim();
                if (readingText) readings.push(readingText);
            });

            return normalizeKanaAnswer(readings.join(''));
        }

        function extractKanaDisplayTextFromWordHtml(wordHtml, fallbackText = '') {
            if (!wordHtml || typeof DOMParser === 'undefined') {
                const fallback = normalizeTextValue(fallbackText);
                return /[\u3040-\u30ffー]/.test(fallback) ? toHiragana(fallback) : '';
            }

            const parser = new DOMParser();
            const doc = parser.parseFromString(`<div>${wordHtml}</div>`, 'text/html');
            const root = doc.body.firstElementChild;
            if (!root) {
                const fallback = normalizeTextValue(fallbackText);
                return /[\u3040-\u30ffー]/.test(fallback) ? toHiragana(fallback) : '';
            }

            const fragments = [];
            root.childNodes.forEach((node) => {
                if (node.nodeType === Node.TEXT_NODE) {
                    const text = normalizeTextValue(node.textContent || '');
                    if (text) fragments.push(text);
                    return;
                }
                if (!(node instanceof HTMLElement)) return;
                if (node.tagName.toLowerCase() === 'ruby') {
                    const readingText = Array.from(node.querySelectorAll('rt'))
                        .map((rt) => rt.textContent || '')
                        .join('')
                        .replace(/\s+/g, '')
                        .trim();
                    if (readingText) {
                        fragments.push(readingText);
                        return;
                    }
                }
                const text = normalizeTextValue(node.textContent || '');
                if (text) fragments.push(text);
            });

            const normalized = toHiragana(fragments.join('')).trim();
            return /[\u3040-\u30ffー]/.test(normalized) ? normalized : '';
        }

        function extractPrimaryMeaning(word) {
            return String(word && word.mean ? word.mean : '')
                .split(/[；;]/)
                .map((part) => part.trim())
                .find(Boolean) || '';
        }

        function getEligibleWordsForPracticeType(words, type) {
            const pool = Array.isArray(words) ? words : [];
            if (type === 'reading') {
                return pool.filter((word) => {
                    const surfaceText = extractSurfaceTextFromWordHtml(word && word.word_html, word && word.word);
                    const readingText = extractKanjiReadingTextFromWordHtml(word && word.word_html);
                    // 如果是外来语，有些可能没有汉字读音，只有片假名。为了兼容拼写测试，如果 readingText 没有，我们允许直接拼写假名
                    const targetKana = readingText || normalizeKanaAnswer(word.word);
                    return Boolean(surfaceText && targetKana && splitKanaChars(targetKana).length > 0);
                });
            }
            if (type === 'meaning') {
                return pool.filter((word) => {
                    const kanaText = extractKanaDisplayTextFromWordHtml(word && word.word_html, word && word.word);
                    const primaryMeaning = extractPrimaryMeaning(word);
                    return Boolean(kanaText && primaryMeaning);
                });
            }
            return pool.filter(Boolean);
        }

        function buildSentenceQuestionSpec(word) {
            let questionHtml = '';
            let questionCn = '';
            if (word.practice) {
                questionHtml = word.practice.sentence;
            } else {
                let example = { jp: '例文がありません。', cn: '' };
                if (word.examples && word.examples.length > 0) {
                    example = word.examples[Math.floor(Math.random() * word.examples.length)];
                }
                questionCn = example.cn;
                questionHtml = example.jp;
            }

            let richSentence = questionHtml;
            
            const highlightRegex = /<span class=['"]ex-highlight['"]>(.*?)<\/span>/g;
            const existingBlankRegex = /(_{2,}|＿{2,}|\(\s*\)|（\s*）)/g;
            
            if (richSentence.match(highlightRegex)) {
                richSentence = richSentence.replace(highlightRegex, '[[BLANK]]');
            } else if (richSentence.match(existingBlankRegex)) {
                richSentence = richSentence.replace(existingBlankRegex, '[[BLANK]]');
            } else {
                const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                // 外来语更倾向于直接做全词匹配替换
                if (richSentence.includes(word.word)) {
                    richSentence = richSentence.replace(new RegExp(escapeRegExp(word.word), 'g'), '[[BLANK]]');
                } else {
                    richSentence += ' [[BLANK]]';
                }
            }

            let plainSentence = richSentence.replace(/<[^>]+>/g, '').replace(/\[\[BLANK\]\]/g, '________');
            richSentence = richSentence.replace(/\[\[BLANK\]\]/g, '<span class="blank-space"></span>');

            const distractors = generateDistractors(word);
            const options = shuffle([word.practice ? word.practice.answer : word.word, ...distractors]);
            
            const cnHtml = questionCn ? `<br><span class="question-sub-text">（${questionCn}）</span>` : '';

            return {
                kind: 'sentence',
                answerMode: 'choice',
                word,
                questionHtml: `キツネ先輩：「${richSentence}」<br><br><span class="question-sub-text">快把这个词填上，要是连这种基础搭配都不懂可太丢人了。✦</span>${cnHtml}`,
                cn: questionCn,
                correctAnswer: word.practice ? word.practice.answer : word.word,
                options,
                hintText: '',
                typingText: `キツネ先輩：「${plainSentence}」\n\n快把这个词填上，要是连这种基础搭配都不懂可太丢人了。✦`
            };
        }

        function buildReadingQuestionSpec(word) {
            const surfaceText = extractSurfaceTextFromWordHtml(word && word.word_html, word && word.word);
            // 兼容外来语：如果没有提取出传统的汉字读音，直接让其拼写单词本身（通常是片假名）
            let readingText = extractKanjiReadingTextFromWordHtml(word && word.word_html);
            if (!readingText) {
                readingText = normalizeKanaAnswer(word.word);
            }
            const answerChars = splitKanaChars(readingText);
            if (!surfaceText || !readingText || answerChars.length === 0) return null;

            return {
                kind: 'reading',
                answerMode: 'input',
                word,
                questionHtml: `キツネ先輩：「${escapeHtml(surfaceText)}」<br><br><span class="question-sub-text">这个外来语怎么拼写？赶紧写下来，别拼错了引人发笑哦！✦</span>`,
                cn: '',
                correctAnswer: readingText,
                options: [],
                answerChars,
                inputLength: answerChars.length,
                hintText: answerChars[0] || '',
                typingText: `キツネ先輩：「${surfaceText}」\n\n这个外来语怎么拼写？赶紧写下来，别拼错了引人发笑哦！✦`
            };
        }

        function buildMeaningDistractors(correctWord, sourcePool) {
            const correctMeaning = extractPrimaryMeaning(correctWord);
            const pool = [];
            const seen = new Set([correctMeaning]);
            const globalWords = typeof ALL_DEFINED_WORDS !== 'undefined' && Array.isArray(ALL_DEFINED_WORDS)
                ? ALL_DEFINED_WORDS
                : [];
            const candidates = shuffleArray([...(Array.isArray(sourcePool) ? sourcePool : []), ...globalWords]);
            candidates.forEach((word) => {
                if (!word || word.word === correctWord.word) return;
                const meaning = extractPrimaryMeaning(word);
                if (!meaning || seen.has(meaning)) return;
                seen.add(meaning);
                pool.push(meaning);
            });
            return pool.slice(0, 3);
        }

        function buildMeaningQuestionSpec(word, sourcePool) {
            const kanaText = extractKanaDisplayTextFromWordHtml(word && word.word_html, word && word.word);
            const primaryMeaning = extractPrimaryMeaning(word);
            if (!kanaText || !primaryMeaning) return null;
            const distractors = buildMeaningDistractors(word, sourcePool);
            if (distractors.length < 3) return null;

            return {
                kind: 'meaning',
                answerMode: 'choice',
                word,
                questionHtml: `キツネ先輩：「${escapeHtml(kanaText)}」<br><br><span class="question-sub-text">这是什么意思？选错的话品味很差哦，新人酱！✦</span>`,
                cn: '',
                correctAnswer: primaryMeaning,
                options: shuffle([primaryMeaning, ...distractors]),
                hintText: '',
                typingText: `キツネ先輩：「${kanaText}」\n\n这是什么意思？选错的话品味很差哦，新人酱！✦`
            };
        }

        function generateDistractors(correctWord) {
            const others = ALL_DEFINED_WORDS.filter((w) => w.word !== correctWord.word);
            const shuffled = shuffle(others);
            return shuffled.slice(0, 3).map((w) => w.word);
        }

        function clearTimer() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
        }

        function startTimer() {
            clearTimer();
            const timerShell = document.getElementById('timer-shell');
            const timerBar = document.getElementById('timer-bar');
            if (!(isChallengeMode && selectedDifficulty === 'hell')) {
                timerShell.classList.add('hidden');
                timerBar.classList.remove('warning');
                timerBar.style.width = '100%';
                return;
            }

            timerShell.classList.remove('hidden');
            timeLeft = 10;
            totalTime = 10000;
            timerBar.classList.remove('warning');
            timerBar.style.width = '100%';

            timerId = setInterval(() => {
                timeLeft -= 0.05;
                const percentage = Math.max(0, (timeLeft * 1000) / totalTime * 100);
                timerBar.style.width = `${percentage}%`;
                if (percentage <= 30) {
                    timerBar.classList.add('warning');
                }
                if (timeLeft <= 0) {
                    clearTimer();
                    handleTimeout();
                }
            }, 50);
        }

            if (!isAnswering) return;
            checkAnswer(null, null, true);

        function clearTypewriter(controllerName) {
            const controller = controllerName === 'intro' ? introTypingController : questionTypingController;
            if (controller && controller.timeoutId) {
                clearTimeout(controller.timeoutId);
            }
            if (controllerName === 'intro') {
                introTypingController = null;
            } else {
                questionTypingController = null;
            }
        }

        function runTypewriter({ controllerName, target, cursor, text, speed, onComplete }) {
            clearTypewriter(controllerName);
            target.innerText = '';
            cursor.className = 'typing-cursor';
            const controller = {
                index: 0,
                text,
                timeoutId: null,
                finished: false,
                finish() {
                    if (this.finished) return;
                    this.finished = true;
                    target.innerText = text;
                    cursor.className = '';
                    if (this.timeoutId) {
                        clearTimeout(this.timeoutId);
                    }
                    if (typeof onComplete === 'function') {
                        onComplete();
                    }
                }
            };

            function typeNext() {
                if (controller.finished) return;
                if (controller.index < text.length) {
                    target.innerText += text.charAt(controller.index);
                    controller.index += 1;
                    controller.timeoutId = setTimeout(typeNext, speed);
                } else {
                    controller.finished = true;
                    cursor.className = '';
                    if (typeof onComplete === 'function') {
                        onComplete();
                    }
                }
            }

            if (controllerName === 'intro') {
                introTypingController = controller;
            } else {
                questionTypingController = controller;
            }
            typeNext();
        }

        function finishCurrentTypewriter(controllerName) {
            const controller = controllerName === 'intro' ? introTypingController : questionTypingController;
            if (controller && typeof controller.finish === 'function') {
                controller.finish();
            }
        }

        function buildReadingAnswerMarkup(question) {
            const inputsHtml = Array.from({ length: question.inputLength || 0 }, (_, index) => `
                <input
                    type="text"
                    inputmode="kana"
                    autocomplete="off"
                    autocapitalize="off"
                    spellcheck="false"
                    class="reading-char-input"
                    data-reading-index="${index}"
                    oncompositionstart="handleReadingCompositionStart(event)"
                    oncompositionend="handleReadingCompositionEnd(event, ${index})"
                    oninput="handleReadingInput(event, ${index})"
                    onkeydown="handleReadingKeyDown(event, ${index})"
                    onpaste="handleReadingPaste(event, ${index})"
                >
            `).join('');

            return `
                <div class="reading-answer-wrap">
                    <div class="reading-input-grid" id="reading-input-grid">${inputsHtml}</div>
                    <div class="reading-action-row">
                        <button type="button" class="reading-action-btn ${remainingHints <= 0 ? 'disabled' : ''}" id="hint-btn" onclick="useHint()">求助前辈 (${remainingHints})</button>
                        <button type="button" class="reading-action-btn" id="reading-submit-btn" onclick="submitReadingAnswer()">确认上交</button>
                    </div>
                    <div class="reading-feedback" id="reading-feedback"></div>
                </div>
            `;
        }

        function buildChoiceAnswerMarkup(question) {
            const buttons = question.options.map((opt, optionIndex) => (
                `<button type="button" class="action-option" data-option-index="${optionIndex}">${escapeHtml(opt)}</button>`
            )).join('');
            return `<div class="choice-grid">${buttons}</div>`;
        }

        function getReadingInputs() {
            return Array.from(document.querySelectorAll('.reading-char-input'));
        }

        function focusReadingInput(startIndex = 0) {
            const inputs = getReadingInputs();
            const resolvedStartIndex = Math.max(0, Number(startIndex) || 0);
            const focusTask = () => {
                for (let index = resolvedStartIndex; index < inputs.length; index += 1) {
                    const input = inputs[index];
                    if (!input.readOnly) {
                        input.focus();
                        input.select();
                        return;
                    }
                }
            };
            if (typeof window !== 'undefined' && typeof window.requestAnimationFrame === 'function') {
                window.requestAnimationFrame(focusTask);
                return;
            }
            window.setTimeout(focusTask, 0);
        }

        function handleReadingCompositionStart(event) {
            if (!event.target) return;
            event.target.dataset.composing = 'true';
            event.target.dataset.skipNextInput = 'false';
        }

        function handleReadingCompositionEnd(event, index) {
            const input = event.target;
            if (!input) return;
            input.dataset.composing = 'false';
            const result = commitReadingChars(index, input.value || event.data || '');
            input.dataset.skipNextInput = 'true';
            window.requestAnimationFrame(() => {
                if (input.dataset.skipNextInput === 'true') {
                    input.dataset.skipNextInput = 'false';
                }
            });
            if (result.insertedCount > 0) {
                focusReadingInput(result.nextIndex);
            }
        }

        function handleReadingInput(event, index) {
            const input = event.target;
            if (!input) return;
            if (event.isComposing || isReadingInputComposing(input)) return;
            if (input.dataset.skipNextInput === 'true') {
                input.dataset.skipNextInput = 'false';
                return;
            }
            const result = commitReadingChars(index, input.value);
            if (result.insertedCount > 0) {
                focusReadingInput(result.nextIndex);
            }
        }

        function handleReadingKeyDown(event, index) {
            if (event.isComposing || isReadingInputComposing(event.target)) {
                return;
            }
            if (event.key === 'Enter') {
                event.preventDefault();
                submitReadingAnswer();
                return;
            }
            if (event.key === 'Backspace' && !event.target.value) {
                const inputs = getReadingInputs();
                const prevIndex = findPreviousEditableReadingIndex(inputs, index - 1);
                if (prevIndex !== -1) {
                    inputs[prevIndex].value = '';
                    inputs[prevIndex].focus();
                }
            }
        }

        function handleReadingPaste(event, index) {
            event.preventDefault();
            const pastedText = (event.clipboardData || window.clipboardData).getData('text');
            const result = commitReadingChars(index, pastedText);
            if (result.insertedCount > 0) {
                focusReadingInput(result.nextIndex);
            }
        }

        function collectReadingAnswer() {
            return normalizeKanaAnswer(getReadingInputs().map((input) => input.value || '').join(''));
        }

        function submitReadingAnswer() {
            if (!isAnswering) return;
            const question = questions[currentQuestionIndex];
            if (!question || question.answerMode !== 'input') return;
            if (getReadingInputs().some((input) => isReadingInputComposing(input))) return;
            const inputs = getReadingInputs();
            const expectedLength = Number(question.inputLength || 0);
            const filledLength = inputs.filter((input) => normalizeKanaAnswer(input.value)).length;
            if (filledLength < expectedLength) {
                focusReadingInput(0);
                return;
            }
            checkAnswer(null, collectReadingAnswer(), false);
        }

        function useHint() {
            const question = questions[currentQuestionIndex];
            if (remainingHints <= 0 || !isAnswering || isHintUsed || !question || question.answerMode !== 'input') return;
            remainingHints -= 1;
            isHintUsed = true;
            const btn = document.getElementById('hint-btn');
            if (btn) {
                btn.textContent = `求助前辈 (${remainingHints})`;
                if (remainingHints <= 0) btn.classList.add('disabled');
            }
            const inputs = getReadingInputs();
            if (inputs.length === 0) return;
            inputs[0].value = question.hintText || '';
            inputs[0].readOnly = true;
            inputs[0].classList.add('locked');
            focusReadingInput(1);
        }

        function renderAnswerArea(question) {
            const answerArea = document.getElementById('challenge-answer-area');
            const feedback = document.getElementById('challenge-feedback');
            answerArea.classList.add('hidden');
            feedback.textContent = '';
            feedback.className = 'challenge-feedback';
            if (question.answerMode === 'input') {
                answerArea.innerHTML = buildReadingAnswerMarkup(question);
            } else {
                answerArea.innerHTML = buildChoiceAnswerMarkup(question);
                answerArea.querySelectorAll('.action-option[data-option-index]').forEach((buttonNode) => {
                    buttonNode.addEventListener('click', () => {
                        const selectedIndex = Number(buttonNode.dataset.optionIndex);
                        checkAnswer(buttonNode, question.options[selectedIndex]);
                    });
                });
            }
        }

        function revealCurrentQuestion() {
            const question = questions[currentQuestionIndex];
            const challengeQuestion = document.getElementById('challenge-question');
            
            // 无缝切换为富文本
            challengeQuestion.innerHTML = question.questionHtml;
            
            renderAnswerArea(question);
            document.getElementById('challenge-answer-area').classList.remove('hidden');
            isAnswering = true;
            startTimer();
            if (question.answerMode === 'input') {
                focusReadingInput(0);
            }

            if (currentQuestionIndex === 0) {
                dispatchPracticeState('enter', { questionIndex: 1, questionCount: questions.length });
            } else if (currentQuestionIndex === questions.length - 1) {
                dispatchPracticeState('near_clear', { questionIndex: questions.length, questionCount: questions.length });
            }
        }

        function renderQuestion() {
            clearTimer();
            clearTypewriter('question');
            if (pendingQuestionReveal) {
                clearTimeout(pendingQuestionReveal);
                pendingQuestionReveal = null;
            }

            const question = questions[currentQuestionIndex];
            if (!question) {
                renderSummary();
                return;
            }

            updateHud();
            isAnswering = false;
            isHintUsed = false;

            const answerArea = document.getElementById('challenge-answer-area');
            const feedback = document.getElementById('challenge-feedback');
            const challengeQuestion = document.getElementById('challenge-question');
            const typingCursor = document.getElementById('typing-cursor');
            const dialogueCounter = document.getElementById('dialogue-counter');

            dialogueCounter.textContent = `${currentQuestionIndex + 1} / ${questions.length}`;
            challengeQuestion.innerText = '';
            typingCursor.className = 'typing-cursor';
            answerArea.classList.add('hidden');
            answerArea.innerHTML = '';
            feedback.textContent = '';
            feedback.className = 'challenge-feedback';

            runTypewriter({
                controllerName: 'question',
                target: challengeQuestion,
                cursor: typingCursor,
                text: question.typingText,
                speed: 34,
                onComplete: () => {
                    pendingQuestionReveal = setTimeout(() => {
                        revealCurrentQuestion();
                    }, 180);
                }
            });
        }

        function markChoiceButtons(question, selected, isCorrect, isTimeout) {
            const buttons = document.querySelectorAll('.action-option');
            buttons.forEach((buttonNode) => {
                buttonNode.disabled = true;
                if (buttonNode.innerText === question.correctAnswer) {
                    buttonNode.classList.add('correct-ans');

                    buttonNode.classList.add('wrong-ans');
