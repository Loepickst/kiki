<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT 语法特训 - 剑客狼の野性道场</title>
    <!-- 引入极具现代感和锐利感的黑体及明朝体 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=Noto+Sans+SC:wght@500;700;900&family=Noto+Serif+JP:wght@600;900&family=Noto+Serif+SC:wght@600;900&display=swap" rel="stylesheet">
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['"Noto Sans SC"', '"Noto Sans JP"', 'sans-serif'],
                        'serif-jp': ['"Noto Serif SC"', '"Noto Serif JP"', '"Songti SC"', '"SimSun"', 'serif'],
                    },
                    colors: {
                        wolfDark: '#171717',    /* 极夜黑 - 边框与主文本 */
                        wolfRed: '#991B1B',     /* 狂野赤 - 阴影与强调 */
                        wolfGold: '#D97706',    /* 锐利金 - 焦点目标 */
                        wolfGray: '#475569',    /* 刀锋灰 */
                        bgMain: '#F5F5F5',      /* 道场灰白 */
                        bgCard: '#ffffff',
                        textMain: '#171717',
                        textSub: '#475569',
                        textMuted: '#9CA3AF',
                        borderMain: '#D1D5DB',
                        borderStrong: '#171717', 
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --border-strong: #171717;
            --wolf-red: #991B1B;
            --wolf-dark: #171717;
            --wolf-gold: #D97706;
            --shadow-sm: 3px 3px 0px var(--wolf-red);
            --shadow-md: 5px 5px 0px var(--wolf-dark);
            --shadow-lg: 6px 6px 0px var(--wolf-red);
            --transition: 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            margin: 0; min-height: 100vh; background-color: #F5F5F5; color: #171717; position: relative;
            background-image: repeating-linear-gradient(-45deg, transparent, transparent 20px, rgba(153, 27, 27, 0.04) 20px, rgba(153, 27, 27, 0.04) 22px);
        }

        .view-section { display: none; animation: slashIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .view-section.active { display: block; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slashIn { from { opacity: 0; transform: translateX(10px) skewX(-2deg); } to { opacity: 1; transform: translateX(0) skewX(0); } }

        .font-title-unified { font-family: "Noto Serif SC", "Noto Serif JP", "Songti SC", "SimSun", serif; letter-spacing: 0.05em; }

        .page-header {
            width: 100%; padding: 12px 20px; box-sizing: border-box; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); z-index: 100; border-bottom: 4px solid var(--wolf-dark);
        }

        .back-btn, .home-btn {
            border: 2px solid var(--wolf-dark); background: #FFFFFF; padding: 6px 14px; text-decoration: none; color: var(--wolf-dark);
            font-size: 13px; font-weight: 900; display: inline-flex; align-items: center; min-height: 34px; letter-spacing: 0.05em; transition: all var(--transition);
            cursor: pointer; box-shadow: 2px 2px 0px var(--wolf-red); border-radius: 2px; text-transform: uppercase;
        }

        .back-btn:hover, .home-btn:hover { background: var(--wolf-dark); color: #FFFFFF; transform: translate(-1px, -1px); box-shadow: 3px 3px 0px var(--wolf-red); }

        .page-shell { width: min(100%, 1120px); margin: 0 auto; padding: 32px 16px 48px; box-sizing: border-box; }
        .selection-view-shell { width: min(100%, 700px); margin-left: auto; margin-right: auto; }

        .neo-card { background: var(--bgCard); border: 3px solid var(--wolf-dark); box-shadow: var(--shadow-sm); border-radius: 2px; transition: all var(--transition); }
        .neo-card-hover:hover:not(:disabled) { transform: translate(-2px, -2px); box-shadow: var(--shadow-lg); background-color: #FAFAFA; }

        /* 单选按钮与选项直观反馈 (UI/UX 核心升级) */
        .grammar-option-btn {
            background: #FFFFFF; border: 2px solid var(--wolf-dark); box-shadow: 2px 2px 0px var(--wolf-dark); border-radius: 2px;
            transition: all var(--transition); position: relative; overflow: hidden; display: flex; align-items: center; text-align: left;
            width: 100%; cursor: pointer; padding-right: 68px !important; /* 为右侧徽章留空间 */
        }

        /* 剑特效放在右边 */
        .grammar-option-btn::before {
            content: '⚔️'; position: absolute; right: 20px; top: 50%; transform: translateY(-50%) scale(0.5); font-size: 16px; opacity: 0; transition: all var(--transition);
        }

        .grammar-option-btn:hover:not(.disabled-opt):not(.selected) {
            transform: translate(-1px, -1px); box-shadow: 3px 3px 0px var(--wolf-red); border-color: var(--wolf-red); background: #FEF2F2;
        }

        .grammar-option-btn:hover:not(.disabled-opt):not(.selected)::before { opacity: 1; transform: translateY(-50%) scale(1); }

        .grammar-option-btn.selected {
            background-color: var(--wolf-dark) !important; border-color: var(--wolf-dark) !important; color: #FFFFFF !important;
            transform: translate(-2px, -2px); box-shadow: 4px 4px 0px var(--wolf-red) !important;
        }

        .grammar-option-btn.selected .option-letter { background-color: #FFFFFF !important; color: var(--wolf-dark) !important; border-color: #FFFFFF !important; }

        /* ==== 选项内部的直接判定效果 ==== */
        @keyframes badgePop { 0% { transform: translateY(-50%) scale(0); opacity: 0; } 80% { transform: translateY(-50%) scale(1.1); } 100% { transform: translateY(-50%) scale(1); opacity: 1; } }

        .grammar-option-btn.correct-ans {
            background-color: #F8FAFC !important; border-color: var(--wolf-dark) !important; color: var(--wolf-dark) !important;
            box-shadow: 3px 3px 0px var(--wolf-dark) !important; transform: translate(-2px, -2px) !important;
        }
        .grammar-option-btn.correct-ans::after {
            content: '斬中 ✓'; position: absolute; right: 12px; top: 50%;
            background: var(--wolf-dark); color: #fff; padding: 2px 8px; font-size: 12px; font-weight: 900; border-radius: 2px;
            animation: badgePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
        }
        .grammar-option-btn.correct-ans .option-letter { background-color: var(--wolf-dark) !important; color: #FFFFFF !important; }
        
        .grammar-option-btn.wrong-ans {
            background-color: #FEF2F2 !important; color: var(--wolf-red) !important; border-color: var(--wolf-red) !important;
            box-shadow: 3px 3px 0px var(--wolf-red) !important; transform: none !important;
        }
        .grammar-option-btn.wrong-ans::after {
            content: '斬空 ✗'; position: absolute; right: 12px; top: 50%;
            background: var(--wolf-red); color: #fff; padding: 2px 8px; font-size: 12px; font-weight: 900; border-radius: 2px;
            animation: badgePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; box-shadow: 2px 2px 0px rgba(0,0,0,0.3);
        }
        .grammar-option-btn.wrong-ans .option-letter { background-color: var(--wolf-red) !important; color: #FFFFFF !important; border-color: var(--wolf-red) !important; }

        .grammar-option-btn.missed-correct {
            background-color: #FAFAFA !important; border: 3px dashed var(--wolf-dark) !important; color: var(--wolf-dark) !important;
            box-shadow: 5px 5px 0px var(--wolf-dark) !important; transform: translate(-2px, -2px) !important; z-index: 10;
        }
        .grammar-option-btn.missed-correct::after {
            content: '👈 正解'; position: absolute; right: 12px; top: 50%;
            background: #fff; border: 2px solid var(--wolf-dark); color: var(--wolf-dark); padding: 2px 8px; font-size: 12px; font-weight: 900; border-radius: 2px;
            animation: badgePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.5) forwards; box-shadow: 2px 2px 0px var(--wolf-dark);
        }
        .grammar-option-btn.missed-correct .option-letter { background-color: var(--wolf-dark) !important; color: #FFFFFF !important; }

        .disabled-opt { pointer-events: none; }

        /* 全屏伤害红闪 */
        .screen-flash-wrong {
            position: fixed; inset: 0; background: rgba(153, 27, 27, 0.15); z-index: 2000; pointer-events: none;
            animation: flashOut 0.4s ease-out forwards;
        }
        @keyframes flashOut { 0% { opacity: 1; } 100% { opacity: 0; } }

        /* 状态大印章 */
        .status-badge {
            display: inline-flex; align-items: center; justify-content: center; min-height: 36px; padding: 0 16px; border-radius: 2px;
            font-size: 14px; font-weight: 900; letter-spacing: 0.1em; transform: rotate(-3deg); opacity: 0; border: 3px solid currentColor;
            box-shadow: 3px 3px 0px currentColor; animation: stampSlash 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; background: #FFFFFF;
        }
        @keyframes stampSlash { 0% { transform: scale(1.5) rotate(5deg) translateY(-20px); opacity: 0; } 100% { transform: scale(1) rotate(-3deg) translateY(0); opacity: 1; } }

        .submit-btn, .next-question-btn {
            background: var(--wolf-dark) !important; border: 3px solid var(--border-strong) !important; color: #fff !important;
            padding: 14px 40px !important; font-size: 14px !important; font-weight: 900 !important; letter-spacing: 0.1em !important;
            border-radius: 2px !important; box-shadow: 4px 4px 0px var(--wolf-red) !important; text-transform: uppercase !important;
            transition: all var(--transition) !important;
        }
        .submit-btn:hover:not(:disabled), .next-question-btn:hover { background: var(--wolf-red) !important; transform: translate(-2px, -2px) !important; box-shadow: 6px 6px 0px var(--wolf-dark) !important; }
        .submit-btn:disabled { background: #E5E5E5 !important; border-color: #D1D5DB !important; color: #9CA3AF !important; box-shadow: none !important; }

        /* 底部工具栏与深色遮罩 */
        #view-practice.has-bottom-toolbar #practice-question-container { padding-bottom: 164px; }
        .practice-bottom-toolbar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 1600; padding: 0 12px calc(env(safe-area-inset-bottom)); display: none; pointer-events: none; }
        .practice-bottom-toolbar.is-visible { display: block; }
        .practice-toolbar-backdrop { position: fixed; inset: 0; background: rgba(23, 23, 23, 0.4); backdrop-filter: blur(2px); opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
        .practice-bottom-toolbar.drawer-open .practice-toolbar-backdrop { opacity: 1; pointer-events: auto; }
        .practice-bottom-toolbar__inner { position: relative; max-width: 920px; margin: 0 auto; pointer-events: auto; }
        .practice-toolbar-slot[hidden] { display: none; }
        
        .practice-toolbar-main {
            display: flex; align-items: center; gap: 12px; min-height: 72px; padding: 12px 14px;
            border: 3px solid var(--wolf-dark); border-bottom: none;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(18px);
            box-shadow: 4px 4px 0px rgba(153, 27, 27, 0.2); border-radius: 4px 4px 0 0;
        }
        
        .timer-status-dot { width: 10px; height: 10px; border-radius: 0; background: #D1D5DB; border: 1px solid var(--border-strong); transform: rotate(45deg); transition: all 0.2s ease; }
        .practice-toolbar-main[data-timer-status="running"] .timer-status-dot { background: var(--wolf-red); box-shadow: 0 0 6px rgba(153,27,27,0.5); }
        .practice-toolbar-main[data-timer-status="paused"] .timer-status-dot { background: var(--wolf-gold); }
        
        .timer-toolbar-btn, .timer-chip-btn, .timer-control-btn, .timer-hide-btn, .random-target-btn {
            border: 2px solid var(--wolf-dark); background: #fff; color: var(--wolf-dark); border-radius: 2px; font-size: 13px; font-weight: 900; padding: 8px 12px; box-shadow: 2px 2px 0px var(--wolf-dark); transition: all 0.15s ease; cursor: pointer;
        }
        .timer-toolbar-btn:hover:not(:disabled), .timer-chip-btn:hover, .timer-control-btn:hover, .random-target-btn:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0px var(--wolf-red); background: #F5F5F5; }
        .timer-toolbar-btn.is-primary, .timer-chip-btn.is-selected, .timer-control-btn.is-primary, .random-target-btn.is-primary { background: var(--wolf-dark); color: #fff; box-shadow: 2px 2px 0px var(--wolf-red); }
        .timer-drawer { position: absolute; right: 0; bottom: calc(100% + 12px); width: min(420px, calc(100vw - 24px)); padding: 16px; border: 3px solid var(--wolf-dark); border-radius: 4px; background: #FFFFFF; box-shadow: 6px 6px 0px rgba(153, 27, 27, 0.2); box-sizing: border-box; }

        @media (max-width: 767px) {
            .practice-toolbar-main { flex-wrap: wrap; }
            .practice-toolbar-time { width: 100%; text-align: left; margin-bottom: 8px; }
            .timer-action-group { width: 100%; justify-content: space-between; }
            .timer-toolbar-btn { flex: 1; text-align: center; }
            .grammar-option-btn { padding-right: 54px !important; }
            .grammar-option-btn.correct-ans::after, .grammar-option-btn.wrong-ans::after, .grammar-option-btn.missed-correct::after { font-size: 10px; padding: 2px 6px; right: 8px; }
        }
    </style>
</head>
<body class="antialiased min-h-screen">

    <header class="page-header">
        <button type="button" id="page-back-btn" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
            撤退
        </button>
        <div class="text-center flex items-center justify-center">
            <span class="text-[10px] md:text-xs font-black bg-wolfDark text-white px-3 py-1.5 tracking-widest border-2 border-wolfDark rounded-sm shadow-[2px_2px_0px_#991B1B] uppercase">🐺 剑客狼の文法道场</span>
        </div>
        <a href="../../index.html" class="home-btn">营地</a>
    </header>

    <div class="page-shell">
    <div class="max-w-4xl mx-auto">
        
        <!-- 1. 引导页 - 选择级别 -->
        <div id="view-level-select" class="view-section active selection-view-shell selection-view-hero">
            <div class="text-center mb-10">
                <h1 class="text-3xl md:text-4xl font-title-unified font-black text-textMain tracking-[0.04em] mb-4 leading-[1.2]">文法：単文特訓</h1>
                <p class="text-textSub font-bold tracking-wider">选择你要修炼的剑法流派</p>
            </div>

            <div class="flex flex-col md:flex-row justify-center gap-6 mb-8">
                <button onclick="app.selectLevel('N1')" class="flex-1 neo-card neo-card-hover flex flex-col items-center py-10 px-6 group relative">
                    <div class="absolute top-0 right-0 bg-wolfRed text-white text-[0.6rem] font-bold px-3 py-1 rounded-bl-sm tracking-widest border-b-[3px] border-l-[3px] border-borderStrong">奥义</div>
                    <span class="text-5xl font-black font-sans text-textMain mb-3 group-hover:scale-110 transition-transform group-hover:text-wolfRed">N1</span>
                    <span class="text-sm text-textSub font-bold tracking-widest">常规单选题库</span>
                </button>
                <button type="button" disabled class="flex-1 neo-card flex flex-col items-center py-10 px-6 opacity-50 cursor-not-allowed">
                    <span class="text-5xl font-black font-sans text-textMain mb-3">N2</span>
                    <span class="text-sm text-textSub font-bold tracking-widest">道场未开放</span>
                </button>
            </div>
        </div>

        <!-- 2. 引导页 - 选择模式 -->
        <div id="view-mode-select" class="view-section selection-view-shell selection-view-standard">
            <div class="mb-10">
                <h2 class="text-2xl md:text-3xl font-black text-textMain tracking-wider flex items-center gap-4">
                    <span id="display-selected-level" class="bg-wolfDark text-white px-4 py-1.5 rounded-sm border-[3px] border-borderStrong shadow-[3px_3px_0px_#991B1B]">N?</span> 
                    模式选择
                </h2>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <button onclick="app.showYearList()" class="neo-card neo-card-hover p-8 text-left relative group">
                    <div class="w-14 h-14 bg-bgMain border-[3px] border-borderStrong rounded-sm flex items-center justify-center mb-6 group-hover:bg-wolfDark group-hover:text-white transition-colors shrink-0 shadow-[2px_2px_0px_#991B1B]">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-7 h-7 text-textMain group-hover:text-white"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
                    </div>
                    <h3 class="text-2xl font-black text-textMain mb-3 tracking-widest">研习剑谱 (按年份)</h3>
                    <p class="text-sm text-textSub font-bold leading-relaxed">历年真题分类，稳扎稳打地进行套卷练习。</p>
                </button>

                <button onclick="app.startRandomPractice()" class="neo-card neo-card-hover p-8 text-left relative group">
                    <div class="w-14 h-14 bg-red-50 border-[3px] border-wolfRed rounded-sm flex items-center justify-center mb-6 group-hover:bg-wolfRed transition-colors shrink-0 shadow-[2px_2px_0px_#991B1B]">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-7 h-7 text-wolfRed group-hover:text-white"><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></svg>
                    </div>
                    <h3 class="text-2xl font-black text-wolfRed mb-3 tracking-widest">野性乱斗 (随机)</h3>
                    <p class="text-sm text-textSub font-bold leading-relaxed">打乱剑谱，随机抽取对手，测试即时反应速度与精准度。</p>
                </button>
            </div>
        </div>

        <!-- 3. 引导页 - 选择年份真题 -->
        <div id="view-year-select" class="view-section selection-view-shell selection-view-standard">
            <!-- 错题回顾区 -->
            <div id="year-review-section" class="hidden mb-10 neo-card p-6 border-wolfRed shadow-[6px_6px_0px_#991B1B]">
                <div class="flex items-center gap-3 border-b-[3px] border-wolfRed/30 pb-4 mb-4">
                    <span class="text-3xl">🐺</span>
                    <h2 class="text-xl font-black text-wolfRed tracking-widest uppercase">败局复盘 (错题回顾)</h2>
                </div>
                <div id="year-review-grid" class="flex flex-wrap gap-4"></div>
            </div>
            <div id="year-list-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>

        <!-- 4. 练习界面 (核心做题区) -->
        <div id="view-practice" class="view-section">
            <header class="mb-8 border-b-4 border-borderStrong pb-6 flex items-center justify-between">
                <div>
                    <h1 id="practice-title" class="text-2xl md:text-3xl font-black text-textMain tracking-widest uppercase font-title-unified">道場特訓</h1>
                    <p class="text-sm font-bold text-textSub mt-2 tracking-wider">看破题眼，锁定目标。点击「斬る」提交答案。</p>
                </div>
            </header>
            <div id="practice-question-container" class="space-y-12 mb-16"></div>
            
            <!-- 底部计时/连斩工具栏 -->
            <div id="practice-bottom-toolbar" class="practice-bottom-toolbar" aria-live="polite">
                <div id="practice-toolbar-backdrop" class="practice-toolbar-backdrop" hidden></div>
                <div class="practice-bottom-toolbar__inner">
                    
                    <!-- 常规计时器 -->
                    <div id="timer-tool-slot" class="practice-toolbar-slot">
                        <div id="timer-drawer" class="timer-drawer" hidden>
                            <div class="timer-drawer-header">
                                <div class="timer-drawer-title">沙漏设定</div>
                                <button type="button" class="timer-drawer-close" id="timer-drawer-close-btn">×</button>
                            </div>
                            <div id="timer-drawer-display" class="timer-drawer-display">00:00</div>
                            <div class="timer-drawer-section">
                                <div class="timer-drawer-label">控制</div>
                                <div class="timer-control-row">
                                    <button type="button" class="timer-control-btn is-primary" id="timer-drawer-start-btn">拔刀(开始)</button>
                                    <button type="button" class="timer-control-btn" id="timer-drawer-pause-btn">收刀(暂停)</button>
                                    <button type="button" class="timer-control-btn" id="timer-drawer-reset-btn">重置</button>
                                    <button type="button" class="timer-hide-btn" id="timer-hide-btn">隐藏时间</button>
                                </div>
                            </div>
                        </div>

                        <div id="timer-toolbar-main" class="practice-toolbar-main" data-timer-status="idle">
                            <div class="practice-toolbar-meta">
                                <span class="timer-status-dot" aria-hidden="true"></span>
                                <span class="practice-toolbar-label tracking-widest font-black uppercase">沙漏</span>
                            </div>
                            <div id="timer-toolbar-display" class="practice-toolbar-time text-2xl">00:00</div>
                            <div class="timer-action-group">
                                <button type="button" class="timer-toolbar-btn is-primary" id="timer-toolbar-toggle-btn">拔刀</button>
                                <button type="button" class="timer-toolbar-btn" id="timer-toolbar-reset-btn">重置</button>
                                <button type="button" class="timer-toolbar-btn" id="timer-toolbar-settings-btn">设置</button>
                            </div>
                        </div>
                    </div>

                    <!-- 随机乱序连斩统计器 -->
                    <div id="random-tool-slot" class="practice-toolbar-slot" hidden>
                        <div id="random-toolbar-main" class="practice-toolbar-main" data-timer-status="idle">
                            <div class="practice-toolbar-meta">
                                <span class="timer-status-dot" aria-hidden="true"></span>
                                <span class="practice-toolbar-label tracking-widest font-black uppercase">野性</span>
                            </div>
                            <div class="flex-1 flex items-center justify-center gap-8">
                                <div class="text-center">
                                    <span class="text-[10px] text-textSub font-black tracking-widest uppercase block mb-1">已击破</span>

    <script>
        const questionDatabase = window.grammarQuestionBanks.N1 || [];
        const TEST_SAMPLE_LEVEL = 'N1';
        const TEST_SAMPLE_YEAR = '2010年7月';
        const TIMER_PRESETS = [5, 10, 15];

        function isEnabledYear(level, year) { return level === TEST_SAMPLE_LEVEL && year === TEST_SAMPLE_YEAR; }
        
        function clampTimerMinutes(value) {
            const numeric = Number(value);
            return Number.isFinite(numeric) ? Math.min(180, Math.max(1, Math.round(numeric))) : TIMER_PRESETS[0];
        }

        function formatTimerClock(totalSeconds) {
            const safeSeconds = Math.max(0, Math.floor(Number(totalSeconds) || 0));
            const minutes = Math.floor(safeSeconds / 60);
            const seconds = safeSeconds % 60;
            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function getIconSvg(name, className = '') {
            const icons = { 'arrow-right': '<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>' };
            return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}">${icons[name] || ''}</svg>`;
        }

        function getGrammarMarksKey(level, year) { return `grammar_mc_marks::${level}::${year}`; }
        function getGrammarLastPracticeKey(level) { return `grammar_mc_last_practice::${level}`; }

        function getYearMistakes(level, year) {
            try { return JSON.parse(localStorage.getItem(getGrammarMarksKey(level, year)) || '[]'); } catch (error) { return []; }
        }

        function saveYearMistakes(level, year, ids) {
            if (!ids || ids.length === 0) localStorage.removeItem(getGrammarMarksKey(level, year));
            else localStorage.setItem(getGrammarMarksKey(level, year), JSON.stringify(ids));
        }

        function getYearSortValue(year) {
            const match = String(year || '').match(/^(\d{4})年(\d{1,2})月$/);
            return match ? Number(match[1]) * 100 + Number(match[2]) : 0;
        }

        function collectYearReviewItems(level) {
            const prefix = `grammar_mc_marks::${level}::`;
            const items = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith(prefix)) {
                    const year = key.slice(prefix.length);
                    const ids = getYearMistakes(level, year);
                    if (ids.length > 0) items.push({ year, count: ids.length });
                }
            }
            return items.sort((a, b) => getYearSortValue(b.year) - getYearSortValue(a.year));
        }

        function replaceAppUrl(params) {
            const nextParams = new URLSearchParams();
            Object.entries(params || {}).forEach(([k, v]) => { if (v) nextParams.set(k, v); });
            const nextUrl = nextParams.toString() ? `${window.location.pathname}?${nextParams.toString()}` : window.location.pathname;
            try { window.history.replaceState({ path: nextUrl }, '', nextUrl); } catch (e) {}
        }
        
        // 洗牌算法（用于随机抽题）
        function shuffleQuestions(items) {
            const shuffled = [...items];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        const app = {
            currentLevel: null, practiceMode: null, currentYear: null,
            questionQueue: [], currentIndex: 0, stats: { correct: 0, incorrect: 0 },
            
            // 随机乱斗变量
            randomRoundTarget: 10, randomAnsweredCount: 0, randomStreak: 0, randomBestStreak: 0,

            timer: { mode: 'countup', status: 'idle', elapsedSeconds: 0, remainingSeconds: 300, selectedMinutes: 5, totalSeconds: 300, timerId: null, drawerOpen: false, displayHidden: false, hasStarted: false, resultHasRun: false, resultSeconds: 0 },

            init() {
                const params = new URLSearchParams(window.location.search);
                const level = params.get('level');
                const year = params.get('year');
                const mode = params.get('mode');

                if (!['N1', 'N2', 'N3'].includes(level)) { replaceAppUrl({}); return; }

                this.currentLevel = level;
                document.getElementById('display-selected-level').textContent = level;

                if (mode === 'random') {
                    this.startRandomPractice();
                    return;
                }

                if (year && isEnabledYear(level, year)) {
                    if (mode === 'review') this.startMistakePractice(year, { updateUrl: false });
                    else this.startYearPractice(year, { updateUrl: false });
                    return;
                }
                replaceAppUrl({ level }); this.showYearList({ updateUrl: false });
            },

            switchView(viewId) {
                document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
                document.getElementById(viewId).classList.add('active');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            handleHeaderBack() {
                const activeId = document.querySelector('.view-section.active')?.id;
                if (activeId === 'view-level-select') window.location.href = 'index.html';
                else if (activeId === 'view-mode-select') { this.currentLevel = null; replaceAppUrl({}); this.switchView('view-level-select'); }
                else if (activeId === 'view-year-select') { this.practiceMode = null; this.currentYear = null; replaceAppUrl({level: this.currentLevel}); this.switchView('view-mode-select'); }
                else if (activeId === 'view-practice') { this.showYearList(); }
            },

            selectLevel(level) {
                this.currentLevel = level;
                document.getElementById('display-selected-level').textContent = level;
                replaceAppUrl({ level });
                this.switchView('view-mode-select');
            },

            showYearList(options = { updateUrl: true }) {
                this.practiceMode = 'year';
                if (options.updateUrl) replaceAppUrl({ level: this.currentLevel });
                
                const availableYears = [...new Set(questionDatabase.filter(q => q.level === this.currentLevel).map(q => q.year))].sort((a, b) => getYearSortValue(b) - getYearSortValue(a));
                const container = document.getElementById('year-list-container');
                const reviewSection = document.getElementById('year-review-section');
                const reviewGrid = document.getElementById('year-review-grid');
                container.innerHTML = ''; reviewGrid.innerHTML = '';

                const reviewItems = collectYearReviewItems(this.currentLevel).filter(item => isEnabledYear(this.currentLevel, item.year));
                if (reviewItems.length > 0) {
                    reviewGrid.innerHTML = reviewItems.map(item => `
                        <button onclick="app.startMistakePractice('${item.year}')" class="neo-card px-4 py-2 flex items-center gap-2 hover:bg-wolfRed hover:text-white transition-colors cursor-pointer group border-wolfRed shadow-[3px_3px_0px_#991B1B]">
                            <span class="font-black text-wolfRed group-hover:text-white">${item.year}</span>
                            <span class="text-xs bg-red-50 text-wolfRed px-2 py-0.5 rounded border border-wolfRed font-bold">${item.count} 破绽</span>
                        </button>
                    `).join('');
                    reviewSection.classList.remove('hidden');
                } else {
                    reviewSection.classList.add('hidden');
                }

                const lastPractice = localStorage.getItem(getGrammarLastPracticeKey(this.currentLevel)) || '';

                if (availableYears.length === 0) {
                    container.innerHTML = `<div class="col-span-full text-center py-10 neo-card text-textSub font-bold border-borderMain shadow-none">该级别暂无剑谱</div>`;
                } else {
                    container.innerHTML = availableYears.map(year => {
                        const qCount = questionDatabase.filter(q => q.level === this.currentLevel && q.year === year).length;
                        const isEnabled = isEnabledYear(this.currentLevel, year);
                        const isLast = year === lastPractice;
                        return `
                            <button ${isEnabled ? `onclick="app.startYearPractice('${year}')"` : 'disabled'} class="neo-card neo-card-hover p-6 flex flex-col gap-4 text-left w-full ${!isEnabled ? 'opacity-50 cursor-not-allowed' : ''}">
                                <div class="flex items-center justify-between w-full">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 rounded bg-wolfDark border-2 border-borderStrong flex items-center justify-center shadow-[2px_2px_0px_#991B1B]">
                                            <span class="text-white text-xl font-black">⚔️</span>
                                        </div>
                                        <h3 class="text-xl font-black text-textMain tracking-widest">巻之 ${year.replace('年','-').replace('月','')}</h3>
                                    </div>
                                    ${isLast ? `<span class="bg-wolfRed text-white text-[10px] font-black px-2 py-1 rounded-sm border-2 border-borderStrong shadow-[2px_2px_0px_#1C1C1C]">上次研习</span>` : ''}
                                </div>
                                <div class="flex items-center gap-3 mt-2">
                                    <span class="text-xs font-bold text-textSub bg-bgMain px-2 py-1 border border-borderMain rounded">共 ${qCount} 式</span>
                                    <span class="text-xs font-bold text-wolfDark bg-gray-100 px-2 py-1 border border-gray-300 rounded uppercase">${isEnabled ? '残卷' : '未开放'}</span>
                                </div>
                            </button>
                        `;
                    }).join('');
                }
                this.switchView('view-year-select');
            },

            // --- 野性乱斗 (随机抽题) 逻辑 ---
            getRandomQuestionPool() {
                return questionDatabase.filter(q => q.level === this.currentLevel);
            },

            prepareRandomRound(pool) {
                const target = 10; // 默认出招10题
                this.randomRoundTarget = Math.min(target, pool.length);
                this.randomAnsweredCount = 0;
                this.randomStreak = 0;
                this.randomBestStreak = 0;
                this.questionQueue = shuffleQuestions(pool).slice(0, this.randomRoundTarget);
                this.currentIndex = 0;
            },

            startRandomPractice() {
                this.practiceMode = 'random';
                this.currentYear = '野性乱斗';
                this.stats = { correct: 0, incorrect: 0 };
                
                const pool = this.getRandomQuestionPool();
                if(pool.length === 0) { alert('当前级别暂无剑谱数据！'); return; }
                
                replaceAppUrl({ level: this.currentLevel, mode: 'random' });
                this.prepareRandomRound(pool);
                this.resetTimerForPractice(); // 隐藏倒计时面板，改用随机面板
                this.renderPracticeQuestion();
                this.switchView('view-practice');
            },

            updateRandomProgressAfterAnswer(isCorrect) {
                if (this.practiceMode !== 'random') return;
                this.randomAnsweredCount = Math.min(this.randomRoundTarget, this.randomAnsweredCount + 1);
                if (isCorrect) {
                    this.randomStreak++;
                    if (this.randomStreak > this.randomBestStreak) this.randomBestStreak = this.randomStreak;
                } else {
                    this.randomStreak = 0;
                }
                this.updateTimerUI();
            },

            finishRandomRound() {
                if (this.practiceMode !== 'random') return;
                this.currentIndex = this.questionQueue.length;
                this.renderPracticeQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },
            // -----------------------------

            startMistakePractice(year, options = { updateUrl: true }) {
                this.practiceMode = 'mistake'; this.currentYear = year; this.stats = { correct: 0, incorrect: 0 };
                const mistakeIds = getYearMistakes(this.currentLevel, year);
                this.questionQueue = questionDatabase.filter(q => q.level === this.currentLevel && q.year === year && mistakeIds.includes(q.id));
                localStorage.setItem(getGrammarLastPracticeKey(this.currentLevel), year);
                this.currentIndex = 0; this.resetTimerForPractice();
                if (options.updateUrl) replaceAppUrl({ level: this.currentLevel, year, mode: 'review' });
                this.renderPracticeQuestion(); this.switchView('view-practice');
            },

            startYearPractice(year, options = { updateUrl: true }) {
                this.practiceMode = 'year'; this.currentYear = year; this.stats = { correct: 0, incorrect: 0 };
                this.questionQueue = questionDatabase.filter(q => q.level === this.currentLevel && q.year === year);
                localStorage.setItem(getGrammarLastPracticeKey(this.currentLevel), year);
                this.currentIndex = 0; this.resetTimerForPractice();
                if (options.updateUrl) replaceAppUrl({ level: this.currentLevel, year });
                this.renderPracticeQuestion(); this.switchView('view-practice');
            },

            setPracticeToolbarMode(mode) {
                const toolbar = document.getElementById('practice-bottom-toolbar');
                if (!toolbar) return;
                toolbar.hidden = !mode; toolbar.classList.toggle('is-visible', !!mode);
                
                const timerSlot = document.getElementById('timer-tool-slot');
                const randomSlot = document.getElementById('random-tool-slot');
                if (timerSlot) timerSlot.hidden = mode !== 'timer';
                if (randomSlot) randomSlot.hidden = mode !== 'random';
            },

            // ======== Timer Logic ========
            resetTimerForPractice() {
                this.stopTimer(); this.timer.status = 'idle'; this.timer.elapsedSeconds = 0;
                this.timer.totalSeconds = clampTimerMinutes(this.timer.selectedMinutes) * 60;
                this.timer.remainingSeconds = this.timer.totalSeconds; this.timer.hasStarted = false;
                this.timer.resultHasRun = false; this.timer.resultTimeout = false;
                this.closeTimerDrawer({ skipUpdate: true }); this.updateTimerUI();
            },
            stopTimer() { if (this.timer.timerId) { clearInterval(this.timer.timerId); this.timer.timerId = null; } },
            startTimer() {
                this.stopTimer(); this.timer.hasStarted = true; this.timer.status = 'running';
                this.timer.timerId = setInterval(() => {
                    if (this.timer.mode === 'countup') { this.timer.elapsedSeconds++; this.updateTimerUI(); return; }
                    this.timer.remainingSeconds = Math.max(0, this.timer.remainingSeconds - 1);
                    if (this.timer.remainingSeconds === 0) { this.stopTimer(); this.timer.status = 'timeout'; this.timer.resultTimeout = true; this.currentIndex = this.questionQueue.length; this.renderPracticeQuestion(); }
                    this.updateTimerUI();
                }, 1000);
                this.updateTimerUI();
            },
            pauseTimer() { if (this.timer.status !== 'running') return; this.stopTimer(); this.timer.status = 'paused'; this.updateTimerUI(); },
            toggleTimerRun() { if (this.timer.status === 'running') this.pauseTimer(); else this.startTimer(); },
            toggleTimerDrawer() { this.timer.drawerOpen = !this.timer.drawerOpen; this.updateTimerUI(); },
            closeTimerDrawer(opts={}) { this.timer.drawerOpen = false; if(!opts.skipUpdate) this.updateTimerUI(); },
            setTimerMode(mode) { this.timer.mode = mode; this.resetTimerForPractice(); },
            setTimerSelectedMinutes(val) { this.timer.selectedMinutes = clampTimerMinutes(val); this.resetTimerForPractice(); },
            toggleTimerDisplayVisibility() { this.timer.displayHidden = !this.timer.displayHidden; this.updateTimerUI(); },
            getTimerClockText() { return this.timer.mode === 'countdown' ? formatTimerClock(this.timer.remainingSeconds) : formatTimerClock(this.timer.elapsedSeconds); },

            updateTimerUI() {
                const tmr = this.timer;
                const dDisplay = document.getElementById('timer-toolbar-display');
                const dMain = document.getElementById('timer-toolbar-main');
                const randomToolbarMain = document.getElementById('random-toolbar-main');
                
                const isRandom = this.practiceMode === 'random';
                this.setPracticeToolbarMode(isRandom ? 'random' : 'timer');
                
                if (!isRandom && dDisplay && dMain) {
                    dDisplay.textContent = tmr.displayHidden ? '--:--' : this.getTimerClockText();
                    dDisplay.classList.toggle('is-concealed', tmr.displayHidden);
                    dMain.dataset.timerStatus = tmr.status;

                    document.getElementById('timer-toolbar-toggle-btn').textContent = tmr.status === 'running' ? '收刀' : (tmr.status === 'paused' ? '再拔刀' : '拔刀');
                    document.getElementById('timer-drawer').hidden = !tmr.drawerOpen;
                    document.getElementById('practice-toolbar-backdrop').hidden = !tmr.drawerOpen;
                    document.getElementById('practice-bottom-toolbar').classList.toggle('drawer-open', tmr.drawerOpen);
                    document.getElementById('timer-drawer-display').textContent = this.getTimerClockText();
                } else if (isRandom && randomToolbarMain) {
                    document.getElementById('random-toolbar-progress').textContent = `${Math.min(this.randomAnsweredCount, this.randomRoundTarget)}/${this.randomRoundTarget}`;
                    document.getElementById('random-toolbar-streak').textContent = String(this.randomStreak);
                    randomToolbarMain.dataset.timerStatus = this.randomStreak > 0 ? 'running' : 'idle';
                }
            },
            // =============================

            renderPracticeQuestion() {
                const container = document.getElementById('practice-question-container');
                const headerTitle = `[${this.currentLevel}] ${this.currentYear}${this.practiceMode === 'mistake' ? '（🐺 破绽狙击）' : ''}`;
                document.getElementById('practice-title').textContent = headerTitle;

                if (this.currentIndex >= this.questionQueue.length) {
                    this.stopTimer(); this.setPracticeToolbarMode(null);
                    
                    const totalQ = this.stats.correct + this.stats.incorrect;
                    const usedSec = this.timer.mode === 'countdown' ? (this.timer.totalSeconds - this.timer.remainingSeconds) : this.timer.elapsedSeconds;
                    const timeStr = this.timer.hasStarted ? formatTimerClock(usedSec) : '--:--';

                    let msg = this.practiceMode === 'mistake' 
                        ? `干脆利落！你已经完成了 <strong>${headerTitle}</strong> 的败局复盘。<br>克服的破绽已移出记录。` 
                        : `非常直观的提升！你已经完成了 <strong>${headerTitle}</strong> 的 ${totalQ} 次过招。<br>破绽已被记入「败局复盘」。`;

                    const randomSummaryHtml = this.practiceMode === 'random' ? `
                        <div class="max-w-sm mx-auto mb-8 bg-white border-[3px] border-borderStrong rounded-sm p-4 shadow-[4px_4px_0px_#171717]">
                            <div class="grid grid-cols-2 gap-4 text-center">
                                <div>
                                    <div class="text-xs font-black tracking-widest text-textSub uppercase">出招总数</div>
                                    <div class="mt-2 text-3xl font-black text-textMain font-sans">${this.randomRoundTarget}</div>
                                </div>
                                <div>
                                    <div class="text-xs font-black tracking-widest text-textSub uppercase">最大连斩</div>
                                    <div class="mt-2 text-3xl font-black text-textMain font-sans">${this.randomBestStreak}</div>
                                </div>
                            </div>
                        </div>
                    ` : '';

                    container.innerHTML = `
                        <div class="text-center neo-card p-8 md:p-12 fade-in relative border-wolfDark shadow-[8px_8px_0px_#171717]">
                            <div class="w-16 h-16 bg-wolfDark border-2 border-borderStrong text-white flex items-center justify-center mx-auto mb-6 shadow-[3px_3px_0px_#991B1B]">
                                <span class="text-3xl text-white font-black">🐺</span>
                            </div>
                            <h2 class="text-3xl md:text-4xl font-black text-textMain uppercase tracking-tighter mb-8 font-title-unified">勝負あり (分出胜负)</h2>
                            
                            <div class="flex justify-center gap-6 md:gap-12 mb-10 border-y-4 border-borderStrong py-6 bg-bgMain">
                                <div class="text-center">
                                    <div class="text-4xl font-black text-wolfDark mb-2 font-sans">${this.stats.correct}</div>
                                    <div class="text-[10px] text-textMain tracking-widest font-black bg-white border-2 border-borderStrong py-1 px-2 uppercase shadow-[2px_2px_0px_#171717] rounded-sm">斩中</div>
                                </div>
                                <div class="text-center">
                                    <div class="text-4xl font-black text-wolfRed mb-2 font-sans">${this.stats.incorrect}</div>
                                    <div class="text-[10px] text-white tracking-widest font-black border-2 border-borderStrong bg-wolfRed py-1 px-2 uppercase shadow-[2px_2px_0px_#171717] rounded-sm">斩空</div>
                                </div>
                            </div>

                            ${this.practiceMode === 'random' ? randomSummaryHtml : `
                            <div class="max-w-xs mx-auto mb-8 bg-white border-[3px] border-borderStrong rounded-sm p-4 shadow-[4px_4px_0px_#171717]">
                                <div class="text-xs font-black tracking-widest text-textSub uppercase">交锋用时</div>
                                <div class="mt-2 text-3xl font-black text-textMain font-sans">${timeStr}</div>
                            </div>
                            `}

                            <p class="text-textSub mb-8 text-sm font-bold leading-relaxed">${msg}</p>
                            
                            <button onclick="app.start${this.practiceMode === 'year' ? 'Year' : (this.practiceMode === 'random' ? 'Random' : 'Mistake')}Practice('${this.currentYear}')" class="px-8 py-4 bg-wolfDark text-white border-2 border-borderStrong rounded-sm shadow-[4px_4px_0px_#991B1B] text-sm tracking-widest font-black hover:bg-wolfRed hover:-translate-y-1 hover:shadow-[5px_5px_0px_#171717] transition-all uppercase">再戦する (再次挑战)</button>
                        </div>
                    `;
                    return;
                }

                const q = this.questionQueue[this.currentIndex];
                container.innerHTML = this.generateQuestionHTML(q, this.currentIndex, this.questionQueue.length);
            },

            // 渲染结构化的“剑理奥义”解析面板 (完美排版，杜绝异常居中，统一字号)
            buildExplanationHTML(q) {
                const correctOptText = q.options.find(o => o.id === q.correctOption)?.text || '';
                // 填入正确答案重建句子，加入红色高亮下划线以显眼
                const reconstructedSentence = q.question.replace(/（\s*）|____+|＿+/g, `<span class="text-wolfRed font-black border-b-[3px] border-wolfRed px-2 mx-1">${correctOptText}</span>`);

                // 1. 翻译与全句重建区 - 字号统一调整至 text-sm md:text-base font-bold
                const translationSection = `
                    <div class="p-6 md:p-8 border-b-[4px] border-wolfDark bg-bgMain text-left">
                        <h4 class="text-sm font-black text-wolfDark uppercase tracking-widest mb-4 flex items-center gap-2">【文の訳】 Reconstruct</h4>
                        <div class="text-textMain font-serif-jp text-sm md:text-base font-bold leading-loose bg-white border-[3px] border-borderStrong p-4 md:p-5 shadow-[4px_4px_0px_#171717] mb-4">
                            ${reconstructedSentence}
                        </div>
                        <div class="text-textSub text-sm md:text-base font-bold border-l-[4px] border-wolfRed pl-4 py-1.5 bg-white/60">
                            ${q.explanation.sentenceTranslation}
                        </div>
                    </div>
                `;

                // 2. 正解の理（原因分析） - 统一字号 text-sm md:text-base
                const reasoningSection = `
                    <div class="p-6 md:p-8 border-b-[4px] border-wolfDark bg-white text-left">
                        <h4 class="text-sm font-black text-wolfRed uppercase tracking-widest mb-5 flex items-center gap-2">【正解の理】 Logic Analysis</h4>
                        <div class="text-sm md:text-base font-bold text-textMain leading-loose tracking-wide text-justify">
                            ${q.explanation.reason}
                        </div>
                    </div>
                `;

                // 3. 选项全排雷分析 - 统一字号 text-sm md:text-base
                const optionsAnalysisSection = `
                    <div class="p-6 md:p-8 bg-[#FDFDFD] text-left">
                        <h4 class="text-sm font-black text-wolfDark uppercase tracking-widest mb-6 flex items-center gap-2">【各選択肢の分析】 Options Breakdown</h4>
                        <div class="space-y-4">
                            ${q.explanation.optionsAnalysis.map(opt => {
                                const isCorrect = opt.id === q.correctOption;
                                const badgeColor = isCorrect ? 'bg-wolfDark text-white border-wolfDark' : 'bg-gray-100 text-textSub border-gray-300';
                                const cardBorder = isCorrect ? 'border-wolfDark shadow-[4px_4px_0px_#171717] bg-white' : 'border-gray-200 bg-gray-50 opacity-80';
                                const titleColor = isCorrect ? 'text-wolfDark' : 'text-textSub';
                                return `
                                <div class="flex items-start border-[3px] p-4 md:p-5 ${cardBorder} transition-all">
                                    <span class="font-black ${badgeColor} border-[2px] px-3 py-1 shrink-0 mr-4 mt-0.5 rounded-sm shadow-sm">${opt.id}</span>
                                    <div>
                                        <div class="font-black ${titleColor} text-base md:text-lg mb-2">${opt.text}</div>
                                        <div class="text-sm md:text-base font-bold text-textSub leading-relaxed">${opt.analysis}</div>
                                    </div>
                                </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;

                return `
                    <div class="explanation-card flex-col mt-8 hidden bg-bgCard border-[4px] border-wolfDark shadow-[8px_8px_0px_#171717]">
                        ${translationSection}
                        ${reasoningSection}
                        ${optionsAnalysisSection}
                    </div>
                `;
            },

            generateQuestionHTML(q, index, total) {
                let optionsHtml = q.options.map(opt => `
                    <button class="grammar-option-btn flex items-center p-3.5 px-4 bg-white focus:outline-none text-left w-full transition-all" data-id="${opt.id}">
                        <span class="option-letter font-sans font-black mr-3 text-textSub bg-bgMain border-2 border-borderStrong px-2 py-0.5 rounded-sm shadow-[2px_2px_0px_#171717] shrink-0">${opt.id}</span>
                        <span class="text-base md:text-lg leading-relaxed font-bold">${opt.text}</span>
                    </button>
                `).join('');

                let questionText = q.question.replace(/（\s*）|____+|＿+/g, '<span class="inline-block min-w-[4em] border-b-[3px] border-wolfDark mx-2 translate-y-[-4px]"></span>');

                return `
                <div class="question-block fade-in" data-correct="${q.correctOption}">
                    <div class="neo-card p-6 md:p-8 relative overflow-hidden mb-6 shadow-[6px_6px_0px_#991B1B]" id="main-q-card">
                        <div class="flex items-center justify-between mb-8 border-b-[3px] border-borderStrong pb-4 relative z-10">
                            <span class="text-xs font-black bg-textMain text-white px-3 py-1.5 tracking-widest uppercase rounded-sm shadow-[2px_2px_0px_#171717] border-2 border-borderStrong">陣型 ${index + 1} / ${total}</span>
                            <span class="status-badge hidden px-4 py-1.5"></span>
                        </div>
                        
                        <div class="text-xl md:text-2xl font-serif-jp text-textMain mb-10 leading-loose md:leading-relaxed bg-bgMain p-6 border-[3px] border-borderStrong rounded-sm shadow-inner relative z-10 text-left">
                            ${questionText}
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-8 options-container relative z-10">
                            ${optionsHtml}
                        </div>

                        <div class="flex justify-end pt-6 border-t-[3px] border-borderMain action-area relative z-10">
                            <button class="submit-btn bg-wolfDark text-white border-[3px] border-borderStrong rounded-sm shadow-[4px_4px_0px_#991B1B] px-10 py-3.5 font-black text-sm uppercase tracking-widest transition-all hover:bg-wolfRed hover:-translate-y-1 hover:shadow-[5px_5px_0px_#171717] disabled:opacity-50 disabled:cursor-not-allowed" disabled>斬る (拔刀)</button>
                        </div>
                    </div>

                    <!-- 动态注入解析区域 -->
                    <div class="explanation-area">
                        ${this.buildExplanationHTML(q)}
                    </div>
                </div>
                `;
            }
        };

        window.app = app;
        app.init();

        document.getElementById('page-back-btn')?.addEventListener('click', () => app.handleHeaderBack());
        
        // Timer events
        document.getElementById('timer-toolbar-toggle-btn')?.addEventListener('click', () => app.toggleTimerRun());
        document.getElementById('timer-toolbar-reset-btn')?.addEventListener('click', () => app.resetTimerForPractice());
        document.getElementById('timer-toolbar-settings-btn')?.addEventListener('click', () => app.toggleTimerDrawer());
        document.getElementById('timer-drawer-close-btn')?.addEventListener('click', () => app.closeTimerDrawer());
        document.getElementById('practice-toolbar-backdrop')?.addEventListener('click', () => app.closeTimerDrawer());

        document.querySelectorAll('[data-timer-mode]').forEach(btn => btn.addEventListener('click', () => app.setTimerMode(btn.dataset.timerMode)));
        document.querySelectorAll('[data-timer-preset]').forEach(btn => btn.addEventListener('click', () => app.setTimerSelectedMinutes(btn.dataset.timerPreset)));
        document.getElementById('timer-custom-input')?.addEventListener('change', (e) => app.setTimerSelectedMinutes(e.target.value));
        
        document.getElementById('timer-drawer-start-btn')?.addEventListener('click', () => app.startTimer());
        document.getElementById('timer-drawer-pause-btn')?.addEventListener('click', () => app.pauseTimer());
        document.getElementById('timer-drawer-reset-btn')?.addEventListener('click', () => app.resetTimerForPractice());
        document.getElementById('timer-hide-btn')?.addEventListener('click', () => app.toggleTimerDisplayVisibility());
        
        // 连斩按钮事件绑定
        document.getElementById('random-toolbar-end-btn')?.addEventListener('click', () => app.finishRandomRound());

        // 答题区交互逻辑
        document.addEventListener('click', (e) => {
            const block = e.target.closest('.question-block');
            if (!block) return;

            const nextBtn = e.target.closest('.next-question-btn');
            if (nextBtn) {
                app.currentIndex++;
                app.renderPracticeQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }

            const submitBtn = block.querySelector('.submit-btn');
            if (!submitBtn) return;

            const optBtn = e.target.closest('.grammar-option-btn');
            if (optBtn && submitBtn.textContent.includes('斬る')) {
                block.querySelectorAll('.grammar-option-btn').forEach(btn => btn.classList.remove('selected'));
                optBtn.classList.add('selected');
                submitBtn.disabled = false;
                return;
            }

            if (e.target === submitBtn) {
                const selectedBtn = block.querySelector('.grammar-option-btn.selected');
                if (!selectedBtn) return;

                const selectedId = selectedBtn.dataset.id;
                const correctId = block.dataset.correct;
                const isCorrect = selectedId === correctId;
                const currentQuestion = app.questionQueue[app.currentIndex];

                if (isCorrect) app.stats.correct++;
                else app.stats.incorrect++;

                if (app.practiceMode === 'year' || app.practiceMode === 'mistake') {
                    let yearMistakes = getYearMistakes(app.currentLevel, app.currentYear);
                    if (!isCorrect) {
                        if (!yearMistakes.includes(currentQuestion.id)) yearMistakes.push(currentQuestion.id);
                    } else {
                        yearMistakes = yearMistakes.filter(id => id !== currentQuestion.id);
                    }
                    saveYearMistakes(app.currentLevel, app.currentYear, yearMistakes);
                }

                // 野性乱斗进度更新
                app.updateRandomProgressAfterAnswer(isCorrect);

                // === 视觉反馈处理 ===
                const badge = block.querySelector('.status-badge');
                const mainCard = block.querySelector('#main-q-card');
                badge.classList.remove('hidden');
                
                if (isCorrect) {
                    badge.textContent = '一撃必殺';
                    badge.className = 'status-badge bg-white text-wolfDark border-wolfDark shadow-[3px_3px_0px_#171717]';
                    selectedBtn.classList.add('correct-ans');
                } else {
                    const flash = document.createElement('div');
                    flash.className = 'screen-flash-wrong';
                    document.body.appendChild(flash);
                    setTimeout(() => flash.remove(), 400);

                    badge.textContent = '致命傷';
                    badge.className = 'status-badge bg-white text-wolfRed border-wolfRed shadow-[3px_3px_0px_#991B1B]';
                    mainCard.style.borderColor = 'var(--wolf-red)';
                    
                    selectedBtn.classList.add('wrong-ans');
                    const correctBtn = block.querySelector(`.grammar-option-btn[data-id="${correctId}"]`);
                    if (correctBtn) correctBtn.classList.add('missed-correct');
                }

                // 锁死其他选项
                block.querySelectorAll('.grammar-option-btn').forEach(btn => {
                    btn.style.pointerEvents = 'none';
                    if (!btn.classList.contains('selected') && !btn.classList.contains('missed-correct') && !btn.classList.contains('correct-ans')) {
                        btn.classList.add('opacity-40');
                    }
                });

                // 展开结构化解析面板
                const explanationCard = block.querySelector('.explanation-card');
                if (explanationCard) {
                    explanationCard.classList.remove('hidden');
                    explanationCard.classList.add('flex', 'fade-in');
                }

                const actionArea = block.querySelector('.action-area');
                actionArea.innerHTML = `<button class="next-question-btn bg-wolfDark text-white border-[3px] border-borderStrong px-10 py-3.5 font-black text-sm rounded-sm uppercase tracking-widest shadow-[4px_4px_0px_#991B1B] hover:bg-wolfRed hover:-translate-y-1 hover:shadow-[5px_5px_0px_#171717] transition-all">次の太刀 (NEXT)</button>`;
            }
        });
    </script>
</body>
</html>
