<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文法演習 - 鷹之視点道場</title>
    <link rel="stylesheet" href="../../shared/site-fonts.css">
    <link rel="stylesheet" href="./shared/grammar-header.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=Noto+Sans+SC:wght@500;700;900&family=Noto+Serif+JP:wght@600;900&family=Noto+Serif+SC:wght@600;900&display=swap" rel="stylesheet">
    <style>
        /* ==============================================================
           道场底座：强制锐利，移除所有圆角，保留刀剑切口般的干脆感
           ============================================================== */
        :root {
            --bg-main: #E6E2D8;        /* 道场木板/和纸底色 */
            --bg-card: #F7F6F2;        /* 纯净纸白 */
            --text-main: #0F0F0F;      /* 浓墨正文 */
            --text-sub: #3A3A3A;       /* 淡墨次要信息 */
            --accent-red: #A31010;     /* 朱红/血色 */
            --border-strong: #0F0F0F;  /* 重墨边框 */
            --border-light: #C2BBB2;   /* 纸痕/木纹 */
            
            --font-sans: "Noto Sans SC", "Noto Sans JP", sans-serif;
            --font-serif: "Noto Serif SC", "Noto Serif JP", "Songti SC", "SimSun", serif;
        }

        * {
            box-sizing: border-box;
            border-radius: 0px !important; /* 强制斩断圆角 */
        }

        body {
            margin: 0;
            min-height: 100vh;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-sans);
            display: flex;
            flex-direction: column;
            /* 道场木席的横竖纹理 */
            background-image: 
                repeating-linear-gradient(90deg, transparent, transparent 100px, rgba(15,15,15,0.015) 100px, rgba(15,15,15,0.015) 102px),
                repeating-linear-gradient(0deg, transparent, transparent 4px, rgba(15,15,15,0.025) 4px, rgba(15,15,15,0.025) 5px);
        }

        .page-shell {
            width: min(92%, 880px);
            margin: 0 auto;
            padding: 40px 0 60px;
        }

        /* 模块卡片（道场） */
        .group-card {
            background: var(--bg-card);
            border: 4px solid var(--border-strong);
            box-shadow: 8px 8px 0px rgba(15,15,15,0.9);
            padding: 36px 32px;
            margin-bottom: 40px;
            position: relative;
        }

        /* 卷轴角装饰 */
        .group-card::after {
            content: '';
            position: absolute;
            top: 6px; right: 6px;
            width: 14px; height: 14px;
            border-top: 4px solid var(--accent-red);
            border-right: 4px solid var(--accent-red);
            pointer-events: none;
        }

        .group-head {
            margin-bottom: 28px;
            border-bottom: 3px solid var(--border-strong);
            padding-bottom: 16px;
        }

        .group-title {
            margin: 0 0 8px;
            font-family: var(--font-serif);
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .group-title::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 24px;
            background-color: var(--accent-red);
        }

        .group-note {
            margin: 0;
            color: var(--text-sub);
            font-size: 14px;
            font-weight: 700;
            line-height: 1.7;
            letter-spacing: 0.05em;
        }

        .lesson-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 具体修习项目（木牌） */
        .lesson-item {
            background: var(--bg-card);
            padding: 20px 24px;
            border: 3px solid var(--border-strong);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            box-shadow: 4px 4px 0px var(--border-strong);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: var(--text-main);
            position: relative;
            overflow: hidden;
        }

        /* 悬停时的刀痕感 */
        .lesson-item::before {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: 0;
            width: 5px;
            background: var(--border-strong);
            transition: all 0.2s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .lesson-item:hover:not(.disabled) {
            border-color: var(--accent-red);
            box-shadow: 7px 7px 0px var(--accent-red);
            transform: translate(-3px, -3px);
            background: #FFFDFC;
        }

        .lesson-item:hover:not(.disabled)::before {
            background: var(--accent-red);
            width: 12px;
        }

        /* 未解锁状态，沉降感 */
        .lesson-item.disabled {
            opacity: 0.45;
            cursor: not-allowed;
            pointer-events: none;
            background-color: var(--bg-main);
            border-color: var(--border-light);
            box-shadow: none;
            transform: translate(4px, 4px);
        }

        .lesson-item.disabled::before {
            display: none;
        }

        .lesson-content {
            display: flex;
            align-items: center;
            gap: 20px;
            min-width: 0;
            z-index: 1; /* 保持在刀痕上方 */
        }

        /* 流派图标（印章风） */
        .lesson-icon {
            font-size: 20px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-weight: 900;
            font-family: var(--font-serif);
            border: 2px solid var(--border-strong);
            background: var(--bg-card);
            color: var(--text-main);
            box-shadow: 2px 2px 0px var(--border-strong);
        }

        /* 射箭特有红底 */
        .lesson-item:not(.disabled) .lesson-icon {
            background: var(--text-main);
            color: var(--bg-card);
        }

        .lesson-text {
            min-width: 0;
        }

        .lesson-text h3 {
            margin: 0 0 6px;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 0.05em;
        }

        .lesson-text p {
            margin: 0;
            font-size: 13px;
            color: var(--text-sub);
            line-height: 1.6;
            font-weight: 700;
        }

        /* 状态印鉴 */
        .lesson-tag {
            background: var(--bg-card);
            color: var(--text-main);
            border: 2px solid var(--border-strong);
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 900;
            flex-shrink: 0;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            box-shadow: 2px 2px 0px var(--border-strong);
        }

        .lesson-item:not(.disabled) .lesson-tag {
            background: var(--accent-red);
            color: var(--bg-card);
            border-color: var(--accent-red);
            box-shadow: 2px 2px 0px var(--border-strong);
        }

        footer {
            margin-top: auto;
            padding: 28px;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-sub);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        @media (max-width: 680px) {
            .page-shell {
                width: 100%;
                padding: 24px 16px 48px;
            }

            .group-card {
                padding: 24px 20px;
                border-width: 3px;
                box-shadow: 5px 5px 0px rgba(15,15,15,0.9);
            }

            .group-title {
                font-size: 22px;
            }

            .lesson-item {
                padding: 16px;
                border-width: 2px;
                box-shadow: 3px 3px 0px var(--border-strong);
            }

            .lesson-content {
                gap: 14px;
            }

            .lesson-icon {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }

            .lesson-text h3 {
                font-size: 16px;
            }

            .lesson-tag {
                padding: 4px 8px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
