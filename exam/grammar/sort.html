<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT 语法排序题 - 冲刺特训</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // 修复 ReferenceError: tailwind is not defined
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['"Noto Sans JP"', 'sans-serif'],
                        'serif-jp': ['"Noto Serif JP"', 'serif'],
                        'serif-sc': ['"Noto Serif SC"', 'serif'],
                    },
                    colors: {
                        bgMain: '#f2f1ec',
                        bgCard: '#f9f8f6',
                        textMain: '#2c2c2a',
                        textSub: '#555552',
                        textMuted: '#a0a09c',
                        borderMain: '#e5e5e0',
                        borderDark: '#d4d4d0',
                        accentRed: '#8a3324',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background-color: #f2f1ec;
            color: #2c2c2a;
        }
        .slot-filled { border-bottom-color: #2c2c2a !important; color: #2c2c2a !important; }
        .slot-star-filled { border-bottom-color: #8a3324 !important; color: #8a3324 !important; }
        .option-used { opacity: 0.4; pointer-events: none; background-color: #f0f0f0; border-color: #d4d4d0; }
        
        /* 视图切换及淡入动画 */
        .view-section { display: none; animation: fadeIn 0.3s ease-out; }
        .view-section.active { display: block; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .font-title-unified {
            font-family: "Noto Serif SC", "Noto Serif JP", serif;
            font-variant-east-asian: normal;
            letter-spacing: 0.02em;
            font-feature-settings: "palt";
        }

        .page-header {
            width: 100%;
            padding: 18px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            position: sticky;
            top: 0;
            background-color: rgba(253, 250, 245, 0.95);
            backdrop-filter: blur(8px);
            z-index: 100;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .back-btn {
            border: none;
            background: transparent;
            padding: 0;
            text-decoration: none;
            color: #2c2c2a;
            font-size: 15px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            opacity: 0.72;
            transition: opacity 0.25s, transform 0.25s;
            cursor: pointer;
            font-family: inherit;
        }

        .back-btn:hover {
            opacity: 1;
            transform: translateX(-2px);
        }

        .home-btn {
            margin-left: auto;
            text-decoration: none;
            color: #2c2c2a;
            font-size: 15px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            opacity: 0.72;
            transition: opacity 0.25s, transform 0.25s;
        }

        .home-btn:hover {
            opacity: 1;
            transform: translateX(2px);
        }

        .page-shell {
            width: min(100%, 1120px);
            margin: 0 auto;
            padding: 32px 16px 48px;
            box-sizing: border-box;
        }

        .selection-view-shell {
            width: min(100%, 700px);
            margin-left: auto;
            margin-right: auto;
        }

        .selection-view-hero {
            margin-top: 12px;
        }

        .selection-view-standard {
            margin-top: 16px;
        }

        #view-practice.has-bottom-toolbar #practice-question-container {
            padding-bottom: 164px;
        }

        .practice-bottom-toolbar {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1600;
            padding: 0 12px calc(env(safe-area-inset-bottom));
            display: none;
            pointer-events: none;
        }

        .practice-bottom-toolbar.is-visible {
            display: block;
        }

        .practice-toolbar-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(34, 34, 32, 0.1);
            backdrop-filter: blur(2px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .practice-bottom-toolbar.drawer-open .practice-toolbar-backdrop {
            opacity: 1;
            pointer-events: auto;
        }

        .practice-bottom-toolbar__inner {
            position: relative;
            max-width: 920px;
            margin: 0 auto;
            pointer-events: auto;
        }

        .practice-toolbar-slot {
            position: relative;
        }

        .practice-toolbar-slot[hidden] {
            display: none;
        }

        .practice-toolbar-main {
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 72px;
            padding: 12px 14px;
            border-top: 1px solid #d2d2d7;
            border-left: 1px solid rgba(210, 210, 215, 0.85);
            border-right: 1px solid rgba(210, 210, 215, 0.85);
            background: rgba(245, 245, 247, 0.96);
            backdrop-filter: blur(20px);
            box-shadow: 0 -1px 5px rgba(0, 0, 0, 0.02), 0 14px 30px rgba(0, 0, 0, 0.08);
            border-radius: 18px 18px 0 0;
        }

        .practice-toolbar-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .timer-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: #b9b9b3;
            box-shadow: 0 0 0 4px rgba(185, 185, 179, 0.16);
            transition: background 0.2s ease, box-shadow 0.2s ease;
        }

        .practice-toolbar-main[data-timer-status="running"] .timer-status-dot {
            background: #2e7d32;
            box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.14);
        }

        .practice-toolbar-main[data-timer-status="paused"] .timer-status-dot {
            background: #b16a17;
            box-shadow: 0 0 0 4px rgba(177, 106, 23, 0.14);
        }

        .practice-toolbar-main[data-timer-status="finished"] .timer-status-dot {
            background: #8a3324;
            box-shadow: 0 0 0 4px rgba(138, 51, 36, 0.12);
        }

        .practice-toolbar-main[data-timer-status="timeout"] .timer-status-dot {
            background: #b53a2f;
            box-shadow: 0 0 0 4px rgba(181, 58, 47, 0.14);
        }

        .practice-toolbar-label {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #2c2c2a;
            white-space: nowrap;
        }

        .practice-toolbar-time {
            flex: 1;
            min-width: 0;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: #2c2c2a;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.06em;
            white-space: nowrap;
        }

        .practice-toolbar-time.is-concealed {
            letter-spacing: 0.18em;
            color: #8a8a84;
        }

        .timer-action-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .timer-toolbar-btn,
        .timer-chip-btn,
        .timer-control-btn,
        .timer-hide-btn,
        .timer-drawer-close {
            border: 1px solid #d2d2d7;
            background: #fff;
            color: #2c2c2a;
            border-radius: 999px;
            font-size: 0.76rem;
            font-weight: 700;
            line-height: 1;
            white-space: nowrap;
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, color 0.2s ease, opacity 0.2s ease;
        }

        .timer-toolbar-btn,
        .timer-control-btn,
        .timer-hide-btn {
            padding: 9px 12px;
        }

        .timer-chip-btn {
            padding: 8px 11px;
        }

        .timer-drawer-close {
            width: 30px;
            height: 30px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
        }

        .timer-toolbar-btn:hover,
        .timer-chip-btn:hover,
        .timer-control-btn:hover,
        .timer-hide-btn:hover,
        .timer-drawer-close:hover {
            transform: translateY(-1px);
            border-color: #b9b9b3;
        }

        .timer-toolbar-btn:disabled,
        .timer-chip-btn:disabled,
        .timer-control-btn:disabled,
        .timer-hide-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        .timer-toolbar-btn.is-primary,
        .timer-chip-btn.is-selected,
        .timer-control-btn.is-primary,
        .timer-hide-btn.is-selected {
            background: #2c2c2a;
            border-color: #2c2c2a;
            color: #fff;
        }

        .timer-drawer {
            position: absolute;
            right: 0;
            bottom: calc(100% + 12px);
            width: min(420px, calc(100vw - 24px));
            padding: 14px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.12);
            box-sizing: border-box;
        }

        .timer-drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }

        .timer-drawer-title {
            font-size: 0.92rem;
            font-weight: 700;
            color: #2c2c2a;
            letter-spacing: 0.04em;
        }

        .timer-drawer-display {
            width: 100%;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid rgba(44, 44, 42, 0.08);
            background: #f7f6f2;
            color: #2c2c2a;
            font-size: 1.08rem;
            font-weight: 700;
            text-align: center;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.08em;
            box-sizing: border-box;
        }

        .timer-drawer-section {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .timer-drawer-label {
            width: 100%;
            font-size: 0.73rem;
            color: #8a8a84;
            letter-spacing: 0.04em;
        }

        .timer-chip-row,
        .timer-control-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            width: 100%;
        }

        .timer-custom-wrap {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 34px;
            padding: 0 10px;
            border-radius: 999px;
            border: 1px solid #d2d2d7;
            background: #fff;
            color: #555552;
            font-size: 0.74rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .timer-custom-input {
            width: 56px;
            border: none;
            background: transparent;
            color: #2c2c2a;
            text-align: center;
            font-size: 0.76rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .timer-custom-input:focus {
            outline: none;
        }

        .timer-status-text {
            min-height: 18px;
            margin-top: 12px;
            font-size: 0.74rem;
            line-height: 1.5;
            color: #8a8a84;
        }

        .timer-status-text.is-warning {
            color: #b16a17;
        }

        .timer-status-text.is-danger {
            color: #b53a2f;
        }

        .random-toolbar-main {
            gap: 14px;
        }

        .random-toolbar-summary {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
            justify-content: center;
        }

        .random-toolbar-metric {
            min-width: 76px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .random-toolbar-metric-label {
            font-size: 0.72rem;
            color: #8a8a84;
            letter-spacing: 0.08em;
            white-space: nowrap;
        }

        .random-toolbar-metric-value {
            font-size: 1.05rem;
            font-weight: 700;
            color: #2c2c2a;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        .random-target-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            flex-shrink: 0;
        }

        .random-target-btn {
            min-width: 44px;
            justify-content: center;
        }

        @media (min-width: 768px) {
            .page-shell {
                padding: 40px 32px 56px;
            }

            .selection-view-hero {
                margin-top: 8px;
            }

            .selection-view-standard {
                margin-top: 12px;
            }

            #view-practice.has-bottom-toolbar #practice-question-container {
                padding-bottom: 196px;
            }

            .practice-bottom-toolbar {
                padding-left: 20px;
                padding-right: 20px;
            }

            .practice-toolbar-main {
                border-radius: 18px 18px 0 0;
                min-height: 76px;
                padding: 14px 18px;
            }
        }

        @media (max-width: 767px) {
            .practice-toolbar-main {
                flex-wrap: wrap;
                gap: 10px;
                padding: 12px 12px 14px;
            }

            .practice-toolbar-meta {
                width: calc(50% - 6px);
            }

            .practice-toolbar-time {
                width: calc(50% - 6px);
                text-align: right;
                font-size: 1.08rem;
            }

            .timer-action-group {
                width: 100%;
                justify-content: space-between;
            }

            .timer-toolbar-btn,
            .random-target-btn {
                flex: 1;
                justify-content: center;
            }

            .timer-drawer {
                left: 0;
                right: 0;
                width: auto;
                bottom: calc(100% + 10px);
                border-radius: 18px;
            }

            .random-toolbar-main {
                flex-wrap: wrap;
                gap: 10px;
                padding: 12px 12px 14px;
            }

            .random-toolbar-summary {
                width: calc(50% - 6px);
                justify-content: flex-start;
                gap: 10px;
            }

            .random-toolbar-metric {
                min-width: 64px;
                align-items: flex-start;
            }

            .random-target-group {
                width: calc(50% - 6px);
                justify-content: flex-end;
            }
        }
    </style>
    <link rel="stylesheet" href="../../shared/site-fonts.css">
</head>
<body class="font-sans antialiased min-h-screen">

    <header class="page-header">
        <button type="button" id="page-back-btn" class="back-btn">← 戻る</button>
        <a href="../../index.html" class="home-btn">ホーム</a>
    </header>

    <div class="page-shell">
    <div class="max-w-4xl mx-auto">
        
        <!-- ================= 1. 引导页 - 选择级别 ================= -->
        <div id="view-level-select" class="view-section active selection-view-shell selection-view-hero">
            <div class="text-center mb-10">
                <div class="inline-block bg-textMain text-white px-3 py-1 text-xs font-bold tracking-widest rounded-sm mb-4">JLPT PREPARATION</div>
                <h1 class="text-3xl md:text-4xl font-title-unified font-bold text-textMain tracking-[0.04em] mb-4 leading-[1.2]">文法：並べ替え特訓</h1>
                <p class="text-textSub tracking-wider">请选择你正在备考的级别</p>
            </div>

            <div class="flex flex-col md:flex-row justify-center gap-4 mb-6">
                <button onclick="app.selectLevel('N1')" class="flex-1 bg-white border-2 border-borderMain hover:border-textMain rounded-lg py-8 px-6 transition-all hover:shadow-md focus:outline-none flex flex-col items-center group relative overflow-hidden">
                    <div class="absolute top-0 right-0 bg-accentRed text-white text-[0.6rem] font-bold px-3 py-1 rounded-bl-lg tracking-widest">HOT</div>
                    <span class="text-4xl font-bold font-sans text-textMain mb-2 group-hover:scale-110 transition-transform">N1</span>
                    <span class="text-sm text-textSub tracking-widest">高级水平</span>
                </button>
                <button onclick="app.selectLevel('N2')" class="flex-1 bg-white border-2 border-borderMain hover:border-textMain rounded-lg py-8 px-6 transition-all hover:shadow-md focus:outline-none flex flex-col items-center group">
                    <span class="text-4xl font-bold font-sans text-textMain mb-2 group-hover:scale-110 transition-transform">N2</span>
                    <span class="text-sm text-textSub tracking-widest">中高级水平</span>
                </button>
                <button onclick="app.selectLevel('N3')" class="flex-1 bg-white border-2 border-borderMain hover:border-textMain rounded-lg py-8 px-6 transition-all hover:shadow-md focus:outline-none flex flex-col items-center group">
                    <span class="text-4xl font-bold font-sans text-textMain mb-2 group-hover:scale-110 transition-transform">N3</span>
                    <span class="text-sm text-textSub tracking-widest">中级水平</span>
                </button>
            </div>

            <!-- 全级别乱序练习入口 -->
            <div class="mt-6">
                <button onclick="app.startGlobalRandomPractice()" class="w-full group bg-white border-2 border-borderMain hover:border-textMain rounded-lg p-5 transition-all hover:shadow-md focus:outline-none flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-bgMain rounded-md flex items-center justify-center group-hover:bg-textMain group-hover:text-white transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5" aria-hidden="true"><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></svg>
                        </div>
                        <div class="text-left">
                            <h3 class="text-lg font-title-unified font-bold text-textMain tracking-[0.02em] leading-[1.25]">全级别乱序特訓</h3>
                            <p class="text-xs text-textSub mt-1 tracking-wider">混合题库中 N1~N3 所有题目进行随机练习</p>
                        </div>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-borderDark group-hover:text-textMain transition-colors" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
                </button>
            </div>
        </div>

        <!-- ================= 2. 引导页 - 选择模式 ================= -->
        <div id="view-mode-select" class="view-section selection-view-shell selection-view-standard">
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-textMain tracking-widest flex items-center gap-2">
                    <span id="display-selected-level" class="bg-textMain text-white px-2 py-0.5 rounded text-lg">N?</span> 模式选择
                </h2>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- 按年份刷题 -->
                <button onclick="app.showYearList()" class="group text-left bg-white border-2 border-borderMain hover:border-textMain rounded-lg p-6 md:p-8 transition-all hover:shadow-md relative overflow-hidden focus:outline-none flex flex-col items-start justify-start">
                    <div class="absolute top-0 right-0 w-24 h-24 bg-bgMain rounded-bl-full -z-10 group-hover:bg-gray-100 transition-colors"></div>
                    <div class="w-12 h-12 bg-bgCard border border-borderMain rounded-md flex items-center justify-center mb-5 group-hover:scale-110 transition-transform shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-textMain" aria-hidden="true"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
                    </div>
                    <h3 class="text-xl font-bold text-textMain mb-2 tracking-wider">按年份刷题</h3>
                    <p class="text-sm text-textSub leading-relaxed">历年真题分类。适合考前冲刺，一年一年稳扎稳打地进行套卷练习。</p>
                </button>

                <!-- 随机乱序 -->
                <button onclick="app.startRandomPractice()" class="group text-left bg-white border-2 border-borderMain hover:border-accentRed rounded-lg p-6 md:p-8 transition-all hover:shadow-md relative overflow-hidden focus:outline-none flex flex-col items-start justify-start">
                    <div class="absolute top-0 right-0 w-24 h-24 bg-red-50 rounded-bl-full -z-10 group-hover:bg-red-100 transition-colors"></div>
                    <div class="w-12 h-12 bg-red-50 border border-red-100 rounded-md flex items-center justify-center mb-5 group-hover:scale-110 transition-transform shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-accentRed" aria-hidden="true"><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></svg>
                    </div>
                    <h3 class="text-xl font-bold text-accentRed mb-2 tracking-wider">随机乱序</h3>
                    <p class="text-sm text-textSub leading-relaxed">从当前级别的题库中随机抽取题目。适合日常碎片化时间查漏补缺，防止死记硬背。</p>
                </button>
            </div>
        </div>

        <!-- ================= 3. 引导页 - 选择年份真题 ================= -->
        <div id="view-year-select" class="view-section selection-view-shell selection-view-standard">
            <div id="year-review-section" class="hidden mb-5 border border-yellow-200 bg-[#fffdf5] rounded-lg px-4 py-4 md:px-5 md:py-4 shadow-sm">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-2 border-b border-yellow-100 pb-2">
                    <div class="text-lg font-title-unified font-bold text-yellow-800 tracking-[0.04em]">🐶 错题回顾</div>
                </div>
                <div id="year-review-grid" class="mt-3 flex flex-wrap gap-3">
                    <!-- JS 动态注入错题年份按钮 -->
                </div>
            </div>

            <div id="year-list-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-5">
                <!-- JS 动态注入年份卡片 -->
            </div>
        </div>

        <!-- ================= 4. 练习界面 (核心做题区) ================= -->
        <div id="view-practice" class="view-section">
            <header class="mb-8 border-b border-borderDark pb-4">
                <div>
