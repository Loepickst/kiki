                                <h4 class="text-xs text-textMain font-black uppercase tracking-widest mb-3">【正确排序】 Reconstruction Data</h4>
                                <div class="text-textMain text-base md:text-lg font-serif-jp tracking-wider leading-loose bg-bgMain p-4 border-2 border-borderStrong">
                                    ${this.buildCorrectOrderMarkup(q)}
                                </div>
                            </div>
                            <div>
                                <h4 class="text-xs text-textMain font-black uppercase tracking-widest mb-3">【逻辑拆解】 Logic Analysis</h4>
                                <div class="space-y-3 text-sm md:text-base text-textSub leading-loose font-bold">
                                    ${q.explanation}
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            },

            openChallengeAnalysisView() {
                if (this.trainingMode !== 'challenge') return;
                const container = document.getElementById('practice-question-container');
                if (!container) return;
                const subtitleEl = document.getElementById('practice-subtitle');
                document.getElementById('practice-title').textContent = '统一解析';
                if (subtitleEl) {
                    subtitleEl.textContent = '挑战模式已完成，以下是整套题目的统一解析。';
                }
                container.innerHTML = `
                    <div class="bg-white border-[4px] border-borderStrong p-8 md:p-10 shadow-[8px_8px_0px_#0F0F0F] fade-in">
                        <div class="text-center border-b-[4px] border-borderStrong pb-6 mb-8">
                            <h2 class="text-3xl font-title-unified font-black text-textMain tracking-[0.1em] uppercase">统一解析</h2>
                            <p class="mt-3 text-sm font-bold text-textSub tracking-wider">挑战模式下的整套解析会在结算之后统一展开。</p>
                        </div>
                        <div class="space-y-6">
                            ${this.buildChallengeExplanationCards()}
                        </div>
                        <div class="mt-8 flex flex-wrap justify-center gap-3">
                            <button onclick="app.renderPracticeQuestion()" class="px-5 py-3 bg-white text-textMain border-3 border-borderStrong shadow-[4px_4px_0px_#0F0F0F] text-sm tracking-widest font-black hover:bg-bgMain hover:translate-x-[-2px] hover:translate-y-[-2px] hover:shadow-[6px_6px_0px_#A31010] hover:border-accentGold transition-all uppercase">返回结算</button>
                            <button onclick="app.restartCurrentPractice()" class="px-5 py-3 bg-textMain text-white border-3 border-borderStrong shadow-[4px_4px_0px_#0F0F0F] text-sm tracking-widest font-black hover:bg-accentRed hover:border-accentRed hover:translate-x-[-2px] hover:translate-y-[-2px] hover:shadow-[6px_6px_0px_#0F0F0F] transition-all uppercase">再挑战一轮</button>
                        </div>
                    </div>
                `;
            },

            // 渲染做题界面
            renderPracticeQuestion() {
                const container = document.getElementById('practice-question-container');
                container.innerHTML = ''; 
                
                const headerTitle = this.currentLevel === 'ALL'
                    ? '全级别乱序特訓'
                    : `[${this.currentLevel}] ${this.currentYear}${this.practiceMode === 'mistake' ? '（错题回顾）' : ''}`;
                document.getElementById('practice-title').textContent = headerTitle;
                const subtitleEl = document.getElementById('practice-subtitle');
                if (subtitleEl) {
                    subtitleEl.textContent = this.trainingMode === 'challenge'
                        ? `挑战模式 · 倒计时 ${this.timer.selectedMinutes} 分 · 做完整套后统一看解析`
                        : '学习模式 · 点击选项填入序号，点击横线可取消已选，提交后看解析';
                }

                if (this.currentIndex >= this.questionQueue.length) {
                    updateGrammarPracticeTestTools(false);
                    if (this.trainingMode === 'challenge') {
                        this.finalizeTimerForResult({ timedOut: this.timer.timeoutTriggered });
                    } else {
                        this.stopTimer();
                        this.setPracticeToolbarMode(null);
                        this.closeTimerDrawer({ skipUpdate: true });
                    }
                    const restartAction = 'app.restartCurrentPractice()';

                    const totalQ = this.stats.correct + this.stats.incorrect;
                    const reward = this.trainingMode === 'challenge' ? ensureGrammarRewardResult() : null;
                    const drawAffordance = this.trainingMode === 'challenge' ? buildGrammarDrawMarkup(reward) : '';

                    let completeMsg = '';
                    if (this.practiceMode === 'year') {
                        completeMsg = `你已经完成了 <strong class="text-textMain">${headerTitle}</strong> 的 ${totalQ} 道特训。<br>未全对的题目已自动加入【错题回顾】。`;
                    } else if (this.practiceMode === 'mistake') {
                        completeMsg = `你已经完成了 <strong class="text-textMain">[${this.currentLevel}] ${this.currentYear}</strong> 的错题回顾。<br>全对的题目已自动移出待复习列表。`;
                    } else {
                        completeMsg = `你已经完成了 <strong class="text-textMain">${headerTitle}</strong> 的 ${totalQ} 道特训。<br><span class="text-xs text-textMuted">（注：随机练习模式不单独记录错题）</span>`;
                    }
                    dispatchGrammarPracticeState(this.stats.incorrect === 0 ? 'perfect_clear' : 'clear', {
                        isCorrect: true,
                        streak: this.randomBestStreak,
                        questionIndex: this.questionQueue.length,
                        questionCount: this.questionQueue.length,
                        accuracy: totalQ > 0 ? this.stats.correct / totalQ : 0
                    });

                    const timerSummaryHtml = this.trainingMode === 'challenge' ? `
                        <div class="max-w-xs mx-auto mb-8 bg-white border-[4px] border-borderStrong px-4 py-4 shadow-[6px_6px_0px_#0F0F0F]">
                            <div class="text-xs font-black tracking-[0.18em] text-textSub uppercase">Execution Time</div>
                            <div class="mt-2 text-3xl font-black text-textMain font-sans tracking-[0.08em]">${this.getResultTimerText()}</div>
                            ${this.timer.resultTimeout ? '<p class="mt-3 text-sm font-black text-accentRed">时限已到，任务强行终止。</p>' : ''}
                        </div>
                    ` : '';

                    const randomSummaryHtml = this.practiceMode === 'random' ? `
                        <div class="max-w-sm mx-auto mb-8 bg-white border-[4px] border-borderStrong px-5 py-4 shadow-[6px_6px_0px_#0F0F0F]">
                            <div class="grid grid-cols-2 gap-4 text-center">
                                <div>
                                    <div class="text-xs font-black tracking-[0.18em] text-textSub uppercase">Scanned Targets</div>
                                    <div class="mt-2 text-3xl font-black text-textMain font-sans">${this.randomRoundTarget}</div>
                                </div>
                                <div>
                                    <div class="text-xs font-black tracking-[0.18em] text-textSub uppercase">Max Combo</div>
                                    <div class="mt-2 text-3xl font-black text-textMain font-sans">${this.randomBestStreak}</div>
                                </div>
                            </div>
                        </div>
                    ` : '';

                    container.innerHTML = `
                        <div class="text-center bg-white border-[4px] border-borderStrong p-8 md:p-12 shadow-[8px_8px_0px_#0F0F0F] fade-in relative">
                            <div class="w-16 h-16 bg-textMain border-2 border-borderStrong text-bgMain flex items-center justify-center mx-auto mb-4 shadow-[3px_3px_0px_#0F0F0F]">
                                ${getIconSvg('check-circle', 'w-8 h-8')}
                            </div>
                            <div class="lab-result-heading-row mb-6">
                                <h2 class="text-3xl font-black text-textMain uppercase italic tracking-[0.1em]">评估完成</h2>
                                ${drawAffordance}
                            </div>
                            
                            <div class="flex justify-center gap-8 mb-8 border-y-4 border-borderStrong py-6 bg-bgMain max-w-sm mx-auto">
                                <div class="text-center w-24">
                                    <div class="text-4xl font-black text-textMain mb-2 font-sans">${this.stats.correct}</div>
                                    <div class="text-xs text-white tracking-widest font-black border-2 border-borderStrong bg-textMain py-1 px-2 uppercase shadow-[2px_2px_0px_#0F0F0F]">星号正确</div>
                                </div>
                                <div class="text-center w-24">
                                    <div class="text-4xl font-black text-accentRed mb-2 font-sans">${this.stats.incorrect}</div>
                                    <div class="text-xs text-white tracking-widest font-black border-2 border-borderStrong bg-accentRed py-1 px-2 uppercase shadow-[2px_2px_0px_#0F0F0F]">星号错误</div>
                                </div>
                            </div>

                            ${timerSummaryHtml}
                            ${randomSummaryHtml}

                            <p class="text-textSub mb-8 text-sm font-bold leading-relaxed">${completeMsg}</p>
                            
                            <div class="flex flex-wrap justify-center gap-3">
                                ${this.trainingMode === 'challenge' ? '<button onclick="app.openChallengeAnalysisView()" class="px-6 py-3 bg-white text-textMain border-3 border-borderStrong shadow-[4px_4px_0px_#0F0F0F] text-sm tracking-widest font-black hover:bg-bgMain hover:translate-x-[-2px] hover:translate-y-[-2px] hover:shadow-[6px_6px_0px_#A31010] hover:border-accentGold transition-all uppercase">查看解析</button>' : ''}
                                <button onclick="${restartAction}" class="px-6 py-3 bg-textMain text-white border-3 border-borderStrong shadow-[4px_4px_0px_#0F0F0F] text-sm tracking-widest font-black hover:bg-accentRed hover:border-accentRed hover:translate-x-[-2px] hover:translate-y-[-2px] hover:shadow-[6px_6px_0px_#0F0F0F] transition-all uppercase">${this.trainingMode === 'challenge' ? '再挑战一轮' : '再学习一轮'}</button>
                                <button onclick="app.handleBackFromPractice()" class="px-6 py-3 bg-white text-textMain border-3 border-borderStrong shadow-[4px_4px_0px_#0F0F0F] text-sm tracking-widest font-black hover:bg-bgMain hover:translate-x-[-2px] hover:translate-y-[-2px] hover:shadow-[6px_6px_0px_#A31010] hover:border-accentGold transition-all uppercase">返回上一级</button>
                            </div>
                        </div>
                    `;
                    return;
                }

                // 渲染当前题目
                updateGrammarPracticeTestTools(true);
                const q = this.questionQueue[this.currentIndex];
                container.innerHTML = this.generateQuestionHTML(q, this.currentIndex, this.questionQueue.length);
                this.updateTimerUI();
                if (this.currentIndex === 0) {
                    dispatchGrammarPracticeState('enter', { questionIndex: 1, questionCount: this.questionQueue.length });
                } else if (this.currentIndex === this.questionQueue.length - 1) {
                    dispatchGrammarPracticeState('near_clear', { questionIndex: this.questionQueue.length, questionCount: this.questionQueue.length });
                }
            },

            // 生成题目的 HTML 模板
            generateQuestionHTML(q, index, total) {
                // 生成横线槽
                let slotsHtml = '';
                for(let i=0; i<4; i++) {
                    if (i === q.starIndex) {
                        slotsHtml += `
                            <button class="sort-slot star-slot w-10 h-10 border-b-[4px] border-accentGold/50 text-xl font-black font-sans text-accentGold hover:border-accentGold focus:outline-none transition-colors relative" data-index="${i}">
                                <span class="slot-text"></span>
                                <span class="absolute -top-4 left-1/2 -translate-x-1/2 text-[0.6rem] text-accentGold font-black uppercase tracking-widest">Target</span>
                            </button>
                        `;
                    } else {
                        slotsHtml += `
                            <button class="sort-slot w-10 h-10 border-b-[4px] border-textMuted text-xl font-black font-sans text-textMuted hover:border-textMain focus:outline-none transition-colors relative" data-index="${i}">
                                <span class="slot-text"></span>
                            </button>
                        `;
                    }
                }

                // 生成选项
                let optionsHtml = '';
                q.options.forEach(opt => {
                    optionsHtml += `
                        <button class="sort-option-btn flex items-center py-3 px-4 bg-white focus:outline-none text-left w-full transition-all" data-id="${opt.id}">
                            <span class="option-letter font-sans font-black mr-3 text-textMain shrink-0 bg-glacierGray border-2 border-borderStrong px-2 py-0.5 shadow-[2px_2px_0px_#0F0F0F]">${opt.id}</span>
                            <span class="leading-relaxed font-black text-textMain text-base md:text-lg">${opt.text}</span>
                        </button>
                    `;
                });

                // 生成正确排序展示字符串 (用于解析)
                let correctOrderStrHtml = '';
                q.correctOrder.forEach((id, idx) => {
                    const optText = q.options.find(o => o.id === id).text; 
                    
                    if(idx === q.starIndex) {
                        correctOrderStrHtml += `<span class="inline-block border-[2px] border-borderStrong px-2 py-0.5 text-xs mr-1 text-white bg-accentGold font-sans align-middle font-black shadow-[2px_2px_0px_#0F0F0F]">★ ${id}</span><strong class="text-accentGold align-middle">${optText}</strong>`;
                    } else {
                        correctOrderStrHtml += `<span class="inline-block border-[2px] border-borderStrong px-2 py-0.5 bg-white text-xs mr-1 text-textMain font-sans align-middle font-black shadow-[2px_2px_0px_#0F0F0F]">${id}</span><span class="align-middle font-bold">${optText}</span>`;
                    }
                    if(idx < 3) correctOrderStrHtml += ` ${getIconSvg('arrow-right', 'w-4 h-4 inline-block text-borderDark mx-1 align-middle')} `;
                });

                let qLabel = '';
                if (this.practiceMode === 'year') {
                    qLabel = q.label;
                } else if (this.practiceMode === 'mistake') {
                    qLabel = `[${q.year}] ${q.label}`;
                } else if (this.currentLevel === 'ALL') {
                    qLabel = `[${q.level}] Q${index + 1}`;
                } else {
                    qLabel = `Q${index + 1}`;
                }

                return `
                <div class="flex flex-col gap-3 md:gap-4 question-block mb-8 fade-in" data-correct-order="${q.correctOrder.join(',')}" data-star-index="${q.starIndex}">
                    <div class="bg-bgCard p-6 md:p-8 border-[4px] border-borderStrong shadow-[8px_8px_0px_#0F0F0F] relative overflow-hidden">
                        <div class="flex items-center justify-between mb-6 border-b-[3px] border-borderDark pb-4">
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-black text-white bg-textMain px-2.5 py-1 uppercase tracking-widest border border-borderStrong shadow-[2px_2px_0px_#0F0F0F]">${qLabel}</span>
                                <span class="text-xs text-textSub font-sans tracking-widest font-bold">(${index + 1}/${total})</span>
                            </div>
                            <span class="status-badge hidden"></span>
                        </div>
                        
                        <div class="text-textMain font-serif-jp text-xl md:text-2xl font-black mb-8 leading-loose md:leading-relaxed bg-white p-5 md:p-6 border-[4px] border-borderStrong shadow-[5px_5px_0px_#0F0F0F]">
                            ${q.prefix}
                            <span class="inline-flex items-end gap-3 mx-2 align-middle translate-y-[2px] md:translate-y-[-2px]">
                                ${slotsHtml}
                            </span>
                            ${q.suffix}
                        </div>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-y-4 gap-x-5 font-serif-jp mb-8">
                            ${optionsHtml}
                        </div>

                        <div class="flex justify-end border-t-[3px] border-borderMain pt-5 action-area">
                            <button class="submit-btn text-white px-6 py-3 text-sm tracking-widest disabled:opacity-50 disabled:cursor-not-allowed uppercase" disabled>提交答案</button>
                        </div>
                    </div>

                    <div class="explanation-area hidden p-6 md:p-8 flex-col">
                        <div class="space-y-6 md:space-y-8">
                            <div>
                                <h4 class="text-xs text-textMain font-black uppercase tracking-widest mb-4">【正确排序】 Reconstruction Data</h4>
                                <div class="text-textMain text-base md:text-lg font-serif-jp tracking-wider leading-loose bg-bgMain p-4 border-2 border-borderStrong">
                                    ${correctOrderStrHtml}
                                </div>
                            </div>
                            <div>
                                <h4 class="text-xs text-textMain font-black uppercase tracking-widest mb-4">【逻辑拆解】 Logic Analysis</h4>
                                <div class="space-y-3 text-sm md:text-base text-textSub leading-loose font-bold">
                                    ${q.explanation}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }
        };

        window.app = app;

        // 页面加载完毕执行初始化
        app.init();
        app.updateTimerUI();

        document.getElementById('page-back-btn')?.addEventListener('click', () => {
            app.handleHeaderBack();
        });

        document.getElementById('timer-toolbar-toggle-btn')?.addEventListener('click', () => {
            app.toggleTimerRun();
        });

        document.getElementById('timer-toolbar-reset-btn')?.addEventListener('click', () => {
            app.resetTimer();
        });

        document.getElementById('timer-toolbar-settings-btn')?.addEventListener('click', () => {
            app.toggleTimerDrawer();
        });

        document.getElementById('timer-drawer-close-btn')?.addEventListener('click', () => {
            app.closeTimerDrawer();
        });

        document.getElementById('practice-toolbar-backdrop')?.addEventListener('click', () => {
            app.closeTimerDrawer();
        });

        document.querySelectorAll('[data-timer-mode]').forEach(button => {
            button.addEventListener('click', () => {
                app.setTimerMode(button.dataset.timerMode);
            });
        });

        document.querySelectorAll('[data-timer-preset]').forEach(button => {
            button.addEventListener('click', () => {
                app.setTimerSelectedMinutes(button.dataset.timerPreset);
            });
        });

        document.getElementById('timer-custom-input')?.addEventListener('input', (event) => {
            app.setTimerSelectedMinutes(event.target.value);
        });

        document.getElementById('timer-custom-input')?.addEventListener('change', (event) => {
            app.setTimerSelectedMinutes(event.target.value);
        });

        document.getElementById('timer-drawer-start-btn')?.addEventListener('click', () => {
            app.startTimer();
        });

        document.getElementById('timer-drawer-pause-btn')?.addEventListener('click', () => {
            app.pauseTimer();
        });

        document.getElementById('timer-drawer-reset-btn')?.addEventListener('click', () => {
            app.resetTimer();
        });

        document.getElementById('timer-hide-btn')?.addEventListener('click', () => {
            app.toggleTimerDisplayVisibility();
        });

        document.getElementById('random-toolbar-end-btn')?.addEventListener('click', () => {
            app.finishRandomRound();
        });

        document.querySelectorAll('[data-training-mode]').forEach(button => {
            button.addEventListener('click', () => {
                app.setTrainingPickerMode(button.dataset.trainingMode);
            });
        });

        document.querySelectorAll('[data-training-minutes]').forEach(button => {
            button.addEventListener('click', () => {
                app.setTrainingPickerMinutes(button.dataset.trainingMinutes);
            });
        });

        document.querySelectorAll('[data-training-random-target]').forEach(button => {
            button.addEventListener('click', () => {
                app.setRandomTargetCount(button.dataset.trainingRandomTarget);
            });
        });

        document.getElementById('training-mode-custom-input')?.addEventListener('input', (event) => {
            app.setTrainingPickerMinutes(event.target.value);
        });

        document.getElementById('training-mode-custom-input')?.addEventListener('change', (event) => {
            app.setTrainingPickerMinutes(event.target.value);
        });

        document.getElementById('training-mode-cancel-btn')?.addEventListener('click', () => {
            app.closeTrainingModePicker();
        });

        document.getElementById('training-mode-confirm-btn')?.addEventListener('click', () => {
            app.confirmTrainingModePicker();
        });

        document.getElementById('training-mode-overlay')?.addEventListener('click', (event) => {
            if (event.target && event.target.id === 'training-mode-overlay') {
                app.closeTrainingModePicker();
            }
        });

        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && app.timer.drawerOpen) {
                app.closeTimerDrawer();
                return;
            }
            if (event.key === 'Escape' && app.trainingPicker.open) {
                app.closeTrainingModePicker();
            }
        });

        // --- 3. 全局事件委托 (处理填空与交互) ---
        document.addEventListener('click', (e) => {
            const block = e.target.closest('.question-block');
            if (!block) return;

            // 优先判断“下一题”按钮的点击
            const nextQuestionBtn = e.target.closest('.next-question-btn');
            if (nextQuestionBtn) {
                app.currentIndex++;
                app.renderPracticeQuestion();
                
                // 进入下一题时，平滑滚动回顶部，聚焦新题目
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }

            const slots = Array.from(block.querySelectorAll('.sort-slot'));
            const options = Array.from(block.querySelectorAll('.sort-option-btn'));
            const submitBtn = block.querySelector('.submit-btn');
            if(!submitBtn) return; 

            // 1. 点击选项 -> 填入横线
            const optBtn = e.target.closest('.sort-option-btn');
            if (optBtn && !optBtn.classList.contains('option-used') && submitBtn.textContent === '提交答案') {
                const val = optBtn.dataset.id;
                const emptySlot = slots.find(s => !s.dataset.val);
                if (emptySlot) {
                    emptySlot.dataset.val = val;
                    emptySlot.querySelector('.slot-text').textContent = val;
                    emptySlot.classList.add(emptySlot.classList.contains('star-slot') ? 'slot-star-filled' : 'slot-filled');
                    optBtn.classList.add('option-used');
                    submitBtn.disabled = !slots.every(slot => slot.dataset.val);
                }
                return;
            }

            // 2. 点击横线 -> 取消填入
            const slotBtn = e.target.closest('.sort-slot');
            if (slotBtn && slotBtn.dataset.val && submitBtn.textContent === '提交答案') {
                const val = slotBtn.dataset.val;
                slotBtn.removeAttribute('data-val');
                slotBtn.querySelector('.slot-text').textContent = '';
                slotBtn.classList.remove('slot-filled', 'slot-star-filled');
                
                const targetOpt = options.find(o => o.dataset.id === val);
                if (targetOpt) targetOpt.classList.remove('option-used');
                submitBtn.disabled = true;
                return;
            }

            // 3. 点击提交按钮
            if (e.target === submitBtn) {
                const currentOrder = slots.map(slot => slot.dataset.val);
                const correctOrder = block.dataset.correctOrder.split(',');
                const starIndex = parseInt(block.dataset.starIndex);
                const isStarCorrect = currentOrder[starIndex] === correctOrder[starIndex];
                const isAllCorrect = currentOrder.join(',') === correctOrder.join(',');

                // 获取当前正在做的这道题的数据对象
                const currentQuestion = app.questionQueue[app.currentIndex];

                // === 数据统计 & 错题收录逻辑 ===
                // 1. JLPT按星号给分
                if (isStarCorrect) {
                    app.stats.correct++;
                } else {
                    app.stats.incorrect++;
                }

                // 2. 错题收录：只限于“按年份刷题”和“错题回顾”模式
                if (app.practiceMode === 'year' || app.practiceMode === 'mistake') {
                    let yearMistakes = getYearMistakes(app.currentLevel, app.currentYear);
                    if (!isAllCorrect) {
                        if (!yearMistakes.includes(currentQuestion.id)) {
                            yearMistakes.push(currentQuestion.id);
                            saveYearMistakes(app.currentLevel, app.currentYear, yearMistakes);
                        }
                    } else {
                        yearMistakes = yearMistakes.filter(id => id !== currentQuestion.id);
                        saveYearMistakes(app.currentLevel, app.currentYear, yearMistakes);
                    }
                }
                // ==================================

                app.updateRandomProgressAfterAnswer(isStarCorrect);
                const answeredCount = app.stats.correct + app.stats.incorrect;

                if (app.trainingMode !== 'challenge') {
                    dispatchGrammarPracticeState(isStarCorrect ? 'answer_correct' : 'answer_wrong', {
                        isCorrect: isStarCorrect,
                        streak: app.randomStreak,
                        questionIndex: app.currentIndex + 1,
                        questionCount: app.questionQueue.length,
                        accuracy: answeredCount > 0 ? app.stats.correct / answeredCount : 0
                    });
                    if (isStarCorrect && app.randomStreak >= 3) {
                        dispatchGrammarPracticeState('streak', {
                            isCorrect: true,
                            streak: app.randomStreak,
                            questionIndex: app.currentIndex + 1,
                            questionCount: app.questionQueue.length,
                            accuracy: answeredCount > 0 ? app.stats.correct / answeredCount : 0
                        });
                    }
                }

                const statusBadge = block.querySelector('.status-badge');
                if (app.trainingMode === 'challenge') {
                    statusBadge.classList.add('hidden');
                } else if (isAllCorrect) {
                    statusBadge.classList.remove('hidden');
                    statusBadge.textContent = '正解';
                    statusBadge.className = 'status-badge text-xs font-bold px-4 py-1 tracking-widest bg-textMain text-bgMain border-2 border-borderStrong';
                    // 强制覆盖Tailwind的红色/绿色为刀剑黑
                    slots.forEach(slot => {
                        slot.classList.add('bg-green-50', 'border-green-600', 'text-green-700');
                    });
                } else if (isStarCorrect) {
                    statusBadge.classList.remove('hidden');
                    statusBadge.textContent = '差点';
                    statusBadge.className = 'status-badge text-xs font-bold px-4 py-1 tracking-widest bg-glacierGray text-accentGold border-2 border-accentGold';
                    slots.forEach((slot, idx) => {
                        if (currentOrder[idx] === correctOrder[idx]) {
                            slot.classList.add('bg-green-50', 'border-green-600', 'text-green-700');
                        } else {
                            slot.classList.add('bg-red-50', 'border-red-600', 'text-red-700');
                        }
                    });
                } else {
                    statusBadge.classList.remove('hidden');
                    statusBadge.textContent = '不正解';
                    statusBadge.className = 'status-badge text-xs font-bold px-4 py-1 tracking-widest bg-accentGold text-bgMain border-2 border-accentGold';
                    slots.forEach((slot, idx) => {
                        if (currentOrder[idx] === correctOrder[idx]) {
                            slot.classList.add('bg-green-50', 'border-green-600', 'text-green-700');
                        } else {
                            slot.classList.add('bg-red-50', 'border-red-600', 'text-red-700');
                        }
                    });
                }
                
                // 学习模式即时显示解析；挑战模式整套完成后统一解锁
                const explanationArea = block.querySelector('.explanation-area');
                if (explanationArea && app.trainingMode !== 'challenge') {
                    explanationArea.classList.remove('hidden');
                    explanationArea.classList.add('flex', 'fade-in');
                }

                // 更改按钮为下一题
                const actionArea = block.querySelector('.action-area');
                const hasReachedRandomTarget = app.practiceMode === 'random' && app.randomAnsweredCount >= app.randomRoundTarget;
                const hasReachedFinalQuestion = app.currentIndex >= app.questionQueue.length - 1;
                const shouldOpenSummaryNext = hasReachedRandomTarget || hasReachedFinalQuestion;
                const nextLabel = shouldOpenSummaryNext ? '查看结算' : '下一题';
                actionArea.innerHTML = `<button class="next-question-btn bg-textMain text-white px-6 py-3 border-[3px] border-borderStrong shadow-[4px_4px_0px_rgba(15,15,15,0.8)] text-sm tracking-widest font-black hover:bg-accentGold hover:border-accentGold transition-all uppercase">${nextLabel} ${getIconSvg('arrow-right', 'w-4 h-4 inline align-[-0.125em]')}</button>`;
                app.updateTimerUI();
                return;
            }
        });
    </script>
</body>
</html>
