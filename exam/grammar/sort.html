<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT 语法排序题 - 鹰之视点特训</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./shared/grammar-header.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=Noto+Sans+SC:wght@500;700;900&family=Noto+Serif+JP:wght@600;900&family=Noto+Serif+SC:wght@600;900&display=swap" rel="stylesheet">
    <script>
        // 重写 Tailwind 配置表，注入《对马岛之魂》箭场极致武士美学配色
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['"Noto Sans SC"', '"Noto Sans JP"', 'sans-serif'],
                        'serif-jp': ['"Noto Serif SC"', '"Noto Serif JP"', '"Songti SC"', '"SimSun"', 'serif'],
                        'serif-sc': ['"Noto Serif SC"', '"Noto Serif JP"', '"Songti SC"', '"SimSun"', 'serif'],
                    },
                    colors: {
                        // 映射变量名为箭场硬核配色：浓墨、和纸、朱红
                        eagleNavy: '#0A0A0A',     // 极暗墨色 (Deepest Ink)
                        eagleBlue: '#2D2D2D',     // 铁灰 (Iron)
                        eagleGold: '#A31010',     // 原金色替换为靶心红/鲜血 (Bullseye Crimson)
                        glacierGray: '#E5E0D8',   // 粗糙和纸 (Aged Washi)
                        steelGray: '#4A4A4A',     // 刀锋钢色 (Blade Steel)
                        alertRed: '#8B0000',      // 绝杀红 (Fatal Red)
                        focusGreen: '#0A0A0A',    // 专注黑 (Focus Black)
                        
                        bgMain: '#E6E2D8',        // 道场木板/和纸底色
                        bgCard: '#F7F6F2',        // 纯净靶面纸白
                        textMain: '#0F0F0F',      // 浓墨正文
                        textSub: '#3A3A3A',       // 淡墨次要信息
                        textMuted: '#8F8A80',     // 灰烬/箭羽边角料
                        borderMain: '#C2BBB2',    // 纸痕/木纹阴影
                        borderDark: '#0F0F0F',    // 漆黑边框
                        borderStrong: '#0F0F0F',  // 重墨边框
                        accentRed: '#A31010',     // 猩红
                        accentBlue: '#0F0F0F',    // 浓墨 (代替原有的亮蓝色)
                        accentGold: '#A31010'     // 靶心红 (代替金色，用于最重要的目标槽)
                    }
                }
            }
        }
    </script>
    <style>
        /* ==============================================================
           道场底座：强制锐利，移除所有圆角，保留刀剑切口般的干脆感
           ============================================================== */
        * {
            border-radius: 0px !important;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background-color: #E6E2D8;
            color: #0F0F0F;
            position: relative;
            /* 增强道场木席的横竖纹理 */
            background-image: 
                repeating-linear-gradient(90deg, transparent, transparent 100px, rgba(15,15,15,0.015) 100px, rgba(15,15,15,0.015) 102px),
                repeating-linear-gradient(0deg, transparent, transparent 4px, rgba(15,15,15,0.025) 4px, rgba(15,15,15,0.025) 5px);
            z-index: 0;
        }

        /* 沉浸式巨型箭靶背景投影 (右侧底层隐藏装饰) */
        body::before {
            content: '';
            position: fixed;
            top: 50%; right: -5%;
            transform: translateY(-50%);
            width: 700px; height: 700px;
            border: 40px solid rgba(163, 16, 16, 0.03); /* 淡血色外环 */
            border-radius: 50% !important; /* 特例：允许靶心浑圆 */
            z-index: -1;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            top: 50%; right: calc(-5% + 150px);
            transform: translateY(-50%);
            width: 400px; height: 400px;
            border: 20px solid rgba(15, 15, 15, 0.02); /* 淡墨色内环 */
            border-radius: 50% !important; /* 特例：允许靶心浑圆 */
            z-index: -1;
            pointer-events: none;
        }

        /* ==============================================================
           箭矢与靶标 (选项与槽位)：视觉重塑
           ============================================================== */
        
        /* 1. 箭靶槽位 (Sort Slots) 强化为立体的木块/纸靶 */
        .question-block .sort-slot {
            border: 2px solid #0F0F0F !important;
            border-bottom: 4px solid #0F0F0F !important;
            background: #F7F6F2 !important;
            color: #0F0F0F !important;
            box-shadow: 2px 2px 0px #0F0F0F !important;
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            transform: translateY(-2px); /* 默认微浮起 */
        }
        
        /* 空靶位中心十字准星 */
        .question-block .sort-slot:not(.slot-filled):not(.slot-star-filled)::after {
            content: '+';
            position: absolute;
            top: 48%; left: 50%;
            transform: translate(-50%, -50%);
            color: #C2BBB2;
            font-size: 16px;
            font-weight: 300;
            pointer-events: none;
        }

        /* 星号靶位 - 最关键的靶心，用血色标出 */
        .question-block .sort-slot.star-slot {
            border-color: #A31010 !important;
            border-bottom: 4px solid #A31010 !important;
            color: #A31010 !important;
            box-shadow: 2px 2px 0px #A31010 !important;
        }
        .question-block .sort-slot.star-slot:not(.slot-star-filled)::after {
            content: '◎'; /* 准星变靶圈 */
            color: rgba(163, 16, 16, 0.4);
            font-size: 14px;
        }

        /* 选中槽位：利箭入木，墨色填满 */
        .question-block .sort-slot.slot-filled { 
            background: #0F0F0F !important; 
            color: #F7F6F2 !important; 
            transform: translateY(0);
            box-shadow: 0px 0px 0px #0F0F0F !important; /* 压下去消除阴影 */
        }
        /* 星号靶位选中：正中红心，鲜血填满 */
        .question-block .sort-slot.slot-star-filled { 
            background: #A31010 !important; 
            color: #F7F6F2 !important; 
            border-color: #0F0F0F !important;
            transform: translateY(0);
            box-shadow: 0px 0px 0px #0F0F0F !important; /* 压下去消除阴影 */
        }

        /* 强制覆盖 JS 在验证后写入的红绿底色，保持道场黑白红配色基调 */
        .question-block .sort-slot.bg-green-50 {
            background: #0F0F0F !important;
            color: #F7F6F2 !important;
            border-color: #0F0F0F !important;
        }
        .question-block .sort-slot.bg-red-50 {
            background: #E6E2D8 !important;
            color: #A31010 !important;
            border-color: #A31010 !important;
            box-shadow: inset 0 0 0 2px rgba(163,16,16,0.3) !important; /* 错误靶位带内出血 */
        }

        /* 2. 选项木牌 (Options) 强化为刀剑般锋利的外观 */
        .question-block .sort-option-btn {
            border: 2px solid #0F0F0F !important;
            border-bottom: 4px solid #0F0F0F !important; /* 极重底边 */
            background: #F7F6F2 !important;
            box-shadow: 4px 4px 0px #0F0F0F !important;
            position: relative;
            overflow: hidden;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translate(0, 0);
        }

        /* 选项左侧的深邃刀痕，悬停时会像刀锋一样抽开/见血 */
        .question-block .sort-option-btn::before {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: 0;
            width: 4px;
            background: #0F0F0F;
            transition: all 0.2s cubic-bezier(0.2, 1, 0.3, 1);
            z-index: 0;
        }

        .question-block .sort-option-btn:hover:not(.option-used) {
            border-color: #A31010 !important;
            box-shadow: 6px 6px 0px #A31010 !important;
            transform: translate(-2px, -2px) !important;
            background: #FFFDFC !important;
        }

        .question-block .sort-option-btn:hover:not(.option-used)::before {
            background: #A31010;
            width: 12px; /* 刀痕加宽并染红 */
        }

        /* 选项被使用后，如同折断的箭矢或废弃木牌，压实到底部 */
        .question-block .sort-option-btn.option-used {
            opacity: 0.35;
            pointer-events: none;
            background-color: #E6E2D8 !important;
            border-color: #C2BBB2 !important;
            border-bottom-width: 2px !important;
            box-shadow: 0px 0px 0px transparent !important;
            transform: translate(4px, 4px) !important; /* 完全失去阴影厚度，沉降 */
        }
        .question-block .sort-option-btn.option-used::before {
            display: none;
        }

        /* 选项左侧标识字母：强制覆盖 Tailwind 行内样式，变成重墨色块 */
        .question-block .option-letter {
            background: #0F0F0F !important;
            color: #F7F6F2 !important;
            border: none !important;
            box-shadow: none !important;
            margin-left: 8px; /* 给前面的伪装刀痕留出空间 */
            position: relative;
            z-index: 1;
        }

        /* ==============================================================
           容器与面板：道场的悬挂字画感
           ============================================================== */
        
        .font-title-unified {
            font-family: "Noto Serif SC", "Noto Serif JP", "Songti SC", "SimSun", serif;
            letter-spacing: 0.15em;
        }

        /* 题目卡片外框：增加顶部红色的道场卷轴角装饰 */
        .question-block > .bg-bgCard {
            background: #F7F6F2 !important;
            border: 4px solid #0F0F0F !important;
            box-shadow: 8px 8px 0px rgba(15,15,15,0.9) !important;
            position: relative;
        }
        .question-block > .bg-bgCard::after {
            content: '';
            position: absolute;
            top: 6px; right: 6px;
            width: 14px; height: 14px;
            border-top: 4px solid #A31010;
            border-right: 4px solid #A31010;
            pointer-events: none;
        }

        /* 顶部导航与按钮板 */
        .timer-toolbar-btn, .timer-chip-btn, .timer-control-btn, .timer-hide-btn, .random-target-btn {
            border: 2px solid #0F0F0F;
            background: #F7F6F2;
            color: #0F0F0F;
            box-shadow: 3px 3px 0px #0F0F0F;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
        }

        .timer-toolbar-btn:hover:not(:disabled), .timer-chip-btn:hover:not(:disabled), 
        .timer-control-btn:hover:not(:disabled), .timer-hide-btn:hover:not(:disabled), 
        .random-target-btn:hover:not(:disabled) {
            background: #A31010;
            color: #F7F6F2;
            border-color: #A31010;
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px #0F0F0F;
        }

        /* 主状态按钮（如激活状态、主要确认） */
        .timer-toolbar-btn.is-primary, .timer-chip-btn.is-selected, 
        .timer-control-btn.is-primary, .timer-hide-btn.is-selected, .random-target-btn.is-primary {
            background: #0F0F0F;
            color: #F7F6F2;
            border-color: #0F0F0F;
        }
        .timer-toolbar-btn.is-primary:hover, .timer-control-btn.is-primary:hover {
            background: #A31010;
            border-color: #A31010;
        }

        /* 主界面级别与模式选择按钮：极致厚重 */
        #view-level-select button,
        #view-mode-select button,
        #view-year-select button {
            border: 4px solid #0F0F0F !important;
            box-shadow: 6px 6px 0px #0F0F0F !important;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #F7F6F2;
        }

        #view-level-select button:hover:not(:disabled),
        #view-mode-select button:hover:not(:disabled),
        #view-year-select button:hover:not(:disabled) {
            transform: translate(-3px, -3px);
            box-shadow: 9px 9px 0px #A31010 !important;
            border-color: #A31010 !important;
            background-color: #FFFDFC !important;
        }
        
        #view-year-select .bg-bgMain { background-color: #E6E2D8 !important; }

        /* 大提交与大跨步按钮 */
        .question-block .submit-btn,
        .question-block .next-question-btn {
            background: #0F0F0F !important;
            color: #F7F6F2 !important;
            border: 3px solid #0F0F0F !important;
            box-shadow: 6px 6px 0px rgba(15, 15, 15, 0.8) !important;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 900;
        }

        .question-block .submit-btn:hover:not(:disabled),
        .question-block .next-question-btn:hover {
            background: #A31010 !important;
            border-color: #A31010 !important;
            box-shadow: 8px 8px 0px rgba(163, 16, 16, 0.8) !important;
            transform: translate(-2px, -2px);
        }

        .question-block .submit-btn:disabled {
            background: transparent !important;
            border: 3px dashed #A19D94 !important;
            color: #0F0F0F !important;
            box-shadow: none !important;
            opacity: 0.5;
        }

        .question-block .explanation-area {
            border: 4px solid #0F0F0F;
            background: #F7F6F2;
            box-shadow: 8px 8px 0px #0F0F0F;
            margin-top: 16px;
        }

        /* ==============================================================
           动效与印鉴：刀劈斧凿的物理反馈
           ============================================================== */

        /* 视图切换：如武士居合斩般的干脆进场 */
        .view-section { display: none; animation: swiftDraw 0.25s cubic-bezier(0.1, 0.9, 0.2, 1); }
        .view-section.active { display: block; }
        .fade-in { animation: swiftDraw 0.25s cubic-bezier(0.1, 0.9, 0.2, 1); }
        @keyframes swiftDraw {
            from { opacity: 0; transform: translateX(15px) skewX(-2deg); }
            to { opacity: 1; transform: translateX(0) skewX(0); }
        }

        /* 箭矢命中的扎入感动画 */
        @keyframes arrowStrike {
            0% { transform: translate(20px, -20px) scale(1.5); opacity: 0; filter: blur(2px); }
            60% { transform: translate(-3px, 3px) scale(0.9); opacity: 1; filter: blur(0); }
            80% { transform: translate(1px, -1px) scale(1.05); }
            100% { transform: translate(0, 0) scale(1); opacity: 1; }
        }
        .question-block .sort-slot.slot-filled .slot-text,
        .question-block .sort-slot.slot-star-filled .slot-text {
            display: inline-block;
            animation: arrowStrike 0.25s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }

        /* 判卷印章：极重的砸落感 */
        .status-badge {
            display: inline-flex !important;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 4px 16px !important;
            font-size: 15px !important;
            font-weight: 900 !important;
            font-family: "Noto Serif SC", "Noto Serif JP", serif !important;
            letter-spacing: 0.3em !important;
            text-indent: 0.3em;
            opacity: 0;
            border: 4px solid currentColor !important;
            box-shadow: 4px 4px 0px currentColor !important;
            animation: heavyStamp 0.4s cubic-bezier(0.2, 1.5, 0.4, 1) forwards;
            text-transform: uppercase;
        }

        @keyframes heavyStamp {
            0% { transform: scale(3) rotate(15deg); opacity: 0; filter: blur(4px); }
            40% { transform: scale(0.8) rotate(-8deg); opacity: 1; filter: blur(0); }
            70% { transform: scale(1.1) rotate(-3deg); opacity: 1; }
            100% { transform: scale(1) rotate(-5deg); opacity: 1; }
        }
        
        /* 强制覆盖JS内置的红绿判卷色彩，转为硬核朱印 */
        /* 正解 */
        .status-badge:contains("正解"), .status-badge.bg-textMain, .status-badge.bg-green-100 {
            background: transparent !important;
            color: #A31010 !important; /* 纯粹朱红印泥 */
            border-color: #A31010 !important;
            box-shadow: none !important;
            transform: rotate(-5deg) translateZ(0); /* 保持倾斜固定位置 */
            animation-fill-mode: both;
        }
        /* 差点 */
        .status-badge:contains("差点"), .status-badge.bg-glacierGray, .status-badge.bg-yellow-100 {
            background: transparent !important;
            color: #0F0F0F !important;
            border-color: #0F0F0F !important;
            border-style: dashed !important; /* 残缺的印迹 */
            box-shadow: none !important;
            transform: rotate(3deg) translateZ(0);
        }
        /* 不正解 */
        .status-badge:contains("不正解"), .status-badge.bg-accentGold, .status-badge.bg-red-100 {
            background: transparent !important;
            color: #0F0F0F !important;
            border-color: #0F0F0F !important;
            border-style: double !important; /* 警告的双重边框 */
            box-shadow: none !important;
            transform: rotate(-8deg) translateZ(0);
        }

        /* 响应式调整及其他琐碎修饰 */
        .page-shell {
            width: min(100%, 1120px);
            margin: 0 auto;
            padding: 32px 16px 48px;
            box-sizing: border-box;
        }

        .selection-view-shell { width: min(100%, 700px); margin-left: auto; margin-right: auto; }
        .selection-view-hero { margin-top: 12px; }
        .selection-view-standard { margin-top: 16px; }

        #view-practice.has-bottom-toolbar #practice-question-container { padding-bottom: 164px; }
        
        /* 底部工具栏与深色遮罩 */
        .practice-bottom-toolbar {
            position: fixed; left: 0; right: 0; bottom: 0;
            z-index: 1600; padding: 0 12px calc(env(safe-area-inset-bottom));
            display: none; pointer-events: none;
        }
        .practice-bottom-toolbar.is-visible { display: block; }
        
        .practice-toolbar-backdrop {
            position: fixed; inset: 0;
            background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(4px);
            opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
        }
        .practice-bottom-toolbar.drawer-open .practice-toolbar-backdrop { opacity: 1; pointer-events: auto; }
        .practice-bottom-toolbar__inner { position: relative; max-width: 920px; margin: 0 auto; pointer-events: auto; }
        .practice-toolbar-slot { position: relative; }
        .practice-toolbar-slot[hidden] { display: none; }

        .practice-toolbar-main {
            display: flex; align-items: center; gap: 12px; min-height: 72px; padding: 12px 14px;
            border: 4px solid #0F0F0F; border-bottom: none;
            background: rgba(247, 246, 242, 0.98); backdrop-filter: blur(18px);
            box-shadow: 0px -4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .practice-toolbar-meta { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .timer-status-dot {
            width: 12px; height: 12px; background: #C2BBB2; border: 2px solid #0F0F0F;
            transition: background 0.2s ease, box-shadow 0.2s ease;
        }
        .practice-toolbar-main[data-timer-status="running"] .timer-status-dot { background: #4A4A4A; }
        .practice-toolbar-main[data-timer-status="paused"] .timer-status-dot { background: #F7F6F2; }
        .practice-toolbar-main[data-timer-status="finished"] .timer-status-dot { background: #0F0F0F; }
        .practice-toolbar-main[data-timer-status="timeout"] .timer-status-dot { background: #A31010; }

        .practice-toolbar-label { font-size: 0.8rem; font-weight: 900; letter-spacing: 0.15em; color: #0F0F0F; white-space: nowrap; }
        .practice-toolbar-time {
            flex: 1; min-width: 0; text-align: center; font-size: 1.4rem; font-weight: 900;
            color: #0F0F0F; font-variant-numeric: tabular-nums; letter-spacing: 0.1em; white-space: nowrap;
        }
        .practice-toolbar-time.is-concealed { letter-spacing: 0.2em; color: #8F8A80; }
        .timer-action-group { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

        /* 计时器抽屉（模态） */
        .timer-drawer {
            position: absolute; right: 0; bottom: calc(100% + 12px);
            width: min(420px, calc(100vw - 24px)); padding: 20px;
            border: 4px solid #0F0F0F; background: #F7F6F2;
            box-shadow: 8px 8px 0px rgba(15, 15, 15, 0.6); box-sizing: border-box;
        }
        .timer-drawer-header {
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
            margin-bottom: 16px; border-bottom: 2px solid #0F0F0F; padding-bottom: 10px;
        }
        .timer-drawer-title { font-size: 1rem; font-weight: 900; color: #0F0F0F; letter-spacing: 0.1em; text-transform: uppercase; }
        .timer-drawer-display {
            width: 100%; padding: 12px; border: 3px solid #0F0F0F; background: #E6E2D8; color: #0F0F0F;
            font-size: 1.2rem; font-weight: 900; text-align: center; font-variant-numeric: tabular-nums;
            letter-spacing: 0.15em; box-sizing: border-box;
        }
        .timer-drawer-section { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
        .timer-drawer-label { width: 100%; font-size: 0.75rem; color: #3A3A3A; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; }
        .timer-chip-row, .timer-control-row { display: flex; flex-wrap: wrap; gap: 10px; width: 100%; }
        .timer-custom-wrap {
            display: inline-flex; align-items: center; gap: 6px; min-height: 36px; padding: 0 10px;
            border: 2px solid #0F0F0F; background: #fff; color: #0F0F0F; font-size: 0.76rem; font-weight: 900; white-space: nowrap; box-shadow: 2px 2px 0px #0F0F0F;
        }
        .timer-custom-input {

    <script src="./data-sort-n1.js"></script>
    <script src="./data-sort-n2.js"></script>
    <script src="./data-sort-n3.js"></script>
    <script src="../../shared/study-quest-test-runtime.js"></script>
    <script src="../../shared/study-quest-test-boot.js"></script>

    <script>
        // --- 1. 结构化题库 (带级别和年份元数据) ---
        const sortQuestionBanks = window.sortQuestionBanks || {};
        const questionDatabase = [
            ...(sortQuestionBanks.N1 || []),
            ...(sortQuestionBanks.N2 || []),
            ...(sortQuestionBanks.N3 || [])
        ];

        const TIMER_PRESETS = [5, 10, 15];
        const RANDOM_TARGET_PRESETS = [5, 10, 20];
        function isEnabledSortLevel(level) {
            return questionDatabase.some(q => q.level === level);
        }

        function isEnabledSortYear(level, year) {
            return questionDatabase.some(q => q.level === level && q.year === year);
        }

        function clampTimerMinutes(value) {
            const numeric = Number(value);
            if (!Number.isFinite(numeric)) {
                return TIMER_PRESETS[0];
            }
            return Math.min(180, Math.max(1, Math.round(numeric)));
        }

        function formatTimerClock(totalSeconds) {
            const safeSeconds = Math.max(0, Math.floor(Number(totalSeconds) || 0));
            const minutes = Math.floor(safeSeconds / 60);
            const seconds = safeSeconds % 60;
            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function shuffleQuestions(items) {
            const shuffled = [...items];
            for (let index = shuffled.length - 1; index > 0; index--) {
                const swapIndex = Math.floor(Math.random() * (index + 1));
                [shuffled[index], shuffled[swapIndex]] = [shuffled[swapIndex], shuffled[index]];
            }
            return shuffled;
        }

        function getIconSvg(name, className = '') {
            const icons = {
                shuffle: '<path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/>',
                'chevron-right': '<path d="m9 18 6-6-6-6"/>',
                'arrow-left': '<path d="M19 12H5"/><path d="m12 19-7-7 7-7"/>',
                list: '<path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/>',
                'check-circle': '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/>',
                'arrow-right': '<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>',
                calendar: '<path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/>'
            };
            return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}" aria-hidden="true" focusable="false">${icons[name] || ''}</svg>`;
        }

        function getGrammarSortMarksKey(level, year) {
            return `grammar_sort_marks::${level}::${year}`;
        }

        function getGrammarSortLastPracticeKey(level) {
            return `grammar_sort_last_practice::${level}`;
        }

        function getGrammarSortTrainingModeKey() {
            return 'grammar_sort_training_mode';
        }

        function getGrammarSortChallengeMinutesKey() {
            return 'grammar_sort_challenge_minutes';
        }

        function parseStoredIdList(rawValue) {
            try {
                const parsed = JSON.parse(rawValue || '[]');
                if (!Array.isArray(parsed)) {
                    return [];
                }
                return Array.from(new Set(
                    parsed
                        .map(item => String(item || '').trim())
                        .filter(Boolean)
                ));
            } catch (error) {
                return [];
            }
        }

        function getYearMistakes(level, year) {
            return parseStoredIdList(localStorage.getItem(getGrammarSortMarksKey(level, year)));
        }

        function saveYearMistakes(level, year, ids) {
            const normalized = Array.from(new Set(
                (ids || [])
                    .map(item => String(item || '').trim())
                    .filter(Boolean)
            ));
            const key = getGrammarSortMarksKey(level, year);
            if (normalized.length === 0) {
                localStorage.removeItem(key);
                return;
            }
            localStorage.setItem(key, JSON.stringify(normalized));
        }

        function getYearSortValue(year) {
            const match = String(year || '').match(/^(\d{4})年(\d{1,2})月$/);
            if (!match) return 0;
            return Number(match[1]) * 100 + Number(match[2]);
        }

        function collectYearReviewItems(level) {
            const prefix = `grammar_sort_marks::${level}::`;
            const items = [];
            for (let index = 0; index < localStorage.length; index++) {
                const key = localStorage.key(index);
                if (!key || !key.startsWith(prefix)) continue;
                const year = key.slice(prefix.length);
                const ids = getYearMistakes(level, year);
                if (ids.length === 0) continue;
                items.push({ year, count: ids.length });
            }
            items.sort((left, right) => getYearSortValue(right.year) - getYearSortValue(left.year));
            return items;
        }

        function replaceAppUrl(params) {
            const nextParams = new URLSearchParams();
            Object.entries(params || {}).forEach(([key, value]) => {
                if (value) {
                    nextParams.set(key, value);
                }
            });
            const nextUrl = nextParams.toString()
                ? `${window.location.pathname}?${nextParams.toString()}`
                : window.location.pathname;
            try {
                window.history.replaceState({ path: nextUrl }, '', nextUrl);
            } catch (error) {
                console.warn('History API is restricted in this environment.');
            }
        }

        const testServer = window.StudyQuestTestServer;

        function isGrammarChallengeMode() {
            return Boolean(app && app.trainingMode === 'challenge');
        }

        function getGrammarModeKey() {
            if (!app) return 'study';
            if (app.practiceMode === 'mistake') {
                return isGrammarChallengeMode() ? 'challenge_review' : 'study_review';
            }
            return isGrammarChallengeMode() ? 'challenge' : 'study';
        }

        function getGrammarScopeKey() {
            if (!app) return 'sort';
            const trainingKey = isGrammarChallengeMode() ? 'challenge' : 'study';
            if (app.practiceMode === 'year') return `year-${app.currentYear || 'unknown'}-${trainingKey}`;
            if (app.practiceMode === 'mistake') return `mistake-${app.currentYear || 'review'}-${trainingKey}`;
            if (app.currentLevel === 'ALL') return `all-random-${app.randomRoundTarget || app.randomTargetCount || 10}-${trainingKey}`;
            return `${(app.currentLevel || 'n1').toLowerCase()}-random-${app.randomRoundTarget || app.randomTargetCount || 10}-${trainingKey}`;
        }

        function dispatchGrammarPracticeState(phase, overrides = {}) {
            if (!window.StudyQuestTestUi || typeof window.StudyQuestTestUi.dispatchPracticeState !== 'function') return;
            const answeredCount = app ? app.stats.correct + app.stats.incorrect : 0;
            const accuracy = answeredCount > 0 ? app.stats.correct / answeredCount : 0;
            window.StudyQuestTestUi.dispatchPracticeState({
                module: 'grammar',
                subType: 'sort_n1',
                mode: getGrammarModeKey(),
                phase,
                isCorrect: overrides.isCorrect === undefined ? null : Boolean(overrides.isCorrect),
                streak: Number.isFinite(overrides.streak) ? overrides.streak : (app ? app.randomStreak : 0),
                accuracy: Number.isFinite(overrides.accuracy) ? overrides.accuracy : accuracy,
                questionIndex: Number.isFinite(overrides.questionIndex) ? overrides.questionIndex : (app ? app.currentIndex + 1 : 0),
                questionCount: Number.isFinite(overrides.questionCount) ? overrides.questionCount : (app && app.questionQueue ? app.questionQueue.length : 0),
                meta: overrides.meta || {}
            });
        }

        function startGrammarRewardRun() {
            if (!isGrammarChallengeMode() || !testServer || typeof testServer.startRun !== 'function' || !app) return null;
            app.rewardResult = null;
            app.rewardRunMeta = testServer.startRun({
                module: 'grammar',
                subType: 'sort_n1',
                mode: getGrammarModeKey(),
                scopeKey: getGrammarScopeKey()
            });
            return app.rewardRunMeta;
        }

        function ensureGrammarRewardResult() {
            if (!isGrammarChallengeMode() || !app || app.rewardResult || !app.rewardRunMeta || !testServer || typeof testServer.completeRun !== 'function') {
                return app ? app.rewardResult : null;
            }
            const answeredCount = app.stats.correct + app.stats.incorrect;
            app.rewardResult = testServer.completeRun({
                runKey: app.rewardRunMeta.runKey,
                module: 'grammar',
                subType: 'sort_n1',
                mode: getGrammarModeKey(),
                scopeKey: getGrammarScopeKey(),
                level: app.currentLevel,
                questionCount: app.questionQueue.length,
                answeredCount,
                correctCount: app.stats.correct,
                accuracy: answeredCount > 0 ? app.stats.correct / answeredCount : 0,
                bestStreak: app.randomBestStreak,
                cleared: true,
                sourcePage: window.location.pathname
            });
            return app.rewardResult;
        }

        function buildGrammarDrawMarkup(reward) {
            if (!reward || !reward.accepted || !reward.drawOffer || !reward.drawOffer.available) return '';
            if (!window.StudyQuestTestUi || typeof window.StudyQuestTestUi.getDrawAffordanceMarkup !== 'function') return '';
            return window.StudyQuestTestUi.getDrawAffordanceMarkup(reward.drawOffer.runKey);
        }

        function updateGrammarPracticeTestTools(visible) {
            if (!window.StudyQuestTestUi) {
                return;
            }
            if (typeof window.StudyQuestTestUi.hidePracticeTestTools === 'function') {
                window.StudyQuestTestUi.hidePracticeTestTools();
                return;
            }
            if (typeof window.StudyQuestTestUi.mountPracticeTestTools === 'function') {
                window.StudyQuestTestUi.mountPracticeTestTools({
                    key: 'grammar-sort-perfect-clear',
                    visible: false
                });
            }
        }

        // --- 2. 核心应用状态与逻辑 ---
        const app = {
            currentLevel: null,
            practiceMode: null, // 'year' | 'random' | 'mistake'
            trainingMode: 'study',
            currentYear: null,
            
            questionQueue: [], // 当前需要练习的题目队列
            currentIndex: 0,
            stats: { correct: 0, incorrect: 0 }, // 记录单次练习的数据
            randomTargetCount: RANDOM_TARGET_PRESETS[1],
            randomRoundTarget: RANDOM_TARGET_PRESETS[1],
            randomAnsweredCount: 0,
            randomStreak: 0,
            randomBestStreak: 0,
            rewardRunMeta: null,
            rewardResult: null,
            pendingPracticeEntry: null,
            trainingPicker: {
                open: false,
                selectedMode: localStorage.getItem(getGrammarSortTrainingModeKey()) === 'challenge' ? 'challenge' : 'study',
                selectedMinutes: clampTimerMinutes(localStorage.getItem(getGrammarSortChallengeMinutesKey()) || TIMER_PRESETS[1])
            },
            timer: {
                mode: 'countup',
                status: 'idle',
                elapsedSeconds: 0,
                remainingSeconds: TIMER_PRESETS[0] * 60,
                selectedMinutes: TIMER_PRESETS[0],
                totalSeconds: TIMER_PRESETS[0] * 60,
                timerId: null,
                drawerOpen: false,
                displayHidden: false,
                hasStarted: false,
                timeoutTriggered: false,
                resultHasRun: false,
                resultSeconds: 0,
                resultTimeout: false
            },

            // 初始化函数，恢复深链状态
            init() {
                const params = new URLSearchParams(window.location.search);
                const level = params.get('level');
                const year = params.get('year');
                const mode = params.get('mode');
                const training = params.get('training');
                const timer = params.get('timer');

                if (!['N1', 'N2', 'N3'].includes(level) || !isEnabledSortLevel(level)) {
                    replaceAppUrl({});
                    return;
                }

                this.currentLevel = level;
                document.getElementById('display-selected-level').textContent = level;

                const hasYear = year && isEnabledSortYear(level, year) && questionDatabase.some(q => q.level === level && q.year === year);
                if (hasYear) {
                    const initTrainingMode = training === 'challenge' ? 'challenge' : 'study';
                    const initChallengeMinutes = clampTimerMinutes(timer || this.trainingPicker.selectedMinutes);
                    if (mode === 'review') {
                        this.startMistakePractice(year, {
                            updateUrl: false,
                            fromInit: true,
                            skipPicker: true,
                            trainingMode: initTrainingMode,
                            challengeMinutes: initChallengeMinutes
                        });
                    } else {
                        this.startYearPractice(year, {
                            updateUrl: false,
                            skipPicker: true,
                            trainingMode: initTrainingMode,
                            challengeMinutes: initChallengeMinutes
                        });
                    }
                    return;
                }

                replaceAppUrl({ level });
                this.showYearList({ updateUrl: false });
            },

            getTrainingSummary() {
                return this.trainingMode === 'challenge'
                    ? `挑战模式 · 倒计时 ${this.timer.selectedMinutes} 分 · 整套做完后统一看解析`
                    : '学习模式 · 每题提交后即时查看解析';
            },

            getTrainingEntrySubtitle(entry) {
                if (!entry) return '先决定这一轮是学习消化，还是挑战通关。';
                if (entry.kind === 'year') return `${this.currentLevel} · ${entry.year}`;
                if (entry.kind === 'mistake') return `${this.currentLevel} · ${entry.year} · 错题回顾`;
                if (entry.kind === 'random') return `${this.currentLevel} · 随机乱序`;
                if (entry.kind === 'global-random') return '全级别乱序';
                return '先决定这一轮是学习消化，还是挑战通关。';
            },

            renderTrainingModePicker() {
                const overlay = document.getElementById('training-mode-overlay');
                const subtitle = document.getElementById('training-mode-subtitle');
                const timerPanel = document.getElementById('training-mode-timer');
                const randomSettingsPanel = document.getElementById('training-mode-random-settings');
                const confirmBtn = document.getElementById('training-mode-confirm-btn');
                const customInput = document.getElementById('training-mode-custom-input');
                if (!overlay || !subtitle || !timerPanel || !randomSettingsPanel || !confirmBtn) return;

                subtitle.textContent = this.getTrainingEntrySubtitle(this.pendingPracticeEntry);
                overlay.hidden = !this.trainingPicker.open;
                document.body.style.overflow = this.trainingPicker.open ? 'hidden' : '';

                document.querySelectorAll('[data-training-mode]').forEach((button) => {
                    button.classList.toggle('is-selected', button.dataset.trainingMode === this.trainingPicker.selectedMode);
                });

                document.querySelectorAll('[data-training-minutes]').forEach((button) => {
                    button.classList.toggle('is-selected', Number(button.dataset.trainingMinutes) === this.trainingPicker.selectedMinutes);
                });

                if (customInput) {
                    customInput.value = String(this.trainingPicker.selectedMinutes);
                }

                const isChallenge = this.trainingPicker.selectedMode === 'challenge';
                const isRandomEntry = this.pendingPracticeEntry?.kind === 'random' || this.pendingPracticeEntry?.kind === 'global-random';
                timerPanel.hidden = !isChallenge;
                randomSettingsPanel.hidden = !isRandomEntry;
                confirmBtn.textContent = isChallenge ? '开始挑战' : '开始学习';

                document.querySelectorAll('[data-training-random-target]').forEach((button) => {
                    button.classList.toggle('is-selected', Number(button.dataset.trainingRandomTarget) === this.randomTargetCount);
                });
            },

            openTrainingModePicker(entry) {
                this.pendingPracticeEntry = entry;
                this.trainingPicker.open = true;
                this.trainingPicker.selectedMode = localStorage.getItem(getGrammarSortTrainingModeKey()) === 'challenge' ? 'challenge' : 'study';
                this.trainingPicker.selectedMinutes = clampTimerMinutes(localStorage.getItem(getGrammarSortChallengeMinutesKey()) || this.trainingPicker.selectedMinutes || TIMER_PRESETS[1]);
                this.renderTrainingModePicker();
            },

            closeTrainingModePicker() {
                this.trainingPicker.open = false;
                this.pendingPracticeEntry = null;
                this.renderTrainingModePicker();
            },

            setTrainingPickerMode(mode) {
                this.trainingPicker.selectedMode = mode === 'challenge' ? 'challenge' : 'study';
                this.renderTrainingModePicker();
            },

            setTrainingPickerMinutes(minutes) {
                this.trainingPicker.selectedMinutes = clampTimerMinutes(minutes || this.trainingPicker.selectedMinutes);
                this.renderTrainingModePicker();
            },

            prepareTrainingForRun(mode, challengeMinutes) {
                this.trainingMode = mode === 'challenge' ? 'challenge' : 'study';
                this.rewardRunMeta = null;
                this.rewardResult = null;
                localStorage.setItem(getGrammarSortTrainingModeKey(), this.trainingMode);
                if (this.trainingMode === 'challenge') {
                    const minutes = clampTimerMinutes(challengeMinutes || this.trainingPicker.selectedMinutes || TIMER_PRESETS[1]);
                    this.trainingPicker.selectedMinutes = minutes;
                    localStorage.setItem(getGrammarSortChallengeMinutesKey(), String(minutes));
                    this.resetTimerForPractice();
                    this.setTimerMode('countdown');
                    this.setTimerSelectedMinutes(minutes);
                } else {
                    this.resetTimerForPractice();
                    this.setTimerMode('countup');
                }
                this.closeTimerDrawer({ skipUpdate: true });
            },

            confirmTrainingModePicker() {
                if (!this.pendingPracticeEntry) return;
                const { kind, year, updateUrl = true, fromInit = false } = this.pendingPracticeEntry;
                const options = {
                    updateUrl,
                    fromInit,
                    skipPicker: true,
                    trainingMode: this.trainingPicker.selectedMode,
                    challengeMinutes: this.trainingPicker.selectedMinutes,
                    randomTargetCount: this.randomTargetCount
                };
                this.closeTrainingModePicker();
                if (kind === 'year') {
                    this.startYearPractice(year, options);
                    return;
                }
                if (kind === 'mistake') {
                    this.startMistakePractice(year, options);
                    return;
                }
                if (kind === 'global-random') {
                    this.startGlobalRandomPractice(options);
                    return;
                }
                this.startRandomPractice(options);
            },

            getActiveViewId() {
                return document.querySelector('.view-section.active')?.id || 'view-level-select';
            },

            handleHeaderBack() {
                const activeViewId = this.getActiveViewId();

                if (activeViewId === 'view-level-select') {
                    window.location.href = 'index.html';
                    return;
                }

                if (activeViewId === 'view-mode-select') {
                    this.goHome();
                    return;
                }

                if (activeViewId === 'view-year-select') {
                    this.backToModeSelect();
                    return;
                }

                if (activeViewId === 'view-practice') {
                    this.handleBackFromPractice();
                    return;
                }

                window.location.href = 'index.html';
            },

            goHome() {
                this.closeTrainingModePicker();
                this.resetTimerForPractice();
                this.setPracticeToolbarMode(null);
                this.currentLevel = null;
                this.practiceMode = null;
                this.trainingMode = 'study';
                this.currentYear = null;
                replaceAppUrl({});
                this.switchView('view-level-select');
            },

            backToModeSelect() {
                this.closeTrainingModePicker();
                this.practiceMode = null;
                this.currentYear = null;
                replaceAppUrl({ level: this.currentLevel });
                this.switchView('view-mode-select');
            },

            returnToLevelSelect() {
                this.closeTrainingModePicker();
                this.resetTimerForPractice();
                this.setPracticeToolbarMode(null);
                this.currentLevel = null;
                this.practiceMode = null;
                this.trainingMode = 'study';
                this.currentYear = null;
                replaceAppUrl({});
                this.switchView('view-level-select');
            },

            handleBackFromPractice() {
                this.resetTimerForPractice();
                this.setPracticeToolbarMode(null);
                
                if (this.practiceMode === 'year' || this.practiceMode === 'mistake') {
                    this.showYearList();
                } else if (this.currentLevel === 'ALL') {
                    this.returnToLevelSelect();
                } else {
                    replaceAppUrl({ level: this.currentLevel });
                    this.switchView('view-mode-select');
                }
            },

            isPracticeInProgress() {
                return this.questionQueue.length > 0 && this.currentIndex < this.questionQueue.length;
            },

            getActiveToolbarMode() {
                const practiceView = document.getElementById('view-practice');
                const isActivePracticeView = practiceView?.classList.contains('active');

                if (!isActivePracticeView || !this.isPracticeInProgress()) {
                    return null;
                }

                if (this.trainingMode === 'challenge') return 'timer';
                if (this.practiceMode === 'random') return 'random';
                return null;
            },

            setPracticeToolbarMode(mode) {
                const toolbar = document.getElementById('practice-bottom-toolbar');
                const practiceView = document.getElementById('view-practice');
                const backdrop = document.getElementById('practice-toolbar-backdrop');
                const drawer = document.getElementById('timer-drawer');
                const timerSlot = document.getElementById('timer-tool-slot');
                const randomSlot = document.getElementById('random-tool-slot');
                const visible = Boolean(mode);

                if (!toolbar || !practiceView) return;

                toolbar.hidden = !visible;
                toolbar.classList.toggle('is-visible', visible);
                practiceView.classList.toggle('has-bottom-toolbar', visible);

                if (timerSlot) timerSlot.hidden = mode !== 'timer';
                if (randomSlot) randomSlot.hidden = mode !== 'random';

                if (mode !== 'timer') {
                    this.timer.drawerOpen = false;
                    toolbar.classList.remove('drawer-open');
                    if (backdrop) backdrop.hidden = true;
                    if (drawer) drawer.hidden = true;
                }
            },

            getRandomQuestionPool() {
                if (this.currentLevel === 'ALL') return [...questionDatabase];
                return questionDatabase.filter(q => q.level === this.currentLevel);
            },

            getEffectiveRandomTarget(poolLength) {
                const desiredTarget = RANDOM_TARGET_PRESETS.includes(Number(this.randomTargetCount))
                    ? Number(this.randomTargetCount)
                    : RANDOM_TARGET_PRESETS[1];

                if (!poolLength) return desiredTarget;
                return Math.min(desiredTarget, poolLength);
            },

            prepareRandomRound(pool) {
                const effectiveTarget = this.getEffectiveRandomTarget(pool.length);
                this.randomRoundTarget = effectiveTarget;
                this.randomAnsweredCount = 0;
                this.randomStreak = 0;
                this.randomBestStreak = 0;
                this.questionQueue = shuffleQuestions(pool).slice(0, effectiveTarget);
                this.currentIndex = 0;
            },

            setRandomTargetCount(value) {
                const nextTarget = RANDOM_TARGET_PRESETS.includes(Number(value))
                    ? Number(value)
                    : RANDOM_TARGET_PRESETS[1];

                this.randomTargetCount = nextTarget;
                if (this.trainingPicker.open) {
                    this.renderTrainingModePicker();
                    return;
                }
                this.updateTimerUI();
            },

            updateRandomProgressAfterAnswer(isStarCorrect) {
                if (this.practiceMode !== 'random') return;
                this.randomAnsweredCount = Math.min(this.randomRoundTarget, this.randomAnsweredCount + 1);

                if (isStarCorrect) {
                    this.randomStreak += 1;
                    if (this.randomStreak > this.randomBestStreak) {
                        this.randomBestStreak = this.randomStreak;
                    }
                } else {
                    this.randomStreak = 0;
                }
            },

            finishRandomRound() {
                if (this.practiceMode !== 'random') return;
                this.currentIndex = this.questionQueue.length;
                this.renderPracticeQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            stopTimer() {
                if (this.timer.timerId) {
                    window.clearInterval(this.timer.timerId);
                    this.timer.timerId = null;
                }
            },

            getTimerClockText() {
                return this.timer.mode === 'countdown'
                    ? formatTimerClock(this.timer.remainingSeconds)
                    : formatTimerClock(this.timer.elapsedSeconds);
            },

            getTimerUsedSeconds() {
                if (!this.timer.hasStarted) return 0;
                if (this.timer.mode === 'countdown') return Math.max(0, this.timer.totalSeconds - this.timer.remainingSeconds);
                return this.timer.elapsedSeconds;
            },

            getResultTimerText() {
                return this.timer.resultHasRun
                    ? formatTimerClock(this.timer.resultSeconds)
                    : '计时未开启';
            },

            getTimerStatusMeta() {
                const timer = this.timer;
                if (timer.resultTimeout || timer.status === 'timeout') return { text: '时间结束，本轮已结束。', tone: 'danger' };
                if (timer.status === 'running') {
                    if (timer.mode === 'countdown') return { text: '倒计时进行中，时间到会直接结算。', tone: 'warning' };
                    return { text: '正在记录本轮用时。', tone: '' };
                }
                if (timer.status === 'paused') return { text: '计时已暂停。', tone: '' };
                if (timer.mode === 'countdown') return { text: `倒计时将从 ${timer.selectedMinutes} 分开始。`, tone: 'warning' };
                return { text: '手动开始后会记录本轮做题时间。', tone: '' };
            },

            closeTimerDrawer(options = {}) {
                const { skipUpdate = false } = options;
                this.timer.drawerOpen = false;
                if (!skipUpdate) this.updateTimerUI();
            },

            openTimerDrawer() {
                if (!this.isPracticeInProgress() || this.practiceMode !== 'year') return;
                this.timer.drawerOpen = true;
                this.updateTimerUI();
            },

            toggleTimerDrawer() {
                if (!this.isPracticeInProgress() || this.practiceMode !== 'year') return;
                this.timer.drawerOpen = !this.timer.drawerOpen;
                this.updateTimerUI();
            },

            resetTimerForPractice() {
                this.stopTimer();
                this.timer.status = 'idle';
                this.timer.elapsedSeconds = 0;
                this.timer.totalSeconds = clampTimerMinutes(this.timer.selectedMinutes) * 60;
                this.timer.remainingSeconds = this.timer.totalSeconds;
                this.timer.hasStarted = false;
                this.timer.timeoutTriggered = false;
                this.timer.resultHasRun = false;
                this.timer.resultSeconds = 0;
                this.timer.resultTimeout = false;
                this.closeTimerDrawer({ skipUpdate: true });
                this.updateTimerUI();
            },

            finalizeTimerForResult(options = {}) {
                const { timedOut = false } = options;

                if (!this.timer.resultTimeout && !this.timer.resultHasRun) {
                    this.timer.resultHasRun = this.timer.hasStarted;
                    this.timer.resultSeconds = this.getTimerUsedSeconds();
                }

                this.timer.resultTimeout = this.timer.resultTimeout || timedOut;
                this.stopTimer();

                if (timedOut) {
                    this.timer.status = 'timeout';
                    this.timer.remainingSeconds = 0;
                } else if (this.timer.hasStarted) {
                    this.timer.status = 'finished';
                } else {
                    this.timer.status = 'idle';
                }

                this.setPracticeToolbarMode(null);
                this.updateTimerUI();
            },

            setTimerMode(mode) {
                if (!['countup', 'countdown'].includes(mode) || this.timer.mode === mode) return;

                this.stopTimer();
                this.timer.mode = mode;
                this.timer.status = 'idle';
                this.timer.elapsedSeconds = 0;
                this.timer.totalSeconds = clampTimerMinutes(this.timer.selectedMinutes) * 60;
                this.timer.remainingSeconds = this.timer.totalSeconds;
                this.timer.hasStarted = false;
                this.timer.timeoutTriggered = false;
                this.timer.resultHasRun = false;
                this.timer.resultSeconds = 0;
                this.timer.resultTimeout = false;
                this.updateTimerUI();
            },

            setTimerSelectedMinutes(value) {
                const minutes = clampTimerMinutes(value);
                this.timer.selectedMinutes = minutes;
                this.timer.totalSeconds = minutes * 60;

                if (this.timer.mode === 'countdown') {
                    this.stopTimer();
                    this.timer.status = 'idle';
                    this.timer.remainingSeconds = this.timer.totalSeconds;
                    this.timer.hasStarted = false;
                    this.timer.timeoutTriggered = false;
                    this.timer.resultHasRun = false;
                    this.timer.resultSeconds = 0;
                    this.timer.resultTimeout = false;
                }

                this.updateTimerUI();
            },

            toggleTimerDisplayVisibility() {
                this.timer.displayHidden = !this.timer.displayHidden;
                this.updateTimerUI();
            },

            startTimer() {
                if (!this.isPracticeInProgress()) return;

                const timer = this.timer;
                this.stopTimer();

                if (timer.mode === 'countdown') {
                    timer.totalSeconds = clampTimerMinutes(timer.selectedMinutes) * 60;
                    if (!timer.hasStarted || timer.status === 'idle' || timer.status === 'finished' || timer.status === 'timeout') {
                        timer.remainingSeconds = timer.totalSeconds;
                    }
                } else if (!timer.hasStarted || timer.status === 'finished' || timer.status === 'timeout') {
                    timer.elapsedSeconds = 0;
                }

                timer.hasStarted = true;
                timer.timeoutTriggered = false;
                timer.resultHasRun = false;
                timer.resultSeconds = 0;
                timer.resultTimeout = false;
                timer.status = 'running';

                timer.timerId = window.setInterval(() => {
                    if (timer.mode === 'countup') {
                        timer.elapsedSeconds += 1;
                        this.updateTimerUI();
                        return;
                    }

                    timer.remainingSeconds = Math.max(0, timer.remainingSeconds - 1);
                    if (timer.remainingSeconds === 0) {
                        this.finishCountdown();
                        return;
                    }

                    this.updateTimerUI();
                }, 1000);

                this.updateTimerUI();
            },

            pauseTimer() {
                if (this.timer.status !== 'running') return;

                this.stopTimer();
                this.timer.status = this.timer.hasStarted ? 'paused' : 'idle';
                this.updateTimerUI();
            },

            toggleTimerRun() {
                if (this.timer.status === 'running') {
                    this.pauseTimer();
                    return;
                }
                this.startTimer();
            },

            resetTimer() {
                this.stopTimer();
                this.timer.status = 'idle';
                this.timer.elapsedSeconds = 0;
                this.timer.totalSeconds = clampTimerMinutes(this.timer.selectedMinutes) * 60;
                this.timer.remainingSeconds = this.timer.totalSeconds;
                this.timer.hasStarted = false;
                this.timer.timeoutTriggered = false;
                this.timer.resultHasRun = false;
                this.timer.resultSeconds = 0;
                this.timer.resultTimeout = false;
                this.updateTimerUI();
            },

            finishCountdown() {
                if (!this.isPracticeInProgress() || this.timer.timeoutTriggered) return;

                this.stopTimer();
                this.timer.remainingSeconds = 0;
                this.timer.status = 'timeout';
                this.timer.timeoutTriggered = true;
                this.currentIndex = this.questionQueue.length;
                this.renderPracticeQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            updateTimerUI() {
                const timer = this.timer;
                const toolbar = document.getElementById('practice-bottom-toolbar');
                const toolbarDisplay = document.getElementById('timer-toolbar-display');
                const drawerDisplay = document.getElementById('timer-drawer-display');
                const toolbarMain = document.getElementById('timer-toolbar-main');
                const toolbarToggle = document.getElementById('timer-toolbar-toggle-btn');
                const toolbarReset = document.getElementById('timer-toolbar-reset-btn');
                const toolbarSettings = document.getElementById('timer-toolbar-settings-btn');
                const drawer = document.getElementById('timer-drawer');
                const backdrop = document.getElementById('practice-toolbar-backdrop');
                const drawerStart = document.getElementById('timer-drawer-start-btn');
                const drawerPause = document.getElementById('timer-drawer-pause-btn');
                const drawerReset = document.getElementById('timer-drawer-reset-btn');
                const hideBtn = document.getElementById('timer-hide-btn');
                const statusText = document.getElementById('timer-status-text');
                const customInput = document.getElementById('timer-custom-input');
                const randomToolbarMain = document.getElementById('random-toolbar-main');
                const randomProgress = document.getElementById('random-toolbar-progress');
                const randomStreak = document.getElementById('random-toolbar-streak');
                const randomTarget = document.getElementById('random-toolbar-target');
                const randomEndBtn = document.getElementById('random-toolbar-end-btn');

                if (!toolbar || !toolbarDisplay || !drawerDisplay || !toolbarMain) return;

                const activeToolbarMode = this.getActiveToolbarMode();
                const shouldShowTimer = activeToolbarMode === 'timer';
                const shouldShowRandom = activeToolbarMode === 'random';
                this.setPracticeToolbarMode(activeToolbarMode);

                const realTime = this.getTimerClockText();
                const toolbarTime = timer.displayHidden ? '--:--' : realTime;

                toolbarDisplay.textContent = toolbarTime;
                toolbarDisplay.classList.toggle('is-concealed', timer.displayHidden);
                drawerDisplay.textContent = realTime;
                toolbarMain.dataset.timerStatus = timer.status;

                if (toolbarToggle) toolbarToggle.textContent = timer.status === 'running' ? '暂停' : (timer.status === 'paused' ? '继续' : '开始');
                if (toolbarReset) toolbarReset.disabled = !timer.hasStarted && timer.status === 'idle';
                if (toolbarSettings) toolbarSettings.classList.toggle('is-primary', timer.drawerOpen && shouldShowTimer);
                
                if (drawer) drawer.hidden = !timer.drawerOpen || !shouldShowTimer;
                if (backdrop) backdrop.hidden = !timer.drawerOpen || !shouldShowTimer;
                toolbar.classList.toggle('drawer-open', timer.drawerOpen && shouldShowTimer);

                if (drawerStart) drawerStart.textContent = timer.status === 'paused' ? '继续' : '开始';
                if (drawerPause) drawerPause.disabled = timer.status !== 'running';
                if (drawerReset) drawerReset.disabled = !timer.hasStarted && timer.status === 'idle';

                if (hideBtn) {
                    hideBtn.classList.toggle('is-selected', timer.displayHidden);
                    hideBtn.textContent = timer.displayHidden ? '显示时间' : '隐藏时间';
                }

                if (customInput) customInput.value = String(timer.selectedMinutes);

                document.querySelectorAll('[data-timer-mode]').forEach(button => {
                    button.classList.toggle('is-selected', button.dataset.timerMode === timer.mode);
                });

                document.querySelectorAll('[data-timer-preset]').forEach(button => {
                    button.classList.toggle('is-selected', Number(button.dataset.timerPreset) === timer.selectedMinutes);
                });

                if (statusText) {
                    const statusMeta = this.getTimerStatusMeta();
                    statusText.textContent = statusMeta.text;
                    statusText.classList.remove('is-warning', 'is-danger');
                    if (statusMeta.tone === 'warning') statusText.classList.add('is-warning');
                    if (statusMeta.tone === 'danger') statusText.classList.add('is-danger');
                }

                if (randomToolbarMain) randomToolbarMain.dataset.timerStatus = this.randomStreak > 0 ? 'running' : 'idle';
                if (randomProgress) randomProgress.textContent = `${Math.min(this.randomAnsweredCount, this.randomRoundTarget)}/${this.randomRoundTarget}`;
                if (randomStreak) randomStreak.textContent = String(this.randomStreak);
                if (randomTarget) randomTarget.textContent = `${this.randomRoundTarget}题`;
                if (randomEndBtn) randomEndBtn.disabled = !shouldShowRandom;
            },

            // 视图控制器
            switchView(viewId) {
                if (viewId === 'view-mode-select' && !['N1', 'N2', 'N3'].includes(this.currentLevel)) {
                    this.currentLevel = null;
                    this.practiceMode = null;
                    this.currentYear = null;
                    replaceAppUrl({});
                    viewId = 'view-level-select';
                }

                document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
                document.getElementById(viewId).classList.add('active');
                updateGrammarPracticeTestTools(viewId === 'view-practice' && this.currentIndex < this.questionQueue.length && this.questionQueue.length > 0);

                if (viewId !== 'view-practice') {
                    this.setPracticeToolbarMode(null);
                    this.closeTimerDrawer({ skipUpdate: true });
                } else {
                    this.updateTimerUI();
                }
                if (viewId !== 'view-mode-select' && viewId !== 'view-year-select') {
                    this.closeTrainingModePicker();
                }
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            // Step 1: 选择级别
            selectLevel(level) {
                if (!isEnabledSortLevel(level)) return;
                this.currentLevel = level;
                document.getElementById('display-selected-level').textContent = level;
                replaceAppUrl({ level });
                this.switchView('view-mode-select');
            },

            // Step 2-A: 显示年份列表
            showYearList(options = {}) {
                const { updateUrl = true } = options;
                this.practiceMode = 'year';

                if (updateUrl) replaceAppUrl({ level: this.currentLevel });
                
                const availableYears = [...new Set(questionDatabase
                    .filter(q => q.level === this.currentLevel)
                    .map(q => q.year)
                )].sort((left, right) => getYearSortValue(right) - getYearSortValue(left));

                const container = document.getElementById('year-list-container');
                const reviewSection = document.getElementById('year-review-section');
                const reviewGrid = document.getElementById('year-review-grid');
                container.innerHTML = '';
                reviewGrid.innerHTML = '';

                const reviewItems = collectYearReviewItems(this.currentLevel).filter(item => isEnabledSortYear(this.currentLevel, item.year));
                if (reviewItems.length > 0) {
                    reviewGrid.innerHTML = reviewItems.map(item => `
                        <button onclick="app.startMistakePractice('${item.year}')" class="group inline-flex items-center gap-2 px-4 py-2 border-[2px] border-eagleGold bg-white text-eagleGold text-sm font-black tracking-wide hover:bg-eagleGold hover:text-white transition-all shadow-[2px_2px_0px_#0F0F0F] hover:shadow-[3px_3px_0px_#0F0F0F] hover:translate-x-[-1px] hover:translate-y-[-1px]">
                            <span>${item.year}</span>
                            <span class="text-xs px-2 py-0.5 border border-eagleGold bg-orange-50 text-eagleGold group-hover:bg-white/20 group-hover:border-white/40">待复习 ${item.count} 题</span>
                        </button>
                    `).join('');
                    reviewSection.classList.remove('hidden');
                } else {
                    reviewSection.classList.add('hidden');
                }

                const lastPractice = localStorage.getItem(getGrammarSortLastPracticeKey(this.currentLevel)) || '';

                if (availableYears.length === 0) {
                    container.innerHTML = `<div class="col-span-full text-center py-12 text-textSub bg-white border-[3px] border-borderMain">该级别暂无真题数据</div>`;
                } else {
                    container.innerHTML = availableYears.map(year => {
                        const qCount = questionDatabase.filter(q => q.level === this.currentLevel && q.year === year).length;
                        const isLastPractice = year === lastPractice;
                        const isEnabled = isEnabledSortYear(this.currentLevel, year);

                        return `
                            <button ${isEnabled ? `onclick="app.startYearPractice('${year}')"` : 'type="button" disabled'} class="flex items-center justify-between p-5 bg-white border-[4px] border-borderStrong transition-all group focus:outline-none text-left ${isEnabled ? 'hover:bg-bgMain hover:translate-x-[-2px] hover:translate-y-[-2px] shadow-[6px_6px_0px_#0F0F0F] hover:shadow-[9px_9px_0px_#A31010]' : 'opacity-55 cursor-not-allowed'}">
                                <div class="flex items-center gap-3">
                                    <div class="w-2 h-8 ${isEnabled ? 'bg-textMuted group-hover:bg-accentRed' : 'bg-borderDark'} transition-colors"></div>
                                    <div class="font-black text-lg text-textMain tracking-wider">${year}</div>
                                </div>
                                <div class="flex items-center gap-2 shrink-0">
                                    ${isLastPractice ? '<span class="text-[11px] font-black tracking-[0.14em] text-white bg-textMain px-2.5 py-1 whitespace-nowrap">上次练习</span>' : ''}
                                    <div class="text-sm text-textSub font-sans bg-bgCard px-2 py-1 border-[2px] border-borderStrong ${isEnabled ? 'group-hover:bg-textMain group-hover:text-white' : ''} transition-colors whitespace-nowrap">${isEnabled ? '真题卷' : '暂无数据'}</div>
                                    <div class="text-sm text-textSub font-sans bg-bgCard px-2 py-1 border-[2px] border-borderStrong whitespace-nowrap">共 ${qCount} 题</div>
                                </div>
                            </button>
                        `;
                    }).join('');
                }

                this.switchView('view-year-select');
            },

            // Step 2-B: 启动随机乱序练习
            restartCurrentPractice() {
                const options = {
                    skipPicker: true,
                    trainingMode: this.trainingMode,
                    challengeMinutes: this.timer.selectedMinutes,
                    randomTargetCount: this.randomTargetCount
                };
                if (this.practiceMode === 'year') {
                    this.startYearPractice(this.currentYear, options);
                    return;
                }
                if (this.practiceMode === 'mistake') {
                    this.startMistakePractice(this.currentYear, options);
                    return;
                }
                if (this.currentLevel === 'ALL') {
                    this.startGlobalRandomPractice(options);
                    return;
                }
                this.startRandomPractice(options);
            },

            startRandomPractice(options = {}) {
                const { skipPicker = false, trainingMode = 'study', challengeMinutes = null, randomTargetCount = this.randomTargetCount } = options;
                if (!skipPicker) {
                    this.openTrainingModePicker({ kind: 'random' });
                    return;
                }
                this.prepareTrainingForRun(trainingMode, challengeMinutes);
                this.randomTargetCount = RANDOM_TARGET_PRESETS.includes(Number(randomTargetCount))
                    ? Number(randomTargetCount)
                    : RANDOM_TARGET_PRESETS[1];
                this.practiceMode = 'random';
                this.currentYear = '随机抽取';
                this.stats = { correct: 0, incorrect: 0 };
                this.randomStreak = 0;
                this.randomBestStreak = 0;
                replaceAppUrl({ level: this.currentLevel });
                
                const pool = this.getRandomQuestionPool();
                if(pool.length === 0) { alert('该级别暂无题目'); return; }

                this.prepareRandomRound(pool);
                startGrammarRewardRun();
                this.renderPracticeQuestion();
                this.switchView('view-practice');
                if (this.trainingMode === 'challenge') this.startTimer();
            },

            startGlobalRandomPractice(options = {}) {
                const { skipPicker = false, trainingMode = 'study', challengeMinutes = null, randomTargetCount = this.randomTargetCount } = options;
                if (!skipPicker) {
                    this.openTrainingModePicker({ kind: 'global-random' });
                    return;
                }
                this.prepareTrainingForRun(trainingMode, challengeMinutes);
                this.randomTargetCount = RANDOM_TARGET_PRESETS.includes(Number(randomTargetCount))
                    ? Number(randomTargetCount)
                    : RANDOM_TARGET_PRESETS[1];
                this.currentLevel = 'ALL';
                this.practiceMode = 'random';
                this.currentYear = '全级别乱序';
                this.stats = { correct: 0, incorrect: 0 };
                this.randomStreak = 0;
                this.randomBestStreak = 0;
                replaceAppUrl({});

                const pool = this.getRandomQuestionPool();
                if(pool.length === 0) { alert('题库暂无题目'); return; }

                this.prepareRandomRound(pool);
                startGrammarRewardRun();
                this.renderPracticeQuestion();
                this.switchView('view-practice');
                if (this.trainingMode === 'challenge') this.startTimer();
            },

            // Step 2-C: 启动错题回顾练习
            startMistakePractice(year, options = {}) {
                const { updateUrl = true, fromInit = false, skipPicker = false, trainingMode = 'study', challengeMinutes = null } = options;
                if (!skipPicker) {
                    this.openTrainingModePicker({ kind: 'mistake', year, updateUrl, fromInit });
                    return;
                }
                this.prepareTrainingForRun(trainingMode, challengeMinutes);
                this.practiceMode = 'mistake';
                this.currentYear = year;
                this.stats = { correct: 0, incorrect: 0 };
                this.randomStreak = 0;
                this.randomBestStreak = 0;

                const mistakeIds = getYearMistakes(this.currentLevel, year);
                let pool = questionDatabase.filter(q => q.level === this.currentLevel && q.year === year && mistakeIds.includes(q.id));
                if (pool.length === 0) {
                    alert('太棒了！这个年份当前没有错题记录。');
                    if (fromInit) replaceAppUrl({ level: this.currentLevel });
                    this.showYearList({ updateUrl });
                    return;
                }

                localStorage.setItem(getGrammarSortLastPracticeKey(this.currentLevel), year);
                this.questionQueue = pool;
                this.currentIndex = 0;
                startGrammarRewardRun();

                if (updateUrl) {
                    replaceAppUrl({
                        level: this.currentLevel,
                        year,
                        mode: 'review',
                        training: this.trainingMode,
                        timer: this.trainingMode === 'challenge' ? String(this.timer.selectedMinutes) : null
                    });
                }
                this.renderPracticeQuestion();
                this.switchView('view-practice');
                if (this.trainingMode === 'challenge') this.startTimer();
            },

            // Step 3: 启动指定年份练习
            startYearPractice(year, options = {}) {
                const { updateUrl = true, skipPicker = false, trainingMode = 'study', challengeMinutes = null } = options;
                if (!skipPicker) {
                    this.openTrainingModePicker({ kind: 'year', year, updateUrl });
                    return;
                }
                this.prepareTrainingForRun(trainingMode, challengeMinutes);
                this.practiceMode = 'year';
                this.currentYear = year;
                this.stats = { correct: 0, incorrect: 0 };
                this.randomStreak = 0;
                this.randomBestStreak = 0;
                localStorage.setItem(getGrammarSortLastPracticeKey(this.currentLevel), year);
                
                this.questionQueue = questionDatabase.filter(q => q.level === this.currentLevel && q.year === year);
                this.currentIndex = 0;
                startGrammarRewardRun();
                
                if (updateUrl) {
                    replaceAppUrl({
                        level: this.currentLevel,
                        year,
                        training: this.trainingMode,
                        timer: this.trainingMode === 'challenge' ? String(this.timer.selectedMinutes) : null
                    });
                }
                this.renderPracticeQuestion();
                this.switchView('view-practice');
                if (this.trainingMode === 'challenge') this.startTimer();
            },

            buildCorrectOrderMarkup(q) {
                let correctOrderStrHtml = '';
                q.correctOrder.forEach((id, idx) => {
                    const optText = q.options.find(o => o.id === id).text;
                    if (idx === q.starIndex) {
                        correctOrderStrHtml += `<span class="inline-block border-[2px] border-borderStrong px-2 py-0.5 text-xs mr-1 text-white bg-accentGold font-sans align-middle font-black shadow-[2px_2px_0px_#0F0F0F]">★ ${id}</span><strong class="text-accentGold align-middle">${optText}</strong>`;
                    } else {
                        correctOrderStrHtml += `<span class="inline-block border-[2px] border-borderStrong px-2 py-0.5 bg-white text-xs mr-1 text-textMain font-sans align-middle font-black shadow-[2px_2px_0px_#0F0F0F]">${id}</span><span class="align-middle font-bold">${optText}</span>`;
                    }
                    if (idx < q.correctOrder.length - 1) {
                        correctOrderStrHtml += ` ${getIconSvg('arrow-right', 'w-4 h-4 inline-block text-borderDark mx-1 align-middle')} `;
                    }
                });
                return correctOrderStrHtml;
            },

            buildChallengeExplanationCards() {
                return this.questionQueue.map((q, index) => `
                    <div class="bg-white border-[4px] border-borderStrong p-5 md:p-6 shadow-[6px_6px_0px_#0F0F0F]">
                        <div class="flex items-center justify-between gap-3 border-b-[2px] border-borderMain pb-3 mb-4">
                            <div class="text-sm font-black text-textMain tracking-[0.08em]">${q.label || `Q${index + 1}`}</div>
                            <div class="text-[11px] font-black tracking-[0.16em] text-textSub uppercase">解析已解锁</div>
                        </div>
                        <div class="text-textMain font-serif-jp text-lg md:text-xl font-black leading-loose bg-bgMain p-4 border-[2px] border-borderStrong mb-5">
                            ${q.prefix}
                            <span class="inline-flex items-end gap-3 mx-2 align-middle">
                                ${Array.from({ length: 4 }, (_, slotIndex) => {
                                    const answerId = q.correctOrder[slotIndex];
                                    if (slotIndex === q.starIndex) {
                                        return `<span class="inline-flex w-9 h-9 items-center justify-center border-b-[4px] border-accentGold text-accentGold font-black font-sans">${answerId}</span>`;
                                    }
                                    return `<span class="inline-flex w-9 h-9 items-center justify-center border-b-[4px] border-textMain text-textMain font-black font-sans">${answerId}</span>`;
                                }).join('')}
                            </span>
                            ${q.suffix}
                        </div>
                        <div class="space-y-5">
                            <div>
