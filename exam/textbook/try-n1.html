<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Try！N1</title>
    <style>
        /* =========================================
           1. 🎨 全局变量
           ========================================= */
        :root {
            --bg-paper: #FFFFFF;       
            --bg-sidebar: #1F2B3E;     
            --text-main: #333333;      
            --text-sub: #777777;       
            --accent: #2A4073;         
            --highlight: #B4A582;      
            
            --grammar-theme: #C0392B;   /* 语法红 */
            --vocab-theme: #21618C;     /* 词汇蓝 */
            --supplement-theme: #E67E22; /* 补充橙 */

            --font-serif: "Hiragino Mincho ProN", "Yu Mincho", "Songti SC", serif;
            --font-sans: "Hiragino Sans", "Yu Gothic", "Helvetica Neue", sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-paper);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 2.2;
            font-size: 18px; /* 电脑端基准字号 */
            display: block;
            height: 100vh;
            overflow: hidden; 
            transition: all 0.3s ease;
        }

        body.hide-ruby rt { display: none; }

        /* 布局容器：替代原有的内联样式，并支持响应式方向切换 */
        #app-layout {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* =========================================
           2. 🖥️ 电脑端专用样式 (min-width: 769px)
           ========================================= */
        @media (min-width: 769px) {
            body { font-size: 18px; }
            #app-layout { flex-direction: row; }

            aside {
                width: 280px; height: 100vh;
                background-color: var(--bg-sidebar); color: #E0E0E0;
                display: flex; flex-direction: column; flex-shrink: 0; 
                z-index: 100; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                white-space: nowrap; border-right: 1px solid rgba(0,0,0,0.1);
            }
            body.sidebar-closed aside { width: 0; padding: 0; opacity: 0; overflow: hidden; }

            .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); display: block; }
            .sidebar-header h1 { margin: 0; font-family: var(--font-serif); font-size: 1.4rem; letter-spacing: 2px; color: #FFF; }
            #nav-list { flex: 1; overflow-y: auto; padding: 10px 0; list-style: none; margin: 0; display: block; }

            .nav-item { padding: 12px 25px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; border-left: 3px solid transparent; font-family: var(--font-sans); color: #ccc; margin: 0; border-radius: 0; background-color: transparent; border: none; border-left: 3px solid transparent; }
            .nav-item:hover { background-color: rgba(255,255,255,0.05); padding-left: 30px; color: #FFF; }
            .nav-item.active { background-color: rgba(255,255,255,0.1); color: #FFF; border-left-color: var(--highlight); font-weight: bold; }

            header { height: 70px; padding: 0 30px; justify-content: space-between; }
            #sidebar-toggle { font-size: 1.4rem; display: flex; order: 1; }
            .tools { order: 3; margin-left: 0; }

            #grammar-panel { 
                position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); 
                width: 620px; height: 0; background: #FFF; 
                box-shadow: 0 10px 40px rgba(0,0,0,0.25); border-radius: 12px;
                transition: height 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); 
                z-index: 200; overflow: hidden; pointer-events: none; 
            }
            #grammar-panel.open { height: auto; max-height: 60vh; min-height: 200px; pointer-events: auto; overflow-y: auto; }
            
            article { padding-bottom: 200px; }
        }

        /* =========================================
           3. 📱 手机端及平板专用样式 (max-width: 1024px) - 扩大范围以覆盖 iPad
           ========================================= */
        @media (max-width: 1024px) {
            .btn-text { display: none; }
            body { font-size: 16px; } /* iPad 上稍微大一点 */
            #app-layout { flex-direction: column; }

            aside {
                width: 100%; height: 60px; min-height: 0; padding: 0 10px; opacity: 1; overflow: hidden;
                flex-direction: row; align-items: center; 
                background-color: #fafafa; 
                border-bottom: 1px solid rgba(0,0,0,0.1); box-shadow: 0 4px 10px rgba(0,0,0,0.05);
                overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none;
                transition: all 0.3s ease; z-index: 100;
            }
            aside::-webkit-scrollbar { display: none; }
            
            body.mobile-menu-closed aside { 
                height: 0; padding: 0; opacity: 0; 
                border-bottom: 0;
            }
            .sidebar-header { display: none; }
            #nav-list { display: flex; flex-direction: row; padding: 10px 5px; margin: 0; height: 100%; align-items: center; list-style: none;}
            
            .nav-item { flex: 0 0 auto; margin-right: 10px; padding: 6px 14px; border: 1px solid #EEE; border-radius: 20px; font-size: 13px; background-color: #fff; color: #666; cursor: pointer; }
            .nav-item.active { background-color: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 6px rgba(0,0,0,0.2); }

            header { height: auto; padding: 12px 15px; flex-wrap: nowrap; align-items: center; justify-content: space-between; }
            #sidebar-toggle { order: 1; margin-right: auto; font-size: 1.2rem; display: flex; }
            .tools { order: 2; margin-left: auto; }

            /* 📱 手机/平板端调整：减小边距，使内容铺开 */
            #content-scroller { padding: 20px 15px 140px 15px !important; }

            /* 🎵 手机/平板端强制固定底部，避免被浏览器工具栏遮挡 */
            .audio-container {
                left: 0 !important; /* 移动端强制全宽 */
                width: 100% !important;
                z-index: 10001 !important; 
                display: flex !important;
            }

            #grammar-panel {
                position: fixed; width: 100%; left: 0; bottom: 85px; transform: none; 
                background: #FFF; border-radius: 12px 12px 0 0; 
                box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
                height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; pointer-events: none; transition: height 0.3s; z-index: 9999;
                overscroll-behavior: contain;
                bottom: calc(85px + env(safe-area-inset-bottom, 0px)); /* 适配底部安全区 */
            }
            #grammar-panel.open { height: auto; max-height: 60vh; pointer-events: auto; }
            
            article { padding-bottom: 100px; }
            
            .panel-content { padding: 20px 15px !important; }
            .panel-title { font-size: 1.2rem !important; }
            .tag { font-size: 0.8rem !important; padding: 3px 8px !important; margin-right: 8px !important; }
            .desc-row { flex-direction: row !important; margin-bottom: 8px; align-items: flex-start; font-size: 13px !important; } 
            .desc-label { margin-bottom: 0; min-width: 3.2em; margin-right: 5px; flex-shrink: 0; }
            .desc-text { word-break: break-all !important; line-height: 1.5 !important; }
            .example-block { padding: 10px 12px !important; border-left-width: 3px !important; font-size: 13px !important; margin-top: 10px !important; }
            .example-title { font-size: 12px !important; margin-bottom: 3px !important; }
        }

        /* =========================================
           4. 通用样式
           ========================================= */
        /* =========================================
   4. 通用样式
   ========================================= */

/* 先写 main，确保它绝对生效 */
main {
    flex: 1;
    width: 100%; /* 强制撑满，配合 flex:1 使用 */
    display: flex;
    flex-direction: column;
    position: relative;
    background-color: var(--bg-paper);
    overflow: hidden;
    min-width: 0;
}
        
        /* 🔥 额外保险：防止 template 标签干扰布局（极少见但可能发生） */
        template {
            display: none !important;
        }
        
        header { background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; flex-shrink: 0; z-index: 50; }
        #sidebar-toggle { cursor: pointer; color: #555; background: none; border: none; padding: 5px; align-items: center; justify-content: center; }
        #sidebar-toggle:hover { color: var(--accent); }
        
        /* 🎵 音频条固定底部样式 - 改为 fixed 定位以适应所有设备 */
        .audio-container {
            position: fixed; /* 关键修改：从 absolute 改为 fixed */
            bottom: 0;
            left: 0; /* 默认全宽，桌面端会被覆盖 */
            right: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 10px 20px 20px 20px;
            /* 适配 iPhone/iPad 底部安全区 */
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: center;
            box-shadow: 0 -2px 15px rgba(0,0,0,0.08);
            border-top: 1px solid rgba(0,0,0,0.05);
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); /* 配合侧边栏动画 */
        }
        
        /* 桌面端适配：避开侧边栏 */
        @media (min-width: 769px) {
            .audio-container {
                left: 280px; /* 默认侧边栏宽度 */
            }
            /* 当侧边栏收起时，音频条撑满全屏 */
            body.sidebar-closed .audio-container {
                left: 0;
            }
        }
        audio { 
            width: 100%; 
            max-width: 800px; 
            height: 45px; 
            filter: sepia(10%); 
        }

        .tools { display: flex; gap: 8px; align-items: center; }
        .btn { background: transparent; border: 1px solid #CCC; padding: 0 12px; border-radius: 4px; font-size: 13px; color: #555; cursor: pointer; transition: all 0.2s; font-family: var(--font-sans); height: 30px; line-height: 28px; display: inline-flex; align-items: center; justify-content: center; }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn.active { background: var(--accent); color: #FFF; border-color: var(--accent); }


        /* ========================================= 
           修复后的通用样式 (替换原有的 #content-scroller 和 article 部分) 
           ========================================= */ 
        #content-scroller { 
            flex: 1; 
            overflow-y: auto; 
            padding: 40px 40px 120px 40px; 
            scroll-behavior: smooth; 
            display: flex; 
            flex-direction: column; 
            
            /* 🔥 核心修复 1: 强制让内部所有元素水平居中 */ 
            align-items: center; 
            
            width: 100%; 
            -webkit-overflow-scrolling: touch; 
        } 

        /* 🔥 核心修复 2: 无论是 article 还是具体的 .job-notice，都强制限制宽度并居中 */ 
        article, 
        .job-notice, 
        .textbook-poster { 
            max-width: 800px; 
            width: 100%; 
            margin: 0 auto; /* 确保自身居中 */ 
            display: none; 
            animation: fadeUp 0.5s ease-out; 
        } 

        /* 激活状态显示 */ 
        article.active, 
        .job-notice.active, 
        .textbook-poster.active { 
            display: block; 
        } 

        /* 动画关键帧 */ 
        @keyframes fadeUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .lesson-header { border-top: 1px solid var(--text-main); border-bottom: 1px solid var(--text-main); padding: 12px 0; margin-bottom: 40px; display: flex; justify-content: space-between; font-family: var(--font-serif); font-size: 0.85rem; letter-spacing: 1px; width: 100%;}
        
        .translation { 
            display: none; margin-top: 8px; padding: 12px 16px; 
            background-color: #f2f2f2; border-radius: 8px; font-size: 0.9em; 
            color: #555; font-family: var(--font-sans); line-height: 1.6;
        }
        body.show-trans .translation { display: block; }

        .vocab-point { cursor: pointer; font-weight: bold; color: var(--vocab-theme); background: linear-gradient(transparent 70%, rgba(33, 97, 140, 0.15) 70%); padding: 0 2px; border-radius: 2px; transition: background 0.2s; }
        .vocab-point:hover { background: rgba(33, 97, 140, 0.2); }
        .grammar-point { cursor: pointer; font-weight: bold; color: var(--grammar-theme); border-bottom: 2px solid rgba(192, 57, 43, 0.3); transition: all 0.2s; }
        .grammar-point:hover { background-color: rgba(192, 57, 43, 0.1); }
        .grammar-review { cursor: pointer; font-weight: bold; color: var(--supplement-theme); border-bottom: 2px dashed rgba(230, 126, 34, 0.3); transition: all 0.2s; }
        
        /* 修复：防止 ruby/rt 标签拦截点击事件 */
        .vocab-point *, .grammar-point *, .grammar-review * { pointer-events: none; }

        /* =========================================
           6. 解释框样式
           ========================================= */
        .panel-content { padding: 30px 40px; position: relative; }
        .panel-close { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #CCC; transition: color 0.2s;}
        .panel-close:hover { color: #555; }
        .panel-header-box { display: flex; align-items: center; margin-bottom: 20px; }
        .tag { display: inline-block; padding: 4px 10px; border-radius: 4px; color: #fff; font-size: 0.9rem; font-weight: bold; margin-right: 15px; }
        .panel-title { font-size: 1.6rem; font-weight: bold; color: #333; }
        
        .desc-row { margin-bottom: 8px; font-size: 1rem; line-height: 1.5; color: #333; display: flex; align-items: flex-start; }
        .desc-label { font-weight: bold; min-width: 4em; margin-right: 10px; flex-shrink: 0; }
        .desc-text { flex: 1; word-wrap: break-word; word-break: normal; }
        .desc-row.supplement .desc-label { color: var(--supplement-theme); }
        .desc-row.supplement { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ccc; }
        
        .example-block { margin-top: 15px; padding: 15px 20px; background-color: #F7F7F7; border-radius: 6px; border-left: 5px solid #ccc; font-family: var(--font-sans); font-size: 1rem; line-height: 1.6; }
        .example-title { font-size: 0.9rem; font-weight: bold; color: #777; margin-bottom: 5px; display: block; }
        .example-jp { font-family: var(--font-sans); margin-bottom: 5px; color:#333; }
        .example-cn { font-family: var(--font-sans); color: #333; }

        .type-grammar .tag { background-color: var(--grammar-theme); }
        .type-grammar .desc-label { color: var(--grammar-theme); }
        .type-grammar .example-block { border-left-color: var(--grammar-theme); }
        
        .type-vocab .tag { background-color: var(--vocab-theme); }
        .type-vocab .desc-label { color: var(--vocab-theme); }
        .type-vocab .example-block { border-left-color: var(--vocab-theme); }

        .type-review .tag { background-color: var(--supplement-theme); }
        .type-review .desc-label { color: var(--supplement-theme); }
        .type-review .example-block { border-left-color: var(--supplement-theme); }
        
        .desc-label.supplement-label { color: var(--supplement-theme); }

        /* ----------------------------------
           保留 N1 原有的对话样式
           ---------------------------------- */
        .script-row {
            display: flex !important;
            align-items: flex-start !important; 
            margin-bottom: 20px !important;
            border-bottom: 1px dashed #eee; 
            padding-bottom: 15px;
        }
        .script-speaker {
            width: 3.5em !important;
            margin-right: 15px !important;
            flex-shrink: 0 !important;
            font-weight: bold;
            text-align: right !important;
            line-height: 2.2 !important; 
            padding-top: 0px !important; 
        }
        .script-line {
            flex-grow: 1 !important;
            line-height: 2.2 !important;
        }
        @media (max-width: 768px) {
            .script-speaker {
                width: 3em !important;
                text-align: left !important;
                margin-right: 10px !important;
            }
            .script-row { margin-bottom: 25px !important; }
        }
        .japanese-text { color: #111 !important; line-height: 2.4 !important; }
        .japanese-text p { margin-bottom: 1.8em !important; }

            <template id="lesson-1-content"><article>
                <div class="lesson-header">
                    <span>ABK 新聞</span>
                    <span>2010年9月20日</span>
                </div>

                <h2 style="font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;">
                    ビールの<ruby>祭<rt>さい</rt></ruby><ruby>典<rt>てん</rt></ruby> 200周年<br>
                    <span class="vocab-point" onclick="showItem('oktober')">オクトーバーフェスト</span><ruby>開<rt>かい</rt></ruby><ruby>幕<rt>まく</rt></ruby>
                </h2>
                <div class="sub-title" style="text-align: right; font-size: 1rem; margin-top: -10px;">ミュンヘン</div>

                <div class="japanese-text">
                    <p>
                        18日、ドイツのミュンヘンで「<span class="vocab-point" onclick="showItem('oktober')">オクトーバーフェスト</span>」が<ruby>開<rt>かい</rt></ruby><ruby>幕<rt>まく</rt></ruby>した。この世界最大のビール祭りは、ミュンヘン市長による「<span class="vocab-point" onclick="showItem('taruake')"><ruby>樽<rt>たる</rt></ruby><ruby>開<rt>あ</rt></ruby>け</span>」<span class="grammar-point" onclick="showItem('kawakirini')">を皮切りに</span>、16日間<span class="grammar-review" onclick="showItem('niwatatte')">にわたって</span>、42ヘクタール（東京ドーム約九個分）の<span class="vocab-point" onclick="showItem('shikichi')"><ruby>敷<rt>しき</rt></ruby><ruby>地<rt>ち</rt></ruby></span>で<span class="vocab-point" onclick="showItem('kurihirogerareru')"><ruby>繰<rt>く</rt></ruby>り<ruby>広<rt>ひろ</rt></ruby>げられる</span>。
                    </p>
                    <p class="translation"> 18日，“慕尼黑啤酒节”在德国慕尼黑开幕。这场世界最大的啤酒节以慕尼黑市长的“开桶仪式”为开端，将在为期16天的时间里，在42公顷（约9个东京巨蛋大小）的场地上展开。</p>

                    <p>
                        さすが世界一のビールの<span class="vocab-point" onclick="showItem('honba')"><ruby>本<rt>ほん</rt></ruby><ruby>場<rt>ば</rt></ruby></span><span class="grammar-point" onclick="showItem('toatte')">とあって</span>、毎年、各国から600万人以上の観光客が<ruby>訪<rt>おとず</rt></ruby>れている。
                    </p>
                    <p class="translation"> 不愧是世界第一的啤酒之乡，每年都有来自各国的600多万游客造访。</p>

                    <p>
                        今年は、200周年という歴史的<span class="vocab-point" onclick="showItem('fushime')"><ruby>節<rt>ふし</rt></ruby><ruby>目<rt>め</rt></ruby></span><span class="grammar-review" onclick="showItem('niataru')">にあたる</span><span class="grammar-review" onclick="showItem('kotokara')">ことから</span>、200年前のお祭りムードを<ruby>再<rt>さい</rt></ruby><ruby>現<rt>げん</rt></ruby>するヒストリーテントも特別に設置された。<span class="vocab-point" onclick="showItem('nostalgic')">ノスタルジック</span>な<ruby>雰<rt>ふん</rt></ruby><ruby>囲<rt>い</rt></ruby><ruby>気<rt>き</rt></ruby>の<span class="vocab-point" onclick="showItem('tadayou')"><ruby>漂<rt>ただよ</rt></ruby>う</span>テントの中では、<ruby>連<rt>れん</rt></ruby><ruby>日<rt>じつ</rt></ruby>バイエルン<span class="vocab-point" onclick="showItem('chihou')"><ruby>地<rt>ち</rt></ruby><ruby>方<rt>ほう</rt></ruby></span><span class="grammar-point" onclick="showItem('naradewa')">ならでは</span>のダンスやパレード、<ruby>競<rt>けい</rt></ruby><ruby>馬<rt>ば</rt></ruby>がそれぞれ1日2回ずつ<ruby>開<rt>かい</rt></ruby><ruby>催<rt>さい</rt></ruby>される予定になっており、<ruby>例<rt>れい</rt></ruby><ruby>年<rt>ねん</rt></ruby><span class="grammar-point" onclick="showItem('nimomashite')">にもまして</span>、多くの<ruby>集<rt>しゅう</rt></ruby><ruby>客<rt>きゃく</rt></ruby>が<span class="vocab-point" onclick="showItem('mikomarete')"><ruby>見<rt>み</rt></ruby><ruby>込<rt>こ</rt></ruby>まれて</span>いる。
                    </p>
                    <p class="translation"> 由于今年正值200周年这一历史性的关键节点，还特别设置了重现200年前节日氛围的历史帐篷。在充满怀旧气息的帐篷中，预计连日每天举办两次仅在巴伐利亚地区才能看到的舞蹈、游行和赛马活动，预计将比往年吸引更多的游客。</p>

                    <p>
                        「オクトーバーフェスト」といえば、もちろんビールが<span class="vocab-point" onclick="showItem('main')">メイン</span>だが、ノンアルコール<ruby>飲<rt>いん</rt></ruby><ruby>料<rt>りょう</rt></ruby>のバーや、<span class="vocab-point" onclick="showItem('merry')">メリーゴーラウンド</span>や<span class="vocab-point" onclick="showItem('jet')">ジェットコースター</span>のある移動遊園地なども開かれ、<span class="vocab-point" onclick="showItem('kazokuzure')"><ruby>家<rt>か</rt></ruby><ruby>族<rt>ぞく</rt></ruby><ruby>連<rt>づ</rt></ruby>れ</span>の姿も多く見られる。<span class="vocab-point" onclick="showItem('imaya')"><ruby>今<rt>いま</rt></ruby>や</span>ビール好きの大人<span class="grammar-review" onclick="showItem('hamotoyori')">はもとより</span>小さな子ども<span class="grammar-point" onclick="showItem('nitarumade')">に至るまで</span>、<span class="vocab-point" onclick="showItem('arayuru')">あらゆる</span>人々が楽しめる国際的なイベントとなっている。
                    </p>
                    <p class="translation"> 说到“慕尼黑啤酒节”，主角当然是啤酒，但也开设了无酒精饮料吧、旋转木马和过山车等移动游乐园，可以看到许多带着家人的游客。如今，不仅是爱喝啤酒的大人，连小孩子都能乐在其中，已成为各种人群都能享受的国际性活动。</p>

                    <p>
                        日本から来たという観光客の一人は、「さすが、<span class="vocab-point" onclick="showItem('honba')"><ruby>本<rt>ほん</rt></ruby><ruby>場<rt>ば</rt></ruby></span>は<ruby>雰<rt>ふん</rt></ruby><ruby>囲<rt>い</rt></ruby><ruby>気<rt>き</rt></ruby><span class="grammar-point" onclick="showItem('karashite')">からして</span>全く違う」と<ruby>興<rt>こう</rt></ruby><ruby>奮<rt>ふん</rt></ruby><span class="grammar-review" onclick="showItem('gimi')"><ruby>気<rt>ぎ</rt></ruby><ruby>味<rt>み</rt></ruby></span>に語っていた。
                    </p>
                    <p class="translation"> 一位来自日本的游客兴奋地说道：“不愧是原产地，单从气氛上就完全不同。”</p>
                </div>
            </article></template>

　　　　　<template id="lesson-2-content"><article id="lesson-2">
                <div class="lesson-header" style="border-bottom: double 3px #333;">
                    <span>さいわい市議会</span>
                    <span>所信表明演説</span>
                </div>

                <h2><ruby>産<rt>さん</rt></ruby><ruby>業<rt>ぎょう</rt></ruby><ruby>医<rt>い</rt></ruby>を<ruby>増<rt>ふ</rt></ruby>やそう</h2>
                <div class="sub-title" style="text-align: right; margin-top: -10px;">市長：<ruby>松<rt>まつ</rt></ruby><ruby>本<rt>もと</rt></ruby><ruby>義<rt>よし</rt></ruby><ruby>男<rt>お</rt></ruby></div>

                <div class="japanese-text">
                    <p>
                        さいわい市、市議会の皆様、市長の<ruby>松<rt>まつ</rt></ruby><ruby>本<rt>もと</rt></ruby><ruby>義<rt>よし</rt></ruby><ruby>男<rt>お</rt></ruby>です。今から「<span class="vocab-point" onclick="showItem('sangyoui')"><ruby>産<rt>さん</rt></ruby><ruby>業<rt>ぎょう</rt></ruby><ruby>医<rt>い</rt></ruby></span>増員３カ年計画」についてお話しさせていただきます。
                    </p>
                    <p class="translation">幸祝市议会的各位议员，我是市长松本义男。现在我就“增加企业医生三年计划”进行说明。</p>

                    <p>
                        これは<ruby>小<rt>しょう</rt></ruby><ruby>規<rt>き</rt></ruby><ruby>模<rt>ぼ</rt></ruby><ruby>事<rt>じ</rt></ruby><ruby>業<rt>ぎょう</rt></ruby><ruby>所<rt>しょ</rt></ruby>に対して産業医を置くために、市が<span class="vocab-point" onclick="showItem('hojo')"><ruby>補<rt>ほ</rt></ruby><ruby>助<rt>じょ</rt></ruby></span>をする制度です。
                    </p>
                    <p class="translation">这是一项由市政府提供补助的制度，旨在让小规模的事业单位也能设置企业医生。</p>

                    <p>
                        さいわい市には50人<ruby>未<rt>み</rt></ruby><ruby>満<rt>まん</rt></ruby>の事業所が多いのですが、この規模では産業医を<span class="vocab-point" onclick="showItem('sennin')"><ruby>選<rt>せん</rt></ruby><ruby>任<rt>にん</rt></ruby></span>しているのは全国平均で８％<span class="vocab-point" onclick="showItem('teido')"><ruby>程<rt>てい</rt></ruby><ruby>度<rt>ど</rt></ruby></span>、さいわい市<span class="grammar-point" onclick="showItem('niitattewa')">に至っては</span>わずか５％です。つまり、市内の<ruby>小<rt>しょう</rt></ruby><ruby>規<rt>き</rt></ruby><ruby>模<rt>ぼ</rt></ruby><ruby>事<rt>じ</rt></ruby><ruby>業<rt>ぎょう</rt></ruby><ruby>所<rt>しょ</rt></ruby>の95％に産業医がいない状況であります。
                    </p>
                    <p class="translation">幸祝市有很多不足50人的事业单位，这种规模的企业选任企业医生的比例全国平均约为8%，而幸祝市甚至只有5%。也就是说，市内95%的小规模事业单位处于没有企业医生的状况。</p>

                    <p>
                        <span class="vocab-point" onclick="showItem('chuushou')"><ruby>中<rt>ちゅう</rt></ruby><ruby>小<rt>しょう</rt></ruby><ruby>企<rt>き</rt></ruby><ruby>業<rt>ぎょう</rt></ruby></span><span class="grammar-point" onclick="showItem('toiedomo')">といえども</span>、労働者の健康に責任を持つべきなのは言う<span class="grammar-review" onclick="showItem('mademonai')">までもない</span>ことです。<span class="vocab-point" onclick="showItem('hakken')"><ruby>発<rt>はっ</rt></ruby><ruby>見<rt>けん</rt></ruby></span>が遅れ、病状が<ruby>悪<rt>あっ</rt></ruby><ruby>化<rt>か</rt></ruby>して休職<span class="grammar-point" onclick="showItem('yoginaku')">を<ruby>余<rt>よ</rt></ruby><ruby>儀<rt>ぎ</rt></ruby>なくされる</span>方も増えているのです。<span class="vocab-point" onclick="showItem('mohaya')">もはや</span>一刻<span class="grammar-point" onclick="showItem('taritomo')">たりとも</span><span class="vocab-point" onclick="showItem('yuuyo')"><ruby>猶<rt>ゆう</rt></ruby><ruby>予<rt>よ</rt></ruby></span>はできません。
                    </p>
                    <p class="translation">虽说是中小企业，但也理应为劳动者的健康负责，这是不言而喻的。因为发现得晚，病情恶化而不得不停职的人也在增加。事到如今，已经刻不容缓了。</p>

                    <p>
                        <span class="vocab-point" onclick="showItem('hatarakizakari')"><ruby>働<rt>はたら</rt></ruby>き<ruby>盛<rt>ざか</rt></ruby>り</span>の人たちは仕事を重視しすぎて、健康管理が<span class="vocab-point" onclick="showItem('orosoka')">おろそか</span>になる<span class="grammar-point" onclick="showItem('kirai')">きらいがあります</span>。私たちは<ruby>行<rt>ぎょう</rt></ruby><ruby>政<rt>せい</rt></ruby>の立場から、働く人の健康に対してもっと関心を持ち、さらに<span class="vocab-point" onclick="showItem('support')">サポート</span>体制を<ruby>充<rt>じゅう</rt></ruby><ruby>実<rt>じつ</rt></ruby>させていく必要があります。
                    </p>
                    <p class="translation">正值壮年的人们往往过于重视工作，有忽视健康管理的倾向。我们需要站在行政的立场上，对劳动者的健康给予更多关注，并进一步充实支援体制。</p>

                    <p>
                        このようなことから、今回のご提案をさせていただく<span class="grammar-point" onclick="showItem('shidai')">次第です</span>。
                    </p>
                    <p class="translation">基于上述原因，我提出了本次提案。</p>

                    <p>
                        さいわい市は、市民の皆様のご協力や<ruby>各<rt>かく</rt></ruby><ruby>方<rt>ほう</rt></ruby><ruby>面<rt>めん</rt></ruby>の<ruby>専<rt>せん</rt></ruby><ruby>門<rt>もん</rt></ruby><ruby>家<rt>か</rt></ruby>の方々のご指導<span class="grammar-point" onclick="showItem('womotte_l2')">をもって</span>、「住みたい町ベストテン」<span class="vocab-point" onclick="showItem('iri')">入り</span>など、多くの実績をあげ<span class="grammar-review" onclick="showItem('temairimashita')">て参りました</span>。<span class="vocab-point" onclick="showItem('saranaru')">さらなる</span>生活の<ruby>充<rt>じゅう</rt></ruby><ruby>実<rt>じつ</rt></ruby>のために、３年以内に市内すべての事業所に産業医を<ruby>配<rt>はい</rt></ruby><ruby>置<rt>ち</rt></ruby>することを、目標としております。市民の皆様の笑顔<span class="grammar-point" onclick="showItem('atteno')">あっての</span>さいわい市です。３年後、私たちのさいわい市に、<span class="vocab-point" onclick="showItem('yori')">より</span>多くの笑顔が見られることを願っ<span class="grammar-point" onclick="showItem('teyamimasen')">てやみません</span>。
                    </p>
                    <p class="translation">幸祝市在各位市民的协助以及各方面专家的指导下，取得了进入“最想居住的城镇前十名”等诸多实绩。为了让生活更加充实，我们将目标定为在3年内让市内所有的事业单位都配置企业医生。正是有了各位市民的笑容，才有了幸祝市。我衷心祈愿3年后，在我们的幸祝市能看到更多的笑容。</p>

                    <p>
                        では、まず予算についてお話しいたします。
                    </p>
                    <p class="translation">那么，首先我就预算进行说明。</p>
                </div>
            </article></template>
            <template id="lesson-3-content"><article id="lesson-3">
                <div class="lesson-header" style="border-bottom: 3px solid #8d6e63; background-color: #f5f5dc;">
                    <span style="color: #5d4037;">日本の昔話</span>
                    <span style="color: #5d4037;">民話編</span>
                </div>

                <h2 style="font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;">
                    <ruby>飯<rt>めし</rt></ruby><ruby>食<rt>く</rt></ruby>わぬ<ruby>女<rt>にょう</rt></ruby><ruby>房<rt>ぼう</rt></ruby> (1)
                </h2>
                
                <div class="japanese-text">
                    <p>
                        昔、あるところに一人の男がいた。男は、<span class="vocab-point" onclick="showItem('kechi')">けち</span>な<span class="grammar-review" onclick="showItem('ueni')">うえに</span><span class="vocab-point" onclick="showItem('namakemono')"><ruby>怠<rt>なま</rt></ruby>け<ruby>者<rt>もの</rt></ruby></span>で、掃除や洗濯もしなかった。だから、部屋は<span class="vocab-point" onclick="showItem('taisou')">たいそう</span>汚く、中に入れば<ruby>体<rt>からだ</rt></ruby><ruby>中<rt>じゅう</rt></ruby>ほこり<span class="grammar-point" onclick="showItem('mamire')">まみれ</span>になるほどで、どろぼうも逃げ出す<span class="vocab-point" onclick="showItem('arisama')">ありさま</span>だった。
                    </p>
                    <p class="translation">很久以前，有个地方住着一个男人。这个男人既吝啬又懒惰，从不打扫也不洗衣服。因此，房间里脏得要命，一进去就会弄得满身是灰，连小偷看了都要逃走，就是这样一副惨状。</p>

                    <p>
                        友達は「いつまでもそんな暮らしを続けるのはよくない。早くお<ruby>嫁<rt>よめ</rt></ruby>さんをもらえ。」と言うのだが、男は友達の心配<span class="grammar-point" onclick="showItem('woyosoni')">をよそに</span>、「確かに家は汚いけれど、俺は俺<span class="grammar-point" onclick="showItem('narini')">なりに</span>楽しく暮らしているよ。一人なら<span class="vocab-point" onclick="showItem('yokei')"><ruby>余<rt>よ</rt></ruby><ruby>計<rt>けい</rt></ruby></span>な金もかからないし。」と全く気にしていない。「まあ、何も食べない<ruby>嫁<rt>よめ</rt></ruby>ならもらわ<span class="grammar-point" onclick="showItem('naidemonai')">ないでもない</span><span class="grammar-review" onclick="showItem('gane')">がね</span>。」などと言う<span class="grammar-point" onclick="showItem('shimatsu')">しまつ</span>で、友達も<span class="vocab-point" onclick="showItem('akirete')">あきれて</span>それ以上は何も言わなかった。
                    </p>
                    <p class="translation">朋友劝他说：“你也别老过这种日子了，赶紧娶个媳妇吧。”可男人却把朋友的担心当耳旁风，完全不在意地说：“家里确实是脏了点，但我自己过得挺开心的。一个人的话还省钱。”最后甚至放话说：“哎，要是有个不吃东西的媳妇，我倒也不是不能娶。”朋友听了目瞪口呆，也就没再说什么了。</p>

                    <p>
                        ある日の夕方、男の家に若い女が訪ねてきて、「どうか私をお<ruby>嫁<rt>よめ</rt></ruby>さんにしてください。掃除<span class="grammar-point" onclick="showItem('narinari')">なり</span>洗濯<span class="grammar-point" onclick="showItem('narinari')">なり</span>、<span class="vocab-point" onclick="showItem('omaesama')">お<ruby>前<rt>まえ</rt></ruby><ruby>様<rt>さま</rt></ruby></span>のおっしゃることは何でもします。それに私は物を食べません。」と言った。「それは<span class="vocab-point" onclick="showItem('kekkou')"><ruby>結<rt>けっ</rt></ruby><ruby>構<rt>こう</rt></ruby></span><span class="grammar-point" onclick="showItem('zukume')">ずくめ</span>な話だ。」と男は<ruby>大<rt>おお</rt></ruby><ruby>喜<rt>よろこ</rt></ruby>びして女を<ruby>嫁<rt>よめ</rt></ruby>にした。
                    </p>
                    <p class="translation">有一天傍晚，一个年轻女子来到男人家，说道：“请让我做你的媳妇吧。不管是打扫还是洗衣服，您说什么我就做什么。而且，我不吃东西。”男人一听，大喜过望：“这简直全是好事啊！”于是就把女人娶回了家。</p>

                    <p>
                        女は<span class="vocab-point" onclick="showItem('hatarakimono')"><ruby>働<rt>はたら</rt></ruby>き<ruby>者<rt>もの</rt></ruby></span><span class="grammar-point" onclick="showItem('nishite_l2')">にして</span>美人、さらに食べ物<span class="grammar-point" onclick="showItem('waoroka')">はおろか</span><ruby>一<rt>いっ</rt></ruby><ruby>滴<rt>てき</rt></ruby>の水<span class="grammar-point" onclick="showItem('suranakatta')">すら</span><span class="vocab-point" onclick="showItem('kuchinishinai')">口にしなかった</span>。<span class="vocab-point" onclick="showItem('kidate')"><ruby>気<rt>き</rt></ruby><ruby>立<rt>だ</rt></ruby>て</span>も良く、文句も言わずに男のために食事を作り、掃除や洗濯をした。おかげで男の<span class="vocab-point" onclick="showItem('minari')"><ruby>身<rt>み</rt></ruby>なり</span>も家も、<span class="vocab-point" onclick="showItem('michigaeru')"><ruby>見<rt>み</rt></ruby><ruby>違<rt>ちが</rt></ruby>える</span>ようにきれいになった。けちで<ruby>怠<rt>なま</rt></ruby>け<ruby>者<rt>もの</rt></ruby>の男からすると、これ以上の幸運はない。<ruby>働<rt>はたら</rt></ruby>き<ruby>者<rt>もの</rt></ruby>の<ruby>嫁<rt>よめ</rt></ruby>をもらった男は、前よりもっと<ruby>怠<rt>なま</rt></ruby>け<ruby>者<rt>もの</rt></ruby>になった。
                    </p>
                    <p class="translation">这女子既勤劳又是个美人，而且别说食物了，连一滴水都不喝。性格也好，毫无怨言地为男人做饭、打扫、洗衣。多亏了她，男人的穿戴和家里都变得焕然一新。对这个吝啬又懒惰的男人来说，再没有比这更幸运的事了。娶了勤劳的媳妇后，男人比以前更懒了。</p>
                    
                    <p style="font-size:0.8em; color:#888; margin-top:20px;">※お前様：昔使われた、相手を丁寧に呼ぶ言い方。</p>
                </div>
            </article></template>
            <template id="lesson-4-content"><article id="lesson-4">
                <div class="lesson-header" style="border-bottom: 3px solid #8d6e63; background-color: #f5f5dc;">
                    <span style="color: #5d4037;">日本の昔話</span>
                    <span style="color: #5d4037;">民話編</span>
                </div>

                <h2 style="font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;">
                    <ruby>飯<rt>めし</rt></ruby><ruby>食<rt>く</rt></ruby>わぬ<ruby>女<rt>にょう</rt></ruby><ruby>房<rt>ぼう</rt></ruby> (2)
                </h2>
                
                <div class="japanese-text">
                    <p>
                        あるとき、「<span class="vocab-point" onclick="showItem('omaesama')"><ruby>お<rt>お</rt></ruby><ruby>前<rt>まえ</rt></ruby><ruby>様<rt>さま</rt></ruby></span>がいるとゆっくり掃除ができません。昼間は外で遊んできてください。」と<ruby>嫁<rt>よめ</rt></ruby>が言うので、男は久しぶりに外へ出た。
                    </p>
                    <p class="translation">有一天，媳妇对他说：“官人您在家待着，我都没法好好打扫卫生。白天您还是去外面转转吧。”于是男人久违地出了门。</p>

                    <p>
                        男が歩いていると、道の向こうから友達が<span class="vocab-point" onclick="showItem('yattekita')">やって<ruby>来<rt>き</rt></ruby>た</span>。友達は男が<ruby>嫁<rt>よめ</rt></ruby>をもらったと聞いて、お祝い<span class="grammar-point" onclick="showItem('katagata')">かたがた</span><ruby>嫁<rt>よめ</rt></ruby>の顔を見に来たのだった。うれしくなった男は、友達に<ruby>嫁<rt>よめ</rt></ruby>の<span class="vocab-point" onclick="showItem('jimanbanashi')"><ruby>自<rt>じ</rt></ruby><ruby>慢<rt>まん</rt></ruby><ruby>話<rt>ばなし</rt></ruby></span>をした。
                    </p>
                    <p class="translation">男人正走着，迎面碰上了个朋友。朋友听说了他娶亲的事儿，特意来道喜，顺便想瞧瞧新媳妇长啥样。男人一听乐坏了，拉着朋友就开始炫耀自家的媳妇。</p>

                    <p>
                        だが、友達は<span class="vocab-point" onclick="showItem('massao')"><ruby>真<rt>ま</rt></ruby>っ<ruby>青<rt>さお</rt></ruby></span>な顔をして、「何も食べない人間がいる<span class="grammar-point" onclick="showItem('towa')">とは</span>、信じられない。それは<span class="vocab-point" onclick="showItem('bakemono')"><ruby>化<rt>ば</rt></ruby>け<ruby>物<rt>もの</rt></ruby></span>だ。」と言った。そして、「明日、出かける<span class="vocab-point" onclick="showItem('furioshite')">ふりをして</span>、こっそり様子を見てみろ。」と<span class="vocab-point" onclick="showItem('iinokoshi')"><ruby>言<rt>い</rt></ruby>い<ruby>残<rt>のこ</rt></ruby>し</span>、逃げるように帰ってしまった。
                    </p>
                    <p class="translation">谁知朋友听完，吓得脸都白了，说：“世上哪有不吃东西的人啊？真不敢信。那绝对是妖怪！”说完，他扔下一句“明天你就假装出个门，偷偷看看究竟是怎么个情况”，便像逃命似地溜走了。</p>

                    <p>
                        次の日、男は家を出る<span class="vocab-point" onclick="showItem('furioshite')">ふりをして</span>、家の中を<span class="vocab-point" onclick="showItem('nozoite')">のぞいて</span>みた。笑顔だった<ruby>嫁<rt>よめ</rt></ruby>は、男が家を出る<span class="grammar-point" onclick="showItem('nari')">なり</span>恐ろしい顔になった。「あのけちの怠け者<span class="vocab-point" onclick="showItem('me')">め</span>！昼間<span class="vocab-point" onclick="showItem('kkara')">っから</span>酒は飲む<span class="grammar-point" onclick="showItem('wawa')">わ</span>、<span class="vocab-point" onclick="showItem('gorogoro')">ごろごろする</span><span class="grammar-point" onclick="showItem('wawa')">わ</span>、外へ出すのも<span class="vocab-point" onclick="showItem('hitokurou')"><ruby>一<rt>ひと</rt></ruby><ruby>苦<rt>く</rt></ruby><ruby>労<rt>ろう</rt></ruby></span>だ。ああ、腹が減ったぞ。」と<span class="vocab-point" onclick="showItem('tsubuyaki')">つぶやき</span>、大きい<ruby>釜<rt>かま</rt></ruby>で米を<ruby>炊<rt>た</rt></ruby>き始めた。そして、結んでいた長い髪を<span class="vocab-point" onclick="showItem('hodoita')">ほどいた</span>。すると、頭の後ろから、<ruby>鋭<rt>するど</rt></ruby>い<ruby>歯<rt>は</rt></ruby>が<span class="vocab-point" onclick="showItem('haeta')"><ruby>生<rt>は</rt></ruby>えた</span>大きな口が現れた。<ruby>嫁<rt>よめ</rt></ruby>は、米が<ruby>炊<rt>た</rt></ruby>ける<span class="grammar-point" onclick="showItem('gahayaika')">が早いか</span>どんどん<span class="vocab-point" onclick="showItem('nigirimeshi')"><ruby>握<rt>にぎ</rt></ruby>り<ruby>飯<rt>めし</rt></ruby></span>を作り、作る<span class="grammar-point" onclick="showItem('sobakara')">そばから</span>頭の後ろの口へ<span class="vocab-point" onclick="showItem('hourikomi')"><ruby>放<rt>ほう</rt></ruby>り<ruby>込<rt>こ</rt></ruby>み</span>、<span class="vocab-point" onclick="showItem('mushamusha')">むしゃむしゃ</span>と食べ始めた。「これでは足りぬ。肉はどこじゃ。」前の口から、恐ろしい言葉が<span class="vocab-point" onclick="showItem('tobidashita')"><ruby>飛<rt>と</rt></ruby>び<ruby>出<rt>だ</rt></ruby>した</span>。びっくりした男は、つい「ひゃあ！」と<ruby>悲<rt>ひ</rt></ruby><ruby>鳴<rt>めい</rt></ruby>を上げてしまった。
                    </p>
                    <p class="translation">第二天，男人假装出门，实际上却折回来，偷偷往屋里瞧。只见原本笑盈盈的媳妇，在他出门的一刹那，脸立马变得狰狞恐怖。“那个小气的懒东西！大白天的又喝酒又游手好闲，把他支出去可真费劲。啊，饿死老娘了。”她嘟囔着，开始用大锅煮饭。接着，她解开了盘着的长发。没想到，后脑勺上竟然长着一张满是尖牙的大嘴！米饭刚煮好，她就飞快地捏成饭团，刚捏好就往后脑勺的嘴里扔，大口大口地吃了起来。“这点儿哪够吃啊。肉呢？肉在哪儿？”前面的嘴里吐出了阴森可怕的话。男人吓破了胆，不由自主地“哎呀”尖叫了一声。</p>

                    <p>
                        「誰じゃ！」長い髪の間から、<span class="vocab-point" onclick="showItem('giragira')">ぎらぎら</span><ruby>光<rt>ひか</rt></ruby>る眼が男を<span class="vocab-point" onclick="showItem('niramitsuketa')"><ruby>睨<rt>にら</rt></ruby>みつけた</span>。
                    </p>
                    <p class="translation">“谁！”长发的缝隙间，一双凶光毕露的眼睛死死瞪住了男人。</p>

                    <p>
                        「見たな！見られた<span class="grammar-review" onclick="showItem('karaniwa')">からには</span>、お前を食わ<span class="grammar-point" onclick="showItem('zuniwaokanai')">ずにはおかない</span>ぞ！」
                    </p>
                    <p class="translation">“你看到了啊！既然被你看到了，我也留不得你了，老娘得吃了你不可！”</p>

                    <p>
                        <ruby>捕<rt>つか</rt></ruby>まった<span class="grammar-point" onclick="showItem('tagasaigo')">が最後</span>、食べられてしまうに違いない。そう思った男は、あわてて逃げ出した。
                    </p>
                    <p class="translation">这要是被抓住了，铁定得被吃掉。男人心里这么想着，慌慌张张地拔腿就跑。</p>

                    <p>
                        「待て！お前を食っ<span class="grammar-point" onclick="showItem('teyaru')">てやる</span>！」恐ろしい顔で追いかけて来る女は、<ruby>二<rt>ふた</rt></ruby><ruby>口<rt>くち</rt></ruby><ruby>女<rt>おんな</rt></ruby>という<ruby>妖<rt>よう</rt></ruby><ruby>怪<rt>かい</rt></ruby>だったのだ。
                    </p>
                    <p class="translation">“站住！老娘要吃了你！”那个满脸狰狞紧追不舍的女人，原来是个叫“二口女”的妖怪。</p>
                </div>
            </article></template>
            <template id="lesson-5-content"><article id="lesson-5">
                <div class="lesson-header" style="border-bottom: 3px solid #5c6bc0; background-color: #e8eaf6;">
                    <span style="color: #3949ab;">ビジネス</span>
                    <span style="color: #3949ab;">実用書</span>
                </div>

                <h2 style="font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;">
                    <ruby>上<rt>じょう</rt></ruby><ruby>司<rt>し</rt></ruby>との<ruby>付<rt>つ</rt></ruby>き<ruby>合<rt>あ</rt></ruby>い<ruby>方<rt>かた</rt></ruby> (1)
                </h2>
                
                <div class="japanese-text">
                    <p>
                        会社では、さまざまな人が働いていますが、<span class="vocab-point" onclick="showItem('ichininmae')"><ruby>一<rt>いち</rt></ruby><ruby>人<rt>にん</rt></ruby><ruby>前<rt>まえ</rt></ruby></span>の社会人<span class="grammar-point" onclick="showItem('tomonaruto')">ともなると</span>、当然嫌いな人とも付き合わなくてはなりません。そのため<span class="vocab-point" onclick="showItem('kiraku')"><ruby>気<rt>き</rt></ruby><ruby>楽<rt>らく</rt></ruby></span>な学生時代<span class="grammar-point" onclick="showItem('nihikikae')">にひきかえ</span>、多くのストレスを<span class="vocab-point" onclick="showItem('kakaeru')"><ruby>抱<rt>かか</rt></ruby>える</span>ことになるでしょう。
                    </p>
                    <p class="translation">在公司里，有各种各样的人在工作。但一旦成为一名独当一面的社会人，自然也必须和讨厌的人打交道。因此，和轻松自在的学生时代截然不同，你会背负上更多的压力吧。</p>

                    <p>
                        会社を辞める理由では、仕事の内容や<ruby>待<rt>たい</rt></ruby><ruby>遇<rt>ぐう</rt></ruby>の問題<span class="grammar-point" onclick="showItem('mosarukotonagara')">もさることながら</span>、「人間関係」が常に<span class="vocab-point" onclick="showItem('jouiniagaru')"><ruby>上<rt>じょう</rt></ruby><ruby>位<rt>い</rt></ruby>に<ruby>挙<rt>あ</rt></ruby>がっています</span>。上司との関係<span class="grammar-point" onclick="showItem('deare')">であれ</span>、<ruby>同<rt>どう</rt></ruby><ruby>僚<rt>りょう</rt></ruby>や<ruby>後<rt>こう</rt></ruby><ruby>輩<rt>はい</rt></ruby>との関係<span class="grammar-point" onclick="showItem('deare')">であれ</span>、仕事を進める<span class="grammar-review" onclick="showItem('uedewa')">うえでは</span>人間関係は非常に大切です。
                    </p>
                    <p class="translation">在辞职的理由中，工作内容和待遇问题固然是原因之一，但“人际关系”也总是名列前茅。无论是和上司的关系，还是和同事、后辈的关系，在推进工作方面，人际关系都至关重要。</p>

                    <p>
                        特に<span class="vocab-point" onclick="showItem('shinjin')"><ruby>新<rt>しん</rt></ruby><ruby>人<rt>じん</rt></ruby></span>のみなさんにとって、上司との関係をよくしておくことは重要です。仕事上、何か問題が起これば、現状<span class="grammar-point" onclick="showItem('nisokushita')">に即した</span>対応が求められます。そんなとき、上司の指示を<span class="vocab-point" onclick="showItem('aogu')"><ruby>仰<rt>あお</rt></ruby>ぐ</span>ことが必要だからです。
                    </p>
                    <p class="translation">特别是对各位新人来说，和上司搞好关系非常重要。在工作中，如果发生什么问题，就需要根据现状采取相应的对策。这种时候，必须请示上司的指示。</p>

                    <p>
                        そしてもし、わからなかったら何度でも<span class="vocab-point" onclick="showItem('kikikaesu')"><ruby>聞<rt>き</rt></ruby>き<ruby>返<rt>かえ</rt></ruby>しましょう</span>。それが許されるのは<span class="vocab-point" onclick="showItem('shinjin')"><ruby>新<rt>しん</rt></ruby><ruby>人<rt>じん</rt></ruby></span>である今<span class="grammar-point" onclick="showItem('ooite')">をおいて</span>他にありません。
                    </p>
                    <p class="translation">而且，如果没听懂，那就多问几次。能被允许这样做的，除了还是新人的现在，再没有其他时候了。</p>
                </div>
            </article></template>
            <template id="lesson-6-content"><article id="lesson-6">
                <div class="lesson-header" style="border-bottom: 3px solid #5c6bc0; background-color: #e8eaf6;">
                    <span style="color: #3949ab;">ビジネス</span>
                    <span style="color: #3949ab;">実用書</span>
                </div>

                <h2 style="font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;">
                    <ruby>上<rt>じょう</rt></ruby><ruby>司<rt>し</rt></ruby>との<ruby>付<rt>つ</rt></ruby>き<ruby>合<rt>あ</rt></ruby>い<ruby>方<rt>かた</rt></ruby> (2)
                </h2>
                
                <div class="japanese-text">
                    <p>
                        <span class="vocab-point" onclick="showItem('chinamini')">ちなみに</span>、<span class="vocab-point" onclick="showItem('nobiru')"><ruby>伸<rt>の</rt></ruby>びる</span>新人とは、どんな人なのでしょうか。それは<span class="vocab-point" onclick="showItem('sunao')"><ruby>素<rt>す</rt></ruby><ruby>直<rt>なお</rt></ruby></span>な人だと多くの<span class="vocab-point" onclick="showItem('veteran')">ベテラン</span>社員が言います。上司から言われたことは、<span class="vocab-point" onclick="showItem('toriaezu')">とりあえず</span>聞いて、その通りやってみましょう。それがあなたの成長に<span class="vocab-point" onclick="showItem('tsunagaru')">つながる</span>はずです。あなたの今後の<span class="vocab-point" onclick="showItem('careerlife')">キャリアライフ</span>は、言う<span class="grammar-point" onclick="showItem('mademonaku')">までもなく</span>上司との関係<span class="grammar-point" onclick="showItem('ikan')">いかん</span>にかかっているのです。
                    </p>
                    <p class="translation">顺便说一下，什么样的职场新人才能“成大器”呢？许多资深员工都说，是那些“听话”（坦率虚心）的人。上司说的话，总之先听着，并试着照做看看。这应该能促进你的成长。不用说，你未来的职业生涯，正取决于你和上司的关系如何。</p>

                    <p>
                        そうは言っても、上司も人間ですから、いろいろなタイプの人がいます。もし、どうしても好きになれない上司についてしまったら、どうしたらよいのでしょうか。
                    </p>
                    <p class="translation">虽说如此，上司也是人，自然有各种各样的类型。万一，你真的碰上了一个怎么也喜欢不起来的上司，该怎么办才好呢？</p>

                    <p>
                        飲み会などで上司の<ruby>悪<rt>わる</rt></ruby><ruby>口<rt>ぐち</rt></ruby>を言っても、<span class="vocab-point" onclick="showItem('ittoki')"><ruby>一<rt>いっ</rt></ruby><ruby>時<rt>とき</rt></ruby></span>の<span class="vocab-point" onclick="showItem('kibarashi')"><ruby>気<rt>き</rt></ruby><ruby>晴<rt>ば</rt></ruby>らし</span>にはなりますが、結局嫌な思いを自分の心に<ruby>定<rt>てい</rt></ruby><ruby>着<rt>ちゃく</rt></ruby>させてしまいます。それより、せめて、「嫌い」を「好きとは言え<span class="grammar-point" onclick="showItem('naimademo')">ないまでも</span>嫌いではない」レベルまで持っていく努力をしてみましょう。これは「美的<ruby>凝<rt>ぎょう</rt></ruby><ruby>視<rt>し</rt></ruby>」という方法です。例えば、細かいミスばかり<span class="vocab-point" onclick="showItem('shiteki')"><ruby>指<rt>し</rt></ruby><ruby>摘<rt>てき</rt></ruby></span>する嫌な上司に対しても、その長所に<span class="vocab-point" onclick="showItem('mewomukeru')"><ruby>目<rt>め</rt></ruby>を<ruby>向<rt>む</rt></ruby>ける</span>ように努力するのです。すると、<ruby>叱<rt>しか</rt></ruby>るときは厳しいけれども、その後の<span class="vocab-point" onclick="showItem('mendoumi')"><ruby>面<rt>めん</rt></ruby><ruby>倒<rt>どう</rt></ruby><ruby>見<rt>み</rt></ruby></span>のよさ<span class="grammar-point" onclick="showItem('toii')">といい</span>、<span class="vocab-point" onclick="showItem('chimitsu')"><ruby>緻<rt>ち</rt></ruby><ruby>密<rt>みつ</rt></ruby></span>で正確な<span class="vocab-point" onclick="showItem('shigotoburi')"><ruby>仕<rt>し</rt></ruby><ruby>事<rt>ごと</rt></ruby>ぶり</span><span class="grammar-point" onclick="showItem('toii')">といい</span>、実は意外に<span class="vocab-point" onclick="showItem('dekiru')">デキる</span>上司だと気づくこともあります。
                    </p>
                    <p class="translation">在酒局上说上司的坏话，虽然能得一时痛快，但结果只会让那种厌恶感在心里扎根。与其那样，不如试着努力一下，至少把“讨厌”提升到“虽说不上喜欢，但也并不讨厌”的程度。这叫做“美的凝视”。比如，对于总是挑剔细微错误的讨厌上司，也要努力去关注他的长处。这样一来你可能会发现，他虽然批评人很严厉，但事后对下属极其照顾，工作风格也严谨准确，其实意外地是个很有能力的上司。</p>

                    <p>
                        長所を見つけたら、<ruby>同<rt>どう</rt></ruby><ruby>僚<rt>りょう</rt></ruby>の前で話題にしましょう。あなたが高く評価していることが<ruby>同<rt>どう</rt></ruby><ruby>僚<rt>りょう</rt></ruby>を通じて上司に伝われば、直接伝える以上に<span class="vocab-point" onclick="showItem('shinjitsumi')"><ruby>真<rt>しん</rt></ruby><ruby>実<rt>じつ</rt></ruby><ruby>味<rt>み</rt></ruby></span>を持つこともあります。よい人間関係は、<span class="vocab-point" onclick="showItem('iwaba')">いわば</span>思いやりのギブ・アンド・テイク<span class="grammar-point" onclick="showItem('toittatokoro_l2')">といったところ</span>ではないでしょうか。
                    </p>
                    <p class="translation">发现了长处，就在同事面前多夸夸他。如果你对上司的高评价能通过同事传到他耳朵里，有时会比直接当面说显得更真实。良好的人际关系，说白了，不就是一种互相体谅的“付出与回报（Give and Take）”吗？</p>

                    <p>
                        あなたからも、ぜひ周囲の人に積極的に<span class="vocab-point" onclick="showItem('hatarakikakete')"><ruby>働<rt>はたら</rt></ruby>きかけて</span>、お互いを理解するきっかけをつかんでください。
                    </p>
                    <p class="translation">请你也一定要积极地去影响周围的人，抓住互相理解的契机。</p>
                </div>
            </article></template>
            <template id="lesson-7-content"><article id="lesson-7">
                <div class="lesson-header">
                    <span style="color: #455a64;">ドラマのシナリオ</span>
                    <span style="color: #455a64;">転職 (1)</span>
                </div>

                <h2 style="font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;">
                    <ruby>転<rt>てん</rt></ruby><ruby>職<rt>しょく</rt></ruby> (1)
                </h2>
                
                <style>
                    .script-scene { color: #555; font-size: 0.9em; margin-bottom: 20px; padding-left: 10px; border-left: 3px solid #ccc; }
                    /* 修改对齐方式为 stretch 或 baseline 都可以，这里用 baseline 保证名字和第一行日文对齐 */
                    .script-row { display: flex; margin-bottom: 15px; align-items: baseline; }
                    .script-speaker { font-weight: bold; width: 3.5em; flex-shrink: 0; text-align: right; margin-right: 15px; color: #333; }
                    .script-line { flex-grow: 1; line-height: 1.8; }
                    .newspaper-box {
                        border: 2px solid #333; padding: 15px; margin: 20px 0; background: #fff;
                        box-shadow: 3px 3px 0px rgba(0,0,0,0.1); font-family: "Hiragino Sans", "GothicMB101", sans-serif;
                    }
                    .newspaper-title { font-weight: bold; border-bottom: 1px solid #333; margin-bottom: 10px; padding-bottom: 5px; font-size: 0.9em; }
                    .newspaper-content { font-size: 1.1em; font-weight: bold; line-height: 1.5; color: #222; }
                    .stage-direction { font-size: 0.85em; color: #666; font-style: italic; margin-top: 5px; display: block; }
                </style>

                <div class="japanese-text">
                    <div class="newspaper-box">
                        <div class="newspaper-title">毎々新聞　社会面見出し</div>
                        <div class="newspaper-content">
                            警備会社、三千万円奪われる —— <span class="vocab-point" onclick="showItem('shukuchoku')"><ruby>宿<rt>しゅく</rt></ruby><ruby>直<rt>ちょく</rt></ruby></span>社員は<span class="vocab-point" onclick="showItem('inemuri')"><ruby>居<rt>い</rt></ruby><ruby>眠<rt>ねむ</rt></ruby>り</span>
                        </div>
                        <p class="translation">【每每新闻 社会版头条】安保公司被盗三千万日元 —— 值班员工竟然在睡觉</p>
                    </div>

                    <div class="script-scene">
                        警察署　取調室<br>
                        警備会社の部長・阿部、机を<span class="vocab-point" onclick="showItem('hasande')">はさんで</span>刑事
                        <p class="translation">【场景：警察局 审讯室】安保公司部长阿部，与刑警隔桌而坐。</p>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">刑事</div>
                        <div class="script-line">
                            「一体どうなっているんですか、<span class="vocab-point" onclick="showItem('otaku')">おたく</span>の社員は。」
                            <p class="translation">“贵公司的员工，到底是怎么搞的？”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">阿部</div>
                        <div class="script-line">
                            「はあ……。」
                            <p class="translation">“这……”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">刑事</div>
                        <div class="script-line">
                            「本当に<span class="vocab-point" onclick="showItem('maganuketeiru')"><ruby>間<rt>ま</rt></ruby>が<ruby>抜<rt>ぬ</rt></ruby>けている</span><span class="grammar-point" onclick="showItem('toioukatoiouka')">といおうか</span>、無責任<span class="grammar-point" onclick="showItem('toioukatoiouka')">といおうか</span>。<span class="vocab-point" onclick="showItem('shukuchoku')"><ruby>宿<rt>しゅく</rt></ruby><ruby>直<rt>ちょく</rt></ruby></span><span class="grammar-review" onclick="showItem('ga')">が</span>ですよ、誰も見ていない<span class="grammar-point" onclick="showItem('nooiikotoni')">のをいいことに</span>、ぐっすり<span class="vocab-point" onclick="showItem('nekondeita')"><ruby>寝<rt>ね</rt></ruby><ruby>込<rt>こ</rt></ruby>んで</span>いたなんて……。」
                            <p class="translation">“该说是缺心眼呢，还是该说是不仅责任。那可是<strong>值夜班</strong>啊！竟然趁着没人看见，睡得那么死……”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">阿部</div>
                        <div class="script-line">
                            「いやあ……。」
                            <p class="translation">“哎呀……”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">刑事</div>
                        <div class="script-line">
                            「何度聞いても『私は寝ていました。記憶にありません』を<span class="vocab-point" onclick="showItem('kurikaesu')"><ruby>繰<rt>く</rt></ruby>り<ruby>返<rt>かえ</rt></ruby>す</span>だけだ。<span class="vocab-point" onclick="showItem('otaku')">おたく</span>は警備会社なんでしょう。そんな<span class="vocab-point" onclick="showItem('iiwake')"><ruby>言<rt>い</rt></ruby>い<ruby>訳<rt>わけ</rt></ruby></span>、誰が納得するんです<span class="grammar-point" onclick="showItem('ka_l2')">か</span>。自覚がない<span class="grammar-point" onclick="showItem('nimohodogaaru')">にもほどがあります</span>よ。厳しい監視を<span class="vocab-point" onclick="showItem('kugurinukete')">くぐり<ruby>抜<rt>ぬ</rt></ruby>けて</span>やられた<span class="grammar-point" onclick="showItem('naramadashimo')">ならまだしも</span>、これは警備<span class="grammar-point" onclick="showItem('izen')">以前</span>の問題じゃないですかね。」
                            <p class="translation">“不管问多少次，他都只是重复说‘我在睡觉，没有记忆’。贵公司可是安保公司啊。这种借口，谁会信啊？没自觉也该有个限度吧。如果是避开了严密的监视作案那也就罢了，这根本就是安保工作最基本的问题不是吗？”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">阿部</div>
                        <div class="script-line">
                            「う〜ん……。」
                            <p class="translation">“唔……”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">刑事</div>
                        <div class="script-line">
                            「まあ、被害者の方にこんなこと言うのも<span class="vocab-point" onclick="showItem('koku')"><ruby>酷<rt>こく</rt></ruby></span>だけど、これは起こる<span class="grammar-point" onclick="showItem('bekushite')">べくして</span>起こった事件と言ってもいい。業種<span class="grammar-point" onclick="showItem('gadakeni')">が</span>業種<span class="grammar-point" onclick="showItem('gadakeni')">なだけに</span>、これから<span class="vocab-point" onclick="showItem('masukomi')">マスコミ</span>も<span class="vocab-point" onclick="showItem('sawagidasu')"><ruby>騒<rt>さわ</rt></ruby>ぎ<ruby>出<rt>だ</rt></ruby>す</span>でしょう。あなたも覚悟しないと……。」
                            <span class="stage-direction">（阿部を見る刑事の目、鋭い）</span>
                            <p class="translation">“虽然对受害者说这种话有点残酷，但这完全可以说是注定要发生的案件。正因为是这种行业，接下来媒体肯定也会开始骚动的。你也要做好觉悟……”（刑警看着阿部，目光锐利）</p>
                        </div>
                    </div>

                </div>
            </article></template>
            <template id="lesson-8-content"><article id="lesson-8">
                <div class="lesson-header">
                    <span style="color: #455a64;">ドラマのシナリオ</span>
                    <span style="color: #455a64;">転職 (2)</span>
                </div>

                <h2 style="font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;">
                    <ruby>転<rt>てん</rt></ruby><ruby>職<rt>しょく</rt></ruby> (2)
                </h2>
                
                <style>
                    .script-scene { color: #555; font-size: 0.9em; margin-bottom: 20px; padding-left: 10px; border-left: 3px solid #ccc; }
                    .script-row { display: flex; margin-bottom: 20px; align-items: baseline; }
                    .script-speaker { font-weight: bold; width: 3.5em; flex-shrink: 0; text-align: right; margin-right: 15px; color: #333; }
                    .script-line { flex-grow: 1; line-height: 1.8; }
                    .stage-direction { font-size: 0.85em; color: #666; font-style: italic; margin-top: 5px; display: block; }
                    /* 译文样式 */
                    .script-line .translation { margin-top: 5px; margin-bottom: 0; color: #666; font-size: 0.85em; }
                    .script-scene .translation { display: block; margin-top: 5px; color: #888; }
                </style>

                <div class="japanese-text">
                    
                    <div class="script-scene">
                        警備会社、社長室<br>
                        阿部と社長、少し離れて、制服姿の<span class="vocab-point" onclick="showItem('guardman')">ガードマン</span>が立っている。
                        <span class="translation">【场景：安保公司 社长室】阿部和社长，稍微隔开一点距离，站着一名身穿制服的保安。</span>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">社長</div>
                        <div class="script-line">
                            「<span class="vocab-point" onclick="showItem('yareyare')">やれやれ</span>、こいつのおかげで、事件以来、<span class="vocab-point" onclick="showItem('souchou')"><ruby>早<rt>そう</rt></ruby><ruby>朝<rt>ちょう</rt></ruby></span><span class="grammar-point" onclick="showItem('toiwazu')">といわず</span>、深夜<span class="grammar-point" onclick="showItem('toiwazu')">といわず</span>、電話は鳴り<span class="grammar-review" onclick="showItem('ppanashi')">っぱなし</span>、電話に出<span class="grammar-point" onclick="showItem('taratade')">たら</span>出<span class="grammar-point" onclick="showItem('taratade')">たで</span>、どこの誰ともわからんやつに、まったく聞く<span class="grammar-point" onclick="showItem('nitaenai')">にたえない</span>ような言葉で<span class="vocab-point" onclick="showItem('donarureru')"><ruby>怒<rt>ど</rt></ruby><ruby>鳴<rt>な</rt></ruby>られる</span>。こっちは<ruby>誠<rt>せい</rt></ruby><ruby>意<rt>い</rt></ruby>をもって対応しているのに……。」
                            <p class="translation">“哎呀呀，多亏了这家伙，自从出事以来，不管是大清早还是深更半夜，电话就响个不停。一接电话吧，就会被不知哪来的家伙，用简直不堪入耳的话痛骂一顿。明明我们是在带着诚意应对的……”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">阿部</div>
                        <div class="script-line">
                            「ほんとに……。」
                            <p class="translation">“真的是……”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">社長</div>
                        <div class="script-line">
                            「<span class="vocab-point" onclick="showItem('masukomi')">マスコミ</span>の<span class="vocab-point" onclick="showItem('renchuu')"><ruby>連<rt>れん</rt></ruby><ruby>中<rt>ちゅう</rt></ruby></span>も、ただ面白がってるだけだ。<ruby>我々<rt>われわれ</rt></ruby>が一歩でも外に出<span class="grammar-point" onclick="showItem('youmononara')">ようものなら</span>、何十人と<span class="vocab-point" onclick="showItem('muragatte')"><ruby>群<rt>むら</rt></ruby>がって</span>くる。<ruby>人<rt>じん</rt></ruby><ruby>件<rt>けん</rt></ruby><ruby>費<rt>ひ</rt></ruby>を<span class="vocab-point" onclick="showItem('osaeru')"><ruby>抑<rt>おさ</rt></ruby>える</span>つもりで君の意見を入れて思い切って導入したが、<span class="vocab-point" onclick="showItem('urameni')"><ruby>裏<rt>うら</rt></ruby><ruby>目<rt>め</rt></ruby>に出て</span>しまったな。」
                            <p class="translation">“媒体那帮家伙也是，纯粹是在看热闹。只要我们敢踏出大门一步，几十个人就会蜂拥而上。本想压低人工费，听了你的意见狠心引进了这个，结果却弄巧成拙了啊。”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">阿部</div>
                        <div class="script-line">
                            「はあ、申し訳ありません。」
                            <p class="translation">“是，非常抱歉。”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">社長</div>
                        <div class="script-line">
                            「<span class="vocab-point" onclick="showItem('issonokoto')">いっそのこと</span>公表するか。あの<span class="vocab-point" onclick="showItem('inemuri')">居眠り</span><span class="vocab-point" onclick="showItem('guardman')">ガードマン</span>が、実は……。」
                            <span class="stage-direction">（<span class="vocab-point" onclick="showItem('guardman')">ガードマン</span>のほうに視線を移す社長。阿部の<ruby>顔<rt>かお</rt></ruby><ruby>色<rt>いろ</rt></ruby>が変わる。）</span>
                            <p class="translation">“干脆公布算了？那个打瞌睡的保安，其实……”<br>（社长把视线移向保安。阿部的脸色变了。）</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">阿部</div>
                        <div class="script-line">
                            「いや、いや、それだけは、絶対に、絶対に、ダメです。ここで、<ruby>真<rt>しん</rt></ruby><ruby>実<rt>じつ</rt></ruby>を<span class="vocab-point" onclick="showItem('akaseba')"><ruby>明<rt>あ</rt></ruby>かせば</span>、さらに信用をなくします。他の社員の<span class="vocab-point" onclick="showItem('temae')"><ruby>手<rt>て</rt></ruby><ruby>前<rt>まえ</rt></ruby></span>、<ruby>解<rt>かい</rt></ruby><ruby>雇<rt>こ</rt></ruby>という<span class="vocab-point" onclick="showItem('meimoku')"><ruby>名<rt>めい</rt></ruby><ruby>目<rt>もく</rt></ruby></span>で<span class="vocab-point" onclick="showItem('haikishobun')"><ruby>廃<rt>はい</rt></ruby><ruby>棄<rt>き</rt></ruby><ruby>処<rt>しょ</rt></ruby><ruby>分<rt>ぶん</rt></ruby></span>にするべきです！」
                            <p class="translation">“不，不，唯有这点，绝对，绝对不行。如果在这里揭露真相，我们会更加失去信任的。为了在其他员工面前说得过去，应该以‘解雇’的名义把它报废处理掉！”</p>
                        </div>
                    </div>
                    
                    <div class="script-row">
                        <div class="script-speaker">社長</div>
                        <div class="script-line">
                            「だが、あれの開発には一千万かかっている。一般の人間<span class="grammar-point" onclick="showItem('naraizashirazu')">ならいざしらず</span>、警察の<span class="vocab-point" onclick="showItem('torishirabe')"><ruby>取<rt>と</rt></ruby>り<ruby>調<rt>しら</rt></ruby>べ</span>にも<span class="vocab-point" onclick="showItem('shoutai')"><ruby>正<rt>しょう</rt></ruby><ruby>体<rt>たい</rt></ruby></span>が<span class="vocab-point" onclick="showItem('barenakatta')">バレなかった</span>のなら、まだ使い道はある。何とか廃棄せずに<ruby>働<rt>はたら</rt></ruby>かせられ<span class="grammar-point" onclick="showItem('naimonoka')">ないものか</span>……。」
                            <p class="translation">“可是，开发那东西花了一千万呢。如果是普通人也就罢了，既然连在警察的审讯中都没有暴露真面目，那还有利用价值。难道就没有什么办法，能不报废它、继续让它工作吗……”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">阿部</div>
                        <div class="script-line">
                            「はあ……。」
                            <p class="translation">“这……”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">社長</div>
                        <div class="script-line">
                            「こいつが目立たないように使える<ruby>部<rt>ぶ</rt></ruby><ruby>署<rt>しょ</rt></ruby>があれば、それ<span class="grammar-point" onclick="showItem('nikoshitakotowanai')">に越したことはない</span>。<span class="vocab-point" onclick="showItem('masukomi')">マスコミ</span>に気づかれないうちに、何とかしてくれ。」
                            <p class="translation">“如果有能让这家伙不引人注目地工作的部门，那是再好不过了。趁媒体还没察觉之前，赶紧想个办法。”</p>
                        </div>
                    </div>

                </div>
            </article></template>
            <template id="lesson-9-content"><article id="lesson-9">
                <div class="lesson-header">
                    <span style="color: #455a64;">ドラマのシナリオ</span>
                    <span style="color: #455a64;">転職 (3)</span>
                </div>

                <h2 style="font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;">
                    <ruby>転<rt>てん</rt></ruby><ruby>職<rt>しょく</rt></ruby> (3)
                </h2>
                
                <style>
                    .script-scene { color: #555; font-size: 0.9em; margin-bottom: 20px; padding-left: 10px; border-left: 3px solid #ccc; }
                    .script-row { display: flex; margin-bottom: 20px; align-items: baseline; }
                    /* 👇 修改了这里：宽度加大到 5.5em，并强制不换行 */
                    .script-speaker { font-weight: bold; width: 5.5em; white-space: nowrap; flex-shrink: 0; text-align: right; margin-right: 15px; color: #333; }
                    .script-line { flex-grow: 1; line-height: 1.8; }
                    .stage-direction { font-size: 0.85em; color: #666; font-style: italic; margin-top: 5px; display: block; }
                    .script-line .translation { margin-top: 5px; margin-bottom: 0; color: #666; font-size: 0.85em; }
                    .script-scene .translation { display: block; margin-top: 5px; color: #888; }
                </style>

                <div class="japanese-text">
                    
                    <div class="script-scene">
                        <ruby>警<rt>けい</rt></ruby><ruby>備<rt>び</rt></ruby><ruby>会<rt>がい</rt></ruby><ruby>社<rt>しゃ</rt></ruby>、地下<ruby>倉<rt>そう</rt></ruby><ruby>庫<rt>こ</rt></ruby>。ガードマンと阿部
                        <span class="translation">【场景：安保公司 地下仓库】保安（机器人）和阿部。</span>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker" style="width: 5em !important; margin-left: -0.5em !important; text-align: right !important;">ガードマン</div>
                        <div class="script-line">
                            「部長、オ疲レサマデス。命令ヲドウゾ。」
                            <p class="translation">“部长，您辛苦了。请下命令。”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">阿部</div>
                        <div class="script-line">
                            「これでお別れだ。ロボット<span class="grammar-point" onclick="showItem('tohaie')">とはいえ</span>、お前はいい<span class="vocab-point" onclick="showItem('aibou')"><ruby>相<rt>あい</rt></ruby><ruby>棒<rt>ぼう</rt></ruby></span>だったよ。」
                            <p class="translation">“我们要在此分别了。虽说是个机器人，但你曾是个不错的搭档啊。”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker" style="width: 5em !important; margin-left: -0.5em !important; text-align: right !important;">ガードマン</div>
                        <div class="script-line">
                            「”オ別レ”……ソノ命令ハ、<ruby>職<rt>しょく</rt></ruby><ruby>務<rt>む</rt></ruby><ruby>範<rt>はん</rt></ruby><ruby>囲<rt>い</rt></ruby>二、存在シ……」
                            <p class="translation">“‘分别’……该命令，不在职务范围内，无法……”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker"></div>
                        <div class="script-line">
                            <span class="stage-direction">（阿部、ガードマンの帽子を<span class="vocab-point" onclick="showItem('hazushi')"><ruby>外<rt>はず</rt></ruby>し</span>、<ruby>額<rt>ひたい</rt></ruby>から<span class="vocab-point" onclick="showItem('memorychip')">メモリーチップ</span>を抜き出す。）</span>
                            <p class="translation">（阿部摘下保安的帽子，从他额头里拔出了记忆芯片。）</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker" style="width: 5em !important; margin-left: -0.5em !important; text-align: right !important;">ガードマン</div>
                        <div class="script-line">
                            「○×△☆□○×△☆□○×△☆□○×△☆□——！！」
                            <p class="translation">“○×△☆□○×△☆□——！！”</p>
                        </div>
                    </div>

                    <div class="script-scene" style="margin-top: 40px;">
                        <ruby>警<rt>けい</rt></ruby><ruby>備<rt>び</rt></ruby><ruby>会<rt>がい</rt></ruby><ruby>社<rt>しゃ</rt></ruby>、社員食堂。テーブルに若い社員A・B
                        <span class="translation">【场景：安保公司 员工食堂】年轻员工A和B坐在桌边。</span>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">社員A</div>
                        <div class="script-line">
                            「<span class="vocab-point" onclick="showItem('ittai')"><ruby>一<rt>いっ</rt></ruby><ruby>体<rt>たい</rt></ruby></span>どうなるんだろな、この会社。部長は<span class="vocab-point" onclick="showItem('yukuefumei')"><ruby>行<rt>ゆく</rt></ruby><ruby>方<rt>え</rt></ruby><ruby>不<rt>ふ</rt></ruby><ruby>明<rt>めい</rt></ruby></span>、社長は毎日警察だし……。」
                            <p class="translation">“这公司到底会变成什么样啊。部长下落不明，社长每天都往警察局跑……”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">社員B</div>
                        <div class="script-line">
                            「この会社も<span class="vocab-point" onclick="showItem('seizei')">せいぜい</span>あと半年<span class="grammar-point" onclick="showItem('toittatokoro')">といったところ</span>だろうな。<span class="vocab-point" onclick="showItem('tsubureru')">つぶれる</span>前に、次の仕事考えなきゃ……。のんびりし<span class="grammar-review" onclick="showItem('chairarenai')">ちゃいられない</span>な。」
                            <p class="translation">“这公司顶多也就再撑个半年吧。趁倒闭前，得赶紧考虑下一份工作了……。可不能在这儿悠哉游哉的了。”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">社員A</div>
                        <div class="script-line">
                            「将来を考えると俺も不安だけど、この不景気じゃ<span class="grammar-point" onclick="showItem('nini')">辞めるに辞められない</span>よ。」
                            <p class="translation">“想到将来我也很不安，但这经济不景气的，想辞职也辞不了啊。”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">社員B</div>
                        <div class="script-line">
                            「結局消えたのは、三千万と、居眠りしたやつと、部長か……。」
                            <p class="translation">“结果消失的，就是那三千万、那个打瞌睡的家伙，还有部长吗……”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker"></div>
                        <div class="script-line">
                            <span class="stage-direction">（ピンクの制服姿の<span class="vocab-point" onclick="showItem('waitress')">ウェイトレス</span>が<span class="vocab-point" onclick="showItem('toorisugiru')"><ruby>通<rt>とお</rt></ruby>り<ruby>過<rt>す</rt></ruby>ぎる</span>。）</span>
                            <p class="translation">（一个身穿粉色制服的女服务员走过。）</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">社員A</div>
                        <div class="script-line">
                            「あれ、ここ、<span class="vocab-point" onclick="showItem('selfservice')">セルフサービス</span>やめた<span class="vocab-point" onclick="showItem('wake')">わけ</span>？ こんな会社の<ruby>危<rt>き</rt></ruby><ruby>機<rt>き</rt></ruby>に、新人<span class="grammar-review" onclick="showItem('ka')">か</span>よ……。お！彼女、けっこう、かわいいじゃない？」
                            <p class="translation">“咦，这儿不搞自助服务了？公司都这么危机了，还招新人啊……。哦！她长得还挺可爱的嘛？”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker"></div>
                        <div class="script-line">
                            <span class="stage-direction">（Aの<ruby>視<rt>し</rt></ruby><ruby>線<rt>せん</rt></ruby>を<ruby>感<rt>かん</rt></ruby><ruby>知<rt>ち</rt></ruby>し、メニューを持って近づく<span class="vocab-point" onclick="showItem('waitress')">ウェイトレス</span>）</span>
                            <p class="translation">（感知到了A的视线，女服务员拿着菜单走了过来。）</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker" style="width: 6em !important; margin-left: -1.2em !important; text-align: right !important; letter-spacing: -1.5px !important;">ウェイトレス</div>
                        <div class="script-line">
                            「オ客様、イラッシャイマセ。注文ヲ、ドウゾ。」
                            <p class="translation">“客人，欢迎光临。请点单。”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">社員A</div>
                        <div class="script-line">
                            「ねえ、今日何時に終わんの？ 俺、営業部の<ruby>山<rt>やま</rt></ruby><ruby>田<rt>だ</rt></ruby>っていうんだけど、よかったら、30分だけ、お茶とかどう？」
                            <p class="translation">“哎，你今天几点下班？我是营业部的山田，方便的话，就30分钟，一起喝个茶怎么样？”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">社員B</div>
                        <div class="script-line">
                            「お前、注文<span class="grammar-point" onclick="showItem('nikakotsukete')">にかこつけて</span>、何聞いてるんだよ。」
                            <p class="translation">“你小子，借着点单的名义，在那儿瞎问什么呢。”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker" style="width: 6em !important; margin-left: -1.2em !important; text-align: right !important; letter-spacing: -1.5px !important;">ウェイトレス</div>
                        <div class="script-line">
                            「”ヨカッタラ、30分ダケ、オ茶トカドウ”……ソノ注文ハ、<ruby>職<rt>しょく</rt></ruby><ruby>務<rt>む</rt></ruby><ruby>範<rt>はん</rt></ruby><ruby>囲<rt>い</rt></ruby>ニ、存在シマセン。」
                            <p class="translation">“‘方便的话，就30分钟，喝个茶’……该点单，不在职务范围内。”</p>
                        </div>
                    </div>
                    
                    <div class="script-scene" style="border:none; text-align:center; margin-top:30px;">
                        —— 終わり ——
                    </div>

                </div>
            </article></template>
            <template id="lesson-10-content"><article id="lesson-10">
                <div class="lesson-header">
                    <span>スピーチ</span>
                    <span>研修を終えて</span>
                </div>

                <h2 style="font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;">
                    <ruby>研<rt>けん</rt></ruby><ruby>修<rt>しゅう</rt></ruby>を<ruby>終<rt>お</rt></ruby>えて
                </h2>
                
                <div class="japanese-text">
                    
                    <p style="text-align: right; font-size: 0.9em; color: #555; margin-bottom: 20px;">
                        ＜さくら<ruby>商<rt>しょう</rt></ruby><ruby>事<rt>じ</rt></ruby>・東京本社会議室<span class="grammar-review" onclick="showItem('nite')">にて</span>＞
                    </p>

                    <p>
                        皆様、<ruby>本<rt>ほん</rt></ruby><ruby>日<rt>じつ</rt></ruby>はお忙しい<span class="grammar-point" onclick="showItem('tokorowo')">ところを</span>お集まりいただき、<span class="vocab-point" onclick="showItem('makotoni')"><ruby>誠<rt>まこと</rt></ruby>に</span>ありがとうございます。
                    </p>
                    <p class="translation">各位，今天在百忙之中劳烦大家聚集于此，实在是非常感谢。</p>

                    <p>
                        <span class="vocab-point" onclick="showItem('sakihodo')"><ruby>先<rt>さき</rt></ruby>ほど</span>は、社長より<span class="vocab-point" onclick="showItem('gekirei')"><ruby>激<rt>げき</rt></ruby><ruby>励<rt>れい</rt></ruby></span>のお言葉をいただき、<ruby>感<rt>かん</rt></ruby><ruby>激<rt>げき</rt></ruby><span class="grammar-point" onclick="showItem('noitari')">の至り</span>です。
                    </p>
                    <p class="translation">刚才收到了社长的激励之词，我简直感激之至。</p>

                    <p>
                        <ruby>私<rt>わたくし</rt></ruby>、<ruby>本<rt>ほん</rt></ruby><ruby>日<rt>じつ</rt></ruby>３月３１日<span class="grammar-point" onclick="showItem('womotte')">をもって</span>、本社での<span class="vocab-point" onclick="showItem('kenshuu')"><ruby>研<rt>けん</rt></ruby><ruby>修<rt>しゅう</rt></ruby></span>を終了し、来週<span class="vocab-point" onclick="showItem('vietnam')">ベトナム</span>へ帰ります。
                    </p>
                    <p class="translation">我将于今天3月31日结束在总公司的培训，下周返回越南。</p>

                    <p>
                        <span class="vocab-point" onclick="showItem('kenshuu')"><ruby>研<rt>けん</rt></ruby><ruby>修<rt>しゅう</rt></ruby></span>期間中は慣れない<span class="grammar-point" onclick="showItem('kototote')">こととて</span>皆様にご<ruby>迷<rt>めい</rt></ruby><ruby>惑<rt>わく</rt></ruby>をおかけいたしましたが、温かくご指導いただきまして感謝の<ruby>念<rt>ねん</rt></ruby><span class="grammar-point" onclick="showItem('nitaemasen')">にたえません</span>。
                    </p>
                    <p class="translation">培训期间，因为我不习惯这里的工作，给各位添了麻烦，但大家依然给予我温暖的指导，我不胜感激。</p>

                    <p>
                        皆様の<span class="vocab-point" onclick="showItem('seijitsu')"><ruby>誠<rt>せい</rt></ruby><ruby>実<rt>じつ</rt></ruby></span>で<span class="vocab-point" onclick="showItem('teinei')"><ruby>丁<rt>てい</rt></ruby><ruby>寧<rt>ねい</rt></ruby></span>な仕事ぶりから社員<span class="grammar-point" onclick="showItem('taru')">たる</span><ruby>者<rt>もの</rt></ruby>どうあるべきかを学びました。
                    </p>
                    <p class="translation">从各位诚实且细致的工作态度中，我学到了作为一个（优秀）员工应该具备的姿态。</p>

                    <p>
                        帰国後は、<span class="vocab-point" onclick="showItem('hanoi')">ハノイ</span>支店<span class="grammar-review" onclick="showItem('nite')">にて</span><ruby>勤<rt>きん</rt></ruby><ruby>務<rt>む</rt></ruby>することになりますが、本社との<span class="vocab-point" onclick="showItem('goudou')"><ruby>合<rt>ごう</rt></ruby><ruby>同<rt>どう</rt></ruby></span>プロジェクトが<span class="vocab-point" onclick="showItem('tachiagari')"><ruby>立<rt>た</rt></ruby>ち<ruby>上<rt>あ</rt></ruby>がり</span>、<span class="vocab-point" onclick="showItem('hikitsudzuki')"><ruby>引<rt>ひ</rt></ruby>き<ruby>続<rt>つづ</rt></ruby>き</span>皆様と一緒に仕事ができることは、うれしい<span class="grammar-point" onclick="showItem('kagiridesu')">限りです</span>。
                    </p>
                    <p class="translation">回国后，我将在河内分公司工作，但随着与总公司的联合项目启动，能继续和大家一起工作，我感到无比高兴。</p>

                    <p>
                        まだまだ皆様に助けていただくことも多いと思いますので、今後ともどうぞよろしくお願いいたします。
                    </p>
                    <p class="translation">我想今后还有很多需要仰仗各位帮助的地方，今后也请多多关照。</p>

                </div>
            </article></template>
            <template id="lesson-11-content"><article id="lesson-11">
                <div class="lesson-header">
                    <span>ビジネス会話</span>
                    <span>さすが本田君 (1)</span>
                </div>

                <h2 style="font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;">
                    さすが<ruby>本<rt>ほん</rt></ruby><ruby>田<rt>だ</rt></ruby>君 (1)
                </h2>
                
                <style>
                    .script-row { display: flex; margin-bottom: 20px; align-items: baseline; }
                    .script-speaker { font-weight: bold; width: 3.5em; flex-shrink: 0; text-align: right; margin-right: 15px; color: #333; }
                    .script-line { flex-grow: 1; line-height: 1.8; }
                    /* 译文样式统一为 0.85em */
                    .script-line .translation { margin-top: 5px; margin-bottom: 0; color: #666; font-size: 0.85em; }
                </style>

                <div class="japanese-text">
                    
                    <div class="script-row">
                        <div class="script-speaker">部長</div>
                        <div class="script-line">
                            「<ruby>本<rt>ほん</rt></ruby><ruby>田<rt>だ</rt></ruby>君、子どもの<span class="vocab-point" onclick="showItem('otsukai')"><ruby>お<rt>お</rt></ruby><ruby>遣<rt>つか</rt></ruby>い</span><span class="grammar-point" onclick="showItem('jaarumaishi')">じゃあるまいし</span>、<span class="vocab-point" onclick="showItem('catalog')">カタログ</span>だけ置いて帰ってくる奴があるか。」
                            <p class="translation">“本田君，你又不是小孩子去跑腿打酱油，哪有只放下产品目录就回来的道理？”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">本田</div>
                        <div class="script-line">
                            「すみません。」
                            <p class="translation">“非常抱歉。”</p>
                        </div>
                    </div>

                    <div class="script-row">
                        <div class="script-speaker">部長</div>
                        <div class="script-line">
                            「それじゃ、<ruby>商<rt>しょう</rt></ruby><ruby>談<rt>だん</rt></ruby>はどうでもいいと<span class="grammar-point" onclick="showItem('nbakari')">言わんばかり</span>じゃないか。<span class="vocab-point" onclick="showItem('guzuguzu')">ぐずぐず</span>しているうちにライバル社に<span class="vocab-point" onclick="showItem('sakiwokosasare')"><ruby>先<rt>さき</rt></ruby>を<ruby>越<rt>こ</rt></ruby>され</span><span class="grammar-point" onclick="showItem('tarasoremadeda')">たらそれまでだ</span>ぞ。」
                            <p class="translation">“那样做，简直就像在说‘生意谈不谈成无所谓’一样嘛。如果磨磨蹭蹭的，被竞争对手抢先一步，那就全完了。”</p>
                        </div>
                    </div>

                    <div class="script-row">
