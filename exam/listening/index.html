<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聴解練習 - ステージ選択</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800;900&family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FFFFFF;        
            --card-bg: #FFFFFF;         
            
            --text-main: #1C1C1C;       
            --text-sub: #4B5563;        
            
            --border-strong: #1C1C1C;   
            
            /* 题型强调色 */
            --color-type1: #A7F3D0; /* 大题1 绿 */
            --color-type1-bg: #DCFCE7;
            
            --color-type4: #FBCFE8; /* 大题4 粉 */
            --color-type4-bg: #FCE7F3;
            
            --color-locked-tag: #BFDBFE; /* 准备中标签蓝 */
            --color-locked-tag2: #E9D5FF; /* 准备中标签紫 */
            --color-locked-tag3: #FEF08A; /* 准备中标签黄 */
            
            --disabled-bg: #F3F4F6;
            --disabled-border: #D1D5DB;
            --disabled-text: #9CA3AF;
            
            /* 硬直阴影 (Neo-Brutalism) */
            --shadow-sm: 2px 2px 0px var(--border-strong);
            --shadow-md: 4px 4px 0px var(--border-strong);
            --shadow-lg: 8px 8px 0px var(--border-strong);
            --shadow-locked: 8px 8px 0px var(--disabled-border);
            
            --transition: 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body {
            font-family: 'Noto Sans JP', 'M PLUS Rounded 1c', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 灰白波点背景 */
            background-image: radial-gradient(#E5E7EB 2px, transparent 2px);
            background-size: 20px 20px;
        }

        /* ================= Header ================= */
        header {
            width: 100%;
            padding: 16px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 3px solid var(--border-strong);
        }

        .back-btn {
            text-decoration: none;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 900;
            padding: 6px 14px;
            background: #FFF;
            border-radius: 8px;
            border: 3px solid var(--border-strong);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
        }
        
        .back-btn:hover { 
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
            background: #F3F4F6;
        }
        
        .back-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 var(--border-strong);
        }

        h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 900;
            color: var(--text-main);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
        }
        
        h1 span {
            color: var(--text-main);
            background: #FFD54F;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 13px;
            margin-left: 8px;
            border: 3px solid var(--border-strong);
        }

        .vocab-container {
            width: 95%;
            max-width: 860px;
            padding: 40px 0;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* 题型提示说明块 */
        .intro-box {
            text-align: center;
            margin-bottom: 32px;
            animation: fadeIn 0.4s ease-out;
        }
        
        .intro-box p {
            color: var(--text-main);
            font-size: 16px;
            font-weight: 900;
            margin: 0;
            background: #FFF;
            border: 3px solid var(--border-strong);
            display: inline-block;
            padding: 10px 24px;
            border-radius: 999px;
            box-shadow: var(--shadow-md);
            letter-spacing: 0.05em;
        }

        .type-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 24px;
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ================= 关卡卡片 ================= */
        .type-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 4px solid var(--border-strong);
            box-shadow: var(--shadow-lg);
            transition: all var(--transition);
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .type-card:hover:not(.locked) {
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0px var(--border-strong);
            background-color: #FAFAFA;
        }
        
        .type-card:active:not(.locked) {
            transform: translate(4px, 4px);
            box-shadow: 0 0 0 var(--border-strong);
        }

        /* 锁定的卡片状态 */
        .type-card.locked {
            background: var(--disabled-bg);
            border-color: var(--disabled-border);
            box-shadow: var(--shadow-locked);
            cursor: not-allowed;
        }
        
        .type-card.locked:hover {
            transform: none;
        }

        .type-info {
            flex: 1;
            padding-right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .type-info h2 {
            margin: 0 0 12px 0;
            font-size: 22px;
            font-weight: 900;
            color: var(--text-main);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            letter-spacing: 0.05em;
        }

        /* 题号徽章 (打歌标签) */
        .lesson-tag {
            font-size: 12px;
            font-weight: 900;
            color: var(--text-main);
            padding: 2px 10px;
            border-radius: 999px;
            border: 2px solid var(--border-strong);
            letter-spacing: 0.05em;
        }

        .type-card:nth-child(1) .lesson-tag { background: var(--color-type1); }
        .type-card:nth-child(4) .lesson-tag { background: var(--color-type4); }
        
        .type-card.locked .lesson-tag {
            border-color: transparent;
            color: var(--text-sub);
        }
        .type-card:nth-child(2).locked .lesson-tag { background: var(--color-locked-tag); }
        .type-card:nth-child(3).locked .lesson-tag { background: var(--color-locked-tag2); }
        .type-card:nth-child(5).locked .lesson-tag { background: var(--color-locked-tag3); }

        .type-info p {
            margin: 0 0 12px 0;
            font-size: 13px;
            color: var(--text-sub);
            line-height: 1.6;
            font-weight: 700;
        }

        .type-info .hint-text {
            font-size: 12px;
            color: var(--text-sub);
            font-weight: 900;
            padding: 6px 12px;
            border-radius: 999px;
            display: inline-block;
            border: 2px dashed var(--border-strong);
        }

        .type-card.locked .type-info h2 { color: var(--disabled-text); }
        .type-card.locked .type-info p { color: var(--disabled-text); }
        .type-card.locked .type-info .hint-text {
            border-color: var(--disabled-text);
            color: var(--disabled-text);
        }

        /* 右侧舞台风图标 */
        .type-icon {
            font-size: 32px;
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            flex-shrink: 0;
            border: 4px solid var(--border-strong);
            background: #FFF;
        }

        .type-card:nth-child(1) .type-icon { background: var(--color-type1-bg); }
        .type-card:nth-child(4) .type-icon { background: var(--color-type4-bg); }

        .type-card.locked .type-icon { 
            background: #FFF; 
            border-color: var(--disabled-border); 
            filter: grayscale(100%);
            opacity: 0.7;
        }

        footer {
            margin-top: auto;
            padding: 30px;
            font-size: 13px;
            font-weight: 800;
            color: var(--disabled-text);
        }

        @media (max-width: 600px) {
            .type-grid { grid-template-columns: 1fr; }
            .type-card { padding: 20px; }
            .type-info h2 { font-size: 18px; }
            .type-icon { width: 64px; height: 64px; font-size: 28px; }
            .intro-box p { font-size: 14px; padding: 8px 20px; }
            header { padding: 12px 16px; }
        }
    
        /* CODEX listening mobile density: brutal root */
        @media (max-width: 720px) {
            body { background-size: 16px 16px; }
            header { padding: 12px 14px !important; border-bottom-width: 2px !important; }
            .back-btn, .home-btn {
                font-size: 12px !important;
                min-height: 30px !important;
                padding: 6px 10px !important;
                gap: 4px !important;
                border-radius: 8px !important;
            }
            h1 { font-size: 16px !important; }
            h1 span {
                font-size: 10px !important;
                padding: 2px 7px !important;
                border-width: 2px !important;
                box-shadow: 2px 2px 0 #1c1c1c !important;
            }
            .vocab-container, .container {
                width: calc(100% - 20px) !important;
                max-width: none !important;
                padding: 20px 0 32px !important;
            }
            .intro-box { margin-bottom: 20px !important; }
            .intro-box p, .intro {
                font-size: 12px !important;
                line-height: 1.6 !important;
                padding: 8px 16px !important;
            }
            .type-grid, .level-grid { grid-template-columns: 1fr !important; gap: 14px !important; }
            .type-card, .level-card {
                padding: 18px !important;
                border-width: 3px !important;
                border-radius: 14px !important;
                box-shadow: 6px 6px 0 #1c1c1c !important;
            }
            .type-info, .level-info { padding-right: 14px !important; }
            .type-info h2, .level-info h2 { font-size: 18px !important; margin-bottom: 8px !important; }
            .type-info p, .level-info p { font-size: 12px !important; line-height: 1.5 !important; }
            .type-icon, .level-icon {
                width: 52px !important;
                height: 52px !important;
                font-size: 22px !important;
            }
        }
        @media (max-width: 520px) {
            body { background-size: 14px 14px; }
            header { padding: 10px 10px !important; }
            .back-btn, .home-btn {
                font-size: 11px !important;
                min-height: 28px !important;
                padding: 5px 8px !important;
            }
            h1 { font-size: 14px !important; }
            h1 span { font-size: 9px !important; }
            .vocab-container, .container { width: calc(100% - 16px) !important; padding: 16px 0 24px !important; }
            .intro-box p, .intro { font-size: 11px !important; padding: 7px 12px !important; }
            .type-grid, .level-grid { gap: 10px !important; }
            .type-card, .level-card {
                padding: 14px !important;
                border-radius: 12px !important;
                box-shadow: 4px 4px 0 #1c1c1c !important;
            }
            .type-info, .level-info { padding-right: 10px !important; }
            .type-info h2, .level-info h2 { font-size: 16px !important; }
            .type-info p, .level-info p { font-size: 11px !important; }
            .type-icon, .level-icon {
                width: 44px !important;
                height: 44px !important;
                font-size: 19px !important;
            }
        }

    </style>
    <link rel="stylesheet" href="shared/listening-header.css">
</head>
<body>

    <header>
        <a href="../../index.html#exam" class="back-btn" data-back-nav>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            戻る
        </a>
        <h1>聴解 <span>STAGE</span></h1>
        <!-- 占位符保持标题居中 -->
        <div style="width: 70px;"></div>
    </header>

    <div class="vocab-container">
        <div class="intro-box">
            <p>🎶 挑戦するステージを選択してください</p>
        </div>

        <div class="type-grid">
            <!-- 题型 1: 课题理解 -->
            <a href="task-comprehension/index.html" class="type-card">
                <div class="type-info">
                    <h2>課題理解 <span class="lesson-tag">大題 1</span></h2>
                    <p>听取接下来的具体行动或要求。</p>
                    <span class="hint-text">※ 卷面有图片或文字选项</span>
                </div>
                <div class="type-icon">📝</div>
            </a>

            <!-- 题型 2: 要点理解 -->
            <div class="type-card locked" onclick="alert('该题型正在努力整理中，敬请期待！')">
                <div class="type-info">
                    <h2>ポイント理解 <span class="lesson-tag">準備中</span></h2>
                    <p>听取原因、理由或核心要点。</p>
                    <span class="hint-text">※ 会给出阅读选项的时间</span>
                </div>
                <div class="type-icon">💡</div>
            </div>

            <!-- 题型 3: 概要理解 -->
            <div class="type-card locked" onclick="alert('该题型正在努力整理中，敬请期待！')">
                <div class="type-info">
                    <h2>概要理解 <span class="lesson-tag">準備中</span></h2>
                    <p>把握整段话的主旨或说话人的意图。</p>
                    <span class="hint-text">※ 卷面无任何印刷内容</span>
                </div>
                <div class="type-icon">🎧</div>
            </div>

            <!-- 题型 4: 即时应答 -->
            <a href="immediate-response/index.html" class="type-card">
                <div class="type-info">
                    <h2>即時応答 <span class="lesson-tag">大題 4</span></h2>
                    <p>根据简短的抛话，选择最合适的回答。</p>
                    <span class="hint-text">※ 卷面无印刷内容，语速较快</span>
                </div>
                <div class="type-icon">💬</div>
            </a>

            <!-- 题型 5: 综合理解 -->
            <div class="type-card locked" onclick="alert('该题型正在努力整理中，敬请期待！')">
                <div class="type-info">
                    <h2>総合理解 <span class="lesson-tag">準備中</span></h2>
                    <p>对比长篇信息，综合提取线索并判断。</p>
                    <span class="hint-text">※ 信息量大，通常包含多组对话</span>
                </div>
                <div class="type-icon">🧩</div>
            </div>
        </div>
    </div>

    <footer>
        © キキの日本語コーナー
    </footer>

    <script src="../../shared/back-navigation.js"></script>
    <script>
        if (typeof window.bindHierarchicalBack === 'function') {
            window.bindHierarchicalBack({
                selector: "[data-back-nav]",
                fallback: "../../index.html#exam"
            });
        } else if (typeof window.bindStatefulBack === 'function') {
            window.bindStatefulBack({
                selector: "[data-back-nav]",
                fallback: "../../index.html#exam"
            });
        } else {
            document.querySelectorAll('[data-back-nav]').forEach(function(el) {
                el.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.location.href = "../../index.html#exam";
                });
            });
        }
    </script>

</body>
</html>
