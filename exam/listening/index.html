<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聴解練習 - ステージ選択</title>
    <!-- 使用与练习页一致的书面/印刷感字体组合 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 纸张与铅笔色盘 - 明亮白底版 */
            --paper: #ffffff;          
            --paper-light: #ffffff;    
            
            --graphite: #333333;       
            --graphite-sub: #666666;   
            --graphite-faint: #cccccc; 
            
            --red-pencil: #e64a4a;     
            --red-pencil-light: rgba(230, 74, 74, 0.04); 

            /* 水彩记号笔色系 (五种题型区分) */
            --marker-blue: rgba(129, 212, 250, 0.35);    /* 课题理解 */
            --marker-peach: rgba(253, 186, 116, 0.35);   /* 要点理解 */
            --marker-mint: rgba(134, 239, 172, 0.35);    /* 概要理解 */
            --marker-pink: rgba(244, 143, 177, 0.35);    /* 即时应答 */
            --marker-lavender: rgba(196, 181, 253, 0.35);/* 综合理解 */
            
            --marker-yellow: rgba(255, 213, 79, 0.35);   /* 通用高亮 */
            --marker-gray: rgba(200, 200, 200, 0.25);    /* 锁定状态 */

            /* 铅笔排线背景 */
            --hatching-graphite: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(51, 51, 51, 0.04) 3px, rgba(51, 51, 51, 0.04) 4px);

            --transition: all 0.2s ease-out;
        }

        body {
            font-family: 'Noto Serif JP', 'Noto Sans JP', 'Noto Sans SC', serif;
            background-color: var(--paper);
            color: var(--graphite);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* 极弱的纸张噪点纹理 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.02'/%3E%3C/svg%3E");
            z-index: -1;
            pointer-events: none;
        }

        /* ================= Header ================= */
        header {
            width: 100%;
            padding: 16px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(4px);
            border-bottom: 1.5px solid var(--graphite);
            border-bottom-left-radius: 50% 2px;
            border-bottom-right-radius: 50% 3px;
        }

        .back-btn {
            text-decoration: none;
            color: var(--graphite);
            font-size: 14px;
            font-weight: 700;
            padding: 4px 12px;
            background: transparent;
            border: 1.5px solid var(--graphite);
            border-radius: 2px 8px 3px 6px / 6px 3px 8px 2px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
            letter-spacing: 0.05em;
        }
        
        .back-btn:hover { 
            background: var(--marker-yellow);
        }

        h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: var(--graphite);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
        }
        
        h1 span {
            color: var(--graphite);
            background: transparent;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 8px;
            border: 1.5px solid var(--graphite);
            border-radius: 2px 8px 2px 6px / 6px 2px 8px 2px;
            font-family: 'Noto Sans JP', sans-serif;
        }

        .vocab-container {
            width: 95%;
            max-width: 860px;
            padding: 40px 0;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* 提示说明块 - 水彩荧光笔风格 */
        .intro-box {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 0.4s ease-out;
        }
        
        .intro-box p {
            color: var(--graphite);
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 15px;
            font-weight: 700;
            margin: 0;
            /* 荧光黄下划线特效 */
            background: linear-gradient(transparent 50%, rgba(255, 213, 79, 0.4) 50%);
            border-bottom: 1.5px dashed var(--graphite-faint);
            display: inline-block;
            padding: 4px 16px;
            letter-spacing: 0.1em;
        }

        .type-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 24px;
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ================= 大题卡片 ================= */
        .type-card {
            background: transparent;
            border-radius: 3px 255px 4px 25px / 255px 5px 225px 4px;
            padding: 24px;
            border: 1.5px solid var(--graphite);
            transition: all var(--transition);
            text-decoration: none;
            color: var(--graphite);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .type-card:hover:not(.locked) {
            transform: translate(-1px, -1px);
            background: var(--hatching-graphite);
        }
        
        .type-card:active:not(.locked) {
            transform: translate(1px, 1px);
        }

        /* 锁定的卡片状态 */
        .type-card.locked {
            border-style: dashed;
            border-color: var(--graphite-faint);
            cursor: not-allowed;
            opacity: 0.8;
        }
        
        .type-card.locked:hover {
            transform: none;
            background: transparent;
        }

        .type-info {
            flex: 1;
            padding-right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .type-info h2 {
            margin: 0 0 12px 0;
            font-size: 22px;
            font-weight: 700;
            color: var(--graphite);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            letter-spacing: 0.05em;
        }

        /* 大题标签 - 手绘感边框 + 水彩底色 */
        .lesson-tag {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: var(--graphite);
            padding: 2px 8px;
            border: 1.5px solid var(--graphite);
            border-radius: 2px 8px 2px 6px / 6px 2px 8px 2px;
            letter-spacing: 0.1em;
        }

        /* 分配水彩颜色 */
        .type-card:nth-child(1) .lesson-tag { background: var(--marker-blue); }
        .type-card:nth-child(2) .lesson-tag { background: var(--marker-peach); }
        .type-card:nth-child(3) .lesson-tag { background: var(--marker-mint); }
        .type-card:nth-child(4) .lesson-tag { background: var(--marker-pink); }
        .type-card:nth-child(5) .lesson-tag { background: var(--marker-lavender); }
        
        .type-card.locked .lesson-tag {
            background: var(--marker-gray);
            border-color: var(--graphite-faint);
            color: var(--graphite-sub);
        }

        .type-info p {
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0 0 12px 0;
            font-size: 14px;
            color: var(--graphite-sub);
            line-height: 1.6;
            font-weight: 500;
        }

        .type-info .hint-text {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 12px;
            color: var(--graphite-sub);
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 2px 6px 3px 5px / 5px 3px 6px 2px;
            display: inline-block;
            border: 1px dashed var(--graphite-sub);
        }

        .type-card.locked .type-info h2 { color: var(--graphite-faint); }
        .type-card.locked .type-info p { color: var(--graphite-faint); }
        .type-card.locked .type-info .hint-text {
            border-color: var(--graphite-faint);
            color: var(--graphite-faint);
        }

        /* 右侧图标 - 随手画的方形/圆角效果 */
        .type-icon {
            font-size: 28px;
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid var(--graphite);
            border-radius: 2px 8px 3px 6px / 6px 3px 8px 2px;
            flex-shrink: 0;
            background: #FFF;
        }

        .type-card:nth-child(1) .type-icon { background: var(--marker-blue); }
        .type-card:nth-child(2) .type-icon { background: var(--marker-peach); }
        .type-card:nth-child(3) .type-icon { background: var(--marker-mint); }
        .type-card:nth-child(4) .type-icon { background: var(--marker-pink); }
        .type-card:nth-child(5) .type-icon { background: var(--marker-lavender); }

        .type-card.locked .type-icon { 
            background: transparent; 
            border-color: var(--graphite-faint); 
            filter: grayscale(100%);
            opacity: 0.5;
        }

        footer {
            margin-top: auto;
            padding: 30px;
            font-size: 13px;
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 500;
            color: var(--graphite-faint);
        }

        @media (max-width: 600px) {
            .type-grid { grid-template-columns: 1fr; }
            .type-card { padding: 20px; }
            .type-info h2 { font-size: 18px; }
            .type-icon { width: 56px; height: 56px; font-size: 24px; }
            header { padding: 12px 16px; }
        }
    
        /* 手机端深度适配 */
        @media (max-width: 720px) {
            header { padding: 12px 14px !important; }
            .back-btn, .home-btn { font-size: 12px !important; padding: 6px 10px !important; gap: 4px !important; }
            h1 { font-size: 16px !important; }
            h1 span { font-size: 10px !important; padding: 2px 6px !important; }
            
            .vocab-container {
                width: calc(100% - 32px) !important;
                padding: 20px 0 32px !important;
            }
            .intro-box { margin-bottom: 24px !important; }
            .intro-box p {
                font-size: 13px !important;
                padding: 4px 12px !important;
            }
            .type-grid { grid-template-columns: 1fr !important; gap: 16px !important; }
            .type-card {
                padding: 16px !important;
                gap: 12px !important;
            }
            .type-info { padding-right: 12px !important; }
            .type-info h2 { font-size: 18px !important; margin-bottom: 8px !important; }
            .type-info p { font-size: 13px !important; line-height: 1.5 !important; }
            .type-icon {
                width: 48px !important;
                height: 48px !important;
                font-size: 20px !important;
            }
            .lesson-tag { font-size: 11px !important; padding: 2px 6px !important; }
        }
        
        @media (max-width: 520px) {
            header { padding: 10px 12px !important; }
            .back-btn, .home-btn { font-size: 11px !important; padding: 4px 8px !important; }
            h1 { font-size: 15px !important; }
            .vocab-container { width: calc(100% - 24px) !important; padding: 16px 0 24px !important; }
            .intro-box p { font-size: 12px !important; }
            .type-grid { gap: 12px !important; }
            .type-card { padding: 14px !important; }
            .type-info { padding-right: 8px !important; }
            .type-info h2 { font-size: 16px !important; }
            .type-info p { font-size: 12px !important; }
            .type-icon {
                width: 44px !important;
                height: 44px !important;
                font-size: 18px !important;
            }
            .hint-text { font-size: 11px !important; padding: 2px 8px !important; }
        }

    </style>
    <link rel="stylesheet" href="shared/listening-header.css">
</head>
<body>

    <header>
        <a href="../../index.html#exam" class="back-btn" data-back-nav>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            戻る
        </a>
        <h1>聴解 <span>STAGE</span></h1>
        <div style="width: 70px;"></div>
    </header>

    <div class="vocab-container">
        <div class="intro-box">
            <p>✎ 挑戦するステージを選択してください</p>
        </div>

        <div class="type-grid">
            <!-- 题型 1: 课题理解 -->
            <a href="task-comprehension/index.html" class="type-card">
                <div class="type-info">
                    <h2>課題理解 <span class="lesson-tag">大題 1</span></h2>
                    <p>听取接下来的具体行动或要求。</p>
                    <span class="hint-text">※ 卷面有图片或文字选项</span>
                </div>
                <div class="type-icon">📝</div>
            </a>

            <!-- 题型 2: 要点理解 -->
            <div class="type-card locked" onclick="alert('该题型正在努力整理中，敬请期待！')">
                <div class="type-info">
                    <h2>ポイント理解 <span class="lesson-tag">準備中</span></h2>
                    <p>听取原因、理由或核心要点。</p>
                    <span class="hint-text">※ 会给出阅读选项的时间</span>
                </div>
                <div class="type-icon">💡</div>
            </div>

            <!-- 题型 3: 概要理解 -->
            <div class="type-card locked" onclick="alert('该题型正在努力整理中，敬请期待！')">
                <div class="type-info">
                    <h2>概要理解 <span class="lesson-tag">準備中</span></h2>
                    <p>把握整段话的主旨或说话人的意图。</p>
                    <span class="hint-text">※ 卷面无任何印刷内容</span>
                </div>
                <div class="type-icon">🎧</div>
            </div>

            <!-- 题型 4: 即时应答 -->
            <a href="immediate-response/index.html" class="type-card">
                <div class="type-info">
                    <h2>即時応答 <span class="lesson-tag">大題 4</span></h2>
                    <p>根据简短的抛话，选择最合适的回答。</p>
                    <span class="hint-text">※ 卷面无印刷内容，语速较快</span>
                </div>
                <div class="type-icon">💬</div>
            </a>

            <!-- 题型 5: 综合理解 -->
            <div class="type-card locked" onclick="alert('该题型正在努力整理中，敬请期待！')">
                <div class="type-info">
                    <h2>総合理解 <span class="lesson-tag">準備中</span></h2>
                    <p>对比长篇信息，综合提取线索并判断。</p>
                    <span class="hint-text">※ 信息量大，通常包含多组对话</span>
                </div>
                <div class="type-icon">🧩</div>
            </div>
        </div>
    </div>

    <footer>
        © キキの日本語コーナー
    </footer>

    <script src="../../shared/back-navigation.js"></script>
    <script>
        if (typeof window.bindHierarchicalBack === 'function') {
            window.bindHierarchicalBack({
                selector: "[data-back-nav]",
                fallback: "../../index.html#exam"
            });
        } else if (typeof window.bindStatefulBack === 'function') {
            window.bindStatefulBack({
                selector: "[data-back-nav]",
                fallback: "../../index.html#exam"
            });
        } else {
            document.querySelectorAll('[data-back-nav]').forEach(function(el) {
                el.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.location.href = "../../index.html#exam";
                });
            });
        }
    </script>

</body>
</html>
