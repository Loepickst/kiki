<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>听力练习 - 等级选择</title>
    <style>
        :root {
            --bg-color: #fdfaf5;
            --text-color: #2c2c2c;
            --accent-color: #b33e3e;
            --card-bg: #ffffff;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        body {
            font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* Header */
        header {
            width: 100%;
            padding: 18px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(253, 250, 245, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 34px;
        }

        .back-btn {
            position: absolute;
            left: 20px;
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-color);
            font-size: 15px;
            font-weight: 600;
            min-height: 34px;
            opacity: 0.72;
            transition: opacity 0.25s, transform 0.25s;
            z-index: 2;
        }
        .back-btn:hover {
            opacity: 1;
            transform: translateX(-2px);
        }

        h1 {
            margin: 0;
            font-size: 19px;
            font-weight: 700;
            color: var(--text-color);
            letter-spacing: 0.02em;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px 40px 20px;
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .level-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--text-color);
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .level-card:hover:not(.disabled) {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            border-color: var(--accent-color);
        }

        .level-card.disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background-color: #f9f9f9;
        }

        .level-info h2 {
            margin: 0 0 5px 0;
            font-size: 24px;
            color: var(--accent-color);
        }

        .level-info p {
            margin: 0;
            font-size: 13px;
            color: #888;
        }

        .level-icon {
            font-size: 32px;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .level-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link rel="stylesheet" href="../../../shared/site-fonts.css">
</head>
<body>

    <header>
        <a href="../index.html" class="back-btn">← 戻る</a>
        <h1>JLPT 聴解練習</h1>
    </header>

    <div class="container">
        <div class="level-grid">
            <!-- N1 -->
            <a href="#" class="level-card disabled" onclick="return false;">
                <div class="level-info">
                    <h2>N1</h2>
                    <p>整理中</p>
                </div>
                <div class="level-icon">🗻</div>
            </a>

            <!-- N2 -->
            <a href="n2/index.html" class="level-card">
                <div class="level-info">
                    <h2>N2</h2>
                    <p>過去問演習</p>
                </div>
                <div class="level-icon">⛩️</div>
            </a>

            <!-- N3 -->
            <a href="#" class="level-card disabled" onclick="return false;">
                <div class="level-info">
                    <h2>N3</h2>
                    <p>整理中</p>
                </div>
                <div class="level-icon">🍱</div>
            </a>

            <!-- N4 -->
            <a href="#" class="level-card disabled" onclick="return false;">
                <div class="level-info">
                    <h2>N4</h2>
                    <p>初級レベル（完善中）</p>
                </div>
                <div class="level-icon">🍙</div>
            </a>
        </div>
    </div>
</body>
</html>
