<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課題理解 - レベル選択</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../shared/site-fonts.css">
    <style>
        :root {
            --bg-color: #FFFFFF;
            --card-bg: #FFFFFF;
            --text-main: #1C1C1C;
            --text-sub: #4B5563;
            --border-strong: #1C1C1C;
            --color-level1: #FBCFE8;
            --color-level1-bg: #FCE7F3;
            --color-level2: #BAE6FD;
            --color-level2-bg: #E0F2FE;
            --color-level3: #E9D5FF;
            --color-level3-bg: #F3E8FF;
            --color-level4: #FEF08A;
            --color-level4-bg: #FEF9C3;
            --disabled-bg: #F3F4F6;
            --disabled-border: #D1D5DB;
            --disabled-text: #9CA3AF;
            --shadow-sm: 2px 2px 0px var(--border-strong);
            --shadow-md: 4px 4px 0px var(--border-strong);
            --shadow-lg: 8px 8px 0px var(--border-strong);
            --shadow-locked: 8px 8px 0px var(--disabled-border);
            --transition: 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body {
            font-family: 'Noto Sans JP', 'Noto Sans SC', 'M PLUS Rounded 1c', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: radial-gradient(#E5E7EB 2px, transparent 2px);
            background-size: 20px 20px;
        }

        /* ================= Header ================= */
        header {
            width: 100%;
            padding: 16px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 3px solid var(--border-strong);
        }

        .back-btn,
        .home-btn {
            text-decoration: none;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 900;
            padding: 6px 14px;
            background: #FFF;
            border-radius: 8px;
            border: 3px solid var(--border-strong);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
        }

        .back-btn:hover,
        .home-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
            background: #F3F4F6;
        }

        .back-btn:active,
        .home-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 var(--border-strong);
        }

        h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 900;
            color: var(--text-main);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
        }

        h1 span {
            color: var(--text-main);
            background: #FFD54F;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 13px;
            margin-left: 8px;
            border: 3px solid var(--border-strong);
        }

        .container {
            width: 95%;
            max-width: 860px;
            margin: 0 auto;
            padding: 40px 0 48px;
        }

        .intro-box {
            text-align: center;
            margin-bottom: 32px;
            animation: fadeIn 0.4s ease-out;
        }

        .intro-box p {
            margin: 0;
            display: inline-block;
            color: var(--text-main);
            font-size: 16px;
            font-weight: 900;
            background: #FFF;
            border: 3px solid var(--border-strong);
            border-radius: 999px;
            padding: 10px 24px;
            box-shadow: var(--shadow-md);
            letter-spacing: 0.05em;
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .level-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 4px solid var(--border-strong);
            box-shadow: var(--shadow-lg);
            transition: all var(--transition);
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .level-card:hover:not(.disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0px var(--border-strong);
            background-color: #FAFAFA;
        }

        .level-card:active:not(.disabled) {
            transform: translate(4px, 4px);
            box-shadow: 0 0 0 var(--border-strong);
        }

        .level-card.disabled {
            background: var(--disabled-bg);
            border-color: var(--disabled-border);
            box-shadow: var(--shadow-locked);
            cursor: not-allowed;
        }

        .level-card.disabled:hover {
            transform: none;
        }

        .level-info {
            flex: 1;
            padding-right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .level-info h2 {
            margin: 0 0 12px 0;
            font-size: 26px;
            font-weight: 900;
            color: var(--text-main);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            letter-spacing: 0.05em;
        }

        .lesson-tag {
            font-size: 12px;
            font-weight: 900;
            color: var(--text-main);
            padding: 2px 10px;
            border-radius: 999px;
            border: 2px solid var(--border-strong);
            letter-spacing: 0.05em;
            background: #FFF;
        }

        .level-card:nth-child(1) .lesson-tag { background: var(--color-level1); }
        .level-card:nth-child(2) .lesson-tag { background: var(--color-level2); }
        .level-card:nth-child(3) .lesson-tag { background: var(--color-level3); }
        .level-card:nth-child(4) .lesson-tag { background: var(--color-level4); }

        .level-card.disabled .lesson-tag {
            border-color: transparent;
            color: var(--text-sub);
        }

        .level-info p {
            margin: 0 0 12px 0;
            font-size: 14px;
            color: var(--text-sub);
            line-height: 1.6;
            font-weight: 700;
        }

        .level-info .hint-text {
            font-size: 12px;
            color: var(--text-sub);
            font-weight: 900;
            padding: 6px 12px;
            border-radius: 999px;
            display: inline-block;
            border: 2px dashed var(--border-strong);
        }

        .level-card.disabled .level-info h2,
        .level-card.disabled .level-info p,
        .level-card.disabled .level-info .hint-text {
            color: var(--disabled-text);
        }

        .level-card.disabled .level-info .hint-text {
            border-color: var(--disabled-text);
        }

        .level-icon {
            font-size: 32px;
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            flex-shrink: 0;
            border: 4px solid var(--border-strong);
            background: #FFF;
        }

        .level-card:nth-child(1) .level-icon { background: var(--color-level1-bg); }
        .level-card:nth-child(2) .level-icon { background: var(--color-level2-bg); }
        .level-card:nth-child(3) .level-icon { background: var(--color-level3-bg); }
        .level-card:nth-child(4) .level-icon { background: var(--color-level4-bg); }

        .level-card.disabled .level-icon {
            background: #FFF;
            border-color: var(--disabled-border);
            filter: grayscale(100%);
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            .level-grid { grid-template-columns: 1fr; }
            .level-card { padding: 20px; }
            .level-info h2 { font-size: 22px; }
            .level-icon { width: 64px; height: 64px; font-size: 28px; }
            .intro-box p { font-size: 14px; padding: 8px 20px; }
            header { padding: 12px 16px; }
        }

        @media (max-width: 720px) {
            body { background-size: 16px 16px; }
            header { padding: 12px 14px !important; border-bottom-width: 2px !important; }
            .back-btn, .home-btn {
                font-size: 12px !important;
                min-height: 30px !important;
                padding: 6px 10px !important;
                gap: 4px !important;
                border-radius: 8px !important;
                border-width: 2px !important;
            }
            h1 { font-size: 16px !important; }
            h1 span {
                font-size: 10px !important;
                padding: 2px 7px !important;
                border-width: 2px !important;
            }
            .container {
                width: calc(100% - 20px);
                max-width: none;
                padding: 20px 0 32px;
            }
            .intro-box { margin-bottom: 20px; }
            .intro-box p {
                font-size: 12px;
                line-height: 1.6;
                padding: 8px 16px;
            }
            .level-grid { grid-template-columns: 1fr; gap: 14px; }
            .level-card {
                padding: 18px;
                border-width: 3px;
                border-radius: 14px;
                box-shadow: 6px 6px 0 #1c1c1c;
            }
            .level-info { padding-right: 14px; }
            .level-info h2 {
                font-size: 18px;
                margin-bottom: 8px;
            }
            .level-info p {
                font-size: 12px;
                line-height: 1.5;
            }
            .hint-text {
                font-size: 11px;
                padding: 5px 10px;
            }
            .level-icon {
                width: 52px;
                height: 52px;
                font-size: 22px;
                border-width: 3px;
            }
        }

        @media (max-width: 520px) {
            body { background-size: 14px 14px; }
            header { padding: 10px 10px !important; }
            .back-btn, .home-btn {
                font-size: 11px !important;
                min-height: 28px !important;
                padding: 5px 8px !important;
                border-width: 2px !important;
            }
            h1 { font-size: 14px !important; }
            h1 span { font-size: 9px !important; }
            .container {
                width: calc(100% - 16px);
                padding: 16px 0 24px;
            }
            .intro-box p {
                font-size: 11px;
                padding: 7px 12px;
            }
            .level-grid { gap: 10px; }
            .level-card {
                padding: 14px;
                border-radius: 12px;
                box-shadow: 4px 4px 0 #1c1c1c;
            }
            .level-info { padding-right: 10px; }
            .level-info h2 { font-size: 16px; }
            .level-info p { font-size: 11px; }
            .lesson-tag,
            .hint-text {
                font-size: 10px;
            }
            .level-icon {
                width: 44px;
                height: 44px;
                font-size: 19px;
                border-width: 2px;
            }
        }
    </style>
    <link rel="stylesheet" href="../shared/listening-header.css">
</head>
<body>

    <header>
        <a href="../index.html" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            戻る
        </a>
        <h1>課題理解 <span>LEVEL</span></h1>
        <a href="../../../index.html" class="home-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            ホーム
        </a>
    </header>

    <div class="container">
        <div class="intro-box">
            <p>💡 挑戦するステージを選択してね！</p>
        </div>

        <div class="level-grid">
            <a href="n1/index.html" class="level-card">
                <div class="level-info">
                    <h2>N1 <span class="lesson-tag">MASTER</span></h2>
                    <p>課題理解 / 過去問トレーニング</p>
                    <span class="hint-text">※ 指示の聞き取りを磨こう</span>
                </div>
                <div class="level-icon">🎙️</div>
            </a>

            <a href="#" class="level-card disabled" onclick="return false;" aria-disabled="true">
                <div class="level-info">
                    <h2>N2 <span class="lesson-tag">PRO</span></h2>
                    <p>準備中</p>
                    <span class="hint-text">※ 開放までお待ちください</span>
                </div>
                <div class="level-icon">🎧</div>
            </a>

            <a href="#" class="level-card disabled" onclick="return false;">
                <div class="level-info">
                    <h2>N3 <span class="lesson-tag">REGULAR</span></h2>
                    <p>リハーサル中...</p>
                    <span class="hint-text">※ ステージ調整中</span>
                </div>
                <div class="level-icon">🎀</div>
            </a>

            <a href="#" class="level-card disabled" onclick="return false;">
                <div class="level-info">
                    <h2>N4 <span class="lesson-tag">DEBUT</span></h2>
                    <p>レッスン準備中♪</p>
                    <span class="hint-text">※ 開放までもう少し</span>
                </div>
                <div class="level-icon">📘</div>
            </a>
        </div>
    </div>
</body>
</html>
