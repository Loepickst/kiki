<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課題理解 - 聴解練習 (N1 ステージ)</title>
    <!-- 引入全字重的中日双语字体，保证界面文字粗细均匀锐利 -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* --- N1 练习专属：澄空蓝 (Clear Blue) 护眼舞台配色 --- */
            --bg-color: #F4F6F8;       /* 柔和的冷灰白底色，极其护眼 */
            --paper-color: #FFFFFF;    /* 纯白卡片背景 */
            --text-main: #111827;      /* 极深灰黑，保证最高阅读对比度 */
            --text-sub: #4B5563;       /* 中度灰黑辅助文字 */
            --border-strong: #111827;  /* 粗黑边框 */
            
            /* 状态色与主题色 */
            --accent-color: #3B82F6;   /* 晴空蓝 - 主题高亮 */
            --accent-light: #EFF6FF;   /* 极浅蓝 */
            
            --color-correct: #10B981;  /* 护眼绿 (正确) */
            --color-correct-text: #065F46;
            --color-correct-bg: #ECFDF5;
            
            --color-wrong: #EF4444;    /* 警示红 (错误/Miss) */
            --color-wrong-text: #9F1239;
            --color-wrong-bg: #FFF1F2;
            
            --color-g1: #3B82F6;       /* 剧本框主题色 */
            --color-g1-bg: #EFF6FF;
            
            --idol-gold: #F59E0B;      /* 琥珀金 (确认按钮) */

            /* 硬直阴影 (Neo-Brutalism) */
            --shadow-solid: 4px 4px 0px var(--border-strong);
            --shadow-solid-sm: 2px 2px 0px var(--border-strong);
            --shadow-solid-hover: 6px 6px 0px var(--border-strong);
        }

        body {
            /* 优先使用 JP 保证日文字形，紧接 SC 保证简中不掉入系统默认字体，维持一致粗细 */
            font-family: 'Noto Sans JP', 'Noto Sans SC', 'M PLUS Rounded 1c', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* 低调的银灰波点背景，不干扰阅读 */
            background-image: radial-gradient(#CBD5E1 2px, transparent 2px);
            background-size: 20px 20px;
        }

        /* Global Header Style */
        header {
            width: 100%;
            padding: 16px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(253, 251, 247, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 3px solid var(--border-strong);
            box-shadow: 0 4px 12px rgba(17, 24, 39, 0.05);
        }

        header h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 900;
            color: var(--text-main);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            white-space: nowrap;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
        }

        .back-btn {
            text-decoration: none;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            background-color: #FFFFFF;
            border: 2px solid var(--border-strong);
            border-radius: 8px;
            padding: 6px 14px;
            box-shadow: var(--shadow-solid-sm);
            transition: all 0.2s ease;
            z-index: 2;
            gap: 6px;
            letter-spacing: 0.05em;
            cursor: pointer;
        }

        .back-btn:hover {
            background: var(--accent-color);
            color: #FFFFFF;
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-solid);
        }

        .back-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 var(--border-strong);
        }

        /* 主容器 */
        .practice-container {
            margin-top: 24px; 
            margin-bottom: 120px; 
            background: var(--paper-color);
            border-radius: 16px;
            border: 4px solid var(--border-strong);
            box-shadow: var(--shadow-solid-hover);
            max-width: 900px; 
            width: 95%;
            padding: 32px;
            position: relative;
            flex: 1; 
        }

        /* 顶部 Header */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 3px dashed var(--border-strong);
        }

        /* Header Controls & Icons */
        .card-header {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 16px;
        }

        .header-top,
        .header-left,
        .header-right { display: flex; align-items: center; gap: 12px; }

        .header-top {
            justify-content: space-between;
        }
        .question-select {
            padding: 8px 16px; 
            font-size: 15px; 
            border: 3px solid var(--border-strong); 
            border-radius: 8px;
            background-color: #FFFFFF; 
            color: var(--text-main); 
            outline: none; 
            font-weight: 900;
            cursor: pointer; 
            box-shadow: var(--shadow-solid-sm);
            font-family: inherit;
            transition: all 0.2s;
        }
        .question-select:hover { transform: translate(-2px, -2px); box-shadow: var(--shadow-solid); }
        
        .mark-btn {
            font-size: 22px; 
            padding: 6px 10px; 
            background: #FFFFFF; 
            border: 3px solid var(--border-strong);
            border-radius: 8px; 
            cursor: pointer; 
            opacity: 0.5; 
            filter: grayscale(100%); 
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); 
            position: relative; 
            z-index: 5; 
            box-shadow: var(--shadow-solid-sm);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .mark-btn:hover { opacity: 0.8; transform: translate(-2px, -2px); box-shadow: var(--shadow-solid); }
        .mark-btn.active { 
            opacity: 1; 
            filter: grayscale(0%); 
            background-color: var(--accent-light); 
            border-color: var(--accent-color);
            transform: translate(-2px, -2px) rotate(10deg); 
            box-shadow: 4px 4px 0 var(--accent-color); 
        }

        /* 模式切换按钮 */
        .mode-switch {
            display: flex;
            background: #FFF;
            padding: 6px;
            border-radius: 12px;
            border: 3px solid var(--border-strong);
            box-shadow: var(--shadow-solid-sm);
            gap: 4px;
        }

        .mode-switch button {
            padding: 8px 20px;
            cursor: pointer;
            border: 2px solid transparent;
            background-color: transparent;
            color: var(--text-sub);
            border-radius: 8px;
            font-weight: 900;
            font-size: 14px;
            transition: all 0.2s ease;
            letter-spacing: 0.05em;
        }

        .mode-switch button.active {
            background-color: var(--accent-color);
            color: #FFFFFF;
            border-color: var(--border-strong);
            box-shadow: 2px 2px 0 var(--border-strong);
        }

        /* 内容区布局 */
        .content-wrapper {
            display: block;
        }

        .right-panel {
            width: 100%;
        }

        /* --- 模式样式控制 --- */
        .mode-practice .right-panel {
            filter: none;
            opacity: 1;
            pointer-events: auto;
            user-select: auto;
            transition: all 0.5s ease;
        }

        .mode-practice .transcript-section,
        .mode-practice .translation {
            display: none !important;
        }

        .mode-practice .options-list li {
            cursor: pointer;
        }
        
        .mode-practice .options-list li:hover {
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-solid);
            background-color: #F8FAFC;
            border-color: var(--accent-color);
        }

        .mode-practice .options-list li.selected {
            border-color: var(--border-strong);
            background-color: var(--accent-color);
            color: #FFF;
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-solid);
        }

        .mode-practice .options-list li.selected .options-num {
            background: #FFF;
            color: var(--accent-color);
        }

        .mode-explanation .right-panel {
            filter: blur(0);
            opacity: 1;
            pointer-events: auto;
            transition: all 0.5s ease;
        }

        .mode-explanation .translation { display: block; }

        /* --- 听力原文区块排版 (台本風) --- */
        .transcript-section {
            margin-bottom: 30px;
            background: #FFFFFF;
            border-radius: 12px;
            border: 3px solid var(--border-strong);
            overflow: hidden;
            padding-bottom: 20px;
            box-shadow: var(--shadow-solid-sm);
        }

        .question-box {
            background-color: var(--color-g1-bg);
            padding: 34px 22px 16px;
            border-bottom: 3px solid var(--border-strong);
            font-weight: 760;
            font-size: 16px;
            line-height: 1.78;
            color: var(--text-main);
            position: relative;
            letter-spacing: 0.01em;
        }

        /* TRACK Badge */
        .question-box::before {
            content: '問題';
            position: absolute;
            top: 8px;
            left: 18px;
            background: var(--color-g1);
            color: white;
            font-weight: 900;
            padding: 2px 10px;
            border-radius: 6px;
            border: 2px solid var(--border-strong);
            font-size: 12px;
            letter-spacing: 0.1em;
        }

        #questionText {
            margin-top: 8px;
        }

        .conversation-box {
            padding: 28px 22px 4px;
            font-size: 16px;
            line-height: 1.92;
            color: var(--text-main);
            font-weight: 650;
            letter-spacing: 0.01em;
        }

        .conversation-line {
            margin-bottom: 18px;
            display: flex;
        }

        .speaker-name {
            font-weight: 900;
            color: #FFFFFF;
            background-color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 6px;
            margin-right: 12px;
            white-space: nowrap;
            height: fit-content;
            font-size: 13px;
            border: 2px solid var(--border-strong);
            box-shadow: 2px 2px 0px var(--border-strong);
        }
        
        .speaker-text {
            flex: 1;
        }

        /* 原文高亮及选项标示 (僅在解説模式下生效) */
        .mode-practice .highlight-correct,
        .mode-practice .highlight-wrong {
            background-color: transparent;
            color: inherit;
            padding: 0;
            font-weight: inherit;
            border: none;
        }
        
        .mode-practice .opt-tag {
            display: none !important;
        }

        .mode-explanation .highlight-correct {
            background-color: var(--color-correct-bg);
            color: var(--color-correct-text);
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 900;
            border: 2px solid var(--color-correct-text);
        }

        .mode-explanation .highlight-wrong {
            background-color: var(--color-wrong-bg);
            color: var(--color-wrong-text);
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 900;
            border: 2px dashed var(--color-wrong-text);
        }

        /* 选项序号标示样式 */
        .mode-explanation .opt-tag {
            display: inline-block;
            font-size: 12px;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 6px;
            margin-right: 6px;
            vertical-align: middle;
            border: 2px solid var(--border-strong);
        }
        
        .mode-explanation .tag-wrong {
            background-color: var(--color-wrong-text);
            color: white;
        }
        
        .mode-explanation .tag-correct {
            background-color: var(--color-correct-text);
            color: white;
        }

        /* 翻译文字统一样式 */
        .translation {
            color: #667085;
            font-size: 14px;
            line-height: 1.8;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 2px dashed var(--border-strong);
            opacity: 0.94;
            display: none;
            font-weight: 600;
        }

        /* 选项列表 */
        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .options-list li {
            padding: 16px 20px 16px 52px;
            border-radius: 12px;
            border: 3px solid var(--border-strong);
            background: #FFFFFF;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-solid-sm);
        }

        .option-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .option-text {
            font-size: 16px;
            font-weight: 800;
            color: var(--text-main);
        }

        /* 確認（決定）ボタン */
        .inline-confirm-btn {
            margin-left: 15px;
            padding: 8px 24px;
            background-color: var(--idol-gold);
            color: #FFFFFF;
            border: 3px solid var(--border-strong);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 2px 2px 0 var(--border-strong);
            animation: bounceIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
            text-transform: uppercase;
        }

        .inline-confirm-btn:hover {
            background-color: #D97706;
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0 var(--border-strong);
        }

        .inline-confirm-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 var(--border-strong);
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.8) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .options-num {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 26px;
            height: 26px;
            background: #F5F5F5;
            color: var(--text-main);
            border: 2px solid var(--border-strong);
            border-radius: 6px;
            text-align: center;
            line-height: 22px;
            font-size: 14px;
            font-weight: 900;
        }

        /* 解説モード時のホバー */
        .mode-explanation .options-list li:hover {
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-solid-hover);
            border-color: var(--accent-color);
            background: var(--color-g1-bg);
        }

        /* 正解の選択肢強調 */
        .mode-explanation .correct-answer .options-num {
            background: var(--border-strong);
            color: var(--color-correct-bg);
            border-color: var(--border-strong);
        }

        .mode-explanation .correct-answer {
            background-color: var(--color-correct-bg);
            border-color: var(--border-strong);
            box-shadow: var(--shadow-solid-sm);
        }

        /* Practice Mode Results (判定結果のポップなスタンプ風) */
        .mode-practice .options-list li.judged-correct { 
            background-color: var(--color-correct-bg) !important; 
            border-color: var(--border-strong) !important; 
            color: var(--border-strong) !important;
            transform: translateY(2px);
            box-shadow: var(--shadow-solid-sm) !important;
        }
        .mode-practice .options-list li.judged-correct .options-num {
            background: #FFF; color: var(--color-correct-text); border-color: var(--border-strong);
        }
        .mode-practice .options-list li.judged-correct::after { 
            content: "✨ PERFECT" !important; 
            color: var(--color-correct-text) !important; 
            background: #FFF;
            padding: 4px 10px;
            border-radius: 99px;
            border: 2px solid var(--border-strong);
            position: absolute; 
            right: 16px; 
            font-weight: 900; 
            font-size: 12px;
            transform: rotate(5deg);
            box-shadow: 2px 2px 0px var(--border-strong);
        }

        .mode-practice .options-list li.judged-wrong { 
            background-color: var(--color-wrong-bg) !important; 
            border-color: var(--border-strong) !important; 
            color: var(--border-strong) !important;
            transform: translateY(2px);
            box-shadow: var(--shadow-solid-sm) !important;
        }
        .mode-practice .options-list li.judged-wrong .options-num {
            background: #FFF; color: var(--color-wrong-text); border-color: var(--border-strong);
        }
        .mode-practice .options-list li.judged-wrong::after { 
            content: "💦 MISS" !important; 
            color: var(--color-wrong-text) !important; 
            background: #FFF;
            padding: 4px 10px;
            border-radius: 99px;
            border: 2px solid var(--border-strong);
            position: absolute; 
            right: 16px; 
            font-weight: 900; 
            font-size: 12px;
            transform: rotate(-5deg);
            box-shadow: 2px 2px 0px var(--border-strong);
        }

        /* 关键词样式 */
        .keyword {
            color: var(--accent-color);
            border-bottom: 2px solid var(--border-strong);
            cursor: pointer;
            font-weight: 900;
            padding: 0 4px;
            transition: all 0.2s;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 4px 4px 0 0;
        }

        .keyword:hover {
            background-color: var(--accent-color);
            color: #FFF;
        }

        /* ツールチップ (ポップな吹き出し) */
        .custom-tooltip { 
            position: absolute; 
            background-color: var(--border-strong); 
            color: #FFFFFF; 
            padding: 12px 16px; 
            border-radius: 8px; 
            font-size: 14px; 
            font-weight: 700;
            box-shadow: var(--shadow-solid); 
            border: 2px solid var(--accent-color);
            pointer-events: none; 
            z-index: 1000; 
            display: none; 
            max-width: 280px; 
            line-height: 1.6; 
            --arrow-left: 50%; 
        }
        .custom-tooltip::after { 
            content: ""; 
            position: absolute; 
            top: 100%; 
            left: var(--arrow-left); 
            margin-left: -8px; 
            border-width: 8px; 
            border-style: solid; 
            border-color: var(--accent-color) transparent transparent transparent; 
        }

        /* ================= 底部音频播放器覆盖样式 ================= */
        .audio-wrapper {
            background-color: rgba(244, 246, 248, 0.96) !important;
            backdrop-filter: blur(10px) !important;
            -webkit-backdrop-filter: blur(10px) !important;
            border-top: 4px solid var(--border-strong) !important;
            box-shadow: 0 -8px 24px rgba(17, 24, 39, 0.08) !important;
            padding-top: 16px !important;
            padding-bottom: max(16px, env(safe-area-inset-bottom)) !important;
            z-index: 90 !important;
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            width: 100% !important;
        }
        
        .custom-audio-player {
            max-width: 900px !important;
            margin: 0 auto !important;
            gap: 24px !important;
            padding: 0 24px !important;
            display: flex !important;
            align-items: center !important;
        }

        .now-playing-box {
            display: flex !important;
            align-items: center !important;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 0 !important;
            gap: 16px !important;
            flex: 1 !important;
            min-width: 0 !important;
        }

        .track-icon {
            background: var(--accent-color) !important;
            border: 3px solid var(--border-strong) !important;
            border-radius: 12px !important;
            flex-shrink: 0 !important;
            width: 48px !important;
            height: 48px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            box-shadow: var(--shadow-sm) !important;
        }
        
        .track-icon svg {
            fill: #FFF !important;
            width: 24px !important;
            height: 24px !important;
        }
        
        .now-playing-content {
            flex: 1 !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 8px !important;
            min-width: 0 !important;
        }

        .track-header-row {
            display: flex !important;
            justify-content: space-between !important;
            align-items: flex-end !important;
            gap: 12px !important;
        }

        .track-info { 
            margin: 0 !important; 
            padding: 0 !important;
            flex: 1 !important;
            min-width: 0 !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
            white-space: nowrap !important;
        }

        .track-title { 
            font-weight: 900 !important; 
            font-size: 15px !important;
            color: var(--text-main) !important;
            letter-spacing: 0.05em !important;
        }

        .time-group { 
            display: flex !important;
            justify-content: flex-end !important;
            font-size: 12px !important; 
            font-weight: 900 !important; 
            color: var(--text-sub) !important;
            flex-shrink: 0 !important;
            font-variant-numeric: tabular-nums !important;
        }

        .track-subtitle {
            font-size: 12px !important;
            color: var(--text-sub) !important;
            line-height: 1.4 !important;
        }

        .progress-area {
            margin: 0 !important;
            width: 100% !important;
        }

        .progress-container {
            border: 2px solid var(--border-strong) !important;
            border-radius: 999px !important;
            height: 8px !important;
            background: #FFF !important;
            width: 100% !important;
            overflow: hidden !important;
            cursor: pointer !important;
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.05) !important;
        }

        .progress-bar {
            background: var(--accent-color) !important;
            border: none !important;
            border-right: 2px solid var(--border-strong) !important;
            border-radius: 0 !important;
            height: 100% !important;
        }

        /* 播放控制按钮 */
        .player-controls {
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
        }

        .ctrl-btn {
            border: 2px solid var(--border-strong) !important;
            box-shadow: var(--shadow-sm) !important;
            border-radius: 12px !important;
            background: #FFF !important;
            color: var(--border-strong) !important;
            width: 40px !important;
            height: 40px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            transition: var(--transition) !important;
        }

        .ctrl-btn svg {
            width: 20px !important;
            height: 20px !important;
        }

            transform: translate(2px, 2px) !important;

            width: 52px !important;
            height: 52px !important;
            border-width: 3px !important;
            border-radius: 16px !important;

            height: 26px !important;

        .speed-btn {

            font-weight: 900 !important;
            width: auto !important;
            padding: 0 12px !important;

        }

        /* --- 响应式手机端专属排版 --- */
        @media (max-width: 768px) {
            .practice-container { width: 95%; padding: 24px; border-width: 3px; border-radius: 12px; }

            .question-box { font-size: 15px; line-height: 1.72; padding: 30px 15px 14px; }
            .question-box::before { top: 8px; left: 14px; font-size: 11px; padding: 2px 8px; }

            .options-list li { padding: 12px 16px 12px 46px; border-width: 2px; }

            .mode-switch button { font-size: 12px; padding: 6px 12px; border-radius: 8px; }
            .mark-btn { font-size: 20px; padding: 4px 8px; border-width: 2px;}
            
            .player-controls { width: 100%; justify-content: space-between; padding: 0 5px; margin-top: 5px; gap: 0; }
            #loopBtn { order: 1; } #prevBtn { order: 2; } #rewindBtn { order: 3; } #playBtn { order: 4; } #forwardBtn { order: 5; } #nextBtn { order: 6; } #speedBtn { order: 7; }
            .play-btn { width: 32px; height: 32px; } .nav-btn, .skip-btn { width: 24px; height: 24px; } .loop-btn { width: 22px; height: 22px; } .speed-btn { font-size: 13px; width: 40px; padding: 0; }

        @media (max-width: 720px) {

        @media (max-width: 520px) {
            header { padding: 8px 10px !important; }
            .back-btn { padding: 4px 8px !important; font-size: 11px !important; }
            header h1, #yearLabel { font-size: 13px !important; }
        }

<body>

    <header>
        <a href="../index.html" class="back-btn" id="backButton">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            戻る
        </a>
        <h1 id="yearLabel">課題理解 (N1)</h1>
        <div style="width: 80px;"></div>
    </header>

        <div class="practice-container mode-practice" id="appContainer">
        
        <div class="card-header">
            <div class="header-top">
                <div class="header-left">
                    <select id="questionSelect" class="question-select" onchange="changeQuestion(this.value)"></select>
                </div>
                <div class="header-right">
                    <button type="button" id="markBtn" class="mark-btn" onclick="toggleMark()" title="マークする (标记/收藏)">🎤</button>
                </div>
            </div>
            <div class="mode-switch">
                <button id="btnPractice" class="active" onclick="setMode('practice')">本番演習</button>
                <button id="btnExplanation" onclick="setMode('explanation')">解説</button>
            </div>
        </div>

        <div class="content-wrapper">
            <div class="right-panel" id="rightPanel">
                
                <!-- 听力原文与翻译区块 (练习模式下隐藏) -->
                <div class="transcript-section" id="transcriptBlock">
                    <!-- 问题区块 -->
                    <div class="question-box">
                        <div id="questionText"></div>
                        <div class="translation" id="questionTrans"></div>
                    </div>
                    
                    <!-- 对话区块 -->
                    <div class="conversation-box" id="conversationText">
                        <!-- 由JS填充对话内容 -->
                    </div>
                </div>

                <!-- 选项列表 (练习模式下保持可见) -->
                <ul class="options-list" id="optionsList"></ul>
            </div>
        </div>
    </div>

    <!-- 底部音频播放器 -->
    <div class="audio-wrapper">
        <div class="custom-audio-player">
            <!-- 中间信息栏：曲目、进度 -->
            <div class="now-playing-box">
                <div class="track-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="#FFF"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                </div>
                <div class="now-playing-content">
                    <div class="track-header-row">
                        <div class="track-info">
                            <div class="track-title" id="trackTitle">問題 1</div>
                            <div class="track-subtitle" id="trackSubtitle" style="display:none;"></div>
                        </div>
                        <div class="time-group">
                            <span class="time-display time-current" id="timeCurrent">0:00</span>
                            <span class="time-display time-divider"> / </span>
                            <span class="time-display time-duration desktop-time" id="timeDurationDesktop">0:00</span>
                            <span class="time-display time-duration mobile-time" id="timeDurationMobile" style="display: none;">-0:00</span>
                        </div>
                    </div>
                    <div class="progress-area">
                        <div class="progress-container" id="progressContainer">
                            <div class="progress-bar" id="progressBar"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 控制组：包含翻页、快退、播放、快进、循环、倍速 -->
            <div class="player-controls">
                <button id="prevBtn" class="ctrl-btn nav-btn" onclick="prevQuestion()" title="前へ">
                    <svg viewBox="0 0 24 24"><path d="M3 6h2v12H3zM13 6v12L5 12zM21 6v12L13 12z"/></svg>
                </button>
                <!-- 退回 6 秒 -->
                <button id="rewindBtn" class="ctrl-btn skip-btn" title="6秒戻る">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><text x="12" y="16.5" font-size="8.5" font-weight="900" font-family="sans-serif" stroke-width="0" fill="currentColor" text-anchor="middle">6</text></svg>
                </button>
                <button class="ctrl-btn play-btn" id="playBtn">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <!-- 快进 6 秒 -->
                <button id="forwardBtn" class="ctrl-btn skip-btn" title="6秒進む">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><text x="12" y="16.5" font-size="8.5" font-weight="900" font-family="sans-serif" stroke-width="0" fill="currentColor" text-anchor="middle">6</text></svg>
                </button>
                <button id="nextBtn" class="ctrl-btn nav-btn" onclick="nextQuestion()" title="次へ">
                    <svg viewBox="0 0 24 24"><path d="M3 6v12L11 12zM11 6v12L19 12zM19 6h2v12H19z"/></svg>
                </button>
                <button id="loopBtn" class="ctrl-btn loop-btn" title="ループ再生">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
                </button>
                <!-- 倍速ボタン -->
                <button id="speedBtn" class="ctrl-btn speed-btn" title="再生速度">1.0x</button>
            </div>
            
            <audio id="audioElement" preload="metadata"></audio>
        </div>
    </div>

    <div id="wordTooltip" class="custom-tooltip"></div>

    <script src="../../../shared/audio-player-theme.js"></script>

    <script>
        // --- Data Structure (针对课题理解的数据结构) ---
        const examData = {
            "N1-2019-07": {
                label: "2019年7月 (N1)",
                questions: [
                    {
                        id: 1,
                        audio: "../assets/audio/2019.7-1.mp3", // 请替换为实际的 N1 2019-07 第一题音频路径
                        script: {
                            question: "一番：花屋で、女の人と店員が話しています。女の人は、これから何をしますか。",
                            questionTrans: "（第一题：在花店，女人和店员正在交谈。女人接下来要做什么？）",
                            dialogue: [
                                { speaker: "女", text: "あのう、すみません。この赤い花をつけてる植物、先日こちらで同じのを購入したんですけど、花がつかなくなってしまって。", trans: "（那个，不好意思。这种开红花的植物，我之前在这边买了一盆，可是现在不开花了。）" },
                                { speaker: "店員", text: "そうですか。これは夏まではずっと花を楽しめるんですけどね。", trans: "（是这样吗？这种植物通常在夏天之前都会一直开花的。）" },
                                { speaker: "女", text: "<span class=\"highlight-wrong\"><span class=\"opt-tag tag-wrong\">①</span><span class=\"explain-wrong\" onclick=\"showTooltip(event, '关于换大花盆，女人表示【已经试着换到大一圈的花盆里了（植え替えてみたんですけど）】，这是已经做过的事情，排除。')\">一回り大きいはちに<span class=\"keyword\" onclick=\"showTooltip(event, '植（う）え替（か）える：移栽，换盆。')\">植え替えて</span>みたんですけど。</span></span>", trans: "（我试着换到了一个稍大一点的花盆里，但……）" },
                                { speaker: "店員", text: "植え替えはおすすめしてるんですが、花を咲かせるのには、<span class=\"keyword\" onclick=\"showTooltip(event, 'ひりょう（肥料）：肥料。')\">ひりょう</span>もたっぷり与えないといけないんです。", trans: "（这种情况换一个花盆是可以的，但如果想让它开花，还需要给它施足肥料。）" },
                                { speaker: "女", text: "ああ、買ってからまだ一度もやってないです。どんなのがいいかわからなくて。", trans: "（啊，我买回来之后还一次都没施过肥。因为不知道该用什么样的肥料。）" },
                                { speaker: "店員", text: "花にもよりますが、液体タイプは水やりで流れてしまって、<span class=\"keyword\" onclick=\"showTooltip(event, '効（き）き目（め）：效力，效果。')\">効き目</span>が長続きしない場合もありますよ。<span class=\"highlight-correct\"><span class=\"opt-tag tag-correct\">② 🎯 正解キー</span><span class=\"keyword\" onclick=\"showTooltip(event, '粒状（つぶじょう）：颗粒状。')\">粒状</span>のもののほうが、少しずつ溶けだして、ゆっくり効くので、おすすめです。試してみてください。</span>", trans: "（这要看花的种类，但一般来说液体类的肥料有时会随着浇水而流失，效果不持久。我推荐使用颗粒状的肥料，它会慢慢溶解，持续发挥作用。您可以试试看。）" },
                                { speaker: "女", text: "<span class=\"highlight-correct\"><span class=\"opt-tag tag-correct\">② 🎯 正解キー</span>はい。</span><span class=\"highlight-wrong\"><span class=\"opt-tag tag-wrong\">③</span>水はたっぷりやったほうがいいんですか。</span>", trans: "（好的。那浇水要浇得很足吗？）" },
                                { speaker: "店員", text: "<span class=\"highlight-wrong\"><span class=\"opt-tag tag-wrong\">③</span><span class=\"explain-wrong\" onclick=\"showTooltip(event, '店员表示【等土壤表面干了再浇水就可以了（土の表面が乾いたらやる程度でいい）】，不需要浇得很足（たっぷり），排除。')\">水は土の表面が乾いたらやる程度でいいですよ。</span></span>あと、日当たりのいい場所に置いてくださいね。", trans: "（浇水的话，等土壤表面干了再浇就可以了。另外，请放在阳光充足的地方。）" },
                                { speaker: "女", text: "<span class=\"highlight-wrong\"><span class=\"opt-tag tag-wrong\">④</span><span class=\"explain-wrong\" onclick=\"showTooltip(event, '关于放置场所，女人表示【我把它摆放在阳台光照充足的位置上了（明るいところに置いてます）】，店员也说没问题，所以不需要改变位置，排除。')\">はい。ベランダの明るいところに置いてます。</span></span>", trans: "（好的，我把它摆放在阳台阳光照射充足的位置上了。）" },
                                { speaker: "店員", text: "だったら、それは大丈夫ですね。", trans: "（那就没问题了。）" },
                                { speaker: "女", text: "はい。ありがとうございました。", trans: "（好的，谢谢你啊！）" }
                            ]
                        },
                        options: [
                            { text: "植物を大きいはちに植え替える", translation: "（把植物移栽到大花盆里）", correct: false },
                            { text: "植物にひりょうを与える", translation: "（给植物施肥）", correct: true },
                            { text: "植物に水をたっぷり与える", translation: "（给植物浇充足的水）", correct: false },
                            { text: "植物を置く場所を変える", translation: "（改变植物放置的位置）", correct: false }
                        ]
                    },
                    {
                        id: 2,
                        audio: "../assets/audio/2019.7-2.mp3", // 请替换为实际的 N1 2019-07 第二题音频路径
                        script: {
                            question: "二番：会社で、女の人と男の人が話しています。男の人は、この後すぐ、何をしなければなりませんか。",
                            questionTrans: "（第二题：在公司，女人和男人在交谈。男人这之后马上必须做什么？）",
                            dialogue: [
                                { speaker: "女", text: "田中さん、きのうお願いしたキャビネットの整理のことなんですけど。", trans: "（田中，关于昨天拜托你整理文件柜的事，进行的怎么样了……）" },
                                { speaker: "男", text: "あっ。<span class=\"highlight-wrong\"><span class=\"opt-tag tag-wrong\">①</span>中にあった書類はきのう確認して、保管の期限を過ぎているものを<span class=\"keyword\" onclick=\"showTooltip(event, '処分（しょぶん）：处理，销毁。')\">処分</span>しました。</span>ご報告が遅れてすみません。<span class=\"keyword\" onclick=\"showTooltip(event, '判断（はんだん）に迷（まよ）う：难以判断，犹豫不决。')\">判断に迷う</span>ものが少しあったので、それは処分しないで残しておきました。", trans: "（啊。昨天我已经确认了里面的文件，并把超过保存期限的处理掉了。现在才向您汇报真是不好意思。有些不太确定的文件我没有处理，暂时留着了。）" },
                                { speaker: "女", text: "そう。わかりました。じゃあ、それ、<span class=\"highlight-correct\"><span class=\"opt-tag tag-correct\">② 🎯 正解キー</span>この後確認するから、持ってきてもらえますか。</span>", trans: "（是吗？我知道了，那等会儿我确认一下，你能把那些文件拿过来吗？）" },
                                { speaker: "男", text: "<span class=\"highlight-correct\"><span class=\"opt-tag tag-correct\">② 🎯 正解キー</span>はい。</span>", trans: "（好的。）" },
                                { speaker: "女", text: "そういえば、古いノートパソコンがあったでしょう。どうしましたか。", trans: "（对了，里面是不是还有一台旧笔记本电脑？那个处理了吗？）" },
                                { speaker: "男", text: "あっ。それお聞きしたかったんです。パソコンの処分って、決まったやりかたがあるんですよね。<span class=\"highlight-wrong\"><span class=\"opt-tag tag-wrong\">③</span><span class=\"explain-wrong\" onclick=\"showTooltip(event, '男方只是询问有没有手册（マニュアルって、あるんですか），女方直接让他去问总务科，并没有让他看手册，排除。')\">マニュアルって、あるんですか。</span></span>", trans: "（啊，正想请教您呢。处理电脑是有固定流程的吧？有相关的手册吗？）" },
                                { speaker: "女", text: "うーん。パソコンの処分は総務課が担当だから、連絡して教えてもらってください。<span class=\"highlight-wrong\"><span class=\"opt-tag tag-wrong\">④</span><span class=\"explain-wrong\" onclick=\"showTooltip(event, '关于联系总务科，女方说总务科今天很忙，让他改天再联系（別の日にでも），而不是马上做，排除。')\">総務課は、今日は海外からの視察団の対応で<span class=\"keyword\" onclick=\"showTooltip(event, 'てんてこまい：忙得团团转，忙得不可开交。')\">てんてこまい</span>だろうから、別の日にでも。</span></span>", trans: "（嗯，电脑的处理是总务科负责的，你联系他们问一下吧。不过今天总务科应该忙得不可开交，因为要接待来自海外的参观团，改天再联系吧。）" },
                                { speaker: "男", text: "わかりました。ありがとうございます。", trans: "（明白了，谢谢您！）" }
                            ]
                        },
                        options: [
                            { text: "古い書類を処分する", translation: "（处理旧文件）", correct: false },
                            { text: "かくにんが必要な書類を持ってくる", translation: "（拿来需要确认的文件）", correct: true },
                            { text: "パソコンの処分のマニュアルを見る", translation: "（看处理电脑的手册）", correct: false },
                            { text: "総務課に連絡する", translation: "（联系总务科）", correct: false }
                        ]
                    },
                    {
                        id: 3,
                        audio: "../assets/audio/2019.7-3.mp3", // 请替换为实际的 N1 2019-07 第三题音频路径
                        script: {
                            question: "三番：大学で、女の学生と男の学生が話しています。男の学生は大学祭の準備として、あした、まず何をしなければなりませんか。",
                            questionTrans: "（第三题：在大学里，女学生和男学生在交谈。男学生作为大学学园祭的准备，明天首先必须做什么？）",
                            dialogue: [
                                { speaker: "女", text: "あっ、木村君。探してたの。", trans: "（啊，木村，我正找你呢。）" },
                                { speaker: "男", text: "あ、どうしたの。", trans: "（啊，怎么了？）" },
                                { speaker: "女", text: "あした、サークルのミーティングで、大学祭でやること、話し合うよね。<span class=\"highlight-correct\"><span class=\"opt-tag tag-correct\">① 🎯 正解キー</span>私が<span class=\"keyword\" onclick=\"showTooltip(event, '司会（しかい）：主持，司仪。')\">司会</span>をすることになってたんだけど。どうしても大学に来られなくなっちゃって。木村君、代わってもらえない？</span>", trans: "（明天社团的会议不是要讨论大学祭的活动安排嘛。本来是我主持的，但我明天实在没法去学校了。能不能请你代替我主持？）" },
                                { speaker: "男", text: "<span class=\"highlight-correct\"><span class=\"opt-tag tag-correct\">① 🎯 正解キー</span>ああ。いいよ。</span>", trans: "（啊，好的，没问题。）" },

                                { speaker: "女", text: "ええとね、オンラインの社内ネットワーク上に会議記録っていう共有フォルダーがあるんだけど、そこに保存しておけば、各自が<span class=\"keyword\" onclick=\"showTooltip(event, '加筆修正（かひつしゅうせい）：修改补充。')\">加筆修正</span>するから。<span class=\"highlight-wrong\"><span class=\"opt-tag tag-wrong\">② ③</span><span class=\"explain-wrong\" onclick=\"showTooltip(event, '关于打印，前辈明确表示为了削减经费【已经不再使用纸质传阅了，所以不需要打印（印刷はなしで）】，排除选项2和3。')\">今年度から経費削減で紙媒体では<span class=\"keyword\" onclick=\"showTooltip(event, '回覧（かいらん）：传阅。')\">回覧</span>しなくなったんだ。だから、印刷はなしで。</span></span>", trans: "（嗯，是这样的。公司内部网络上有一个叫“会议记录”的共享文件夹，你把它保存到那里，每个人会自行修改补充的。从本年度开始为了节约经费，我们已经不再使用纸质传阅了。所以，不需要打印。）" },
                                { speaker: "男", text: "はい。あのう、部長にもそれで内容を確認してもらえるんですか。", trans: "（好的。那部长也会用这种方式确认内容吗？）" },
                                { speaker: "女", text: "うん。あっ、そうだ、<span class=\"highlight-correct\"><span class=\"opt-tag tag-correct\">④ 🎯 正解キー</span>前回の会議から、メールに<span class=\"keyword\" onclick=\"showTooltip(event, '添付（てんぷ）：附加，附件。')\">添付</span>して発言者全員に送ることになったんだった。</span>共有フォルダーにアップしてもみんななかなか見てくれないから。", trans: "（对。不过对了，从上次会议开始，规定是把会议记录作为附件通过邮件发送给所有发言者。因为即使上传到共享文件夹，大家也不太会去看。）" },
                                { speaker: "男", text: "<span class=\"highlight-correct\"><span class=\"opt-tag tag-correct\">④ 🎯 正解キー</span>そうなんですか。</span>", trans: "（原来是这样啊。）" },
                                { speaker: "女", text: "それで、加筆修正して返信してもらって、それを反映させたものを完成版として共有フォルダーに入れるの。ちょっと<span class=\"keyword\" onclick=\"showTooltip(event, '手間（てま）がかかる：费工夫，费事。')\">手間がかかる</span>けどね。<span class=\"highlight-wrong\"><span class=\"opt-tag tag-wrong\">①</span><span class=\"explain-wrong\" onclick=\"showTooltip(event, '关于保存在共享文件夹，前辈提醒【为了不引起混乱，未完成的版本不要保存在共享文件夹里（未完成のものは共有フォルダーに保存しとかないでね）】，排除。')\">あ、混乱しないように、未完成のものは共有フォルダーに保存しとかないでね。</span></span>あっ、部長は完成したものを見るから。", trans: "（然后，大家会在邮件中修改并回复给你，你再把修改后的版本做成最终版，上传到共享文件夹里。虽然有点麻烦，但这流程。哦，对了，为了不引起混乱，未完成的版本不要保存在共享文件夹里。另外，部长是看最终完成版的。）" },
                                { speaker: "男", text: "わかりました。", trans: "（我明白了。）" }
                            ]
                        },
                        options: [
                            { text: "オンラインの共有フォルダーに保存する", translation: "（保存到线上共享文件夹）", correct: false },
                            { text: "印刷して、出席者に回覧する", translation: "（打印并传阅给出席者）", correct: false },
                            { text: "印刷して、部長に提出する", translation: "（打印并提交给部长）", correct: false },
                            { text: "発言者にメールで送付する", translation: "（通过邮件发送给发言者）", correct: true }
                        ]
                    }
                ]
            }
        };

        let currentExamKey = "N1-2019-07"; // 修复默认加载的 key
        let currentQuestionIndex = 0;
        let preferredMode = 'practice'; 
        const LISTENING_TYPE = 'task-comprehension';
        const LISTENING_LEVEL = 'n1';

        const listeningRewardHooks = window.StudyQuestListeningRewards && window.StudyQuestListeningRewards.create({
            type: LISTENING_TYPE,
            level: LISTENING_LEVEL,
            getExamKey: () => currentExamKey,
            getCurrentQuestionIndex: () => currentQuestionIndex,
            getQuestions: () => (examData[currentExamKey] && examData[currentExamKey].questions) || [],
            buildIndexUrl: () => '../index.html',
            buildRetryUrl: (examKey) => {
                const params = new URLSearchParams();
                if (examKey) params.set('year', examKey);
                return params.toString() ? `${window.location.pathname}?${params.toString()}` : window.location.pathname;
            }
        });

        // --- Initialization ---
        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const yearParam = urlParams.get('year');
            const modeParam = urlParams.get('mode');
            
            const targetKey = yearParam ? `N1-${yearParam}` : currentExamKey;

            if (examData[targetKey]) {
                currentExamKey = targetKey;
                window.ListeningProgress.setLastPractice(LISTENING_TYPE, LISTENING_LEVEL, currentExamKey);

                if (modeParam === 'review') {
                    const marks = getMarks();
                    if (marks.length === 0) {
                        alert('チェックされた問題はありません。(No marked questions)');
                    } else {
                        const originalQuestions = examData[currentExamKey].questions;
                        const filtered = originalQuestions.filter(q => marks.includes(q.id));
                        if (filtered.length > 0) {
                            examData[currentExamKey].questions = filtered;
                            setTimeout(() => {
                                const lbl = document.getElementById('yearLabel');
                                if(lbl) lbl.innerHTML += ' <span style="background:var(--idol-gold); color:var(--text-main); font-size:12px; margin-left:8px; padding:2px 8px; border-radius:6px; border:2px solid var(--border-strong); box-shadow:2px 2px 0 var(--border-strong);">✨ アンコール</span>';
                            }, 100);
                        } else {
                            alert('チェックされた問題が見つかりませんでした。');
                        }
                    }
                }
            } else if (!examData[currentExamKey]) {
                currentExamKey = Object.keys(examData)[0];
            }

            const yearLabel = document.getElementById('yearLabel');
            if (yearLabel && modeParam !== 'review') {
                yearLabel.textContent = examData[currentExamKey].label;
            }

            updateQuestionSelect();
            window.setupListeningPlayer({
                subtitle: document.title.replace(/\s*\((N1|N2|N3)\)\s*$/, ''),
                skipSeconds: 10
            });
            if (listeningRewardHooks) listeningRewardHooks.startRun();
            renderQuestion();
        }

        // --- Mark Logic ---
        function getMarks() {
            return window.ListeningProgress.getMistakeIds(LISTENING_TYPE, LISTENING_LEVEL, currentExamKey);
        }

        function saveMarks(marks) {
            window.ListeningProgress.setMistakeIds(LISTENING_TYPE, LISTENING_LEVEL, currentExamKey, marks);
        }

        function toggleMark() {
            if (!examData[currentExamKey] || !examData[currentExamKey].questions[currentQuestionIndex]) return;

            const marks = getMarks();
            const qId = examData[currentExamKey].questions[currentQuestionIndex].id;
            const index = marks.indexOf(qId);

            if (index === -1) {
                marks.push(qId);
                saveMarks(marks);
                updateMarkUI();
                return;
            }

            marks.splice(index, 1);
            saveMarks(marks);

            updateMarkUI();
        }

        function updateMarkUI() {
            if (!examData[currentExamKey] || !examData[currentExamKey].questions[currentQuestionIndex]) return;
            const marks = getMarks();
            const qId = examData[currentExamKey].questions[currentQuestionIndex].id;
            const btn = document.getElementById('markBtn');
            if (marks.includes(qId)) btn.classList.add('active');
            else btn.classList.remove('active');
        }

        function updateQuestionSelect() {
            const select = document.getElementById('questionSelect');
            select.innerHTML = '';
            
            const questions = examData[currentExamKey].questions;
            questions.forEach((q, index) => {
                const option = document.createElement('option');
                option.value = index; 
                option.textContent = `問題 ${q.id}`;
                select.appendChild(option);
            });
        }

        function changeQuestion(index) {
            currentQuestionIndex = parseInt(index);
            renderQuestion();
        }

        // --- Answer Selection ---
        function selectOption(element) {
            const container = document.getElementById('appContainer');
            if (!container.classList.contains('mode-practice')) return;
            if (element.parentElement.querySelector('.judged-correct') || element.parentElement.querySelector('.judged-wrong')) return;

            const siblings = element.parentElement.children;
            for (let i = 0; i < siblings.length; i++) {
                siblings[i].classList.remove('selected');
                const btn = siblings[i].querySelector('.inline-confirm-btn');
                if (btn) btn.remove();
            }

            element.classList.add('selected');
            
            const btn = document.createElement('button');
            btn.id = 'inlineConfirmBtn';
            btn.className = 'inline-confirm-btn';
            btn.textContent = '決定';
            btn.onclick = (e) => {
                e.stopPropagation();
                checkAnswer();
            };
            element.appendChild(btn);
        }

        function checkAnswer() {
            const container = document.getElementById('appContainer');
            const selected = container.querySelector('.options-list li.selected');
            if (!selected) return;

            const currentMode = new URLSearchParams(window.location.search).get('mode');
            const isChallengeMode = currentMode === 'challenge' && window.__LISTENING_RANDOM_EXAM__ === true;
            const index = parseInt(selected.getAttribute('data-index'));
            const question = examData[currentExamKey].questions[currentQuestionIndex];
            const options = container.querySelectorAll('.options-list li');

            const isCorrect = question.options[index].correct;
            if (listeningRewardHooks) listeningRewardHooks.handleAnswer(isCorrect);

            if (isChallengeMode) {
                if (!isCorrect) {
                    const marks = getMarks();
                    if (!marks.includes(question.id)) {
                        marks.push(question.id);
                        saveMarks(marks);
                        updateMarkUI();
                    }
                }

                const confirmBtn = document.getElementById('inlineConfirmBtn');
                if (confirmBtn) confirmBtn.remove();

                container.dataset.sqChallengeAnswered = '1';
                container.classList.remove('judged');
                options.forEach((opt) => {
                    opt.style.pointerEvents = 'none';
                });
                return;
            }

            container.classList.add('judged');

            if (isCorrect) {
                selected.classList.add('judged-correct');
            } else {
                selected.classList.add('judged-wrong');
                question.options.forEach((opt, i) => {
                    if (opt.correct) options[i].classList.add('judged-correct');
                });

                const marks = getMarks();
                if (!marks.includes(question.id)) {
                    marks.push(question.id);
                    saveMarks(marks);
                    updateMarkUI();
                }
            }

            const confirmBtn = document.getElementById('inlineConfirmBtn');
            if (confirmBtn) confirmBtn.remove();

            setTimeout(() => {
                setMode('explanation', false);
            }, 1000);
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                setMode(preferredMode, false);
                renderQuestion();
            }
        }

        function nextQuestion() {
            const questions = examData[currentExamKey].questions;
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                setMode(preferredMode, false);
                renderQuestion();
            }
        }

        // --- Render Content ---
        function renderQuestion() {
            const container = document.getElementById('appContainer');
            if (container) container.classList.remove('judged');

            const data = examData[currentExamKey].questions[currentQuestionIndex];
            const total = examData[currentExamKey].questions.length;

            updateMarkUI();
            document.getElementById('questionSelect').value = currentQuestionIndex;
            window.updateListeningPlayer({
                title: `問題 ${data.id}`,
                audioSrc: data.audio,
                hasPrev: currentQuestionIndex > 0,
                hasNext: currentQuestionIndex < total - 1
            });

            // Transcript Update (分割问题与对话内容)
            document.getElementById('questionText').innerHTML = data.script.question;
            document.getElementById('questionTrans').innerHTML = data.script.questionTrans;

            const conversationHtml = data.script.dialogue.map(line => `
                <div class="conversation-line">
                    <span class="speaker-name">${line.speaker}</span>
                    <div class="speaker-text">
                        <div>${line.text}</div>
                        <div class="translation">${line.trans}</div>
                    </div>
                </div>
            `).join('');
            document.getElementById('conversationText').innerHTML = conversationHtml;

            // Options Update
            const optionsList = document.getElementById('optionsList');
            optionsList.innerHTML = '';
            data.options.forEach((opt, idx) => {
                const li = document.createElement('li');
                if (opt.correct) li.classList.add('correct-answer');
                li.setAttribute('data-index', idx);
                li.onclick = () => selectOption(li);

                li.innerHTML = `
                    <span class="options-num">${idx + 1}</span>
                    <div class="option-content">
                        <div class="option-text">${opt.text}</div>
                        <div class="translation">${opt.translation}</div>
                    </div>
                `;
                optionsList.appendChild(li);
            });

            if (listeningRewardHooks) listeningRewardHooks.onQuestionRendered();
        }

        // --- Mode Switching ---
        function setMode(mode, updatePreference = true) {
            if (updatePreference) preferredMode = mode;

            const container = document.getElementById('appContainer');
            const btnPractice = document.getElementById('btnPractice');
            const btnExplanation = document.getElementById('btnExplanation');
            const tooltip = document.getElementById('wordTooltip');

            const confirmBtn = document.getElementById('inlineConfirmBtn');
            if (confirmBtn) confirmBtn.remove();
            tooltip.style.display = 'none';

            if (mode === 'practice') {
                container.classList.remove('mode-explanation');
                container.classList.add('mode-practice');
                btnPractice.classList.add('active');
                btnExplanation.classList.remove('active');
            } else {
                container.classList.remove('mode-practice');
                container.classList.add('mode-explanation');
                btnExplanation.classList.add('active');
                btnPractice.classList.remove('active');

                // 滚动至顶部以查看听力原文
                setTimeout(() => {
                    const transcriptSection = document.getElementById('transcriptBlock');
                    const anchorTarget = transcriptSection || document.querySelector('.content-wrapper');
                    if (anchorTarget) {
                        const headerOffset = window.innerWidth <= 768 ? 112 : 132;
                        const elementPosition = anchorTarget.getBoundingClientRect().top;
                        const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                        window.scrollTo({ top: offsetPosition, behavior: "smooth" });
                    }
                }, 100);
            }
        }

        // --- Tooltip Logic ---
        function showTooltip(event, text) {
            event.stopPropagation();
            const tooltip = document.getElementById('wordTooltip');
            tooltip.innerText = text;
            tooltip.style.display = 'block';
            
            const targetRect = event.target.getBoundingClientRect();
            setTimeout(() => {
                const width = tooltip.offsetWidth, height = tooltip.offsetHeight;
                const top = targetRect.top + window.scrollY - height - 10; 
                let left = targetRect.left + window.scrollX + (targetRect.width / 2) - (width / 2);
                if (left < 10) left = 10;
                if (left + width > window.innerWidth - 10) left = window.innerWidth - width - 10;
                
                const targetCenterX = targetRect.left + window.scrollX + (targetRect.width / 2);
                tooltip.style.setProperty('--arrow-left', `${targetCenterX - left}px`);
                tooltip.style.top = `${top}px`; tooltip.style.left = `${left}px`;
            }, 0);
        }

        document.addEventListener('click', () => {
            const tooltip = document.getElementById('wordTooltip');
            if (tooltip.style.display === 'block') tooltip.style.display = 'none';
        });

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
