<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>概要理解 - N3</title>
    <style>
        :root { --bg-color:#fdfaf5; --paper-color:#ffffff; --text-color:#2c2c2c; --sub-color:#777; --accent-color:#b33e3e; --shadow:0 4px 12px rgba(0,0,0,0.05); }
        body { margin:0; min-height:100vh; font-family:"Hiragino Sans","Meiryo","Microsoft YaHei",sans-serif; background:var(--bg-color); color:var(--text-color); }
        header { width:100%; padding:18px 20px; box-sizing:border-box; display:flex; align-items:center; justify-content:center; position:sticky; top:0; z-index:100; background-color:rgba(253,250,245,0.95); backdrop-filter:blur(8px); border-bottom:1px solid rgba(0,0,0,0.05); }
        .back-btn { position:absolute; left:20px; text-decoration:none; color:var(--text-color); font-size:15px; font-weight:600; min-height:34px; display:inline-flex; align-items:center; opacity:0.72; }
        .wrap { max-width:720px; margin:48px auto; padding:0 20px; }
        .panel { background:var(--paper-color); border-radius:18px; padding:36px; box-shadow:var(--shadow); border:1px solid rgba(0,0,0,0.04); }
        h1 { margin:0; font-size:19px; }
        h2 { margin:0 0 12px; color:var(--accent-color); }
        p { margin:0 0 10px; color:var(--sub-color); line-height:1.8; }
        code { background:#f6f2ea; padding:2px 6px; border-radius:6px; }
    </style>
    <link rel="stylesheet" href="../../../../shared/site-fonts.css">
</head>
<body>
    <header>
        <a href="../index.html" class="back-btn">← 戻る</a>
        <h1>概要理解 / N3</h1>
    </header>
    <div class="wrap">
        <div class="panel">
            <h2>内容整理中</h2>
            <p>这个级别的目录骨架已经预建完成，后续年份页可以直接放入 <code>years/</code>。</p>
            <p>音频和图片资源目录也已准备好：<code>assets/audio/</code>、<code>assets/images/</code>。</p>
        </div>
    </div>
</body>
</html>
