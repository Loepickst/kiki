<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>概要理解 - 等级选择</title>
    <style>
        :root { --bg-color:#fdfaf5; --text-color:#2c2c2c; --accent-color:#b33e3e; --card-bg:#ffffff; --shadow:0 4px 12px rgba(0,0,0,0.05); }
        body { font-family:"Hiragino Sans","Meiryo","Microsoft YaHei",sans-serif; background:var(--bg-color); color:var(--text-color); margin:0; min-height:100vh; }
        header { width:100%; padding:18px 20px; box-sizing:border-box; display:flex; align-items:center; justify-content:center; position:sticky; top:0; z-index:100; background-color:rgba(253,250,245,0.95); backdrop-filter:blur(8px); border-bottom:1px solid rgba(0,0,0,0.05); margin-bottom:34px; }
        .back-btn { position:absolute; left:20px; text-decoration:none; color:var(--text-color); font-size:15px; font-weight:600; min-height:34px; display:inline-flex; align-items:center; opacity:0.72; }
        .container { max-width:800px; margin:0 auto; padding:0 20px 40px; }
        .intro { text-align:center; color:#777; font-size:13px; margin-bottom:22px; }
        .level-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:18px; }
        .level-card { background:var(--card-bg); border-radius:16px; padding:28px; box-shadow:var(--shadow); border:2px solid transparent; opacity:0.65; cursor:not-allowed; text-decoration:none; color:var(--text-color); display:flex; align-items:center; justify-content:space-between; }
        .level-info h2 { margin:0 0 6px; color:var(--accent-color); font-size:24px; }
        .level-info p { margin:0; font-size:13px; color:#888; }
    </style>
    <link rel="stylesheet" href="../../../shared/site-fonts.css">
</head>
<body>
    <header>
        <a href="../index.html" class="back-btn">← 戻る</a>
        <h1>概要理解</h1>
    </header>
    <div class="container">
        <p class="intro">把握整段话的主旨或说话人的意图。 当前目录骨架已建立，内容仍在整理中。</p>
        <div class="level-grid">
            <a href="#" class="level-card" onclick="return false;"><div class="level-info"><h2>N1</h2><p>整理中</p></div><div>🗻</div></a>
            <a href="#" class="level-card" onclick="return false;"><div class="level-info"><h2>N2</h2><p>整理中</p></div><div>⛩️</div></a>
            <a href="#" class="level-card" onclick="return false;"><div class="level-info"><h2>N3</h2><p>整理中</p></div><div>🍱</div></a>
        </div>
    </div>
</body>
</html>
