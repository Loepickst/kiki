<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポイント理解 - 聴解練習 2020年12月</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #ffffff;
      --graphite: #333333;
      --graphite-sub: #666666;
      --graphite-faint: #cccccc;
      --red-pencil: #e64a4a;
      --red-pencil-light: rgba(230, 74, 74, 0.08);
      --marker-yellow: rgba(255, 213, 79, 0.35);
      --marker-blue: rgba(129, 212, 250, 0.25);
      --marker-pink: rgba(244, 143, 177, 0.25);
      --marker-green: rgba(129, 199, 132, 0.25);
      --hatching-graphite: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(51, 51, 51, 0.04) 3px, rgba(51, 51, 51, 0.04) 4px);
      --transition: all 0.2s ease-out;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Noto Serif JP', 'Noto Sans JP', 'Noto Sans SC', serif;
      background: var(--paper);
      color: var(--graphite);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.02'/%3E%3C/svg%3E");
      z-index: -1;
      pointer-events: none;
    }

    header {
      width: 100%;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(4px);
      border-bottom: 2px solid var(--graphite);
      border-bottom-left-radius: 50% 2px;
      border-bottom-right-radius: 50% 3px;
    }

    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.1em;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .back-btn {
      text-decoration: none;
      color: var(--graphite);
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      z-index: 2;
    }

    .back-btn:hover { background: var(--marker-yellow); }

    .practice-container {
      margin-top: 40px;
      margin-bottom: 140px;
      max-width: 840px;
      width: 92%;
      padding: 20px 40px;
      flex: 1;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 16px;
      border-bottom: 1.5px dashed var(--graphite-faint);
      gap: 20px;
      flex-wrap: nowrap;
    }

    .header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }

    .question-select {
      padding: 4px 28px 4px 4px;
      font-size: 16px;
      border: none;
      border-bottom: 1.5px solid var(--graphite);
      background: transparent;
      color: var(--graphite);
      outline: none;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .mark-btn {
      font-size: 22px;
      width: 34px;
      height: 34px;
      background: #fff;
      border: 1.5px solid var(--graphite-faint);
      border-radius: 10px;
      cursor: pointer;
      color: var(--graphite-faint);
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .mark-btn:hover,
    .mark-btn.active { color: var(--graphite); border-color: var(--graphite); background: var(--marker-yellow); }

    .mode-switch {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      margin-left: auto;
    }

    .mode-switch button {
      border: none;
      background: transparent;
      color: var(--graphite-sub);
      padding: 4px 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
      position: relative;
      font-family: inherit;
      white-space: nowrap;
    }

    .mode-switch button.active { color: var(--graphite); z-index: 1; }

    .mode-switch button.active::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--marker-yellow);
      border-radius: 2px 8px 2px 6px / 6px 2px 8px 2px;
      z-index: -1;
      transform: rotate(-1deg);
    }

    .right-panel { width: 100%; }

    .mode-practice .transcript-section,
    .mode-practice .translation { display: none !important; }

    .mode-explanation .translation { display: block; }

    .transcript-section {
      margin-bottom: 40px;
      border: 1.5px solid var(--graphite);
      border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px;
      padding-bottom: 20px;
    }

    .question-box {
      background: var(--marker-blue);
      padding: 34px 22px 16px;
      border-bottom: 1.5px dashed var(--graphite);
      font-weight: 700;
      font-size: 16px;
      line-height: 1.8;
      position: relative;
    }

    .question-box::before {
      content: '問題';
      position: absolute;
      top: 8px;
      left: 18px;
      background: var(--paper);
      color: var(--graphite);
      font-weight: 900;
      padding: 2px 10px;
      border-radius: 50% 10% 50% 10% / 10% 50% 10% 50%;
      border: 1.5px solid var(--graphite);
      font-size: 12px;
      letter-spacing: 0.1em;
      font-family: sans-serif;
    }

    .question-image-area {
      display: none;
      margin: 16px 0 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.92);
      border: 1.5px dashed rgba(51, 51, 51, 0.18);
      border-radius: 10px;
      text-align: center;
    }

    .question-image-area img { display: block; width: auto; max-width: 100%; max-height: 320px; margin: 0 auto; object-fit: contain; border-radius: 8px; }

    .conversation-box {
      padding: 28px 22px 4px;
      font-size: 16px;
      line-height: 1.8;
      font-weight: 500;
    }

    .conversation-line { margin-bottom: 18px; display: flex; }

    .speaker-name {
      font-weight: 900;
      background: var(--marker-yellow);
      padding: 2px 8px;
      border-radius: 2px 6px 3px 5px / 5px 3px 6px 2px;
      margin-right: 12px;
      white-space: nowrap;
      height: fit-content;
      font-size: 13px;
      border: 1.5px solid var(--graphite);
    }

    .speaker-text { flex: 1; min-width: 0; }

    .options-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .options-list li {
      padding: 14px 16px 14px 50px;
      background: #fff;
      border: 1.5px solid var(--graphite-faint);
      border-radius: 3px 255px 4px 25px / 255px 5px 225px 4px;
      transition: var(--transition);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 2px 4px 10px rgba(0,0,0,0.02);
    }

    .options-num {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      text-align: center;
      line-height: 22px;
      font-size: 14px;
      font-family: sans-serif;
      font-weight: bold;
      border: 1.5px solid var(--graphite);
      border-radius: 50% 45% 55% 40% / 45% 55% 40% 50%;
      background: #fff;
      z-index: 2;
    }

    .mode-practice .options-list li { cursor: pointer; }
    .mode-practice .options-list li:hover { background: var(--hatching-graphite); border-color: var(--marker-blue); }
    .mode-practice .options-list li.selected { background: var(--marker-blue); border-color: var(--graphite); }
    .mode-practice .options-list li.selected .options-num { background: var(--graphite); color: var(--paper); }

    .inline-confirm-btn {
      margin-left: 16px;
      padding: 6px 20px;
      background: var(--graphite);
      color: var(--paper);
      border: none;
      border-radius: 3px 8px 4px 6px / 6px 4px 8px 3px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.05em;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
    }

    .mode-practice .options-list li.judged-correct,
    .mode-practice .options-list li.judged-wrong { padding-right: 80px; }

    .mode-practice .options-list li.judged-correct {
      background: var(--marker-green) !important;
      border-color: var(--graphite) !important;
      border-radius: 4px;
    }

    .mode-practice .options-list li.judged-correct .options-num { border-color: var(--red-pencil); color: var(--red-pencil); background: #fff; }

    .mode-practice .options-list li.judged-correct::before {
      content: '';
      position: absolute;
      left: 2px;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border: 2px solid var(--red-pencil);
      border-radius: 40% 60% 50% 45% / 50% 45% 60% 40%;
      pointer-events: none;
      opacity: 0.8;
    }

    .mode-practice .options-list li.judged-correct::after {
      content: "正解";
      color: var(--red-pencil);
      font-weight: 900;
      font-size: 14px;
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
    }

    .mode-practice .options-list li.judged-wrong {
      background: var(--red-pencil-light) !important;
      border: 1.5px dashed var(--graphite-faint) !important;
      opacity: 0.8;
      border-radius: 4px;
    }

    .mode-practice .options-list li.judged-wrong::before {
      content: '✕';
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--red-pencil);
      font-size: 28px;
      font-family: sans-serif;
      opacity: 0.7;
      z-index: 1;
    }

    .mode-explanation .correct-answer { background: var(--marker-green); border-color: var(--graphite); border-radius: 4px; }
    .mode-explanation .correct-answer .options-num { background: var(--red-pencil); color: var(--paper); border-color: var(--red-pencil); }

    .option-content { flex: 1; display: flex; flex-direction: column; min-width: 0; word-break: break-word; }
    .option-text { font-size: 16px; font-weight: 700; line-height: 1.6; }

    .translation {
      color: var(--graphite-sub);
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 13px;
      line-height: 1.6;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1.5px dashed var(--graphite-faint);
      display: none;
    }

    .keyword {
      color: var(--graphite);
      background: linear-gradient(transparent 50%, rgba(255, 213, 79, 0.5) 50%);
      border-bottom: 1.5px dashed rgba(51, 51, 51, 0.3);
      padding: 0 2px;
      cursor: pointer;
      font-weight: 700;
      display: inline-block;
    }

    .keyword:hover { background: rgba(255, 213, 79, 0.35); border-bottom-style: solid; }

    .mode-practice .highlight-correct,
    .mode-practice .highlight-wrong { background: transparent; color: inherit; padding: 0; font-weight: inherit; border: none; }

    .mode-practice .opt-tag { display: none !important; }

    .mode-explanation .highlight-correct,
    .mode-explanation .highlight-wrong { background: transparent; color: var(--graphite); padding: 0 2px; font-weight: 700; }
    .mode-explanation .explain-wrong { cursor: pointer; border-bottom: 2.5px solid rgba(244, 143, 177, 0.8); display: inline; padding-bottom: 1px; }
    .mode-explanation .explain-correct { cursor: pointer; border-bottom: 2.5px solid rgba(129, 199, 132, 0.8); display: inline; padding-bottom: 1px; }
    .mode-explanation .explain-wrong:hover { border-bottom-color: rgba(230, 74, 74, 0.8); background: rgba(244, 143, 177, 0.15); }
    .mode-explanation .explain-correct:hover { border-bottom-color: rgba(76, 175, 80, 0.8); background: rgba(129, 199, 132, 0.15); }

    .mode-explanation .opt-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 900;
      width: 18px;
      height: 18px;
      line-height: 16px;
      text-align: center;
      border-radius: 50% 45% 55% 40% / 45% 55% 40% 50%;
      margin-right: 6px;
      vertical-align: middle;
      border: 1.5px solid var(--graphite);
      background: #fff;
      font-family: sans-serif;
    }

    .mode-explanation .tag-wrong { background: var(--marker-pink); }
    .mode-explanation .tag-correct { background: var(--marker-green); }

    .custom-tooltip {
      position: absolute;
      background: #fffde7;
      color: var(--graphite);
      padding: 12px 16px;
      border: 1px solid rgba(0,0,0,0.1);
      box-shadow: 2px 4px 10px rgba(0,0,0,0.06);
      font-size: 13px;
      font-weight: 400;
      font-family: 'Noto Sans SC', sans-serif;
      pointer-events: none;
      z-index: 1000;
      display: none;
      max-width: 280px;
      line-height: 1.6;
      --arrow-left: 50%;
    }

    .custom-tooltip::after {
      content: "";
      position: absolute;
      top: 100%;
      left: var(--arrow-left);
      margin-left: -6px;
      border-width: 6px;
      border-style: solid;
      border-color: #fffde7 transparent transparent transparent;
    }

    .audio-wrapper {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(4px);
      border-top: 1.5px solid var(--graphite);
      padding: 16px 0 max(16px, env(safe-area-inset-bottom));
      z-index: 90;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
    }

    .custom-audio-player {
      max-width: 800px;
      margin: 0 auto;
      gap: 24px;
      padding: 0 24px;
      display: flex;
      align-items: center;
    }

    .now-playing-box { display: flex; align-items: center; gap: 16px; flex: 1; min-width: 0; }

    .track-icon {
      background: var(--marker-yellow);
      border: 1.5px solid var(--graphite);
      border-radius: 2px 8px 3px 6px / 6px 3px 8px 2px;
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .track-icon svg { fill: var(--graphite); width: 22px; height: 22px; }
    .now-playing-content { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 0; }
    .track-header-row { display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; }
    .track-title { font-weight: 700; font-size: 14px; letter-spacing: 0.1em; }
    .time-group { display: flex; font-size: 12px; color: var(--graphite-sub); flex-shrink: 0; font-family: 'Courier New', Courier, monospace; }
    .progress-container { border: 1.5px solid var(--graphite); border-radius: 4px; height: 8px; background: transparent; width: 100%; overflow: hidden; cursor: pointer; }
    .progress-bar { background: var(--marker-blue); border-right: 1.5px solid var(--graphite); height: 100%; width: 0%; }
    .player-controls { display: flex; align-items: center; gap: 8px; }

    .ctrl-btn {
      border: 1.5px solid transparent;
      background: transparent;
      color: var(--graphite);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      cursor: pointer;
      border-radius: 40% 60% 50% 45% / 50% 45% 60% 40%;
    }

    .ctrl-btn:hover { border-color: var(--graphite); background: var(--marker-yellow); }
    .ctrl-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .ctrl-btn svg { width: 20px; height: 20px; }
    .play-btn { border-color: var(--graphite); background: #fff; width: 48px; height: 48px; border-radius: 50% 45% 55% 40% / 45% 55% 40% 50%; }
    .play-btn:hover { background: var(--marker-pink); }
    .play-btn svg { fill: var(--graphite); width: 24px; height: 24px; }
    .speed-btn { font-size: 13px; font-weight: 700; width: auto; padding: 0 8px; font-family: 'Courier New', Courier, monospace; }

    @media (max-width: 768px) {
      .practice-container { width: 100%; margin-top: 10px; padding: 16px; margin-bottom: 150px; }
      .card-header { margin-bottom: 24px; padding-bottom: 12px; gap: 10px; }
      .question-select { font-size: 14px; }
      .mark-btn { width: 30px; height: 30px; font-size: 18px; }
      .mode-switch { gap: 6px; }
      .mode-switch button { font-size: 12px; padding: 4px 6px; letter-spacing: 0; }
      .question-box { font-size: 14px; padding: 30px 16px 14px; }
      .conversation-box { font-size: 14px; padding: 20px 16px 4px; }
      .translation { font-size: 12px; }
      .options-list li { padding: 12px 14px 12px 42px; }
      .options-num { left: 10px; width: 22px; height: 22px; line-height: 18px; font-size: 12px; }
      .option-text { font-size: 14px; }
      .custom-audio-player { padding: 0 16px; gap: 10px; flex-wrap: wrap; }
      .now-playing-box { width: 100%; flex: none; }
      .player-controls { width: 100%; justify-content: space-between; gap: 0; }
      #loopBtn { order: 1 !important; } #prevBtn { order: 2 !important; } #rewindBtn { order: 3 !important; }
      #playBtn { order: 4 !important; } #forwardBtn { order: 5 !important; } #nextBtn { order: 6 !important; } #speedBtn { order: 7 !important; }
    }

    @media (max-width: 520px) {
      header { padding: 8px 10px; }
      .back-btn { padding: 4px 8px; font-size: 12px; }
      header h1 { font-size: 14px; }
      .practice-container { padding: 12px; }
      .mode-switch button { font-size: 11px; padding: 4px 5px; }
      .option-text, .conversation-box, .question-box { font-size: 13px; }
      .custom-audio-player { padding: 0 10px; }
      .ctrl-btn { width: 30px; height: 30px; }
      .play-btn { width: 38px; height: 38px; }
    }
  </style>
</head>
<body>
  <header>
    <a href="../index.html" class="back-btn" id="backButton">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"></path></svg>
      戻る
    </a>
    <h1 id="yearLabel">ポイント理解</h1>
    <div style="width: 60px;"></div>
  </header>

  <div class="practice-container mode-practice" id="appContainer">
    <div class="card-header">
      <div class="header-left">
        <select id="questionSelect" class="question-select"></select>
        <button type="button" id="markBtn" class="mark-btn" title="付箋を貼る" aria-label="付箋を貼る">🐶</button>
      </div>
      <div class="mode-switch">
        <button type="button" id="btnPractice" class="active">✎ 演習ノート</button>
        <button type="button" id="btnExplanation">✔ 赤ペン解説</button>
      </div>
    </div>

    <div class="content-wrapper">
      <div class="right-panel" id="rightPanel">
        <div class="transcript-section" id="transcriptBlock">
          <div class="question-box">
            <div id="questionText"></div>
            <div class="translation" id="questionTrans"></div>
          </div>
          <div class="conversation-box" id="conversationText"></div>
        </div>

        <div class="question-image-area" id="questionImageArea" aria-live="polite">
          <img id="questionImage" alt="">
        </div>

        <ul class="options-list" id="optionsList"></ul>
      </div>
    </div>
  </div>

  <div class="audio-wrapper">
    <div class="custom-audio-player">
      <div class="now-playing-box">
        <div class="track-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"></path></svg>
        </div>
        <div class="now-playing-content">
          <div class="track-header-row">
            <div class="track-title" id="trackTitle">問題 1</div>
            <div class="time-group"><span id="timeCurrent">0:00</span><span style="margin:0 4px;">/</span><span id="timeDuration">0:00</span></div>
          </div>
          <div class="progress-container" id="progressContainer"><div class="progress-bar" id="progressBar"></div></div>
        </div>
      </div>
      <div class="player-controls">
        <button type="button" id="prevBtn" class="ctrl-btn" title="前へ"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 6h2v12H3zM13 6v12L5 12zM21 6v12L13 12z"></path></svg></button>
        <button type="button" id="rewindBtn" class="ctrl-btn" title="10秒戻る"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><text x="12" y="16.5" font-size="8.5" font-weight="900" font-family="sans-serif" stroke-width="0" fill="currentColor" text-anchor="middle">10</text></svg></button>

    'use strict';

    function escapeAttr(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function tipSpan(className, text, tip) {
      return '<span class="' + className + '" data-tip="' + escapeAttr(tip) + '">' + text + '</span>';
    }

    function keyword(text, tip) {
      return tipSpan('keyword', escapeHtml(text), tip);
    }

    function optTag(num, correct) {
      return '<span class="opt-tag ' + (correct ? 'tag-correct' : 'tag-wrong') + '">' + num + '</span>';
    }

    function explainText(correct, html, tip) {
      return '<span class="' + (correct ? 'explain-correct' : 'explain-wrong') + '" data-tip="' + escapeAttr(tip) + '">' + html + '</span>';
    }

    function highlight(correct, tagNumber, html, tip) {
      return '<span class="' + (correct ? 'highlight-correct' : 'highlight-wrong') + '">' + optTag(tagNumber, correct) + explainText(correct, html, tip) + '</span>';
    }

    function textSegment(value) {
      return escapeHtml(value);
    }

    function keywordSegment(value, tip) {
      return keyword(value, tip);
    }

    function highlightSegment(correct, tagNumber, segments, tip) {
      return highlight(correct, tagNumber, (segments || []).join(''), tip);
    }

    function line(speaker, segments, trans) {
      return {
        speaker: speaker,
        text: (segments || []).join(''),
        trans: trans
      };
    }

                    keywordSegment("類を見ない", "類を見ない：少见、罕见、没有同类。用于强调独特性。"),
                    textSegment("ですね。")
                  ], "评论家明确说，歌词里散布的词语用法非常巧妙，几乎没有同类。这说明最主要原因是歌词的语言运用巧妙，对应选项3。")
                ], "（这个嘛。旋律好当然也是一方面，但最重要的还是，歌词里那些词语的用法非常巧妙，可以说很少见。）"),
                line("女", [
                  textSegment("なるほど。")
                ], "（原来如此。）"),
                line("男", [
                  textSegment("今の若い世代のミュージシャンは小さい頃からライブやテレビなどでさまざまな音楽に"),
                  keywordSegment("触れて", "触れる（ふれる）：接触、接触到。常用于接触文化、信息、作品、机会等。"),
                  textSegment("育ってきているんですよね。その分、音楽の知識が豊富で演奏技術も昔よりはるかに高くなっていると思います。ライブの演出なんかも自分で"),
                  keywordSegment("手がける", "手がける：亲自做、负责处理。常用于制作、设计、项目、作品等。"),
                  textSegment("人もいますしね。")
                ], "（现在年轻一代的音乐人，从小就通过现场演出、电视等接触各种各样的音乐。所以他们的音乐知识很丰富，演奏技术也比过去高得多。也有人会自己负责现场演出的设计。）"),
                line("女", [
                  textSegment("ええ。")
                ], "（是的。）"),
                line("男", [
                  textSegment("でも、一方で、最近はこう言っちゃなんですが、どこかで聴いたことがあるような"),
                  keywordSegment("ありきたり", "ありきたり：常见的、老一套的、没有新意的。常用于表达、内容、做法等。"),
                  textSegment("の曲も増えたように思うんです。その点、このバンドは"),
                  highlightSegment(false, 4, [
                    textSegment("演奏こそまだまだ"),
                    keywordSegment("荒っぽくて", "荒っぽい（あらっぽい）：粗糙的、粗暴的、不够细致的。可用于动作、做法、表现等。"),
                    textSegment("磨きようがありますが、")
                  ], "关于选项4，评论家说这个乐队的演奏还比较粗糙，还有打磨空间，所以不是因为演奏技术高而受欢迎，排除。"),
                  textSegment("自分たちの世界観を歌詞で表現していますよね。それが同世代のこころに響いているのではないでしょうか。")
                ], "（不过另一方面，最近这样说可能不太好，但我觉得那种好像在哪里听过的普通歌曲也变多了。相比之下，这个乐队的演奏虽然还比较粗糙，还有打磨空间，但他们用歌词表达出了自己的世界观。这一点大概打动了同龄人的心吧。）")
              ]
            },
            options: [
              { text: "ライブの演出が素晴らしいこと", translation: "（现场演出很精彩）", correct: false },
              { text: "曲のメロディーが優れていること", translation: "（曲子的旋律很优秀）", correct: false },
              { text: "歌詞の言葉づかいがたくみなこと", translation: "（歌词的语言运用很巧妙）", correct: true },
              { text: "えんそうの技術が高いこと", translation: "（演奏技术很高）", correct: false }
            ]
          }
        ]
      }
    };

    var currentExamKey = "N1-2012-07";
    var currentQuestionIndex = 0;
    var preferredMode = 'practice';
    var storageKeyPrefix = 'listening-marks-';
    var LISTENING_TYPE = 'point-comprehension';
    var LISTENING_LEVEL = 'n1';
    var audioReady = false;

    function byId(id) {
      return document.getElementById(id);
    }

    function getQuestions() {
      return examData[currentExamKey].questions;
    }

    function normalizeMarks(marks) {
      var normalized = [];
      if (!Array.isArray(marks)) return normalized;
      marks.forEach(function(mark) {
        var id = parseInt(mark, 10);
        if (isFinite(id) && id > 0 && normalized.indexOf(id) === -1) normalized.push(id);
      });
      return normalized;
    }

    function getLegacyMarks() {
      try {
        var parsed = JSON.parse(localStorage.getItem(storageKeyPrefix + currentExamKey) || '[]');
        return normalizeMarks(parsed);
      } catch (error) {
        return [];
      }
    }

    function clearLegacyMarks() {
      try {
        localStorage.removeItem(storageKeyPrefix + currentExamKey);
      } catch (error) {}
    }

    function getMarks() {
      if (window.ListeningProgress && typeof window.ListeningProgress.getMistakeIds === 'function') {
        var sharedMarks = normalizeMarks(window.ListeningProgress.getMistakeIds(LISTENING_TYPE, LISTENING_LEVEL, currentExamKey));
        if (sharedMarks.length > 0) return sharedMarks;

        var legacyMarks = getLegacyMarks();
        if (legacyMarks.length > 0 && typeof window.ListeningProgress.setMistakeIds === 'function') {
          window.ListeningProgress.setMistakeIds(LISTENING_TYPE, LISTENING_LEVEL, currentExamKey, legacyMarks);
          clearLegacyMarks();
          return legacyMarks;
        }
        return [];
      }
      return getLegacyMarks();
    }

    function saveMarks(marks) {
      var normalized = normalizeMarks(marks);
      if (window.ListeningProgress && typeof window.ListeningProgress.setMistakeIds === 'function') {
        window.ListeningProgress.setMistakeIds(LISTENING_TYPE, LISTENING_LEVEL, currentExamKey, normalized);
        clearLegacyMarks();
      }
    }

    function toggleMark() {
      var qId = getQuestions()[currentQuestionIndex].id;
      var marks = getMarks();
      var index = marks.indexOf(qId);
      if (index === -1) marks.push(qId);
      else marks.splice(index, 1);
      saveMarks(marks);
      updateMarkUI();
    }

    function updateMarkUI() {
      var markBtn = byId('markBtn');
      if (!markBtn) return;
      var qId = getQuestions()[currentQuestionIndex].id;
      markBtn.classList.toggle('active', getMarks().indexOf(qId) !== -1);
    }

    function updateQuestionSelect() {
      var select = byId('questionSelect');
      var questions = getQuestions();
      select.innerHTML = '';
      questions.forEach(function(q, index) {
        var option = document.createElement('option');
        option.value = String(index);
        option.textContent = '問題 ' + q.id;
        select.appendChild(option);
      });
    }

    function changeQuestion(index) {
      var nextIndex = parseInt(index, 10);
      if (isNaN(nextIndex) || nextIndex < 0 || nextIndex >= getQuestions().length) return;
      currentQuestionIndex = nextIndex;
      setMode(preferredMode, false);
      renderQuestion();
    }

    function renderQuestion() {
      var container = byId('appContainer');
      var data = getQuestions()[currentQuestionIndex];
      var total = getQuestions().length;
      container.classList.remove('judged');
      updateMarkUI();
      byId('questionSelect').value = String(currentQuestionIndex);
      byId('trackTitle').textContent = '問題 ' + data.id;
      updateAudio(data.audio);
      byId('prevBtn').disabled = currentQuestionIndex === 0;
      byId('nextBtn').disabled = currentQuestionIndex === total - 1;
      byId('questionText').textContent = data.script.question;
      byId('questionTrans').textContent = data.script.questionTrans;
      renderImage(data);
      renderConversation(data.script.dialogue);
      renderOptions(data.options);
    }

    function renderImage(data) {
      var imageArea = byId('questionImageArea');
      var image = byId('questionImage');
      if (data.image) {
        image.src = data.image;
        image.alt = examData[currentExamKey].label + ' 問題 ' + data.id + ' 题图';
        imageArea.style.display = 'block';
      } else {
        image.removeAttribute('src');
        image.alt = '';
        imageArea.style.display = 'none';
      }
    }

    function renderConversation(dialogue) {
      var box = byId('conversationText');
      box.innerHTML = '';
      dialogue.forEach(function(line) {
        var row = document.createElement('div');
        var speaker = document.createElement('span');
        var speakerText = document.createElement('div');
        var original = document.createElement('div');
        var trans = document.createElement('div');
        row.className = 'conversation-line';
        speaker.className = 'speaker-name';
        speaker.textContent = line.speaker;
        speakerText.className = 'speaker-text';
        original.innerHTML = line.text;
        trans.className = 'translation';
        trans.textContent = line.trans;
        speakerText.appendChild(original);
        speakerText.appendChild(trans);
        row.appendChild(speaker);
        row.appendChild(speakerText);
        box.appendChild(row);
      });
    }

    function renderOptions(options) {
      var list = byId('optionsList');
      list.innerHTML = '';
      options.forEach(function(opt, index) {
        var li = document.createElement('li');
        var num = document.createElement('span');
        var content = document.createElement('div');
        var text = document.createElement('div');
        var translation = document.createElement('div');
        li.dataset.index = String(index);
        if (opt.correct) li.classList.add('correct-answer');
        num.className = 'options-num';
        num.textContent = String(index + 1);
        content.className = 'option-content';
        text.className = 'option-text';
        text.textContent = opt.text;
        translation.className = 'translation';
        translation.textContent = opt.translation;
        content.appendChild(text);
        content.appendChild(translation);
        li.appendChild(num);
        li.appendChild(content);
        li.addEventListener('click', function() { selectOption(li); });
        list.appendChild(li);
      });
    }

    function selectOption(element) {
      var container = byId('appContainer');
      if (!container.classList.contains('mode-practice')) return;
      if (element.parentElement.querySelector('.judged-correct') || element.parentElement.querySelector('.judged-wrong')) return;
      Array.prototype.forEach.call(element.parentElement.children, function(li) {
        var oldBtn = li.querySelector('.inline-confirm-btn');
        li.classList.remove('selected');
        if (oldBtn) oldBtn.parentNode.removeChild(oldBtn);
      });
      element.classList.add('selected');
      var btn = document.createElement('button');
      btn.id = 'inlineConfirmBtn';
      btn.type = 'button';
      btn.className = 'inline-confirm-btn';
      btn.textContent = '確認';
      btn.addEventListener('click', function(event) {
        event.stopPropagation();
        checkAnswer();
      });
      element.appendChild(btn);
    }

    function checkAnswer() {
      var container = byId('appContainer');
      var selected = container.querySelector('.options-list li.selected');
      if (!selected) return;
      var selectedIndex = Number(selected.dataset.index);
      var question = getQuestions()[currentQuestionIndex];
      var optionNodes = container.querySelectorAll('.options-list li');
      var isCorrect = question.options[selectedIndex].correct;
      container.classList.add('judged');
      if (isCorrect) {
        selected.classList.add('judged-correct');
      } else {
        selected.classList.add('judged-wrong');
        question.options.forEach(function(opt, index) {
          if (opt.correct) optionNodes[index].classList.add('judged-correct');
        });
        var marks = getMarks();
        if (marks.indexOf(question.id) === -1) {
          marks.push(question.id);
          saveMarks(marks);
          updateMarkUI();
        }
      }
      removeInlineConfirmButton();
      window.setTimeout(function() { setMode('explanation', false); }, 900);
    }

    function removeInlineConfirmButton() {
      var btn = byId('inlineConfirmBtn');
      if (btn && btn.parentNode) btn.parentNode.removeChild(btn);
    }

    function prevQuestion() {
      if (currentQuestionIndex <= 0) return;
      currentQuestionIndex -= 1;
      setMode(preferredMode, false);
      renderQuestion();
    }

    function nextQuestion() {
      if (currentQuestionIndex >= getQuestions().length - 1) return;
      currentQuestionIndex += 1;
      setMode(preferredMode, false);
      renderQuestion();
    }

    function setMode(mode, updatePreference) {
      if (updatePreference !== false) preferredMode = mode;
      var container = byId('appContainer');
      var btnPractice = byId('btnPractice');
      var btnExplanation = byId('btnExplanation');
      removeInlineConfirmButton();
      hideTooltip();
      if (mode === 'practice') {
        container.classList.remove('mode-explanation');
        container.classList.add('mode-practice');
        btnPractice.classList.add('active');
        btnExplanation.classList.remove('active');
      } else {
        container.classList.remove('mode-practice');
        container.classList.add('mode-explanation');
        btnExplanation.classList.add('active');
        btnPractice.classList.remove('active');
        window.setTimeout(function() {
          var target = byId('transcriptBlock');
          if (!target) return;
          var offset = window.innerWidth <= 768 ? 112 : 132;
          window.scrollTo({ top: target.getBoundingClientRect().top + window.pageYOffset - offset, behavior: 'smooth' });
        }, 100);
      }
    }

    function showTooltip(event, text) {
      if (event && event.stopPropagation) event.stopPropagation();
      var tooltip = byId('wordTooltip');
      var target = event ? event.target : null;
      if (!tooltip || !target || !target.getBoundingClientRect) return;
      tooltip.textContent = text;
      tooltip.style.display = 'block';
      var targetRect = target.getBoundingClientRect();
      window.setTimeout(function() {
        var width = tooltip.offsetWidth;
        var height = tooltip.offsetHeight;
        var top = targetRect.top + window.pageYOffset - height - 10;
        var left = targetRect.left + window.pageXOffset + targetRect.width / 2 - width / 2;
        var targetCenterX = targetRect.left + window.pageXOffset + targetRect.width / 2;
        if (left < 10) left = 10;
        if (left + width > window.innerWidth - 10) left = window.innerWidth - width - 10;
        tooltip.style.setProperty('--arrow-left', (targetCenterX - left) + 'px');
        tooltip.style.top = Math.max(10, top) + 'px';
        tooltip.style.left = left + 'px';
      }, 0);
    }

    function hideTooltip() {
      var tooltip = byId('wordTooltip');
      if (tooltip) tooltip.style.display = 'none';
    }

    function setupAudioPlayer() {
      if (audioReady) return;
      audioReady = true;
      var audio = byId('audioElement');
      var playBtn = byId('playBtn');
      var playIcon = byId('playIcon');
      var progressContainer = byId('progressContainer');
      var progressBar = byId('progressBar');
      var current = byId('timeCurrent');
      var duration = byId('timeDuration');
      var loopBtn = byId('loopBtn');
      var speedBtn = byId('speedBtn');
      var speeds = [0.8, 1.0, 1.25, 1.5];
      var speedIndex = 1;
      playBtn.addEventListener('click', function() {
        if (audio.paused) {
          var promise = audio.play();
          if (promise && promise.catch) promise.catch(function() {});
        } else {
          audio.pause();
        }
      });
      byId('rewindBtn').addEventListener('click', function() { audio.currentTime = Math.max(0, audio.currentTime - 10); });
      byId('forwardBtn').addEventListener('click', function() { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); });
      loopBtn.addEventListener('click', function() {
        audio.loop = !audio.loop;
        loopBtn.style.background = audio.loop ? 'var(--marker-yellow)' : 'transparent';
        loopBtn.style.borderColor = audio.loop ? 'var(--graphite)' : 'transparent';
      });
      speedBtn.addEventListener('click', function() {
        speedIndex = (speedIndex + 1) % speeds.length;
        audio.playbackRate = speeds[speedIndex];
        speedBtn.textContent = speeds[speedIndex].toFixed(2).replace(/\.00$/, '.0') + 'x';
      });
      audio.addEventListener('play', function() { playIcon.innerHTML = '<path d="M6 5h4v14H6zM14 5h4v14h-4z"></path>'; });
      audio.addEventListener('pause', function() { playIcon.innerHTML = '<path d="M8 5v14l11-7z"></path>'; });
      audio.addEventListener('loadedmetadata', function() { duration.textContent = formatTime(audio.duration); });
      audio.addEventListener('timeupdate', function() {
        current.textContent = formatTime(audio.currentTime);
        progressBar.style.width = audio.duration ? (audio.currentTime / audio.duration * 100) + '%' : '0%';
      });
      progressContainer.addEventListener('click', function(event) {
        if (!audio.duration) return;
        var rect = progressContainer.getBoundingClientRect();
        audio.currentTime = (event.clientX - rect.left) / rect.width * audio.duration;
      });
    }

    function updateAudio(src) {
      var audio = byId('audioElement');
      if (audio.getAttribute('src') !== src) {
        audio.src = src;
        audio.load();
      }
      byId('timeCurrent').textContent = '0:00';
      byId('timeDuration').textContent = '0:00';
      byId('progressBar').style.width = '0%';
    }

    function formatTime(seconds) {
      if (!isFinite(seconds)) return '0:00';
      var minutes = Math.floor(seconds / 60);
      var secs = String(Math.floor(seconds % 60));
      if (secs.length < 2) secs = '0' + secs;
      return minutes + ':' + secs;
    }

    function bindEvents() {
      byId('backButton').addEventListener('click', function(event) {
        event.preventDefault();
        if (document.referrer && window.history.length > 1) {
          history.back();
        } else {
          window.location.href = '../index.html';
        }
      });
      byId('questionSelect').addEventListener('change', function(event) { changeQuestion(event.target.value); });
      byId('markBtn').addEventListener('click', toggleMark);
      byId('btnPractice').addEventListener('click', function() { setMode('practice'); });
      byId('btnExplanation').addEventListener('click', function() { setMode('explanation'); });
      byId('prevBtn').addEventListener('click', prevQuestion);
      byId('nextBtn').addEventListener('click', nextQuestion);
      document.addEventListener('click', function(event) {
        var target = event.target;
        var tipTarget = null;
        if (target && target.closest) tipTarget = target.closest('[data-tip]');
        if (tipTarget) {
          showTooltip(event, tipTarget.getAttribute('data-tip'));
        } else {
          hideTooltip();
        }
      });
    }

    function runSelfTests() {
      var tests = [];
      function add(name, fn) { tests.push({ name: name, fn: fn }); }
      add('global functions are available for event handlers', function() {
        return typeof window.setMode === 'function' && typeof window.changeQuestion === 'function' && typeof window.toggleMark === 'function' && typeof window.prevQuestion === 'function' && typeof window.nextQuestion === 'function';
      });
      add('exam data has seven questions', function() { return examData['N1-2012-07'].questions.length === 7; });
      add('each question has exactly one correct answer', function() {
        return examData['N1-2012-07'].questions.every(function(q) {
          return q.options.filter(function(opt) { return opt.correct; }).length === 1;
        });
      });
      add('2012 July answer key matches source', function() {
        var expected = [2, 2, 2, 1, 4, 3, 3];
        return examData['N1-2012-07'].questions.every(function(q, index) {
          var correctIndex = q.options.findIndex(function(opt) { return opt.correct; }) + 1;
          return correctIndex === expected[index];
        });
      });
      add('2012 July question set matches source topics', function() {
        var expected = ['転職したい', 'ボランティア実習', 'マンション', 'テレビコマーシャル', '衝突事故', '写真教室', '寺の一番の見所'];
        return examData['N1-2012-07'].questions.every(function(q, index) {
          var fullText = q.script.question + ' ' + q.script.dialogue.map(function(line) {
            return line.text;
          }).join(' ');
          return fullText.indexOf(expected[index]) !== -1;
        });
      });
      add('rendered question select matches question count', function() {
        return byId('questionSelect').options.length === getQuestions().length;
      });
      add('tooltip spans are rendered without inline onclick quoting', function() {
        var nodes = document.querySelectorAll('[data-tip]');
        for (var i = 0; i < nodes.length; i += 1) {
          if (nodes[i].hasAttribute && nodes[i].hasAttribute('onclick')) return false;
        }
        return nodes.length > 0;
      });
      add('mode switching works', function() {
        setMode('explanation', false);
        var ok1 = byId('appContainer').classList.contains('mode-explanation');
        setMode('practice', false);
        var ok2 = byId('appContainer').classList.contains('mode-practice');
        return ok1 && ok2;
      });
      var failures = [];
      tests.forEach(function(test) {
        try {
          if (!test.fn()) failures.push(test.name);
        } catch (error) {
          failures.push(test.name);
        }
      });
      if (failures.length) console.error('Self tests failed:', failures);
      else console.info('Self tests passed: ' + tests.length);
    }

    function init() {
      var urlParams = new URLSearchParams(window.location.search);
      var yearParam = urlParams.get('year');
      var modeParam = urlParams.get('mode');
      var targetKey = yearParam ? 'N1-' + yearParam : currentExamKey;
      if (examData[targetKey]) currentExamKey = targetKey;
      else if (!examData[currentExamKey]) currentExamKey = Object.keys(examData)[0];
      if (window.ListeningProgress && typeof window.ListeningProgress.setLastPractice === 'function') {
        window.ListeningProgress.setLastPractice(LISTENING_TYPE, LISTENING_LEVEL, currentExamKey);
      }

      var yearLabel = byId('yearLabel');
      if (yearLabel) yearLabel.textContent = examData[currentExamKey].label;

      if (modeParam === 'review') {
        var marks = getMarks();
        if (marks.length === 0) {
          alert('付箋を貼った問題はありません。(No marked questions)');
        } else {
          var originalQuestions = examData[currentExamKey].questions;
          var filtered = originalQuestions.filter(function(question) {
            return marks.indexOf(question.id) !== -1;
          });
          if (filtered.length > 0) {
            examData[currentExamKey].questions = filtered;
            if (yearLabel) {
              yearLabel.innerHTML += ' <span style="background:var(--marker-yellow); color:var(--graphite); font-size:12px; margin-left:8px; padding:2px 8px; border-radius:2px 8px 2px 6px / 6px 2px 8px 2px; border:1.5px solid var(--graphite);">✔ 復習ノート</span>';
            }
          } else {
            alert('付箋を貼った問題が見つかりませんでした。');
          }
        }
      }
      bindEvents();
      updateQuestionSelect();
      setupAudioPlayer();
      renderQuestion();
      if (modeParam !== 'review') runSelfTests();
    }

    window.changeQuestion = changeQuestion;
    window.toggleMark = toggleMark;
    window.prevQuestion = prevQuestion;
    window.nextQuestion = nextQuestion;
    window.setMode = setMode;
    window.showTooltip = showTooltip;

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
  </script>
</body>
</html>
