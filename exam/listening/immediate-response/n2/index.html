<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時応答 - N2 ROCK STAGE</title>
    <!-- 引入全字重的中日文无衬线体及圆体，彻底解决中日混排时中文汉字粗细不一的问题 -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FAFAFF;        /* 极浅的冷蓝白底色 */
            --card-bg: #FFFFFF;         
            
            --text-main: #111827;       /* 极深的夜黑 */
            --text-sub: #4B5563;        
            
            --border-strong: #111827;   
            
            /* 🎸 吉他摇滚舞台专属配色 */
            --rock-blue: #2563EB;       /* 摇滚蓝 - 12月/核心 */
            --rock-cyan: #06B6D4;       /* 霓虹青 - 7月/错题区 */
            --rock-purple: #8B5CF6;     /* 朋克紫 - 特殊高亮 */
            --rock-yellow: #F59E0B;     /* 失真黄 */
            
            --disabled-bg: #F3F4F6;
            --disabled-border: #D1D5DB;
            --disabled-text: #9CA3AF;
            
            /* 硬直阴影 (Neo-Brutalism) */
            --shadow-sm: 3px 3px 0px var(--border-strong);
            --shadow-md: 5px 5px 0px var(--border-strong);
            --shadow-lg: 8px 8px 0px var(--border-strong);
            
            --transition: 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body {
            font-family: 'Noto Sans JP', 'Noto Sans SC', 'M PLUS Rounded 1c', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 摇滚舞台风：冷蓝色密集波点 */
            background-image: radial-gradient(#BFDBFE 2.5px, transparent 2.5px);
            background-size: 22px 22px;
        }

        /* ================= Header ================= */
        header {
            width: 100%;
            padding: 16px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(250, 250, 255, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 4px solid var(--border-strong);
            box-shadow: 0 4px 16px rgba(17, 24, 39, 0.06);
        }

        .back-btn, .home-btn {
            text-decoration: none;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 900;
            padding: 6px 14px;
            background: #FFF;
            border-radius: 6px;
            border: 3px solid var(--border-strong);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
            letter-spacing: 0.05em;
        }
        
        .back-btn:hover, .home-btn:hover { 
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
            background: var(--rock-cyan);
            color: #FFF;
        }
        
        .back-btn:active, .home-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 0 0 0 var(--border-strong);
        }

        h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 900;
            color: var(--text-main);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
        }
        
        h1 span {
            color: #FFF;
            background: var(--rock-blue);
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 13px;
            margin-left: 8px;
            border: 2px solid var(--border-strong);
            box-shadow: 2px 2px 0px var(--border-strong);
            transform: rotate(-2deg); /* 增加一点摇滚的不羁感 */
        }

        .container {
            width: 95%;
            max-width: 860px;
            padding: 40px 0 80px 0;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* 题型提示说明块 */
        .intro-box {
            text-align: center;
            margin-bottom: 36px;
            animation: fadeIn 0.4s ease-out;
        }
        
        .intro-box p {
            color: var(--text-main);
            font-size: 16px;
            font-weight: 900;
            margin: 0;
            background: #FFF;
            border: 3px solid var(--border-strong);
            display: inline-block;
            padding: 12px 28px;
            border-radius: 8px; /* 抛弃圆润，使用更硬朗的倒角 */
            box-shadow: var(--shadow-md);
            letter-spacing: 0.05em;
        }

        /* ================= 弱点特训 (错题区) ================= */
        .review-section {
            background: var(--rock-cyan);
            border: 4px solid var(--border-strong);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 36px;
            box-shadow: var(--shadow-lg);
            position: relative;
            animation: slideUp 0.4s ease-out;
        }

        /* 增加一个类似磁带的装饰线 */
        .review-section::before {
            content: '';
            position: absolute;
            top: 24px; left: 0; bottom: 24px;
            width: 6px;
            background: var(--border-strong);
            border-radius: 0 4px 4px 0;
        }

        .review-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-left: 12px;
        }

        .review-header h2 {
            margin: 0;
            font-size: 20px;
            color: var(--text-main);
            font-weight: 900;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #FFF;
            padding: 6px 16px;
            border: 3px solid var(--border-strong);
            border-radius: 6px;
            box-shadow: var(--shadow-sm);
        }

        .review-header h2 span.sub-title {
            font-size: 13px; 
            color: var(--text-sub); 
            border: none; 
            box-shadow: none; 
            padding: 0; 
            background: transparent;
        }

        .review-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding-left: 12px;
        }

        .review-item {
            text-decoration: none;
            background: #FFF;
            border: 3px solid var(--border-strong);
            padding: 8px 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all var(--transition);
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
            font-weight: 900;
        }

        .review-item:hover {
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
            background: var(--rock-yellow);
        }
        
        .review-item:active {
            transform: translate(3px, 3px);
            box-shadow: 0 0 0 var(--border-strong);
        }

        .review-year {
            font-size: 15px;
            letter-spacing: 0.05em;
        }

        .review-count {
            background: var(--text-main);
            color: #FFF;
            font-size: 12px;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 4px;
            border: 2px solid var(--text-main);
        }

        /* ================= 歌曲轨道列表 (年份卡片) ================= */
        .year-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 24px;
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .year-card {
            background: var(--card-bg);
            border: 4px solid var(--border-strong);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: all var(--transition);
            position: relative;
            box-shadow: var(--shadow-md);
        }

        .year-card:hover {
            transform: translate(-3px, -3px);
            box-shadow: var(--shadow-lg);
            background-color: #F8FAFC;
        }

        .year-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-bottom: 3px solid var(--border-strong); /* 换成更硬朗的实线 */
            padding-bottom: 16px;
        }

        .year-title {
            font-size: 26px; /* 字体加大，更具冲击力 */
            font-weight: 900;
            color: var(--text-main);
            letter-spacing: 0.05em;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .lesson-tag {
            font-size: 13px;
            color: #FFF;
            background: var(--border-strong);
            padding: 3px 10px;
            border-radius: 4px;
            letter-spacing: 0.1em;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* 播放状态徽章 */
        .last-practice-tag {
            font-size: 12px;
            font-weight: 900;
            color: #FFF;
            background: var(--rock-purple); /* 摇滚紫 */
            padding: 4px 12px;
            border-radius: 6px;
            border: 2px solid var(--border-strong);
            letter-spacing: 0.05em;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow-sm);
            animation: bounceIn 2.5s ease-in-out infinite;
        }

        @keyframes bounceIn {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        /* ================= 音游风 3D 按钮 ================= */
        .exam-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .exam-btn,
        .exam-mode-btn {
            text-decoration: none;
            font-size: 16px;
            font-weight: 900;
            padding: 12px 16px;
            border-radius: 8px; /* 锐利倒角 */
            border: 3px solid var(--border-strong);
            color: var(--text-main);
            transition: all var(--transition);
            letter-spacing: 0.05em;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: var(--shadow-sm);
        }

        .exam-mode-btn {
            font-size: 13px;
            padding: 10px 12px;
        }

        .exam-mode-btn.is-challenge,
        .exam-mode-btn.is-challenge:hover,
        .exam-mode-btn.is-challenge:active {
            background: #fff;
            color: var(--text-main);
            filter: none;
        }

        /* 7月 - 霓虹青 */
        .btn-cyan {
            background: var(--rock-cyan);
            color: #FFF;
        }
        .btn-cyan:hover {
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
            filter: brightness(1.1);
        }
        .btn-cyan:active {
            transform: translate(3px, 3px);
            box-shadow: 0 0 0 var(--border-strong);
        }

        /* 12月 - 摇滚蓝 */
        .btn-blue {
            background: var(--rock-blue);
            color: #FFF;
        }
        .btn-blue:hover {
            transform: translate(-2px, -2px);
            box-shadow: var(--shadow-md);
            filter: brightness(1.1);
        }
        .btn-blue:active {
            transform: translate(3px, 3px);
            box-shadow: 0 0 0 var(--border-strong);
        }

        /* 未解锁状态 */
        .exam-btn.disabled {
            background: var(--disabled-bg);
            color: var(--disabled-text);
            border-style: dashed;
            box-shadow: none;
            cursor: not-allowed;
        }

        .exam-mode-btn.disabled {
            background: var(--disabled-bg);
            color: var(--disabled-text);
            border-style: dashed;
            box-shadow: none;
            cursor: not-allowed;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .year-grid { grid-template-columns: 1fr; }
            .year-card { padding: 20px; }
            .year-info { gap: 12px; }
            .year-title { font-size: 22px; }
            header { padding: 12px 16px; }
            .exam-mode-stack { grid-template-columns: 1fr; }
        }
    
        /* CODEX listening mobile density: year directory */
        @media (max-width: 720px) {
            body { background-size: 16px 16px; }
            header { padding: 12px 14px !important; border-bottom-width: 2px !important; }
            .back-btn, .home-btn { font-size: 12px !important; min-height: 30px !important; padding: 6px 10px !important; gap: 4px !important; border-radius: 8px !important; }
            h1 { font-size: 16px !important; }
            h1 span { font-size: 10px !important; padding: 2px 7px !important; border-width: 2px !important; }
            .container { width: calc(100% - 20px) !important; max-width: none !important; padding: 20px 0 34px !important; }
            .intro-box { margin-bottom: 20px !important; }
            .intro-box p { font-size: 12px !important; padding: 8px 16px !important; border-width: 2px !important; box-shadow: 2px 2px 0 #1c1c1c !important; }
            .review-section {
                padding: 16px !important;
                margin-bottom: 20px !important;
                border-width: 3px !important;
                border-radius: 14px !important;
                box-shadow: 6px 6px 0 #1c1c1c !important;
            }
            .review-header, .review-section h2 { gap: 8px !important; margin-bottom: 14px !important; }
            .review-header h2, .review-section h2 {
                font-size: 16px !important;
                padding: 5px 12px !important;
                border-width: 2px !important;
                box-shadow: 2px 2px 0 #1c1c1c !important;
            }
            .review-header h2 .sub-title { font-size: 11px !important; }
            .review-grid { gap: 8px !important; }
            .review-item, .review-btn {
                padding: 7px 12px !important;
                border-width: 2px !important;
                border-radius: 10px !important;
                box-shadow: 2px 2px 0 #1c1c1c !important;
                gap: 6px !important;
            }
            .review-year, .review-count { font-size: 11px !important; }
            .year-grid { grid-template-columns: 1fr !important; gap: 14px !important; }
            .year-card {
                gap: 14px !important;
                padding: 16px !important;
                border-width: 3px !important;
                border-radius: 14px !important;
                box-shadow: 6px 6px 0 #1c1c1c !important;
            }
            .year-info { gap: 8px !important; padding-bottom: 12px !important; }
            .year-title { font-size: 19px !important; gap: 8px !important; margin-bottom: 0 !important; }
            .lesson-tag, .last-practice-tag {
                font-size: 10px !important;
                padding: 2px 7px !important;
                border-radius: 6px !important;
                border-width: 2px !important;
                box-shadow: 2px 2px 0 #1c1c1c !important;
            }
            .exam-buttons { grid-template-columns: 1fr 1fr !important; gap: 10px !important; }
            .exam-btn, .exam-mode-btn {
                min-height: 40px !important;
                padding: 9px 12px !important;
                border-radius: 9px !important;
                border-width: 2px !important;
                box-shadow: 2px 2px 0 #1c1c1c !important;
                font-size: 12px !important;
                gap: 5px !important;
            }
        }
        @media (max-width: 520px) {
            body { background-size: 14px 14px; }
            header { padding: 10px 10px !important; }
            .back-btn, .home-btn { font-size: 11px !important; min-height: 28px !important; padding: 5px 8px !important; }
            h1 { font-size: 14px !important; }
            .container { width: calc(100% - 16px) !important; padding: 16px 0 26px !important; }
            .intro-box p { font-size: 11px !important; padding: 7px 12px !important; }
            .review-section {
                padding: 14px !important;
                border-radius: 12px !important;
                box-shadow: 4px 4px 0 #1c1c1c !important;
            }
            .review-header h2, .review-section h2 { font-size: 14px !important; }
            .review-year, .review-count { font-size: 10px !important; }
            .year-grid { gap: 10px !important; }
            .year-card {
                gap: 12px !important;
                padding: 14px !important;
                border-radius: 12px !important;
                box-shadow: 4px 4px 0 #1c1c1c !important;
            }
            .year-title { font-size: 16px !important; }
            .exam-buttons { grid-template-columns: 1fr 1fr !important; gap: 8px !important; }
            .exam-btn, .exam-mode-btn {
                min-height: 36px !important;
                padding: 8px 10px !important;
                font-size: 11px !important;
            }
        }

    </style>
    <link rel="stylesheet" href="../../../../shared/site-fonts.css">
    <link rel="stylesheet" href="../../shared/listening-header.css">
</head>
<body>

    <header>
        <a href="../index.html" class="back-btn" data-back-nav>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            戻る
        </a>
        <h1>即時応答 <span>N2 STAGE</span></h1>
        <a href="../../../../index.html" class="home-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            ホーム
        </a>
    </header>

    <div class="container">
        
        <div class="intro-box">
            <p>🎸 ギターを手に取れ！ステージを選択せよ！</p>
        </div>

        <div id="randomExamRoot"></div>

        <!-- ================= 错题区 (Riff) ================= -->
        <div id="mistakeReview" class="review-section" style="display: none;">
            <div class="review-header">
                <h2>🎸 リフの猛特訓 <span class="sub-title">(弱点克服)</span></h2>
            </div>
            <div class="review-grid" id="reviewGrid">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- ================= 历年歌曲轨道列表 ================= -->
        <div class="year-grid" id="yearGrid">
            <!-- Populated by JS -->
        </div>
    </div>

    <script src="../../shared/listening-progress.js"></script>
    <script src="../../shared/listening-question-pools.js"></script>
    <script src="../../shared/listening-random-entry.js"></script>
    <script>
        const LISTENING_TYPE = 'immediate-response';
        const LISTENING_LEVEL = 'n2';
        const startYear = 2010;
        const endYear = 2020;
        const grid = document.getElementById('yearGrid');
        const reviewGrid = document.getElementById('reviewGrid');
        const section = document.getElementById('mistakeReview');

        const fileMap = {
            '2010': 'years/j_2010.html',
            '2011': 'years/j_2011.html',
            '2012': 'years/j_2012.html',
            '2013': 'years/j_2013.html',
            '2014': 'years/j_2014.html',
            '2015': 'years/j_2015.html',
            '2016': 'years/j_2016.html',
            '2017': 'years/j_2017.html',
            '2018': 'years/j_2018.html',
            '2019': 'years/j_2019.html',
            '2020': 'years/j_2020.html'
        };

        const available = {
            '2010-07': 'years/j_2010.html?year=2010-07',
            '2010-12': 'years/j_2010.html?year=2010-12',
            '2011-07': 'years/j_2011.html?year=2011-07',
            '2011-12': 'years/j_2011.html?year=2011-12',
            '2012-07': 'years/j_2012.html?year=2012-07',
            '2012-12': 'years/j_2012.html?year=2012-12',
            '2013-07': 'years/j_2013.html?year=2013-07',
            '2013-12': 'years/j_2013.html?year=2013-12',
            '2014-07': 'years/j_2014.html?year=2014-07',
            '2014-12': 'years/j_2014.html?year=2014-12',
            '2015-07': 'years/j_2015.html?year=2015-07',
            '2015-12': 'years/j_2015.html?year=2015-12',
            '2016-07': 'years/j_2016.html?year=2016-07',
            '2016-12': 'years/j_2016.html?year=2016-12',
            '2017-07': 'years/j_2017.html?year=2017-07',
            '2017-12': 'years/j_2017.html?year=2017-12',
            '2018-07': 'years/j_2018.html?year=2018-07',
            '2018-12': 'years/j_2018.html?year=2018-12',
            '2019-07': 'years/j_2019.html?year=2019-07',
            '2019-12': 'years/j_2019.html?year=2019-12',
            '2020-12': 'years/j_2020.html?year=2020-12'
        };

        const lastPractice = window.ListeningProgress ? window.ListeningProgress.getLastPractice(LISTENING_TYPE, LISTENING_LEVEL) : null;

        function loadMistakes() {
            reviewGrid.innerHTML = '';

            const reviewItems = Object.keys(available)
                .map((examKey) => {
                    const year = examKey.split('-')[0];
                    return {
                        examKey,
                        year,
                        count: window.ListeningProgress ? window.ListeningProgress.getMistakeIds(
                            LISTENING_TYPE,
                            LISTENING_LEVEL,
                            examKey
                        ).length : 0
                    };
                })
                .filter((item) => item.count > 0 && fileMap[item.year])
                .sort((a, b) => b.examKey.localeCompare(a.examKey));

            if (reviewItems.length === 0) {
                section.style.display = 'none';
                return;
            }

            reviewItems.forEach((item) => {
                const btn = document.createElement('a');
                btn.className = 'review-item';
                btn.href = `${fileMap[item.year]}?year=${item.examKey}&mode=review`;
                btn.innerHTML = `
                    <span class="review-year">${item.examKey}</span>
                    <span class="review-count">${item.count}問</span>
                `;
                reviewGrid.appendChild(btn);
            });

            section.style.display = 'block';
        }
        
        loadMistakes();

        if (window.ListeningRandomEntry) {
            window.ListeningRandomEntry.mount({
                mount: document.getElementById('randomExamRoot'),
                type: 'immediate_response',
                level: 'N2'
            });
        }

        for (let year = startYear; year <= endYear; year++) {
            const card = document.createElement('div');
            card.className = 'year-card';

            const julyKey = `${year}-07`;
            const decKey = `${year}-12`;

            let tagHtml = '';
            if (lastPractice === julyKey || lastPractice === decKey) {
                tagHtml = '<span class="last-practice-tag">▶ 再生中</span>';
            }

            const getBtnHtml = (key, label, colorClass) => {
                if (available[key]) {
                    return `<a href="${available[key]}&mode=study" class="exam-btn ${colorClass}">${label} ライブ</a>`;
                }
                return `<span class="exam-btn disabled">${label} 準備中</span>`;
            };

            card.innerHTML = `
                <div class="year-info">
                    <div class="year-title">
                        <span class="lesson-tag">トラック</span> ${year}年
                        ${tagHtml}
                    </div>
                </div>
                <div class="exam-buttons">
                    ${getBtnHtml(julyKey, '7月', 'btn-cyan')}
                    ${getBtnHtml(decKey, '12月', 'btn-blue')}
                </div>
            `;

            grid.appendChild(card);
        }
    </script>
</body>
</html>
