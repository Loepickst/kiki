<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時応答 - レベル選択</title>
    <!-- 使用与练习页一致的书面/印刷感字体组合 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 纸张与铅笔色盘 - 明亮白底版 */
            --paper: #ffffff;          
            --paper-light: #ffffff;    
            
            --graphite: #333333;       
            --graphite-sub: #666666;   
            --graphite-faint: #cccccc; 
            
            --red-pencil: #e64a4a;     
            --red-pencil-light: rgba(230, 74, 74, 0.04); 

            /* 水彩记号笔色系 */
            --marker-yellow: rgba(255, 213, 79, 0.35); 
            --marker-blue: rgba(129, 212, 250, 0.35);  
            --marker-pink: rgba(244, 143, 177, 0.35);  
            --marker-gray: rgba(200, 200, 200, 0.25);

            /* 铅笔排线背景 */
            --hatching-graphite: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(51, 51, 51, 0.04) 3px, rgba(51, 51, 51, 0.04) 4px);

            --transition: all 0.2s ease-out;
        }

        body {
            font-family: 'Noto Serif JP', 'Noto Sans JP', 'Noto Sans SC', serif;
            background-color: var(--paper);
            color: var(--graphite);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* 极弱的纸张噪点纹理 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.02'/%3E%3C/svg%3E");
            z-index: -1;
            pointer-events: none;
        }

        /* ================= Header ================= */
        header {
            width: 100%;
            padding: 16px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(4px);
            border-bottom: 1.5px solid var(--graphite);
            border-bottom-left-radius: 50% 2px;
            border-bottom-right-radius: 50% 3px;
        }

        .back-btn, .home-btn {
            text-decoration: none;
            color: var(--graphite);
            font-size: 14px;
            font-weight: 700;
            padding: 4px 12px;
            background: transparent;
            border: 1.5px solid var(--graphite);
            border-radius: 2px 8px 3px 6px / 6px 3px 8px 2px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
            letter-spacing: 0.05em;
        }
        
        .back-btn:hover, .home-btn:hover { 
            background: var(--marker-yellow);
        }

        h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: var(--graphite);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
        }
        
        h1 span {
            color: var(--graphite);
            background: transparent;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 8px;
            border: 1.5px solid var(--graphite);
            border-radius: 2px 8px 2px 6px / 6px 2px 8px 2px;
            font-family: 'Noto Sans JP', sans-serif;
        }

        .vocab-container {
            width: 95%;
            max-width: 860px;
            padding: 40px 0;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* 提示说明块 - 水彩荧光笔风格 */
        .intro-box {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 0.4s ease-out;
        }
        
        .intro-box p {
            color: var(--graphite);
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 15px;
            font-weight: 700;
            margin: 0;
            /* 荧光黄下划线特效 */
            background: linear-gradient(transparent 50%, rgba(255, 213, 79, 0.4) 50%);
            border-bottom: 1.5px dashed var(--graphite-faint);
            display: inline-block;
            padding: 4px 16px;
            letter-spacing: 0.1em;
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ================= 等级卡片 ================= */
        .level-card {
            background: transparent;
            border-radius: 3px 255px 4px 25px / 255px 5px 225px 4px;
            padding: 24px;
            border: 1.5px solid var(--graphite);
            transition: all var(--transition);
            text-decoration: none;
            color: var(--graphite);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .level-card:hover:not(.locked) {
            transform: translate(-1px, -1px);
            background: var(--hatching-graphite);
        }
        
        .level-card:active:not(.locked) {
            transform: translate(1px, 1px);
        }

        /* 锁定的卡片状态 */
        .level-card.locked {
            border-style: dashed;
            border-color: var(--graphite-faint);
            cursor: not-allowed;
            opacity: 0.8;
        }
        
        .level-card.locked:hover {
            transform: none;
            background: transparent;
        }

        .level-info {
            flex: 1;
            padding-right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .level-info h2 {
            margin: 0 0 12px 0;
            font-size: 26px;
            font-weight: 700;
            color: var(--graphite);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            letter-spacing: 0.05em;
        }

        /* 难度标签 - 手绘感边框 + 水彩底色 */
        .lesson-tag {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: var(--graphite);
            padding: 2px 8px;
            border: 1.5px solid var(--graphite);
            border-radius: 2px 8px 2px 6px / 6px 2px 8px 2px;
            letter-spacing: 0.1em;
        }

        .level-card:nth-child(1) .lesson-tag { background: var(--marker-pink); }
        .level-card:nth-child(2) .lesson-tag { background: var(--marker-blue); }
        
        .level-card.locked .lesson-tag {
            background: var(--marker-gray);
            border-color: var(--graphite-faint);
            color: var(--graphite-sub);
        }

        .level-info p {
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0 0 12px 0;
            font-size: 14px;
            color: var(--graphite-sub);
            line-height: 1.6;
            font-weight: 500;
        }

        .level-info .hint-text {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 12px;
            color: var(--graphite-sub);
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 2px 6px 3px 5px / 5px 3px 6px 2px;
            display: inline-block;
            border: 1px dashed var(--graphite-sub);
        }

        .level-card.locked .level-info h2 { color: var(--graphite-faint); }
        .level-card.locked .level-info p { color: var(--graphite-faint); }
        .level-card.locked .level-info .hint-text {
            border-color: var(--graphite-faint);
            color: var(--graphite-faint);
        }

        /* 右侧图标 - 随手画的圆圈 */
        .level-icon {
            font-size: 32px;
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid var(--graphite);
            border-radius: 50% 45% 55% 40% / 45% 55% 40% 50%;
            flex-shrink: 0;
            background: #FFF;
        }

        .level-card:nth-child(1) .level-icon { background: var(--marker-pink); }
        .level-card:nth-child(2) .level-icon { background: var(--marker-blue); }

        .level-card.locked .level-icon { 
            background: transparent; 
            border-color: var(--graphite-faint); 
            filter: grayscale(100%);
            opacity: 0.5;
        }

        footer {
            margin-top: auto;
            padding: 30px;
            font-size: 13px;
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 500;
            color: var(--graphite-faint);
        }

        @media (max-width: 600px) {
            .level-grid { grid-template-columns: 1fr; }
            .level-card { padding: 20px; }
            .level-info h2 { font-size: 22px; }
            .level-icon { width: 56px; height: 56px; font-size: 28px; }
            header { padding: 12px 16px; }
        }
    
        /* 手机端深度适配 */
        @media (max-width: 720px) {
            header { padding: 12px 14px !important; }
            .back-btn, .home-btn { font-size: 12px !important; padding: 6px 10px !important; gap: 4px !important; }
            h1 { font-size: 16px !important; }
            h1 span { font-size: 10px !important; padding: 2px 6px !important; }
            
            .vocab-container {
                width: calc(100% - 32px) !important;
                padding: 20px 0 32px !important;
            }
            .intro-box { margin-bottom: 24px !important; }
            .intro-box p {
                font-size: 13px !important;
                padding: 4px 12px !important;
            }
            .level-grid { grid-template-columns: 1fr !important; gap: 16px !important; }
            .level-card {
                padding: 16px !important;
                gap: 12px !important;
            }
            .level-info { padding-right: 12px !important; }
            .level-info h2 { font-size: 20px !important; margin-bottom: 8px !important; }
            .level-info p { font-size: 13px !important; line-height: 1.5 !important; }
            .level-icon {
                width: 48px !important;
                height: 48px !important;
                font-size: 24px !important;
            }
            .lesson-tag { font-size: 11px !important; padding: 2px 6px !important; }
        }
        
        @media (max-width: 520px) {
            header { padding: 10px 12px !important; }
            .back-btn, .home-btn { font-size: 11px !important; padding: 4px 8px !important; }
            h1 { font-size: 15px !important; }
            .vocab-container { width: calc(100% - 24px) !important; padding: 16px 0 24px !important; }
            .intro-box p { font-size: 12px !important; }
            .level-grid { gap: 12px !important; }
            .level-card { padding: 14px !important; }
            .level-info { padding-right: 8px !important; }
            .level-info h2 { font-size: 18px !important; }
            .level-info p { font-size: 12px !important; }
            .level-icon {
                width: 44px !important;
                height: 44px !important;
                font-size: 20px !important;
            }
            .hint-text { font-size: 11px !important; padding: 2px 8px !important; }
        }

    </style>
    <link rel="stylesheet" href="../../../shared/site-fonts.css">
    <link rel="stylesheet" href="../shared/listening-header.css">
</head>
<body>

    <header>
        <a href="../index.html" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            戻る
        </a>
        <h1>即時応答 <span>LEVEL</span></h1>
        <a href="../../../index.html" class="home-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            ホーム
        </a>
    </header>

    <div class="vocab-container">
        <div class="intro-box">
            <p>✎ 挑戦するレベルを選択してください</p>
        </div>

        <div class="level-grid">
            <!-- N1 -->
            <a href="n1/index.html" class="level-card">
                <div class="level-info">
                    <h2>N1 <span class="lesson-tag">上級</span></h2>
                    <p>即時応答 / 過去問演習</p>
                    <span class="hint-text">※ 高速レスポンス</span>
                </div>
                <div class="level-icon">🎧</div>
            </a>

            <!-- N2 -->
            <a href="n2/index.html" class="level-card">
                <div class="level-info">
                    <h2>N2 <span class="lesson-tag">中上級</span></h2>
                    <p>即時応答 / 過去問演習</p>
                    <span class="hint-text">※ 基礎レスポンス</span>
                </div>
                <div class="level-icon">📻</div>
            </a>

            <!-- N3 -->
            <div class="level-card locked" aria-disabled="true">
                <div class="level-info">
                    <h2>N3 <span class="lesson-tag">中級</span></h2>
                    <p>後日改造予定</p>
                    <span class="hint-text">※ 準備中</span>
                </div>
                <div class="level-icon">📼</div>
            </div>
        </div>
    </div>

    <footer>
        © キキの日本語コーナー
    </footer>

</body>
</html>
